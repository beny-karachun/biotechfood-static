<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Study Tool</title>
    <style>
        /* --- Root Variables for Consistent Theming --- */
        :root {
            --primary-bg: #333333;
            --secondary-bg: #666666;
            --accent-color: #3D90D7;
            --text-color: #E0E0E0;
            --correct-color: #4CAF50;
            --incorrect-color: #F44336;
            --card-bg: #5a5a5a;
        }

        /* --- Global Styles --- */
        body {
            background-color: var(--primary-bg);
            color: var(--text-color);
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 90%; /* As per prompt */
            margin: 20px auto;
            padding: 20px;
            background-color: var(--secondary-bg);
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        h1, h2 {
            color: var(--accent-color);
            text-align: center;
            border-bottom: 1px solid var(--accent-color);
            padding-bottom: 10px;
        }

        .section {
            background-color: var(--primary-bg);
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 8px;
        }

        /* --- Study Cards Styling (Fade Animation) --- */
        .flashcard-container {
            height: 250px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #flashcard-content {
            width: 100%;
            height: 100%;
            background-color: var(--card-bg);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            transition: opacity 0.3s ease-in-out; /* Fade transition */
        }
        
        .flashcard-front-style {
             font-size: 1.5em;
             font-weight: bold;
        }
        
        .flashcard-back-style {
             font-size: 1.1em;
        }

        /* --- Questions Styling (MCQ & T/F) --- */
         .question-container-single, .question-container-all {
            margin-bottom: 15px;
            padding: 15px;
            border: 1px solid var(--secondary-bg);
            border-radius: 5px;
         }

        .question-text {
            font-weight: bold;
            margin-bottom: 15px;
        }

        .options button, .tf-options button {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-align: right;
            transition: background-color 0.3s;
        }

        .options button:hover:not(:disabled), .tf-options button:hover:not(:disabled) {
            background-color: #357ab8;
        }

        .options button:disabled, .tf-options button:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
        
        /* Specific styling to override disabled opacity for correct/incorrect answers */
        .options button.correct, .tf-options button.correct { opacity: 1; }
        .options button.incorrect, .tf-options button.incorrect { opacity: 1; }


        .feedback {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
        }

        .feedback.correct {
            background-color: var(--correct-color);
            color: #fff;
        }

        .feedback.incorrect {
            background-color: var(--incorrect-color);
            color: #fff;
        }

        .explanation {
            margin-top: 10px;
            font-style: italic;
            font-size: 0.9em;
            padding: 8px;
            background-color: var(--secondary-bg);
            border-radius: 4px;
        }

        /* --- Navigation & Utility Styling --- */
        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            margin-bottom: 10px;
        }

        .nav-button, .view-all-button {
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
        }

        .nav-button:disabled {
             opacity: 0.5;
             cursor: not-allowed;
        }

        .counter {
            font-size: 0.9em;
        }

        .view-all-container {
            text-align: center;
            margin-top: 15px;
            margin-bottom: 15px;
        }

        .hidden {
            display: none;
        }

        #mcq-all-questions .question-container-all,
        #tf-all-questions .question-container-all {
            margin-bottom: 20px;
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>בקרת איכות, אמינות והערכת סיכונים בתעשיית המזון</h1>

        <!-- Study Cards Section -->
        <div class="section">
            <h2>כרטיסי לימוד</h2>
            <div class="flashcard-container">
                <div id="flashcard-content"></div>
            </div>
            <div class="navigation">
                <button class="nav-button" id="prev-card">הקודם</button>
                <span class="counter" id="card-counter"></span>
                <button class="nav-button" id="next-card">הבא</button>
            </div>
        </div>

        <!-- Multiple Choice Questions Section -->
        <div class="section">
            <h2>שאלות רב-ברירה (אמריקאיות)</h2>
            <div id="mcq-single-view">
                <div class="question-container-single" id="mcq-container">
                    <div class="question-text" id="mcq-question"></div>
                    <div class="options" id="mcq-options"></div>
                    <div class="feedback hidden" id="mcq-feedback"></div>
                    <div class="explanation hidden" id="mcq-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-mcq">הקודם</button>
                    <span class="counter" id="mcq-counter"></span>
                    <button class="nav-button" id="next-mcq">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-mcq">הצג את כל השאלות</button>
                 </div>
            </div>
            <div id="mcq-all-questions" class="hidden">
                <!-- All MCQs will be dynamically inserted here -->
            </div>
        </div>

        <!-- True/False Questions Section -->
        <div class="section">
            <h2>שאלות נכון/לא נכון</h2>
             <div id="tf-single-view">
                <div class="question-container-single" id="tf-container">
                    <div class="question-text" id="tf-question"></div>
                    <div class="tf-options" id="tf-options">
                        <button data-answer="true">נכון</button>
                        <button data-answer="false">לא נכון</button>
                    </div>
                    <div class="feedback hidden" id="tf-feedback"></div>
                    <div class="explanation hidden" id="tf-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-tf">הקודם</button>
                    <span class="counter" id="tf-counter"></span>
                    <button class="nav-button" id="next-tf">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-tf">הצג את כל השאלות</button>
                 </div>
            </div>
             <div id="tf-all-questions" class="hidden">
                 <!-- All T/F Questions will be dynamically inserted here -->
             </div>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        
        const flashcardData = [
            { term: `GMP (Good Manufacturing Practices)`, definition: `תכנית עבודה הנכתבת על ידי אנשי המפעל, שמטרתה לבקר ולשלוט בתנאים התברואתיים והבטיחותיים של כלל אזורי המפעל וסביבתו.` },
            { term: `ISO 22000`, definition: `סטנדרט בינלאומי לבטיחות מזון. תכנית ניהול עבודה הנכתבת ומוכתבת מבחוץ, המאפשרת ייצוא למדינות עם תקנים מחמירים.` },
            { term: `HACCP`, definition: `מערכת אנליזה של סיכונים בנקודות בקרה קריטיות. מטרתה להבטיח ייצור מוצר בטיחותי תוך דגש על מניעה לאורך כל שרשרת הייצור.` },
            { term: `CCP (Critical Control Point)`, definition: `נקודה בשלב הייצור בה ניתן להפעיל בקרה על מנת למנוע סיכון בטיחותי או להחליש אותו לרמות סבירות.` },
            { term: `Hazard Identification (זיהוי הגורם)`, definition: `השלב הראשון בהערכת סיכונים, הכולל שימוש בידע קיים כדי להעריך את שכיחות הגורם הביולוגי, חומרת המחלה שהוא גורם וכדומה.` },
            { term: `Exposure Assessment (הערכת חשיפה)`, definition: `שלב בהערכת סיכונים הבוחן מהו המספר האמיתי של החיידקים אליו ייחשף הצרכן, וכמה אנשים צפויים להיחשף לסכנה.` },
            { term: `Dose Response Assessment (הערכת מנת תגובה)`, definition: `שלב בהערכת סיכונים המעריך מהי הכמות של הגורם המזהם שתגרום למחלה, ובאיזו דרגת חומרה.` },
            { term: `Risk Characterization (אפיון הסיכון)`, definition: `הערכה מסכמת לגבי הסיכוי שהמוצר יגרום לסכנה כלשהי והערכת מידת חומרתה, מחושב כפונקציה של חשיפה ומנת תגובה.` },
            { term: `Microbial Modeling (מודל מיקרוביאלי)`, definition: `כלי המשמש לניבוי התנהגות מיקרואורגניזמים לאורך קו הייצור, ניבוי חיי מדף, והערכת השפעת שינויים בתהליך על הגידול החיידקי.` },
            { term: `מכון התקנים הישראלי`, definition: `מכון ציבורי האחראי על קביעת התקן הישראלי בתחומים שונים, כולל תעשיית המזון.` },
            { term: `אכיפת תקנות מזון בישראל`, definition: `מבוצעת בעיקר על ידי שני גופים ממשלתיים: משרד הבריאות ומשרד החקלאות.` },
            { term: `עקרון 1 של HACCP`, definition: `אומדן הזיהום והסיכון. כולל בחינת המוצר לפי קטגוריות רגישות כמו אוכלוסיות יעד ושלבי עיבוד.` },
            { term: `עקרון 3 של HACCP`, definition: `קביעת חוקים וגבולות לכל נקודת בקרה קריטית (CCP), כגון טווח טמפרטורה, זמן בישול, או רמת חומציות נדרשת.` },
            { term: `עקרון 5 של HACCP`, definition: `קביעה מראש של חוקים ודרכי פעולה מתקנות למקרים בהם ישנם שינויים או חריגות מהגבולות שהוגדרו בנקודות הבקרה.` },
            { term: `עקרון 6 של HACCP`, definition: `נוהל תיעוד. דרישה להכנת טפסים מראש למילוי יומיומי מסודר, הכולל חתימות, כדי להוכיח שהמערכת פועלת כנדרש.` },
            { term: `עקרון 7 של HACCP`, definition: `הקמת מערכת אימות ובקרה שבודקת שהמפעל אכן פועל לפי תכנית ה-HACCP שהוגדרה. לעיתים מנוהל על ידי חברות ייעוץ חיצוניות.` }
        ];

        const mcqData = [
            {
                question: `מפעל מזון מעוניין ליישם מערכת בקרת איכות שתאפשר לו לייצא את מוצריו לשוק האירופאי, הידוע בתקניו המחמירים. איזו מהמערכות הבאות תספק את המענה המתאים ביותר למטרה זו, ומה מאפיין אותה?`,
                options: [
                    `מערכת GMP, מכיוון שהיא נכתבת על ידי אנשי המפעל ומותאמת בדיוק לצרכיו הפנימיים.`,
                    `תקן ISO 22000, מכיוון שזהו סטנדרט בינלאומי המוכתב ונבדק על ידי גורמי חוץ, המקנה דירוג הסמכה גבוה.`,
                    `תקן ישראלי של מכון התקנים, מכיוון שהוא מבוסס על רגולציה מחמירה של משרד הבריאות.`,
                    `מערכת HACCP בלבד, מכיוון שהיא מתמקדת בבדיקות מעבדה של המוצר הסופי לפני ייצוא.`
                ],
                correctIndex: 1,
                explanation: `תקן ISO 22000 הוא סטנדרט בינלאומי המנוהל ומוכתב מבחוץ. קבלת הסמכה זו מעניקה דירוג בינלאומי גבוה למפעל, מה שמהווה תנאי הכרחי לייצוא למדינות עם דרישות רגולטוריות נוקשות.`
            },
            {
                question: `מהו ההבדל המהותי ביותר בין תכנית GMP לתכנית ISO 22000 מבחינת אופן יצירתן וניהולן?`,
                options: [
                    `GMP נכתבת על ידי רגולטור ממשלתי, בעוד ISO נכתבת על ידי הנהלת המפעל.`,
                    `GMP מתמקדת רק בקו הייצור הישיר, בעוד ISO בוחנת את סביבת המפעל החיצונית.`,
                    `GMP נכתבת על ידי אנשי המפעל עצמם, בעוד ISO היא תכנית ניהול הנכתבת ומוכתבת על ידי ארגון חיצוני.`,
                    `אין הבדל מהותי, שתיהן נכתבות על ידי מכון התקנים הישראלי ומועברות למפעל לאישור.`
                ],
                correctIndex: 2,
                explanation: `על פי חומר הלימוד, נוהל העבודה של GMP נכתב על ידי אנשי המפעל עצמו ומתייחס למכלול האזור. לעומת זאת, ISO 22000 היא תכנית ניהול עבודה הנכתבת ומוכתבת מבחוץ על ידי ארגון בינלאומי.`
            },
            {
                question: `מדוע גישת ה-HACCP נחשבת ליעילה יותר מאשר הסתמכות בלעדית על דגימות מעבדה של המוצר הסופי?`,
                options: [
                    `מפני שדגימות של מוצר סופי יקרות פחות אך אינן מאושרות על ידי משרד הבריאות.`,
                    `מפני ששכיחות הפתוגנים במוצר הסופי היא נמוכה, קשה לזהות את כולם, והבדיקות איטיות ויקרות, בעוד ש-HACCP מתמקדת במניעה במהלך התהליך.`,
                    `מפני ש-HACCP מבוססת אך ורק על בדיקות מהירות (Rapid tests) בסוף התהליך, החוסכות זמן יקר.`,
                    `מפני שדגימות סופיות מזהות רק סיכונים כימיים, בעוד HACCP מתמקדת רק בסיכונים ביולוגיים.`
                ],
                correctIndex: 1,
                explanation: `ההסתמכות על דגימות מוצר סופי בעייתית כי שכיחות הפתוגנים נמוכה (קשה לתפוס אותם סטטיסטית), קשה לזהות את כולם, והשיטה יקרה ואיטית. HACCP פותרת זאת על ידי מעבר מגישה של בדיקה לגישה של מניעה מראש.`
            },
            {
                question: `באיזה הקשר היסטורי הוצגה לראשונה שיטת ה-HACCP לציבור בשנת 1971?`,
                options: [
                    `כחלק מניסיון של משרד החקלאות האמריקאי למגר התפרצות סלמונלה בתעשיית הביצים.`,
                    `כפרויקט משותף של חברת פילסברי וסוכנות החלל נאסא להבטחת בטיחות מזון לאסטרונאוטים.`,
                    `כיוזמה של ארגון הבריאות העולמי להתמודדות עם רעלנים כימיים במזון במדינות מתפתחות.`,
                    `כחלק מהקמת מכון התקנים הישראלי וניסוח חוקי המזון הראשונים.`
                ],
                correctIndex: 1,
                explanation: `הרעיון המקורי פותח בשנת 1959 על ידי חברת פילסברי ו-NASA כדי להבטיח מזון בטוח לחלל, והוצג לראשונה לציבור בשנת 1971.`
            },
            {
                question: `צוות פיתוח במפעל מזון מתחיל לבנות תכנית HACCP למוצר חדש. לאחר בחירת הצוות, מהו השלב המקדים הבא שעליהם לבצע לפני שהם ניגשים לזיהוי הסכנות (עקרון 1)?`,
                options: [
                    `קביעת נקודות הבקרה הקריטיות (CCP) בקו הייצור.`,
                    `תיאור המוצר ותכונותיו, פירוט אופן החלוקה והאחסון, ואפיון צרכני המוצר.`,
                    `הכנת טפסים יומיים לתיעוד חריגות טמפרטורה.`,
                    `ביצוע מודל מיקרוביאלי לניבוי חיי המדף של המוצר.`
                ],
                correctIndex: 1,
                explanation: `לפני שמגיעים לשבעת העקרונות (שהראשון בהם הוא אומדן סיכונים), ישנם שלבים מקדימים: בחירת צוות, תיאור המוצר, אופן חלוקה ואחסון, הגדרת צרכנים, ושרטוט תרשים זרימה.`
            },
            {
                question: `על פי עקרון 1 של HACCP (אומדן הזיהום והסיכון), איזה מהמוצרים הבאים יוגדר ברמת סיכון גבוהה יותר הדורשת בחינה קפדנית יותר?`,
                options: [
                    `חטיף מלוח יבש הנארז בוואקום ונמכר למבוגרים.`,
                    `תחליף חלב אם באבקה המיועד לתינוקות.`,
                    `קופסת שימורי תירס שעברה תהליך עיקור מלא באוטוקלב.`,
                    `בקבוק מים מינרליים אטום.`
                ],
                correctIndex: 1,
                explanation: `עקרון 1 קובע כי מוצר נבחן לפי קטגוריות, ביניהן מזון לבני אדם בסיכון גבוה כגון תינוקות או חולים בבתי חולים. לכן תחליף חלב לתינוקות מהווה סיכון משמעותי יותר.`
            },
            {
                question: `במפעל לייצור קציצות בשר, הוגדר שלב הטיגון כנקודת בקרה קריטית (CCP). מה תהיה הפעולה המתאימה ביותר ליישום עקרון 3 (קביעת גבולות) עבור נקודה זו?`,
                options: [
                    `החלטה כי במידה והבשר לא טוגן מספיק, יש לזרוק את המנה לפח.`,
                    `הגדרת טמפרטורה מינימלית של 70 מעלות צלזיוס במרכז הקציצה למשך לפחות 2 דקות.`,
                    `מינוי עובד ספציפי שיהיה אחראי לחתום על טופס הטיגון בסוף כל משמרת.`,
                    `ביצוע בדיקת מעבדה לסלמונלה אחת לשבוע למדגם של קציצות מטוגנות.`

                answer: false,
                explanation: `המושג מתייחס להערכת הכמות של פתוגן שעלולה לגרום למחלה, ובאיזו דרגת חומרה.`

            {

                answer: true,

                answer: false,

                answer: true,
                explanation: `זהו שלב 5 בשלבים המקדימים, והוא חיוני להבנת התהליך ואיתור סכנות.`
            },
            {
                question: `אין צורך לאמת את תרשים הזרימה בקו הייצור עצמו, מספיק שהמהנדס שרטט אותו במשרד.`,
                answer: false,
                explanation: `שלב 6 בשלבים המקדימים דורש במפורש "אישור תרשים הזרימה בקו הייצור" כדי לוודא התאמה למציאות.`
            },
            {
                question: `מזון שעובר שלב של עיקור מלא נחשב לבעל סיכון מופחת משמעותית בהשוואה למזון שלא עבר תהליך כזה.`,
                answer: true,
                explanation: `עקרון 1 מציין הימצאות שלבי עיבוד המשמידים מיקרואורגניזמים באופן מלא כגורם המשפיע על אומדן הסיכון.`
            },
            {
                question: `סכנות פיזיקליות, כגון שברי זכוכית, אינן מטופלות במסגרת מערכת HACCP.`,
                answer: false,
                explanation: `HACCP כוללת את כל סוגי הסיכונים הפוטנציאליים: ביולוגי, כימי ופיזיקלי.`
            },
            {
                question: `הסתמכות בלעדית על בדיקות דגימה של המוצר הסופי היא דרך זולה ומהירה להבטיח בטיחות מזון.`,
                answer: false,
                explanation: `ההפך הוא הנכון. השיטה יקרה, איטית, ולא יעילה סטטיסטית בשל שכיחות פתוגנים נמוכה.`
            },
            {
                question: `ה-FDA הוא מנהל המזון והתרופות של ארצות הברית.`,
                answer: true,
                explanation: `U.S Food and Drug Administration הוא אכן ה-FDA, ומהווה מקור מידע חשוב.`
            },
            {
                question: `אפיון הסיכון (Risk characterization) הוא השלב הראשון בתהליך הערכת הסיכונים.`,
                answer: false,
                explanation: `אפיון הסיכון הוא השלב המסכם (שלב 4), המשלב את נתוני החשיפה ומנת התגובה.`
            },
            {
                question: `המונח "Abuse" בהקשר של בטיחות מזון מתייחס לחריגה מתנאי האחסון הנדרשים, כגון השארת מזון בטמפרטורת החדר.`,
                answer: true,
                explanation: `במודל מערכת המזון, Abuse גורם לעלייה חדה בכמות החיידקים עקב תנאי החזקה לקויים.`
            },
            {
                question: `בישול ביתי נוטה להעלות את ספירת החיידקים במזון.`,
                answer: false,
                explanation: `בישול ביתי (Home cooking) פועל כשלב השמדה ומוריד את ספירת החיידקים משמעותית.`
            },
            {
                question: `לפי עקרון 2 של HACCP, כל שלב בתהליך הייצור חייב להיות מוגדר כ-CCP.`,
                answer: false,
                explanation: `רק נקודות ספציפיות וקריטיות שבהן חובה להפעיל בקרה כדי למנוע סיכון מוגדרות כ-CCP. הגדרת כל שלב כ-CCP תהפוך את המערכת לבלתי ניתנת לניהול.`
            },
            {
                question: `מערכת HACCP דורשת הכנת טפסים למילוי באופן יום-יומי.`,
                answer: true,
                explanation: `זהו חלק מעקרון 6 העוסק בנוהל תיעוד.`
            },
            {
                question: `חברות ייעוץ חיצוניות לעיתים קרובות מנהלות עבור המפעל את תוכנית האימות של ה-HACCP.`,
                answer: true,
                explanation: `עקרון 7 מזכיר כי קיימות חברות ייעוץ שמנהלות למפעל את תוכנית ה-HACCP ואישורה.`
            },
            {
                question: `משרד החקלאות אינו מעורב באכיפת סטנדרטים ותקנות בתעשיית המזון בישראל.`,
                answer: false,
                explanation: `האכיפה בישראל מבוצעת על ידי משרד הבריאות ומשרד החקלאות גם יחד.`
            }
        ];


        // --- Global State Variables ---
        let currentCardIndex = 0;
        let isCardFront = true;
        let isCardAnimating = false;
        let currentMCQIndex = 0;
        let currentTFIndex = 0;
        let mcqAnswers = new Array(mcqData.length).fill(null);
        let tfAnswers = new Array(tfData.length).fill(null);

        // --- DOM Element References ---
        const flashcardContent = document.getElementById('flashcard-content');
        const cardCounter = document.getElementById('card-counter');
        const prevCardBtn = document.getElementById('prev-card');
        const nextCardBtn = document.getElementById('next-card');
        const mcqQuestion = document.getElementById('mcq-question');
        const mcqOptions = document.getElementById('mcq-options');
        const mcqFeedback = document.getElementById('mcq-feedback');
        const mcqExplanation = document.getElementById('mcq-explanation');
        const mcqCounter = document.getElementById('mcq-counter');
        const prevMCQBtn = document.getElementById('prev-mcq');
        const nextMCQBtn = document.getElementById('next-mcq');
        const viewAllMCQBtn = document.getElementById('view-all-mcq');
        const mcqSingleView = document.getElementById('mcq-single-view');
        const mcqAllQuestionsContainer = document.getElementById('mcq-all-questions');
        const tfQuestion = document.getElementById('tf-question');
        const tfOptionsContainer = document.getElementById('tf-options');
        const tfFeedback = document.getElementById('tf-feedback');
        const tfExplanation = document.getElementById('tf-explanation');
        const tfCounter = document.getElementById('tf-counter');
        const prevTFBtn = document.getElementById('prev-tf');
        const nextTFBtn = document.getElementById('next-tf');
        const viewAllTFBtn = document.getElementById('view-all-tf');
        const tfSingleView = document.getElementById('tf-single-view');
        const tfAllQuestionsContainer = document.getElementById('tf-all-questions');

        function displayCard(index) {
            if (!flashcardData || flashcardData.length === 0) return;
            const cardData = flashcardData[index];
            isCardFront = true;
            flashcardContent.style.opacity = '1';
            flashcardContent.textContent = cardData.term;
            flashcardContent.className = 'flashcard-front-style';
            cardCounter.textContent = `כרטיס ${index + 1} / ${flashcardData.length}`;
            prevCardBtn.disabled = index === 0;
            nextCardBtn.disabled = index === flashcardData.length - 1;
        }

        function flipCard() {
            if (isCardAnimating || !flashcardData || flashcardData.length === 0) return;
            isCardAnimating = true;
            flashcardContent.style.opacity = '0';
            setTimeout(() => {
                isCardFront = !isCardFront;
                const cardData = flashcardData[currentCardIndex];
                if (isCardFront) {
                    flashcardContent.textContent = cardData.term;
                    flashcardContent.className = 'flashcard-front-style';
                } else {
                    flashcardContent.textContent = cardData.definition;
                    flashcardContent.className = 'flashcard-back-style';
                }
                flashcardContent.style.opacity = '1';
                isCardAnimating = false;
            }, 300);
        }

        function displayMCQuestion(index) {
            if (!mcqData || mcqData.length === 0) return;
            const qData = mcqData[index];
            mcqQuestion.textContent = qData.question;
            mcqOptions.innerHTML = '';
            mcqFeedback.classList.add('hidden');
            mcqExplanation.classList.add('hidden');
            qData.options.forEach((option, i) => {
                const button = document.createElement('button');
                button.textContent = option;
                button.onclick = () => handleMCQAnswer(index, i);
                mcqOptions.appendChild(button);
            });
            mcqCounter.textContent = `שאלה ${index + 1} / ${mcqData.length}`;
            prevMCQBtn.disabled = index === 0;
            nextMCQBtn.disabled = index === mcqData.length - 1;
            if (mcqAnswers[index] !== null) {
                highlightMCQAnswer(mcqOptions, mcqFeedback, mcqExplanation, index, mcqAnswers[index].selected);
            }
        }

        function handleMCQAnswer(qIndex, selectedIndex) {
            if (mcqAnswers[qIndex] !== null) return;
            const isCorrect = selectedIndex === mcqData[qIndex].correctIndex;
            mcqAnswers[qIndex] = { selected: selectedIndex, correct: isCorrect };
            highlightMCQAnswer(mcqOptions, mcqFeedback, mcqExplanation, qIndex, selectedIndex);
        }
        
        function highlightMCQAnswer(optionsContainer, feedbackEl, explanationEl, qIndex, selectedIndex) {
            const qData = mcqData[qIndex];
            const buttons = optionsContainer.querySelectorAll('button');
            buttons.forEach((button, i) => {
                button.disabled = true;
                if (i === qData.correctIndex) {
                    button.style.backgroundColor = 'var(--correct-color)';
                    button.style.color = '#fff';
                    button.classList.add('correct');
                }
                if (i === selectedIndex && i !== qData.correctIndex) {
                    button.style.backgroundColor = 'var(--incorrect-color)';
                    button.style.color = '#fff';
                    button.classList.add('incorrect');
                }
            });
            feedbackEl.textContent = selectedIndex === qData.correctIndex ? "נכון!" : "לא נכון.";
            feedbackEl.className = `feedback ${selectedIndex === qData.correctIndex ? 'correct' : 'incorrect'}`;
            explanationEl.textContent = `הסבר: ${qData.explanation}`;
            explanationEl.classList.remove('hidden');
        }

        function displayAllMCQ() {
            if (!mcqData || mcqData.length === 0) return;
            mcqSingleView.classList.add('hidden');
            mcqAllQuestionsContainer.innerHTML = ''; 
            mcqData.forEach((qData, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question-container-all';
                questionDiv.innerHTML = `
                    <div class="question-text">${index + 1}. ${qData.question}</div>
                    <div class="options">
                        ${qData.options.map((option, i) => `<button data-qindex="${index}" data-oindex="${i}">${option}</button>`).join('')}
                    </div>
                    <div class="feedback hidden"></div>
                    <div class="explanation hidden"></div>
                `;
                mcqAllQuestionsContainer.appendChild(questionDiv);
                 const optionButtons = questionDiv.querySelectorAll('.options button');
                 optionButtons.forEach(button => {
                     button.onclick = () => {
                        const qIndex = parseInt(button.dataset.qindex);
                        const oIndex = parseInt(button.dataset.oindex);
                        if (mcqAnswers[qIndex] === null) {
                            const isCorrect = oIndex === mcqData[qIndex].correctIndex;
                            mcqAnswers[qIndex] = { selected: oIndex, correct: isCorrect };
                        }
                        const optionsDiv = button.closest('.options');
                        const feedbackDiv = questionDiv.querySelector('.feedback');
                        const explanationDiv = questionDiv.querySelector('.explanation');
                        highlightMCQAnswer(optionsDiv, feedbackDiv, explanationDiv, qIndex, mcqAnswers[qIndex].selected);
                     };
                 });
                 if (mcqAnswers[index] !== null) {
                    const optionsDiv = questionDiv.querySelector('.options');
                    const feedbackDiv = questionDiv.querySelector('.feedback');
                    const explanationDiv = questionDiv.querySelector('.explanation');
                    highlightMCQAnswer(optionsDiv, feedbackDiv, explanationDiv, index, mcqAnswers[index].selected);
                 }
            });
            mcqAllQuestionsContainer.classList.remove('hidden');
        }

        function displayTFQuestion(index) {
            if (!tfData || tfData.length === 0) return;
            const qData = tfData[index];
            tfQuestion.textContent = qData.question;
            tfFeedback.classList.add('hidden');
            tfExplanation.classList.add('hidden');
             const buttons = tfOptionsContainer.querySelectorAll('button');
             buttons.forEach(button => {
                 button.disabled = false;
                 button.style.backgroundColor = '';
                 button.style.color = '';
                 button.classList.remove('correct', 'incorrect');
                 button.onclick = () => handleTFAnswer(index, button.dataset.answer === 'true');
             });
            tfCounter.textContent = `שאלה ${index + 1} / ${tfData.length}`;
            prevTFBtn.disabled = index === 0;
            nextTFBtn.disabled = index === tfData.length - 1;
            if (tfAnswers[index] !== null) {
                highlightTFAnswer(tfOptionsContainer, tfFeedback, tfExplanation, index, tfAnswers[index].selected);
            }
        }
        
        function handleTFAnswer(qIndex, selectedAnswer) {
            if (tfAnswers[qIndex] !== null) return;
            const isCorrect = selectedAnswer === tfData[qIndex].answer;
            tfAnswers[qIndex] = { selected: selectedAnswer, correct: isCorrect };
            highlightTFAnswer(tfOptionsContainer, tfFeedback, tfExplanation, qIndex, selectedAnswer);
        }
        
        function highlightTFAnswer(optionsContainer, feedbackEl, explanationEl, qIndex, selectedAnswer) {
             const qData = tfData[qIndex];
             const buttons = optionsContainer.querySelectorAll('button');
             buttons.forEach(button => {
                 const buttonAnswer = button.dataset.answer === 'true';
                 button.disabled = true;
                 if (buttonAnswer === qData.answer) {
                     button.style.backgroundColor = 'var(--correct-color)';
                     button.style.color = '#fff';
                     button.classList.add('correct');
                 }
                 if (buttonAnswer === selectedAnswer && buttonAnswer !== qData.answer) {
                     button.style.backgroundColor = 'var(--incorrect-color)';
                     button.style.color = '#fff';
                     button.classList.add('incorrect');
                 }
             });
             feedbackEl.textContent = selectedAnswer === qData.answer ? "נכון!" : "לא נכון.";
             feedbackEl.className = `feedback ${selectedAnswer === qData.answer ? 'correct' : 'incorrect'}`;
             explanationEl.textContent = `הסבר: ${qData.explanation}`;
             explanationEl.classList.remove('hidden');
        }
        
        function displayAllTF() {
             if (!tfData || tfData.length === 0) return;
             tfSingleView.classList.add('hidden');
             tfAllQuestionsContainer.innerHTML = '';
             tfData.forEach((qData, index) => {
                 const questionDiv = document.createElement('div');
                 questionDiv.className = 'question-container-all';
                 questionDiv.innerHTML = `
                     <div class="question-text">${index + 1}. ${qData.question}</div>
                     <div class="tf-options">
                         <button data-qindex="${index}" data-answer="true">נכון</button>
                         <button data-qindex="${index}" data-answer="false">לא נכון</button>
                     </div>
                     <div class="feedback hidden"></div>
                     <div class="explanation hidden"></div>
                 `;
                 tfAllQuestionsContainer.appendChild(questionDiv);
                 const optionButtons = questionDiv.querySelectorAll('.tf-options button');
                 optionButtons.forEach(button => {
                     button.onclick = () => {
                         const qIndex = parseInt(button.dataset.qindex);
                         const selectedAnswer = button.dataset.answer === 'true';
                         if (tfAnswers[qIndex] === null) {
                             const isCorrect = selectedAnswer === tfData[qIndex].answer;
                             tfAnswers[qIndex] = { selected: selectedAnswer, correct: isCorrect };
                         }
                         const optionsDiv = button.closest('.tf-options');
                         const feedbackDiv = questionDiv.querySelector('.feedback');
                         const explanationDiv = questionDiv.querySelector('.explanation');
                         highlightTFAnswer(optionsDiv, feedbackDiv, explanationDiv, qIndex, tfAnswers[qIndex].selected);
                     };
                 });
                 if (tfAnswers[index] !== null) {
                    const optionsDiv = questionDiv.querySelector('.tf-options');
                    const feedbackDiv = questionDiv.querySelector('.feedback');
                    const explanationDiv = questionDiv.querySelector('.explanation');
                    highlightTFAnswer(optionsDiv, feedbackDiv, explanationDiv, index, tfAnswers[index].selected);
                 }
             });
             tfAllQuestionsContainer.classList.remove('hidden');
        }

        function initialize() {
            if (flashcardData.length > 0) displayCard(currentCardIndex);
            if (mcqData.length > 0) displayMCQuestion(currentMCQIndex);
            if (tfData.length > 0) displayTFQuestion(currentTFIndex);
            flashcardContent.addEventListener('click', flipCard);
            prevCardBtn.addEventListener('click', () => { if (currentCardIndex > 0) { currentCardIndex--; displayCard(currentCardIndex); } });
            nextCardBtn.addEventListener('click', () => { if (currentCardIndex < flashcardData.length - 1) { currentCardIndex++; displayCard(currentCardIndex); } });
            prevMCQBtn.addEventListener('click', () => { if (currentMCQIndex > 0) { currentMCQIndex--; displayMCQuestion(currentMCQIndex); } });
            nextMCQBtn.addEventListener('click', () => { if (currentMCQIndex < mcqData.length - 1) { currentMCQIndex++; displayMCQuestion(currentMCQIndex); } });
            viewAllMCQBtn.addEventListener('click', displayAllMCQ);
            prevTFBtn.addEventListener('click', () => { if (currentTFIndex > 0) { currentTFIndex--; displayTFQuestion(currentTFIndex); } });
            nextTFBtn.addEventListener('click', () => { if (currentTFIndex < tfData.length - 1) { currentTFIndex++; displayTFQuestion(currentTFIndex); } });
            viewAllTFBtn.addEventListener('click', displayAllTF);
        }
        
        initialize();
    });
    </script>
</body>
</html>
