<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Study Tool</title>
    <style>
        /* --- Root Variables for Consistent Theming --- */
        :root {
            --primary-bg: #333333;
            --secondary-bg: #666666;
            --accent-color: #3D90D7;
            --text-color: #E0E0E0;
            --correct-color: #4CAF50;
            --incorrect-color: #F44336;
            --card-bg: #5a5a5a;
        }

        /* --- Global Styles --- */
        body {
            background-color: var(--primary-bg);
            color: var(--text-color);
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 90%; /* As per prompt */
            margin: 20px auto;
            padding: 20px;
            background-color: var(--secondary-bg);
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        h1, h2 {
            color: var(--accent-color);
            text-align: center;
            border-bottom: 1px solid var(--accent-color);
            padding-bottom: 10px;
        }

        .section {
            background-color: var(--primary-bg);
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 8px;
        }

        /* --- Study Cards Styling (Fade Animation) --- */
        .flashcard-container {
            height: 250px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #flashcard-content {
            width: 100%;
            height: 100%;
            background-color: var(--card-bg);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            transition: opacity 0.3s ease-in-out; /* Fade transition */
        }
        
        .flashcard-front-style {
             font-size: 1.5em;
             font-weight: bold;
        }
        
        .flashcard-back-style {
             font-size: 1.1em;
        }

        /* --- Questions Styling (MCQ & T/F) --- */
         .question-container-single, .question-container-all {
            margin-bottom: 15px;
            padding: 15px;
            border: 1px solid var(--secondary-bg);
            border-radius: 5px;
         }

        .question-text {
            font-weight: bold;
            margin-bottom: 15px;
        }

        .options button, .tf-options button {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-align: right;
            transition: background-color 0.3s;
        }

        .options button:hover:not(:disabled), .tf-options button:hover:not(:disabled) {
            background-color: #357ab8;
        }

        .options button:disabled, .tf-options button:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
        
        /* Specific styling to override disabled opacity for correct/incorrect answers */
        .options button.correct, .tf-options button.correct { opacity: 1; }
        .options button.incorrect, .tf-options button.incorrect { opacity: 1; }


        .feedback {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
        }

        .feedback.correct {
            background-color: var(--correct-color);
            color: #fff;
        }

        .feedback.incorrect {
            background-color: var(--incorrect-color);
            color: #fff;
        }

        .explanation {
            margin-top: 10px;
            font-style: italic;
            font-size: 0.9em;
            padding: 8px;
            background-color: var(--secondary-bg);
            border-radius: 4px;
        }

        /* --- Navigation & Utility Styling --- */
        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            margin-bottom: 10px;
        }

        .nav-button, .view-all-button {
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
        }

        .nav-button:disabled {
             opacity: 0.5;
             cursor: not-allowed;
        }

        .counter {
            font-size: 0.9em;
        }

        .view-all-container {
            text-align: center;
            margin-top: 15px;
            margin-bottom: 15px;
        }

        .hidden {
            display: none;
        }

        #mcq-all-questions .question-container-all,
        #tf-all-questions .question-container-all {
            margin-bottom: 20px;
        }

    </style>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
    <div class="container">
        <h1>טקסונומיה ומיקרוביולוגיה של מזון</h1>

        <!-- Study Cards Section -->
        <div class="section">
            <h2>כרטיסי לימוד</h2>
            <div class="flashcard-container">
                <div id="flashcard-content"></div>
            </div>
            <div class="navigation">
                <button class="nav-button" id="prev-card">הקודם</button>
                <span class="counter" id="card-counter"></span>
                <button class="nav-button" id="next-card">הבא</button>
            </div>
        </div>

        <!-- Multiple Choice Questions Section -->
        <div class="section">
            <h2>שאלות רב-ברירה (אמריקאיות)</h2>
            <div id="mcq-single-view">
                <div class="question-container-single" id="mcq-container">
                    <div class="question-text" id="mcq-question"></div>
                    <div class="options" id="mcq-options"></div>
                    <div class="feedback hidden" id="mcq-feedback"></div>
                    <div class="explanation hidden" id="mcq-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-mcq">הקודם</button>
                    <span class="counter" id="mcq-counter"></span>
                    <button class="nav-button" id="next-mcq">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-mcq">הצג את כל השאלות</button>
                 </div>
            </div>
            <div id="mcq-all-questions" class="hidden">
                <!-- All MCQs will be dynamically inserted here -->
            </div>
        </div>

        <!-- True/False Questions Section -->
        <div class="section">
            <h2>שאלות נכון/לא נכון</h2>
             <div id="tf-single-view">
                <div class="question-container-single" id="tf-container">
                    <div class="question-text" id="tf-question"></div>
                    <div class="tf-options" id="tf-options">
                        <button data-answer="true">נכון</button>
                        <button data-answer="false">לא נכון</button>
                    </div>
                    <div class="feedback hidden" id="tf-feedback"></div>
                    <div class="explanation hidden" id="tf-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-tf">הקודם</button>
                    <span class="counter" id="tf-counter"></span>
                    <button class="nav-button" id="next-tf">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-tf">הצג את כל השאלות</button>
                 </div>
            </div>
             <div id="tf-all-questions" class="hidden">
                 <!-- All T/F Questions will be dynamically inserted here -->
             </div>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        
        const flashcardData = [
            { term: "טקסונומיה", definition: "תחום מדע המאפשר לזהות שייכות וקירבה של אורגניזמים ובכך ללמוד עליהם על סמך מינים קרובים" },
            { term: "הגדרת מין במיקרוביולוגיה", definition: "הבחנה המתבססת בעיקר על דמיון בתכונות ובגנום ולא על יכולת רבייה מינית" },
            { term: "שיום בינומי", definition: "שיטה למתן שמות מדעיים המורכבת משם הסוג ושם המין של האורגניזם" },
            { term: "פריונים", definition: "גורמי מחלה המורכבים מחלבון בלבד ואינם נחשבים לאורגניזמים שלמים" },
            { term: "העברה פקאלית אוראלית", definition: "מנגנון הדבקה נפוץ של וירוסים במזון העובר דרך מים מזון וידיים מזוהמות אל מערכת העיכול" },
            { term: "קוקים (Cocci)", definition: "חיידקים בעלי צורה כדורית המהווים קריטריון מורפולוגי לסיווג" },
            { term: "בצילוס (Bacilli)", definition: "חיידקים בעלי צורה מתגית המשמשים כבסיס לסיווג מורפולוגי" },
            { term: "ויבריו (Vibrio)", definition: "חיידקים בעלי צורה כפופה או פסיקית" },
            { term: "פרוטוזואה", definition: "טפילים אאוקריוטים חד תאיים העלולים לזהם מזון ולגרום למחלות" },
            { term: "אנטאמבה היסטוליטיקה", definition: "פרוטוזואה הגורמת לדיזנטריה העלולה לחדור לזרם הדם ולפגוע בכבד ובמוח" },
            { term: "טריכינלה", definition: "סוג של תולעת טפילה הנפוצה בעיקר בבשר חזיר וניתנת לזיהוי ברקמת השריר" },
            { term: "בדיקת PCR", definition: "שיטה מולקולרית המשמשת לזיהוי וירוסים במזון באמצעות איתור חומר גנטי" },
            { term: "בדיקה סרולוגית", definition: "אבחון המבוסס על איתור נוגדנים ספציפיים במים במזון או בצואת החולה" },
            { term: "אצות חד תאיות", definition: "קבוצה של מיקרואורגניזמים אאוקריוטיים היכולים להימצא במזון" },
            { term: "מדריך ברגי (Bergey)", definition: "המדריך המקיף לסיווג וטקסונומיה של חיידקים המבוסס על תכונות וגנום" }
        ];

        const mcqData = [
            { question: "איזה מהמשפטים הבאים מתאר בצורה המדויקת ביותר את ההבדל בהגדרת מין בין בעלי חיים לחיידקים?", options: ["בבעלי חיים ההגדרה מבוססת על דמיון גנומי בעוד שבחיידקים על יכולת רבייה מינית", "בבעלי חיים ההגדרה מתבססת על יכולת העמדת צאצאים פוריים בעוד שבחיידקים היא מבוססת על דמיון בתכונות ובגנום", "אין הבדל ושתי הקבוצות מוגדרות על סמך סטריליות של היברידים", "חיידקים מוגדרים על פי מורפולוגיה בלבד ובעלי חיים על פי גנטיקה"], correctIndex: 1, explanation: "בניגוד לבעלי חיים שבהם מין מוגדר על ידי יכולת רבייה מינית והעמדת צאצאים פוריים במיקרוביולוגיה ההבחנה מתבססת על קבוצות בעלות קווים של תכונות דומות וגנום דומה" },
            { question: "על פי כללי הטקסונומיה כיצד נכתב שמו המדעי המלא של אורגניזם?", options: ["שם המין תחילה ואחריו שם המשפחה", "שם המחלקה תחילה ואחריה שם הסוג", "שם הסוג תחילה ואחריו שם המין", "שם הממלכה תחילה ואחריה שם המין"], correctIndex: 2, explanation: "מין האורגניזם מצוין תמיד על ידי צירוף של שם הסוג ולאחריו שם המין" },
            { question: "איזה מהגורמים הבאים אינו משמש כקריטריון לסיווג חיידקים?", options: ["דרישות חמצן", "צביעת גראם", "יכולת יצירת היברידים סטריליים", "מאפיינים אימונולוגיים"], correctIndex: 2, explanation: "יכולת יצירת היברידים סטריליים היא מאפיין של בעלי חיים מורכבים ולא של חיידקים המתרבים ברבייה אל מינית" },
            { question: "מהו המאפיין הייחודי של פריונים בהשוואה לשאר גורמי המחלה המועברים במזון?", options: ["הם מכילים חומר גנטי מסוג רנא בלבד", "הם מורכבים מחלבון בלבד ואינם נחשבים לאורגניזם", "הם עמידים לחלוטין בפני כל טיפול תרמי", "הם תוקפים רק תאים פרוקריוטיים"], correctIndex: 1, explanation: "פריונים הם חלבונים פגומים הגורמים למחלה ואינם מכילים חומר גנטי לכן אינם מוגדרים כאורגניזם" },
            { question: "מדוע קשה במיוחד למנוע התפשטות של וירוסים במזון בזמן אפידמיה?", options: ["מכיוון שהם מתרבים במהירות בתוך המזון עצמו לפני האכילה", "בשל רגישותם הגבוהה וקושי בניטורם בסביבה ובמזון", "משום שהם אינם מגיבים לשום סוג של חיטוי כימי", "כי הם מועברים אך ורק דרך האוויר ולא דרך מגע"], correctIndex: 1, explanation: "וירוסים קשים לניטור ברגישות גבוהה מה שמקשה על זיהוי מוקדם ומניעת התפשטותם בזמן התפרצות" },
            { question: "מהי הדרך היעילה ביותר לנטרל וירוסים המועברים במזון?", options: ["הקפאה עמוקה לתקופה ממושכת", "טיפול בחום ובישול יסודי", "הוספת אנטיביוטיקה למזון", "שטיפה במים קרים בלבד"], correctIndex: 1, explanation: "הרגישות של וירוסים במזון לחום הופכת את תהליך הבישול לדרך היעילה ביותר למניעת הדבקה" },
            { question: "איזו מהקבוצות הבאות אינה נחשבת למיקרואורגניזם אאוקריוטי המצוי במזון?", options: ["תולעים", "פרוטוזואה", "וירוסים", "אצות חד תאיות"], correctIndex: 2, explanation: "וירוסים אינם נחשבים לאאוקריוטים או פרוקריוטים הם ישויות ביולוגיות נפרדות שאינן בנויות מתאים" },
            { question: "מטופל מגיע למרפאה עם כאבי בטן עזים לאחר שאכל בשר חזיר נא בבדיקת רקמת שריר נמצאו טפילים מאיזה סוג סביר להניח שהמטופל סובל?", options: ["וירוס מסוג רוטה", "תולעת מסוג טריכינלה", "חיידק מסוג בצילוס", "פרוטוזואה מסוג אנטאמבה"], correctIndex: 1, explanation: "תולעי טריכינלה נפוצות בבשר חזירים וניתן לזהות את הפגיעה שלהן ולראותן בתוך רקמת שריר" },
            { question: "מדוע מטפלים בזיהומי פרוטוזואה באמצעות אנטיביוטיקות ייחודיות ולא באנטיביוטיקה רגילה לחיידקים?", options: ["מכיוון שפרוטוזואה הם וירוסים חסרי דופן תא", "משום שפרוטוזואה הם אורגניזמים אאוקריוטיים בעלי מבנה תאי שונה מחיידקים", "כי פרוטוזואה מורכבים מחלבון בלבד", "מפני שפרוטוזואה עמידים לחלוטין לכל חומר כימי"], correctIndex: 1, explanation: "פרוטוזואה הם טפילים אאוקריוטים ולכן נדרשות תרופות ייחודיות הפוגעות במנגנונים אאוקריוטיים ספציפיים מבלי לפגוע בתאי המאכסן" },
            { question: "מהי הסכנה המרכזית בנשאות לא מטופלת של אנטאמבה היסטוליטיקה?", options: ["התפתחות של דלקת קרום המוח ויראלית", "חדירה לזרם הדם ופגיעה באיברים פנימיים כמו הכבד והמוח", "הפיכת הטפיל לפריון עמיד לחום", "פגיעה בלתי הפיכה במערכת הנשימה העליונה"], correctIndex: 1, explanation: "אם הטפיל אינו מטופל הוא עלול לעבור מהמעי לזרם הדם להגיע לכבד ולעיתים אף למוח ולגרום למוות" },
            { question: "כיצד משפיעה אוכלוסיית חיידקי המעי על נשאות של טפילי פרוטוזואה?", options: ["היא מחסלת אותם באופן מיידי ומונעת הדבקה לחלוטין", "נמצא כי הרכב חיידקי המעי משפיע על רמת הנשאות והשגשוג של הטפיל", "חיידקי המעי הופכים לטפילים בעצמם בנוכחות הפרוטוזואה", "אין שום קשר בין חיידקי המעי לבין הדבקה בפרוטוזואה"], correctIndex: 1, explanation: "מחקרים מראים כי הרכב המיקרוביום חיידקי המעי משפיע על האופן שבו המאכסן נושא את הטפיל ועל חומרת הסימפטומים" },
            { question: "מהו אחוז האינפקציות המועברות במזון שנגרמות על ידי וירוסים?", options: ["פחות מ עשרה אחוזים", "כ שלושים אחוזים", "סביב חמישים אחוזים", "מעל שבעים אחוזים"], correctIndex: 3, explanation: "וירוסים אחראים למספר עצום של אינפקציות המועברות במזון המוערך בלמעלה מ ($70\\%$)" },

        function displayCard(index) {
            if (!flashcardData || flashcardData.length === 0) return;
            const cardData = flashcardData[index];
            isCardFront = true;
            flashcardContent.style.opacity = '1';
            flashcardContent.textContent = cardData.term;
            flashcardContent.className = 'flashcard-front-style';
            cardCounter.textContent = `כרטיס ${index + 1} / ${flashcardData.length}`;
            prevCardBtn.disabled = index === 0;
            nextCardBtn.disabled = index === flashcardData.length - 1;
            
            if (window.MathJax) {
                MathJax.typesetPromise([flashcardContent]);
            }
        }

        function flipCard() {
            if (isCardAnimating || !flashcardData || flashcardData.length === 0) return;
            isCardAnimating = true;
            flashcardContent.style.opacity = '0';
            setTimeout(() => {
                isCardFront = !isCardFront;
                const cardData = flashcardData[currentCardIndex];
                if (isCardFront) {
                    flashcardContent.textContent = cardData.term;
                    flashcardContent.className = 'flashcard-front-style';
                } else {
                    flashcardContent.textContent = cardData.definition;
                    flashcardContent.className = 'flashcard-back-style';
                }
                flashcardContent.style.opacity = '1';
                isCardAnimating = false;
                
                if (window.MathJax) {
                    MathJax.typesetPromise([flashcardContent]);
                }
            }, 300);
        }

        function displayMCQuestion(index) {
            if (!mcqData || mcqData.length === 0) return;
            const qData = mcqData[index];
            mcqQuestion.textContent = qData.question;
            mcqOptions.innerHTML = '';
            mcqFeedback.classList.add('hidden');
            mcqExplanation.classList.add('hidden');
            qData.options.forEach((option, i) => {
                const button = document.createElement('button');
                button.textContent = option;
                button.onclick = () => handleMCQAnswer(index, i);
                mcqOptions.appendChild(button);
            });
            mcqCounter.textContent = `שאלה ${index + 1} / ${mcqData.length}`;
            prevMCQBtn.disabled = index === 0;
            nextMCQBtn.disabled = index === mcqData.length - 1;
            if (mcqAnswers[index] !== null) {
                highlightMCQAnswer(mcqOptions, mcqFeedback, mcqExplanation, index, mcqAnswers[index].selected);
            }
            
            if (window.MathJax) {
                MathJax.typesetPromise([mcqQuestion, mcqOptions, mcqExplanation]);
            }
        }

        function handleMCQAnswer(qIndex, selectedIndex) {
            if (mcqAnswers[qIndex] !== null) return;
            const isCorrect = selectedIndex === mcqData[qIndex].correctIndex;
            mcqAnswers[qIndex] = { selected: selectedIndex, correct: isCorrect };
            highlightMCQAnswer(mcqOptions, mcqFeedback, mcqExplanation, qIndex, selectedIndex);
        }
        
        function highlightMCQAnswer(optionsContainer, feedbackEl, explanationEl, qIndex, selectedIndex) {
            const qData = mcqData[qIndex];
            const buttons = optionsContainer.querySelectorAll('button');
            buttons.forEach((button, i) => {
                button.disabled = true;
                if (i === qData.correctIndex) {
                    button.style.backgroundColor = 'var(--correct-color)';
                    button.style.color = '#fff';
                    button.classList.add('correct');
                }
                if (i === selectedIndex && i !== qData.correctIndex) {
                    button.style.backgroundColor = 'var(--incorrect-color)';
                    button.style.color = '#fff';
                    button.classList.add('incorrect');
                }
            });
            feedbackEl.textContent = selectedIndex === qData.correctIndex ? "נכון!" : "לא נכון.";
            feedbackEl.className = `feedback ${selectedIndex === qData.correctIndex ? 'correct' : 'incorrect'}`;
            explanationEl.textContent = `הסבר: ${qData.explanation}`;
            explanationEl.classList.remove('hidden');
            
            if (window.MathJax) {
                MathJax.typesetPromise([explanationEl]);
            }
        }

                questionDiv.innerHTML = `

                `;
                mcqAllQuestionsContainer.appendChild(questionDiv);
                 const optionButtons = questionDiv.querySelectorAll('.options button');
                 optionButtons.forEach(button => {
                     button.onclick = () => {

                            const isCorrect = oIndex === mcqData[qIndex].correctIndex;
                            mcqAnswers[qIndex] = { selected: oIndex, correct: isCorrect };
                        }
                        const optionsDiv = button.closest('.options');
                        const feedbackDiv = questionDiv.querySelector('.feedback');
                        const explanationDiv = questionDiv.querySelector('.explanation');
                        highlightMCQAnswer(optionsDiv, feedbackDiv, explanationDiv, qIndex, mcqAnswers[qIndex].selected);
                     };

                 if (mcqAnswers[index] !== null) {

        }

        function initialize() {
            if (flashcardData.length > 0) displayCard(currentCardIndex);
            if (mcqData.length > 0) displayMCQuestion(currentMCQIndex);
            if (tfData.length > 0) displayTFQuestion(currentTFIndex);
            flashcardContent.addEventListener('click', flipCard);
            prevCardBtn.addEventListener('click', () => { if (currentCardIndex > 0) { currentCardIndex--; displayCard(currentCardIndex); } });
            nextCardBtn.addEventListener('click', () => { if (currentCardIndex < flashcardData.length - 1) { currentCardIndex++; displayCard(currentCardIndex); } });
            prevMCQBtn.addEventListener('click', () => { if (currentMCQIndex > 0) { currentMCQIndex--; displayMCQuestion(currentMCQIndex); } });
            nextMCQBtn.addEventListener('click', () => { if (currentMCQIndex < mcqData.length - 1) { currentMCQIndex++; displayMCQuestion(currentMCQIndex); } });
            viewAllMCQBtn.addEventListener('click', displayAllMCQ);
            prevTFBtn.addEventListener('click', () => { if (currentTFIndex > 0) { currentTFIndex--; displayTFQuestion(currentTFIndex); } });
            nextTFBtn.addEventListener('click', () => { if (currentTFIndex < tfData.length - 1) { currentTFIndex++; displayTFQuestion(currentTFIndex); } });
            viewAllTFBtn.addEventListener('click', displayAllTF);
        }
        
        initialize();
    });
    </script>
</body>
</html>
