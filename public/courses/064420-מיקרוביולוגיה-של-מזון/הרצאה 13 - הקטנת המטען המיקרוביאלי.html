<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Study Tool</title>
    <style>
        /* --- Root Variables for Consistent Theming --- */
        :root {
            --primary-bg: #333333;
            --secondary-bg: #666666;
            --accent-color: #3D90D7;
            --text-color: #E0E0E0;
            --correct-color: #4CAF50;
            --incorrect-color: #F44336;
            --card-bg: #5a5a5a;
        }

        /* --- Global Styles --- */
        body {
            background-color: var(--primary-bg);
            color: var(--text-color);
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 90%; /* As per prompt */
            margin: 20px auto;
            padding: 20px;
            background-color: var(--secondary-bg);
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        h1, h2 {
            color: var(--accent-color);
            text-align: center;
            border-bottom: 1px solid var(--accent-color);
            padding-bottom: 10px;
        }

        .section {
            background-color: var(--primary-bg);
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 8px;
        }

        /* --- Study Cards Styling (Fade Animation) --- */
        .flashcard-container {
            height: 250px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #flashcard-content {
            width: 100%;
            height: 100%;
            background-color: var(--card-bg);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            transition: opacity 0.3s ease-in-out; /* Fade transition */
        }
        
        .flashcard-front-style {
             font-size: 1.5em;
             font-weight: bold;
        }
        
        .flashcard-back-style {
             font-size: 1.1em;
        }

        /* --- Questions Styling (MCQ & T/F) --- */
         .question-container-single, .question-container-all {
            margin-bottom: 15px;
            padding: 15px;
            border: 1px solid var(--secondary-bg);
            border-radius: 5px;
         }

        .question-text {
            font-weight: bold;
            margin-bottom: 15px;
        }

        .options button, .tf-options button {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-align: right;
            transition: background-color 0.3s;
        }

        .options button:hover:not(:disabled), .tf-options button:hover:not(:disabled) {
            background-color: #357ab8;
        }

        .options button:disabled, .tf-options button:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
        
        /* Specific styling to override disabled opacity for correct/incorrect answers */
        .options button.correct, .tf-options button.correct { opacity: 1; }
        .options button.incorrect, .tf-options button.incorrect { opacity: 1; }


        .feedback {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
        }

        .feedback.correct {
            background-color: var(--correct-color);
            color: #fff;
        }

        .feedback.incorrect {
            background-color: var(--incorrect-color);
            color: #fff;
        }

        .explanation {
            margin-top: 10px;
            font-style: italic;
            font-size: 0.9em;
            padding: 8px;
            background-color: var(--secondary-bg);
            border-radius: 4px;
        }

        /* --- Navigation & Utility Styling --- */
        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            margin-bottom: 10px;
        }

        .nav-button, .view-all-button {
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
        }

        .nav-button:disabled {
             opacity: 0.5;
             cursor: not-allowed;
        }

        .counter {
            font-size: 0.9em;
        }

        .view-all-container {
            text-align: center;
            margin-top: 15px;
            margin-bottom: 15px;
        }

        .hidden {
            display: none;
        }

        #mcq-all-questions .question-container-all,
        #tf-all-questions .question-container-all {
            margin-bottom: 20px;
        }

    </style>
    <!-- MathJax for rendering math equations -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
    <div class="container">
        <h1>הקטנת המטען המיקרוביאלי בתעשיית המזון</h1>

        <!-- Study Cards Section -->
        <div class="section">
            <h2>כרטיסי לימוד</h2>
            <div class="flashcard-container">
                <div id="flashcard-content"></div>
            </div>
            <div class="navigation">
                <button class="nav-button" id="prev-card">הקודם</button>
                <span class="counter" id="card-counter"></span>
                <button class="nav-button" id="next-card">הבא</button>
            </div>
        </div>

        <!-- Multiple Choice Questions Section -->
        <div class="section">
            <h2>שאלות רב-ברירה (אמריקאיות)</h2>
            <div id="mcq-single-view">
                <div class="question-container-single" id="mcq-container">
                    <div class="question-text" id="mcq-question"></div>
                    <div class="options" id="mcq-options"></div>
                    <div class="feedback hidden" id="mcq-feedback"></div>
                    <div class="explanation hidden" id="mcq-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-mcq">הקודם</button>
                    <span class="counter" id="mcq-counter"></span>
                    <button class="nav-button" id="next-mcq">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-mcq">הצג את כל השאלות</button>
                 </div>
            </div>
            <div id="mcq-all-questions" class="hidden">
                <!-- All MCQs will be dynamically inserted here -->
            </div>
        </div>

        <!-- True/False Questions Section -->
        <div class="section">
            <h2>שאלות נכון/לא נכון</h2>
             <div id="tf-single-view">
                <div class="question-container-single" id="tf-container">
                    <div class="question-text" id="tf-question"></div>
                    <div class="tf-options" id="tf-options">
                        <button data-answer="true">נכון</button>
                        <button data-answer="false">לא נכון</button>
                    </div>
                    <div class="feedback hidden" id="tf-feedback"></div>
                    <div class="explanation hidden" id="tf-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-tf">הקודם</button>
                    <span class="counter" id="tf-counter"></span>
                    <button class="nav-button" id="next-tf">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-tf">הצג את כל השאלות</button>
                 </div>
            </div>
             <div id="tf-all-questions" class="hidden">
                 <!-- All T/F Questions will be dynamically inserted here -->
             </div>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        
        const flashcardData = [
            { term: "מניעת זיהום", definition: "גישה להקטנת המטען המיקרוביאלי הכוללת סניטציה ועבודה אספטית כדי למנוע כניסת מיקרואורגניזמים למוצר." },
            { term: "הרחקת זיהום", definition: "סילוק או השמדה של מיקרואורגניזמים שכבר נמצאים במוצר, באמצעות שטיפה, קילוף, פיסטור או סטרליזציה." },
            { term: "שימור", definition: "עיכוב הגידול של מיקרואורגניזמים במזון על ידי שינוי תנאים פנימיים או חיצוניים." },
            { term: "חללים מתים", definition: "אזורים במערך הייצור שקשה לנקותם, בהם עלולים להצטבר מיקרואורגניזמים ולהוות מקור זיהום מתמשך." },
            { term: "גורמים פנימיים", definition: "תכונות של המוצר עצמו המשפיעות על גידול מיקרוביאלי, כגון חומציות, פעילות מים, פוטנציאל חמצון-חיזור וערך תזונתי." },
            { term: "גורמים חיצוניים", definition: "תנאי הסביבה בהם נשמר המוצר, כגון טמפרטורת אחסון, לחות הסביבה והרכב הגזים." },
            { term: "פעילות מים", definition: "היחס בין לחץ אדי המים בתמיסת המוצר ללחץ אדים של מים נקיים באותה טמפרטורה, מסומן כמודל ($a_w$)." },
            { term: "פוטנציאל חמצון-חיזור", definition: "מדד לנטיית הסביבה למסור או לקבל אלקטרונים, מסומן כמודל ($Eh$), המשפיע על סוג המיקרואורגניזמים שיתפתחו." },
            { term: "שלב ההשהיה", definition: "פרק הזמן שלוקח למיקרואורגניזמים להסתגל לסביבה חדשה לפני תחילת התרבות מואצת, מתארך בתנאי חומציות נמוכה." },
            { term: "לחץ אוסמוטי", definition: "עקה הנוצרת עקב ריכוז גבוה של מומסים כמו מלח או סוכר, הגורמת לירידה בפעילות המים." },
            { term: "ביופילם", definition: "שכבת מגן שמיקרואורגניזמים עשויים לייצר כתגובה ללחץ סביבתי, המקשה על הרחקתם." },
            { term: "מפל פוטנציאלים מברנלי", definition: "הפרש מתחים על פני קרום התא החיוני ליצירת אנרגיה, אשר עלול להיפגע משינויים בחומציות הסביבה." },
            { term: "דקרבוקסילאזות", definition: "אנזימים המפרקים חומצות אמינו ומשחררים אמינים, תהליך התורם להעלאת רמת החומציות בסביבה." },
            { term: "מידור שלבים", definition: "הפרדה פיזית או תהליכית בין שלבי ייצור שונים כדי למנוע זיהום צולב במפעל המזון." },
            { term: "עבודה אספטית", definition: "שיטות עבודה שנועדו למנוע חדירת מיקרואורגניזמים לסביבת העבודה ולמוצר במהלך תהליך הייצור." }
        ];

        const mcqData = [
            { question: "איזה מהאמצעים הבאים נחשב לשיטה של הרחקת זיהום ולא למניעת זיהום?", options: ["הקפדה על עבודה אספטית", "ביצוע סניטציה בסביבת המפעל", "פיסטור המוצר", "מידור שלבי הייצור"], correctIndex: 2, explanation: "פיסטור פועל על מיקרואורגניזמים שכבר נמצאים במוצר כדי לסלקם, ולכן הוא מוגדר כהרחקת זיהום, בעוד סניטציה, מידור ועבודה אספטית נועדו למנוע את הגעתם מראש." },
            { question: "כיצד משפיעה ירידה בערך ה- ($pH$) על עקומת הגידול של מיקרואורגניזמים?", options: ["מקצרת את שלב ההשהיה ומאיצה את קצב הגידול", "מאריכה את שלב ההשהיה ומאיטה את קצב הגידול", "עוצרת את הגידול לחלוטין ללא קשר לסוג המיקרואורגניזם", "גורמת למעבר מיידי לשלב התמותה"], correctIndex: 1, explanation: "בסביבה בעלת חומציות נמוכה, למיקרואורגניזמים לוקח זמן רב יותר להסתגל, מה שמאריך את שלב ההשהיה ומאט את קצב הגידול הכללי." },
            { question: "מהי ההשפעה של חללים מתים במערך הייצור על בטיחות המזון?", options: ["הם מאפשרים קירור מהיר יותר של המוצר", "הם מהווים מוקד להצטברות מיקרואורגניזמים שקשה לנקות", "הם מסייעים בהפרדה בין אצוות שונות", "הם מעלים את פוטנציאל החמצון-חיזור של המוצר"], correctIndex: 1, explanation: "חללים מתים הם אזורים במכשור או בצנרת שאינם נשטפים היטב, ולכן מצטברים בהם מזהמים המהווים מקור זיהום מתמשך." },
            { question: "איזה מהגורמים הבאים מוגדר כגורם חיצוני המשפיע על גידול מיקרוביאלי?", options: ["פעילות מים", "פוטנציאל חמצון-חיזור", "הרכב הגזים בסביבה", "מרכיבים אנטי-מיקרוביאליים במוצר"], correctIndex: 2, explanation: "הרכב הגזים מתייחס לסביבה שבה המזון מאוחסן, ולכן הוא גורם חיצוני, בעוד השאר הם תכונות פנימיות של המזון עצמו." },
            { question: "מהו הקשר המתמטי בין פעילות מים למודל ($RH$) לחות יחסית?", options: ["הלחות היחסית שווה לפעילות המים חלקי מאה", "הלחות היחסית שווה לפעילות המים כפול מאה", "הלחות היחסית שווה לפעילות המים בחזקת שתיים", "אין קשר ישיר בין המדדים"], correctIndex: 1, explanation: "הנוסחה המגדירה את הקשר היא שהלחות היחסית שווה למאה כפול פעילות המים." },
            { question: "מהי התגובה הפיזיולוגית של מיקרואורגניזמים ללחץ אוסמוטי גבוה?", options: ["פירוק דפנות התא כדי להשוות ריכוזים", "צבירת מומסים בתוך התא ליצירת איזון אוסמוטי", "העלאת פעילות המים בסביבה החיצונית", "הפחתת ייצור פולי-סוכרים"], correctIndex: 1, explanation: "כדי להתמודד עם סביבה עתירת מלח או סוכר, מיקרואורגניזמים צוברים מומסים בתא כדי למנוע יציאת מים מהתא אל הסביבה." },
            { question: "איזה מהתהליכים הבאים יגרום להעלאת רמת ה- ($pH$) בסביבה?", options: ["חיזור חומצה בוטירית לבוטנול", "יצירת חומצת חלב מתסיסת סוכרים", "פירוק אויריאה לאמוניה", "הוספת מלח בישול למוצר"], correctIndex: 2, explanation: "פירוק אויריאה לאמוניה משחרר בסיס לסביבה, מה שגורם לעלייה ברמת החומציות, כלומר העלאת ערך ה- ($pH$)." },
            { question: "מדוע תהליכי עיבוד במפעל עלולים להגביר את רגישות המוצר לקלקול מיקרוביאלי?", options: ["מפני שהם תמיד מעלים את פעילות המים של המוצר", "מפני שהם פוגעים בהגנה הטבעית ובמבנה הביולוגי של חומר הגלם", "מפני שהם מחסלים את כל המיקרופלורה הטבעית", "מפני שהם מורידים את הערך התזונתי של המזון"], correctIndex: 1, explanation: "תהליכי עיבוד כמו חיתוך, קילוף או חימום עלולים להרוס את המעטפת החיצונית והמבנה התאי שמגינים באופן טבעי על המזון מפני חדירת מזהמים." },
            { question: "מה מאפיין את רמת פעילות המים ברוב המוצרים הטריים?", options: ["היא נמוכה מ- 0.6", "היא נעה סביב 0.85", "היא גבוהה מ- 0.99", "היא שווה בדיוק ל- 1.0"], correctIndex: 2, explanation: "במוצרים טריים שלא עברו ייבוש או המלחה, פעילות המים קרובה מאוד לזו של מים טהורים והיא לרוב מעל 0.99." },
            { question: "איזו קבוצת מיקרואורגניזמים מסוגלת בדרך כלל להתפתח בערכי פעילות מים הנמוכים ביותר?", options: ["חיידקים גראם שליליים", "שמרים אוסמופיליים", "חיידקי קלקול רגילים", "חיידקים הלופיליים"], correctIndex: 1, explanation: "שמרים אוסמופיליים ועובשים קסרופיליים מסוגלים לגדול בערכי פעילות מים נמוכים במיוחד, סביב 0.61, בעוד חיידקים דורשים ערכים גבוהים יותר." },
            { question: "כיצד חיידק מסוג קלוסטרידיום אצטובוטיליקום משפיע על סביבתו?", options: ["הוא מפרק חומצות אמינו ומעלה את החומציות", "הוא מחזר חומצה בוטירית לבוטנול ובכך מעלה את ה- ($pH$)", "הוא מייצר אמוניה שגורמת לירידה ב- ($pH$)", "הוא מגדיל את מפל הפוטנציאלים הממברנלי"], correctIndex: 1, explanation: "החיידק ממיר חומצה לתרוכובת כוהלית, תהליך שמפחית את כמות החומצה בסביבה ולכן תורם לעלייה בערך ה- ($pH$)." },

                 button.style.color = '';
                 button.classList.remove('correct', 'incorrect');
                 button.onclick = () => handleTFAnswer(index, button.dataset.answer === 'true');
             });
            tfCounter.textContent = `שאלה ${index + 1} / ${tfData.length}`;
            prevTFBtn.disabled = index === 0;
            nextTFBtn.disabled = index === tfData.length - 1;
            if (tfAnswers[index] !== null) {
                highlightTFAnswer(tfOptionsContainer, tfFeedback, tfExplanation, index, tfAnswers[index].selected);
            }
            if(window.MathJax) MathJax.typesetPromise([tfQuestion]);
        }
        
        function handleTFAnswer(qIndex, selectedAnswer) {
            if (tfAnswers[qIndex] !== null) return;
            const isCorrect = selectedAnswer === tfData[qIndex].answer;
            tfAnswers[qIndex] = { selected: selectedAnswer, correct: isCorrect };
            highlightTFAnswer(tfOptionsContainer, tfFeedback, tfExplanation, qIndex, selectedAnswer);
        }
        
        function highlightTFAnswer(optionsContainer, feedbackEl, explanationEl, qIndex, selectedAnswer) {
             const qData = tfData[qIndex];
             const buttons = optionsContainer.querySelectorAll('button');
             buttons.forEach(button => {
                 const buttonAnswer = button.dataset.answer === 'true';
                 button.disabled = true;
                 if (buttonAnswer === qData.answer) {
                     button.style.backgroundColor = 'var(--correct-color)';
                     button.style.color = '#fff';
                     button.classList.add('correct');
                 }
                 if (buttonAnswer === selectedAnswer && buttonAnswer !== qData.answer) {
                     button.style.backgroundColor = 'var(--incorrect-color)';
                     button.style.color = '#fff';
                     button.classList.add('incorrect');
                 }
             });
             feedbackEl.textContent = selectedAnswer === qData.answer ? "נכון!" : "לא נכון.";
             feedbackEl.className = `feedback ${selectedAnswer === qData.answer ? 'correct' : 'incorrect'}`;
             explanationEl.textContent = `הסבר: ${qData.explanation}`;
             explanationEl.classList.remove('hidden');
             if(window.MathJax) MathJax.typesetPromise([explanationEl]);
        }
        
        function displayAllTF() {
             if (!tfData || tfData.length === 0) return;
             tfSingleView.classList.add('hidden');
             tfAllQuestionsContainer.innerHTML = '';
             tfData.forEach((qData, index) => {
                 const questionDiv = document.createElement('div');
                 questionDiv.className = 'question-container-all';
                 questionDiv.innerHTML = `
                     <div class="question-text">${index + 1}. ${qData.question}</div>
                     <div class="tf-options">
                         <button data-qindex="${index}" data-answer="true">נכון</button>
                         <button data-qindex="${index}" data-answer="false">לא נכון</button>
                     </div>
                     <div class="feedback hidden"></div>
                     <div class="explanation hidden"></div>
                 `;
                 tfAllQuestionsContainer.appendChild(questionDiv);
                 const optionButtons = questionDiv.querySelectorAll('.tf-options button');
                 optionButtons.forEach(button => {
                     button.onclick = () => {
                         const qIndex = parseInt(button.dataset.qindex);
                         const selectedAnswer = button.dataset.answer === 'true';
                         if (tfAnswers[qIndex] === null) {
                             const isCorrect = selectedAnswer === tfData[qIndex].answer;
                             tfAnswers[qIndex] = { selected: selectedAnswer, correct: isCorrect };
                         }
                         const optionsDiv = button.closest('.tf-options');
                         const feedbackDiv = questionDiv.querySelector('.feedback');
                         const explanationDiv = questionDiv.querySelector('.explanation');
                         highlightTFAnswer(optionsDiv, feedbackDiv, explanationDiv, qIndex, tfAnswers[qIndex].selected);
                     };
                 });
                 if (tfAnswers[index] !== null) {
                    const optionsDiv = questionDiv.querySelector('.tf-options');
                    const feedbackDiv = questionDiv.querySelector('.feedback');
                    const explanationDiv = questionDiv.querySelector('.explanation');
                    highlightTFAnswer(optionsDiv, feedbackDiv, explanationDiv, index, tfAnswers[index].selected);
                 }
             });
             tfAllQuestionsContainer.classList.remove('hidden');
             if(window.MathJax) MathJax.typesetPromise([tfAllQuestionsContainer]);
        }

        function initialize() {
            if (flashcardData.length > 0) displayCard(currentCardIndex);
            if (mcqData.length > 0) displayMCQuestion(currentMCQIndex);
            if (tfData.length > 0) displayTFQuestion(currentTFIndex);
            flashcardContent.addEventListener('click', flipCard);
            prevCardBtn.addEventListener('click', () => { if (currentCardIndex > 0) { currentCardIndex--; displayCard(currentCardIndex); } });
            nextCardBtn.addEventListener('click', () => { if (currentCardIndex < flashcardData.length - 1) { currentCardIndex++; displayCard(currentCardIndex); } });
            prevMCQBtn.addEventListener('click', () => { if (currentMCQIndex > 0) { currentMCQIndex--; displayMCQuestion(currentMCQIndex); } });
            nextMCQBtn.addEventListener('click', () => { if (currentMCQIndex < mcqData.length - 1) { currentMCQIndex++; displayMCQuestion(currentMCQIndex); } });
            viewAllMCQBtn.addEventListener('click', displayAllMCQ);
            prevTFBtn.addEventListener('click', () => { if (currentTFIndex > 0) { currentTFIndex--; displayTFQuestion(currentTFIndex); } });
            nextTFBtn.addEventListener('click', () => { if (currentTFIndex < tfData.length - 1) { currentTFIndex++; displayTFQuestion(currentTFIndex); } });
            viewAllTFBtn.addEventListener('click', displayAllTF);
        }
        
        initialize();
    });
    </script>
</body>
</html>
