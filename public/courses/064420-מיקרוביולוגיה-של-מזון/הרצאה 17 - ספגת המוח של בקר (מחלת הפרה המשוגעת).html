<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Study Tool</title>
    <style>
        /* --- Root Variables for Consistent Theming --- */
        :root {
            --primary-bg: #333333;
            --secondary-bg: #666666;
            --accent-color: #3D90D7;
            --text-color: #E0E0E0;
            --correct-color: #4CAF50;
            --incorrect-color: #F44336;
            --card-bg: #5a5a5a;
        }

        /* --- Global Styles --- */
        body {
            background-color: var(--primary-bg);
            color: var(--text-color);
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 90%; /* As per prompt */
            margin: 20px auto;
            padding: 20px;
            background-color: var(--secondary-bg);
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        h1, h2 {
            color: var(--accent-color);
            text-align: center;
            border-bottom: 1px solid var(--accent-color);
            padding-bottom: 10px;
        }

        .section {
            background-color: var(--primary-bg);
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 8px;
        }

        /* --- Study Cards Styling (Fade Animation) --- */
        .flashcard-container {
            height: 250px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #flashcard-content {
            width: 100%;
            height: 100%;
            background-color: var(--card-bg);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            transition: opacity 0.3s ease-in-out; /* Fade transition */
        }
        
        .flashcard-front-style {
             font-size: 1.5em;
             font-weight: bold;
        }
        
        .flashcard-back-style {
             font-size: 1.1em;
        }

        /* --- Questions Styling (MCQ & T/F) --- */
         .question-container-single, .question-container-all {
            margin-bottom: 15px;
            padding: 15px;
            border: 1px solid var(--secondary-bg);
            border-radius: 5px;
         }

        .question-text {
            font-weight: bold;
            margin-bottom: 15px;
        }

        .options button, .tf-options button {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-align: right;
            transition: background-color 0.3s;
        }

        .options button:hover:not(:disabled), .tf-options button:hover:not(:disabled) {
            background-color: #357ab8;
        }

        .options button:disabled, .tf-options button:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
        
        /* Specific styling to override disabled opacity for correct/incorrect answers */
        .options button.correct, .tf-options button.correct { opacity: 1; }
        .options button.incorrect, .tf-options button.incorrect { opacity: 1; }


        .feedback {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
        }

        .feedback.correct {
            background-color: var(--correct-color);
            color: #fff;
        }

        .feedback.incorrect {
            background-color: var(--incorrect-color);
            color: #fff;
        }

        .explanation {
            margin-top: 10px;
            font-style: italic;
            font-size: 0.9em;
            padding: 8px;
            background-color: var(--secondary-bg);
            border-radius: 4px;
        }

        /* --- Navigation & Utility Styling --- */
        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            margin-bottom: 10px;
        }

        .nav-button, .view-all-button {
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
        }

        .nav-button:disabled {
             opacity: 0.5;
             cursor: not-allowed;
        }

        .counter {
            font-size: 0.9em;
        }

        .view-all-container {
            text-align: center;
            margin-top: 15px;
            margin-bottom: 15px;
        }

        .hidden {
            display: none;
        }

        #mcq-all-questions .question-container-all,
        #tf-all-questions .question-container-all {
            margin-bottom: 20px;
        }

    </style>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
    <div class="container">
        <h1>מחלות פריונים: ספגת המוח של הבקר והאדם</h1>

        <!-- Study Cards Section -->
        <div class="section">
            <h2>כרטיסי לימוד</h2>
            <div class="flashcard-container">
                <div id="flashcard-content"></div>
            </div>
            <div class="navigation">
                <button class="nav-button" id="prev-card">הקודם</button>
                <span class="counter" id="card-counter"></span>
                <button class="nav-button" id="next-card">הבא</button>
            </div>
        </div>

        <!-- Multiple Choice Questions Section -->
        <div class="section">
            <h2>שאלות רב-ברירה (אמריקאיות)</h2>
            <div id="mcq-single-view">
                <div class="question-container-single" id="mcq-container">
                    <div class="question-text" id="mcq-question"></div>
                    <div class="options" id="mcq-options"></div>
                    <div class="feedback hidden" id="mcq-feedback"></div>
                    <div class="explanation hidden" id="mcq-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-mcq">הקודם</button>
                    <span class="counter" id="mcq-counter"></span>
                    <button class="nav-button" id="next-mcq">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-mcq">הצג את כל השאלות</button>
                 </div>
            </div>
            <div id="mcq-all-questions" class="hidden">
                <!-- All MCQs will be dynamically inserted here -->
            </div>
        </div>

        <!-- True/False Questions Section -->
        <div class="section">
            <h2>שאלות נכון/לא נכון</h2>
             <div id="tf-single-view">
                <div class="question-container-single" id="tf-container">
                    <div class="question-text" id="tf-question"></div>
                    <div class="tf-options" id="tf-options">
                        <button data-answer="true">נכון</button>
                        <button data-answer="false">לא נכון</button>
                    </div>
                    <div class="feedback hidden" id="tf-feedback"></div>
                    <div class="explanation hidden" id="tf-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-tf">הקודם</button>
                    <span class="counter" id="tf-counter"></span>
                    <button class="nav-button" id="next-tf">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-tf">הצג את כל השאלות</button>
                 </div>
            </div>
             <div id="tf-all-questions" class="hidden">
                 <!-- All T/F Questions will be dynamically inserted here -->
             </div>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        
        const flashcardData = [
            { term: "Prion", definition: "חלקיק חלבוני זיהומי המעביר מידע וגורם למחלה ללא מעורבות של חומצת גרעין, בניגוד לדוגמה המרכזית בביולוגיה." },
            { term: "BSE", definition: "ספגת המוח של הבקר, הידועה גם כמחלת הפרה המשוגעת. מחלת פריונים הפוגעת בבקר." },
            { term: "Scrapie", definition: "מחלת פריונים המופיעה באופן טבעי ואנדמי בכבשים ועיזים, מוכרת למעלה מ-200 שנה." },
            { term: "vCJD", definition: "וריאנט של מחלת קרויצפלד-יעקב. מחלת פריונים אנושית חדשה שהופיעה ב-1996 בעקבות מגיפת ה-BSE בבקר." },
            { term: "Central Dogma", definition: "הכלל הביולוגי לפיו מידע עובר מ-DNA ל-RNA ולחלבון. פריונים מפרים כלל זה מכיוון שהם מעבירים מידע באמצעות חלבון בלבד." },
            { term: "Meat-and-bone meal", definition: "תערובת בשר ועצמות ששימשה כמקור חלבון במזון בקר, ונחשבת לגורם המרכזי בהפצת מחלת ה-BSE." },
            { term: "Spongiform Pathology", definition: "ממצא היסטולוגי אופייני למחלות פריונים, בו מופיעות חללים (וואקואולות) ברקמת המוח המכילות שברי ממברנות." },
            { term: "$PrP^C$", definition: "חלבון הפריון התקין של המארח. חלבון זה רגיש לפירוק על ידי אנזימים מסוג פרוטאזות." },
            { term: "$PrP^{Sc}$", definition: "הצורה הפתולוגית של חלבון הפריון. מקופל בצורה לא תקינה, עמיד לפרוטאזות ומצטבר במערכת העצבים המרכזית." },
            { term: "Proteinase K", definition: "אנזים מפרק חלבונים המשמש במעבדה. חלבון פריון תקין יפורק על ידו, בעוד שהצורה הפתולוגית תישאר עמידה וניתנת לזיהוי." },
            { term: "Gut-associated lymphoid tissue", definition: "רקמת הלימפה המקושרת למעי. מהווה תחנת מעבר לפריון לאחר הדבקה אוראלית, לפני הגעתו למערכת העצבים המרכזית." },
            { term: "Kuru", definition: "מחלת פריונים שהתגלתה בקרב בני אדם בשבטים בפפואה גינאה החדשה." },
            { term: "Species Barrier", definition: "מחסום ביולוגי בין מינים שונים. הופעת ה-vCJD הוכיחה שמחסום זה אינו מספיק כדי להגן על בני אדם מפריונים של בקר." },
            { term: "ASO", definition: "אוליגонуקלאוטידים אנטי-סנס. כלי ריפוי גני הנקשר ל-mRNA של הפריון וגורם לפירוקו על ידי RNase H." },
            { term: "RNAi / siRNA", definition: "מנגנון השתקת גנים המשתמש ב-RNA דו-גדילי קצר כדי לגרום לחיתוך ה-mRNA של הפריון באמצעות קומפלקס RISC." },
            { term: "Incubation time", definition: "זמן הדגירה של מחלות פריונים הוא ארוך מאוד, מה שגרם לחרדה בקרב מיליוני אנשים שנחשפו למזון נגוע." },
            { term: "Transgenic mice", definition: "עכברים המבטאים חלבון פריון אנושי, ומשמשים במחקרי מעבדה לבדיקת פוטנציאל ההדבקה הבין-מינית של פריונים." },
            { term: "Neurodegenerative diseases", definition: "קבוצת מחלות הכוללת את מחלות הפריונים, המאופיינות בהצטברות חלבונים ושקיעתם, ולרובן אין כיום תרופה יעילה." }
        ];

        const mcqData = [
            {
                question: "מהי הסיבה המרכזית לכך שגילוי הפריונים זיכה את סטנלי פרוזינר בפרס נובל?",
                options: [
                    "הוא גילה נגיף חדש העמיד לחלוטין בפני אנטיביוטיקה",
                    "הוא הוכיח שניתן להעביר אינפורמציה ביולוגית וזיהומית באמצעות חלבון בלבד, בניגוד לדוגמה המרכזית",
                    "הוא פיתח חיסון מבוסס RNA למניעת מחלת הפרה המשוגעת בבקר",
                    "הוא זיהה את הרצף הגנטי של ה-DNA האחראי למחלת קרויצפלד-יעקב"
                ],
                correctIndex: 1,
                explanation: "הפריונים מפרים את הדוגמה המרכזית של הביולוגיה מכיוון שהם חלקיקים חלבוניים זיהומיים ללא חומצת גרעין המעבירים אינפורמציה."
            },
            {
                question: "כיצד תרם השימוש במזון המבוסס על קמח בשר ועצמות להתפשטות מחלת ה-BSE?",
                options: [
                    "המזון הכיל רעלנים כימיים שפגעו במערכת העצבים של הבקר",
                    "המזון הכיל שאריות של חיות נגועות בפריונים, מה שיצר מעגל הדבקה אוראלי בקרב הבקר",
                    "המזון גרם למוטציה גנטית ספונטנית ב-DNA של הבקר שניזון ממנו",
                    "המזון החליש את מערכת החיסון של הבקר וחשף אותו לחיידקי מעיים"
                ],
                correctIndex: 1,
                explanation: "הפרקטיקה של האכלת בקר בחלבון שמקורו בשאריות של חיות אחרות (כולל חיות נגועות) היא המנגנון העיקרי להפצת מחלת ה-BSE."
            },
            {
                question: "מה ניתן להסיק מהופעת מחלת ה-vCJD בבני אדם בשנת 1996?",
                options: [
                    "שמחלות פריונים בבני אדם נגרמות אך ורק ממוטציות תורשתיות",
                    "שמחסום המינים אינו מספק הגנה מוחלטת מפני הדבקה בפריונים ממקור חיה",
                    "שמחלת ה-Scrapie של כבשים עברה ישירות לבני אדם ללא תיווך של בקר",
                    "שבישול בטמפרטורות גבוהות מצליח לנטרל פריונים רק בחלק מהמקרים"
                ],
                correctIndex: 1,
                explanation: "הופעת ה-vCJD בעקבות מגיפת ה-BSE בבקר סיפקה עדות חותכת להעברה בין-מינית, והוכיחה שמחסום המינים אינו מגן על בני אדם."
            },
            {
                question: "בבדיקת מעבדה להמצאות פריונים, דוגמת חלבון מטופלת באנזים פרוטאינז K. לאחר הטיפול, מזוהה חלבון באמצעות נוגדן. מה מעידה נוכחות החלבון לאחר הטיפול באנזים?",
                options: [
                    "הדוגמה מכילה רק את חלבון הפריון התקין",
                    "האנזים לא פעל כראוי עקב טמפרטורה נמוכה",
                    "הדוגמה מכילה את חלבון הפריון הפתולוגי, העמיד לפירוק אנזימטי",
                    "הדוגמה נלקחה מרקמת מעי ולא מרקמת מוח"
                ],
                correctIndex: 2,
                explanation: "החלבון התקין רגיש לפרוטאזות ומתפרק, בעוד שהחלבון הפתולוגי מקופל בצורה שמקנה לו עמידות לפרוטאינז K, ולכן זיהויו לאחר הטיפול מעיד על נוכחות מחלה."
            },
            {
                question: "איזה מהתהליכים הבאים מתאר נכונה את מסלול ההדבקה האוראלית של BSE בבקר?",
                options: [
                    "ספיגה בקיבה, מעבר למחזור הדם, והגעה ישירה למוח",
                    "הדבקה במעי, מעבר לרקמת לימפה מקושרת מעי, ומשם התפשטות למערכת העצבים המרכזית",
                    "הדבקה בחלל הפה, מעבר לעצב הריח, ומשם לאונות הקדמיות במוח",
                    "ספיגה במעי הדק, אגירה בכבד, ושחרור איטי לחוט השדרה"
                ],
                correctIndex: 1,
                explanation: "ההבנה הנוכחית היא שהזיהום מתחיל במעי, עובר לרקמת הלימפה המקושרת למעי, ומשם מוצא את דרכו למערכת העצבים המרכזית."
            },
            {
                question: "מדוע הופעת מחלת ה-BSE הובילה לחרדה ציבורית כה רחבה באירופה, למרות שמספר החולים ההתחלתי היה נמוך?",
                options: [
                    "מפני שהמחלה פגעה באופן מיידי באוכלוסיית הילדים",
                    "בגלל זמן הדגירה הממושך, שיצר חשש שמיליוני צרכנים שכבר נחשפו למזון נגוע יפתחו את המחלה בעתיד",
                    "מכיוון שהמחלה עברה בקלות מאדם לאדם באוויר",
                    "משום שהמחלה גרמה למוות מיידי של כל בקר שנחשף אליה תוך ימים ספורים"
                ],
                correctIndex: 1,
                explanation: "מחלות פריונים מתאפיינות בזמן דגירה ארוך מאוד. ההערכה שמעל מיליון פרות נגועות נכנסו לשרשרת המזון יצרה פחד מהתפרצות עתידית המונית."
            },
            {
                question: "בביופסיית מוח של חולה קרויצפלד-יעקב ספורדי, איזה ממצא היסטולוגי יהיה המובהק ביותר?",
                options: [
                    "הסננה מסיבית של תאי דם לבנים לרקמת המוח",
                    "נוכחות של חיידקים תוך-תאיים בתוך נוירונים",
                    "וואקואולות תוך-ציטופלזמיות המכילות שברי ממברנות, המקנות מראה ספוגי",
                    "התעבות של קרומי המוח החיצוניים ללא פגיעה ברקמה הפנימית"
                ],
                correctIndex: 2,
                explanation: "הפתולוגיה האופיינית למחלות פריונים היא צורה ספוגית המאופיינת בוואקואולות ציטופלזמיות המכילות שברי ולולאות ממברנות."
            },
            {
                question: "מהו ההבדל המבני המרכזי בין חלבון הפריון התקין לחלבון הפריון גורם המחלה?",
                options: [
                    "לחלבון הפתולוגי חסרות 50 חומצות אמינו בקצה החלבוני",
                    "החלבון התקין מכיל חומצת גרעין מסוג RNA בעוד הפתולוגי אינו מכיל",
                    "ההבדל טמון אך ורק בקיפול המרחבי של החלבון",
                    "החלבון הפתולוגי מיוצר על ידי ריבוזומים שונים מאלו המייצרים את החלבון התקין"
                ],
                correctIndex: 2,
                explanation: "ההמרה של החלבון התקין לחלבון הפתולוגי היא שינוי קונפורמטיבי (מבני) בלבד, ללא שינוי ברצף חומצות האמינו."
            },
            {

                explanation: "אין כיום תרופה יעילה למחלות ניוון עצבי, ואנטיביוטיקה פועלת נגד חיידקים, לא נגד חלבונים פגומים."
            },
            {
                question: "זנים לא טיפוסיים של המחלה, כגון L-BSE או CWD, הראו פוטנציאל להדביק בני אדם בניסויי מעבדה.",
                answer: true,
                explanation: "ניסויים בפרימטים ובעכברים טרנסגניים הראו שלזנים אלו יש פוטנציאל להדבקה אנושית."
            },
            {
                question: "האסטרטגיה המרכזית למניעת מחלת הפרה המשוגעת כללה זיהוי והשמדה של חיות נגועות ואיסור על שימוש באיברים מסוימים למאכל.",
                answer: true,
                explanation: "זהו הבסיס לתוכנית המניעה המוצלחת שהופעלה באירופה."
            },
            {
                question: "חלבון הפריון הפתולוגי מסיס מאוד במים, מה שמאפשר לו לנוע בקלות בזרם הדם.",
                answer: false,
                explanation: "החלבון הפתולוגי מאבד את מסיסותו, מצטבר כשוקע (אגרגטים ופיברילים) ואינו מסיס."
            },
            {
                question: "מערכות הפירוק של התא, כגון פרוטאזום ואוטופאגיה, מצליחות לסלק את הפריונים הפתולוגיים ולמנוע את המחלה באנשים בריאים.",
                answer: false,
                explanation: "למרות שמערכות אלו קיימות, במקרה של פריונים פתולוגיים הן כושלות והחלבונים ממשיכים להצטבר לגופיפי הסגר."
            },
            {
                question: "האנזים RNase H מעורב במנגנון הפעולה של תרופות מבוססות ASO על ידי חיתוך מולקולת ה-DNA של המארח.",
                answer: false,
                explanation: "האנזים מתערב על ידי חיתוך ה-mRNA (ההטרו-דופלקס של ASO ו-mRNA), ולא את ה-DNA."
            },
            {
                question: "המונח 'העברת אינפורמציה על ידי חלבון' סותר את ההבנה הקלאסית שגורמי מחלה זיהומיים חייבים להכיל חומר תורשתי.",
                answer: true,
                explanation: "זו הסיבה המרכזית לכך שגילוי הפריונים היה מהפכני וזיכה את פרוזינר בפרס נובל."
            },
            {
                question: "הופעת ה-vCJD באדם התרחשה במקביל למגיפת ה-BSE בבקר, ללא קשר סיבתי ביניהן.",
                answer: false,
                explanation: "מחלת ה-vCJD באדם הופיעה בעקבות ולנוכח מגיפת ה-BSE בבקר, ויש ביניהן קשר סיבתי ישיר של העברה בין-מינית."
            },
            {
                question: "מחלת קרויצפלד-יעקב יכולה להופיע גם באופן ספורדי וגם כתורשתית גנטית, בנוסף להדבקה חיצונית.",
                answer: true,
                explanation: "מוזכרות מחלות פריונים גנטיות תורשתיות וכן הופעה ספורדית של קרויצפלד-יעקב."
            },
            {
                question: "חוקרים משתמשים בנוגדנים בשיטת Western blot כדי לזהות נוכחות של חומצות גרעין של פריונים.",
                answer: false,
                explanation: "הנוגדנים ב-Western blot משמשים לזיהוי חלבון הפריון עצמו (לאחר טיפול בפרוטאינז), ולא חומצות גרעין, שאינן קיימות בפריון."
            },
            {
                question: "מניעת אכילת מוחות ואיברים פנימיים של בקר הייתה אחת הדרכים היעילות לעצירת התפשטות המחלה לבני אדם.",
                answer: true,
                explanation: "איסור זה היה חלק קריטי באסטרטגיית המניעה, שכן הפריונים מצטברים בעיקר במערכת העצבים המרכזית."
            },
            {
                question: "במהלך הצטברות הפריונים, המונומרים המקופלים שלא כהלכה הופכים ישירות לתא סרטני.",
                answer: false,
                explanation: "המונומרים מתחברים לאוליגומרים ואז לפיברילים ששוקעים, מה שמוביל למוות תאי וניוון עצבי, לא לסרטן."
            },
            {
                question: "מחסום המינים (Species barrier) התברר כהגנה מוחלטת שמנעה לחלוטין העברת פריונים מחיות לאדם.",
                answer: false,
                explanation: "הופעת ה-vCJD הוכיחה שמחסום המינים אינו הגנה מוחלטת והוא נפרץ על ידי פריון ה-BSE."
            }
        ];


        // --- Global State Variables ---
        let currentCardIndex = 0;
        let isCardFront = true;
        let isCardAnimating = false;
        let currentMCQIndex = 0;
        let currentTFIndex = 0;
        let mcqAnswers = new Array(mcqData.length).fill(null);
        let tfAnswers = new Array(tfData.length).fill(null);

        // --- DOM Element References ---
        const flashcardContent = document.getElementById('flashcard-content');
        const cardCounter = document.getElementById('card-counter');
        const prevCardBtn = document.getElementById('prev-card');
        const nextCardBtn = document.getElementById('next-card');
        const mcqQuestion = document.getElementById('mcq-question');
        const mcqOptions = document.getElementById('mcq-options');
        const mcqFeedback = document.getElementById('mcq-feedback');
        const mcqExplanation = document.getElementById('mcq-explanation');
        const mcqCounter = document.getElementById('mcq-counter');
        const prevMCQBtn = document.getElementById('prev-mcq');
        const nextMCQBtn = document.getElementById('next-mcq');
        const viewAllMCQBtn = document.getElementById('view-all-mcq');
        const mcqSingleView = document.getElementById('mcq-single-view');
        const mcqAllQuestionsContainer = document.getElementById('mcq-all-questions');
        const tfQuestion = document.getElementById('tf-question');
        const tfOptionsContainer = document.getElementById('tf-options');
        const tfFeedback = document.getElementById('tf-feedback');
        const tfExplanation = document.getElementById('tf-explanation');
        const tfCounter = document.getElementById('tf-counter');
        const prevTFBtn = document.getElementById('prev-tf');
        const nextTFBtn = document.getElementById('next-tf');
        const viewAllTFBtn = document.getElementById('view-all-tf');
        const tfSingleView = document.getElementById('tf-single-view');
        const tfAllQuestionsContainer = document.getElementById('tf-all-questions');

        function displayCard(index) {
            if (!flashcardData || flashcardData.length === 0) return;
            const cardData = flashcardData[index];
            isCardFront = true;
            flashcardContent.style.opacity = '1';
            flashcardContent.textContent = cardData.term;
            flashcardContent.className = 'flashcard-front-style';
            cardCounter.textContent = `כרטיס ${index + 1} / ${flashcardData.length}`;
            prevCardBtn.disabled = index === 0;
            nextCardBtn.disabled = index === flashcardData.length - 1;
            
            // Re-render MathJax
            if (window.MathJax) {
                MathJax.typesetPromise([flashcardContent]);
            }
        }

        function flipCard() {
            if (isCardAnimating || !flashcardData || flashcardData.length === 0) return;
            isCardAnimating = true;
            flashcardContent.style.opacity = '0';
            setTimeout(() => {
                isCardFront = !isCardFront;
                const cardData = flashcardData[currentCardIndex];
                if (isCardFront) {
                    flashcardContent.textContent = cardData.term;
                    flashcardContent.className = 'flashcard-front-style';
                } else {
                    flashcardContent.textContent = cardData.definition;
                    flashcardContent.className = 'flashcard-back-style';
                }
                flashcardContent.style.opacity = '1';
                isCardAnimating = false;
                
                // Re-render MathJax
                if (window.MathJax) {
                    MathJax.typesetPromise([flashcardContent]);
                }
            }, 300);
        }

        function displayMCQuestion(index) {
            if (!mcqData || mcqData.length === 0) return;
            const qData = mcqData[index];
            mcqQuestion.textContent = qData.question;
            mcqOptions.innerHTML = '';
            mcqFeedback.classList.add('hidden');
            mcqExplanation.classList.add('hidden');
            qData.options.forEach((option, i) => {
                const button = document.createElement('button');
                button.textContent = option;
                button.onclick = () => handleMCQAnswer(index, i);
                mcqOptions.appendChild(button);
            });
            mcqCounter.textContent = `שאלה ${index + 1} / ${mcqData.length}`;
            prevMCQBtn.disabled = index === 0;
            nextMCQBtn.disabled = index === mcqData.length - 1;
            if (mcqAnswers[index] !== null) {
                highlightMCQAnswer(mcqOptions, mcqFeedback, mcqExplanation, index, mcqAnswers[index].selected);
            }
            
            // Re-render MathJax
            if (window.MathJax) {
                MathJax.typesetPromise([mcqQuestion, mcqOptions]);
            }
        }

        function handleMCQAnswer(qIndex, selectedIndex) {
            if (mcqAnswers[qIndex] !== null) return;
            const isCorrect = selectedIndex === mcqData[qIndex].correctIndex;
            mcqAnswers[qIndex] = { selected: selectedIndex, correct: isCorrect };
            highlightMCQAnswer(mcqOptions, mcqFeedback, mcqExplanation, qIndex, selectedIndex);
        }
        
        function highlightMCQAnswer(optionsContainer, feedbackEl, explanationEl, qIndex, selectedIndex) {
            const qData = mcqData[qIndex];
            const buttons = optionsContainer.querySelectorAll('button');
            buttons.forEach((button, i) => {
                button.disabled = true;
                if (i === qData.correctIndex) {
                    button.style.backgroundColor = 'var(--correct-color)';
                    button.style.color = '#fff';
                    button.classList.add('correct');
                }
                if (i === selectedIndex && i !== qData.correctIndex) {
                    button.style.backgroundColor = 'var(--incorrect-color)';
                    button.style.color = '#fff';
                    button.classList.add('incorrect');
                }
            });
            feedbackEl.textContent = selectedIndex === qData.correctIndex ? "נכון!" : "לא נכון.";
            feedbackEl.className = `feedback ${selectedIndex === qData.correctIndex ? 'correct' : 'incorrect'}`;
            explanationEl.textContent = `הסבר: ${qData.explanation}`;
            explanationEl.classList.remove('hidden');
            
            if (window.MathJax) {
                MathJax.typesetPromise([explanationEl]);
            }
        }

        function displayAllMCQ() {
            if (!mcqData || mcqData.length === 0) return;
            mcqSingleView.classList.add('hidden');
            mcqAllQuestionsContainer.innerHTML = ''; 
            mcqData.forEach((qData, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question-container-all';
                questionDiv.innerHTML = `
                    <div class="question-text">${index + 1}. ${qData.question}</div>
                    <div class="options">
                        ${qData.options.map((option, i) => `<button data-qindex="${index}" data-oindex="${i}">${option}</button>`).join('')}
                    </div>
                    <div class="feedback hidden"></div>
                    <div class="explanation hidden"></div>
                `;
                mcqAllQuestionsContainer.appendChild(questionDiv);
                 const optionButtons = questionDiv.querySelectorAll('.options button');
                 optionButtons.forEach(button => {
                     button.onclick = () => {
                        const qIndex = parseInt(button.dataset.qindex);
                        const oIndex = parseInt(button.dataset.oindex);
                        if (mcqAnswers[qIndex] === null) {
                            const isCorrect = oIndex === mcqData[qIndex].correctIndex;
                            mcqAnswers[qIndex] = { selected: oIndex, correct: isCorrect };
                        }
                        const optionsDiv = button.closest('.options');
                        const feedbackDiv = questionDiv.querySelector('.feedback');
                        const explanationDiv = questionDiv.querySelector('.explanation');
                        highlightMCQAnswer(optionsDiv, feedbackDiv, explanationDiv, qIndex, mcqAnswers[qIndex].selected);
                     };
                 });
                 if (mcqAnswers[index] !== null) {
                    const optionsDiv = questionDiv.querySelector('.options');
                    const feedbackDiv = questionDiv.querySelector('.feedback');
                    const explanationDiv = questionDiv.querySelector('.explanation');
                    highlightMCQAnswer(optionsDiv, feedbackDiv, explanationDiv, index, mcqAnswers[index].selected);
                 }
            });
            mcqAllQuestionsContainer.classList.remove('hidden');
            if (window.MathJax) {
                MathJax.typesetPromise([mcqAllQuestionsContainer]);
            }
        }

        function displayTFQuestion(index) {
            if (!tfData || tfData.length === 0) return;
            const qData = tfData[index];
            tfQuestion.textContent = qData.question;
            tfFeedback.classList.add('hidden');
            tfExplanation.classList.add('hidden');
             const buttons = tfOptionsContainer.querySelectorAll('button');
             buttons.forEach(button => {
                 button.disabled = false;
                 button.style.backgroundColor = '';
                 button.style.color = '';
                 button.classList.remove('correct', 'incorrect');
                 button.onclick = () => handleTFAnswer(index, button.dataset.answer === 'true');
             });
            tfCounter.textContent = `שאלה ${index + 1} / ${tfData.length}`;
            prevTFBtn.disabled = index === 0;
            nextTFBtn.disabled = index === tfData.length - 1;
            if (tfAnswers[index] !== null) {
                highlightTFAnswer(tfOptionsContainer, tfFeedback, tfExplanation, index, tfAnswers[index].selected);
            }
            if (window.MathJax) {
                MathJax.typesetPromise([tfQuestion]);
            }
        }
        
        function handleTFAnswer(qIndex, selectedAnswer) {
            if (tfAnswers[qIndex] !== null) return;
            const isCorrect = selectedAnswer === tfData[qIndex].answer;
            tfAnswers[qIndex] = { selected: selectedAnswer, correct: isCorrect };
            highlightTFAnswer(tfOptionsContainer, tfFeedback, tfExplanation, qIndex, selectedAnswer);
        }
        
        function highlightTFAnswer(optionsContainer, feedbackEl, explanationEl, qIndex, selectedAnswer) {
             const qData = tfData[qIndex];
             const buttons = optionsContainer.querySelectorAll('button');
             buttons.forEach(button => {
                 const buttonAnswer = button.dataset.answer === 'true';
                 button.disabled = true;
                 if (buttonAnswer === qData.answer) {
                     button.style.backgroundColor = 'var(--correct-color)';
                     button.style.color = '#fff';
                     button.classList.add('correct');
                 }
                 if (buttonAnswer === selectedAnswer && buttonAnswer !== qData.answer) {
                     button.style.backgroundColor = 'var(--incorrect-color)';
                     button.style.color = '#fff';
                     button.classList.add('incorrect');
                 }
             });
             feedbackEl.textContent = selectedAnswer === qData.answer ? "נכון!" : "לא נכון.";
             feedbackEl.className = `feedback ${selectedAnswer === qData.answer ? 'correct' : 'incorrect'}`;
             explanationEl.textContent = `הסבר: ${qData.explanation}`;
             explanationEl.classList.remove('hidden');
             if (window.MathJax) {
                MathJax.typesetPromise([explanationEl]);
            }
        }
        
        function displayAllTF() {
             if (!tfData || tfData.length === 0) return;
             tfSingleView.classList.add('hidden');
             tfAllQuestionsContainer.innerHTML = '';
             tfData.forEach((qData, index) => {
                 const questionDiv = document.createElement('div');
                 questionDiv.className = 'question-container-all';
                 questionDiv.innerHTML = `
                     <div class="question-text">${index + 1}. ${qData.question}</div>
                     <div class="tf-options">
                         <button data-qindex="${index}" data-answer="true">נכון</button>
                         <button data-qindex="${index}" data-answer="false">לא נכון</button>
                     </div>
                     <div class="feedback hidden"></div>
                     <div class="explanation hidden"></div>
                 `;
                 tfAllQuestionsContainer.appendChild(questionDiv);
                 const optionButtons = questionDiv.querySelectorAll('.tf-options button');
                 optionButtons.forEach(button => {
                     button.onclick = () => {
                         const qIndex = parseInt(button.dataset.qindex);
                         const selectedAnswer = button.dataset.answer === 'true';
                         if (tfAnswers[qIndex] === null) {
                             const isCorrect = selectedAnswer === tfData[qIndex].answer;
                             tfAnswers[qIndex] = { selected: selectedAnswer, correct: isCorrect };
                         }
                         const optionsDiv = button.closest('.tf-options');
                         const feedbackDiv = questionDiv.querySelector('.feedback');
                         const explanationDiv = questionDiv.querySelector('.explanation');
                         highlightTFAnswer(optionsDiv, feedbackDiv, explanationDiv, qIndex, tfAnswers[qIndex].selected);
                     };
                 });
                 if (tfAnswers[index] !== null) {
                    const optionsDiv = questionDiv.querySelector('.tf-options');
                    const feedbackDiv = questionDiv.querySelector('.feedback');
                    const explanationDiv = questionDiv.querySelector('.explanation');
                    highlightTFAnswer(optionsDiv, feedbackDiv, explanationDiv, index, tfAnswers[index].selected);
                 }
             });
             tfAllQuestionsContainer.classList.remove('hidden');
             if (window.MathJax) {
                MathJax.typesetPromise([tfAllQuestionsContainer]);
            }
        }

        function initialize() {
            if (flashcardData.length > 0) displayCard(currentCardIndex);
            if (mcqData.length > 0) displayMCQuestion(currentMCQIndex);
            if (tfData.length > 0) displayTFQuestion(currentTFIndex);
            flashcardContent.addEventListener('click', flipCard);
            prevCardBtn.addEventListener('click', () => { if (currentCardIndex > 0) { currentCardIndex--; displayCard(currentCardIndex); } });
            nextCardBtn.addEventListener('click', () => { if (currentCardIndex < flashcardData.length - 1) { currentCardIndex++; displayCard(currentCardIndex); } });
            prevMCQBtn.addEventListener('click', () => { if (currentMCQIndex > 0) { currentMCQIndex--; displayMCQuestion(currentMCQIndex); } });
            nextMCQBtn.addEventListener('click', () => { if (currentMCQIndex < mcqData.length - 1) { currentMCQIndex++; displayMCQuestion(currentMCQIndex); } });
            viewAllMCQBtn.addEventListener('click', displayAllMCQ);
            prevTFBtn.addEventListener('click', () => { if (currentTFIndex > 0) { currentTFIndex--; displayTFQuestion(currentTFIndex); } });
            nextTFBtn.addEventListener('click', () => { if (currentTFIndex < tfData.length - 1) { currentTFIndex++; displayTFQuestion(currentTFIndex); } });
            viewAllTFBtn.addEventListener('click', displayAllTF);
        }
        
        initialize();
    });
    </script>
</body>
</html>
