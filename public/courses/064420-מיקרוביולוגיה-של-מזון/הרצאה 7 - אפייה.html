<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Study Tool</title>
    <style>
        /* --- Root Variables for Consistent Theming --- */
        :root {
            --primary-bg: #333333;
            --secondary-bg: #666666;
            --accent-color: #3D90D7;
            --text-color: #E0E0E0;
            --correct-color: #4CAF50;
            --incorrect-color: #F44336;
            --card-bg: #5a5a5a;
        }

        /* --- Global Styles --- */
        body {
            background-color: var(--primary-bg);
            color: var(--text-color);
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 90%; /* As per prompt */
            margin: 20px auto;
            padding: 20px;
            background-color: var(--secondary-bg);
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        h1, h2 {
            color: var(--accent-color);
            text-align: center;
            border-bottom: 1px solid var(--accent-color);
            padding-bottom: 10px;
        }

        .section {
            background-color: var(--primary-bg);
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 8px;
        }

        /* --- Study Cards Styling (Fade Animation) --- */
        .flashcard-container {
            height: 250px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #flashcard-content {
            width: 100%;
            height: 100%;
            background-color: var(--card-bg);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            transition: opacity 0.3s ease-in-out; /* Fade transition */
        }
        
        .flashcard-front-style {
             font-size: 1.5em;
             font-weight: bold;
        }
        
        .flashcard-back-style {
             font-size: 1.1em;
        }

        /* --- Questions Styling (MCQ & T/F) --- */
         .question-container-single, .question-container-all {
            margin-bottom: 15px;
            padding: 15px;
            border: 1px solid var(--secondary-bg);
            border-radius: 5px;
         }

        .question-text {
            font-weight: bold;
            margin-bottom: 15px;
        }

        .options button, .tf-options button {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-align: right;
            transition: background-color 0.3s;
        }

        .options button:hover:not(:disabled), .tf-options button:hover:not(:disabled) {
            background-color: #357ab8;
        }

        .options button:disabled, .tf-options button:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
        
        /* Specific styling to override disabled opacity for correct/incorrect answers */
        .options button.correct, .tf-options button.correct { opacity: 1; }
        .options button.incorrect, .tf-options button.incorrect { opacity: 1; }


        .feedback {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
        }

        .feedback.correct {
            background-color: var(--correct-color);
            color: #fff;
        }

        .feedback.incorrect {
            background-color: var(--incorrect-color);
            color: #fff;
        }

        .explanation {
            margin-top: 10px;
            font-style: italic;
            font-size: 0.9em;
            padding: 8px;
            background-color: var(--secondary-bg);
            border-radius: 4px;
        }

        /* --- Navigation & Utility Styling --- */
        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            margin-bottom: 10px;
        }

        .nav-button, .view-all-button {
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
        }

        .nav-button:disabled {
             opacity: 0.5;
             cursor: not-allowed;
        }

        .counter {
            font-size: 0.9em;
        }

        .view-all-container {
            text-align: center;
            margin-top: 15px;
            margin-bottom: 15px;
        }

        .hidden {
            display: none;
        }

        #mcq-all-questions .question-container-all,
        #tf-all-questions .question-container-all {
            margin-bottom: 20px;
        }

    </style>
    <!-- MathJax Configuration -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$']],
                displayMath: [['$$', '$$']]
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
    <div class="container">
        <h1>אפייה: תפקיד השמרים, מטבוליזם ומחמצת</h1>

        <!-- Study Cards Section -->
        <div class="section">
            <h2>כרטיסי לימוד</h2>
            <div class="flashcard-container">
                <div id="flashcard-content"></div>
            </div>
            <div class="navigation">
                <button class="nav-button" id="prev-card">הקודם</button>
                <span class="counter" id="card-counter"></span>
                <button class="nav-button" id="next-card">הבא</button>
            </div>
        </div>

        <!-- Multiple Choice Questions Section -->
        <div class="section">
            <h2>שאלות רב-ברירה (אמריקאיות)</h2>
            <div id="mcq-single-view">
                <div class="question-container-single" id="mcq-container">
                    <div class="question-text" id="mcq-question"></div>
                    <div class="options" id="mcq-options"></div>
                    <div class="feedback hidden" id="mcq-feedback"></div>
                    <div class="explanation hidden" id="mcq-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-mcq">הקודם</button>
                    <span class="counter" id="mcq-counter"></span>
                    <button class="nav-button" id="next-mcq">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-mcq">הצג את כל השאלות</button>
                 </div>
            </div>
            <div id="mcq-all-questions" class="hidden">
                <!-- All MCQs will be dynamically inserted here -->
            </div>
        </div>

        <!-- True/False Questions Section -->
        <div class="section">
            <h2>שאלות נכון/לא נכון</h2>
             <div id="tf-single-view">
                <div class="question-container-single" id="tf-container">
                    <div class="question-text" id="tf-question"></div>
                    <div class="tf-options" id="tf-options">
                        <button data-answer="true">נכון</button>
                        <button data-answer="false">לא נכון</button>
                    </div>
                    <div class="feedback hidden" id="tf-feedback"></div>
                    <div class="explanation hidden" id="tf-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-tf">הקודם</button>
                    <span class="counter" id="tf-counter"></span>
                    <button class="nav-button" id="next-tf">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-tf">הצג את כל השאלות</button>
                 </div>
            </div>
             <div id="tf-all-questions" class="hidden">
                 <!-- All T/F Questions will be dynamically inserted here -->
             </div>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        
        const flashcardData = [
            { term: `התפחה ביולוגית`, definition: `תהליך בו שמרים מפרקים סוכרים (כמו גלוקוז) ומייצרים פחמן דו חמצני ($CO_2$), הגורם לעליית נפח הבצק.` },
            { term: `יעילות ייצור גז (גלוקוז מול סודיום ביקרבונט)`, definition: `נדרשת כמות קטנה משמעותית של גלוקוז (180 מ״ג) לעומת סודיום ביקרבונט (336 מ״ג) כדי לייצר את אותה כמות של פחמן דו חמצני (88 מ״ג).` },
            { term: `תרומת השמרים לטעם`, definition: `שמרים מייצרים מאות רכיבים ארומטיים, ביניהם אתנול, אסתרים, אצטאלדהידים וגליצרול, וכן מבצעים פעילות פרוטאוליטית.` },
            { term: `גלוטנין וגליאדין`, definition: `חלבוני חיטה מרכזיים היוצרים את רשת הגלוטן. הם אחראים על האלסטיות והיציבות של הבצק וכליאת הגז בתוכו.` },
            { term: `הבשלת הבצק`, definition: `תהליך המושפע מהשמרים, הכולל פירוק חלקי של חלבון הגלוטן והשפעה על קשרי דיסולפיד ($S-S$) דרך חמצון/חיזור ואנזים PDI.` },
            { term: `אנזים PDI`, definition: `ראשי תיבות של Protein Disulfide Isomerase. אנזים המעורב בסידור מחדש של קשרי גופרית בחלבוני הבצק.` },
            { term: `ריכוז שמרים אופטימלי`, definition: `הריכוז המקובל להתחלת תסיסה יעילה הוא מיליון ($10^6$) תאי שמרים בגרם בצק.` },
            { term: `ניצול חד-סוכרים`, definition: `גלוקוז ופרוקטוז מנוצלים באופן ישיר ומהיר על ידי שמרי האפייה.` },
            { term: `ניצול דו-סוכרים`, definition: `סוכרוז ומלטוז מנוצלים ביעילות על ידי השמרים, בעוד לקטוז אינו מנוצל כלל ומשמש רק להמתקה.` },
            { term: `ניצול עמילן`, definition: `השמרים אינם מסוגלים לפרק עמילן ישירות. הם מסתמכים על אנזימי עמילאז (מהקמח או מתוספות לתת) שיפרקו אותו לסוכרים זמינים.` },
            { term: `לחץ אוסמוטי`, definition: `אחד הגורמים הסביבתיים המשפיעים על פעילות השמרים. מושפע מריכוז מומסים כמו סוכר ומלח בבצק.` },
            { term: `סודיום פרופיונאט`, definition: `חומר המשמש בתעשיית האפייה כמעכב פטריות (נגד עובש), אשר עשוי להשפיע ולעכב גם את שמרי האפייה.` },
            { term: `לחם מחמצת`, definition: `מאפה המותפח באמצעות תרבות סימביוטית של חיידקי חומצת חלב (Lactic acid bacteria) ושמרים בר.` },
            { term: `Cross-feeding (חילופי מטבוליטים)`, definition: `יחסי גומלין במחמצת שבהם מיקרואורגניזם אחד מייצר תוצרים המשמשים כחומרי הזנה חיוניים למיקרואורגניזם אחר.` },
            { term: `עמידות שמרים לחום`, definition: `חשיפה לטמפרטורות גבוהות (כגון 50 מעלות צלזיוס) גורמת לתמותה לוגריתמית של השמרים, בקצב שעולה ככל שהטמפרטורה עולה.` }
        ];

        const mcqData = [
            { question: `איזה מהתהליכים הבאים מתאר בצורה המדויקת ביותר את ההבדל הכמותי בין יצירת נפח בלחם באמצעות שמרים לעומת התפחה כימית?`, options: [`שמרים מפרקים גלוקוז ליצירת פחמן דו חמצני, תהליך הדורש מסה קטנה משמעותית של חומר גלם אורגני לעומת המסה הנדרשת של סודיום ביקרבונט לקבלת אותו נפח גז.`, `התפחה ביולוגית מבוססת על יצירת אתנול שמתאדה בחום התנור, בעוד שהתפחה כימית מבוססת על שחרור פחמן דו חמצני.`, `שמרים משתמשים באנזים PDI כדי להפוך עמילן ישירות לגז, בעוד שסודיום ביקרבונט דורש סביבה חומצית בלבד.`, `שתי השיטות דורשות מסה זהה של חומר מוצא כדי לייצר 480 מ״ל של גז בלחץ אטמוספרי, אך קצב התגובה שונה.`], correctIndex: 0, explanation: `נדרשים רק 180 מ״ג גלוקוז כדי לייצר 88 מ״ג פחמן דו חמצני, לעומת 336 מ״ג של סודיום ביקרבונט עבור אותה כמות גז.` },
            { question: `קונדיטור מכין בצק שמרים מתוק ומוסיף לו כמות גדולה של לקטוז במקום סוכרוז. מה תהיה התוצאה הסבירה ביותר מבחינת התפתחות הבצק והתוצר הסופי?`, options: [`הבצק יתפח מהר מאוד מכיוון שלקטוז הוא חד-סוכר המנוצל ישירות על ידי השמרים.`, `הבצק יתפח לאט יותר מהצפוי מכיוון שהשמרים אינם מנצלים לקטוז, והמאפה הסופי יהיה מתוק יותר מכיוון שהסוכר נותר בשלמותו.`, `רשת הגלוטן תיהרס לחלוטין עקב עלייה חדה בלחץ האוסמוטי שייצור הלקטוז.`, `לא יהיה כל שינוי בקצב ההתפחה לעומת שימוש בסוכרוז, שכן שניהם דו-סוכרים המנוצלים באותה יעילות.`], correctIndex: 1, explanation: `שמרי אפייה אינם מסוגלים לנצל לקטוז. לכן, הוספת לקטוז לא תתרום להתפחה, אלא תשאיר את הסוכר בבצק ותתרום למתיקות המוצר הסופי.` },
            { question: `מהי הסיבה הביוכימית לכך ששמר בעל יכולת חיזור גבוהה אינו רצוי בתעשיית האפייה?`, options: [`שמרים מחזרים מונעים את הפירוק של עמילן לגלוקוז, מה שעוצר את תהליך התסיסה.`, `תליכי חיזור מגבירים את ייצור האתנול על חשבון ייצור הפחמן הדו חמצני, מה שמונע את תפיחת הבצק.`, `יכולת חיזור גבוהה עלולה לשבור את קשרי הדיסולפיד ($S-S$) בחלבוני הגלוטן, מה שיפגע באלסטיות וביציבות של הבצק.`, `שמרים אלו מפרקים את הסודיום פרופיונאט וגורמים להתפתחות מהירה של עובשים בלחם.`], correctIndex: 2, explanation: `קשרי דיסולפיד ($S-S$) חיוניים ליציבות רשת הגלוטן. פעילות חיזור מוגברת מצד השמרים מפרקת קשרים אלו ומחלישה את מבנה הבצק.` },
            { question: `במעקב אחר ריכוזי סוכרים בבצק תוסס לאורך זמן, נמצא כי ריכוז סוכר א׳ יורד בהתמדה מההתחלה, בעוד ריכוז סוכר ב׳ עולה בשלבים הראשונים ורק אז מתחיל לרדת. בהתבסס על הדינמיקה האנזימטית בבצק, מי הם הסוכרים הסבירים ביותר?`, options: [`סוכר א׳ הוא מלטוז, סוכר ב׳ הוא עמילן.`, `סוכר א׳ הוא פרוקטוז, סוכר ב׳ הוא לקטוז.`, `סוכר א׳ הוא סוכרוז, סוכר ב׳ הוא גלוקוז.`, `סוכר א׳ הוא גלוקוז, סוכר ב׳ הוא מלטוז.`], correctIndex: 3, explanation: `גלוקוז מנוצל באופן ישיר ומיידי. מלטוז, לעומת זאת, נוצר מפירוק עמילן על ידי עמילאזות, ולכן ריכוזו עולה בהתחלה לפני שהשמרים מתחילים לנצל אותו באופן אינטנסיבי.` },
            { question: `איזה מהבאים אינו נחשב לאחד התוצרים של פעילות השמרים התורמים לפרופיל הטעם והריח של מאפים?`, options: [`גליצרול`, `אתנול`, `סודיום ביקרבונט`, `אצטאלדהידים`], correctIndex: 2, explanation: `סודיום ביקרבונט (אבקת אפייה) הוא מתפיח כימי שמוסף באופן מלאכותי ואינו תוצר מטבולי של שמרים. גליצרול, אתנול ואצטאלדהידים הם תוצרי תסיסה התורמים לארומה.` },
            { question: `כיצד מתמודדים שמרי האפייה עם עמילן, המהווה את מקור הפחמן העיקרי בקמח חיטה?`, options: [`השמרים מפרישים באופן טבעי כמויות גדולות של עמילאזות המפרקות את העמילן באופן ישיר בסביבה החוץ-תאית.`, `השמרים אינם מנצלים את העמילן כלל, אלא מסתמכים אך ורק על החד-סוכרים החופשיים המצויים בקמח באופן טבעי.`, `העמילן חודר לתא השמר בשלמותו ומפורק שם על ידי אנזים ה-PDI.`, `השמרים מנצלים את העמילן באופן עקיף, לאחר שזה עבר פירוק לסוכרים זמינים על ידי עמילאזות המצויות בקמח או כאלו שהוספו לו.`], correctIndex: 3, explanation: `לשמרי אפייה אין יכולת לפרק עמילן ישירות. הם תלויים באנזימי עמילאז (המצויים בקמח, או מוספים דרך לתת ואנזימים מסחריים) שיפרקו את העמילן למלטוז וגלוקוז.` },
            { question: `מאפייה תעשייתית מעוניינת לייצר ולשווק בצק שמרים קפוא. איזה מהגורמים הבאים יהווה את האתגר הביולוגי המרכזי ביותר להבטחת תפיחה תקינה של המוצר לאחר ההפשרה?`, options: [`פירוק מוחלט של רשת הגלוטן על ידי גבישי הקרח.`, `עמידות השמרים להקפאה ושמירה על חיוניותם בתנאי טמפרטורה קיצוניים.`, `חוסר בפעילות של עמילאזות בקמח קפוא.`, `עלייה דרסטית ברמת ה-pH של הבצק במהלך ההקפאה.`], correctIndex: 1, explanation: `האתגר המרכזי בבצקים קפואים הוא שרידות השמרים (Viability). אם תאי השמרים נהרסים בהקפאה, הבצק לא יתפח לאחר ההפשרה.` },
            { question: `מהו התפקיד המרכזי של חלבוני הגלוטנין והגליאדין בתהליך הכנת הלחם?`, options: [`הם יוצרים את הרשת האלסטית והיציבה הנדרשת לכליאת בועות הפחמן הדו חמצני בתוך הבצק.`, `הם פועלים כאנזימים המזרזים את פירוק המלטוז לגלוקוז.`, `הם מהווים את מקור הפחמן העיקרי עבור השמרים במקום פחמימות.`, `הם מונעים את התפתחותם של חיידקים לקטיים בלחם מחמצת.`], correctIndex: 0, explanation: `גלוטנין וגליאדין מתחברים ליצירת גלוטן, המקנה לבצק את האלסטיות והיציבות הדרושות כדי לכלוא את הגז המיוצר על ידי השמרים ולמנוע את קריסת המאפה.` },
            { question: `במערכת אקולוגית של לחם מחמצת, מהו התיאור המדויק ביותר ליחסים בין המיקרואורגניזמים השונים (שמרים וחיידקים לקטיים)?`, options: [`תחרות אלימה בה השמרים מחסלים את החיידקים על ידי הפרשת אתנול בריכוז גבוה.`, `טפילות שבה החיידקים שואבים את כל משאבי האנרגיה מתוך תאי השמרים.`, `התעלמות הדדית מוחלטת, כל קבוצה מנצלת סוג אחר לחלוטין של פחמימות ללא השפעה הדדית.`, `סימביוזה המאופיינת בחילופי מטבוליטים (Cross-feeding) בין זנים שונים של חיידקים ושמרים.`], correctIndex: 3, explanation: `מחמצת היא קהילה סימביוטית. החיידקים והשמרים מקיימים יחסי גומלין ומחליפים ביניהם חומרי הזנה (מטבוליטים) המאפשרים את שגשוג שתי האוכלוסיות.` },
            { question: `איזה מהגורמים הבאים אינו מופיע ברשימת הגורמים המרכזיים המשפיעים על פעילות שמרי האפייה?`, options: [`ריכוז האתנול`, `צבע הקמח`, `לחץ אוסמוטי`, `כמות הסוכר`], correctIndex: 1, explanation: `צבע הקמח אינו גורם המשפיע על מטבוליזם השמרים. גורמים כמו לחץ אוסמוטי, ריכוז אתנול, טמפרטורה, pH וכמות סוכר משפיעים ישירות על תפקודם.` },
            { question: `מדוע נדרשת זהירות בעת הוספת סודיום פרופיונאט לתערובות אפייה המכילות שמרים?`, options: [`מכיוון שהוא מקור חנקן חלופי הגורם לשמרים לייצר עודף חלבוני גלוטן.`, `מכיוון שהוא משמש כזרז לאנזים PDI ומאיץ את הבשלת הבצק מעבר לרצוי.`, `מכיוון שהוא משמש כמעכב פטריות (למניעת עובש), ומאחר ששמרים הם פטריות, הוא עשוי לעכב גם את פעילות ההתפחה שלהם.`, `מכיוון שהוא מתחבר ללקטוז ומאפשר לשמרים לפרק אותו, מה שמשנה את מתיקות הלחם.`], correctIndex: 2, explanation: `סודיום פרופיונאט נועד לעכב התפתחות עובשים (שהם פטריות). מכיוון שגם שמרים שייכים לממלכת הפטריות, החומר עלול לפגוע בפעילותם ולעכב את התפחת הבצק.` },
            { question: `על פי הנתונים הסטויכיומטריים של התסיסה, מהו הנפח שיתפסו 88 מ״ג של גז פחמן דו חמצני ($CO_2$) בתנאי לחץ אטמוספרי רגיל?`, options: [`180 מ״ל`, `336 מ״ל`, `1000 מ״ל`, `480 מ״ל`], correctIndex: 3, explanation: `הנתונים מציינים במפורש כי 88 מ״ג של פחמן דו חמצני תופסים נפח של 480 מ״ל בלחץ אטמוספרי.` },
            { question: `מה תהיה ההשפעה של חשיפת בצק מתפתח לטמפרטורה של 52 מעלות צלזיוס למשך 30 דקות?`, options: [`קצב ייצור ה-$CO_2$ יגיע לשיא היסטורי והבצק יתפח לממדי ענק באופן מיידי.`, `תתרחש ירידה לוגריתמית חדה במספר תאי השמר החיוניים, מה שיוביל לעצירת התפיחה.`, `החיידקים הלקטיים ימותו, אך השמרים ימשיכו לתסוס ללא כל הפרעה.`, `עמילן הבצק יעבור תהליך קרמליזציה והשמרים ינצלו אותו בצורתו החדשה.`], correctIndex: 1, explanation: `על פי עקומות ההישרדות, חשיפת שמרים לטמפרטורות גבוהות (כמו 50-52 מעלות) גורמת לתמותה לוגריתמית מהירה של התאים, מה שיפסיק את התסיסה.` },
            { question: `נתון כי המונח "לחם" בשפות מסוימות (כגון ערבית קדומה) מתייחס גם לבשר. מה ניתן להסיק מכך על המשמעות התרבותית של המושג?`, options: [`שבעבר לחם נאפה תמיד עם חתיכות בשר בתוכו לתוספת חלבון.`, `המילה מייצגת את "המזון העיקרי" או המזון הבסיסי והנחשק ביותר באותה תרבות, ללא קשר להרכבו הבוטני.`, `שמרים מסוגלים לפרק גם חלבונים מן החי באותה יעילות שהם מפרקים פחמימות.`, `גלוטן מצוי באופן טבעי גם ברקמות שריר של בעלי חיים מסוימים.`], correctIndex: 1, explanation: `השימוש באותה מילה ללחם ולבשר מצביע על כך שהמונח מסמל את מקור המזון העיקרי, החשוב והנחשק ביותר בתזונה של אותה חברה.` },
            { question: `כאשר אופה מתכנן להכין לחם בעל נפח גדול, הוא נדרש לשמור על רשת גלוטן חזקה. איזו פעילות מטבולית של השמרים עלולה לאיים על מטרה זו אם תצא מכלל שליטה?`, options: [`ייצור מוגבר של פחמן דו חמצני.`, `ניצול מהיר של סוכרוז מהקמח.`, `ייצור של חומצה לקטית המעלה את ה-pH של הבצק.`, `פעילות חיזור חזקה ופרוטאוליזה נרחבת המפרקת את קשרי הדיסולפיד בחלבון.`], correctIndex: 3, explanation: `פרוטאוליזה (פירוק חלבונים) ופעילות חיזור חזקה מצד השמרים מפרקות את קשרי ה-$S-S$ המייצבים את הגלוטן, מה שמחליש את הבצק ופוגע ביכולתו לשמור על נפח.` },
            { question: `מהו תפקידו של האנזים PDI (Protein Disulfide Isomerase) בהקשר של כימיית האפייה?`, options: [`הוא מפרק את הדו-סוכר מלטוז לשתי מולקולות גלוקוז זמינות.`, `הוא מעורב בשינוי וסידור מחדש של קשרי גופרית-גופרית ($S-S$) בחלבוני הבצק במהלך שלב ההבשלה.`, `הוא מונע את התנדפות האתנול בזמן האפייה בתנור.`, `הוא אחראי על הפיכת לקטוז לחומצה לקטית במחמצת.`], correctIndex: 1, explanation: `אנזים ה-PDI אחראי על ארגון מחדש של קשרי הדיסולפיד בחלבוני הגלוטן, תהליך קריטי בהבשלת הבצק ועיצוב התכונות הראולוגיות שלו.` },
            { question: `באיזה אופן תורמת הוספת לתת (Malt) לתהליך הכנת הבצק המסורתי והמודרני?`, options: [`הלתת מכיל ריכוז גבוה של סודיום ביקרבונט המשמש להתפחה כימית מהירה.`, `הלתת משמיד את החיידקים הלקטיים ומאפשר לשמרים בלעדיות על חומרי ההזנה.`, `הלתת יוצר קשרי צילוב ישירים עם חלבון הגליאדין לחיזוק מבנה הבצק.`, `הלתת מספק אנזימי עמילאז המסייעים בפירוק העמילן שבקמח לסוכרים פשוטים הזמינים לתסיסה.`], correctIndex: 3, explanation: `מכיוון ששמרים אינם מפרקים עמילן בעצמם, הוספת לתת (העשיר באנזימי עמילאז) מסייעת בפירוק העמילן לסוכרים זמינים כמו מלטוז וגלוקוז.` },
            { question: `אם נשווה ייצור לחם מודרני המבוסס על שמרי אפייה מסחריים לייצור לחם מחמצת מסורתי, מהו ההבדל המיקרוביולוגי הבולט ביותר ביניהם?`, options: [`בלחם מסחרי אין שמרים אלא רק אנזימים, בעוד שבמחמצת יש שמרים פעילים.`, `לחם מסחרי מסתמך לרוב על זן שמרים יחיד, בעוד שמחמצת מבוססת על קהילה מורכבת של חיידקים לקטיים ומגוון סוגי שמרים.`, `בלחם מחמצת תהליך ההתפחה מתבסס אך ורק על ייצור חמצן, לעומת פחמן דו חמצני בלחם מסחרי.`, `חיידקים לקטיים במחמצת מונעים לחלוטין כל ייצור של אתנול במהלך ההתפחה.`], correctIndex: 1, explanation: `שמרי אפייה מסחריים הם לרוב תרבית טהורה של זן יחיד (*S. cerevisiae*), בעוד שמחמצת היא מערכת אקולוגית מורכבת (סימביוזה) של מספר זני שמרים וחיידקי חומצת חלב.` },
            { question: `על פי רשימת המיקרואורגניזמים האופייניים למחמצת, איזה מהסוגים הבאים משתייך לקבוצת חיידקי חומצת החלב (Lactic acid bacteria) ולא לשמרים?`, options: [`Lactobacillus brevis`, `Candida humilis`, `Saccharomyces cerevisiae`, `Kazachstania exigua`], correctIndex: 0, explanation: `הסוג Lactobacillus (כמו L. brevis) הוא סוג מרכזי של חיידקי חומצת חלב במחמצת. שאר האפשרויות הן מינים של שמרים הפעילים במחמצת.` },
            { question: `כיצד משפיע ריכוז השמרים ההתחלתי (למשל $10^6$ שמרים בגרם בצק) על תהליך האפייה?`, options: [`ריכוז גבוה מדי יגרום להרס מיידי של כל קשרי הגלוטן, בעוד ריכוז אופטימלי מבטיח קצב תסיסה והתפחה מבוקרים.`, `הריכוז קובע רק את צבע הקרום של הלחם ולא משפיע בשום צורה על קצב ייצור הגז.`, `ככל שהריכוז נמוך יותר, כך השמרים מפרקים את העמילן בקצב מהיר יותר.`, `אין לריכוז השפעה מעשית, שכן השמרים מתרבים באופן מיידי למספר המקסימלי האפשרי ברגע המגע עם המים.`], correctIndex: 0, explanation: `ריכוז השמרים הוא גורם מפתח בשליטה על קצב ההתפחה. ריכוז אופטימלי מבטיח תסיסה בקצב הנכון ללא ייצור עודף של גז או תוצרי לוואי שעלולים להחליש את הבצק.` },
            { question: `איזה מהסוכרים הבאים לא יספק פחמן זמין לשמרי אפייה סטנדרטיים ללא תוספת של אנזימים חיצוניים ספציפיים המפרקים אותו?`, options: [`לקטוז`, `גלוקוז`, `פרוקטוז`, `סוכרוז`], correctIndex: 0, explanation: `שמרי אפייה מנצלים ביעילות גלוקוז, פרוקטוז, סוכרוז ומלטוז. לקטוז (סוכר החלב) אינו מנוצל על ידם ונשאר בבצק.` },
            { question: `מהי המשמעות הביולוגית של התהליך המכונה "חילופי מטבוליטים" (Cross-feeding) המתרחש בלחם מחמצת?`, options: [`השמרים ניזונים מחלבוני החיטה בלבד, בעוד החיידקים ניזונים אך ורק מפחמימות.`, `אופה מוסיף סוכר לבצק כדי "להאכיל" את השמרים באופן מלאכותי ולזרז את התפיחה.`, `מיקרואורגניזם אחד מייצר תוצרי לוואי או חומרי הזנה המשמשים כמשאב חיוני עבור מיקרואורגניזם אחר בקהילה.`, `החיידקים הלקטיים מעכלים את תאי השמרים המתים בסוף התסיסה כדי לשרוד את האפייה.`], correctIndex: 2, explanation: `חילופי מטבוליטים מתארים מצב בו תוצר הפרשה של אורגניזם אחד (למשל, חומצת אמינו או ויטמין) משמש כמזון לאורגניזם אחר, מה שמקיים את הסימביוזה במחמצת.` },

            { question: `בהתבסס על הדינמיקה האופיינית של ניצול סוכרים, מה קורה לריכוז הפרוקטוז בבצק בשעות הראשונות של התסיסה בהשוואה לגלוקוז?`, options: [`הפרוקטוז מתפרק לחלוטין תוך דקות ספורות, בעוד הגלוקוז אינו מנוצל כלל עד לשלב האפייה.`, `שניהם יורדים באותו קצב בדיוק מכיוון ששניהם חד-סוכרים בעלי מבנה זהה.`, `ריכוז הפרוקטוז עולה בעוד ריכוז הגלוקוז עולה גם הוא כתוצאה מפירוק לקטוז.`, `ריכוז הפרוקטוז נוטה להישאר גבוה ויציב למשך זמן רב יותר, בעוד ריכוז הגלוקוז יורד באופן מיידי ורציף.`], correctIndex: 3, explanation: `שמרים מעדיפים לנצל תחילה גלוקוז. לכן, ריכוז הגלוקוז יורד מיד, בעוד פרוקטוז נשאר יציב יותר בשלבים הראשונים עד שהגלוקוז מתחיל להידלדל.` },

            { question: `עלייה בטמפרטורת הבצק מעל 50 מעלות צלזיוס מגבירה את קצב ייצור הגז על ידי השמרים באופן ליניארי מתמשך.`, answer: false, explanation: `טמפרטורות גבוהות (כמו 50 מעלות) גורמות לתמותה לוגריתמית מהירה של תאי השמר, מה שעוצר את התסיסה.` },

            { question: `אצטאלדהיד הוא אחד מעשרות הרכיבים הארומטיים המיוצרים על ידי שמרים במהלך האפייה.`, answer: true, explanation: `אצטאלדהיד הוא תוצר ביניים בתסיסה הכוהלית התורם לפרופיל הריח של הבצק.` },

        function displayCard(index) {
            if (!flashcardData || flashcardData.length === 0) return;
            const cardData = flashcardData[index];
            isCardFront = true;
            flashcardContent.style.opacity = '1';
            flashcardContent.innerHTML = cardData.term;
            flashcardContent.className = 'flashcard-front-style';
            cardCounter.textContent = `כרטיס ${index + 1} / ${flashcardData.length}`;
            prevCardBtn.disabled = index === 0;
            nextCardBtn.disabled = index === flashcardData.length - 1;
            if(window.MathJax) MathJax.typesetPromise([flashcardContent]);
        }

        function flipCard() {
            if (isCardAnimating || !flashcardData || flashcardData.length === 0) return;
            isCardAnimating = true;
            flashcardContent.style.opacity = '0';
            setTimeout(() => {
                isCardFront = !isCardFront;
                const cardData = flashcardData[currentCardIndex];
                if (isCardFront) {
                    flashcardContent.innerHTML = cardData.term;
                    flashcardContent.className = 'flashcard-front-style';
                } else {
                    flashcardContent.innerHTML = cardData.definition;
                    flashcardContent.className = 'flashcard-back-style';
                }
                flashcardContent.style.opacity = '1';
                isCardAnimating = false;
                if(window.MathJax) MathJax.typesetPromise([flashcardContent]);
            }, 300);
        }

        function displayMCQuestion(index) {
            if (!mcqData || mcqData.length === 0) return;
            const qData = mcqData[index];
            mcqQuestion.innerHTML = qData.question;
            mcqOptions.innerHTML = '';
            mcqFeedback.classList.add('hidden');
            mcqExplanation.classList.add('hidden');
            qData.options.forEach((option, i) => {
                const button = document.createElement('button');
                button.innerHTML = option;
                button.onclick = () => handleMCQAnswer(index, i);
                mcqOptions.appendChild(button);
            });
            mcqCounter.textContent = `שאלה ${index + 1} / ${mcqData.length}`;
            prevMCQBtn.disabled = index === 0;
            nextMCQBtn.disabled = index === mcqData.length - 1;
            if (mcqAnswers[index] !== null) {
                highlightMCQAnswer(mcqOptions, mcqFeedback, mcqExplanation, index, mcqAnswers[index].selected);
            }
            if(window.MathJax) MathJax.typesetPromise([document.getElementById('mcq-container')]);
        }

        function handleMCQAnswer(qIndex, selectedIndex) {
            if (mcqAnswers[qIndex] !== null) return;
            const isCorrect = selectedIndex === mcqData[qIndex].correctIndex;
            mcqAnswers[qIndex] = { selected: selectedIndex, correct: isCorrect };
            highlightMCQAnswer(mcqOptions, mcqFeedback, mcqExplanation, qIndex, selectedIndex);
        }
        
        function highlightMCQAnswer(optionsContainer, feedbackEl, explanationEl, qIndex, selectedIndex) {
            const qData = mcqData[qIndex];
            const buttons = optionsContainer.querySelectorAll('button');
            buttons.forEach((button, i) => {
                button.disabled = true;
                if (i === qData.correctIndex) {
                    button.style.backgroundColor = 'var(--correct-color)';
                    button.style.color = '#fff';
                    button.classList.add('correct');
                }
                if (i === selectedIndex && i !== qData.correctIndex) {
                    button.style.backgroundColor = 'var(--incorrect-color)';
                    button.style.color = '#fff';
                    button.classList.add('incorrect');
                }
            });
            feedbackEl.textContent = selectedIndex === qData.correctIndex ? "נכון!" : "לא נכון.";
            feedbackEl.className = `feedback ${selectedIndex === qData.correctIndex ? 'correct' : 'incorrect'}`;
            explanationEl.innerHTML = `הסבר: ${qData.explanation}`;
            explanationEl.classList.remove('hidden');
            if(window.MathJax) MathJax.typesetPromise([explanationEl]);
        }

        function displayAllMCQ() {
            if (!mcqData || mcqData.length === 0) return;
            mcqSingleView.classList.add('hidden');
            mcqAllQuestionsContainer.innerHTML = ''; 
            mcqData.forEach((qData, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question-container-all';
                questionDiv.innerHTML = `
                    <div class="question-text">${index + 1}. ${qData.question}</div>
                    <div class="options">
                        ${qData.options.map((option, i) => `<button data-qindex="${index}" data-oindex="${i}">${option}</button>`).join('')}
                    </div>
                    <div class="feedback hidden"></div>
                    <div class="explanation hidden"></div>
                `;
                mcqAllQuestionsContainer.appendChild(questionDiv);
                 const optionButtons = questionDiv.querySelectorAll('.options button');
                 optionButtons.forEach(button => {
                     button.onclick = () => {
                        const qIndex = parseInt(button.dataset.qindex);
                        const oIndex = parseInt(button.dataset.oindex);
                        if (mcqAnswers[qIndex] === null) {
                            const isCorrect = oIndex === mcqData[qIndex].correctIndex;
                            mcqAnswers[qIndex] = { selected: oIndex, correct: isCorrect };
                        }
                        const optionsDiv = button.closest('.options');
                        const feedbackDiv = questionDiv.querySelector('.feedback');
                        const explanationDiv = questionDiv.querySelector('.explanation');
                        highlightMCQAnswer(optionsDiv, feedbackDiv, explanationDiv, qIndex, mcqAnswers[qIndex].selected);
                     };
                 });
                 if (mcqAnswers[index] !== null) {
                    const optionsDiv = questionDiv.querySelector('.options');
                    const feedbackDiv = questionDiv.querySelector('.feedback');
                    const explanationDiv = questionDiv.querySelector('.explanation');
                    highlightMCQAnswer(optionsDiv, feedbackDiv, explanationDiv, index, mcqAnswers[index].selected);
                 }
            });
            mcqAllQuestionsContainer.classList.remove('hidden');
            if(window.MathJax) MathJax.typesetPromise([mcqAllQuestionsContainer]);
        }

        function displayTFQuestion(index) {
            if (!tfData || tfData.length === 0) return;
            const qData = tfData[index];
            tfQuestion.innerHTML = qData.question;
            tfFeedback.classList.add('hidden');
            tfExplanation.classList.add('hidden');
             const buttons = tfOptionsContainer.querySelectorAll('button');
             buttons.forEach(button => {
                 button.disabled = false;
                 button.style.backgroundColor = '';
                 button.style.color = '';
                 button.classList.remove('correct', 'incorrect');
                 button.onclick = () => handleTFAnswer(index, button.dataset.answer === 'true');
             });
            tfCounter.textContent = `שאלה ${index + 1} / ${tfData.length}`;
            prevTFBtn.disabled = index === 0;
            nextTFBtn.disabled = index === tfData.length - 1;
            if (tfAnswers[index] !== null) {
                highlightTFAnswer(tfOptionsContainer, tfFeedback, tfExplanation, index, tfAnswers[index].selected);
            }
            if(window.MathJax) MathJax.typesetPromise([document.getElementById('tf-container')]);
        }
        
        function handleTFAnswer(qIndex, selectedAnswer) {
            if (tfAnswers[qIndex] !== null) return;
            const isCorrect = selectedAnswer === tfData[qIndex].answer;
            tfAnswers[qIndex] = { selected: selectedAnswer, correct: isCorrect };
            highlightTFAnswer(tfOptionsContainer, tfFeedback, tfExplanation, qIndex, selectedAnswer);
        }
        
        function highlightTFAnswer(optionsContainer, feedbackEl, explanationEl, qIndex, selectedAnswer) {
             const qData = tfData[qIndex];
             const buttons = optionsContainer.querySelectorAll('button');
             buttons.forEach(button => {
                 const buttonAnswer = button.dataset.answer === 'true';
                 button.disabled = true;
                 if (buttonAnswer === qData.answer) {
                     button.style.backgroundColor = 'var(--correct-color)';
                     button.style.color = '#fff';
                     button.classList.add('correct');
                 }
                 if (buttonAnswer === selectedAnswer && buttonAnswer !== qData.answer) {
                     button.style.backgroundColor = 'var(--incorrect-color)';
                     button.style.color = '#fff';
                     button.classList.add('incorrect');
                 }
             });
             feedbackEl.textContent = selectedAnswer === qData.answer ? "נכון!" : "לא נכון.";
             feedbackEl.className = `feedback ${selectedAnswer === qData.answer ? 'correct' : 'incorrect'}`;
             explanationEl.innerHTML = `הסבר: ${qData.explanation}`;
             explanationEl.classList.remove('hidden');
             if(window.MathJax) MathJax.typesetPromise([explanationEl]);
        }
        
        function displayAllTF() {
             if (!tfData || tfData.length === 0) return;
             tfSingleView.classList.add('hidden');
             tfAllQuestionsContainer.innerHTML = '';
             tfData.forEach((qData, index) => {
                 const questionDiv = document.createElement('div');
                 questionDiv.className = 'question-container-all';
                 questionDiv.innerHTML = `
                     <div class="question-text">${index + 1}. ${qData.question}</div>
                     <div class="tf-options">
                         <button data-qindex="${index}" data-answer="true">נכון</button>
                         <button data-qindex="${index}" data-answer="false">לא נכון</button>
                     </div>
                     <div class="feedback hidden"></div>
                     <div class="explanation hidden"></div>
                 `;
                 tfAllQuestionsContainer.appendChild(questionDiv);
                 const optionButtons = questionDiv.querySelectorAll('.tf-options button');
                 optionButtons.forEach(button => {
                     button.onclick = () => {
                         const qIndex = parseInt(button.dataset.qindex);
                         const selectedAnswer = button.dataset.answer === 'true';
                         if (tfAnswers[qIndex] === null) {
                             const isCorrect = selectedAnswer === tfData[qIndex].answer;
                             tfAnswers[qIndex] = { selected: selectedAnswer, correct: isCorrect };
                         }
                         const optionsDiv = button.closest('.tf-options');
                         const feedbackDiv = questionDiv.querySelector('.feedback');
                         const explanationDiv = questionDiv.querySelector('.explanation');
                         highlightTFAnswer(optionsDiv, feedbackDiv, explanationDiv, qIndex, tfAnswers[qIndex].selected);
                     };
                 });
                 if (tfAnswers[index] !== null) {
                    const optionsDiv = questionDiv.querySelector('.tf-options');
                    const feedbackDiv = questionDiv.querySelector('.feedback');
                    const explanationDiv = questionDiv.querySelector('.explanation');
                    highlightTFAnswer(optionsDiv, feedbackDiv, explanationDiv, index, tfAnswers[index].selected);
                 }
             });
             tfAllQuestionsContainer.classList.remove('hidden');
             if(window.MathJax) MathJax.typesetPromise([tfAllQuestionsContainer]);
        }

        function initialize() {
            if (flashcardData.length > 0) displayCard(currentCardIndex);
            if (mcqData.length > 0) displayMCQuestion(currentMCQIndex);
            if (tfData.length > 0) displayTFQuestion(currentTFIndex);
            flashcardContent.addEventListener('click', flipCard);
            prevCardBtn.addEventListener('click', () => { if (currentCardIndex > 0) { currentCardIndex--; displayCard(currentCardIndex); } });
            nextCardBtn.addEventListener('click', () => { if (currentCardIndex < flashcardData.length - 1) { currentCardIndex++; displayCard(currentCardIndex); } });
            prevMCQBtn.addEventListener('click', () => { if (currentMCQIndex > 0) { currentMCQIndex--; displayMCQuestion(currentMCQIndex); } });
            nextMCQBtn.addEventListener('click', () => { if (currentMCQIndex < mcqData.length - 1) { currentMCQIndex++; displayMCQuestion(currentMCQIndex); } });
            viewAllMCQBtn.addEventListener('click', displayAllMCQ);
            prevTFBtn.addEventListener('click', () => { if (currentTFIndex > 0) { currentTFIndex--; displayTFQuestion(currentTFIndex); } });
            nextTFBtn.addEventListener('click', () => { if (currentTFIndex < tfData.length - 1) { currentTFIndex++; displayTFQuestion(currentTFIndex); } });
            viewAllTFBtn.addEventListener('click', displayAllTF);
        }
        
        initialize();
    });
    </script>
</body>
</html>
