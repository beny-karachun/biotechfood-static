<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Study Tool</title>
    <style>
        /* --- Root Variables for Consistent Theming --- */
        :root {
            --primary-bg: #333333;
            --secondary-bg: #666666;
            --accent-color: #3D90D7;
            --text-color: #E0E0E0;
            --correct-color: #4CAF50;
            --incorrect-color: #F44336;
            --card-bg: #5a5a5a;
        }

        /* --- Global Styles --- */
        body {
            background-color: var(--primary-bg);
            color: var(--text-color);
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 90%; /* As per prompt */
            margin: 20px auto;
            padding: 20px;
            background-color: var(--secondary-bg);
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        h1, h2 {
            color: var(--accent-color);
            text-align: center;
            border-bottom: 1px solid var(--accent-color);
            padding-bottom: 10px;
        }

        .section {
            background-color: var(--primary-bg);
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 8px;
        }

        /* --- Study Cards Styling (Fade Animation) --- */
        .flashcard-container {
            height: 250px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #flashcard-content {
            width: 100%;
            height: 100%;
            background-color: var(--card-bg);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            transition: opacity 0.3s ease-in-out; /* Fade transition */
        }
        
        .flashcard-front-style {
             font-size: 1.5em;
             font-weight: bold;
        }
        
        .flashcard-back-style {
             font-size: 1.1em;
        }

        /* --- Questions Styling (MCQ & T/F) --- */
         .question-container-single, .question-container-all {
            margin-bottom: 15px;
            padding: 15px;
            border: 1px solid var(--secondary-bg);
            border-radius: 5px;
         }

        .question-text {
            font-weight: bold;
            margin-bottom: 15px;
        }

        .options button, .tf-options button {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-align: right;
            transition: background-color 0.3s;
        }

        .options button:hover:not(:disabled), .tf-options button:hover:not(:disabled) {
            background-color: #357ab8;
        }

        .options button:disabled, .tf-options button:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
        
        /* Specific styling to override disabled opacity for correct/incorrect answers */
        .options button.correct, .tf-options button.correct { opacity: 1; }
        .options button.incorrect, .tf-options button.incorrect { opacity: 1; }


        .feedback {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
        }

        .feedback.correct {
            background-color: var(--correct-color);
            color: #fff;
        }

        .feedback.incorrect {
            background-color: var(--incorrect-color);
            color: #fff;
        }

        .explanation {
            margin-top: 10px;
            font-style: italic;
            font-size: 0.9em;
            padding: 8px;
            background-color: var(--secondary-bg);
            border-radius: 4px;
        }

        /* --- Navigation & Utility Styling --- */
        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            margin-bottom: 10px;
        }

        .nav-button, .view-all-button {
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
        }

        .nav-button:disabled {
             opacity: 0.5;
             cursor: not-allowed;
        }

        .counter {
            font-size: 0.9em;
        }

        .view-all-container {
            text-align: center;
            margin-top: 15px;
            margin-bottom: 15px;
        }

        .hidden {
            display: none;
        }

        #mcq-all-questions .question-container-all,
        #tf-all-questions .question-container-all {
            margin-bottom: 20px;
        }

    </style>
    <!-- MathJax Configuration -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
    <div class="container">
        <h1>מיקרוביולוגיה של מזון - מבוא והיסטוריה</h1>

        <!-- Study Cards Section -->
        <div class="section">
            <h2>כרטיסי לימוד</h2>
            <div class="flashcard-container">
                <div id="flashcard-content"></div>
            </div>
            <div class="navigation">
                <button class="nav-button" id="prev-card">הקודם</button>
                <span class="counter" id="card-counter"></span>
                <button class="nav-button" id="next-card">הבא</button>
            </div>
        </div>

        <!-- Multiple Choice Questions Section -->
        <div class="section">
            <h2>שאלות רב-ברירה (אמריקאיות)</h2>
            <div id="mcq-single-view">
                <div class="question-container-single" id="mcq-container">
                    <div class="question-text" id="mcq-question"></div>
                    <div class="options" id="mcq-options"></div>
                    <div class="feedback hidden" id="mcq-feedback"></div>
                    <div class="explanation hidden" id="mcq-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-mcq">הקודם</button>
                    <span class="counter" id="mcq-counter"></span>
                    <button class="nav-button" id="next-mcq">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-mcq">הצג את כל השאלות</button>
                 </div>
            </div>
            <div id="mcq-all-questions" class="hidden">
                <!-- All MCQs will be dynamically inserted here -->
            </div>
        </div>

        <!-- True/False Questions Section -->
        <div class="section">
            <h2>שאלות נכון/לא נכון</h2>
             <div id="tf-single-view">
                <div class="question-container-single" id="tf-container">
                    <div class="question-text" id="tf-question"></div>
                    <div class="tf-options" id="tf-options">
                        <button data-answer="true">נכון</button>
                        <button data-answer="false">לא נכון</button>
                    </div>
                    <div class="feedback hidden" id="tf-feedback"></div>
                    <div class="explanation hidden" id="tf-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-tf">הקודם</button>
                    <span class="counter" id="tf-counter"></span>
                    <button class="nav-button" id="next-tf">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-tf">הצג את כל השאלות</button>
                 </div>
            </div>
             <div id="tf-all-questions" class="hidden">
                 <!-- All T/F Questions will be dynamically inserted here -->
             </div>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        
        const flashcardData = [
            { term: "מיקרוביולוגיה חיובית", definition: "תחום העוסק בשימוש במיקרואורגניזמים לטובת האדם, כגון שימור מזון, ייצור מרכיבי מזון, ושיפור תכונות אורגנולפטיות ונוטריינטים." },
            { term: "מיקרוביולוגיה שלילית", definition: "תחום העוסק בתהליכים הגורמים לקלקול המזון, פגיעה ביציבותו, הקטנת חיי המדף, הורדת ערך תזונתי ונזק כלכלי." },
            { term: "מיקרוביולוגיה אלימה", definition: "תחום העוסק במיקרואורגניזמים פתוגניים הגורמים למחלות באדם, פגיעה בבריאות עד כדי מוות, וכן טרור ביולוגי." },
            { term: "Brazzein", definition: "חלבון מתוק פי 2000 מסוכרוז המופק מצמח פראי אפריקאי. עמיד בחום ובטווח חומציות רחב בזכות 4 קשרים דיסולפידיים." },
            { term: "Phaffia rhodozyma", definition: "שמר המשמש בתהליכים מודרניים לייצור תעשייתי של הפיגמנט אסטקסנתין (Astaxanthin)." },
            { term: "Dielectrophoresis (DEP)", definition: "שיטה פיזיקלית מתקדמת המשמשת לריכוז והפרדה של חיידקים מתוך דוגמאות לצרכי דיאגנוסטיקה." },
            { term: "Lazzaro Spallanzani", definition: "מדען מהמאה ה-18 שהוכיח כי הרתחה ואטימה מונעים התפתחות מיקרואורגניזמים, כחלק מהמאבק בתיאוריית הבריאה הספונטנית." },
            { term: "Nicolas Appert", definition: "ממציא שיטת השימור באמצעות קופסאות שימורים בסוף המאה ה-18 ותחילת המאה ה-19." },
            { term: "Louis Pasteur", definition: "אבי תורת הבקטריולוגיה המודרנית. פיתח את הטכניקה האספטית, הפיסטור, וחיסונים נגד כלבת ואנתרקס." },
            { term: "John Tyndall", definition: "מדען שחיזק את תוצאותיו של פסטר על ידי גילוי והשמדת ספורות עמידות לחום." },
            { term: "Robert Koch", definition: "מדען שניסח את העקרונות להוכחת קשר בין חיידק למחלה, בודד מושבות על מצע מוצק, וגילה את חיידק הכולרה." },
            { term: "Chaim Weizmann", definition: "מדען שפיתח תהליך תסיסה תעשייתי (ABE) לייצור אצטון, בוטנול ואתנול בעזרת חיידקים." },
            { term: "Vibrio cholerae", definition: "החיידק מחולל מחלת הכולרה. תואר על ידי קוך כבעל צורה כפופה הדומה לטעם המקראי מרכא, אוהב חום ורגיש לאוויר." },
            { term: "מיקרוביום מערכת העיכול", definition: "אוכלוסיית החיידקים במעיים הכוללת אלפי זנים ומיליוני גנים, המשפיעה באופן קריטי על בריאות האדם." },
            { term: "אריזות חכמות", definition: "דוגמה לתהליך שימור מודרני המשלב טכנולוגיה באריזת המזון כדי להאריך את חיי המדף ולעכב התפתחות מיקרוביאלית." }
        ];

        const mcqData = [
            { question: "איזה מבין התרחישים הבאים מהווה דוגמה מובהקת למיקרוביולוגיה שלילית ולא למיקרוביולוגיה אלימה?", options: ["התפרצות של חיידק הליסטריה במוצרי ירקות קפואים שגרמה לאשפוז צרכנים.", "החמצת יין והפיכתו לחומץ כתוצאה מחדירת חיידקי חומצת חלב, ללא סכנה בריאותית.", "שימוש בחיידקים מהונדסים גנטית לייצור רעלנים לצורכי טרור ביולוגי.", "הוספת חיידקים פרוביוטיים למוצר חלב כדי לשפר את תהליך העיכול של הצרכן."], correctIndex: 1, explanation: "מיקרוביולוגיה שלילית עוסקת בקלקול מזון, הקטנת חיי מדף ונזק כלכלי ללא גרימת מחלות. פגיעה בבריאות שייכת למיקרוביולוגיה אלימה." },
            { question: "מה מהווה את ההבדל המרכזי בין תהליכי שימור מסורתיים לתהליכי שימור מודרניים?", options: ["שימור מסורתי מבוסס על הוספת כימיקלים סינתטיים, בעוד המודרני מבוסס על תסיסה.", "שימור מודרני כולל שימוש בטכנולוגיות כגון לחץ גבוה ובקטריוצינים, בעוד המסורתי נשען על המלחה, ייבוש והחמצה ספונטנית.", "בתהליכים מסורתיים נעשה שימוש באריזות חכמות, בעוד במודרניים מסתמכים על קירור בלבד.", "תהליכים מודרניים שוללים לחלוטין שימוש בחיידקים לצורך שימור, בניגוד לתהליכים המסורתיים."], correctIndex: 1, explanation: "טכנולוגיות כמו לחץ גבוה, בקטריוצינים (חומרים טבעיים הפוגעים בחיידקים) ואריזות חכמות מאפיינות שימור מודרני. המלחה וייבוש הם מסורתיים." },
            { question: "חלבון הברזאין (Brazzein) מציג עמידות גבוהה לתהליכי עיבוד תעשייתיים הכוללים חימום. מהו ההסבר המבני לכך?", options: ["החלבון מכיל ריכוז גבוה של סוכרוז המגן עליו מפני דנטורציה.", "המבנה המרחבי שלו מיוצב על ידי ארבעה קשרים דיסולפידיים חזקים.", "הוא מורכב משרשרת ארוכה של מעל אלף חומצות אמינו המעניקה לו קשיחות.", "החלבון מופק משמרים המותאמים לחיים בסביבות קיצוניות של חום."], correctIndex: 1, explanation: "עמידותו יוצאת הדופן של הברזאין בחום (עד 98 מעלות לשעתיים) מיוחסת לקיומם של 4 קשרים דיסולפידיים המייצבים את השרשרת הקצרה בת 54 חומצות האמינו." },
            { question: "אם חברת מזון מעוניינת להמתיק משקה קל בעל רמת חומציות של $pH 3.5$, האם שימוש בברזאין יתאים למטרה זו, ומדוע?", options: ["לא, מכיוון שהברזאין עובר דנטורציה ונהרס בסביבה חומצית מתחת ל-$pH 5$.", "כן, משום שברזאין יציב בטווח רחב של $pH$ בין 2.5 ל-8.", "לא, הברזאין מתוק רק בסביבה בסיסית ולכן אינו מתאים למשקאות קלים.", "כן, אך רק אם המשקה נשמר בקירור מתמיד, שכן החומציות מבטלת את עמידותו לחום."], correctIndex: 1, explanation: "הברזאין מתאפיין ביציבות גבוהה בטווח חומציות רחב של 2.5 עד 8, ולכן מתאים מאוד למשקאות קלים חומציים." },
            { question: "איזו מבין הפעולות הבאות מייצגת מעבר ממיקרוביולוגיה קלאסית לביוטכנולוגיה מודרנית בתעשיית המזון?", options: ["התססת מיץ ענבים לייצור יין בעזרת שמרי הבר המצויים על קליפת הענב.", "ייבוש נתחי בשר בשמש והמלחתו כדי למנוע התפתחות חיידקי ריקבון.", "מעבר מהסתמכות על יצור אנזימים טבעי לפיתוח תחליפי בשר וחלב במעבדה.", "שימוש במרתפים קרים לאחסון גבינות כדי להאט את קצב התפתחות העובש."], correctIndex: 2, explanation: "הביוטכנולוגיה המודרנית מתאפיינת במעבר מייצור מסורתי (ואף מייצור אנזימים בלבד) לפיתוח מוצרים חדשניים ומתקדמים כמו תחליפי בשר וחלב מבוססי תסיסה דייקנית." },
            { question: "מהי המשמעות המעשית של גילוי שרידי עמילנים ופיטוליתים במכתשים במערת רקפת בכרמל?", options: ["הוכחה לכך שהאדם הקדמון באזורנו סבל ממגפות של חיידקי מעיים כתוצאה מאכילת דגנים נגועים.", "עדות לכך ששימור מזון והתססת דגנים (ייצור בירה) התרחשו כבר לפני כ-13,000 שנה, עוד לפני המהפכה החקלאית.", "אישוש לתיאוריה לפיה השומרונים והמצרים היו הראשונים להמציא את לחם המחמצת בשנת 3000 לפני הספירה.", "הדגמה לשימוש קדום באריזות חכמות לאחסון חיטה ושעורה בתנאי לחץ גבוה."], correctIndex: 1, explanation: "הממצאים במערת רקפת מתוארכים לכ-13,000 שנה (לפני המהפכה החקלאית) ומעידים על עיבוד והתססת דגנים לייצור בירה, מה שמקדים משמעותית את העדויות מבבל ומצרים." },
            { question: "כיצד תרם ג'ון טינדל (John Tyndall) לביסוס התיאוריה של לואי פסטר בדבר אי-היתכנותה של בריאה ספונטנית?", options: ["הוא גילה את המיקרוסקופ הראשון ובכך איפשר לפסטר לראות את החיידקים באוויר.", "הוא הוכיח כי הרתחה פשוטה תמיד משמידה את כל סוגי המיקרואורגניזמים ללא יוצא מן הכלל.", "הוא גילה את קיומן של ספורות עמידות לחום, והראה כיצד השמדתן המוחלטת מונעת גדילה מיקרוביאלית מחודשת.", "הוא פיתח את קופסת השימורים הראשונה, שסיפקה סביבה אטומה לחלוטין שמנעה כניסת אוויר."], correctIndex: 2, explanation: "טינדל חיזק את עבודתו של פסטר בכך שהסביר מדוע לעיתים הרתחה רגילה נכשלת במניעת זיהום - בגלל קיומן של ספורות (נבגים) עמידות לחום הדורשות תהליך השמדה מיוחד." },
            { question: "על פי העקרונות שניסח רוברט קוך, מהו השלב ההכרחי כדי להוכיח שמיקרואורגניזם מסוים הוא הגורם למחלה ספציפית?", options: ["יש לבודד את המיקרואורגניזם ולגדל אותו כמושבה טהורה מחוץ לגוף החולה (למשל על מצע תפוח אדמה).", "יש להראות שהמיקרואורגניזם מסוגל לשרוד הרתחה ממושכת וליצור ספורות.", "יש להוכיח שהמחלה מועברת אך ורק דרך מים מזוהמים ולא דרך מגע ישיר.", "יש לרצף את הגנום המלא של החיידק ולהשוות אותו לגנום האנושי."], correctIndex: 0, explanation: "אחד מעקרונות קוך (Koch's postulates) המרכזיים הוא היכולת לבודד את הגורם החשוד ולגדל אותו בתרבית טהורה (הוא השתמש במצע תפוח אדמה) כדי להוכיח סיבתיות." },
            { question: "במה שונה גישתו של לאזארו ספלנצאני מגישתו של אנטוני ואן לוונהוק ביחס למיקרואורגניזמים?", options: ["לוונהוק התמקד בשיטות להשמדתם, בעוד ספלנצאני רק תיעד את צורתם.", "לוונהוק הסתפק בתצפית ותיעוד דרך מיקרוסקופ, בעוד ספלנצאני ביצע ניסויים אקטיביים (הרתחה ואטימה) כדי להבין את מקורם.", "לוונהוק חקר תסיסה תעשייתית, בעוד ספלנצאני התמקד אך ורק בפתוגנים הגורמים למחלות באדם.", "שניהם האמינו בבריאה ספונטנית, אך ספלנצאני ניסה להוכיח זאת באמצעות קופסאות שימורים."], correctIndex: 1, explanation: "לוונהוק היה הראשון שצפה במיקרואורגניזמים ותיעד אותם. ספלנצאני לקח זאת צעד קדימה וביצע ניסויים פיזיקליים (הרתחה ואטימה) כדי להפריך את תיאוריית הבריאה הספונטנית." },
            { question: "מהי מטרת השימוש בטכנולוגיית Dielectrophoresis (DEP) בהקשר של מיקרוביולוגיה של מזון?", options: ["פירוק חלבונים אלטרנטיביים למרכיבי טעם וריח בתעשיית תחליפי הבשר.", "הארכת חיי המדף של מוצרי חלב על ידי יצירת שדה חשמלי המונע התפתחות עובש.", "ריכוז חיידקים מתוך דוגמה נוזלית כחלק מתהליך דיאגנוסטיקה מודרני ומהיר.", "החדרת גנים זרים לתוך שמרי בר כדי לגרום להם לייצר אסטקסנתין."], correctIndex: 2, explanation: "טכנולוגיית DEP משמשת לריכוז חיידקים (Concentrating bacteria) באמצעות שדות חשמליים, מה שמהווה שיטה מודרנית לדיאגנוסטיקה וזיהוי מהיר." },
            { question: "איזו מההצהרות הבאות מתארת בצורה המדויקת ביותר את יחסי הכוחות הגנטיים במערכת העיכול האנושית?", options: ["מספר הגנים האנושיים גדול פי אלף ממספר הגנים של חיידקי המיקרוביום.", "ישנו שוויון כמעט מוחלט בין מספר הגנים האנושיים למספר הגנים החיידקיים.", "מספר הגנים החיידקיים נאמד במיליונים, ומגמד את כ-25,000 הגנים האנושיים.", "המיקרוביום מורכב בעיקר מוירוסים, ולכן אינו תורם מטען גנטי משמעותי למערכת העיכול."], correctIndex: 2, explanation: "במערכת העיכול ישנם מיליוני גנים חיידקיים, המהווים תוספת עצומה לכ-25,000 הגנים המרכיבים את הגנום האנושי." },
            { question: "חברת ביוטכנולוגיה מדווחת על הצלחה בהשבחת זן שמרים. בגרף התוצאות נראה כי בדור העשירי כמות התוצר עלתה משמעותית לעומת זן המקור. לאיזה תוצר סביר שהכוונה, בהתבסס על תהליכים מודרניים שנלמדו?", options: ["ייצור של פניצילין טבעי לשימוש כאנטיביוטיקה במזון.", "ייצור של המולקולה 2-PE המעניקה ניחוח ורדים טבעי.", "ייצור של חומצת חלב המשמשת להתססת כרוב וירקות.", "ייצור של ספורות עמידות לחום המשמשות כפרוביוטיקה בלחם."], correctIndex: 1, explanation: "השבחת זני שמרים (Yeast strains breeding) הוצגה כדרך מודרנית לייצור מולקולת 2-PE, המהווה חומר טעם וריח (ניחוח ורדים טבעי)." },
            { question: "כיצד תורמים דיני הטהרה והטומאה ביהדות, בפרספקטיבה היסטורית, להתפתחות המיקרוביולוגיה?", options: ["הם היו הראשונים לתאר את המבנה המולקולרי של חיידקי המעיים.", "הם היוו יישום מעשי מוקדם של עקרונות אפידמיולוגיים כמו בידוד חולים, חיטוי והסגר, טרם הבנת מנגנון החיידקים.", "הם אסרו לחלוטין על שימוש בתהליכי התססה, מה שעיכב את התפתחות הלחם והיין במזרח התיכון.", "הם הגדירו את ההבדל הכימי בין חיידקים גראם-חיוביים לגראם-שליליים בתהליך שחיטת הבשר."], correctIndex: 1, explanation: "הלכות כמו בידוד חולים, חיטוי הגוף והבגד, והסגר שימשו כפרקטיקות מניעתיות שעולות בקנה אחד עם עקרונות מיקרוביולוגיים ואפידמיולוגיים מודרניים לריסון מחלות." },
            { question: "רופא ביוון העתיקה מבחין כי אנשים שהחלימו ממחלה מסוימת אינם נדבקים בה שוב כאשר הם מטפלים בחולים חדשים. לאיזו דמות היסטורית מיוחסת תצפית זו, ומהי משמעותה?", options: ["היפוקרטס; זוהי עדות מוקדמת להבנת העברת מחלות והתפתחות עמידות יחסית (חיסוניות נרכשת).", "לואי פסטר; זוהי ההוכחה הראשונה לכך שחיסון מוחלש מונע את מחלת הכלבת.", "רוברט קוך; תצפית זו עזרה לו לנסח את הכללים לבידוד פתוגנים מתוך חולים בריאים.", "אנטוני ואן לוונהוק; התצפית הובילה אותו להמציא את המיקרוסקופ כדי לראות את נוגדני ההחלמה."], correctIndex: 0, explanation: "היפוקרטס (400 BC) זיהה את תופעת העברת המחלות בין בני אדם ואת העובדה שאדם שהחלים מגלה עמידות יחסית ויכול לטפל באחרים." },
            { question: "בתיאור ההיסטורי של גילוי חיידק הכולרה (Vibrio cholerae) על ידי ד\"ר קוך ב-1883, החיידק תואר כ\"אוהב חום ורגיש לאוויר\". מהי ההשלכה של תכונות אלו על התפשטות המחלה?", options: ["המחלה תתפשט בעיקר באזורים קרים ומושלגים בהם החיידק קופא ונשמר באוויר הפתוח.", "החיידק דורש סביבה דמוית המעיים (חמימה וללא חשיפה ממושכת לאוויר פתוח), ולכן מועבר לרוב דרך מים או מזון מזוהמים ולא כנישא באוויר.", "החיידק יכול לשרוד רק בתוך קופסאות שימורים אטומות שעברו הרתחה לטמפרטורות קיצוניות.", "המחלה מסוכנת רק לחיות משק ולא לבני אדם, שכן חום הגוף האנושי גבוה מדי עבור החיידק."], correctIndex: 1, explanation: "התיאור מציין שהחיידק רגיש לאוויר הפתוח ואוהב חום (כחום גוף האדם, 30-40 מעלות), מה שמסביר מדוע אינו עובר באוויר הפתוח אלא מצריך מסלול הדבקה ישיר יותר כמו מים או מזון מזוהמים בצואה." },
            { question: "איזה מהמשפטים הבאים מתאר נכונה את ההבדל בין פסטור (Pasteurization) לבין עיקור מלא (Sterilization) כפי שנגזר מעבודותיהם של פסטר וטינדל?", options: ["פסטור משמיד את כל המיקרואורגניזמים כולל ספורות, בעוד עיקור פוגע רק בחיידקים פתוגניים.", "פסטור נועד להשמיד פתוגנים ולעכב קלקול מבלי להרוס את תכונות המזון, אך אינו משמיד ספורות עמידות לחום כפי שעושה עיקור.", "אין הבדל מעשי; שניהם מונחים נרדפים שהומצאו על ידי טינדל לתיאור אותו תהליך.", "פסטור מבוצע באמצעות לחץ גבוה ואריזות חכמות, בעוד עיקור מבוצע אך ורק באמצעות החמצה."], correctIndex: 1, explanation: "פסטר פיתח את הפסטור כחימום מתון שאינו פוגע באיכות המוצר אך מוריד עומס חיידקי. טינדל הראה שחימום רגיל אינו מספיק להשמדת ספורות, דבר הדורש עיקור (השמדה מוחלטת)." },
            { question: "שמר ה-Phaffia rhodozyma משמש בתעשייה המודרנית. מהו התוצר העיקרי המופק ממנו ומה ייעודו האפשרי?", options: ["פניצילין, המשמש כתרופה אנטיביוטית לטיפול בזיהומי מעיים.", "חומצה לקטית, המשמשת כחומר משמר טבעי במוצרי חלב ניגר.", "אסטקסנתין (Astaxanthin), פיגמנט אדום המשמש כתוסף תזונה וצבע מאכל טבעי.", "אצטון ובוטנול, המשמשים כממסים אורגניים בתעשייה הכימית."], correctIndex: 2, explanation: "השמר Phaffia rhodozyma מהווה דוגמה לתהליך מודרני בו מייצרים את הפיגמנט אסטקסנתין." },
            { question: "חוקר מבקש לעכב גדילת חיידקים במוצר בשר מבלי להשתמש בכימיקלים סינתטיים או בחימום. איזו שיטה מודרנית מהווה את הפתרון המתאים ביותר?", options: ["שימוש בבקטריוצינים המופקים מחיידקים לקטיים.", "הוספת חיידק הכולרה בצורה מוחלשת כדי שיתחרה על המזון.", "הקרנת הבשר בקרני רנטגן עד להשמדת הגנום הבקטריאלי.", "התססה כוהלית מלאה של הבשר בדומה לייצור בירה."], correctIndex: 0, explanation: "שימוש בחומרים טבעיים הפוגעים בחיידקים, כגון בקטריוצינים מחיידקים לקטיים, היא דוגמה קלאסית לשימור מודרני טבעי." },
            { question: "מה הייתה תרומתו המרכזית של חיים ויצמן לביוטכנולוגיה התעשייתית?", options: ["הוא היה הראשון שריצף גנום של חיידק פתוגני.", "הוא פיתח תהליך תסיסה (ABE) לייצור ממסים כמו אצטון ובוטנול בעזרת חיידקים.", "הוא גילה את תכונות ההמתקה של חלבון הברזאין באפריקה.", "הוא המציא את קופסאות השימורים ששימשו את הצבא הבריטי."], correctIndex: 1, explanation: "חיים ויצמן מזוהה עם פיתוח תהליך התסיסה Acetone-Butanol-Ethanol (ABE) fermentation." },
            { question: "מדוע התחרות בין האדם למיקרואורגניזמים על צריכת המזון מוגדרת תחת 'מיקרוביולוגיה שלילית'?", options: ["מפני שחיידקים אלו מייצרים רעלנים קטלניים הגורמים למוות ודאי של הצרכן.", "מפני שהתהליך מוביל לקלקול המזון, ירידה בערכו התזונתי ונזק כלכלי, גם אם אינו גורם למחלה.", "מפני שהתחרות גורמת להכחדה של זני צמחים טבעיים המשמשים לחקלאות.", "מפני שמיקרואורגניזמים אלו משתמשים במנגנוני טרור ביולוגי כדי להשתלט על שדות חקלאיים."], correctIndex: 1, explanation: "מיקרוביולוגיה שלילית עוסקת בנזק הנגרם מקלקול המזון ואובדן ערכו (התחרות מי צורך ראשון את המזון), ללא קשר ישיר ליצירת מחלות (שזה מיקרוביולוגיה אלימה)." },
            { question: "באיזה מובן שימוש בחיידקים פרוביוטיים למטרות שימור נחשב לגישה פרדוקסלית אך יעילה?", options: ["משתמשים בחיידקים חיים כדי למנוע שגשוג של חיידקים אחרים הגורמים לקלקול.", "החיידקים הפרוביוטיים מפרקים את אריזת המזון מבפנים כדי לאפשר כניסת חמצן.", "הם מעלים את ה-$pH$ של המזון לרמות בסיסיות קיצוניות המונעות עיכול.", "הם הופכים את המזון לרעיל עבור בני אדם אך שומרים על צורתו החיצונית."], correctIndex: 0, explanation: "הפרדוקס טמון בכך שמוסיפים מיקרואורגניזמים (גורמים חיים) בכוונה תחילה כדי לדכא ולמנוע התפתחות של מיקרואורגניזמים אחרים (שליליים/אלימים)." },
            { question: "אם נשווה את חלבון הברזאין למוצרים כמו miraculin ו-thaumatin, מה המשותף לכולם?", options: ["כולם אנזימים המפרקים עמילן לסוכרים פשוטים.", "כולם חלבונים המאופיינים ביכולת להעניק טעם מתוק.", "כולם מופקים באופן בלעדי מתוך חיידקי מעיים אנושיים.", "כולם מהווים מרכיב מרכזי בייצור תחליפי בשר מודרניים."], correctIndex: 1, explanation: "השקף מציין ש-miraculin, monellin, thaumatin וכו' הינם חלבונים מתוקים נוספים, בדומה לברזאין." },
            { question: "מהי המגמה הבולטת במעבר מביוטכנולוגיה קלאסית לביוטכנולוגיה עתידית בתחום המזון?", options: ["חזרה לשיטות ייבוש והמלחה וויתור מוחלט על שימוש בחיידקים.", "מעבר מהתמקדות בייצור אנזימים בלבד לפיתוח מערכות שלמות לייצור תחליפי בשר וחלב.", "הפסקת השימוש בפרוביוטיקה עקב סכנות למיקרוביום האנושי.", "מעבר משימוש בשמרים לשימוש בלעדי בוירוסים להתססת משקאות."], correctIndex: 1, explanation: "השקף 'מעבר מהתרכזות ביצור אנזימים ליצור מזון עתידי' מציג בבירור את המעבר מביוטכנולוגיה קלאסית (כמו ייצור אנזימים וחומצות אמינו) לייצור תחליפי בשר וחלב (Alternative meat and milk)." },
            { question: "איזו מבין השיטות הבאות משקפת בצורה הטובה ביותר שילוב של 'אריזה חכמה' בשימור מזון מודרני?", options: ["אריזת לחם בנייר עיתון כדי לספוג לחות עודפת.", "שימוש בפלסטיק עבה יותר שאינו ניתן למחזור למניעת מעיכה פיזית.", "שילוב חומרים באריזה הפעילים אקטיבית נגד התפתחות חיידקים או משנים את הרכב הגזים סביב המוצר.", "אריזת פירות בקופסאות עץ פתוחות כדי לאפשר זרימת אוויר חופשית."], correctIndex: 2, explanation: "אריזות חכמות אינן רק מחסום פסיבי, אלא מערכות המעורבות אקטיבית בשימור המזון, למשל על ידי שחרור חומרים מעכבים או ספיחת חמצן." },
            { question: "על פי התיאור ההיסטורי מאת ד\"ר קוך ב-1891, למה דימה קוך את צורתו של חיידק הכולרה במיקרוסקופ?", options: ["לכדור מושלם וסימטרי המזכיר פנינה.", "לקו כפוף המזכיר את טעמי המקרא 'מרכא' או 'טפחא'.", "לשרשרת ארוכה המזכירה מחרוזת תפילה.", "למבנה מרובע המזכיר קופסת שימורים זעירה."], correctIndex: 1, explanation: "בטקסט מתואר כי צורתו כעין קו כפוף, כעין הנגינה 'מרכא' או 'טפחא', ועל כן נקרא שמה בישראל 'מרכא'." },
            { question: "מהי המשמעות של ריצוף מאות מיליוני גנומים בקטריאליים עד שנת 2025?", options: ["הדבר מוכיח כי חיידקים כבר אינם עוברים מוטציות והתקבעו גנטית.", "הדבר מאפשר הבנה עמוקה של המיקרוביום האנושי וחשיבותו הקריטית לבריאות האדם.", "הדבר הוביל להכחדה מוחלטת של מחלת הכולרה במזרח התיכון.", "הדבר מוכיח כי תיאוריית הבריאה הספונטנית הייתה נכונה בחלקה."], correctIndex: 1, explanation: "ההתפתחות העצומה בריצוף גנומים (מ-1997 ועד 2025) קשורה ישירות להבנת המיקרוביום והשפעתו על בריאות האדם." },
            { question: "איזה נזק עלול להיגרם כתוצאה מריקול (Recall) של מוצרי מזון נגועים בחיידק הליסטריה?", options: ["נזק חיובי, שכן הצרכנים נחשפים לזנים פרוביוטיים חדשים.", "נזק כלכלי עצום לחברות המזון, בנוסף לסכנה הבריאותית לצרכנים, המשויך למיקרוביולוגיה אלימה.", "שיפור בטעם המזון עקב תסיסה משנית המתרחשת במקררי הסופרמרקט.", "עלייה דרמטית בערך התזונתי של המוצרים עקב פירוק חלבונים מואץ."], correctIndex: 1, explanation: "ריקול קשור למיקרוביולוגיה אלימה (נוכחות פתוגנים) וגורר נזק כלכלי כבד לחברות, לצד הסכנה הבריאותית." },
            { question: "חוקר מנסה להפיק חומר טעם טבעי באמצעות הנדסה גנטית של חיידקים. לאיזו קטגוריה שייך מחקר זה?", options: ["מיקרוביולוגיה שלילית, שכן הוא מתערב בתהליכי טבע.", "מיקרוביולוגיה אלימה, עקב השימוש בהנדסה גנטית.", "מיקרוביולוגיה חיובית, תחת הסעיף של שינוי תכונות אורגנולפטיות ושימוש במחקר ביולוגי בסיסי.", "שיטות דיאגנוסטיות מסורתיות מימי הביניים."], correctIndex: 2, explanation: "שימוש בהנדסה גנטית (GMO) ליצירת חומרי טעם (שינוי תכונות אורגנולפטיות) הוא חלק מובהק ממיקרוביולוגיה חיובית וביוטכנולוגיה." },
            { question: "מהו החיסרון העיקרי של תיאוריית הבריאה הספונטנית שאותה הפריכו ספלנצאני ופסטר?", options: ["היא הניחה שחיים יכולים להיווצר מחומר דומם ללא נוכחות קודמת של מיקרואורגניזמים, מה שמנע הבנה אמיתית של מקור הזיהומים.", "היא טענה שחיידקים קיימים בכל מקום, ולכן אין טעם לנסות לשמר מזון.", "היא התבססה על ההנחה שרק הרתחה בלחץ גבוה יכולה להשמיד וירוסים.", "היא שללה לחלוטין את קיומם של מיקרואורגניזמים, אפילו תחת המיקרוסקופ."], correctIndex: 0, explanation: "התיאוריה טענה שחיים (כמו רימות או עובש) נוצרים ישירות מחומר דומם/נרקב. הפרכתה הוכיחה שזיהום מגיע ממיקרואורגניזמים קיימים (למשל באוויר), מה שאיפשר פיתוח שיטות שימור וחיטוי." },
            { question: "באיזה אופן משנה החמצה (Lactic acid fermentation) את סביבת המזון כדי למנוע קלקול?", options: ["היא מעלה את ה-$pH$ לסביבה בסיסית שבה חיידקים אינם שורדים.", "היא מורידה את ה-$pH$ ויוצרת סביבה חומצית המעכבת את גדילתם של רוב חיידקי הקלקול והפתוגנים.", "היא מחליפה את כל המים במזון באלכוהול נקי.", "היא יוצרת קשרים דיסולפידיים בחלבוני המזון ההופכים אותו לבלתי חדיר לחיידקים."], correctIndex: 1, explanation: "תהליך ההחמצה (כמו בכבישה) מבוסס על ייצור חומצה לקטית המורידה את ה-pH, מה שיוצר סביבה עוינת למיקרואורגניזמים שליליים ואלימים." },
            { question: "מדוע גילוי הברזאין (Brazzein) נחשב לפריצת דרך פוטנציאלית בתעשיית המזון?", options: ["משום שהוא מאפשר ייצור בשר מלאכותי ללא שימוש בתאים חיים.", "מפני שהוא חלבון מתוק פי 2000 מסוכרוז, עמיד בחום ובעל פוטנציאל לשמש כתחליף סוכר טבעי ודל קלוריות בתהליכי ייצור תעשייתיים.", "בגלל יכולתו להשמיד ספורות של חיידקי אנתרקס בטמפרטורת החדר.", "משום שהוא האנזים היחיד המסוגל לפרק פלסטיק באריזות חכמות."], correctIndex: 1, explanation: "תכונות הברזאין - מתיקות עצומה, מבנה חלבוני (ולא פחמימתי), ועמידות בחום ובטווח pH רחב - הופכות אותו לתחליף סוכר אידיאלי לתעשייה." },
            { question: "כיצד מתמודדת תעשיית החלב המודרנית עם בעיית חיי המדף הקצרים של מוצרים טריים, תוך שימוש במיקרוביולוגיה חיובית?", options: ["על ידי הוספת וירוסים התוקפים את חלבוני החלב ומונעים את קרישתם.", "באמצעות שימוש בזנים ספציפיים של חיידקים המייצרים חומרים משמרים טבעיים (כמו בקטריוצינים) כחלק מתהליך התסיסה.", "על ידי הקפאה עמוקה של כל מוצרי החלב מיד לאחר החליבה ועד לצריכה.", "על ידי סילוק מוחלט של כל החיידקים הפרוביוטיים מהמוצר הסופי."], correctIndex: 1, explanation: "שימוש בחיידקים חיוביים המייצרים בקטריוצינים (חומרים הפוגעים בחיידקים אחרים) מהווה שיטת שימור מודרנית וטבעית המאריכה חיי מדף." },
            { question: "מהו היתרון המרכזי של שימוש בשיטות דיאגנוסטיות מודרניות, לעומת שיטות קלאסיות כמו זריעה על צלחות פטרי?", options: ["השיטות המודרניות זולות יותר ואינן דורשות ציוד חשמלי כלל.", "השיטות המודרניות (כמו שימוש בשבבים ו-DEP) מאפשרות זיהוי מהיר ומדויק יותר של פתוגנים, מבלי להמתין ימים לגדילת מושבות.", "השיטות המודרניות משמידות את הפתוגן תוך כדי הזיהוי, כך שהמזון נשאר ראוי למאכל.", "שיטות קלאסיות מזהות רק וירוסים, בעוד שיטות מודרניות מזהות רק חיידקים."], correctIndex: 1, explanation: "החיסרון המרכזי של שיטות קלאסיות הוא הזמן הדרוש לגידול מושבות. שיטות מודרניות מציעות 'שיטות מהירות לזיהוי חיידקים'." },
            { question: "איזו התפתחות היסטורית אפשרה לאדם לעבור מחיי נדודים וליקוט לחיי קבע וחקלאות?", options: ["המצאת המיקרוסקופ על ידי לוונהוק.", "היכולת לייצר פניצילין בכמויות מסחריות.", "פיתוח שיטות לשימור מזון אשר מנעו קלקול ואפשרו אגירת מזון לתקופות מחסור.", "ההבנה המלאה של מבנה הגנום החיידקי."], correctIndex: 2, explanation: "שימור מזון היה 'חלק מרכזי ביכולת ההתיישבות של האדם הקדמון והמעבר מליקוט מזון לחקלאות'." },
            { question: "מהו ההסבר הביולוגי לכך שחיידק הכולרה גורם למגפות דווקא באזורים עם תנאי תברואה ירודים?", options: ["החיידק נוצר באופן ספונטני מתוך אשפה נרקבת.", "החיידק מועבר דרך הפרשות (צואה) ומשגשג במקורות מים מזוהמים, תנאים הנפוצים בהיעדר תברואה נאותה.", "החיידק זקוק לטמפרטורות קפיאה הקיימות רק באזורים ללא חימום מודרני.", "החיידק תוקף רק אנשים שאינם צורכים בשר כשר."], correctIndex: 1, explanation: "על פי התיאור, החיידק 'יושב על דפני המעי... היכל תענוגיה הוא הצואה', וניקיון גמור מונע את פגיעתו. מכאן שהעברתו תלויה בתנאי היגיינה וסניטציה ירודים." },
            { question: "מדוע נחשבת המלחת בשר לשיטת שימור יעילה?", options: ["המלח משנה את צבע הבשר לאדום בוהק המרתיע חיידקים.", "המלח יוצר סביבה בעלת לחץ אוסמוטי גבוה השואבת מים מתאי החיידקים ומונעת את התרבותם.", "המלח מתפרק לחומצה הממיסה את דפנות התא של החיידקים.", "המלח מעודד צמיחה של עובש חיובי הדוחק את רגלי החיידקים הרעים."], correctIndex: 1, explanation: "המלחה (שיטה מסורתית) פועלת על ידי הורדת פעילות המים (aw) ויצירת עקה אוסמוטית שאינה מאפשרת לחיידקי קלקול לשרוד." },
            { question: "מה ניתן להסיק מהעובדה שמערכת העיכול מכילה מיליוני גנים חיידקיים?", options: ["שהאדם נמצא בסכנת חיים מתמדת עקב זיהום פנימי קטלני.", "שתפקוד גוף האדם ובריאותו תלויים באופן עמוק בתוצרים המטבוליים של גנים אלו, המהווים חלק בלתי נפרד מהפיזיולוגיה שלנו.", "שרוב הגנים האנושיים איבדו את תפקידם במהלך האבולוציה והוחלפו על ידי גנים חיידקיים.", "שהמיקרוביום נוצר אך ורק מאכילת מזון מקולקל במהלך החיים."], correctIndex: 1, explanation: "המיקרוביום (על מיליוני הגנים שבו) אינו זיהום אלא מערכת סימביוטית בעלת 'חשיבות לבריאות האדם', המספקת פונקציות שהגנום האנושי (רק ~25,000 גנים) לא יכול לספק לבדו." },
            { question: "איזו מבין הדמויות הבאות קשרה לראשונה באופן מדעי ושיטתי בין מיקרואורגניזם ספציפי למחלה ספציפית שהוא גורם?", options: ["אנטוני ואן לוונהוק", "רוברט קוך", "ג'ון טינדל", "ניקולא אפרט"], correctIndex: 1, explanation: "רוברט קוך הוא זה שניסח את הפוסטולטים (Koch's postulates) להוכחת קשר סיבתי בין גורם למחלה, ויישם זאת על הכולרה." },

                        const feedbackDiv = questionDiv.querySelector('.feedback');
                        const explanationDiv = questionDiv.querySelector('.explanation');
                        highlightMCQAnswer(optionsDiv, feedbackDiv, explanationDiv, qIndex, mcqAnswers[qIndex].selected);
                     };
                 });
                 if (mcqAnswers[index] !== null) {
                    const optionsDiv = questionDiv.querySelector('.options');
                    const feedbackDiv = questionDiv.querySelector('.feedback');
                    const explanationDiv = questionDiv.querySelector('.explanation');
                    highlightMCQAnswer(optionsDiv, feedbackDiv, explanationDiv, index, mcqAnswers[index].selected);
                 }
            });
            mcqAllQuestionsContainer.classList.remove('hidden');
            if (window.MathJax) {
                MathJax.typesetPromise([mcqAllQuestionsContainer]);
            }
        }

        function displayTFQuestion(index) {
            if (!tfData || tfData.length === 0) return;
            const qData = tfData[index];
            tfQuestion.textContent = qData.question;
            tfFeedback.classList.add('hidden');
            tfExplanation.classList.add('hidden');
             const buttons = tfOptionsContainer.querySelectorAll('button');
             buttons.forEach(button => {
                 button.disabled = false;
                 button.style.backgroundColor = '';
                 button.style.color = '';
                 button.classList.remove('correct', 'incorrect');
                 button.onclick = () => handleTFAnswer(index, button.dataset.answer === 'true');
             });
            tfCounter.textContent = `שאלה ${index + 1} / ${tfData.length}`;
            prevTFBtn.disabled = index === 0;
            nextTFBtn.disabled = index === tfData.length - 1;
            if (tfAnswers[index] !== null) {
                highlightTFAnswer(tfOptionsContainer, tfFeedback, tfExplanation, index, tfAnswers[index].selected);
            }
            if (window.MathJax) {
                MathJax.typesetPromise([tfQuestion, tfExplanation]);
            }
        }
        
        function handleTFAnswer(qIndex, selectedAnswer) {
            if (tfAnswers[qIndex] !== null) return;
            const isCorrect = selectedAnswer === tfData[qIndex].answer;
            tfAnswers[qIndex] = { selected: selectedAnswer, correct: isCorrect };
            highlightTFAnswer(tfOptionsContainer, tfFeedback, tfExplanation, qIndex, selectedAnswer);
        }
        
        function highlightTFAnswer(optionsContainer, feedbackEl, explanationEl, qIndex, selectedAnswer) {
             const qData = tfData[qIndex];
             const buttons = optionsContainer.querySelectorAll('button');
             buttons.forEach(button => {
                 const buttonAnswer = button.dataset.answer === 'true';
                 button.disabled = true;
                 if (buttonAnswer === qData.answer) {
                     button.style.backgroundColor = 'var(--correct-color)';
                     button.style.color = '#fff';
                     button.classList.add('correct');
                 }
                 if (buttonAnswer === selectedAnswer && buttonAnswer !== qData.answer) {
                     button.style.backgroundColor = 'var(--incorrect-color)';
                     button.style.color = '#fff';
                     button.classList.add('incorrect');
                 }
             });
             feedbackEl.textContent = selectedAnswer === qData.answer ? "נכון!" : "לא נכון.";
             feedbackEl.className = `feedback ${selectedAnswer === qData.answer ? 'correct' : 'incorrect'}`;
             explanationEl.textContent = `הסבר: ${qData.explanation}`;
             explanationEl.classList.remove('hidden');
        }
        
        function displayAllTF() {
             if (!tfData || tfData.length === 0) return;
             tfSingleView.classList.add('hidden');
             tfAllQuestionsContainer.innerHTML = '';
             tfData.forEach((qData, index) => {
                 const questionDiv = document.createElement('div');
                 questionDiv.className = 'question-container-all';
                 questionDiv.innerHTML = `
                     <div class="question-text">${index + 1}. ${qData.question}</div>
                     <div class="tf-options">
                         <button data-qindex="${index}" data-answer="true">נכון</button>
                         <button data-qindex="${index}" data-answer="false">לא נכון</button>
                     </div>
                     <div class="feedback hidden"></div>
                     <div class="explanation hidden"></div>
                 `;
                 tfAllQuestionsContainer.appendChild(questionDiv);
                 const optionButtons = questionDiv.querySelectorAll('.tf-options button');
                 optionButtons.forEach(button => {
                     button.onclick = () => {
                         const qIndex = parseInt(button.dataset.qindex);
                         const selectedAnswer = button.dataset.answer === 'true';
                         if (tfAnswers[qIndex] === null) {
                             const isCorrect = selectedAnswer === tfData[qIndex].answer;
                             tfAnswers[qIndex] = { selected: selectedAnswer, correct: isCorrect };
                         }
                         const optionsDiv = button.closest('.tf-options');
                         const feedbackDiv = questionDiv.querySelector('.feedback');
                         const explanationDiv = questionDiv.querySelector('.explanation');
                         highlightTFAnswer(optionsDiv, feedbackDiv, explanationDiv, qIndex, tfAnswers[qIndex].selected);
                     };
                 });
                 if (tfAnswers[index] !== null) {
                    const optionsDiv = questionDiv.querySelector('.tf-options');
                    const feedbackDiv = questionDiv.querySelector('.feedback');
                    const explanationDiv = questionDiv.querySelector('.explanation');
                    highlightTFAnswer(optionsDiv, feedbackDiv, explanationDiv, index, tfAnswers[index].selected);
                 }
             });
             tfAllQuestionsContainer.classList.remove('hidden');
             if (window.MathJax) {
                 MathJax.typesetPromise([tfAllQuestionsContainer]);
             }
        }

        function initialize() {
            if (flashcardData.length > 0) displayCard(currentCardIndex);
            if (mcqData.length > 0) displayMCQuestion(currentMCQIndex);
            if (tfData.length > 0) displayTFQuestion(currentTFIndex);
            flashcardContent.addEventListener('click', flipCard);
            prevCardBtn.addEventListener('click', () => { if (currentCardIndex > 0) { currentCardIndex--; displayCard(currentCardIndex); } });
            nextCardBtn.addEventListener('click', () => { if (currentCardIndex < flashcardData.length - 1) { currentCardIndex++; displayCard(currentCardIndex); } });
            prevMCQBtn.addEventListener('click', () => { if (currentMCQIndex > 0) { currentMCQIndex--; displayMCQuestion(currentMCQIndex); } });
            nextMCQBtn.addEventListener('click', () => { if (currentMCQIndex < mcqData.length - 1) { currentMCQIndex++; displayMCQuestion(currentMCQIndex); } });
            viewAllMCQBtn.addEventListener('click', displayAllMCQ);
            prevTFBtn.addEventListener('click', () => { if (currentTFIndex > 0) { currentTFIndex--; displayTFQuestion(currentTFIndex); } });
            nextTFBtn.addEventListener('click', () => { if (currentTFIndex < tfData.length - 1) { currentTFIndex++; displayTFQuestion(currentTFIndex); } });
            viewAllTFBtn.addEventListener('click', displayAllTF);
        }
        
        initialize();
    });
    </script>
</body>
</html>
