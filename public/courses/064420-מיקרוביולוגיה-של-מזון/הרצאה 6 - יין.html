<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Study Tool</title>
    <style>
        /* --- Root Variables for Consistent Theming --- */
        :root {
            --primary-bg: #333333;
            --secondary-bg: #666666;
            --accent-color: #3D90D7;
            --text-color: #E0E0E0;
            --correct-color: #4CAF50;
            --incorrect-color: #F44336;
            --card-bg: #5a5a5a;
        }

        /* --- Global Styles --- */
        body {
            background-color: var(--primary-bg);
            color: var(--text-color);
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 90%; /* As per prompt */
            margin: 20px auto;
            padding: 20px;
            background-color: var(--secondary-bg);
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        h1, h2 {
            color: var(--accent-color);
            text-align: center;
            border-bottom: 1px solid var(--accent-color);
            padding-bottom: 10px;
        }

        .section {
            background-color: var(--primary-bg);
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 8px;
        }

        /* --- Study Cards Styling (Fade Animation) --- */
        .flashcard-container {
            height: 250px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #flashcard-content {
            width: 100%;
            height: 100%;
            background-color: var(--card-bg);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            transition: opacity 0.3s ease-in-out; /* Fade transition */
        }
        
        .flashcard-front-style {
             font-size: 1.5em;
             font-weight: bold;
        }
        
        .flashcard-back-style {
             font-size: 1.1em;
        }

        /* --- Questions Styling (MCQ & T/F) --- */
         .question-container-single, .question-container-all {
            margin-bottom: 15px;
            padding: 15px;
            border: 1px solid var(--secondary-bg);
            border-radius: 5px;
         }

        .question-text {
            font-weight: bold;
            margin-bottom: 15px;
        }

        .options button, .tf-options button {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-align: right;
            transition: background-color 0.3s;
        }

        .options button:hover:not(:disabled), .tf-options button:hover:not(:disabled) {
            background-color: #357ab8;
        }

        .options button:disabled, .tf-options button:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
        
        /* Specific styling to override disabled opacity for correct/incorrect answers */
        .options button.correct, .tf-options button.correct { opacity: 1; }
        .options button.incorrect, .tf-options button.incorrect { opacity: 1; }


        .feedback {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
        }

        .feedback.correct {
            background-color: var(--correct-color);
            color: #fff;
        }

        .feedback.incorrect {
            background-color: var(--incorrect-color);
            color: #fff;
        }

        .explanation {
            margin-top: 10px;
            font-style: italic;
            font-size: 0.9em;
            padding: 8px;
            background-color: var(--secondary-bg);
            border-radius: 4px;
        }

        /* --- Navigation & Utility Styling --- */
        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            margin-bottom: 10px;
        }

        .nav-button, .view-all-button {
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
        }

        .nav-button:disabled {
             opacity: 0.5;
             cursor: not-allowed;
        }

        .counter {
            font-size: 0.9em;
        }

        .view-all-container {
            text-align: center;
            margin-top: 15px;
            margin-bottom: 15px;
        }

        .hidden {
            display: none;
        }

        #mcq-all-questions .question-container-all,
        #tf-all-questions .question-container-all {
            margin-bottom: 20px;
        }

    </style>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
    <div class="container">
        <h1>מיקרוביולוגיה של היין: תהליכי תסיסה, שמרים וקלקול</h1>

        <!-- Study Cards Section -->
        <div class="section">
            <h2>כרטיסי לימוד</h2>
            <div class="flashcard-container">
                <div id="flashcard-content"></div>
            </div>
            <div class="navigation">
                <button class="nav-button" id="prev-card">הקודם</button>
                <span class="counter" id="card-counter"></span>
                <button class="nav-button" id="next-card">הבא</button>
            </div>
        </div>

        <!-- Multiple Choice Questions Section -->
        <div class="section">
            <h2>שאלות רב-ברירה (אמריקאיות)</h2>
            <div id="mcq-single-view">
                <div class="question-container-single" id="mcq-container">
                    <div class="question-text" id="mcq-question"></div>
                    <div class="options" id="mcq-options"></div>
                    <div class="feedback hidden" id="mcq-feedback"></div>
                    <div class="explanation hidden" id="mcq-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-mcq">הקודם</button>
                    <span class="counter" id="mcq-counter"></span>
                    <button class="nav-button" id="next-mcq">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-mcq">הצג את כל השאלות</button>
                 </div>
            </div>
            <div id="mcq-all-questions" class="hidden">
                <!-- All MCQs will be dynamically inserted here -->
            </div>
        </div>

        <!-- True/False Questions Section -->
        <div class="section">
            <h2>שאלות נכון/לא נכון</h2>
             <div id="tf-single-view">
                <div class="question-container-single" id="tf-container">
                    <div class="question-text" id="tf-question"></div>
                    <div class="tf-options" id="tf-options">
                        <button data-answer="true">נכון</button>
                        <button data-answer="false">לא נכון</button>
                    </div>
                    <div class="feedback hidden" id="tf-feedback"></div>
                    <div class="explanation hidden" id="tf-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-tf">הקודם</button>
                    <span class="counter" id="tf-counter"></span>
                    <button class="nav-button" id="next-tf">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-tf">הצג את כל השאלות</button>
                 </div>
            </div>
             <div id="tf-all-questions" class="hidden">
                 <!-- All T/F Questions will be dynamically inserted here -->
             </div>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        
        const flashcardData = [
            { term: "תירוש (Must)", definition: "מיץ הענבים לפני סיום התסיסה, המכיל רמות סוכר גבוהות ומהווה את חומר הגלם העיקרי לייצור היין." },
            { term: "תסיסה כהלית", definition: "תהליך ביוכימי שבו שמרים ממירים גלוקוז לאתנול ולפחמן דו-חמצני בתנאים אנאירוביים." },
            { term: "תסיסה מלו-לקטית", definition: "תהליך המבוצע על ידי חיידקים שבו חומצה מלית מומרת לחומצה לקטית, מה שמוביל לירידה בחומציות היין והוספת מורכבות." },
            { term: "Saccharomyces cerevisiae", definition: "זן השמרים הנפוץ והחשוב ביותר בתעשיית היין, המסוגל לשרוד בריכוזי אלכוהול של עד 15 אחוזים." },
            { term: "Saccharomyces bayanus", definition: "זן שמרים עמיד במיוחד ללחץ אוסמוטי גבוה ולריכוזי אלכוהול של עד 18 אחוזים, מתאים ליינות חזקים או לתסיסות מאתגרות." },
            { term: "שמפניה", definition: "יין מבעבע המיוצר באזור מוגדר בצרפת, העובר תסיסה שנייה בתוך הבקבוק שכלאת את גז הפחמן הדו-חמצני." },
            { term: "תסיסה תקועה (Stuck Fermentation)", definition: "מצב בעייתי בו תהליך התסיסה נעצר בטרם עת במהלך השלב האקספוננציאלי, או שאינו מתחיל כלל עקב תנאים עוינים." },
            { term: "DAP (Diammonium phosphate)", definition: "תוסף תזונה המכיל חנקן וזרחן, המוסף לתירוש כדי למנוע או לטפל בתסיסה תקועה הנובעת ממחסור בחומרי הזנה לשמרים." },
            { term: "Oenococcus oeni", definition: "חיידק חומצה לקטית הנחשב לרצוי ביותר לביצוע תסיסה מלו-לקטית ביין, שכן אינו מייצר טעמי לוואי פגומים." },
            { term: "Diacetyl", definition: "תרכובת אורגנית הנוצרת כתוצר לוואי של התסיסה המלו-לקטית, המעניקה ליין ארומה חמאתית אופיינית (למשל בשרדונה)." },
            { term: "Brettanomyces", definition: "סוג של שמרי בר הנפוצים בעיקר ביינות אדומים, הגורמים לקלקול וליצירת ריחות לוואי בלתי נעימים המזכירים זיעה או עור." },
            { term: "Acetobacter", definition: "חיידקי קלקול אווירניים המסוגלים לחמצן אתנול לחומצה אצטית, ובכך להפוך יין לחומץ אם הם נחשפים לחמצן." },
            { term: "שלב ה-Lag", definition: "תקופת ההסתגלות הראשונית של השמרים לאחר הוספתם לתירוש, לפני שהם מתחילים להתרבות בקצב מואץ." },
            { term: "חומצה מלית", definition: "חומצה אורגנית בעלת שלד של ארבעה פחמנים המצויה באופן טבעי בענבים, ומהווה את הסובסטרט לתסיסה מלו-לקטית." },
            { term: "רזברטרול (Resveratrol)", definition: "תרכובת נוגדת חמצון המצויה ביין אדום, המקושרת להשפעות בריאותיות חיוביות כגון הפחתת סיכון למחלות לב." }
        ];

        const mcqData = [
            { question: "יצרן יין מבחין כי התסיסה במיכל היין הלבן שלו נעצרה מוקדם מהצפוי. בדיקת מעבדה מראה רמות סוכר גבוהות, ריכוז אלכוהול של 5 אחוזים, וטמפרטורה של 9 מעלות צלזיוס. בהנחה שאין זיהום, מהי הפעולה המיידית והסבירה ביותר שעליו לנקוט כדי לחדש את התסיסה?", options: ["הוספת תרכובות חנקן זמינות מאחר והטמפרטורה אידיאלית ליין לבן אך חסר מזון לשמרים", "חימום המיכל, שכן למרות שזו טמפרטורה מקובלת ליין לבן, ייתכן שהיא קרה מדי עבור זן השמרים הספציפי להתנעת התהליך מחדש", "קירור המיכל ל-4 מעלות צלזיוס כדי למנוע פעילות של חיידקים מתחרים", "הוספת חיידקי חומצה לקטית כדי שיפרקו את הסוכר במקום השמרים"], correctIndex: 1, explanation: "טמפרטורת תסיסה של יין לבן היא אכן 8-10 מעלות, אך במצב של תסיסה תקועה ביין לבן, הפתרון הנדרש הוא חימום קל כדי לעודד את השמרים לחזור לפעילות." },
            { question: "מהו ההבדל הביוכימי המרכזי המתרחש בתסיסה מלו-לקטית, ומדוע הוא מוביל לירידה בחומציות היין?", options: ["המרת חומצה עם 3 פחמנים לחומצה עם 4 פחמנים וספיחת חמצן", "המרת חומצה עם 4 פחמנים (די-חומצה) לחומצה עם 3 פחמנים (חד-חומצה) תוך שחרור פחמן דו-חמצני", "פירוק מוחלט של חומצות אורגניות למים ואתנול על ידי שמרים מיוחדים", "הפיכת חומצה לקטית לחומצה מלית, תהליך שצורך יוני מימן מהתמיסה"], correctIndex: 1, explanation: "התסיסה המלו-לקטית ממירה חומצה מלית (בעלת 4 פחמנים ושתי קבוצות קרבוקסיליות) לחומצה לקטית (בעלת 3 פחמנים וקבוצה קרבוקסילית אחת) ושחרור גז, מה שמחליש את החומציות הכללית." },
            { question: "אילו מהתנאים הבאים מהווה את המכשול הגדול ביותר לשגשוג חיידקי התסיסה המלו-לקטית הרצויים ביין לאחר סיום התסיסה הכהלית?", options: ["ריכוז סוכר גבוה מ-20 אחוזים", "טמפרטורה של 22 מעלות צלזיוס", "רמת חומציות הנמוכה מ-3.1 ונוכחות חומצות שומניות", "היעדר מוחלט של גז פחמן דו-חמצני בנוזל"], correctIndex: 2, explanation: "חיידקים מלו-לקטיים רגישים מאוד לסביבה חומצית ולא יגדלו מתחת ל-pH של 3.1-3.2, וכן הם מעוכבים על ידי חומצות שומניות שהן תוצרי לוואי של התסיסה הכהלית." },
            { question: "מהו ההסבר המדעי לכך שיינות המיוצרים מענבים שנבצרו מאוחר נוטים לחוות תסיסה תקועה בתדירות גבוהה יותר מאשר יינות רגילים?", options: ["הענבים מכילים רמות גבוהות של מתנול הפוגע בדופן תא השמר", "הטמפרטורות הנמוכות של עונת החורף מונעות מהשמרים להתרבות", "הלחץ האוסמוטי הגבוה הנגרם מריכוז סוכר של למעלה מ-30 אחוזים מקשה מאוד על אקלום השמרים", "היעדר מוחלט של חומצה מלית בענבים בשלים מדי מונע את התחלת התסיסה"], correctIndex: 2, explanation: "ריכוז סוכר גבוה מאוד (30-35 אחוזים בבציר מאוחר) יוצר סביבה היפרטונית המפעילה לחץ אוסמוטי כבד על השמרים, מה שמקשה על ההסתגלות והגדילה שלהם." },
            { question: "יינן מעוניין לייצר יין שרדונה בעל ארומה חמאתית מודגשת. איזו התערבות תהליכית תבטיח את התוצאה הטובה ביותר?", options: ["עידוד תסיסה מלו-לקטית מבוקרת לשם יצירת התרכובת דיאצטיל", "הוספת שמרי קרום שיחמצנו את היין באופן מבוקר", "תסיסה בטמפרטורות נמוכות מאוד של 5 מעלות צלזיוס כדי לשמר את חומרי הטעם", "הוספת רמות גבוהות של גופרית דו-חמצנית מיד לאחר הריסוק"], correctIndex: 0, explanation: "הארומה החמאתית האופיינית ליינות שרדונה מסוימים נובעת מנוכחות התרכובת דיאצטיל, שהיא תוצר מובהק של התסיסה המלו-לקטית." },
            { question: "במהלך ייצור יין, הוחלט להפריד את הקליפות והשדרות מיד לאחר הריסוק ולפני התחלת התסיסה, למרות שהשתמשו בענבים אדומים. מה תהיה התוצאה הסבירה ביותר של תהליך זה?", options: ["היין יתקלקל במהירות עקב חוסר בטאנינים משמרים", "יתקבל יין בעל מאפיינים של יין לבן, שכן פיגמנטי הצבע מצויים בקליפות ולא במיץ עצמו", "התסיסה לא תתרחש מכיוון שהשמרים הטבעיים נמצאים אך ורק על השדרות", "יתקבל יין אדום כהה במיוחד אך ללא טעמי עץ"], correctIndex: 1, explanation: "צבע היין האדום מגיע מהשריית הקליפות במיץ במהלך התסיסה. הסרת הקליפות מיד לאחר הריסוק תוביל לקבלת יין לבן (או ורדרד בהיר מאוד), גם אם הענב עצמו היה אדום מבחוץ." },
            { question: "איזה מזני השמרים הבאים ייבחר על ידי יינן הנדרש לייצר יין בעל ריכוז אלכוהול סופי של 17.5 אחוזים, ומדוע?", options: ["Saccharomyces cerevisiae, בשל יכולתו לייצר ארומות פירותיות עדינות", "Saccharomyces pombe, בשל קצב ייצור האלכוהול המהיר שלו", "Saccharomyces bayanus, בשל עמידותו יוצאת הדופן לריכוזי אלכוהול גבוהים וללחץ אוסמוטי", "Acetobacter aceti, בשל יכולתו להמיר סוכר לאלכוהול ביעילות מקסימלית"], correctIndex: 2, explanation: "הזן Saccharomyces bayanus ידוע ביכולתו לשרוד ולפעול בסביבות קיצוניות של עד 18 אחוזי אלכוהול ולחץ אוסמוטי גבוה, לעומת זנים אחרים שקורסים בריכוזים אלו." },
            { question: "בדיקת מעבדה של יין המאוחסן בחביות גילתה נוכחות של חומצה אצטית ברמות הפוסלות את היין לשתייה. אילו מהתרחישים הבאים ככל הנראה איפשר את התפתחות הקלקול?", options: ["חשיפה ממושכת של פני היין לחמצן בטמפרטורה חמימה, שאפשרה לחיידקים אווירניים לשגשג", "אחסון היין בטמפרטורה של 8 מעלות צלזיוס במיכל אטום לחלוטין", "הוספת כמות גדולה מדי של תרכובות חנקן זרחני בשלב התסיסה המוקדם", "ביצוע תסיסה מלו-לקטית באמצעות חיידקי Oenococcus oeni"], correctIndex: 0, explanation: "חומצה אצטית מיוצרת על ידי חיידקי Acetobacter, שהם חיידקים אירוביים (דורשים חמצן) הפעילים בטמפרטורות של 30-35 מעלות צלזיוס ומחמצנים אתנול." },
            { question: "מדוע הוספת חמצן מבוקרת באמצעות שפייה חיונית בשלבים המוקדמים של הכנת היין, למרות שהתסיסה הכהלית עצמה מוגדרת כתהליך אנאירובי?", options: ["מפני שהשמרים זקוקים למעט חמצן כדי לסנתז רכיבי קרום תא חיוניים המאפשרים להם להניץ ולהתרבות", "מפני שהחמצן מגיב ישירות עם הגלוקוז ליצירת אתנול בשלבי התסיסה הראשונים", "מפני שחמצן מונע את התפתחותם של שמרי קרום העלולים לקלקל את התירוש", "מפני שנוכחות חמצן מורידה את הלחץ האוסמוטי במיכל ומקלה על השמרים"], correctIndex: 0, explanation: "אף על פי שיצירת האתנול היא אנאירובית, שמרים חייבים כמות קטנה של חמצן בתחילת התהליך כדי לבנות את קרום התא שלהם, מה שמאפשר חלוקה תאית והגעה למסה מספקת." },
            { question: "במפעל לייצור משקאות מבעבעים, נוצר פגם בייצור וגז הפחמן הדו-חמצני ברח מהבקבוקים לפני שאלו נאטמו סופית. איזה שלב קריטי בתהליך הייצור הקלאסי כשל או לא בוצע כראוי?", options: ["התסיסה הראשונית בחביות הפתוחות", "התסיסה השנייה, שאמורה להתרחש בעוד היין סגור הרמטית בתוך הבקבוק", "תהליך הזיקוק של התירוש לפני הביקבוק", "הוספת חיידקי החומצה הלקטית לפני פקוק הבקבוק"], correctIndex: 1, explanation: "בייצור שמפניה ויינות מבעבעים דומים, הגז נכלא בנוזל כתוצאה מתסיסה שנייה המתרחשת במכוון בתוך הבקבוק הסגור." },
            { question: "אילו מהתרחישים הבאים מדגים בצורה הטובה ביותר את עקרון העיכוב הסינרגיסטי על שמרי התסיסה?", options: ["עיכוב הנובע מחוסר בחנקן יחד עם חוסר בוויטמינים בתירוש", "עיכוב הנובע מנוכחות משולבת של ריכוז סוכר התחלתי גבוה והצטברות אתנול, הפוגעת בשמרים בעוצמה הגדולה מסכום ההשפעות הנפרדות", "עיכוב הנגרם על ידי חשיפה ממושכת לאור שמש ישיר וטמפרטורה נמוכה", "עיכוב כתוצאה מהפרשת רעלנים על ידי שמרי בר הפוגעים בשמרי התרבות"], correctIndex: 1, explanation: "עיכוב סינרגיסטי ביין מתייחס לרוב לשילוב של רמות סוכר גבוהות יחד עם רמות אלכוהול עולות, שילוב שיוצר עקה (סטרס) קשה בהרבה על השמרים מאשר כל גורם בנפרד." },
            { question: "מהו התפקיד הכפול והמכריע של תרכובות הגופרית הדו-חמצנית בתעשיית היין?", options: ["הוספת צבע ליין הלבן והאצת קצב פעילות השמרים", "דיכוי אוכלוסיות מיקרוביאליות מתחרות ומניעת תהליכי חמצון הפוגעים ביין", "הורדת הלחץ האוסמוטי בתירוש והמרת חומצה מלית לחומצה אצטית", "קשירת יוני מתכת כבדה וספיחת טעמי עץ מהחבית"], correctIndex: 1, explanation: "לגופרית דו-חמצנית יש שתי תכונות עיקריות ביין: היא פועלת כאנטי-מיקרוביאלית (מעכבת חיידקים ושמרי בר) וכאנטי-אוקסידנטית (מונעת חמצון של היין)." },
            { question: "מהי הסיבה הביולוגית המרכזית לכך שחיידקים פתוגניים הגורמים למחלות באדם אינם מסוגלים לשרוד ולהוות סכנה בריאותית ביין מוגמר?", options: ["החיידקים הפתוגניים מומתים על ידי קרינת השמש בכרם לפני הבציר", "השילוב של רמת חומציות נמוכה, היעדר חמצן ונוכחות אתנול יוצר סביבה קטלנית עבורם", "שמרי התסיסה טורפים את החיידקים הפתוגניים בשלב ה-Lag", "תהליך הזיקוק שעובר כל יין משמיד את כל צורות החיים בתוכו"], correctIndex: 1, explanation: "יין נחשב לבטוח מבחינה פתוגנית לאדם משום שפתוגנים אינם יכולים לשרוד את התנאים הקיצוניים של היין: רמת אלכוהול גבוהה, חומציות (pH נמוך), היעדר חמצן ונוכחות חומרים משמרים טבעיים." },
            { question: "על פי המודל המדעי המוצג, מהו המנגנון המולקולרי המסביר את הפגיעה העוברית המוכרת כתסמונת האלכוהול העוברית?", options: ["האתנול גורם למוטציות ישירות ב-DNA של העובר בשלבי החלוקה הראשונים", "האתנול פועל כאנטגוניסט לרטינול, מעכב את הפיכתו לחומצה רטינואית, ופוגע בתפקוד מארגן שפמן האחראי על התפתחות מערכת העצבים", "האתנול מאיץ את קצב חילוף החומרים בכבד העובר וגורם להרעלת פחמן דו-חמצני", "האתנול חוסם את מעבר החמצן דרך השליה וגורם לחנק תאי"], correctIndex: 1, explanation: "המודל מציע שאתנול מתחרה או מעכב את ההמרה של ויטמין A (רטינול) לחומצה רטינואית, מולקולה קריטית לאיתות תאי ולהתפתחות מערכת העצבים המרכזית דרך מארגן שפמן." },
            { question: "יין אדום עבר תסיסה כהלית מלאה וסונן. לאחר חודש אחסון בבקבוק בטמפרטורת החדר, היינן מבחין בעלייה מחודשת בבועות גז ועכירות קלה. איזה תהליך מיקרוביאלי סביר שגרם לתופעה זו בהנחה שלא הוספו חיידקים?", options: ["תסיסה כהלית משנית הנגרמת על ידי שמרים ששרדו את הסינון והחלו לפרק סוכר שיורי", "חמצון אירובי של אתנול על ידי חיידקי Acetobacter בתוך הבקבוק האטום", "פעילות של שמרי קרום שיצרו מושבות על פני הנוזל", "פירוק מוחלט של הטאנינים על ידי פטריית הבורטריטיס"], correctIndex: 0, explanation: "נוכחות של שמרי תסיסה בבקבוק יחד עם סוכר שיורי עלולה להוביל לתסיסה משנית לא רצויה, שחרור גזים ואף לפיצוץ הבקבוק עקב עליית הלחץ." },
            { question: "איזה מהתהליכים הבאים מתרחש במהלך יישון יין בחבית עץ אלון ותורם למורכבות האורגנולפטית שלו?", options: ["החבית משחררת סוכרים המותססים מחדש על ידי השמרים", "מתרחש חמצון איטי מאוד דרך נקבוביות העץ, והחבית סופחת אליה תרכובות חזקות כגון טאנינים ואנתוציאנינים", "החבית אטומה לחלוטין לחמצן, מה שמאפשר לחיידקים אנאירוביים לייצר חומצה אצטית", "העץ מפריש אנזימים המפרקים את האלכוהול חזרה לגלוקוז מורכב"], correctIndex: 1, explanation: "חביות עץ אלון אינן אטומות לחלוטין. הן מאפשרות חדירה מיקרוסקופית של חמצן המעדנת את היין, ובמקביל סופגות תרכובות טעם חזקות ומשחררות טעמי עץ ווניל אל תוך הנוזל." },
            { question: "מה מאפיין את פעילותם של שמרי קרום (Surface-film yeast) המעורבים לעיתים בקלקול יין או בייצור יינות ספציפיים כמו שרי?", options: ["הם פועלים באופן אנאירובי מוחלט בקרקעית המיכל ומייצרים גז מתאן", "הם פועלים באופן אירובי על פני הנוזל, דורשים חמצן, ומחמצנים אתנול לאצטאלדהיד", "הם מפרישים רעלנים הקוטלים את כל שאר המיקרואורגניזמים ביין", "הם מפרקים את הטאנינים ביין והופכים אותו לשקוף וחסר צבע"], correctIndex: 1, explanation: "שמרי קרום יוצרים קרום על פני היין החשוף לאוויר. הם זקוקים לחמצן כדי לשגשג ומחמצנים את האלכוהול לאצטאלדהיד, מה שמקנה טעם חמצמץ דמוי שרי." },
            { question: "אם במהלך ייצור יין הושמט בטעות שלב הוספת ה-DAP לתירוש שגדל בקרקע ענייה, איזו בעיה תהליכית צפויה להתרחש?", options: ["היין יקבל צבע חום כהה עקב חמצון יתר", "התסיסה הכהלית עלולה להיתקע עקב מחסור חמור במקורות חנקן הזמינים לשמרים", "חיידקי החומצה הלקטית יתרבו ללא בקרה וייצרו כמויות עצומות של דיאצטיל", "נקודת הרתיחה של היין תרד משמעותית ותקשה על ביקבוקו"], correctIndex: 1, explanation: "החומר DAP משמש כמקור לחנקן זמין (YAN). מחסור בחנקן הוא אחד הגורמים העיקריים לתסיסה תקועה, מכיוון שהשמרים אינם יכולים לבנות חלבונים ולהתרבות." },
            { question: "מהו היתרון המרכזי בשימוש בחיידקי Oenococcus oeni על פני השימוש בחיידקי Pediococcus לביצוע תסיסה מלו-לקטית?", options: ["הם מסוגלים לפרק סוכר לאלכוהול בנוסף לפירוק החומצה המלית", "הם עמידים לחלוטין לחמצן ואינם זקוקים לסביבה אנאירובית", "הם מבצעים את המרת החומצה מבלי לייצר טעמי לוואי וריחות פגומים המאפיינים חיידקי קלקול", "הם מסוגלים לשרוד בטמפרטורות קיפאון ולהמשיך בתסיסה בתוך המקרר"], correctIndex: 2, explanation: "בעוד ששני סוגי החיידקים יכולים לבצע המרה מלו-לקטית, חיידקי Pediococcus ו-Lactobacillus נחשבים לגורמי קלקול ביין מכיוון שהם מייצרים תרכובות ריח וטעם לא נעימות, לעומת Oenococcus oeni שהוא רצוי ואלגנטי יותר." },
            { question: "בתהליך זיקוק קלאסי של תערובת מים ואלכוהול, מדוע האלכוהול מתאדה ועובר לעיבוי לפני המים כאשר מחממים את התערובת ל-90 מעלות צלזיוס?", options: ["מפני שהאלכוהול כבד יותר ממים ושוקע לקרקעית המחוממת", "מפני שנקודת הרתיחה של אתנול היא 78.37 מעלות צלזיוס, שהיא נמוכה משמעותית מנקודת הרתיחה של המים", "מפני שהאלכוהול מגיב עם החמצן באוויר ויוצר גז נדיף בטמפרטורת החדר", "מפני שהמים יוצרים קשרי מימן חזקים עם השמרים המונעים את אידוים"], correctIndex: 1, explanation: "זיקוק מבוסס על הבדלים בנקודות רתיחה. אתנול רותח בטמפרטורה נמוכה ממים, ולכן כשמחממים תערובת שלהם, האתנול מתאדה ראשון, נאסף ומעובה חזרה לנוזל בריכוז גבוה יותר." },
            { question: "איזה מהגורמים הבאים אינו נחשב למעכב של גידול שמרי התסיסה בתירוש נורמלי?", options: ["ריכוז סוכר של 35 אחוזים", "ריכוז אתנול של 16 אחוזים", "נוכחות של חומרי הדברה אנטי-פטריות שרוססו על הענבים", "ריכוז גלוקוז התחלתי של 15 אחוזים"], correctIndex: 3, explanation: "ריכוז סוכר של 15 אחוזים הוא אידיאלי ותקין לתחילת תסיסה. לעומת זאת, ריכוזים גבוהים מאוד (35%), רמות אלכוהול גבוהות, או שאריות חומרי הדברה מהווים גורמים מעכבים." },
            { question: "באיזה תרחיש תסיסה מלו-לקטית תיחשב כקלקול חמור של היין ולא כתהליך השבחה רצוי?", options: ["כאשר היא מתרחשת ביינות אדומים המיועדים ליישון ארוך", "כאשר היא מתרחשת באופן לא מבוקר בתוך בקבוק יין שכבר שווק לצרכן, מה שמוביל לעכירות ולפליטת גזים בפתיחה", "כאשר היא מורידה את החומציות של יין לבן צעיר", "כאשר היא מבוצעת על ידי חיידקי Oenococcus oeni בסביבה מבוקרת טמפרטורה"], correctIndex: 1, explanation: "תסיסה מלו-לקטית חייבת להסתיים לפני ביקבוק היין. אם חיידקים שורדים בבקבוק ומתחילים לפעול, הם ייצרו גז פחמן דו-חמצני וטעמי לוואי שיהפכו יין שקט למבעבע ועכור בניגוד לכוונת היינן." },
            { question: "מה תהיה התוצאה המיידית אם יינן ינסה להתניע תסיסה מלו-לקטית ביין בעל חומציות גבוהה מאוד המתבטאת ב-pH של 2.9?", options: ["התסיסה תתרחש במהירות שיא עקב זמינות יוני המימן", "התסיסה לא תתרחש כלל, שכן החיידקים המלו-לקטיים רגישים מאוד לחומציות גבוהה ואינם גדלים מתחת ל-pH של 3.1", "החיידקים ימירו את החומצה המלית לחומצה אצטית במקום לחומצה לקטית", "השמרים יתקפו את החיידקים וימנעו את פעילותם"], correctIndex: 1, explanation: "תנאי הסף לגידול חיידקי חומצה לקטית ביין הוא pH של 3.1 לפחות. בסביבה חומצית יותר (כמו 2.9), הם פשוט לא ישרדו ולא יתרבו." },
            { question: "מהי מטרת השימוש המכוון בשמרי Killer yeast בתעשיית היין המודרנית?", options: ["לפרק את האלכוהול חזרה לסוכר כדי לייצר יינות קינוח מתוקים", "להבטיח שליטה מלאה בתהליך התסיסה על ידי הפרשת רעלנים שקוטלים זני שמרי בר מתחרים המצויים על הענבים", "לשפר את צבע היין האדום על ידי פירוק הפיגמנטים בקליפה", "למנוע התפתחות של פטריית הבורטריטיס בכרם לפני הבציר"], correctIndex: 1, explanation: "זני קילר מפרישים חלבונים רעילים הקטלניים לזני שמרים אחרים (רגישים), ובכך הם מחסלים את התחרות ומבטיחים שהתסיסה תתבצע רק על ידי הזן הרצוי שהוסף על ידי היינן." },
            { question: "איזה חומר רעיל ומסוכן עלול להיווצר כתוצאה מזיהום מיקרוביאלי ותהליכי פירוק לא תקינים במהלך ייצור משקאות אלכוהוליים חובבניים, וגורם לפגיעה מהירה וחמורה בכבד ובראייה?", options: ["אתנול טהור", "חומצה לקטית", "דיאצטיל", "מתנול"], correctIndex: 3, explanation: "מתנול (כוהל מתיל) הוא תוצר לוואי רעיל שעלול להיווצר מפירוק פקטין בתנאי תסיסה לא מבוקרים או זיהומים, וצריכתו מסוכנת מאוד ומובילה לעיוורון ולפגיעה קשה בכבד." },
            { question: "מהי הסיבה המרכזית לכך שתהליך התסיסה של יין לבן אורך בדרך כלל זמן רב יותר מתהליך התסיסה של יין אדום?", options: ["יין לבן מכיל רמות סוכר גבוהות יותר הדורשות זמן פירוק כפול", "התסיסה של יין לבן מתבצעת בטמפרטורות נמוכות של 8 עד 10 מעלות צלזיוס, מה שמאט משמעותית את קצב הפעילות המטבולית של השמרים", "היעדר הקליפות ביין לבן מונע מהשמרים להתרבות", "יין לבן עובר תמיד תסיסה מלו-לקטית במקביל לתסיסה הכהלית"], correctIndex: 1, explanation: "כדי לשמר את הארומות הפירותיות והעדינות, יין לבן מותסס בטמפרטורות נמוכות בהרבה מיין אדום. קור מאט תהליכים ביולוגיים, ולכן התסיסה נמשכת זמן רב יותר." },
            { question: "אילו תוצרי לוואי טבעיים של התסיסה הכהלית ידועים כגורמים המעכבים את תחילתה של התסיסה המלו-לקטית שאמורה להתרחש אחריה?", options: ["גלוקוז ופרוקטוז", "מים ופחמן דו-חמצני", "חומצות שומניות ואתנול בריכוז גבוה", "פיגמנטים של צבע וטאנינים"], correctIndex: 2, explanation: "החיידקים המלו-לקטיים מתקשים לגדול בסביבה שמכילה ריכוז אלכוהול גבוה וחומצות שומניות, שהם תוצרים ישירים של פעילות השמרים בשלב הקודם." },
            { question: "באיזה אופן משפיע חומר הגלם על סוג התסיסה האלכוהולית, כפי שניתן לראות בתהליך המסורתי של ייצור בירה או משקאות מבוססי אורז?", options: ["אורז מכיל גלוקוז חופשי ולכן התסיסה מהירה יותר מאשר בענבים", "השימוש במקורות עמילניים כמו אורז דורש שימוש באנזימים (כמו מלתת או פטריות) לפירוק העמילן לסוכרים פשוטים לפני שהשמרים יוכלו להתסיס אותם", "חומרי גלם עמילניים אינם ניתנים להתססה כלל ללא זיקוק מוקדם", "השמרים המשמשים באורז מייצרים מתנול במקום אתנול"], correctIndex: 1, explanation: "שמרים אינם מסוגלים לפרק עמילן מורכב. לכן, במשקאות כמו סאקה או בירה מאורז/שעורה, יש צורך בשלב מקדים של פירוק אנזימטי (על ידי פטריית אספרגילוס או לתת) כדי להמיר את העמילן לסוכרים זמינים לתסיסה." },
            { question: "מדוע קלקול הנגרם על ידי השמר Zygosaccharomyces bailii נחשב לבעיה קשה במיוחד בייצור יינות מתוקים או מוצרים עתירי סוכר?", options: ["מפני שהוא דורש חמצן רב ולכן גורם לחמצון מהיר של המשקה", "מפני שהוא שמר אוסמופילי המותאם לשגשג בסביבות בעלות ריכוז סוכר גבוה מאוד ולחץ אוסמוטי קיצוני, היכן שמיקרואורגניזמים אחרים מתים", "מפני שהוא מפרק את האלכוהול חזרה למים ופחמן דו-חמצני", "מפני שהוא הופך את היין למוצק דמוי ג'לי"], correctIndex: 1, explanation: "מיקרואורגניזמים אוסמופיליים הם כאלה שאוהבים או מסוגלים לשרוד בסביבות עם לחץ אוסמוטי גבוה (הרבה מומסים, כמו סוכר). זן זה מהווה סכנה גדולה ליינות קינוח ורכזים." },
            { question: "מה מאפיין את השלב הסטציונרי בעקומת הגידול הקלאסית של שמרי היין במהלך התסיסה?", options: ["השמרים רק מתחילים להסתגל לסביבה ולא נצפית חלוקה תאית", "קצב התמותה עולה על קצב הגידול וריכוז הסוכר נשאר קבוע", "מספר השמרים מגיע לשיא ומתייצב, מאגר חומרי המזון מתדלדל, אך ריכוז האלכוהול ממשיך לעלות עקב פעילות מטבולית של התאים הקיימים", "השמרים מתחילים לייצר חמצן במקום פחמן דו-חמצני"], correctIndex: 2, explanation: "בשלב הסטציונרי, אוכלוסיית השמרים מפסיקה לגדול בנפחה עקב חוסר במשאבים, אך התאים החיים עדיין פעילים מטבולית וממשיכים להמיר את שאריות הסוכר לאלכוהול עד שהם נכנסים לשלב הדעיכה." },
            { question: "על פי החלוקה הטקסונומית, שמרים ממשפחת ה-Saccharomyceteceae משתייכים למערכת ה-Ascomycetes. מהו המאפיין הביולוגי המגדיר מערכת זו?", options: ["יכולתם לבצע פוטוסינתזה באור שמש ישיר", "היותם חיידקים חסרי גרעין אמיתי", "היותם שמרים המייצרים נבגים (ספורות) בתוך מבנה מיקרוסקופי דמוי שק הנקרא אסקוס", "היכולת שלהם לנוע בנוזל באמצעות שוטונים"], correctIndex: 2, explanation: "השם Ascomycetes נגזר מהמילה היוונית 'אסקוס' שמשמעותה שק. אלו פטריות/שמרים המייצרים את נבגי הרביה שלהם בתוך מבנה שקי." },
            { question: "יינן מאבחן תסיסה תקועה ומגלה כי הסיבה היא הצטברות גדולה של שמרים מתים בקרקעית המיכל, היוצרים סביבה רעילה לשמרים החיים המעטים שנותרו. מהי דרך הפעולה המומלצת?", options: ["הוספת סוכר נוסף כדי לעודד את השמרים המתים לחזור לחיים", "הוספת ריכוז גבוה של גופרית דו-חמצנית להשמדת השמרים החיים", "ביצוע שפייה (העברת הנוזל הנקי תוך השארת המשקע מאחור), אוורור קל, והוספת מנה חדשה של שמרים פעילים וחומרי הזנה", "אטימת המיכל לחלוטין והמתנה של שנה נוספת"], correctIndex: 2, explanation: "כאשר יש מסה גדולה של שמרים מתים המעכבת את התהליך, יש להפריד את היין מהמשקע הפגום (שפייה), לאוורר כדי לסלק גזים רעילים, ולהתניע מחדש עם תרבית שמרים חדשה ורעננה." },
            { question: "איזה מיקרואורגניזם קשור באופן ישיר להופעת ריחות פגומים המזכירים זיעה, פלסטר או עור סוס ביינות אדומים?", options: ["Saccharomyces cerevisiae", "Brettanomyces", "Oenococcus oeni", "Lactobacillus"], correctIndex: 1, explanation: "שמר הבר Brettanomyces נחשב לאחד מגורמי הקלקול המוכרים ביינות אדומים, והוא מייצר תרכובות פנוליות המעניקות ליין ריחות חזקים המזכירים חיות משק או חומרי חיטוי." },
            { question: "מהי ההשפעה הפיזיולוגית המיוחסת לצריכה מתונה של יין אדום, המהווה את הבסיס למונח 'הפרדוקס הצרפתי'?", options: ["ירידה ברמות החמצן בדם עקב נוכחות אתנול", "העלאת רמות הליפופרוטאינים בצפיפות גבוהה (HDL - הכולסטרול הטוב) ופעילות נוגדת חמצון של חומרים כמו רזברטרול", "פגיעה בתפקוד הכבד המונעת ספיגת שומנים מהמזון", "עיכוב של מערכת העצבים המרכזית המוביל לירידה בלחץ הדם בלבד"], correctIndex: 1, explanation: "הפרדוקס הצרפתי מתייחס לתצפית לפיה בצרפת יש תחלואת לב נמוכה למרות תזונה עשירה בשומן, תופעה המיוחסת חלקית לצריכת יין אדום המכיל רזברטרול ומעלה HDL." },
            { question: "מדוע מדידת ריכוז הסוכר ההתחלתי בתירוש (נמדד ביחידות Brix) היא פרמטר קריטי וראשוני להצלחת ייצור היין?", options: ["מפני שהסוכר קובע את צבע היין הסופי לאחר התסיסה", "מפני שהיא מאפשרת לחשב במדויק את רמת ה-pH הסופית של המשקה", "מפני שריכוז הסוכר קובע את הפוטנציאל המקסימלי לייצור אלכוהול, וכאשר הוא חורג מהנורמה הוא עלול לעכב את השמרים עקב לחץ אוסמוטי", "מפני ששמרים אינם יכולים לפרק סוכר אם ערך ה-Brix נמוך מ-25"], correctIndex: 2, explanation: "רמת ה-Brix מייצגת את אחוז הסוכר. היא מנבאת כמה אלכוהול ייווצר (בערך חצי מערך ה-Brix יהפוך לאחוז אלכוהול). רמה גבוהה מדי תיצור לחץ אוסמוטי שימנע תסיסה." },
            { question: "באיזה שלב של הכנת יין אדום מסורתי מתבצעת הפרדת הנוזל מהקליפות והשדרות (Pressing)?", options: ["מיד לאחר ריסוק הענבים ולפני הוספת השמרים", "לאחר סיום התסיסה הכהלית, כדי לאפשר למיץ לשהות עם הקליפות ולמצות מהן צבע, טאנינים וטעמים מורכבים", "רק לאחר שהיין יושן בחביות עץ אלון במשך שנה", "לפני בציר הענבים מהגפן"], correctIndex: 1, explanation: "בניגוד ליין לבן, ביין אדום התסיסה מתבצעת יחד עם הקליפות (Maceration/Fermentation on skins). רק לאחר שהתסיסה מסתיימת והצבע מוצה, הנוזל נסחט ומופרד מהמוצקים." },
            { question: "מה המשמעות של המונח Proof בהקשר של משקאות אלכוהוליים מזוקקים?", options: ["מדד המציין את שנת הבציר של חומר הגלם", "מדד היסטורי לריכוז אלכוהול, שבו ערך של 100 Proof שווה לכ-50 אחוז אלכוהול בנפח", "יחידת מידה למשקל החבית שבה יושן המשקה", "מדד לרמת הרעילות של המשקה המזוקק"], correctIndex: 1, explanation: "המונח Proof מקורו בבדיקה היסטורית שבה אלכוהול הוצת עם אבקת שריפה כדי להוכיח (Proof) את חוזקו. בארה\"ב, 100 Proof שווה ל-50% אלכוהול בנפח." },

            mcqOptions.innerHTML = '';
            mcqFeedback.classList.add('hidden');
            mcqExplanation.classList.add('hidden');
            qData.options.forEach((option, i) => {
                const button = document.createElement('button');
                button.innerHTML = option;
                button.onclick = () => handleMCQAnswer(index, i);
                mcqOptions.appendChild(button);
            });
            mcqCounter.textContent = `שאלה ${index + 1} / ${mcqData.length}`;
            prevMCQBtn.disabled = index === 0;
            nextMCQBtn.disabled = index === mcqData.length - 1;
            if (mcqAnswers[index] !== null) {
                highlightMCQAnswer(mcqOptions, mcqFeedback, mcqExplanation, index, mcqAnswers[index].selected);
            }
            if (window.MathJax) { MathJax.typesetPromise([mcqQuestion, mcqOptions]); }
        }

        function handleMCQAnswer(qIndex, selectedIndex) {
            if (mcqAnswers[qIndex] !== null) return;
            const isCorrect = selectedIndex === mcqData[qIndex].correctIndex;
            mcqAnswers[qIndex] = { selected: selectedIndex, correct: isCorrect };
            highlightMCQAnswer(mcqOptions, mcqFeedback, mcqExplanation, qIndex, selectedIndex);
        }
        
        function highlightMCQAnswer(optionsContainer, feedbackEl, explanationEl, qIndex, selectedIndex) {
            const qData = mcqData[qIndex];
            const buttons = optionsContainer.querySelectorAll('button');
            buttons.forEach((button, i) => {
                button.disabled = true;
                if (i === qData.correctIndex) {
                    button.style.backgroundColor = 'var(--correct-color)';
                    button.style.color = '#fff';
                    button.classList.add('correct');
                }
                if (i === selectedIndex && i !== qData.correctIndex) {
                    button.style.backgroundColor = 'var(--incorrect-color)';
                    button.style.color = '#fff';
                    button.classList.add('incorrect');
                }
            });
            feedbackEl.textContent = selectedIndex === qData.correctIndex ? "נכון!" : "לא נכון.";
            feedbackEl.className = `feedback ${selectedIndex === qData.correctIndex ? 'correct' : 'incorrect'}`;
            explanationEl.innerHTML = `הסבר: ${qData.explanation}`;
            explanationEl.classList.remove('hidden');
            if (window.MathJax) { MathJax.typesetPromise([explanationEl]); }
        }

        function displayAllMCQ() {
            if (!mcqData || mcqData.length === 0) return;
            mcqSingleView.classList.add('hidden');
            mcqAllQuestionsContainer.innerHTML = ''; 
            mcqData.forEach((qData, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question-container-all';
                questionDiv.innerHTML = `
                    <div class="question-text">${index + 1}. ${qData.question}</div>
                    <div class="options">
                        ${qData.options.map((option, i) => `<button data-qindex="${index}" data-oindex="${i}">${option}</button>`).join('')}
                    </div>
                    <div class="feedback hidden"></div>
                    <div class="explanation hidden"></div>
                `;
                mcqAllQuestionsContainer.appendChild(questionDiv);
                 const optionButtons = questionDiv.querySelectorAll('.options button');
                 optionButtons.forEach(button => {
                     button.onclick = () => {
                        const qIndex = parseInt(button.dataset.qindex);
                        const oIndex = parseInt(button.dataset.oindex);
                        if (mcqAnswers[qIndex] === null) {
                            const isCorrect = oIndex === mcqData[qIndex].correctIndex;
                            mcqAnswers[qIndex] = { selected: oIndex, correct: isCorrect };
                        }
                        const optionsDiv = button.closest('.options');
                        const feedbackDiv = questionDiv.querySelector('.feedback');
                        const explanationDiv = questionDiv.querySelector('.explanation');
                        highlightMCQAnswer(optionsDiv, feedbackDiv, explanationDiv, qIndex, mcqAnswers[qIndex].selected);
                     };
                 });
                 if (mcqAnswers[index] !== null) {
                    const optionsDiv = questionDiv.querySelector('.options');
                    const feedbackDiv = questionDiv.querySelector('.feedback');
                    const explanationDiv = questionDiv.querySelector('.explanation');
                    highlightMCQAnswer(optionsDiv, feedbackDiv, explanationDiv, index, mcqAnswers[index].selected);
                 }
            });
            mcqAllQuestionsContainer.classList.remove('hidden');
            if (window.MathJax) { MathJax.typesetPromise([mcqAllQuestionsContainer]); }
        }

        function displayTFQuestion(index) {
            if (!tfData || tfData.length === 0) return;
            const qData = tfData[index];
            tfQuestion.innerHTML = qData.question;
            tfFeedback.classList.add('hidden');
            tfExplanation.classList.add('hidden');
             const buttons = tfOptionsContainer.querySelectorAll('button');
             buttons.forEach(button => {
                 button.disabled = false;
                 button.style.backgroundColor = '';
                 button.style.color = '';
                 button.classList.remove('correct', 'incorrect');
                 button.onclick = () => handleTFAnswer(index, button.dataset.answer === 'true');
             });
            tfCounter.textContent = `שאלה ${index + 1} / ${tfData.length}`;
            prevTFBtn.disabled = index === 0;
            nextTFBtn.disabled = index === tfData.length - 1;
            if (tfAnswers[index] !== null) {
                highlightTFAnswer(tfOptionsContainer, tfFeedback, tfExplanation, index, tfAnswers[index].selected);
            }
            if (window.MathJax) { MathJax.typesetPromise([tfQuestion]); }
        }
        
        function handleTFAnswer(qIndex, selectedAnswer) {
            if (tfAnswers[qIndex] !== null) return;
            const isCorrect = selectedAnswer === tfData[qIndex].answer;
            tfAnswers[qIndex] = { selected: selectedAnswer, correct: isCorrect };
            highlightTFAnswer(tfOptionsContainer, tfFeedback, tfExplanation, qIndex, selectedAnswer);
        }
        
        function highlightTFAnswer(optionsContainer, feedbackEl, explanationEl, qIndex, selectedAnswer) {
             const qData = tfData[qIndex];
             const buttons = optionsContainer.querySelectorAll('button');
             buttons.forEach(button => {
                 const buttonAnswer = button.dataset.answer === 'true';
                 button.disabled = true;
                 if (buttonAnswer === qData.answer) {
                     button.style.backgroundColor = 'var(--correct-color)';
                     button.style.color = '#fff';
                     button.classList.add('correct');
                 }
                 if (buttonAnswer === selectedAnswer && buttonAnswer !== qData.answer) {
                     button.style.backgroundColor = 'var(--incorrect-color)';
                     button.style.color = '#fff';
                     button.classList.add('incorrect');
                 }
             });
             feedbackEl.textContent = selectedAnswer === qData.answer ? "נכון!" : "לא נכון.";
             feedbackEl.className = `feedback ${selectedAnswer === qData.answer ? 'correct' : 'incorrect'}`;
             explanationEl.innerHTML = `הסבר: ${qData.explanation}`;
             explanationEl.classList.remove('hidden');
             if (window.MathJax) { MathJax.typesetPromise([explanationEl]); }
        }
        
        function displayAllTF() {
             if (!tfData || tfData.length === 0) return;
             tfSingleView.classList.add('hidden');
             tfAllQuestionsContainer.innerHTML = '';
             tfData.forEach((qData, index) => {
                 const questionDiv = document.createElement('div');
                 questionDiv.className = 'question-container-all';
                 questionDiv.innerHTML = `
                     <div class="question-text">${index + 1}. ${qData.question}</div>
                     <div class="tf-options">
                         <button data-qindex="${index}" data-answer="true">נכון</button>
                         <button data-qindex="${index}" data-answer="false">לא נכון</button>
                     </div>
                     <div class="feedback hidden"></div>
                     <div class="explanation hidden"></div>
                 `;
                 tfAllQuestionsContainer.appendChild(questionDiv);
                 const optionButtons = questionDiv.querySelectorAll('.tf-options button');
                 optionButtons.forEach(button => {
                     button.onclick = () => {
                         const qIndex = parseInt(button.dataset.qindex);
                         const selectedAnswer = button.dataset.answer === 'true';
                         if (tfAnswers[qIndex] === null) {
                             const isCorrect = selectedAnswer === tfData[qIndex].answer;
                             tfAnswers[qIndex] = { selected: selectedAnswer, correct: isCorrect };
                         }
                         const optionsDiv = button.closest('.tf-options');
                         const feedbackDiv = questionDiv.querySelector('.feedback');
                         const explanationDiv = questionDiv.querySelector('.explanation');
                         highlightTFAnswer(optionsDiv, feedbackDiv, explanationDiv, qIndex, tfAnswers[qIndex].selected);
                     };
                 });
                 if (tfAnswers[index] !== null) {
                    const optionsDiv = questionDiv.querySelector('.tf-options');
                    const feedbackDiv = questionDiv.querySelector('.feedback');
                    const explanationDiv = questionDiv.querySelector('.explanation');
                    highlightTFAnswer(optionsDiv, feedbackDiv, explanationDiv, index, tfAnswers[index].selected);
                 }
             });
             tfAllQuestionsContainer.classList.remove('hidden');
             if (window.MathJax) { MathJax.typesetPromise([tfAllQuestionsContainer]); }
        }

        function initialize() {
            if (flashcardData.length > 0) displayCard(currentCardIndex);
            if (mcqData.length > 0) displayMCQuestion(currentMCQIndex);
            if (tfData.length > 0) displayTFQuestion(currentTFIndex);
            flashcardContent.addEventListener('click', flipCard);
            prevCardBtn.addEventListener('click', () => { if (currentCardIndex > 0) { currentCardIndex--; displayCard(currentCardIndex); } });
            nextCardBtn.addEventListener('click', () => { if (currentCardIndex < flashcardData.length - 1) { currentCardIndex++; displayCard(currentCardIndex); } });
            prevMCQBtn.addEventListener('click', () => { if (currentMCQIndex > 0) { currentMCQIndex--; displayMCQuestion(currentMCQIndex); } });
            nextMCQBtn.addEventListener('click', () => { if (currentMCQIndex < mcqData.length - 1) { currentMCQIndex++; displayMCQuestion(currentMCQIndex); } });
            viewAllMCQBtn.addEventListener('click', displayAllMCQ);
            prevTFBtn.addEventListener('click', () => { if (currentTFIndex > 0) { currentTFIndex--; displayTFQuestion(currentTFIndex); } });
            nextTFBtn.addEventListener('click', () => { if (currentTFIndex < tfData.length - 1) { currentTFIndex++; displayTFQuestion(currentTFIndex); } });
            viewAllTFBtn.addEventListener('click', displayAllTF);
        }
        
        initialize();
    });
    </script>
</body>
</html>
