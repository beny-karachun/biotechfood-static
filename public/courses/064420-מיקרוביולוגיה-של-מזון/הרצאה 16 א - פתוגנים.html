<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Study Tool</title>
    <style>
        /* --- Root Variables for Consistent Theming --- */
        :root {
            --primary-bg: #333333;
            --secondary-bg: #666666;
            --accent-color: #3D90D7;
            --text-color: #E0E0E0;
            --correct-color: #4CAF50;
            --incorrect-color: #F44336;
            --card-bg: #5a5a5a;
        }

        /* --- Global Styles --- */
        body {
            background-color: var(--primary-bg);
            color: var(--text-color);
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 90%; /* As per prompt */
            margin: 20px auto;
            padding: 20px;
            background-color: var(--secondary-bg);
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        h1, h2 {
            color: var(--accent-color);
            text-align: center;
            border-bottom: 1px solid var(--accent-color);
            padding-bottom: 10px;
        }

        .section {
            background-color: var(--primary-bg);
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 8px;
        }

        /* --- Study Cards Styling (Fade Animation) --- */
        .flashcard-container {
            height: 250px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #flashcard-content {
            width: 100%;
            height: 100%;
            background-color: var(--card-bg);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            transition: opacity 0.3s ease-in-out; /* Fade transition */
        }
        
        .flashcard-front-style {
             font-size: 1.5em;
             font-weight: bold;
        }
        
        .flashcard-back-style {
             font-size: 1.1em;
        }

        /* --- Questions Styling (MCQ & T/F) --- */
         .question-container-single, .question-container-all {
            margin-bottom: 15px;
            padding: 15px;
            border: 1px solid var(--secondary-bg);
            border-radius: 5px;
         }

        .question-text {
            font-weight: bold;
            margin-bottom: 15px;
        }

        .options button, .tf-options button {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-align: right;
            transition: background-color 0.3s;
        }

        .options button:hover:not(:disabled), .tf-options button:hover:not(:disabled) {
            background-color: #357ab8;
        }

        .options button:disabled, .tf-options button:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
        
        /* Specific styling to override disabled opacity for correct/incorrect answers */
        .options button.correct, .tf-options button.correct { opacity: 1; }
        .options button.incorrect, .tf-options button.incorrect { opacity: 1; }


        .feedback {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
        }

        .feedback.correct {
            background-color: var(--correct-color);
            color: #fff;
        }

        .feedback.incorrect {
            background-color: var(--incorrect-color);
            color: #fff;
        }

        .explanation {
            margin-top: 10px;
            font-style: italic;
            font-size: 0.9em;
            padding: 8px;
            background-color: var(--secondary-bg);
            border-radius: 4px;
        }

        /* --- Navigation & Utility Styling --- */
        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            margin-bottom: 10px;
        }

        .nav-button, .view-all-button {
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
        }

        .nav-button:disabled {
             opacity: 0.5;
             cursor: not-allowed;
        }

        .counter {
            font-size: 0.9em;
        }

        .view-all-container {
            text-align: center;
            margin-top: 15px;
            margin-bottom: 15px;
        }

        .hidden {
            display: none;
        }

        #mcq-all-questions .question-container-all,
        #tf-all-questions .question-container-all {
            margin-bottom: 20px;
        }

    </style>
    <!-- MathJax Configuration -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
    <div class="container">
        <h1>מיקרואורגניזמים פתוגנים לאדם</h1>

        <!-- Study Cards Section -->
        <div class="section">
            <h2>כרטיסי לימוד</h2>
            <div class="flashcard-container">
                <div id="flashcard-content"></div>
            </div>
            <div class="navigation">
                <button class="nav-button" id="prev-card">הקודם</button>
                <span class="counter" id="card-counter"></span>
                <button class="nav-button" id="next-card">הבא</button>
            </div>
        </div>

        <!-- Multiple Choice Questions Section -->
        <div class="section">
            <h2>שאלות רב-ברירה (אמריקאיות)</h2>
            <div id="mcq-single-view">
                <div class="question-container-single" id="mcq-container">
                    <div class="question-text" id="mcq-question"></div>
                    <div class="options" id="mcq-options"></div>
                    <div class="feedback hidden" id="mcq-feedback"></div>
                    <div class="explanation hidden" id="mcq-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-mcq">הקודם</button>
                    <span class="counter" id="mcq-counter"></span>
                    <button class="nav-button" id="next-mcq">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-mcq">הצג את כל השאלות</button>
                 </div>
            </div>
            <div id="mcq-all-questions" class="hidden">
                <!-- All MCQs will be dynamically inserted here -->
            </div>
        </div>

        <!-- True/False Questions Section -->
        <div class="section">
            <h2>שאלות נכון/לא נכון</h2>
             <div id="tf-single-view">
                <div class="question-container-single" id="tf-container">
                    <div class="question-text" id="tf-question"></div>
                    <div class="tf-options" id="tf-options">
                        <button data-answer="true">נכון</button>
                        <button data-answer="false">לא נכון</button>
                    </div>
                    <div class="feedback hidden" id="tf-feedback"></div>
                    <div class="explanation hidden" id="tf-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-tf">הקודם</button>
                    <span class="counter" id="tf-counter"></span>
                    <button class="nav-button" id="next-tf">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-tf">הצג את כל השאלות</button>
                 </div>
            </div>
             <div id="tf-all-questions" class="hidden">
                 <!-- All T/F Questions will be dynamically inserted here -->
             </div>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        
        const flashcardData = [
            { term: `Exotoxins`, definition: `טוקסינים המופרשים למדיום הגידול, בדרך כלל חלבונים או פפטידים המקודדים על פלסמידים או אזורים כרומוזומליים המועברים הוריזונטלית.` },
            { term: `Endotoxins`, definition: `טוקסינים שהם חלק מהתא עצמו, כגון ליפופוליסכרידים בדופן חיידקי גרם שליליים, הגורמים לתגובה חיסונית קשה.` },
            { term: `Toxoids`, definition: `טוקסינים מוחלשים המשמשים למטרות חיסון. הם חסרי רעילות אך שומרים על היכולת לעורר תגובה חיסונית.` },
            { term: `Mycotoxins`, definition: `טוקסינים המיוצרים על ידי פטריות, האחראים לרעילות אקוטית וכרונית, שייצורם גובר בתנאי עקה.` },
            { term: `Aflatoxin`, definition: `מיקוטוקסין קרצינוגני מסוכן המיוצר על ידי פטריות מסוימות, נקשר לדי אן איי, גורם למוטציות ופוגע בעיקר בכבד.` },
            { term: `Zearalenone`, definition: `מיקוטוקסין המיוצר על ידי פוזריום, הנקשר באפיניות גבוהה לקולטני אסטרוגן וגורם לפגיעה בפוריות בבקר.` },
            { term: `Fumonisin`, definition: `מיקוטוקסין קרצינוגני המשרה תמותת תאים, פגיעה נוירולוגית, פגמים בצינור העצבי בעוברים, ומצטבר בשיער אדם.` },
            { term: `Sepsis`, definition: `אלח דם. זיהום הגורם לתגובה דלקתית קיצונית ונרחבת ולתפקוד לקוי של איברי הגוף.` },
            { term: `Minimal Infective Dose (MID)`, definition: `מספר החיידקים המינימלי הנבלע במזון וגורם לזיהום, אשר במקרים מסוימים יכול להיות נמוך מאוד.` },
            { term: `Opportunistic Pathogens`, definition: `פתוגנים אופורטוניסטים. חיידקים הנמצאים מחוץ לנישה האקולוגית הטבעית שלהם או תחת עקה, ועלולים לגרום למחלה.` },
            { term: `Salmonella`, definition: `מתגים גרם שליליים קצרים, חסרי ספורות, אירובים פקולטטיביים ממשפחת אנטרובקטריאצה, בעלי יכולת תנועה.` },
            { term: `Salmonella typhi`, definition: `סרוטיפ של סלמונלה שנישא אך ורק בבני אדם, וישנם זנים שלו העמידים למספר רב של תרופות.` },
            { term: `Salmonella typhimurium`, definition: `סרוטיפ של סלמונלה הגורם לזיהום נפוץ בבקר ובעופות.` },
            { term: `Claviceps purpurea`, definition: `פטרייה המייצרת אפלטוקסין, פוגעת קשות בדגניים וגרמה היסטורית למגפת אש אנטוניוס הקדוש.` },
            { term: `Lipid A`, definition: `רכיב שומני המהווה חלק מהאנדוטוקסין בדופן חיידקי גרם שליליים, יחד עם אנטיגן או, וגורם לתגובה אימונית חריפה.` }
        ];

        const mcqData = [
            {
                question: `חקלאי הבחין בזיהום פטרייתי קל במאגר התבואה שלו והחליט להוסיף חומר משמר כדי לעצור את ההתפשטות. לאיזו תוצאה בלתי רצויה עלולה פעולה זו לגרום, ומה המנגנון הביולוגי העומד מאחוריה?`,
                options: [
                    `השמדת הפטרייה אך שחרור אנדוטוקסינים מתוך דופן התא שלה עקב פירוק.`,
                    `השריית יצירת מיקוטוקסינים עקב כניסת הפטרייה למצב עקה וספורולציה.`,
                    `הפיכת המיקוטוקסינים לטוקסואידים בעלי עמידות גבוהה יותר לחום.`,
                    `עידוד יצירת אקזוטוקסינים המופרשים ישירות למדיום הגידול של התבואה.`
                ],
                correctIndex: 1,
                explanation: `הוספת חומר משמר כאשר כבר ישנו זיהום פטרייתי מכניסה את הפטרייה למצב עקה. לרוב, ייצור מיקוטוקסינים גובר בתנאי עקה, אשר משרים גם ספורולציה.`
            },
            {
                question: `חיידק גרם שלילי עבר מוטציה שמנעה ממנו לסנתז פלסמידים באופן מוחלט. אילו מהרעלנים הבאים סביר להניח שימשיך להיות מיוצר על ידי החיידק למרות המוטציה?`,
                options: [
                    `אקזוטוקסינים חלבוניים בלבד.`,
                    `טוקסואידים המשמשים לחיסון.`,
                    `אנדוטוקסינים המבוססים על ליפופוליסכרידים.`,
                    `אקזוטוקסינים המקודדים הוריזונטלית.`
                ],
                correctIndex: 2,
                explanation: `אנדוטוקסינים (כמו ליפופוליסכרידים) הם חלק מבני קבוע מדופן התא של חיידקי גרם שליליים ומקודדים בגנום המרכזי, בניגוד לאקזוטוקסינים שלרוב מקודדים על פלסמידים או מועברים הוריזונטלית.`
            },
            {
                question: `בבדיקת מעבדה התגלה כי בשר בקר מכיל שאריות של פטרייה מסוג פוזריום שהפרישה רעלן למזון הפרה. מדוע צריכת בשר זה על ידי בני אדם אינה נחשבת למסוכנת בהכרח בהקשר של רעלן זה?`,
                options: [
                    `מכיוון שהרעלן מצטבר רק בשיער בעל החיים ולא ברקמות השריר.`,
                    `מכיוון שהרעלן עובר מטבוליזם מהיר בחיות ובאדם, ולכן אין חשש להצטברותו.`,
                    `מכיוון שרעלני פוזריום פוגעים אך ורק בפוריות של עופות ואינם משפיעים על יונקים.`,
                    `מכיוון שהרעלן רגיש מאוד לטיפול בחום ונהרס לחלוטין בטמפרטורת הגוף של הפרה.`
                ],
                correctIndex: 1,
                explanation: `הרעלן זיראלנון (המיוצר על ידי פוזריום) עובר מטבוליזם מהיר בחיות ובאדם, ולכן אין חשש לצרוך בעלי חיים שהוזנו בו.`
            },
            {
                question: `איזה מהמאפיינים הביוכימיים הבאים מאפשר להבדיל בין חיידק סלמונלה לבין חיידקים אנטריים אחרים בתרבית מעבדה?`,
                options: [
                    `יכולתו להתסיס לקטוז וסוכרוז בסביבה אנאירובית.`,
                    `היעדר אנזים אוראז ויכולתו לייצר מימן גופרתי הגורם להשחלה עם ברזל.`,
                    `יכולתו לגדול בטמפרטורות נמוכות מ-7 מעלות צלזיוס.`,
                    `חוסר יכולתו להתסיס גלוקוז למרות היותו פקולטטיבי.`
                ],
                correctIndex: 1,
                explanation: `סלמונלה אינה מתסיסה לקטוז וסוכרוז, אין לה אוראז, והיא מייצרת מימן גופרתי (H2S) אשר מגיב עם ברזל וגורם להשחרה.`
            },
            {
                question: `מטופל מגיע למיון עם סימפטומים של נמק (גנגרנה) בקצות האצבעות והזיות הדומות להשפעת סמים הלוצינוגניים. מאיזה סוג של מזון נגוע סביר ביותר שהמטופל צרך את הרעלן?`,
                options: [
                    `תירס הנגוע בחיידקי סלמונלה טיפימוריום.`,
                    `דגניים הנגועים בפטרייה המייצרת אפלטוקסין הקשור למגפת אש אנטוניוס הקדוש.`,
                    `בשר בקר שהוזן בתערובת המכילה זיראלנון.`,
                    `מוצרי חלב המכילים אקזוטוקסינים עמידים לחום.`
                ],
                correctIndex: 1,
                explanation: `הסימפטומים של חסימת כלי דם, גנגרנה והזיות אופייניים להרעלת אפלטוקסין המיוצר על ידי הפטרייה Claviceps purpurea, שפוגעת בדגניים וגרמה היסטורית למגפת אש אנטוניוס הקדוש.`
            },
            {
                question: `בניסוי מעבדה נבדקו השפעותיו של רעלן על התפתחות עוברית של עכברים, ונמצאו פגמים חמורים בהתפתחות הצינור העצבי. איזה רעלן נבדק בניסוי זה?`,
                options: [
                    `Aflatoxin B1`,
                    `Zearalenone`,
                    `Fumonisin B1`,
                    `Lipid A`
                ],
                correctIndex: 2,
                explanation: `Fumonisin B1 משרה פגיעה נוירולוגית ופגמים בצינור העצבי (neural tube defects) בהתפתחות עוברית של עכברים.`
            },
            {
                question: `מהי הסיבה המרכזית לכך שזיהום מזון על ידי מיקוטוקסינים מהווה אתגר משמעותי יותר לתעשיית המזון בהשוואה לזיהום על ידי אקזוטוקסינים חיידקיים מסוימים?`,
                options: [
                    `מיקוטוקסינים תמיד דורשים ריכוזים עצומים כדי להשפיע, ולכן קשה לאתרם.`,
                    `חלק גדול מהמיקוטוקסינים עמידים לטיפול בחום ואינם נהרסים בבישול או פסטור.`,
                    `מיקוטוקסינים מיוצרים רק כאשר המזון מאוחסן בטמפרטורות הקפאה.`,
                    `לא קיימות שיטות אנליטיות מודרניות לזיהוי מיקוטוקסינים במזון.`
                ],
                correctIndex: 1,
                explanation: `בעוד שחלק מהאקזוטוקסינים רגישים לטיפול חום, חלק גדול מהמיקוטוקסינים עמידים לטיפול חום, מה שהופך אותם לקשים מאוד להכחדה בתהליכי עיבוד מזון רגילים.`
            },
            {
                question: `חיידק סלמונלה חודר למערכת העיכול. כיצד הוא משנה את סביבתו המיידית כדי לשפר את שרידותו בסביבה חומצית?`,
                options: [
                    `מפריש ליפופוליסכרידים היוצרים מעטפת הגנה סביב התא.`,
                    `מייצר אמינים בעלי ריח אופייני אשר תורמים להעלאת רמת ה-pH בסביבתו.`,
                    `מפעיל מנגנון ספורולציה המאפשר לו לשרוד עד הגעה למעי הגס.`,
                    `משתמש באנזים אוראז לפירוק שתנן ויצירת אמוניה בסיסית.`
                ],
                correctIndex: 1,
                explanation: `חיידקי סלמונלה יוצרים אמינים (הגורמים לריח) התורמים להעלאת ה-pH, ובכך מסייעים לחיידק לשרוד בסביבה חומצית. (לסלמונלה אין אוראז ואינה יוצרת ספורות).`

            { question: `מבחינה ביוכימית, חיידקי סלמונלה מתסיסים גלוקוז אך אינם מתסיסים לקטוז וסוכרוז.`, answer: true, explanation: `זהו אחד המאפיינים הביוכימיים המבדילים של סלמונלה.` },
            { question: `חיידקי סלמונלה מייצרים מימן גופרתי ($H_2S$) הגורם להשחרה בנוכחות ברזל.`, answer: true, explanation: `ייצור מימן גופרתי וריח אופייני, יחד עם השחרה עם ברזל, הוא מאפיין של סלמונלה.` },
            { question: `סלמונלה רגישה מאוד לחומציות ואינה יכולה לשרוד ברמת pH הנמוכה מ-7.`, answer: false, explanation: `סלמונלה יכולה לחיות בטווח pH רחב של 4 עד 9.` },
            { question: `חיידקי סלמונלה יכולים להעלות את רמת ה-pH בסביבתם על ידי ייצור אמינים.`, answer: true, explanation: `הם יוצרים אמינים (הגורמים לריח) התורמים להעלאת ה-pH.` },
            { question: `הטמפרטורה האופטימלית לגידול חיידקי סלמונלה היא $7^\\circ C$.`, answer: false, explanation: `הטמפרטורה האופטימלית היא $38^\\circ C$. הם אינם גדלים מתחת ל-$7^\\circ C$.` },
            { question: `חיידקי סלמונלה מותאמים אבולוציונית למערכת העיכול של בעלי חיים ובעלי יכולת לחדור לתוך התאים.`, answer: true, explanation: `הם מותאמים למערכת העיכול ובעלי יכולת קיום מחוץ לתא וכן חדירה לתוך תאים (פגוציטוזה).` },
            { question: `שטיפת עוף חי במים לפני הבישול מומלצת כדי להשמיד את חיידקי הסלמונלה שעליו.`, answer: false, explanation: `שטיפה אינה מנקה אלא גורמת להפצת החיידקים על פני כל המטבח באמצעות התזת מים.` },
            { question: `הסרוטיפ Salmonella typhi יכול להדביק רק בני אדם ואינו נישא על ידי בעלי חיים.`, answer: true, explanation: `סלמונלה טיפי נישא רק באדם, בניגוד לסרוטיפים זואונוטיים אחרים.` },
            { question: `מערכות הפרשה מסוג 1, 3, 4, 6 (Secretion systems) משמשות את הסלמונלה כדי להזריק רעלנים למזון לפני אכילתו.`, answer: false, explanation: `מערכות אלו (כמו מבני המחט) משמשות לחדירה ולהישרדות בתוך תאי המאכסן לאחר ההדבקה, ולא להרעלת המזון מראש.` },
            { question: `ליפיד A (Lipid A) הוא רכיב של אקזוטוקסין המופרש על ידי פטריות.`, answer: false, explanation: `ליפיד A הוא רכיב של אנדוטוקסין (LPS) הנמצא בדופן תא של חיידקי גרם שליליים.` },
            { question: `אחד הסימפטומים האפשריים להרעלת אפלטוקסין באדם הוא הזיות דמויות LSD.`, answer: true, explanation: `הרעלת אפלטוקסין (כמו זו הנגרמת מ-Claviceps purpurea) גורמת לחסימת כלי דם, נמק והזיות כמו LSD.` }
        ];

        // --- Global State Variables ---
        let currentCardIndex = 0;
        let isCardFront = true;
        let isCardAnimating = false;
        let currentMCQIndex = 0;
        let currentTFIndex = 0;
        let mcqAnswers = new Array(mcqData.length).fill(null);
        let tfAnswers = new Array(tfData.length).fill(null);

        // --- DOM Element References ---
        const flashcardContent = document.getElementById('flashcard-content');
        const cardCounter = document.getElementById('card-counter');
        const prevCardBtn = document.getElementById('prev-card');
        const nextCardBtn = document.getElementById('next-card');
        const mcqQuestion = document.getElementById('mcq-question');
        const mcqOptions = document.getElementById('mcq-options');
        const mcqFeedback = document.getElementById('mcq-feedback');
        const mcqExplanation = document.getElementById('mcq-explanation');
        const mcqCounter = document.getElementById('mcq-counter');
        const prevMCQBtn = document.getElementById('prev-mcq');
        const nextMCQBtn = document.getElementById('next-mcq');
        const viewAllMCQBtn = document.getElementById('view-all-mcq');
        const mcqSingleView = document.getElementById('mcq-single-view');
        const mcqAllQuestionsContainer = document.getElementById('mcq-all-questions');
        const tfQuestion = document.getElementById('tf-question');
        const tfOptionsContainer = document.getElementById('tf-options');
        const tfFeedback = document.getElementById('tf-feedback');
        const tfExplanation = document.getElementById('tf-explanation');
        const tfCounter = document.getElementById('tf-counter');
        const prevTFBtn = document.getElementById('prev-tf');
        const nextTFBtn = document.getElementById('next-tf');
        const viewAllTFBtn = document.getElementById('view-all-tf');
        const tfSingleView = document.getElementById('tf-single-view');
        const tfAllQuestionsContainer = document.getElementById('tf-all-questions');

        function displayCard(index) {
            if (!flashcardData || flashcardData.length === 0) return;
            const cardData = flashcardData[index];
            isCardFront = true;
            flashcardContent.style.opacity = '1';
            flashcardContent.textContent = cardData.term;
            flashcardContent.className = 'flashcard-front-style';
            cardCounter.textContent = `כרטיס ${index + 1} / ${flashcardData.length}`;
            prevCardBtn.disabled = index === 0;
            nextCardBtn.disabled = index === flashcardData.length - 1;
            
            // Re-render MathJax if present
            if (window.MathJax) {
                MathJax.typesetPromise([flashcardContent]);
            }
        }

        function flipCard() {
            if (isCardAnimating || !flashcardData || flashcardData.length === 0) return;
            isCardAnimating = true;
            flashcardContent.style.opacity = '0';
            setTimeout(() => {
                isCardFront = !isCardFront;
                const cardData = flashcardData[currentCardIndex];
                if (isCardFront) {
                    flashcardContent.textContent = cardData.term;
                    flashcardContent.className = 'flashcard-front-style';
                } else {
                    flashcardContent.textContent = cardData.definition;
                    flashcardContent.className = 'flashcard-back-style';
                }
                flashcardContent.style.opacity = '1';
                isCardAnimating = false;
                
                if (window.MathJax) {
                    MathJax.typesetPromise([flashcardContent]);
                }
            }, 300);
        }

        function displayMCQuestion(index) {
            if (!mcqData || mcqData.length === 0) return;
            const qData = mcqData[index];
            mcqQuestion.textContent = qData.question;
            mcqOptions.innerHTML = '';
            mcqFeedback.classList.add('hidden');
            mcqExplanation.classList.add('hidden');
            qData.options.forEach((option, i) => {
                const button = document.createElement('button');
                button.textContent = option;
                button.onclick = () => handleMCQAnswer(index, i);
                mcqOptions.appendChild(button);
            });
            mcqCounter.textContent = `שאלה ${index + 1} / ${mcqData.length}`;
            prevMCQBtn.disabled = index === 0;
            nextMCQBtn.disabled = index === mcqData.length - 1;
            if (mcqAnswers[index] !== null) {
                highlightMCQAnswer(mcqOptions, mcqFeedback, mcqExplanation, index, mcqAnswers[index].selected);
            }
            
            if (window.MathJax) {
                MathJax.typesetPromise([mcqQuestion, mcqOptions, mcqExplanation]);
            }
        }

        function handleMCQAnswer(qIndex, selectedIndex) {
            if (mcqAnswers[qIndex] !== null) return;
            const isCorrect = selectedIndex === mcqData[qIndex].correctIndex;
            mcqAnswers[qIndex] = { selected: selectedIndex, correct: isCorrect };
            highlightMCQAnswer(mcqOptions, mcqFeedback, mcqExplanation, qIndex, selectedIndex);
        }
        
        function highlightMCQAnswer(optionsContainer, feedbackEl, explanationEl, qIndex, selectedIndex) {
            const qData = mcqData[qIndex];
            const buttons = optionsContainer.querySelectorAll('button');
            buttons.forEach((button, i) => {
                button.disabled = true;
                if (i === qData.correctIndex) {
                    button.style.backgroundColor = 'var(--correct-color)';
                    button.style.color = '#fff';
                    button.classList.add('correct');
                }
                if (i === selectedIndex && i !== qData.correctIndex) {
                    button.style.backgroundColor = 'var(--incorrect-color)';
                    button.style.color = '#fff';
                    button.classList.add('incorrect');
                }
            });
            feedbackEl.textContent = selectedIndex === qData.correctIndex ? "נכון!" : "לא נכון.";
            feedbackEl.className = `feedback ${selectedIndex === qData.correctIndex ? 'correct' : 'incorrect'}`;
            explanationEl.textContent = `הסבר: ${qData.explanation}`;
            explanationEl.classList.remove('hidden');
            
            if (window.MathJax) {
                MathJax.typesetPromise([explanationEl]);
            }
        }

        function displayAllMCQ() {
            if (!mcqData || mcqData.length === 0) return;
            mcqSingleView.classList.add('hidden');
            mcqAllQuestionsContainer.innerHTML = ''; 
            mcqData.forEach((qData, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question-container-all';
                questionDiv.innerHTML = `
                    <div class="question-text">${index + 1}. ${qData.question}</div>
                    <div class="options">
                        ${qData.options.map((option, i) => `<button data-qindex="${index}" data-oindex="${i}">${option}</button>`).join('')}
                    </div>
                    <div class="feedback hidden"></div>
                    <div class="explanation hidden"></div>
                `;
                mcqAllQuestionsContainer.appendChild(questionDiv);
                 const optionButtons = questionDiv.querySelectorAll('.options button');
                 optionButtons.forEach(button => {
                     button.onclick = () => {
                        const qIndex = parseInt(button.dataset.qindex);
                        const oIndex = parseInt(button.dataset.oindex);
                        if (mcqAnswers[qIndex] === null) {
                            const isCorrect = oIndex === mcqData[qIndex].correctIndex;
                            mcqAnswers[qIndex] = { selected: oIndex, correct: isCorrect };
                        }
                        const optionsDiv = button.closest('.options');
                        const feedbackDiv = questionDiv.querySelector('.feedback');
                        const explanationDiv = questionDiv.querySelector('.explanation');
                        highlightMCQAnswer(optionsDiv, feedbackDiv, explanationDiv, qIndex, mcqAnswers[qIndex].selected);
                     };
                 });
                 if (mcqAnswers[index] !== null) {
                    const optionsDiv = questionDiv.querySelector('.options');
                    const feedbackDiv = questionDiv.querySelector('.feedback');
                    const explanationDiv = questionDiv.querySelector('.explanation');
                    highlightMCQAnswer(optionsDiv, feedbackDiv, explanationDiv, index, mcqAnswers[index].selected);
                 }
            });
            mcqAllQuestionsContainer.classList.remove('hidden');
            
            if (window.MathJax) {
                MathJax.typesetPromise([mcqAllQuestionsContainer]);
            }
        }

        function displayTFQuestion(index) {
            if (!tfData || tfData.length === 0) return;
            const qData = tfData[index];
            tfQuestion.textContent = qData.question;
            tfFeedback.classList.add('hidden');
            tfExplanation.classList.add('hidden');
             const buttons = tfOptionsContainer.querySelectorAll('button');
             buttons.forEach(button => {
                 button.disabled = false;
                 button.style.backgroundColor = '';
                 button.style.color = '';
                 button.classList.remove('correct', 'incorrect');
                 button.onclick = () => handleTFAnswer(index, button.dataset.answer === 'true');
             });
            tfCounter.textContent = `שאלה ${index + 1} / ${tfData.length}`;
            prevTFBtn.disabled = index === 0;
            nextTFBtn.disabled = index === tfData.length - 1;
            if (tfAnswers[index] !== null) {
                highlightTFAnswer(tfOptionsContainer, tfFeedback, tfExplanation, index, tfAnswers[index].selected);
            }
            
            if (window.MathJax) {
                MathJax.typesetPromise([tfQuestion, tfExplanation]);
            }
        }
        
        function handleTFAnswer(qIndex, selectedAnswer) {
            if (tfAnswers[qIndex] !== null) return;
            const isCorrect = selectedAnswer === tfData[qIndex].answer;
            tfAnswers[qIndex] = { selected: selectedAnswer, correct: isCorrect };
            highlightTFAnswer(tfOptionsContainer, tfFeedback, tfExplanation, qIndex, selectedAnswer);
        }
        
        function highlightTFAnswer(optionsContainer, feedbackEl, explanationEl, qIndex, selectedAnswer) {
             const qData = tfData[qIndex];
             const buttons = optionsContainer.querySelectorAll('button');
             buttons.forEach(button => {
                 const buttonAnswer = button.dataset.answer === 'true';
                 button.disabled = true;
                 if (buttonAnswer === qData.answer) {
                     button.style.backgroundColor = 'var(--correct-color)';
                     button.style.color = '#fff';
                     button.classList.add('correct');
                 }
                 if (buttonAnswer === selectedAnswer && buttonAnswer !== qData.answer) {
                     button.style.backgroundColor = 'var(--incorrect-color)';
                     button.style.color = '#fff';
                     button.classList.add('incorrect');
                 }
             });
             feedbackEl.textContent = selectedAnswer === qData.answer ? "נכון!" : "לא נכון.";
             feedbackEl.className = `feedback ${selectedAnswer === qData.answer ? 'correct' : 'incorrect'}`;
             explanationEl.textContent = `הסבר: ${qData.explanation}`;
             explanationEl.classList.remove('hidden');
             
             if (window.MathJax) {
                MathJax.typesetPromise([explanationEl]);
             }
        }
        
        function displayAllTF() {
             if (!tfData || tfData.length === 0) return;
             tfSingleView.classList.add('hidden');
             tfAllQuestionsContainer.innerHTML = '';
             tfData.forEach((qData, index) => {
                 const questionDiv = document.createElement('div');
                 questionDiv.className = 'question-container-all';
                 questionDiv.innerHTML = `
                     <div class="question-text">${index + 1}. ${qData.question}</div>
                     <div class="tf-options">
                         <button data-qindex="${index}" data-answer="true">נכון</button>
                         <button data-qindex="${index}" data-answer="false">לא נכון</button>
                     </div>
                     <div class="feedback hidden"></div>
                     <div class="explanation hidden"></div>
                 `;
                 tfAllQuestionsContainer.appendChild(questionDiv);
                 const optionButtons = questionDiv.querySelectorAll('.tf-options button');
                 optionButtons.forEach(button => {
                     button.onclick = () => {
                         const qIndex = parseInt(button.dataset.qindex);
                         const selectedAnswer = button.dataset.answer === 'true';
                         if (tfAnswers[qIndex] === null) {
                             const isCorrect = selectedAnswer === tfData[qIndex].answer;
                             tfAnswers[qIndex] = { selected: selectedAnswer, correct: isCorrect };
                         }
                         const optionsDiv = button.closest('.tf-options');
                         const feedbackDiv = questionDiv.querySelector('.feedback');
                         const explanationDiv = questionDiv.querySelector('.explanation');
                         highlightTFAnswer(optionsDiv, feedbackDiv, explanationDiv, qIndex, tfAnswers[qIndex].selected);
                     };
                 });
                 if (tfAnswers[index] !== null) {
                    const optionsDiv = questionDiv.querySelector('.tf-options');
                    const feedbackDiv = questionDiv.querySelector('.feedback');
                    const explanationDiv = questionDiv.querySelector('.explanation');
                    highlightTFAnswer(optionsDiv, feedbackDiv, explanationDiv, index, tfAnswers[index].selected);
                 }
             });
             tfAllQuestionsContainer.classList.remove('hidden');
             
             if (window.MathJax) {
                MathJax.typesetPromise([tfAllQuestionsContainer]);
             }
        }

        function initialize() {
            if (flashcardData.length > 0) displayCard(currentCardIndex);
            if (mcqData.length > 0) displayMCQuestion(currentMCQIndex);
            if (tfData.length > 0) displayTFQuestion(currentTFIndex);
            flashcardContent.addEventListener('click', flipCard);
            prevCardBtn.addEventListener('click', () => { if (currentCardIndex > 0) { currentCardIndex--; displayCard(currentCardIndex); } });
            nextCardBtn.addEventListener('click', () => { if (currentCardIndex < flashcardData.length - 1) { currentCardIndex++; displayCard(currentCardIndex); } });
            prevMCQBtn.addEventListener('click', () => { if (currentMCQIndex > 0) { currentMCQIndex--; displayMCQuestion(currentMCQIndex); } });
            nextMCQBtn.addEventListener('click', () => { if (currentMCQIndex < mcqData.length - 1) { currentMCQIndex++; displayMCQuestion(currentMCQIndex); } });
            viewAllMCQBtn.addEventListener('click', displayAllMCQ);
            prevTFBtn.addEventListener('click', () => { if (currentTFIndex > 0) { currentTFIndex--; displayTFQuestion(currentTFIndex); } });
            nextTFBtn.addEventListener('click', () => { if (currentTFIndex < tfData.length - 1) { currentTFIndex++; displayTFQuestion(currentTFIndex); } });
            viewAllTFBtn.addEventListener('click', displayAllTF);
        }
        
        initialize();
    });
    </script>
</body>
</html>
