<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Study Tool</title>
    <style>
        /* --- Root Variables for Consistent Theming --- */
        :root {
            --primary-bg: #333333;
            --secondary-bg: #666666;
            --accent-color: #3D90D7;
            --text-color: #E0E0E0;
            --correct-color: #4CAF50;
            --incorrect-color: #F44336;
            --card-bg: #5a5a5a;
        }

        /* --- Global Styles --- */
        body {
            background-color: var(--primary-bg);
            color: var(--text-color);
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 90%; /* As per prompt */
            margin: 20px auto;
            padding: 20px;
            background-color: var(--secondary-bg);
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        h1, h2 {
            color: var(--accent-color);
            text-align: center;
            border-bottom: 1px solid var(--accent-color);
            padding-bottom: 10px;
        }

        .section {
            background-color: var(--primary-bg);
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 8px;
        }

        /* --- Study Cards Styling (Fade Animation) --- */
        .flashcard-container {
            height: 250px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #flashcard-content {
            width: 100%;
            height: 100%;
            background-color: var(--card-bg);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            transition: opacity 0.3s ease-in-out; /* Fade transition */
        }
        
        .flashcard-front-style {
             font-size: 1.5em;
             font-weight: bold;
        }
        
        .flashcard-back-style {
             font-size: 1.1em;
        }

        /* --- Questions Styling (MCQ & T/F) --- */
         .question-container-single, .question-container-all {
            margin-bottom: 15px;
            padding: 15px;
            border: 1px solid var(--secondary-bg);
            border-radius: 5px;
         }

        .question-text {
            font-weight: bold;
            margin-bottom: 15px;
        }

        .options button, .tf-options button {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-align: right;
            transition: background-color 0.3s;
        }

        .options button:hover:not(:disabled), .tf-options button:hover:not(:disabled) {
            background-color: #357ab8;
        }

        .options button:disabled, .tf-options button:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
        
        /* Specific styling to override disabled opacity for correct/incorrect answers */
        .options button.correct, .tf-options button.correct { opacity: 1; }
        .options button.incorrect, .tf-options button.incorrect { opacity: 1; }


        .feedback {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
        }

        .feedback.correct {
            background-color: var(--correct-color);
            color: #fff;
        }

        .feedback.incorrect {
            background-color: var(--incorrect-color);
            color: #fff;
        }

        .explanation {
            margin-top: 10px;
            font-style: italic;
            font-size: 0.9em;
            padding: 8px;
            background-color: var(--secondary-bg);
            border-radius: 4px;
        }

        /* --- Navigation & Utility Styling --- */
        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            margin-bottom: 10px;
        }

        .nav-button, .view-all-button {
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
        }

        .nav-button:disabled {
             opacity: 0.5;
             cursor: not-allowed;
        }

        .counter {
            font-size: 0.9em;
        }

        .view-all-container {
            text-align: center;
            margin-top: 15px;
            margin-bottom: 15px;
        }

        .hidden {
            display: none;
        }

        #mcq-all-questions .question-container-all,
        #tf-all-questions .question-container-all {
            margin-bottom: 20px;
        }

    </style>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
    <div class="container">
        <h1>תסיסה לקטית: תהליכים, מיקרואורגניזמים ויישומים בתעשיית המזון</h1>

        <!-- Study Cards Section -->
        <div class="section">
            <h2>כרטיסי לימוד</h2>
            <div class="flashcard-container">
                <div id="flashcard-content"></div>
            </div>
            <div class="navigation">
                <button class="nav-button" id="prev-card">הקודם</button>
                <span class="counter" id="card-counter"></span>
                <button class="nav-button" id="next-card">הבא</button>
            </div>
        </div>

        <!-- Multiple Choice Questions Section -->
        <div class="section">
            <h2>שאלות רב-ברירה (אמריקאיות)</h2>
            <div id="mcq-single-view">
                <div class="question-container-single" id="mcq-container">
                    <div class="question-text" id="mcq-question"></div>
                    <div class="options" id="mcq-options"></div>
                    <div class="feedback hidden" id="mcq-feedback"></div>
                    <div class="explanation hidden" id="mcq-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-mcq">הקודם</button>
                    <span class="counter" id="mcq-counter"></span>
                    <button class="nav-button" id="next-mcq">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-mcq">הצג את כל השאלות</button>
                 </div>
            </div>
            <div id="mcq-all-questions" class="hidden">
                <!-- All MCQs will be dynamically inserted here -->
            </div>
        </div>

        <!-- True/False Questions Section -->
        <div class="section">
            <h2>שאלות נכון/לא נכון</h2>
             <div id="tf-single-view">
                <div class="question-container-single" id="tf-container">
                    <div class="question-text" id="tf-question"></div>
                    <div class="tf-options" id="tf-options">
                        <button data-answer="true">נכון</button>
                        <button data-answer="false">לא נכון</button>
                    </div>
                    <div class="feedback hidden" id="tf-feedback"></div>
                    <div class="explanation hidden" id="tf-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-tf">הקודם</button>
                    <span class="counter" id="tf-counter"></span>
                    <button class="nav-button" id="next-tf">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-tf">הצג את כל השאלות</button>
                 </div>
            </div>
             <div id="tf-all-questions" class="hidden">
                 <!-- All T/F Questions will be dynamically inserted here -->
             </div>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        
        const flashcardData = [
            { term: `תסיסה לקטית`, definition: `תהליך מטבולי אנאירובי שבו מיקרואורגניזמים מפרקים סוכרים ומייצרים חומצה לקטית כתוצר עיקרי.` },
            { term: `חיידקים הומופרמנטטיביים`, definition: `חיידקים לקטיים המייצרים כמעט אך ורק חומצה לקטית מפירוק גלוקוז, תוך הפקת 2 מולקולות ($ATP$).` },
            { term: `חיידקים הטרופרמנטטיביים`, definition: `חיידקים לקטיים המייצרים חומצה לקטית, אתנול ופחמן דו-חמצני מפירוק גלוקוז, עקב חוסר באנזים אלדולאז.` },
            { term: `Chymosin`, definition: `אנזים פרוטאוליטי המופק מקיבת עגלים יונקים, המבקע באופן ספציפי את חלבון הקזאין-k וגורם לגיבון החלב.` },
            { term: `Rennet`, definition: `תערובת אנזימים (בעיקר כימוסין ופפסין) המשמשת בתעשיית הגבינות ליצירת הגבן.` },
            { term: `גלקטוזמיה`, definition: `מחלה גנטית רצסיבית שבה חסר האנזים הדרוש לניצול גלקטוז, מה שמונע מהחולה לצרוך חלב למרות פירוק הלקטוז.` },
            { term: `מיצלת קזאין`, definition: `מבנה כדורי מורכב של חלבוני קזאין בחלב. גיבון החלב גורם למיצלות אלו להתחבר לצבירים או שרשראות.` },
            { term: `חיידקי חומצה פרופיונית`, definition: `חיידקים המנצלים חומצה לקטית לייצור חומצה פרופיונית, חומצה אצטית ו- ($CO_2$). אחראים לחורים ולטעם בגבינה שוויצרית.` },
            { term: `סודיום אזיד`, definition: `רעלן המעכב נשימה תאית על ידי קישור לציטוכרומים. חיידקים לקטיים עמידים אליו כי חסר להם מנגנון זה.` },
            { term: `תסיסת ABE`, definition: `תהליך תסיסה תעשייתי על ידי חיידקי קלוסטרידיום המייצר אצטון, בוטנול ואתנול.` },
            { term: `פקטינאזות`, definition: `אנזימים המפרקים פקטין בצמחים. בכבישת ירקות, ירידה מהירה של ה- ($pH$) מעכבת אותם ומונעת התרככות יתר.` },
            { term: `פרוביוטיקה`, definition: `מיקרואורגניזמים חיים שכאשר הם ניתנים בכמות נאותה, מקנים יתרון בריאותי למאכסן.` },
            { term: `בקטריוצינים`, definition: `חלבונים או פפטידים אנטימיקרוביאליים המיוצרים על ידי חיידקים כדי לעכב צמיחה של חיידקים מתחרים או פתוגנים.` },
            { term: `סוקצסיה מיקרוביאלית`, definition: `החלפה הדרגתית של אוכלוסיות מיקרואורגניזמים בסביבה מסוימת לאורך זמן, כפי שקורה בתהליך הכנת כרוב כבוש.` },
            { term: `התססה מדויקת`, definition: `שימוש במיקרואורגניזמים מהונדסים לייצור מסחרי של חלבונים ספציפיים (כגון כימוסין) ללא שימוש בבעלי חיים.` },
            { term: `Penicillium roqueforti`, definition: `פטרית עובש המשמשת בתעשיית הגבינות הכחולות וגדלה בתוך חללי הגבן.` },
            { term: `אנאירובים סובלי חמצן`, definition: `מיקרואורגניזמים שאינם משתמשים בחמצן לייצור אנרגיה, אך מסוגלים לשרוד ולגדול בנוכחותו. מאפיין חיידקים לקטיים.` }
        ];

        const mcqData = [
            { question: `מהי הסיבה העיקרית לכך שיצרני גבינה מעדיפים להשתמש באנזים Chymosin על פני Pepsin בתהליך הגיבון?`, options: [`הוא מפרק את כל סוגי הקזאין באופן שווה, מה שמאיץ את תהליך הגיבון.`, `פעילותו הפרוטאוליטית מוגבלת ומדויקת יותר, מה שמונע היווצרות טעמי לוואי מרים.`, `הוא פעיל בטווח רחב יותר של חומציות.`, `הוא דורש נוכחות של חיידקים פרופיוניים כדי לפעול כראוי.`], correctIndex: 1, explanation: `כימוסין מועדף בגלל פעילות פרוטאוליזה מוגבלת, מה שמפחית בעיות של טעם מר כתוצאה מפירוק חלבונים מוגבר.` },
            { question: `באיזה אתר ספציפי פועל האנזים Chymosin על חלבון הקזאין?`, options: [`הוא מפרק קשרים גליקוזידיים של בטא 1 ל-4 בלקטוז.`, `הוא מבקע את קזאין אלפא בעמדה 105.`, `הוא מבקע במדויק את חלבון קזאין-k בין חומצות האמינו פנילאלנין בעמדה 105 למתיונין בעמדה 106.`, `הוא מפרק קשרי פפטיד אקראיים בחלבוני מי הגבינה.`], correctIndex: 2, explanation: `כימוסין פועל כפרוטאז אספרטט המבקע ספציפית את חלבון קזאין-k בין פנילאלנין 105 למתיונין 106.` },
            { question: `אדם הסובל מגלקטוזמיה אינו יכול לצרוך חלב. מהו המנגנון הביוכימי הפגום הגורם למחלה זו?`, options: [`חוסר באנזים לקטאז המונע את פירוק הלקטוז במעי.`, `תגובה אימונית מוגזמת לחלבוני מי הגבינה.`, `חוסר באנזים הממיר גלקטוז-1-פוספט לתוצר הבא במסלול המטבולי, עקב מוטציה גנטית רצסיבית.`, `חוסר יכולת לייצר חומצה לקטית במערכת העיכול.`], correctIndex: 2, explanation: `גלקטוזמיה היא מחלה גנטית אוטוזומלית רצסיבית הנובעת מחוסר באנזים פעיל הדרוש לניצול הגלקטוז לאחר פירוק הלקטוז.` },
            { question: `מהי ההגדרה המדויקת ביותר לחיידקים לקטיים בהקשר של תסיסה?`, options: [`חיידקים המסוגלים לנצל לקטוז כמקור פחמן יחיד.`, `חיידקים המייצרים חומצה לקטית כתוצר עיקרי של התסיסה, ללא קשר ליכולתם לנצל לקטוז.`, `כל חיידק אנאירובי אובליגטורי המצוי בחלב.`, `חיידקים המייצרים חומצה לקטית ואתנול ביחס שווה תמיד.`], correctIndex: 1, explanation: `חיידקים לקטיים מוגדרים ככאלה המייצרים חומצה לקטית, ואין לכך קשר ישיר ליכולתם לנצל דווקא את סוכר הלקטוז.` },
            { question: `מהו ההבדל המרכזי במאזן האנרגטי בין תסיסה הומופרמנטטיבית לתסיסה הטרופרמנטטיבית עבור כל מולקולת גלוקוז?`, options: [`בתסיסה הומופרמנטטיבית נוצרות 4 מולקולות ($ATP$), ובהטרופרמנטטיבית 2 מולקולות.`, `בתסיסה הומופרמנטטיבית נוצרות 2 מולקולות ($ATP$), ובהטרופרמנטטיבית מולקולה אחת של ($ATP$).`, `בשני המסלולים נוצרות 2 מולקולות ($ATP$), אך התוצרים הסופיים שונים.`, `בתסיסה הטרופרמנטטיבית נוצרות יותר מולקולות ($ATP$) עקב ייצור אתנול.`], correctIndex: 1, explanation: `המסלול ההומופרמנטטיבי מניב 2 מולקולות ($ATP$) נטו לכל מולקולת גלוקוז, בעוד המסלול ההטרופרמנטטיבי מניב רק מולקולת ($ATP$) אחת.` },
            { question: `איזה אנזים מפתח של תהליך הגליקוליזה חסר בחיידקים הטרופרמנטטיביים, מה שמוביל אותם להשתמש במסלול חלופי?`, options: [`Lactate dehydrogenase`, `Phosphofructokinase`, `Aldolase`, `Pyruvate kinase`], correctIndex: 2, explanation: `חיידקים הטרופרמנטטיביים חסרים את האנזים אלדולאז, ולכן אינם יכולים לפרק פרוקטוז-1,6-ביפוספט במסלול הגליקוליזה הרגיל.` },
            { question: `מדוע חיידקים לקטיים מפגינים עמידות גבוהה לסודיום אזיד לעומת חיידקים נושמים?`, options: [`סודיום אזיד מתפרק בסביבה החומצית שיוצרים החיידקים הלקטיים.`, `לחיידקים לקטיים יש משאבות פליטה אקטיביות המוציאות את הרעלן מהתא.`, `סודיום אזיד מעכב נשימה תאית על ידי קישור לקבוצת ההם בציטוכרומים, ולחיידקים לקטיים אין ציטוכרומים.`, `סודיום אזיד פוגע באנזים קטלאז, שלחיידקים לקטיים יש בכמות עודפת.`], correctIndex: 2, explanation: `חיידקים לקטיים חסרים ציטוכרומים וחלבוני הם, ולכן סודיום אזיד, שפועל על ידי קישור לקבוצת ההם ועיכוב שרשרת מעבר האלקטרונים, אינו משפיע עליהם.` },
            { question: `כיצד ניתן לסווג את דרישות החמצן של חיידקים לקטיים, ומהי ההשלכה הפיזיולוגית של סיווג זה?`, options: [`הם אירוביים אובליגטוריים, ולכן דורשים חמצן לייצור אנרגיה אך רגישים למי חמצן.`, `הם אנאירוביים אובליגטוריים, ולכן נוכחות חמצן קוטלת אותם באופן מיידי.`, `הם אנאירוביים סובלי חמצן, כלומר אינם מנצלים חמצן אך יכולים לשרוד בנוכחותו, למרות שחסר להם האנזים קטלאז.`, `הם פקולטטיביים, ויכולים לעבור מנשימה אירובית לתסיסה בהתאם לזמינות החמצן.`], correctIndex: 2, explanation: `חיידקים לקטיים הם אנאירובים סובלי חמצן. הם אינם משתמשים בו כי אין להם שרשרת נשימה, והם רגישים יחסית לנגזרות חמצן כי חסר להם האנזים קטלאז.` },

            { question: `בסוקצסיה של כרוב כבוש, החיידק הראשון שמתפתח הוא לרוב הומופרמנטטיבי אובליגטורי.`, answer: false, explanation: `החיידק הראשון הוא לרוב Leuconostoc mesenteroides, שהוא הטרופרמנטטיבי.` },
            { question: `מיצלות הקזאין ביוגורט מתארגנות במבנה של שרשראות, בניגוד לצבירים המאפיינים גבינה קשה.`, answer: true, explanation: `מיקרוסקופיה מראה שרשראות ביוגורט וצבירים בגבן הגבינה.` },
            { question: `תהליך הכנת קימצי קוריאני כולל בדרך כלל שלב של השריית הכרוב במלח למשך הלילה ושטיפתו לפני הוספת התבלינים.`, answer: true, explanation: `זהו תהליך דו-שלבי הכולל הדגרה עם מלח, שטיפה, והתחלת תסיסה חדשה עם תבלינים.` },
            { question: `חיידקים לקטיים יכולים לסנתז בעצמם את כל חומצות האמינו והוויטמינים שהם צריכים מחומרים אנאורגניים.`, answer: false, explanation: `חיידקים לקטיים הם בעלי דרישה גבוהה לנוטריינטים וזקוקים לאספקה חיצונית של חומצות אמינו וויטמינים.` },
            { question: `האנזים אלדולאז קיים בחיידקים הומופרמנטטיביים אך חסר בחיידקים הטרופרמנטטיביים.`, answer: true, explanation: `זהו ההבדל האנזימטי המרכזי המנתב את מסלולי התסיסה השונים.` },
            { question: `כבישת ירקות גורמת לירידה בריכוז הסוכר הזמין בירק מכיוון שהחיידקים מנצלים אותו לאנרגיה.`, answer: true, explanation: `החיידקים מתסיסים את הסוכר לחומצה לקטית, ולכן ריכוז הסוכר יורד.` },
            { question: `ליסטריה היא דוגמה לחיידק פרוביוטי מועיל הנמצא באופן טבעי בחלב גולמי.`, answer: false, explanation: `ליסטריה היא חיידק פתוגני מסוכן העלול להימצא בחלב גולמי.` },
            { question: `ההבדל בין גבינת צדר לגבינה שוויצרית נובע אך ורק מזמן ההבשלה, ולא מסוג הסטרטר.`, answer: false, explanation: `לכל גבינה יש סטרטר מיקרוביאלי ספציפי (למשל, הוספת חיידקים פרופיוניים בשוויצרית).` },
            { question: `חומצה אצטית נחשבת לחומצה חלשה יותר מחומצה לקטית מבחינת ערך ה-pKa שלה.`, answer: true, explanation: `ה-pKa של חומצה אצטית הוא 4.74, ואילו של לקטית הוא 3.86. pKa גבוה יותר משמעותו חומצה חלשה יותר.` },
            { question: `תסיסת קסאווה נועדה אך ורק לשיפור הטעם, והשורש בטוח לאכילה גם ללא תסיסה.`, answer: false, explanation: `שורש הקסאווה מכיל רעלנים שהתסיסה עשויה לעזור לפרק.` },
            { question: `חיידק ה-Clostridium acetobutylicum משמש בתעשייה לייצור אצטון, בוטנול ואתנול.`, answer: true, explanation: `תהליך זה נקרא תסיסת ABE ומשמש בתעשייה.` },
            { question: `פפסין מחליף את הכימוסין בקיבת העגל ככל שהוא מתבגר ונגמל מחלב.`, answer: true, explanation: `כימוסין מיוצר בעיקר בשבוע הראשון לחיי העגל ולאחר מכן מוחלף על ידי פפסין.` },
            { question: `תסיסה הטרופרמנטטיבית מורידה את ה- ($pH$) של המצע חזק ומהר יותר מאשר תסיסה הומופרמנטטיבית.`, answer: false, explanation: `חיידקים הטרופרמנטטיביים מורידים את ה- ($pH$) פחות טוב מחיידקים הומופרמנטטיביים.` },
            { question: `ריחות לוואי של גופרית בכבישת ירקות מעידים בדרך כלל על תהליך תקין ורצוי.`, answer: false, explanation: `ריחות גופרית מעידים על זיהום של אנאירובים בלתי רצויים, לרוב עקב חוסר במלח.` }
        ];


        // --- Global State Variables ---
        let currentCardIndex = 0;
        let isCardFront = true;
        let isCardAnimating = false;
        let currentMCQIndex = 0;
        let currentTFIndex = 0;
        let mcqAnswers = new Array(mcqData.length).fill(null);
        let tfAnswers = new Array(tfData.length).fill(null);

        // --- DOM Element References ---
        const flashcardContent = document.getElementById('flashcard-content');
        const cardCounter = document.getElementById('card-counter');
        const prevCardBtn = document.getElementById('prev-card');
        const nextCardBtn = document.getElementById('next-card');
        const mcqQuestion = document.getElementById('mcq-question');
        const mcqOptions = document.getElementById('mcq-options');
        const mcqFeedback = document.getElementById('mcq-feedback');
        const mcqExplanation = document.getElementById('mcq-explanation');
        const mcqCounter = document.getElementById('mcq-counter');
        const prevMCQBtn = document.getElementById('prev-mcq');
        const nextMCQBtn = document.getElementById('next-mcq');
        const viewAllMCQBtn = document.getElementById('view-all-mcq');
        const mcqSingleView = document.getElementById('mcq-single-view');
        const mcqAllQuestionsContainer = document.getElementById('mcq-all-questions');
        const tfQuestion = document.getElementById('tf-question');
        const tfOptionsContainer = document.getElementById('tf-options');
        const tfFeedback = document.getElementById('tf-feedback');
        const tfExplanation = document.getElementById('tf-explanation');
        const tfCounter = document.getElementById('tf-counter');
        const prevTFBtn = document.getElementById('prev-tf');
        const nextTFBtn = document.getElementById('next-tf');
        const viewAllTFBtn = document.getElementById('view-all-tf');
        const tfSingleView = document.getElementById('tf-single-view');
        const tfAllQuestionsContainer = document.getElementById('tf-all-questions');

        function displayCard(index) {
            if (!flashcardData || flashcardData.length === 0) return;
            const cardData = flashcardData[index];
            isCardFront = true;
            flashcardContent.style.opacity = '1';
            flashcardContent.textContent = cardData.term;
            flashcardContent.className = 'flashcard-front-style';
            cardCounter.textContent = `כרטיס ${index + 1} / ${flashcardData.length}`;
            prevCardBtn.disabled = index === 0;
            nextCardBtn.disabled = index === flashcardData.length - 1;
            if (window.MathJax) MathJax.typesetPromise([flashcardContent]);
        }

        function flipCard() {
            if (isCardAnimating || !flashcardData || flashcardData.length === 0) return;
            isCardAnimating = true;
            flashcardContent.style.opacity = '0';
            setTimeout(() => {
                isCardFront = !isCardFront;
                const cardData = flashcardData[currentCardIndex];
                if (isCardFront) {
                    flashcardContent.textContent = cardData.term;
                    flashcardContent.className = 'flashcard-front-style';
                } else {
                    flashcardContent.textContent = cardData.definition;
                    flashcardContent.className = 'flashcard-back-style';
                }
                flashcardContent.style.opacity = '1';
                isCardAnimating = false;
                if (window.MathJax) MathJax.typesetPromise([flashcardContent]);
            }, 300);
        }

        function displayMCQuestion(index) {
            if (!mcqData || mcqData.length === 0) return;
            const qData = mcqData[index];
            mcqQuestion.textContent = qData.question;
            mcqOptions.innerHTML = '';
            mcqFeedback.classList.add('hidden');
            mcqExplanation.classList.add('hidden');
            qData.options.forEach((option, i) => {
                const button = document.createElement('button');
                button.textContent = option;
                button.onclick = () => handleMCQAnswer(index, i);
                mcqOptions.appendChild(button);
            });
            mcqCounter.textContent = `שאלה ${index + 1} / ${mcqData.length}`;
            prevMCQBtn.disabled = index === 0;
            nextMCQBtn.disabled = index === mcqData.length - 1;
            if (mcqAnswers[index] !== null) {
                highlightMCQAnswer(mcqOptions, mcqFeedback, mcqExplanation, index, mcqAnswers[index].selected);
            }
            if (window.MathJax) MathJax.typesetPromise([mcqQuestion, mcqOptions]);
        }

        function handleMCQAnswer(qIndex, selectedIndex) {
            if (mcqAnswers[qIndex] !== null) return;
            const isCorrect = selectedIndex === mcqData[qIndex].correctIndex;
            mcqAnswers[qIndex] = { selected: selectedIndex, correct: isCorrect };
            highlightMCQAnswer(mcqOptions, mcqFeedback, mcqExplanation, qIndex, selectedIndex);
        }
        
        function highlightMCQAnswer(optionsContainer, feedbackEl, explanationEl, qIndex, selectedIndex) {
            const qData = mcqData[qIndex];
            const buttons = optionsContainer.querySelectorAll('button');
            buttons.forEach((button, i) => {
                button.disabled = true;
                if (i === qData.correctIndex) {
                    button.style.backgroundColor = 'var(--correct-color)';
                    button.style.color = '#fff';
                    button.classList.add('correct');
                }
                if (i === selectedIndex && i !== qData.correctIndex) {
                    button.style.backgroundColor = 'var(--incorrect-color)';
                    button.style.color = '#fff';
                    button.classList.add('incorrect');
                }
            });
            feedbackEl.textContent = selectedIndex === qData.correctIndex ? "נכון!" : "לא נכון.";
            feedbackEl.className = `feedback ${selectedIndex === qData.correctIndex ? 'correct' : 'incorrect'}`;
            explanationEl.textContent = `הסבר: ${qData.explanation}`;
            explanationEl.classList.remove('hidden');
            if (window.MathJax) MathJax.typesetPromise([explanationEl]);
        }

        function displayAllMCQ() {
            if (!mcqData || mcqData.length === 0) return;
            mcqSingleView.classList.add('hidden');
            mcqAllQuestionsContainer.innerHTML = ''; 
            mcqData.forEach((qData, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question-container-all';
                questionDiv.innerHTML = `
                    <div class="question-text">${index + 1}. ${qData.question}</div>
                    <div class="options">
                        ${qData.options.map((option, i) => `<button data-qindex="${index}" data-oindex="${i}">${option}</button>`).join('')}
                    </div>
                    <div class="feedback hidden"></div>
                    <div class="explanation hidden"></div>
                `;
                mcqAllQuestionsContainer.appendChild(questionDiv);
                 const optionButtons = questionDiv.querySelectorAll('.options button');
                 optionButtons.forEach(button => {
                     button.onclick = () => {
                        const qIndex = parseInt(button.dataset.qindex);
                        const oIndex = parseInt(button.dataset.oindex);
                        if (mcqAnswers[qIndex] === null) {
                            const isCorrect = oIndex === mcqData[qIndex].correctIndex;
                            mcqAnswers[qIndex] = { selected: oIndex, correct: isCorrect };
                        }
                        const optionsDiv = button.closest('.options');
                        const feedbackDiv = questionDiv.querySelector('.feedback');
                        const explanationDiv = questionDiv.querySelector('.explanation');
                        highlightMCQAnswer(optionsDiv, feedbackDiv, explanationDiv, qIndex, mcqAnswers[qIndex].selected);
                     };
                 });
                 if (mcqAnswers[index] !== null) {
                    const optionsDiv = questionDiv.querySelector('.options');
                    const feedbackDiv = questionDiv.querySelector('.feedback');
                    const explanationDiv = questionDiv.querySelector('.explanation');
                    highlightMCQAnswer(optionsDiv, feedbackDiv, explanationDiv, index, mcqAnswers[index].selected);
                 }
            });
            mcqAllQuestionsContainer.classList.remove('hidden');
            if (window.MathJax) MathJax.typesetPromise([mcqAllQuestionsContainer]);
        }

        function displayTFQuestion(index) {
            if (!tfData || tfData.length === 0) return;
            const qData = tfData[index];
            tfQuestion.textContent = qData.question;
            tfFeedback.classList.add('hidden');
            tfExplanation.classList.add('hidden');
             const buttons = tfOptionsContainer.querySelectorAll('button');
             buttons.forEach(button => {
                 button.disabled = false;
                 button.style.backgroundColor = '';
                 button.style.color = '';
                 button.classList.remove('correct', 'incorrect');
                 button.onclick = () => handleTFAnswer(index, button.dataset.answer === 'true');
             });
            tfCounter.textContent = `שאלה ${index + 1} / ${tfData.length}`;
            prevTFBtn.disabled = index === 0;
            nextTFBtn.disabled = index === tfData.length - 1;
            if (tfAnswers[index] !== null) {
                highlightTFAnswer(tfOptionsContainer, tfFeedback, tfExplanation, index, tfAnswers[index].selected);
            }
            if (window.MathJax) MathJax.typesetPromise([tfQuestion]);
        }
        
        function handleTFAnswer(qIndex, selectedAnswer) {
            if (tfAnswers[qIndex] !== null) return;
            const isCorrect = selectedAnswer === tfData[qIndex].answer;
            tfAnswers[qIndex] = { selected: selectedAnswer, correct: isCorrect };
            highlightTFAnswer(tfOptionsContainer, tfFeedback, tfExplanation, qIndex, selectedAnswer);
        }
        
        function highlightTFAnswer(optionsContainer, feedbackEl, explanationEl, qIndex, selectedAnswer) {
             const qData = tfData[qIndex];
             const buttons = optionsContainer.querySelectorAll('button');
             buttons.forEach(button => {
                 const buttonAnswer = button.dataset.answer === 'true';
                 button.disabled = true;
                 if (buttonAnswer === qData.answer) {
                     button.style.backgroundColor = 'var(--correct-color)';
                     button.style.color = '#fff';
                     button.classList.add('correct');
                 }
                 if (buttonAnswer === selectedAnswer && buttonAnswer !== qData.answer) {
                     button.style.backgroundColor = 'var(--incorrect-color)';
                     button.style.color = '#fff';
                     button.classList.add('incorrect');
                 }
             });
             feedbackEl.textContent = selectedAnswer === qData.answer ? "נכון!" : "לא נכון.";
             feedbackEl.className = `feedback ${selectedAnswer === qData.answer ? 'correct' : 'incorrect'}`;
             explanationEl.textContent = `הסבר: ${qData.explanation}`;
             explanationEl.classList.remove('hidden');
             if (window.MathJax) MathJax.typesetPromise([explanationEl]);
        }
        
        function displayAllTF() {
             if (!tfData || tfData.length === 0) return;
             tfSingleView.classList.add('hidden');
             tfAllQuestionsContainer.innerHTML = '';
             tfData.forEach((qData, index) => {
                 const questionDiv = document.createElement('div');
                 questionDiv.className = 'question-container-all';
                 questionDiv.innerHTML = `
                     <div class="question-text">${index + 1}. ${qData.question}</div>
                     <div class="tf-options">
                         <button data-qindex="${index}" data-answer="true">נכון</button>
                         <button data-qindex="${index}" data-answer="false">לא נכון</button>
                     </div>
                     <div class="feedback hidden"></div>
                     <div class="explanation hidden"></div>
                 `;
                 tfAllQuestionsContainer.appendChild(questionDiv);
                 const optionButtons = questionDiv.querySelectorAll('.tf-options button');
                 optionButtons.forEach(button => {
                     button.onclick = () => {
                         const qIndex = parseInt(button.dataset.qindex);
                         const selectedAnswer = button.dataset.answer === 'true';
                         if (tfAnswers[qIndex] === null) {
                             const isCorrect = selectedAnswer === tfData[qIndex].answer;
                             tfAnswers[qIndex] = { selected: selectedAnswer, correct: isCorrect };
                         }
                         const optionsDiv = button.closest('.tf-options');
                         const feedbackDiv = questionDiv.querySelector('.feedback');
                         const explanationDiv = questionDiv.querySelector('.explanation');
                         highlightTFAnswer(optionsDiv, feedbackDiv, explanationDiv, qIndex, tfAnswers[qIndex].selected);
                     };
                 });
                 if (tfAnswers[index] !== null) {
                    const optionsDiv = questionDiv.querySelector('.tf-options');
                    const feedbackDiv = questionDiv.querySelector('.feedback');
                    const explanationDiv = questionDiv.querySelector('.explanation');
                    highlightTFAnswer(optionsDiv, feedbackDiv, explanationDiv, index, tfAnswers[index].selected);
                 }
             });
             tfAllQuestionsContainer.classList.remove('hidden');
             if (window.MathJax) MathJax.typesetPromise([tfAllQuestionsContainer]);
        }

        function initialize() {
            if (flashcardData.length > 0) displayCard(currentCardIndex);
            if (mcqData.length > 0) displayMCQuestion(currentMCQIndex);
            if (tfData.length > 0) displayTFQuestion(currentTFIndex);
            flashcardContent.addEventListener('click', flipCard);
            prevCardBtn.addEventListener('click', () => { if (currentCardIndex > 0) { currentCardIndex--; displayCard(currentCardIndex); } });
            nextCardBtn.addEventListener('click', () => { if (currentCardIndex < flashcardData.length - 1) { currentCardIndex++; displayCard(currentCardIndex); } });
            prevMCQBtn.addEventListener('click', () => { if (currentMCQIndex > 0) { currentMCQIndex--; displayMCQuestion(currentMCQIndex); } });
            nextMCQBtn.addEventListener('click', () => { if (currentMCQIndex < mcqData.length - 1) { currentMCQIndex++; displayMCQuestion(currentMCQIndex); } });
            viewAllMCQBtn.addEventListener('click', displayAllMCQ);
            prevTFBtn.addEventListener('click', () => { if (currentTFIndex > 0) { currentTFIndex--; displayTFQuestion(currentTFIndex); } });
            nextTFBtn.addEventListener('click', () => { if (currentTFIndex < tfData.length - 1) { currentTFIndex++; displayTFQuestion(currentTFIndex); } });
            viewAllTFBtn.addEventListener('click', displayAllTF);
        }
        
        initialize();
    });
    </script>
</body>
</html>
