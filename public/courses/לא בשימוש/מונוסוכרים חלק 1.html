<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Study Tool</title>
    <style>
        /* --- Root Variables for Consistent Theming --- */
        :root {
            --primary-bg: #333333;
            --secondary-bg: #666666;
            --accent-color: #3D90D7;
            --text-color: #E0E0E0;
            --correct-color: #4CAF50;
            --incorrect-color: #F44336;
            --card-bg: #5a5a5a;
        }

        /* --- Global Styles --- */
        body {
            background-color: var(--primary-bg);
            color: var(--text-color);
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 90%; /* As per prompt */
            margin: 20px auto;
            padding: 20px;
            background-color: var(--secondary-bg);
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        h1, h2 {
            color: var(--accent-color);
            text-align: center;
            border-bottom: 1px solid var(--accent-color);
            padding-bottom: 10px;
        }

        .section {
            background-color: var(--primary-bg);
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 8px;
        }

        /* --- Study Cards Styling (Fade Animation) --- */
        .flashcard-container {
            height: 250px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #flashcard-content {
            width: 100%;
            height: 100%;
            background-color: var(--card-bg);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            transition: opacity 0.3s ease-in-out; /* Fade transition */
        }
        
        .flashcard-front-style {
             font-size: 1.5em;
             font-weight: bold;
        }
        
        .flashcard-back-style {
             font-size: 1.1em;
        }

        /* --- Questions Styling (MCQ & T/F) --- */
         .question-container-single, .question-container-all {
            margin-bottom: 15px;
            padding: 15px;
            border: 1px solid var(--secondary-bg);
            border-radius: 5px;
         }

        .question-text {
            font-weight: bold;
            margin-bottom: 15px;
        }

        .options button, .tf-options button {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-align: right;
            transition: background-color 0.3s;
        }

        .options button:hover:not(:disabled), .tf-options button:hover:not(:disabled) {
            background-color: #357ab8;
        }

        .options button:disabled, .tf-options button:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
        
        /* Specific styling to override disabled opacity for correct/incorrect answers */
        .options button.correct, .tf-options button.correct { opacity: 1; }
        .options button.incorrect, .tf-options button.incorrect { opacity: 1; }


        .feedback {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
        }

        .feedback.correct {
            background-color: var(--correct-color);
            color: #fff;
        }

        .feedback.incorrect {
            background-color: var(--incorrect-color);
            color: #fff;
        }

        .explanation {
            margin-top: 10px;
            font-style: italic;
            font-size: 0.9em;
            padding: 8px;
            background-color: var(--secondary-bg);
            border-radius: 4px;
        }

        /* --- Navigation & Utility Styling --- */
        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            margin-bottom: 10px;
        }

        .nav-button, .view-all-button {
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
        }

        .nav-button:disabled {
             opacity: 0.5;
             cursor: not-allowed;
        }

        .counter {
            font-size: 0.9em;
        }

        .view-all-container {
            text-align: center;
            margin-top: 15px;
            margin-bottom: 15px;
        }

        .hidden {
            display: none;
        }

        #mcq-all-questions .question-container-all,
        #tf-all-questions .question-container-all {
            margin-bottom: 20px;
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>סוכרים ומונוסכרידים</h1>

        <!-- Study Cards Section -->
        <div class="section">
            <h2>כרטיסי לימוד</h2>
            <div class="flashcard-container">
                <div id="flashcard-content"></div>
            </div>
            <div class="navigation">
                <button class="nav-button" id="prev-card">הקודם</button>
                <span class="counter" id="card-counter"></span>
                <button class="nav-button" id="next-card">הבא</button>
            </div>
        </div>

        <!-- Multiple Choice Questions Section -->
        <div class="section">
            <h2>שאלות רב-ברירה (אמריקאיות)</h2>
            <div id="mcq-single-view">
                <div class="question-container-single" id="mcq-container">
                    <div class="question-text" id="mcq-question"></div>
                    <div class="options" id="mcq-options"></div>
                    <div class="feedback hidden" id="mcq-feedback"></div>
                    <div class="explanation hidden" id="mcq-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-mcq">הקודם</button>
                    <span class="counter" id="mcq-counter"></span>
                    <button class="nav-button" id="next-mcq">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-mcq">הצג את כל השאלות</button>
                 </div>
            </div>
            <div id="mcq-all-questions" class="hidden">
                <!-- All MCQs will be dynamically inserted here -->
            </div>
        </div>

        <!-- True/False Questions Section -->
        <div class="section">
            <h2>שאלות נכון/לא נכון</h2>
             <div id="tf-single-view">
                <div class="question-container-single" id="tf-container">
                    <div class="question-text" id="tf-question"></div>
                    <div class="tf-options" id="tf-options">
                        <button data-answer="true">נכון</button>
                        <button data-answer="false">לא נכון</button>
                    </div>
                    <div class="feedback hidden" id="tf-feedback"></div>
                    <div class="explanation hidden" id="tf-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-tf">הקודם</button>
                    <span class="counter" id="tf-counter"></span>
                    <button class="nav-button" id="next-tf">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-tf">הצג את כל השאלות</button>
                 </div>
            </div>
             <div id="tf-all-questions" class="hidden">
                 <!-- All T/F Questions will be dynamically inserted here -->
             </div>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        
        const flashcardData = [
            { term: "פחמימה (Carbohydrate)", definition: "תרכובת אורגנית הנפוצה ביותר בצמחים, בעלת נוסחה כללית Cx(H2O)y ומכילה קבוצות פונקציונליות של קרבוניל (C=O) והידרוקסיל (OH)." },
            { term: "מונוסכריד", definition: "יחידת הסוכר הבסיסית ביותר, שאינה ניתנת לפירוק נוסף. לדוגמה: גלוקוז, פרוקטוז." },
            { term: "אלדוז (Aldose)", definition: "מונוסכריד המכיל קבוצת אלדהיד (CHO) כקבוצה הקרבונילית שלו." },
            { term: "קטוז (Ketose)", definition: "מונוסכריד המכיל קבוצת קטון (C=O) בין שני פחמנים כקבוצה הקרבונילית שלו." },
            { term: "פחמן כיראלי", definition: "אטום פחמן הקשור לארבע קבוצות או אטומים שונים, הגורם למולקולה להיות פעילה אופטית." },
            { term: "אננטיומרים", definition: "סטריאואיזומרים שהם תמונות ראי מדויקות זה של זה, אך אינם חופפים. לדוגמה, D-גלוקוז ו-L-גלוקוז." },
            { term: "דיאסטריאומרים", definition: "סטריאואיזומרים שאינם תמונות ראי זה של זה. כל זוג סטריאואיזומרים שאינם אננטיומרים." },
            { term: "אפימרים", definition: "סוג של דיאסטריאומרים הנבדלים זה מזה בקונפיגורציה של מרכז כיראלי אחד בלבד. לדוגמה, גלוקוז וגלקטוז הם אפימרים בפחמן C4." },
            { term: "אנומרים", definition: "סוג של אפימרים הנוצרים כאשר סוכר נסגר למבנה טבעתי. הם נבדלים בקונפיגורציה של הפחמן האנומרי (הפחמן הקרבונילי לשעבר)." },
            { term: "פחמן אנומרי", definition: "הפחמן שהיה חלק מהקבוצה הקרבונילית (אלדהיד או קטון) בשרשרת הפתוחה, והופך למרכז כיראלי חדש עם סגירת הטבעת." },
            { term: "המיאצטל", definition: "קבוצה פונקציונלית הנוצרת מתגובה הפיכה של אלדהיד וכוהל. מבנה הטבעת של אלדוז הוא המיאצטל פנים-מולקולרי." },
            { term: "המיקטל", definition: "קבוצה פונקציונלית הנוצרת מתגובה הפיכה של קטון וכוהל. מבנה הטבעת של קטוז הוא המיקטל פנים-מולקולרי." },
            { term: "מוטרוטציה (Mutarotation)", definition: "השינוי ההדרגתי בסיבוב האופטי של תמיסת סוכר עד להגעה לשיווי משקל. נובע מהמעבר בין אנומר אלפא לאנומר בטא דרך השרשרת הפתוחה." },
            { term: "פירנוז (Pyranose)", definition: "מבנה טבעתי של מונוסכריד המורכב משישה אטומים (חמישה פחמנים וחמצן אחד)." },
            { term: "פורנוז (Furanose)", definition: "מבנה טבעתי של מונוסכריד המורכב מחמישה אטומים (ארבעה פחמנים וחמצן אחד)." },
            { term: "איזומריזציה", definition: "תהליך בו מולקולה הופכת לאיזומר שלה - מולקולה בעלת אותה נוסחה כימית אך סידור אטומים שונה. למשל, המעבר בין גלוקוז לפרוקטוז." },
            { term: "קשר גליקוזידי", definition: "קשר קוולנטי המחבר יחידת סוכר למולקולה אחרת (שיכולה להיות גם סוכר). נוצר בתגובת דחיסה בין המיאצטל/המיקטל לכוהל." },
            { term: "אינדקס גליקמי (GI)", definition: "מדד המדרג מזונות לפי השפעתם על רמת הסוכר (גלוקוז) בדם לאחר אכילתם." }
        ];

        const mcqData = [
            {
                question: "מהי הטענה הנכונה ביותר לגבי ההבדלים המבניים והתפקודיים בין ריבוז לדאוקסיריבוז?",
                options: [
                    "ריבוז הוא קטוז ודאוקסיריבוז הוא אלדוז, ושניהם מרכיבים ATP.",
                    "לשניהם חסרה קבוצת הידרוקסיל בפחמן C2, אך ריבוז הוא חלק מ-RNA ודאוקסיריבוז מ-DNA.",
                    "לדאוקסיריבוז חסרה קבוצת הידרוקסיל בפחמן C2 בהשוואה לריבוז, הבדל קריטי למבנה הדו-גדילי של DNA.",
                    "ריבוז ודאוקסיריבוז הם אפימרים בפחמן C3, מה שמשפיע על תפקידם כאתרי זיהוי בתא."
                ],
                correctIndex: 2,
                explanation: "ההבדל המהותי הוא היעדר קבוצת OH בפחמן מספר 2 של הדאוקסיריבוז, בעוד שבריבוז היא קיימת. הבדל זה מקנה ל-DNA יציבות כימית גבוהה יותר, החיונית לחומר תורשתי, בעוד ריבוז נמצא ב-RNA ובמולקולות אנרגיה כמו ATP."
            },
            {
                question: "כאשר D-גלוקוז עובר סגירה טבעתית ליצירת D-גלוקופירנוז, איזה תהליך כימי מתרחש ומהי התוצאה הסטריאוכימית?",
                options: [
                    "תגובת חמצון-חיזור פנימית היוצרת קשר אתרי וזוג אננטיומרים.",
                    "תגובת סיפוח נוקלאופילי של OH מ-C5 לקטון ב-C2, היוצרת המיקטל ושני אפימרים.",
                    "תגובת דחיסה בין אלדהיד לכוהל היוצרת אצטל וזוג איזומרים מבניים.",
                    "תגובת סיפוח נוקלאופילי של OH מ-C5 לאלדהיד ב-C1, היוצרת המיאצטל וזוג אנומרים (אלפא ובטא)."
                ],
                correctIndex: 3,
                explanation: "סגירת הטבעת של אלדוז כמו גלוקוז היא התקפה נוקלאופילית של קבוצת הידרוקסיל (בדרך כלל מ-C5) על הפחמן הקרבונילי של האלדהיד (C1). תגובה זו יוצרת מבנה המיאצטל טבעתי, והפחמן הקרבונילי לשעבר (C1) הופך למרכז כיראלי חדש, הנקרא הפחמן האנומרי. שני האיזומרים הנוצרים, אלפא ובטא, נקראים אנומרים."
            },
            {
                question: "איזו מהבאות מתארת נכונה את המושג אפימרים?",
                options: [
                    "מולקולות שהן תמונות ראי לא חופפות, כמו D-גליצראלדהיד ו-L-גליצראלדהיד.",
                    "איזומרים הנבדלים בסידור האטומים סביב פחמן אנומרי בלבד, כמו אלפא-D-גלוקוז ובטא-D-גלוקוז.",
                    "איזומרים הנבדלים בתפקיד הקבוצה הקרבונילית, כמו גלוקוז (אלדוז) ופרוקטוז (קטוז).",
                    "דיאסטריאומרים הנבדלים בקונפיגורציה של מרכז כיראלי אחד בלבד, כמו D-גלוקוז ו-D-מנוז (אפימרי C2)."
                ],
                correctIndex: 3,
                explanation: "אפימרים הם סוג ספציפי של דיאסטריאומרים (סטריאואיזומרים שאינם תמונות ראי) הנבדלים זה מזה בסידור המרחבי סביב אטום פחמן א-סימטרי אחד בלבד. D-גלוקוז ו-D-מנוז נבדלים רק בפחמן C2, בעוד D-גלוקוז ו-D-גלקטוז נבדלים רק בפחמן C4."
            },
            {
                question: "בתמיסה מימית של גלוקוז הנמצאת בשיווי משקל, מהו היחס המשוער בין הצורות השונות?",
                options: [
                    "כ-99% צורת שרשרת פתוחה, והשאר מתחלק שווה בשווה בין אלפא ובטא פירנוז.",
                    "כ-50% אלפא-D-גלוקופירנוז, כ-50% בטא-D-גלוקופירנוז, וכמות זניחה של שרשרת פתוחה.",
                    "כ-36% אלפא-D-גלוקופירנוז, כ-64% בטא-D-גלוקופירנוז, ופחות מ-1% צורת שרשרת פתוחה.",
                    "כ-90% צורת פורנוז (5-צלעות) ו-10% צורת פירנוז (6-צלעות)."
                ],
                correctIndex: 2,
                explanation: "בשיווי משקל, תמיסת גלוקוז מכילה בעיקר את הצורות הטבעתיות. בטא-D-גלוקופירנוז היא הצורה הדומיננטית (כ-64%) מכיוון שהיא היציבה ביותר מבחינה סטרית. אלפא-D-גלוקופירנוז מהווה כ-36%, וצורת השרשרת הפתוחה היא מיעוט זניח (פחות מ-0.01%). תופעה זו נקראת מוטרוטציה."
            },
            {
                question: "מהו הבסיס המבני לכך שקונפורמציית הכיסא של בטא-D-גלוקופירנוז יציבה יותר מקונפורמציית הסירה?",
                options: [
                    "בקונפורמציית הסירה כל קבוצות ההידרוקסיל נמצאות בעמדה אקסיאלית.",
                    "בקונפורמציית הכיסא, כל המתמירים הגדולים (OH ו-CH2OH) יכולים לתפוס עמדות אקווטוריאליות, מה שמקטין הפרעה סטרית.",
                    "קונפורמציית הסירה אינה מאפשרת יצירת קשרי מימן פנים-מולקולריים.",
                    "החמצן הטבעתי בקונפורמציית הכיסא נמצא במתח זוויתי נמוך יותר."
                ],
                correctIndex: 1,
                explanation: "היציבות של קונפורמציית הכיסא נובעת מהסידור המרחבי המאפשר למתמירים הגדולים והנפחיים להיות בעמדות אקווטוריאליות (במישור הטבעת), שם ההפרעה הסטרית (דחייה מרחבית) בינם לבין אטומים אחרים היא מינימלית. בקונפורמציית הסירה ישנה דחייה סטרית משמעותית יותר."
            },
            {
                question: "האיזומריזציה בין D-גלוקוז, D-פרוקטוז ו-D-מנוז בתמיסה בסיסית מתרחשת דרך תוצר ביניים משותף. מהו תוצר ביניים זה?",
                options: [
                    "יון קרבניום הנוצר על פחמן C1.",
                    "רדיקל חופשי על החמצן הקרבונילי.",
                    "אנדיול (enediol) הנוצר עקב חומציות המימן האלפא-קרבונילי.",
                    "מבנה אצטל טבעתי זמני."
                ],
                correctIndex: 2,
                explanation: "בסביבה בסיסית, פרוטון (מימן) חומצי על פחמן C2 (פחמן אלפא) יכול להיות מוסר, וליצור יון אנולאט. יון זה נמצא ברזוננס עם מבנה המכיל קשר כפול בין C1 ל-C2 וקבוצות הידרוקסיל, הנקרא אנדיול. פרוטונציה מחדש של האנדיול יכולה להוביל לכל אחד משלושת האיזומרים."

            { question: "סגירת טבעת של קטוז ליצירת מבנה טבעתי יוצרת מבנה המיאצטלי.", answer: false, explanation: "סגירת טבעת של קטוז (קטון + כוהל) יוצרת מבנה המיקטלי. המיאצטל נוצר מסגירת טבעת של אלדוז (אלדהיד + כוהל)." },
            { question: "אנומרים הם סוג מיוחד של אפימרים.", answer: true, explanation: "אנומרים הם איזומרים הנבדלים בקונפיגורציה של מרכז כיראלי אחד בלבד - הפחמן האנומרי. הגדרה זו הופכת אותם למקרה פרטי של אפימרים." },
            { question: "כל הסוכרים מסדרת D מסובבים אור מקוטב ימינה (+).", answer: false, explanation: "אין קשר הכרחי בין הקונפיגורציה המבנית (D) לבין כיוון הסיבוב האופטי (+/-). לדוגמה, D-פרוקטוז מסובב אור שמאלה (levorotatory)." },
            { question: "טבעת פורנוז היא טבעת בת 6 אטומים המכילה אטום חמצן אחד.", answer: false, explanation: "טבעת פורנוז היא טבעת בת 5 אטומים (4 פחמנים וחמצן). טבעת בת 6 אטומים נקראת פירנוז." },
            { question: "קונפורמציית הכיסא של גלוקופירנוז יציבה יותר מקונפורמציית הסירה בעיקר בגלל מתח זוויתי נמוך יותר.", answer: false, explanation: "הסיבה העיקרית ליציבות הגבוהה יותר של קונפורמציית הכיסא היא מיזעור ההפרעה הסטרית, בכך שהמתמירים הגדולים נמצאים בעמדות אקווטוריאליות." },
            { question: "גליקוליזה הוא תהליך המתרחש בציטופלזמה של התא.", answer: true, explanation: "השקף על טריוזים מציין במפורש שתהליך הגליקוליזה, בו מתרחש ביקוע סוכרים, מתרחש בציטופלזמה של התא." },
            { question: "צלולוז הוא פולימר של גלוקוז המשמש בעיקר לאגירת אנרגיה בצמחים.", answer: false, explanation: "צלולוז הוא פולימר מבני המעניק חוזק לדופן התא. הפולימר המשמש לאגירת אנרגיה בצמחים הוא עמילן." },
            { question: "גליצראלדהיד הוא הקטוז הפשוט ביותר.", answer: false, explanation: "גליצראלדהיד הוא האלדוז הפשוט ביותר (אלדוטריוז). הקטוז הפשוט ביותר הוא דיהידרוקסיאצטון (קטוטריוז)." },
            { question: "לדיהידרוקסיאצטון יש מרכז כיראלי אחד.", answer: false, explanation: "לדיהידרוקסיאצטון, הקטוטריוז, אין אף מרכז כיראלי. זוהי הפחמימה הא-כיראלית היחידה." },
            { question: "האיזומריזציה בין גלוקוז לפרוקטוז דורשת תנאים חומציים חזקים.", answer: false, explanation: "האיזומריזציה מתרחשת בתנאים בסיסיים (או בעזרת אנזימים), המאפשרים יצירת תוצר ביניים מסוג אנדיול." },
            { question: "בטא-D-גלוקופירנוז הוא האנומר בו קבוצת ה-OH בפחמן C1 נמצאת באותו צד של הטבעת כמו קבוצת ה-CH2OH (עמדת ציס).", answer: true, explanation: "זו ההגדרה של אנומר בטא. באנומר אלפא, קבוצת ה-OH ב-C1 נמצאת בצד הנגדי (טרנס) לקבוצת ה-CH2OH." },
            { question: "רוב הפחמימות הנמצאות בטבע הן מסדרת L.", answer: false, explanation: "רוב הפחמימות בטבע, כולל אלו המרכיבות את גופנו ואת מזוננו, הן מסדרת D. הדבר נובע מהסטריאוספציפיות של האנזימים המייצרים אותן." },
            { question: "כל הפחמימות הן בעלות טעם מתוק.", answer: false, explanation: "רק פחמימות קטנות יחסית (מונוסכרידים ודיסכרידים) נתפסות בדרך כלל כמתוקות. פוליסכרידים גדולים כמו עמילן או צלולוז אינם מתוקים." },
            { question: "תהליך הפוטוסינתזה הוא תהליך אקסותרמי המשחרר אנרגיה לסביבה.", answer: false, explanation: "פוטוסינתזה הוא תהליך אנדותרמי, כלומר הוא דורש קליטת אנרגיה (בצורת אור) כדי להתרחש." },
            { question: "תפקידן של פחמימות במזון הוא אך ורק לספק אנרגיה (קלוריות).", answer: false, explanation: "לפחמימות תפקידים רבים ומגוונים במזון, כולל הענקת מתיקות, מרקם, נפח, השפעה על נקודות רתיחה וקיפאון, שימור ועוד." },
            { question: "קשר גליקוזידי הוא קשר יוני חזק בין שתי יחידות סוכר.", answer: false, explanation: "קשר גליקוזידי הוא קשר קוולנטי, הנוצר בתגובת דחיסה בין שתי קבוצות הידרוקסיל (כאשר אחת מהן היא אנומרית)." },
            { question: "בטא-לקטוז (סוכר החלב) מורכב מיחידת גלקטוז ויחידת פרוקטוז.", answer: false, explanation: "לקטוז הוא דיסכריד המורכב מבטא-D-גלקטוז ו-D-גלוקוז (שיכול להיות אלפא או בטא)." },
            { question: "אינסולין הוא הורמון המעודד את הכבד לייצר גלוקוז ובכך מעלה את רמתו בדם.", answer: false, explanation: "אינסולין פועל להורדת רמת הגלוקוז בדם על ידי עידוד קליטתו בתאים (כמו שריר ושומן) ועיכוב ייצור גלוקוז בכבד." },
            { question: "האינדקס הגליקמי של גלוקוז הוא 100 ומשמש כערך ייחוס למזונות אחרים.", answer: true, explanation: "גלוקוז טהור משמש כסטנדרט הייחוס למדידת אינדקס גליקמי, וערכו נקבע כ-100. מזונות אחרים מושווים אליו." },
            { question: "שם נפוץ לגלוקוז הוא דקסטרוז.", answer: true, explanation: "השקף על גלוקוז מציין שמות נפוצים, וביניהם דקסטרוז, סוכר ענבים וסוכר הדם." },
            { question: "אננטיומרים נבדלים זה מזה בתכונות פיזיקליות כמו נקודת רתיחה ומסיסות.", answer: false, explanation: "לאננטיומרים יש תכונות פיזיקליות זהות (נקודת רתיחה, התכה, מסיסות וכו). הם נבדלים רק באופן האינטראקציה שלהם עם אור מקוטב ועם סביבות כיראליות אחרות." }
        ];


        // --- Global State Variables ---
        let currentCardIndex = 0;
        let isCardFront = true;
        let isCardAnimating = false;
        let currentMCQIndex = 0;
        let currentTFIndex = 0;
        let mcqAnswers = new Array(mcqData.length).fill(null);
        let tfAnswers = new Array(tfData.length).fill(null);

        // --- DOM Element References ---
        const flashcardContent = document.getElementById('flashcard-content');
        const cardCounter = document.getElementById('card-counter');
        const prevCardBtn = document.getElementById('prev-card');
        const nextCardBtn = document.getElementById('next-card');
        const mcqQuestion = document.getElementById('mcq-question');
        const mcqOptions = document.getElementById('mcq-options');
        const mcqFeedback = document.getElementById('mcq-feedback');
        const mcqExplanation = document.getElementById('mcq-explanation');
        const mcqCounter = document.getElementById('mcq-counter');
        const prevMCQBtn = document.getElementById('prev-mcq');
        const nextMCQBtn = document.getElementById('next-mcq');
        const viewAllMCQBtn = document.getElementById('view-all-mcq');
        const mcqSingleView = document.getElementById('mcq-single-view');
        const mcqAllQuestionsContainer = document.getElementById('mcq-all-questions');
        const tfQuestion = document.getElementById('tf-question');
        const tfOptionsContainer = document.getElementById('tf-options');
        const tfFeedback = document.getElementById('tf-feedback');
        const tfExplanation = document.getElementById('tf-explanation');
        const tfCounter = document.getElementById('tf-counter');
        const prevTFBtn = document.getElementById('prev-tf');
        const nextTFBtn = document.getElementById('next-tf');
        const viewAllTFBtn = document.getElementById('view-all-tf');
        const tfSingleView = document.getElementById('tf-single-view');
        const tfAllQuestionsContainer = document.getElementById('tf-all-questions');

        function displayCard(index) {
            if (!flashcardData || flashcardData.length === 0) return;
            const cardData = flashcardData[index];
            isCardFront = true;
            flashcardContent.style.opacity = '1';
            flashcardContent.textContent = cardData.term;
            flashcardContent.className = 'flashcard-front-style';
            cardCounter.textContent = `כרטיס ${index + 1} / ${flashcardData.length}`;
            prevCardBtn.disabled = index === 0;
            nextCardBtn.disabled = index === flashcardData.length - 1;
        }

        function flipCard() {
            if (isCardAnimating || !flashcardData || flashcardData.length === 0) return;
            isCardAnimating = true;
            flashcardContent.style.opacity = '0';
            setTimeout(() => {
                isCardFront = !isCardFront;
                const cardData = flashcardData[currentCardIndex];
                if (isCardFront) {
                    flashcardContent.textContent = cardData.term;
                    flashcardContent.className = 'flashcard-front-style';
                } else {
                    flashcardContent.textContent = cardData.definition;
                    flashcardContent.className = 'flashcard-back-style';
                }
                flashcardContent.style.opacity = '1';
                isCardAnimating = false;
            }, 300);
        }

        function displayMCQuestion(index) {
            if (!mcqData || mcqData.length === 0) return;
            const qData = mcqData[index];
            mcqQuestion.textContent = qData.question;
            mcqOptions.innerHTML = '';
            mcqFeedback.classList.add('hidden');
            mcqExplanation.classList.add('hidden');
            qData.options.forEach((option, i) => {
                const button = document.createElement('button');
                button.textContent = option;
                button.onclick = () => handleMCQAnswer(index, i);
                mcqOptions.appendChild(button);
            });
            mcqCounter.textContent = `שאלה ${index + 1} / ${mcqData.length}`;
            prevMCQBtn.disabled = index === 0;
            nextMCQBtn.disabled = index === mcqData.length - 1;
            if (mcqAnswers[index] !== null) {
                highlightMCQAnswer(mcqOptions, mcqFeedback, mcqExplanation, index, mcqAnswers[index].selected);
            }
        }

        function handleMCQAnswer(qIndex, selectedIndex) {
            if (mcqAnswers[qIndex] !== null) return;
            const isCorrect = selectedIndex === mcqData[qIndex].correctIndex;
            mcqAnswers[qIndex] = { selected: selectedIndex, correct: isCorrect };
            highlightMCQAnswer(mcqOptions, mcqFeedback, mcqExplanation, qIndex, selectedIndex);
        }
        
        function highlightMCQAnswer(optionsContainer, feedbackEl, explanationEl, qIndex, selectedIndex) {
            const qData = mcqData[qIndex];
            const buttons = optionsContainer.querySelectorAll('button');
            buttons.forEach((button, i) => {
                button.disabled = true;
                if (i === qData.correctIndex) {
                    button.style.backgroundColor = 'var(--correct-color)';
                    button.style.color = '#fff';
                    button.classList.add('correct');
                }
                if (i === selectedIndex && i !== qData.correctIndex) {
                    button.style.backgroundColor = 'var(--incorrect-color)';
                    button.style.color = '#fff';
                    button.classList.add('incorrect');
                }
            });
            feedbackEl.textContent = selectedIndex === qData.correctIndex ? "נכון!" : "לא נכון.";
            feedbackEl.className = `feedback ${selectedIndex === qData.correctIndex ? 'correct' : 'incorrect'}`;
            explanationEl.textContent = `הסבר: ${qData.explanation}`;
            explanationEl.classList.remove('hidden');
        }

        function displayAllMCQ() {
            if (!mcqData || mcqData.length === 0) return;
            mcqSingleView.classList.add('hidden');
            mcqAllQuestionsContainer.innerHTML = ''; 
            mcqData.forEach((qData, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question-container-all';
                questionDiv.innerHTML = `
                    <div class="question-text">${index + 1}. ${qData.question}</div>
                    <div class="options">
                        ${qData.options.map((option, i) => `<button data-qindex="${index}" data-oindex="${i}">${option}</button>`).join('')}
                    </div>
                    <div class="feedback hidden"></div>
                    <div class="explanation hidden"></div>
                `;
                mcqAllQuestionsContainer.appendChild(questionDiv);
                 const optionButtons = questionDiv.querySelectorAll('.options button');
                 optionButtons.forEach(button => {
                     button.onclick = () => {
                        const qIndex = parseInt(button.dataset.qindex);
                        const oIndex = parseInt(button.dataset.oindex);
                        if (mcqAnswers[qIndex] === null) {
                            const isCorrect = oIndex === mcqData[qIndex].correctIndex;
                            mcqAnswers[qIndex] = { selected: oIndex, correct: isCorrect };
                        }
                        const optionsDiv = button.closest('.options');
                        const feedbackDiv = questionDiv.querySelector('.feedback');
                        const explanationDiv = questionDiv.querySelector('.explanation');
                        highlightMCQAnswer(optionsDiv, feedbackDiv, explanationDiv, qIndex, mcqAnswers[qIndex].selected);
                     };
                 });
                 if (mcqAnswers[index] !== null) {
                    const optionsDiv = questionDiv.querySelector('.options');
                    const feedbackDiv = questionDiv.querySelector('.feedback');
                    const explanationDiv = questionDiv.querySelector('.explanation');
                    highlightMCQAnswer(optionsDiv, feedbackDiv, explanationDiv, index, mcqAnswers[index].selected);
                 }
            });
            mcqAllQuestionsContainer.classList.remove('hidden');
        }

        function displayTFQuestion(index) {
            if (!tfData || tfData.length === 0) return;
            const qData = tfData[index];
            tfQuestion.textContent = qData.question;
            tfFeedback.classList.add('hidden');
            tfExplanation.classList.add('hidden');
             const buttons = tfOptionsContainer.querySelectorAll('button');
             buttons.forEach(button => {
                 button.disabled = false;
                 button.style.backgroundColor = '';
                 button.style.color = '';
                 button.classList.remove('correct', 'incorrect');
                 button.onclick = () => handleTFAnswer(index, button.dataset.answer === 'true');
             });
            tfCounter.textContent = `שאלה ${index + 1} / ${tfData.length}`;
            prevTFBtn.disabled = index === 0;
            nextTFBtn.disabled = index === tfData.length - 1;
            if (tfAnswers[index] !== null) {
                highlightTFAnswer(tfOptionsContainer, tfFeedback, tfExplanation, index, tfAnswers[index].selected);
            }
        }
        
        function handleTFAnswer(qIndex, selectedAnswer) {
            if (tfAnswers[qIndex] !== null) return;
            const isCorrect = selectedAnswer === tfData[qIndex].answer;
            tfAnswers[qIndex] = { selected: selectedAnswer, correct: isCorrect };
            highlightTFAnswer(tfOptionsContainer, tfFeedback, tfExplanation, qIndex, selectedAnswer);
        }
        
        function highlightTFAnswer(optionsContainer, feedbackEl, explanationEl, qIndex, selectedAnswer) {
             const qData = tfData[qIndex];
             const buttons = optionsContainer.querySelectorAll('button');
             buttons.forEach(button => {
                 const buttonAnswer = button.dataset.answer === 'true';
                 button.disabled = true;
                 if (buttonAnswer === qData.answer) {
                     button.style.backgroundColor = 'var(--correct-color)';
                     button.style.color = '#fff';
                     button.classList.add('correct');
                 }
                 if (buttonAnswer === selectedAnswer && buttonAnswer !== qData.answer) {
                     button.style.backgroundColor = 'var(--incorrect-color)';
                     button.style.color = '#fff';
                     button.classList.add('incorrect');
                 }
             });
             feedbackEl.textContent = selectedAnswer === qData.answer ? "נכון!" : "לא נכון.";
             feedbackEl.className = `feedback ${selectedAnswer === qData.answer ? 'correct' : 'incorrect'}`;
             explanationEl.textContent = `הסבר: ${qData.explanation}`;
             explanationEl.classList.remove('hidden');
        }
        
        function displayAllTF() {
             if (!tfData || tfData.length === 0) return;
             tfSingleView.classList.add('hidden');
             tfAllQuestionsContainer.innerHTML = '';
             tfData.forEach((qData, index) => {
                 const questionDiv = document.createElement('div');
                 questionDiv.className = 'question-container-all';
                 questionDiv.innerHTML = `
                     <div class="question-text">${index + 1}. ${qData.question}</div>
                     <div class="tf-options">
                         <button data-qindex="${index}" data-answer="true">נכון</button>
                         <button data-qindex="${index}" data-answer="false">לא נכון</button>
                     </div>
                     <div class="feedback hidden"></div>
                     <div class="explanation hidden"></div>
                 `;
                 tfAllQuestionsContainer.appendChild(questionDiv);
                 const optionButtons = questionDiv.querySelectorAll('.tf-options button');
                 optionButtons.forEach(button => {
                     button.onclick = () => {
                         const qIndex = parseInt(button.dataset.qindex);
                         const selectedAnswer = button.dataset.answer === 'true';
                         if (tfAnswers[qIndex] === null) {
                             const isCorrect = selectedAnswer === tfData[qIndex].answer;
                             tfAnswers[qIndex] = { selected: selectedAnswer, correct: isCorrect };
                         }
                         const optionsDiv = button.closest('.tf-options');
                         const feedbackDiv = questionDiv.querySelector('.feedback');
                         const explanationDiv = questionDiv.querySelector('.explanation');
                         highlightTFAnswer(optionsDiv, feedbackDiv, explanationDiv, qIndex, tfAnswers[qIndex].selected);
                     };
                 });
                 if (tfAnswers[index] !== null) {
                    const optionsDiv = questionDiv.querySelector('.tf-options');
                    const feedbackDiv = questionDiv.querySelector('.feedback');
                    const explanationDiv = questionDiv.querySelector('.explanation');
                    highlightTFAnswer(optionsDiv, feedbackDiv, explanationDiv, index, tfAnswers[index].selected);
                 }
             });
             tfAllQuestionsContainer.classList.remove('hidden');
        }

        function initialize() {
            if (flashcardData.length > 0) displayCard(currentCardIndex);
            if (mcqData.length > 0) displayMCQuestion(currentMCQIndex);
            if (tfData.length > 0) displayTFQuestion(currentTFIndex);
            flashcardContent.addEventListener('click', flipCard);
            prevCardBtn.addEventListener('click', () => { if (currentCardIndex > 0) { currentCardIndex--; displayCard(currentCardIndex); } });
            nextCardBtn.addEventListener('click', () => { if (currentCardIndex < flashcardData.length - 1) { currentCardIndex++; displayCard(currentCardIndex); } });
            prevMCQBtn.addEventListener('click', () => { if (currentMCQIndex > 0) { currentMCQIndex--; displayMCQuestion(currentMCQIndex); } });
            nextMCQBtn.addEventListener('click', () => { if (currentMCQIndex < mcqData.length - 1) { currentMCQIndex++; displayMCQuestion(currentMCQIndex); } });
            viewAllMCQBtn.addEventListener('click', displayAllMCQ);
            prevTFBtn.addEventListener('click', () => { if (currentTFIndex > 0) { currentTFIndex--; displayTFQuestion(currentTFIndex); } });
            nextTFBtn.addEventListener('click', () => { if (currentTFIndex < tfData.length - 1) { currentTFIndex++; displayTFQuestion(currentTFIndex); } });
            viewAllTFBtn.addEventListener('click', displayAllTF);
        }
        
        initialize();
    });
    </script>
</body>
</html>
