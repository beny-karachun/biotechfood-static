    <div class="container">
        <h1>כלי עזר ללמידה: גורמים המשפיעים על השחמה לא אנזימטית</h1>
        <p>מסמך זה מבוסס על חומר הקורס מהטכניון, הפקולטה להנדסת-מזון וביוטכנולוגיה, מעבדה בביוכימיה וכימיה של מזון.</p>

        <!-- Theory Section -->
        <section id="theory">
            <h2>חומר תיאורטי</h2>
            <div id="theory-content">
                <!-- Theory content will be populated by JavaScript -->
            </div>
        </section>

        <!-- Study Cards Section -->
        <section id="study-cards">
            <h2>כרטיסיות לימוד</h2>
            <div class="study-card-container">
                <div id="study-card" class="study-card" onclick="flipCard()">
                    <div class="study-card-face study-card-front">
                        <p id="current-card-front" class="study-card-term"></p>
                    </div>
                    <div class="study-card-face study-card-back">
                        <p id="current-card-back" class="study-card-definition"></p>
                    </div>
                </div>
            </div>
            <div class="navigation">
                <button id="prev-card-button" onclick="prevCard()">הקודם</button>
                <span id="card-counter" class="counter"></span>
                <button id="next-card-button" onclick="nextCard()">הבא</button>
            </div>
        </section>

        <!-- Multiple Choice Questions Section -->
        <section id="mcq">
            <h2>שאלות רב-ברירה (MCQ)</h2>
            <div id="mcq-single-view">
                <div class="question-item">
                    <p id="mcq-question-text" class="question-text"></p>
                    <div id="mcq-options-container" class="options-container">
                        <!-- MCQ options will be populated here -->
                    </div>
                    <div id="mcq-feedback" class="feedback" style="display:none;"></div>
                    <div id="mcq-explanation" class="explanation" style="display:none;"></div>
                </div>
                <div class="navigation">
                    <button id="prev-mcq-button" onclick="prevMcq()">הקודם</button>
                    <span id="mcq-counter" class="counter"></span>
                    <button id="next-mcq-button" onclick="nextMcq()">הבא</button>
                </div>
            </div>
            <button onclick="toggleViewAllMcqs()" id="view-all-mcqs-button">הצג/הסתר את כל השאלות</button>
            <div id="mcq-view-all-container" class="view-all-container" style="display:none;">
                <!-- All MCQs will be populated here when "View All" is clicked -->
            </div>
        </section>

        <!-- True/False Questions Section -->
        <section id="tf">
            <h2>שאלות נכון/לא נכון</h2>
            <div id="tf-single-view">
                 <div class="question-item">
                    <p id="tf-question-text" class="question-text"></p>
                    <div id="tf-options-container" class="options-container">
                        <!-- True/False options will be populated here -->
                    </div>
                    <div id="tf-feedback" class="feedback" style="display:none;"></div>
                    <div id="tf-explanation" class="explanation" style="display:none;"></div>
                </div>
                <div class="navigation">
                    <button id="prev-tf-button" onclick="prevTf()">הקודם</button>
                    <span id="tf-counter" class="counter"></span>
                    <button id="next-tf-button" onclick="nextTf()">הבא</button>
                </div>
            </div>
            <button onclick="toggleViewAllTfs()" id="view-all-tfs-button">הצג/הסתר את כל השאלות</button>
            <div id="tf-view-all-container" class="view-all-container" style="display:none;">
                <!-- All T/F questions will be populated here when "View All" is clicked -->
            </div>
        </section>

    <script>
        // --- DATA ---

        // Theory Content
        const theoryContent = `
            <p>תהליכי השחמה הינם תופעה נפוצה המתרחשת במהלך עיבוד ואחסון של מוצרי מזון ורכיביהם. תגובות אלו יכולות להיות מזורזות על ידי פעילות אנזימטית או על ידי חשיפה לחום.</p>
            <p>במסגרת לימוד זה, ההתמקדות היא בהשחמה שאינה אנזימטית, ובפרט בריאקצית Maillard. ריאקציה זו נחקרת במערכות מודל המורכבות מסוכרים ומחומצות אמינו.</p>
            <p>השלב הראשוני והמכריע בריאקצית Maillard כולל יצירת קשר כימי בין קבוצות קרבוניליות, המצויות בסוכרים (בצורתם הפתוחה), לבין קבוצות אמיניות, המצויות בחומצות אמינו, פפטידים וחלבונים. קבוצה קרבונילית היא קבוצה פונקציונלית מהצורה $C=O$.</p>
            <p>בשלבים מתקדמים יותר של התגובה, נוצרים פולימרים מורכבים וצבעוניים הנקראים מלנואידים. למלנואידים משקל מולקולרי גבוה, והם האחראים העיקריים להקניית הצבע הכהה (חום עד שחור) האופייני לתערובת שעברה את התגובה.</p>
            <p>קצב ההתקדמות של ריאקצית Maillard, וכתוצאה מכך מידת ההשחמה, מושפע ממספר גורמים מרכזיים:</p>
            <ul>
                <li><strong>טמפרטורה:</strong> טמפרטורות גבוהות מאיצות משמעותית את קצב התגובה.</li>
                <li><strong>ריכוז הסוכר:</strong> ריכוז גבוה יותר של סוכר מחזר יכול להוביל להשחמה אינטנסיבית יותר, עד לגבול מסוים.</li>
                <li><strong>סוג הסוכר:</strong> סוכרים שונים מגיבים בקצבים שונים. סוכרים מחזרים (כגון גלוקוז, פרוקטוז, לקטוז) מגיבים מהר יותר מסוכרים שאינם מחזרים (כגון סוכרוז) אשר דורשים תחילה הידרוליזה.</li>
                <li><strong>רמת החומציות ($pH$):</strong> ריאקצית Maillard מועדפת לרוב בסביבה בסיסית או ניטרלית. $pH$ נמוך (סביבה חומצית) יכול לעכב את התגובה. ערך $pH$ אופטימלי תלוי במערכת הספציפית.</li>
            </ul>
            <p>מטרת הניסוי המתואר במקור היא לבחון באופן כמותי כיצד סוג הסוכר וריכוזו משפיעים על היקף ההשחמה הלא אנזימטית במערכת מבוקרת.</p>
        `;

        // Study Cards Data
        const studyCardsData = [
            { term: "השחמה לא אנזימטית", definition: "תהליך כימי המתרחש במזון, בעיקר בנוכחות סוכרים וחומצות אמינו או חלבונים, המוביל ליצירת צבע חום ושינויים בטעם ובארומה, ללא מעורבות של אנזימים. הדוגמה הקלאסית היא ריאקצית Maillard." },
            { term: "ריאקצית Maillard", definition: "סדרה מורכבת של תגובות כימיות בין חומצות אמינו לסוכרים מחזרים, המתרחשת בחום. היא גורמת להשחמה וליצירת מגוון רחב של תרכובות טעם וארומה במזונות רבים." },
            { term: "קבוצה קרבונילית", definition: "קבוצה פונקציונלית המורכבת מאטום פחמן הקשור בקשר כפול לאטום חמצן ($C=O$). קיימת בסוכרים מחזרים (בצורתם הפתוחה) והיא חיונית לתחילת ריאקצית Maillard." },
            { term: "קבוצה אמינית", definition: "קבוצה פונקציונלית המכילה אטום חנקן הקשור לאטומי מימן או פחמן (למשל, $-NH_2$). קיימת בחומצות אמינו, פפטידים וחלבונים, ומשתתפת בריאקצית Maillard." },
            { term: "מלנואידים", definition: "פולימרים הטרוגניים בעלי משקל מולקולרי גבוה וצבע חום-שחור, הנוצרים בשלבים המאוחרים של ריאקצית Maillard. הם תורמים לצבע ולעיתים לטעם של מזונות שעברו השחמה." },
            { term: "טמפרטורה (בהקשר להשחמה)", definition: "גורם מרכזי המשפיע על קצב ריאקצית Maillard. טמפרטורות גבוהות יותר מאיצות את התגובה באופן משמעותי. בניסוי משתמשים באמבט מים רותחים ($100^{\\circ}C$)." },
            { term: "ריכוז סוכר", definition: "כמות הסוכר הזמינה לתגובה. ריכוז גבוה יותר של סוכר מחזר יכול להוביל להשחמה אינטנסיבית יותר, עד לנקודה מסוימת. בניסוי נבדקים ריכוזים שונים (למשל, $0.25 \\text{ M}$, $0.125 \\text{ M}$, $0.0625 \\text{ M}$)." },
            { term: "סוג סוכר", definition: "מבנה הסוכר משפיע על נטייתו להשתתף בריאקצית Maillard. סוכרים מחזרים (כמו פרוקטוז ולקטוז) מגיבים ישירות. סוכרוז (סוכר שאינו מחזר) צריך לעבור הידרוליזה לגלוקוז ופרוקטוז כדי להגיב ביעילות." },
            { term: "$pH$ (בהקשר להשחמה)", definition: "רמת החומציות של הסביבה. ריאקצית Maillard מועדפת בתנאים בסיסיים או ניטרליים. $pH$ נמוך (חומצי) יכול לעכב את התגובה. בניסוי משתמשים בבופר $pH=8$." },
            { term: "בופר סורנסון $pH=8$", definition: "תמיסת בופר (Sorensen buffer) המשמשת לשמירה על רמת $pH$ קבועה של 8 במערכת התגובה, תנאי המעודד את ריאקצית Maillard." },
            { term: "גליצין $0.1 \\text{ M}$", definition: "חומצת אמינו פשוטה המשמשת בניסוי כמקור לקבוצות אמיניות לצורך ריאקצית Maillard עם הסוכרים השונים. ריכוזה בתמיסה הוא $0.1 \\text{ Molar}$." },
            { term: "פרוקטוז", definition: "חד-סוכר (מונוסכריד) מסוג קטוהקסוז. סוכר מחזר המשתתף ביעילות בריאקצית Maillard. בניסוי נבדק בריכוז התחלתי של $0.25 \\text{ M}$." },
            { term: "לקטוז", definition: "דו-סוכר (דיסכריד) המורכב מגלוקוז וגלקטוז. סוכר מחזר המשתתף בריאקצית Maillard. בניסוי נבדק בריכוז התחלתי של $0.25 \\text{ M}$." },
            { term: "סוכרוז", definition: "דו-סוכר (דיסכריד) המורכב מגלוקוז ופרוקטוז. סוכר שאינו מחזר בתנאים רגילים, ולכן צפוי להראות פחות השחמה או השחמה איטית יותר בהשוואה לסוכרים מחזרים, אלא אם עובר הידרוליזה בתנאי הניסוי. בניסוי נבדק בריכוז התחלתי של $0.25 \\text{ M}$." },
            { term: "אמבט מים רותחים", definition: "אמצעי חימום המספק טמפרטורה קבועה של $100^{\\circ}C$ (מעלות צלזיוס) לצורך האצת ריאקצית ההשחמה במבחנות הניסוי." },
            { term: "מהלך העבודה - מיהול סוכרים", definition: "שלב הכנה בו מכינים תמיסות סוכר (פרוקטוז, לקטוז, סוכרוז) בריכוזים נמוכים יותר (למשל $0.125 \\text{ M}, 0.0625 \\text{ M}$) מהתמיסה המקורית ($0.25 \\text{ M}$) על ידי מיהול בבופר סורנסון $pH=8$ לנפח סופי של $5 \\text{ mL}$." },
            { term: "הכנת מבחנות התגובה", definition: "לכל מבחנה מוסיפים $2.5 \\text{ mL}$ תמיסת גליצין, ולאחר מכן $2.5 \\text{ mL}$ מתמיסת הסוכר המתאימה (בריכוז הרצוי). מערבבים היטב באמצעות וורטקס." },
            { term: "מבחנת בלאנק (Blank)", definition: "מבחנת ביקורת המכילה את כל רכיבי התגובה פרט לאחד מהמגיבים העיקריים הגורמים לצבע. בניסוי זה, היא מכילה $2.5 \\text{ mL}$ תמיסת גליצין ו-$2.5 \\text{ mL}$ בופר סורנסון $pH=8$ (במקום תמיסת סוכר). משמשת לאיפוס הספקטרופוטומטר." },
            { term: "וורטקס (Vortex)", definition: "מכשיר מעבדה המשמש לערבוב יסודי של תמיסות במבחנות על ידי יצירת מערבולת חזקה." },

            studyCardEl.classList.remove('is-flipped');
            cardCounterEl.textContent = `כרטיסיה ${index + 1} / ${studyCardsData.length}`;

        // --- MCQ LOGIC ---

            const q = mcqData[index];
            let questionTextEl, optionsContainerEl, feedbackEl, explanationEl, counterEl;

            if (isViewAll) {
                // Construct IDs for "View All" elements
                questionTextEl = document.getElementById(`mcq-all-question-text-${index}`);
                optionsContainerEl = document.getElementById(`mcq-all-options-container-${index}`);
                feedbackEl = document.getElementById(`mcq-all-feedback-${index}`);
                explanationEl = document.getElementById(`mcq-all-explanation-${index}`);
                // Counter is not per question in "View All"
            } else {
                // Use single view elements
                questionTextEl = mcqQuestionText;
                optionsContainerEl = mcqOptionsContainer;
                feedbackEl = mcqFeedback;
                explanationEl = mcqExplanation;
                counterEl = mcqCounterEl;
                counterEl.textContent = `שאלה ${index + 1} / ${mcqData.length}`;
            }
            
            if (!questionTextEl) return; // Element not found (e.g. view all not generated yet)

            questionTextEl.innerHTML = q.question; // Use innerHTML for MathJax
            optionsContainerEl.innerHTML = ''; // Clear previous options

            q.options.forEach((option, i) => {
                const button = document.createElement('button');
                button.innerHTML = option; // Use innerHTML for MathJax
                button.onclick = () => selectMcqOption(index, i, isViewAll);
                optionsContainerEl.appendChild(button);

            // Reset feedback and explanation
            feedbackEl.style.display = 'none';
            explanationEl.style.display = 'none';
            
            // If question was already answered, display its state
            if (q.isAnswered) {
                showMcqFeedback(index, q.selectedOption, isViewAll);
            }
            renderMath();
        }

        function selectMcqOption(questionIndex, optionIndex, isViewAll) {
            const q = mcqData[questionIndex];

            q.selectedOption = optionIndex;
            q.isAnswered = true;
            
            showMcqFeedback(questionIndex, optionIndex, isViewAll);

            // If interaction is in single view, update the displayed MCQ
            if (!isViewAll && currentMcqIndex === questionIndex) {
                 // Disable options for single view
                const singleViewOptions = mcqOptionsContainer.getElementsByTagName('button');
                for (let btn of singleViewOptions) {
                    btn.disabled = true;
                }
            } else if (isViewAll) {
                // Disable options for this specific question in "View All"
                const allViewOptionsContainer = document.getElementById(`mcq-all-options-container-${questionIndex}`);
                if (allViewOptionsContainer) {
                    const allViewOptions = allViewOptionsContainer.getElementsByTagName('button');
                    for (let btn of allViewOptions) {
                        btn.disabled = true;
                    }
                }
            }
        }

        function showMcqFeedback(questionIndex, selectedOptionIndex, isViewAll) {

            if (isViewAll) {
                optionsContainerEl = document.getElementById(`mcq-all-options-container-${questionIndex}`);
                feedbackEl = document.getElementById(`mcq-all-feedback-${questionIndex}`);
                explanationEl = document.getElementById(`mcq-all-explanation-${questionIndex}`);
            } else {
                optionsContainerEl = mcqOptionsContainer;
                feedbackEl = mcqFeedback;
                explanationEl = mcqExplanation;
            }
            
            if (!optionsContainerEl) return; // Safety check

            const buttons = optionsContainerEl.getElementsByTagName('button');
            buttons[selectedOptionIndex].classList.add(selectedOptionIndex === q.answer ? 'correct' : 'incorrect');
            if (selectedOptionIndex !== q.answer) {
                buttons[q.answer].classList.add('correct'); // Also show the correct answer
            }

            for (let btn of buttons) {
                btn.disabled = true; // Disable all options after an answer
            }

            feedbackEl.textContent = selectedOptionIndex === q.answer ? 'נכון!' : 'לא נכון.';
            feedbackEl.className = `feedback ${selectedOptionIndex === q.answer ? 'correct' : 'incorrect'}`;

            explanationEl.style.display = 'block';
            renderMath();
        }

                        itemDiv.className = 'question-item';
                        itemDiv.innerHTML = `
                            <p id="mcq-all-question-text-${index}" class="question-text"></p>
                            <div id="mcq-all-options-container-${index}" class="options-container"></div>
                            <div id="mcq-all-feedback-${index}" class="feedback" style="display:none;"></div>
                            <div id="mcq-all-explanation-${index}" class="explanation" style="display:none;"></div>
                        `;
                        mcqViewAllContainer.appendChild(itemDiv);
                        displayMcq(index, true); // true for ViewAll mode
                    });
                }
            } else {
                mcqViewAllContainer.style.display = 'none';
                btn.textContent = 'הצג את כל השאלות';
            }
            renderMath();
        }

        // --- TRUE/FALSE LOGIC --- (Similar to MCQ)
        function displayTf(index, isViewAll) {
            const q = tfData[index];
            let questionTextEl, optionsContainerEl, feedbackEl, explanationEl, counterEl;

            if (isViewAll) {
                questionTextEl = document.getElementById(`tf-all-question-text-${index}`);
                optionsContainerEl = document.getElementById(`tf-all-options-container-${index}`);
                feedbackEl = document.getElementById(`tf-all-feedback-${index}`);
                explanationEl = document.getElementById(`tf-all-explanation-${index}`);
            } else {
                questionTextEl = tfQuestionText;
                optionsContainerEl = tfOptionsContainer;
                feedbackEl = tfFeedback;
                explanationEl = tfExplanation;
                counterEl = tfCounterEl;
                counterEl.textContent = `שאלה ${index + 1} / ${tfData.length}`;
            }

            if (!questionTextEl) return;

            questionTextEl.innerHTML = q.question; // Use innerHTML for MathJax
            optionsContainerEl.innerHTML = '';

            const trueButton = document.createElement('button');
            trueButton.textContent = 'נכון';
            trueButton.onclick = () => selectTfOption(index, true, isViewAll);
            optionsContainerEl.appendChild(trueButton);

            const falseButton = document.createElement('button');
            falseButton.textContent = 'לא נכון';
            falseButton.onclick = () => selectTfOption(index, false, isViewAll);
            optionsContainerEl.appendChild(falseButton);
            
            feedbackEl.style.display = 'none';
            explanationEl.style.display = 'none';

            if (q.isAnswered) {
                showTfFeedback(index, q.selectedOption, isViewAll);
            }
            renderMath();
        }

        function selectTfOption(questionIndex, chosenAnswer, isViewAll) {
            const q = tfData[questionIndex];
            if (q.isAnswered) return;

            q.selectedOption = chosenAnswer;
            q.isAnswered = true;

            showTfFeedback(questionIndex, chosenAnswer, isViewAll);
            
            if (!isViewAll && currentTfIndex === questionIndex) {
                const singleViewOptions = tfOptionsContainer.getElementsByTagName('button');
                for (let btn of singleViewOptions) {
                    btn.disabled = true;
                }
            } else if (isViewAll) {
                const allViewOptionsContainer = document.getElementById(`tf-all-options-container-${questionIndex}`);
                if (allViewOptionsContainer) {
                    const allViewOptions = allViewOptionsContainer.getElementsByTagName('button');
                    for (let btn of allViewOptions) {
                        btn.disabled = true;
                    }
                }
            }
        }
        
        function showTfFeedback(questionIndex, chosenAnswer, isViewAll) {
            const q = tfData[questionIndex];
            let optionsContainerEl, feedbackEl, explanationEl;

            if (isViewAll) {
                optionsContainerEl = document.getElementById(`tf-all-options-container-${questionIndex}`);
                feedbackEl = document.getElementById(`tf-all-feedback-${questionIndex}`);
                explanationEl = document.getElementById(`tf-all-explanation-${questionIndex}`);
            } else {
                optionsContainerEl = tfOptionsContainer;
                feedbackEl = tfFeedback;
                explanationEl = tfExplanation;
            }

            if (!optionsContainerEl) return;

            const buttons = optionsContainerEl.getElementsByTagName('button'); // 0: True, 1: False
            const correctButtonIndex = q.answer ? 0 : 1;
            const chosenButtonIndex = chosenAnswer ? 0 : 1;

            buttons[chosenButtonIndex].classList.add(chosenAnswer === q.answer ? 'correct' : 'incorrect');
            if (chosenAnswer !== q.answer) {
                buttons[correctButtonIndex].classList.add('correct');
            }
            
            for (let btn of buttons) {
                btn.disabled = true;
            }

            feedbackEl.textContent = chosenAnswer === q.answer ? 'נכון!' : 'לא נכון.';
            feedbackEl.className = `feedback ${chosenAnswer === q.answer ? 'correct' : 'incorrect'}`;
            feedbackEl.style.display = 'block';

            explanationEl.innerHTML = `<strong>הסבר:</strong> ${q.explanation}`; // Use innerHTML for MathJax
            explanationEl.style.display = 'block';
            renderMath();
        }


        function nextTf() {
            currentTfIndex = (currentTfIndex + 1) % tfData.length;
            displayTf(currentTfIndex, false);
        }

        function prevTf() {
            currentTfIndex = (currentTfIndex - 1 + tfData.length) % tfData.length;
            displayTf(currentTfIndex, false);
        }

        function toggleViewAllTfs() {
            const btn = document.getElementById('view-all-tfs-button');
            if (tfViewAllContainer.style.display === 'none') {
                tfViewAllContainer.style.display = 'block';
                btn.textContent = 'הסתר את כל השאלות';
                if (tfViewAllContainer.innerHTML === '') { // Populate only once
                    tfData.forEach((q, index) => {
                        const itemDiv = document.createElement('div');
                        itemDiv.className = 'question-item';
                        itemDiv.innerHTML = `
                            <p id="tf-all-question-text-${index}" class="question-text"></p>
                            <div id="tf-all-options-container-${index}" class="options-container"></div>
                            <div id="tf-all-feedback-${index}" class="feedback" style="display:none;"></div>
                            <div id="tf-all-explanation-${index}" class="explanation" style="display:none;"></div>
                        `;
                        tfViewAllContainer.appendChild(itemDiv);
                        displayTf(index, true); // true for ViewAll mode
                    });
                }
            } else {
                tfViewAllContainer.style.display = 'none';
                btn.textContent = 'הצג את כל השאלות';
            }
            renderMath();
        }

        // --- START THE APP ---
        document.addEventListener('DOMContentLoaded', initApp);

    </script>
</body>
</html>
