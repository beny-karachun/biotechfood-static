<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>שבוע 5: יסודות אבטחת איכות</title>
    <style>
        :root {
            --primary-bg: #333333;
            --secondary-bg: #666666;
            --accent-color: #3D90D7;
            --text-color: #E0E0E0;
            --correct-color: #4CAF50;
            --incorrect-color: #F44336;
            --card-front-bg: #5a5a5a;
            --card-back-bg: #707070;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-color);
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 90%; /* Roughly 2/3rds on wider screens */
            margin: 20px auto;
            padding: 20px;
            background-color: var(--secondary-bg);
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        h1, h2 {
            color: var(--accent-color);
            text-align: center;
            border-bottom: 1px solid var(--accent-color);
            padding-bottom: 10px;
        }

        .section {
            background-color: var(--primary-bg);
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 8px;
        }

        /* Flashcards Styling */
        .flashcard-container {
            perspective: 1000px;
            height: 250px;
            margin-bottom: 15px; /* Reduced spacing */
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s;
            cursor: pointer;
            border-radius: 8px;
        }

        .flashcard.is-flipped {
            transform: rotateY(180deg);
        }

        .flashcard-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            border-radius: 8px;
            box-sizing: border-box; /* Include padding in size */
        }

        .flashcard-front {
            background-color: var(--card-front-bg);
            font-size: 1.5em;
            font-weight: bold;
        }

        .flashcard-back {
            background-color: var(--card-back-bg);
            transform: rotateY(180deg);
        }

        /* Questions Styling */
         .question-container-single, .question-container-all {
            margin-bottom: 15px; /* Reduced spacing */
            padding: 15px;
            border: 1px solid var(--secondary-bg);
            border-radius: 5px;
         }

        .question-text {
            font-weight: bold;
            margin-bottom: 15px;
        }

        .options button, .tf-options button {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-align: right; /* Align text right for Hebrew */
            transition: background-color 0.3s;
        }

        .options button:hover:not(:disabled), .tf-options button:hover:not(:disabled) {
            background-color: #357ab8; /* Darker blue on hover */
        }

        .options button:disabled, .tf-options button:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .feedback {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
        }

        .feedback.correct {
            background-color: var(--correct-color);
            color: #fff;
        }

        .feedback.incorrect {
            background-color: var(--incorrect-color);
            color: #fff;
        }

        .explanation {
            margin-top: 10px;
            font-style: italic;
            font-size: 0.9em;
            padding: 8px;
            background-color: var(--secondary-bg);
            border-radius: 4px;
        }

        /* Navigation Styling */
        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px; /* Reduced spacing from interactive element */
            margin-bottom: 10px; /* Space before View All button */
        }

        .nav-button, .view-all-button {
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
        }

        .nav-button:disabled {
             opacity: 0.5;
             cursor: not-allowed;
        }

        .counter {
            font-size: 0.9em;
        }

        /* View All Questions Button */
        .view-all-container {
            text-align: center;
            margin-top: 15px; /* Ensure spacing */
            margin-bottom: 15px;
        }

        /* Hidden by default */
        .hidden {
            display: none;
        }

        /* Styling for "View All" mode */
        #mcq-all-questions .question-container-all,
        #tf-all-questions .question-container-all {
            margin-bottom: 20px; /* Spacing between questions in all view */
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>שבוע 5: יסודות אבטחת איכות</h1>

        <!-- Study Cards Section -->
        <div class="section">
            <h2>כרטיסי לימוד</h2>
            <div class="flashcard-container">
                <div class="flashcard" id="flashcard">
                    <div class="flashcard-face flashcard-front" id="flashcard-front"></div>
                    <div class="flashcard-face flashcard-back" id="flashcard-back"></div>
                </div>
            </div>
            <div class="navigation">
                <button class="nav-button" id="prev-card">הקודם</button>
                <span class="counter" id="card-counter"></span>
                <button class="nav-button" id="next-card">הבא</button>
            </div>
        </div>

        <!-- Multiple Choice Questions Section -->
        <div class="section">
            <h2>שאלות רב-ברירה (אמריקאיות)</h2>
            <div id="mcq-single-view">
                <div class="question-container-single" id="mcq-container">
                    <div class="question-text" id="mcq-question"></div>
                    <div class="options" id="mcq-options"></div>
                    <div class="feedback hidden" id="mcq-feedback"></div>
                    <div class="explanation hidden" id="mcq-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-mcq">הקודם</button>
                    <span class="counter" id="mcq-counter"></span>
                    <button class="nav-button" id="next-mcq">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-mcq">הצג את כל השאלות</button>
                 </div>
            </div>
            <div id="mcq-all-questions" class="hidden">
                <!-- All MCQs will be dynamically inserted here -->
            </div>
        </div>

        <!-- True/False Questions Section -->
        <div class="section">
            <h2>שאלות נכון/לא נכון</h2>
             <div id="tf-single-view">
                <div class="question-container-single" id="tf-container">
                    <div class="question-text" id="tf-question"></div>
                    <div class="tf-options" id="tf-options">
                        <button data-answer="true">נכון</button>
                        <button data-answer="false">לא נכון</button>
                    </div>
                    <div class="feedback hidden" id="tf-feedback"></div>
                    <div class="explanation hidden" id="tf-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-tf">הקודם</button>
                    <span class="counter" id="tf-counter"></span>
                    <button class="nav-button" id="next-tf">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-tf">הצג את כל השאלות</button>
                 </div>
            </div>
             <div id="tf-all-questions" class="hidden">
                 <!-- All T/F Questions will be dynamically inserted here -->
             </div>
        </div>
    </div>

    <script>
        // --- Data for Week 5 ---

        const flashcardData = [
            { term: "ניהול איכות כוללת (TQM)", definition: "גישה ניהולית הממוקדת באיכות, המבוססת על השתתפות כל חברי הארגון ומכוונת להצלחה ארוכת טווח דרך שביעות רצון הלקוח ותועלת לכל חברי הארגון והחברה." },
            { term: "גישת Farm to Fork (בהקשר לאיכות)", definition: "החלת עקרונות ניהול ובקרת איכות לאורך כל שרשרת המזון, מהשדה (חומרי גלם) ועד לצרכן הסופי (הצלחת)." },
            { term: "איכות (Quality)", definition: "התאמה של המוצר לשימוש המיועד ולציפיות של הצרכן. זהו מושג דינמי המשתנה עם הזמן ודורש שיפור מתמיד." },
            { term: "אבטחת איכות (Quality Assurance - QA)", definition: "מערכת של פעילויות מתוכננות ושיטתיות המיושמות במסגרת מערכת האיכות, אשר ניתן להוכיחן כנדרש, כדי לספק ביטחון הולם שיישות תקיים את דרישות האיכות." },
            { term: "בקרת איכות (Quality Control - QC)", definition: "הטכניקות והפעילויות התפעוליות המשמשות למילוי דרישות האיכות; תהליך הכולל את כל הבדיקות המבוצעות למוצר להבטחת תקינותו." },
            { term: "סיכוני איכות (במזון)", definition: "בעיות בטיחות, תלונות לקוח, תביעות משפטיות, פגיעה תדמיתית בתקשורת, השמדות מוצרים." },
            { term: "תלונה (לקוח)", definition: "מדד לעקביות בטיחות ואיכות המוצר ועמידתו בציפיות הצרכן. מהווה כלי לבחינה ושיפור מוצרים." },
            { term: "תביעה ייצוגית (בהקשר למזון)", definition: "הליך משפטי (בישראל מ-2006) המאפשר לאדם שנפגע ממוצר מזון להגיש תלונה בשם הציבור בתהליך פשוט יחסית, לעומת תביעה אישית." },
            { term: "שיפור מתמיד", definition: "עיקרון מרכזי בניהול איכות, לפיו איכות אינה מצב סופי אלא תהליך מתמשך של שיפור והתאמה לציפיות משתנות." },
            { term: "בקרת חומרי גלם", definition: "חלק מבקרת האיכות המתבצע בכניסה למפעל, לוודא שחומרי הגלם עומדים במפרטים הנדרשים לאיכות ובטיחות." },
            { term: "בקרת תהליך", definition: "חלק מבקרת האיכות המתבצע במהלך הייצור, לוודא שהתהליכים מתבצעים לפי ההוראות והתקנים כדי להבטיח מוצר איכותי." },
            { term: "בקרת מוצר סופי", definition: "חלק מבקרת האיכות המתבצע לפני שחרור המוצר לשוק, לוודא שהמוצר המוגמר עומד בכל דרישות האיכות והבטיחות." },
            { term: "מפרט (Specification)", definition: "מסמך המגדיר את הדרישות והמאפיינים של חומר גלם, תהליך או מוצר סופי." },
            { term: "מרכיבי אבטחת איכות", definition: "פיתוח, ניהול רכש וספקים, בקרת קבלה, הוראות עבודה ובקרת איכות, הדרכות והסמכות, תשתיות וציוד, שירות צרכנים, ניהול סטיות, תקינה." },
            { term: "ציפיות הצרכן (מהמוצר)", definition: "טעם ומרקם מוכרים או רצויים, אחידות, טריות, חיי מדף ארוכים, בטיחות לצריכה, עמידה בתקנות, זמינות ומחיר הוגן." }
        ];

        const mcqData = [
            {
                question: "מהי המטרה העיקרית של ניהול איכות כוללת (TQM) בשרשרת המזון?",
                options: ["להוריד את מחיר המוצר הסופי", "להבטיח בטיחות ואיכות לאורך כל השלבים, מהשדה לצלחת", "לייצר רק מוצרים אורגניים", "להגדיל את מהירות הייצור"],
                correctIndex: 1,
                explanation: "גישת ה-Farm to Fork בניהול איכות מדגישה את הצורך לוודא בטיחות ואיכות בכל שלב, החל מחומר הגלם ועד למוצר המוגמר אצל הצרכן."
            },
            {
                question: "מהי ההגדרה הטובה ביותר ל'איכות' בהקשר של מוצר מזון?",
                options: ["המוצר הכי זול בקטגוריה", "התאמה לשימוש המיועד ולציפיות הצרכן", "אריזה בצבע אדום", "כמות הקלוריות הנמוכה ביותר"],
                correctIndex: 1,
                explanation: "איכות מוגדרת כיכולת המוצר לענות על הצרכים והציפיות של קהל היעד שלו."
            },
            {
                question: "מדוע איכות היא מושג דינמי?",
                options: ["כי היא תלויה במזג האוויר", "כי ציפיות הצרכנים והתקנים משתנים עם הזמן", "כי חומרי הגלם תמיד משתנים", "כי רק מכונות חדשות מייצרות איכות"],
                correctIndex: 1,
                explanation: "העדפות הצרכנים, הטכנולוגיה, התקנות והמתחרים משתנים כל הזמן, ולכן מה שנחשב איכותי היום עשוי לא להספיק מחר."
            },
            {
                question: "מה ההבדל המרכזי בין אבטחת איכות (QA) לבקרת איכות (QC)?",
                options: ["אין הבדל מהותי", "QA מתמקדת במניעה ובמערכת הכוללת, QC מתמקדת בבדיקות ובאיתור פגמים", "QA נעשית רק בסוף התהליך, QC רק בהתחלה", "QC היא חלק מפיתוח המוצר, QA היא חלק מהשיווק"],
                correctIndex: 1,
                explanation: "אבטחת איכות היא מערכתית ומטרתה למנוע בעיות איכות, בעוד בקרת איכות היא הפעילות התפעולית של בדיקת המוצר או התהליך כדי לוודא עמידה בדרישות."
            },
            {
                question: "באיזה שלב מתבצעת בקרת איכות?",
                options: ["רק על חומרי הגלם הנכנסים", "רק על המוצר הסופי לפני שיווק", "רק במהלך תהליך הייצור", "בכל השלבים: קבלת חומרי גלם, במהלך הייצור ועל המוצר הסופי"],
                correctIndex: 3,
                explanation: "הטקסט מחלק את בקרת האיכות לשלושה שלבים עיקריים: בקרת חומרי גלם, בקרת תהליך ובקרת מוצר סופי."
            },
            {
                question: "מה ניתן ללמוד מהתפתחות יחס הלקוח לתקלות במוצר?",
                options: ["לקוחות מתלוננים פחות מבעבר", "לקוחות כיום מצפים לפיצוי נמוך יותר", "לקוחות כיום נוטים יותר לתבוע ולפרסם תקלות בתקשורת", "חברות מתעלמות לחלוטין מתלונות לקוחות"],
                correctIndex: 2,
                explanation: "הטקסט מתאר התפתחות מיחס סלחני יחסית בעבר, דרך תלונה לחנות ולחברה, ועד למצב כיום שבו לקוחות תובעים (לרבות ייצוגית) ומפרסמים ברבים, מה שמגביר את הסיכון התדמיתי לחברות."
            },
            {
                question: "מהי אחת הסיבות העיקריות לצורך בניהול איכות במפעל מזון?",
                options: ["כדי להעסיק יותר עובדים", "כדי להגדיל רווחים ולחסוך בעלויות הנגרמות מאי-איכות", "כדי להשתמש ביותר חומרי גלם", "זה דרישה אופנתית בלבד"],
                correctIndex: 1,
                explanation: "איכות טובה מגדילה את אמון הלקוחות והמוניטין (פוטנציאל לרווח גבוה יותר) וחוסכת עלויות של החזרות, השמדות, תביעות ופגיעה במוניטין."
            },
            {
                question: "איזה מהבאים אינו סיכון ישיר הנגרם מאיכות ירודה של מוצר מזון?",
                options: ["פגיעה בבריאות הצרכן", "תלונות לקוח רבות", "עלייה במחיר חומרי הגלם", "פגיעה תדמיתית לחברה"],
                correctIndex: 2,
                explanation: "בעוד שאיכות ירודה יכולה לנבוע משימוש בחומרי גלם זולים, היא עצמה אינה גורמת לעליית מחיר חומרי הגלם. הסיכונים הישירים הם בטיחותיים, תפעוליים, משפטיים ותדמיתיים."
            },
            {
                question: "מהו תפקידן של תלונות לקוח במערכת איכות?",
                options: ["להוכיח שהלקוח טועה", "להוות מדד לאיכות ולסייע באיתור ושיפור בעיות", "להעמיס על שירות הלקוחות", "אין להן תפקיד משמעותי"],
                correctIndex: 1,
                explanation: "תלונות הן משוב חשוב המצביע על בעיות אפשריות במוצר או בתהליך, ומסייעות למפעל לשפר את איכותו."
            },
             {
                question: "מה המשמעות של החוק משנת 2006 בנוגע לתביעות בתחום המזון בישראל?",
                options: ["הוא אוסר לחלוטין הגשת תביעות על מזון", "הוא מאפשר תביעה רק לחברות גדולות", "הוא מקל על צרכנים להגיש תביעה ייצוגית במקרה של פגיעה ממוצר מזון", "הוא מחייב פיצוי כספי קבוע לכל תלונה"],
                correctIndex: 2,
                explanation: "החוק הקל על הגשת תביעות ייצוגיות, כלומר תביעה אחת בשם קבוצה גדולה של נפגעים, מה שמגביר את הסיכון המשפטי לחברות."
            },
            {
                question: "מה נדרש מהחברה כדי לעמוד בציפיות הצרכן לאחידות המוצר?",
                options: ["לשנות את המתכון כל הזמן", "להבטיח שתהליכי הייצור ובקרת האיכות עקביים", "להשתמש רק בחומרי גלם שונים בכל פעם", "לארוז את המוצר באריזות שונות"],
                correctIndex: 1,
                explanation: "אחידות מושגת על ידי תהליכי ייצור מבוקרים ועקביים, שימוש בחומרי גלם העומדים במפרט קבוע, ובקרת איכות יעילה."
            },
             {
                question: "איזה גורם אינו מוזכר ישירות כחיוני לאספקת מוצר העונה על דרישות הצרכן (עמ' 46)?",
                options: ["חומרי גלם איכותיים", "תהליכי ייצור מתאימים", "אנשים (עובדים) מיומנים ומבינים", "מיקום גיאוגרפי של המפעל"],
                correctIndex: 3,
                explanation: "הטקסט בעמוד 46 מדגיש את חשיבות חומרי הגלם, תהליכי הייצור, האנשים, מערכות האחסון וההפצה ומערכות בקרת האיכות. מיקום המפעל אינו מוזכר כגורם ישיר לאיכות המוצר עצמו בהקשר זה."

             // Restore previous answer state if exists
             if (mcqAnswers[index] !== null) {
                 highlightMCQAnswer(index, mcqAnswers[index].selected, qData.correctIndex, qData.explanation);
             }
        }

         function handleMCQAnswer(qIndex, selectedIndex, correctIndex, explanation) {
             if (mcqAnswers[qIndex] !== null) return; // Prevent re-answering

             const isCorrect = selectedIndex === correctIndex;
             mcqAnswers[qIndex] = { selected: selectedIndex, correct: isCorrect }; // Store answer
             highlightMCQAnswer(qIndex, selectedIndex, correctIndex, explanation);
         }

         function highlightMCQAnswer(qIndex, selectedIndex, correctIndex, explanation) {
             const buttons = mcqOptions.querySelectorAll('button');
             buttons.forEach((button, i) => {
                 button.disabled = true; // Disable all buttons after selection
                 if (i === correctIndex) {
                     button.style.backgroundColor = 'var(--correct-color)'; // Highlight correct green
                     button.style.color = '#fff'; // White text for contrast
                 }
                 if (i === selectedIndex && i !== correctIndex) {
                     button.style.backgroundColor = 'var(--incorrect-color)'; // Highlight incorrect red
                      button.style.color = '#fff';
                 }
                 if (i !== selectedIndex && i !== correctIndex) {
                     button.style.opacity = '0.6'; // Dim unselected, incorrect options
                 }
             });

             mcqFeedback.textContent = selectedIndex === correctIndex ? "נכון!" : "לא נכון.";
             mcqFeedback.className = `feedback ${selectedIndex === correctIndex ? 'correct' : 'incorrect'}`; // Keep hidden class removed
             mcqExplanation.textContent = `הסבר: ${explanation}`;
             mcqExplanation.classList.remove('hidden');
         }


        function displayAllMCQ() {
            mcqSingleView.classList.add('hidden');
            mcqAllQuestionsContainer.innerHTML = ''; // Clear previous

            mcqData.forEach((qData, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.classList.add('question-container-all');
                questionDiv.innerHTML = `
                    <div class="question-text">${index + 1}. ${qData.question}</div>
                    <div class="options">
                        ${qData.options.map((option, i) => `<button data-qindex="${index}" data-oindex="${i}">${option}</button>`).join('')}
                    </div>
                    <div class="feedback hidden"></div>
                    <div class="explanation hidden"></div>
                `;
                mcqAllQuestionsContainer.appendChild(questionDiv);

                 // Add event listeners for options in this questionDiv
                 const optionButtons = questionDiv.querySelectorAll('.options button');
                 optionButtons.forEach(button => {
                     button.onclick = () => handleMCQAnswerAllView(button);
                 });

                 // Restore state if already answered
                 if (mcqAnswers[index] !== null) {
                     highlightMCQAnswerAllView(questionDiv, index, mcqAnswers[index].selected, qData.correctIndex, qData.explanation);
                 }
            });

            mcqAllQuestionsContainer.classList.remove('hidden');
        }

         function handleMCQAnswerAllView(button) {
             const qIndex = parseInt(button.getAttribute('data-qindex'));
             const selectedIndex = parseInt(button.getAttribute('data-oindex'));
             const qData = mcqData[qIndex];
             const questionDiv = button.closest('.question-container-all');

             if (mcqAnswers[qIndex] !== null) return; // Prevent re-answering

             const isCorrect = selectedIndex === qData.correctIndex;
             mcqAnswers[qIndex] = { selected: selectedIndex, correct: isCorrect }; // Store answer
             highlightMCQAnswerAllView(questionDiv, qIndex, selectedIndex, qData.correctIndex, qData.explanation);
         }

         function highlightMCQAnswerAllView(questionDiv, qIndex, selectedIndex, correctIndex, explanation) {
             const optionButtons = questionDiv.querySelectorAll('.options button');
             const feedbackDiv = questionDiv.querySelector('.feedback');
             const explanationDiv = questionDiv.querySelector('.explanation');

             optionButtons.forEach((btn, i) => {
                 btn.disabled = true;
                 if (i === correctIndex) {
                     btn.style.backgroundColor = 'var(--correct-color)';
                      btn.style.color = '#fff';
                 }
                 if (i === selectedIndex && i !== correctIndex) {
                     btn.style.backgroundColor = 'var(--incorrect-color)';
                      btn.style.color = '#fff';
                 }
                  if (i !== selectedIndex && i !== correctIndex) {
                     btn.style.opacity = '0.6';
                 }
             });

             feedbackDiv.textContent = selectedIndex === correctIndex ? "נכון!" : "לא נכון.";
             feedbackDiv.className = `feedback ${selectedIndex === correctIndex ? 'correct' : 'incorrect'}`;
             explanationDiv.textContent = `הסבר: ${explanation}`;
             explanationDiv.classList.remove('hidden');
         }

        // --- True/False Functions ---
        function displayTFQuestion(index) {
            const qData = tfData[index];
            tfQuestion.textContent = qData.question;
            tfFeedback.classList.add('hidden'); // Hide feedback initially
            tfExplanation.classList.add('hidden'); // Hide explanation initially

            // Reset buttons state
             const buttons = tfOptions.querySelectorAll('button');
             buttons.forEach(button => {
                 button.disabled = false;
                 button.style.backgroundColor = 'var(--accent-color)'; // Reset color
                  button.style.color = 'var(--text-color)';
                 button.style.opacity = '1';
                 // Re-attach click listeners for the current question
                 button.onclick = () => handleTFAnswer(index, button.getAttribute('data-answer') === 'true', qData.answer, qData.explanation);
             });

            tfCounter.textContent = `שאלה ${index + 1} / ${tfData.length}`;
            prevTFBtn.disabled = index === 0;
            nextTFBtn.disabled = index === tfData.length - 1;

            // Restore previous answer state if exists
            if (tfAnswers[index] !== null) {
                highlightTFAnswer(index, tfAnswers[index].selected, qData.answer, qData.explanation);
            }
        }

         function handleTFAnswer(qIndex, selectedAnswer, correctAnswer, explanation) {
             if (tfAnswers[qIndex] !== null) return; // Prevent re-answering

             const isCorrect = selectedAnswer === correctAnswer;
             tfAnswers[qIndex] = { selected: selectedAnswer, correct: isCorrect }; // Store answer
             highlightTFAnswer(qIndex, selectedAnswer, correctAnswer, explanation);
         }

         function highlightTFAnswer(qIndex, selectedAnswer, correctAnswer, explanation) {
             const buttons = tfOptions.querySelectorAll('button');
             buttons.forEach(button => {
                 const buttonAnswer = button.getAttribute('data-answer') === 'true';
                 button.disabled = true;
                 if (buttonAnswer === correctAnswer) {
                     button.style.backgroundColor = 'var(--correct-color)';
                      button.style.color = '#fff';
                 }
                 if (buttonAnswer === selectedAnswer && buttonAnswer !== correctAnswer) {
                     button.style.backgroundColor = 'var(--incorrect-color)';
                      button.style.color = '#fff';
                 }
                 if (buttonAnswer !== selectedAnswer && buttonAnswer !== correctAnswer) {
                     button.style.opacity = '0.6';
                 }
             });

             tfFeedback.textContent = selectedAnswer === correctAnswer ? "נכון!" : "לא נכון.";
             tfFeedback.className = `feedback ${selectedAnswer === correctAnswer ? 'correct' : 'incorrect'}`;
             tfExplanation.textContent = `הסבר: ${explanation}`;
             tfExplanation.classList.remove('hidden');
         }

         function displayAllTF() {
             tfSingleView.classList.add('hidden');
             tfAllQuestionsContainer.innerHTML = ''; // Clear previous

             tfData.forEach((qData, index) => {
                 const questionDiv = document.createElement('div');
                 questionDiv.classList.add('question-container-all');
                 questionDiv.innerHTML = `
                     <div class="question-text">${index + 1}. ${qData.question}</div>
                     <div class="tf-options">
                         <button data-qindex="${index}" data-answer="true">נכון</button>
                         <button data-qindex="${index}" data-answer="false">לא נכון</button>
                     </div>
                     <div class="feedback hidden"></div>
                     <div class="explanation hidden"></div>
                 `;
                 tfAllQuestionsContainer.appendChild(questionDiv);

                 // Add event listeners for options in this questionDiv
                 const optionButtons = questionDiv.querySelectorAll('.tf-options button');
                 optionButtons.forEach(button => {
                     button.onclick = () => handleTFAnswerAllView(button);
                 });

                  // Restore state if already answered
                 if (tfAnswers[index] !== null) {
                     highlightTFAnswerAllView(questionDiv, index, tfAnswers[index].selected, qData.answer, qData.explanation);
                 }
             });

             tfAllQuestionsContainer.classList.remove('hidden');
         }

         function handleTFAnswerAllView(button) {
             const qIndex = parseInt(button.getAttribute('data-qindex'));
             const selectedAnswer = button.getAttribute('data-answer') === 'true';
             const qData = tfData[qIndex];
             const questionDiv = button.closest('.question-container-all');

             if (tfAnswers[qIndex] !== null) return; // Prevent re-answering

             const isCorrect = selectedAnswer === qData.answer;
             tfAnswers[qIndex] = { selected: selectedAnswer, correct: isCorrect }; // Store answer
             highlightTFAnswerAllView(questionDiv, qIndex, selectedAnswer, qData.answer, qData.explanation);
         }


         function highlightTFAnswerAllView(questionDiv, qIndex, selectedAnswer, correctAnswer, explanation) {
             const optionButtons = questionDiv.querySelectorAll('.tf-options button');
             const feedbackDiv = questionDiv.querySelector('.feedback');
             const explanationDiv = questionDiv.querySelector('.explanation');

             optionButtons.forEach(btn => {
                  const buttonAnswer = btn.getAttribute('data-answer') === 'true';
                 btn.disabled = true;
                 if (buttonAnswer === correctAnswer) {
                     btn.style.backgroundColor = 'var(--correct-color)';
                      btn.style.color = '#fff';
                 }
                 if (buttonAnswer === selectedAnswer && buttonAnswer !== correctAnswer) {
                     btn.style.backgroundColor = 'var(--incorrect-color)';
                      btn.style.color = '#fff';
                 }
                 if (buttonAnswer !== selectedAnswer && buttonAnswer !== correctAnswer) {
                     btn.style.opacity = '0.6';
                 }
             });

             feedbackDiv.textContent = selectedAnswer === correctAnswer ? "נכון!" : "לא נכון.";
             feedbackDiv.className = `feedback ${selectedAnswer === correctAnswer ? 'correct' : 'incorrect'}`;
             explanationDiv.textContent = `הסבר: ${explanation}`;
             explanationDiv.classList.remove('hidden');
         }

        // --- Initial Display ---
        displayCard(currentCardIndex);
        displayMCQuestion(currentMCQIndex);
        displayTFQuestion(currentTFIndex);

        // --- Event Listeners ---
        flashcard.addEventListener('click', flipCard);

        prevCardBtn.addEventListener('click', () => {
            if (currentCardIndex > 0) {
                currentCardIndex--;
                displayCard(currentCardIndex);
            }
        });

        nextCardBtn.addEventListener('click', () => {
            if (currentCardIndex < flashcardData.length - 1) {
                currentCardIndex++;
                displayCard(currentCardIndex);
            }
        });

        prevMCQBtn.addEventListener('click', () => {
            if (currentMCQIndex > 0) {
                currentMCQIndex--;
                displayMCQuestion(currentMCQIndex);
            }
        });

        nextMCQBtn.addEventListener('click', () => {
            if (currentMCQIndex < mcqData.length - 1) {
                currentMCQIndex++;
                displayMCQuestion(currentMCQIndex);
            }
        });

        viewAllMCQBtn.addEventListener('click', displayAllMCQ);


         prevTFBtn.addEventListener('click', () => {
            if (currentTFIndex > 0) {
                currentTFIndex--;
                displayTFQuestion(currentTFIndex);
            }
        });

        nextTFBtn.addEventListener('click', () => {
            if (currentTFIndex < tfData.length - 1) {
                currentTFIndex++;
                displayTFQuestion(currentTFIndex);
            }
        });
         viewAllTFBtn.addEventListener('click', displayAllTF);

    </script>
</body>
</html>
