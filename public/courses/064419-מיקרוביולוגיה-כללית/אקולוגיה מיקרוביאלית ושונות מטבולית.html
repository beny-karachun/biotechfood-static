<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Study Tool</title>
    <style>
        /* --- Root Variables for Consistent Theming --- */
        :root {
            --primary-bg: #333333;
            --secondary-bg: #666666;
            --accent-color: #3D90D7;
            --text-color: #E0E0E0;
            --correct-color: #4CAF50;
            --incorrect-color: #F44336;
            --card-bg: #5a5a5a;
        }

        /* --- Global Styles --- */
        body {
            background-color: var(--primary-bg);
            color: var(--text-color);
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 90%; /* As per prompt */
            margin: 20px auto;
            padding: 20px;
            background-color: var(--secondary-bg);
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        h1, h2 {
            color: var(--accent-color);
            text-align: center;
            border-bottom: 1px solid var(--accent-color);
            padding-bottom: 10px;
        }

        .section {
            background-color: var(--primary-bg);
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 8px;
        }

        /* --- Study Cards Styling (Fade Animation) --- */
        .flashcard-container {
            height: 250px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #flashcard-content {
            width: 100%;
            height: 100%;
            background-color: var(--card-bg);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            transition: opacity 0.3s ease-in-out; /* Fade transition */
        }
        
        .flashcard-front-style {
             font-size: 1.5em;
             font-weight: bold;
        }
        
        .flashcard-back-style {
             font-size: 1.1em;
        }

        /* --- Questions Styling (MCQ & T/F) --- */
         .question-container-single, .question-container-all {
            margin-bottom: 15px;
            padding: 15px;
            border: 1px solid var(--secondary-bg);
            border-radius: 5px;
         }

        .question-text {
            font-weight: bold;
            margin-bottom: 15px;
        }

        .options button, .tf-options button {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-align: right;
            transition: background-color 0.3s;
        }

        .options button:hover:not(:disabled), .tf-options button:hover:not(:disabled) {
            background-color: #357ab8;
        }

        .options button:disabled, .tf-options button:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
        
        /* Specific styling to override disabled opacity for correct/incorrect answers */
        .options button.correct, .tf-options button.correct { opacity: 1; }
        .options button.incorrect, .tf-options button.incorrect { opacity: 1; }


        .feedback {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
        }

        .feedback.correct {
            background-color: var(--correct-color);
            color: #fff;
        }

        .feedback.incorrect {
            background-color: var(--incorrect-color);
            color: #fff;
        }

        .explanation {
            margin-top: 10px;
            font-style: italic;
            font-size: 0.9em;
            padding: 8px;
            background-color: var(--secondary-bg);
            border-radius: 4px;
        }

        /* --- Navigation & Utility Styling --- */
        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            margin-bottom: 10px;
        }

        .nav-button, .view-all-button {
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
        }

        .nav-button:disabled {
             opacity: 0.5;
             cursor: not-allowed;
        }

        .counter {
            font-size: 0.9em;
        }

        .view-all-container {
            text-align: center;
            margin-top: 15px;
            margin-bottom: 15px;
        }

        .hidden {
            display: none;
        }

        #mcq-all-questions .question-container-all,
        #tf-all-questions .question-container-all {
            margin-bottom: 20px;
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>אקולוגיה ופיזיולוגיה של מיקרואורגניזמים</h1>

        <!-- Study Cards Section -->
        <div class="section">
            <h2>כרטיסי לימוד</h2>
            <div class="flashcard-container">
                <div id="flashcard-content"></div>
            </div>
            <div class="navigation">
                <button class="nav-button" id="prev-card">הקודם</button>
                <span class="counter" id="card-counter"></span>
                <button class="nav-button" id="next-card">הבא</button>
            </div>
        </div>

        <!-- Multiple Choice Questions Section -->
        <div class="section">
            <h2>שאלות רב-ברירה (אמריקאיות)</h2>
            <div id="mcq-single-view">
                <div class="question-container-single" id="mcq-container">
                    <div class="question-text" id="mcq-question"></div>
                    <div class="options" id="mcq-options"></div>
                    <div class="feedback hidden" id="mcq-feedback"></div>
                    <div class="explanation hidden" id="mcq-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-mcq">הקודם</button>
                    <span class="counter" id="mcq-counter"></span>
                    <button class="nav-button" id="next-mcq">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-mcq">הצג את כל השאלות</button>
                 </div>
            </div>
            <div id="mcq-all-questions" class="hidden">
                <!-- All MCQs will be dynamically inserted here -->
            </div>
        </div>

        <!-- True/False Questions Section -->
        <div class="section">
            <h2>שאלות נכון/לא נכון</h2>
             <div id="tf-single-view">
                <div class="question-container-single" id="tf-container">
                    <div class="question-text" id="tf-question"></div>
                    <div class="tf-options" id="tf-options">
                        <button data-answer="true">נכון</button>
                        <button data-answer="false">לא נכון</button>
                    </div>
                    <div class="feedback hidden" id="tf-feedback"></div>
                    <div class="explanation hidden" id="tf-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-tf">הקודם</button>
                    <span class="counter" id="tf-counter"></span>
                    <button class="nav-button" id="next-tf">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-tf">הצג את כל השאלות</button>
                 </div>
            </div>
             <div id="tf-all-questions" class="hidden">
                 <!-- All T/F Questions will be dynamically inserted here -->
             </div>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        
        const flashcardData = [
            { term: "תרבית העשרה", definition: "טכניקה סלקטיבית לבידוד מיקרואורגניזמים בעלי תכונות מטבוליות ספציפיות על ידי יצירת תנאי גידול המעדיפים אותם על פני אחרים." },
            { term: "עמודת וינוגרדסקי", definition: "מערכת אקולוגית סגורה במבחנה, המדגימה כיצד מיקרואורגניזמים שונים תופסים גומחות אקולוגיות נפרדות בהתבסס על גרדיאנטים כימיים (כמו חמצן וסולפיד)." },
            { term: "FISH (Fluorescence In-Situ Hybridization)", definition: "טכניקה מולקולרית המשתמשת בגלאים פלואורסצנטיים הנקשרים ל-rRNA כדי לזהות ולמקם מיקרואורגניזמים ספציפיים בסביבתם הטבעית." },
            { term: "CARD-FISH", definition: "גרסה רגישה יותר של FISH המשתמשת בהגברת אות אנזימטית (Catalyzed Reporter Deposition) כדי לזהות תאים עם מספר נמוך של ריבוזומים." },
            { term: "פוטוסינתזה אנוקסיגנית", definition: "תהליך פוטוסינתזה שאינו מייצר חמצן, ומשתמש בתורמי אלקטרונים שאינם מים, כגון מימן גופרי (H2S)." },
            { term: "פוטוסינתזה אוקסיגנית", definition: "תהליך פוטוסינתזה המשתמש במים כתורם אלקטרונים ומייצר חמצן כתוצר לוואי. מתבצע על ידי ציאנובקטריה, אצות וצמחים." },
            { term: "כלורוזום", definition: "מבנה ייחודי בחיידקי גופרית ירוקים המשמש כאנטנת קליטת אור יעילה ביותר, המאפשרת פוטוסינתזה בתנאי תאורה חלשים מאוד." },
            { term: "פיקוביליזום", definition: "קומפלקס חלבוני-פיגמנטי המשמש כאנטנה לקליטת אור בציאנובקטריה ואצות אדומות, המעביר אנרגיה ביעילות למרכז הריאקציה." },
            { term: "זרימת אלקטרונים הפוכה", definition: "תהליך צורך אנרגיה בחיידקים פוטוסינתטיים סגולים, בו אלקטרונים מועברים נגד פוטנציאל החיזור שלהם ליצירת כוח מחזר (NADPH)." },
            { term: "RuBisCO", definition: "האנזים המרכזי במעגל קלווין, המקבע פחמן דו-חמצני על ידי חיבורו למולקולת ריבולוז-1,5-ביספוספט." },
            { term: "ניטרוגנאז", definition: "קומפלקס אנזימטי הרגיש ביותר לחמצן, האחראי על קיבוע חנקן אטמוספרי (N2) לאמוניה (NH3), תהליך הדורש אנרגיה רבה." },
            { term: "FeMo-co", definition: "הקופקטור הייחודי (Iron-Molybdenum cofactor) באתר הפעיל של אנזים הדיניטרוגנאז, בו מתבצעת בפועל ריאקציית חיזור החנקן." },
            { term: "מבחן חיזור אצטילן", definition: "שיטה עקיפה למדידת פעילות ניטרוגנאז, המבוססת על יכולתו של האנזים לחזר אצטילן (C2H2) לאתילן (C2H4)." },
            { term: "UCYN-A", definition: "ציאנובקטריה ימית שאינה ניתנת לגידול במעבדה, המקבעת חנקן אך חסרה את מערכת אור II (PSII) ומבצעת פוטוסינתזה אנוקסיגנית." },
            { term: "פרקציונציה איזוטופית", definition: "העדפה של אנזימים לאיזוטופים קלים יותר של יסוד (למשל, 12C על פני 13C), תופעה המשמשת כחתימה ביולוגית לפעילות מטבולית." },
            { term: "כמוליטואוטוטרוף", definition: "אורגניזם המפיק אנרגיה מחמצון תרכובות אי-אורגניות ומקבע פחמן דו-חמצני כמקור הפחמן שלו." },
            { term: "פוטוהטרוטרוף", definition: "אורגניזם המשתמש באור כמקור אנרגיה, אך זקוק לתרכובות אורגניות כמקור פחמן." },
            { term: "מסלול Z", definition: "מסלול זרימת האלקטרונים הלא-מעגלי בפוטוסינתזה אוקסיגנית, המערב שתי מערכות אור (PSII ו-PSI) ומביא ליצירת ATP, NADPH וחמצן." }
        ];

        const mcqData = [
            { question: "בניסוי העשרה של בז׳רינק לבידוד Azotobacter, מהי הסיבה העיקרית לכך שגדלים בעיקר חיידקים קושרי חנקן ולא חיידקים אחרים מהקרקע?", options: ["מניטול הוא מקור פחמן שרק Azotobacter יכול לנצל", "היעדר מקור חנקן משולב (כמו אמוניה) במצע מהווה תנאי סלקטיבי", "האינקובציה באוויר מדכאת את כל החיידקים האנארוביים", "מצע המלחים המינרליים רעיל לרוב חיידקי הקרקע"], correctIndex: 1, explanation: "הסלקטיביות של הניסוי נובעת מהיעדר מקור חנקן זמין. רק אורגניזמים שמסוגלים לקבע חנקן אטמוספרי (N2) יכולים לשגשג, בעוד שאחרים מוגבלים בגדילתם. מניטול הוא מקור פחמן ואנרגיה שחיידקים רבים יכולים לנצל." },
            { question: "מה ההבדל המהותי בין טכניקת FISH לבין CARD-FISH?", options: ["FISH מזהה DNA בעוד CARD-FISH מזהה RNA", "CARD-FISH משתמשת בהגברת אות אנזימטית ולכן רגישה יותר", "FISH דורשת קיבוע של התאים בעוד CARD-FISH יכולה להתבצע על תאים חיים", "CARD-FISH משתמשת בנוגדנים פלואורסצנטיים במקום גלאי אוליגונוקלאוטיד"], correctIndex: 1, explanation: "היתרון המרכזי של CARD-FISH הוא הגברת האות. לאחר קישור הגלאי הראשוני, אנזים (HRP) מזרז שקיעה של מולקולות פלואורסצנטיות רבות, מה שמאפשר זיהוי של תאים עם מעט ריבוזומים שקשה לראות ב-FISH רגיל." },
            { question: "בניתוח גרדיאנטים בעזרת מיקרואלקטרודות במשטח מיקרוביאלי, נצפתה ירידה חדה בריכוז החמצן ועלייה חדה בריכוז H2S בעומק של 1 מ״מ. מהי המסקנה הסבירה ביותר?", options: ["מתקיימת פוטוסינתזה אוקסיגנית על פני השטח וחיזור סולפט אנארובי בעומק", "מתקיימת נשימה אירובית בכל עומק המשטח", "חיידקים כמוליטוטרופיים מחמצני גופרית שולטים באזור זה", "ישנה פעילות דניטריפיקציה אינטנסיבית בעומק 1 מ״מ"], correctIndex: 0, explanation: "ירידה בחמצן מעידה על צריכתו (למשל, בנשימה) ועלייה ב-H2S מעידה על ייצורו בתנאים אנארוביים (חיזור סולפט). השילוב מצביע על אזור מעבר בין סביבה אוקסית לאנוקסית, עם פעילות פוטוסינתטית אוקסיגנית סביר שתתרחש קרוב יותר לפני השטח." },
            { question: "מדוע חיידקים פוטוסינתטיים סגולים זקוקים למנגנון של זרימת אלקטרונים הפוכה, בעוד שחיידקי גופרית ירוקים אינם זקוקים לו?", options: ["לחיידקים סגולים יש מרכז ריאקציה (P870) בעל פוטנציאל חיזור חיובי יותר מזה של NAD+/NADH", "לחיידקי גופרית ירוקים יש שני מרכזי ריאקציה כמו בצמחים", "חיידקים סגולים משתמשים במים כתורם אלקטרונים", "לחיידקי גופרית ירוקים אין קווינון פול"], correctIndex: 0, explanation: "מרכז הריאקציה המעורר של חיידקים סגולים (P870*) אינו בעל פוטנציאל חיזור שלילי מספיק כדי לחזר ישירות NAD+. לכן, הם משתמשים באנרגיה מגרדיאנט הפרוטונים כדי ״לדחוף״ אלקטרונים במעלה פוטנציאל החיזור. לחיידקי גופרית ירוקים, מרכז הריאקציה המעורר (P840*) מעביר אלקטרונים לפרודוקסין (Fd), בעל פוטנציאל שלילי מספיק לחיזור ישיר של NAD+." },
            { question: "מהי המשמעות הביולוגית המרכזית של העובדה שלציאנובקטריה UCYN-A חסרים הגנים למערכת אור II (PSII)?", options: ["היא אינה יכולה לבצע פוטוסינתזה כלל", "היא אינה מייצרת חמצן, מה שמאפשר לאנזים ניטרוגנאז הרגיש לחמצן לפעול", "היא תלויה באופן מלא במקורות פחמן אורגניים (הטרוטרופית)", "היא יכולה לקבע חנקן רק בשעות היום כאשר יש אור"], correctIndex: 1, explanation: "היעדר PSII אומר ש-UCYN-A אינה יכולה לפצל מים ואינה מייצרת חמצן. זהו יתרון עצום לאורגניזם המקבע חנקן, מכיוון שהניטרוגנאז שלו מוגן מהשבתה על ידי חמצן, ומאפשר קיבוע חנקן ופוטוסינתזה (אנוקסיגנית, באמצעות PSI) להתרחש בו-זמנית." },
            { question: "איזו מהבאות מהווה את ההבדל המבני העיקרי בין כלורופיל a לבקטריוכלורופיל a, אשר גורם לשינוי בספקטרום הבליעה שלהם?", options: ["בבקטריוכלורופיל יש מגנזיום במרכז, ובכלורופיל יש ברזל", "בבקטריוכלורופיל יש קשר כפול פחות בטבעת הפורפירין וקבוצת אצטיל במקום ויניל", "בכלורופיל יש שרשרת פיטול ארוכה יותר", "בבקטריוכלורופיל אין טבעת ציקלופנטנון"], correctIndex: 1, explanation: "ההבדלים המרכזיים הם חיזור של אחד הקשרים הכפולים בטבעת הפירול והחלפת קבוצת ויניל בקבוצת אצטיל. שינויים אלו במערכת הקשרים המצומדים גורמים לבקטריוכלורופיל לבלוע אור באורכי גל ארוכים יותר (אינפרא-אדום קרוב) בהשוואה לכלורופיל." },
            { question: "במעגל קלווין, מהו תפקידו של ATP בשלב הרגנרציה?", options: ["לחזר 1,3-ביספוספוגליצרט לגליצראלדהיד-3-פוספט", "לספק את האנרגיה לקיבוע CO2 על ידי RuBisCO", "לזרחן ריבולוז-5-פוספט ליצירת ריבולוז-1,5-ביספוספט", "לשמש כתורם פוספט ליצירת פרוקטוז-6-פוספט"], correctIndex: 2, explanation: "בשלב הרגנרציה, ATP משמש את האנזים פוספוריבולוקינאז כדי להוסיף קבוצת פוספט לריבולוז-5-פוספט, ובכך ליצור מחדש את המולקולה המקבלת את ה-CO2, ריבולוז-1,5-ביספוספט, ולאפשר למעגל להמשיך." },
            { question: "במהלך ניתוח פרקציונציה איזוטופית של פחמן, דגימת סלע עתיקה הראתה ערך δ13C של 40‰- (מינוס ארבעים פרומיל). איזו מסקנה ניתן להסיק מכך בסבירות גבוהה?", options: ["הפחמן בדגימה הוא ממקור אביוטי, כמו קרבונט ימי", "הפחמן הוא תוצר של פוטוסינתזה המשתמשת במעגל קלווין", "הפחמן הוא ממקור של מתאנוגנזה או מטבוליזם של מתאן", "הפחמן נוצר על ידי ציאנובקטריה מודרנית"], correctIndex: 2, explanation: "ערכי δ13C שליליים מאוד (מתחת ל-35‰-) הם חתימה אופיינית למסלולים מטבוליים הקשורים למתאן (מתאנוגנזה ומתאנוטרופיה), אשר מפלים באופן קיצוני נגד האיזוטופ הכבד 13C. מעגל קלווין בדרך כלל מראה ערכים סביב 20‰- עד 30‰-." },
            { question: "מדוע קרוטנואידים הם פיגמנטים חשובים באורגניזמים פוטוסינתטיים?", options: ["הם מרכיבים את מרכז הריאקציה הפוטוסינתטי", "הם סופגים אור באורכי גל שהכלורופיל אינו סופג ביעילות ומגנים מפני נזקי חמצון", "הם תורמי האלקטרונים הראשוניים בפוטוסינתזה", "הם אחראים להעברת פרוטונים דרך הממברנה"], correctIndex: 1, explanation: "לקרוטנואידים שני תפקידים עיקריים: הם מרחיבים את טווח אורכי הגל הנקלטים לפוטוסינתזה (photoharvesting) ומעבירים את האנרגיה לכלורופיל, והם מספקים הגנה חיונית (photoprotection) על ידי נטרול רדיקלי חמצן מזיקים שנוצרים בתנאי אור חזק." },
            { question: "איזה מהבאים מתאר נכונה את תפקיד תת-היחידה dinitrogenase reductase (חלבון Fe) בקומפלקס הניטרוגנאז?", options: ["היא קושרת את מולקולת N2 ומחזרת אותה לאמוניה", "היא קושרת ATP ומעבירה אלקטרון אחד בכל פעם ל-dinitrogenase", "היא מסנתזת את הקופקטור FeMo-co", "היא מגינה על תת-היחידה dinitrogenase מפני חמצן"], correctIndex: 1, explanation: "תפקידה של ה-dinitrogenase reductase הוא לקבל אלקטרונים (למשל מפרודוקסין), לקשור ATP, ולאחר מכן להיקשר ל-dinitrogenase (חלבון MoFe) ולהעביר אליו אלקטרון אחד תוך כדי הידרוליזה של ATP. תהליך זה חוזר על עצמו מספר פעמים כדי להעביר את כל האלקטרונים הדרושים לחיזור N2." },
            { question: "בהשוואה בין הזרם הקלאסי לזרם המודרני של מחזור החנקן באוקיינוס, מהו השינוי המרכזי בתפיסה?", options: ["התפקיד של פיטופלנקטון כמקור חנקן אורגני קטן יותר ממה שחשבו", "בקטריופלנקטון צורך רק אמוניה ולא חומצות אמינו", "קיבוע חנקן על ידי ציאנובקטריה (תהליך B בתרשים) הוא מקור חנקן חדש ומשמעותי למערכת", "רעייה (Grazing) אינה גורם משמעותי במעבר חנקן"], correctIndex: 2, explanation: "התפיסה הקלאסית התמקדה בעיקר במחזור של חנקן משולב (כמו ניטרט ואמוניה). התפיסה המודרנית מכירה בחשיבות העצומה של קיבוע חנקן אטמוספרי על ידי ציאנובקטריה כמקור קלט משמעותי של חנקן ״חדש״ למערכות אוקיאניות, במיוחד באזורים דלי נוטריינטים." },
            { question: "בניסוי מבוקר, הוסיפו למצע גידול של חיידקים פוטוסינתטיים סגולים תרכובת המעכבת ספציפית את ה-ATP סינתאז. מה תהיה ההשפעה הסבירה ביותר על ייצור NADPH בתנאי אור?", options: ["ייצור NADPH לא יושפע כי הוא תלוי ישירות באור", "ייצור NADPH יוגבר עקב הצטברות פרוטונים", "ייצור NADPH ייעצר או יופחת משמעותית", "ייצור NADPH יוחלף בייצור NADH"], correctIndex: 2, explanation: "בחיידקים סגולים, ייצור NADPH מתרחש באמצעות זרימת אלקטרונים הפוכה. תהליך זה צורך אנרגיה שמקורה בגרדיאנט הפרוטונים (proton motive force). עיכוב ה-ATP סינתאז אמנם יגדיל את גרדיאנט הפרוטונים, אך התהליך כולו תלוי במחזור אנרגטי תקין. בפועל, המערכת תלויה בתפקוד הכללי של הממברנה, ושיבוש כה חמור יפגע גם בזרימה ההפוכה." },
            { question: "איזו קבוצת אורגניזמים צפויה לשגשג בשכבה העליונה ביותר של עמודת וינוגרדסקי, באזור המואר והעשיר בחמצן?", options: ["חיידקי גופרית ירוקים", "ציאנובקטריה ואצות", "חיידקים מחזרי סולפט", "חיידקים פוטוסינתטיים סגולים שאינם גופריתיים"], correctIndex: 1, explanation: "השכבה העליונה ביותר מקבלת אור שמש מלא והיא במגע עם האוויר, ולכן עשירה בחמצן. תנאים אלו אידיאליים לפוטוסינתזה אוקסיגנית, המתבצעת על ידי ציאנובקטריה ואצות, המשתמשות באור, מים ו-CO2." },
            { question: "מהי הסיבה לכך שבקטריוכלורופילים בולעים אור באורכי גל ארוכים יותר (אנרגיה נמוכה יותר) מאשר כלורופילים?", options: ["נוכחות אטום מגנזיום כבד יותר במרכזם", "מערכת טבעות מצומדת מורחבת יותר באופן יחסי", "היעדר שרשרת פיטול", "קישור קוולנטי לחלבונים שונים"], correctIndex: 1, explanation: "אורך הגל הנבלע תלוי בהפרש האנרגיה בין אורביטלים. ככל שמערכת הקשרים הכפולים המצומדים (conjugated system) גדולה יותר, כך הפרשי האנרגיה קטנים יותר, והמולקולה בולעת אור באורך גל ארוך יותר (אנרגיה נמוכה יותר). לבקטריוכלורופילים יש שינויים מבניים המרחיבים מעט את המערכת המצומדת." },
            { question: "בתהליך קיבוע CO2, מה נכון לגבי הסטויכיומטריה של מעגל קלווין ליצירת מולקולת גלוקוז אחת (6 פחמנים)?", options: ["דרושות 6 מולקולות CO2, 12 ATP ו-12 NADPH", "דרושות 6 מולקולות CO2, 18 ATP ו-12 NADPH", "דרושות 3 מולקולות CO2, 9 ATP ו-6 NADPH", "דרושות 6 מולקולות CO2, 18 ATP ו-18 NADPH"], correctIndex: 1, explanation: "לקיבוע כל מולקולת CO2 נדרשים 3 ATP ו-2 NADPH. לכן, כדי ליצור מולקולת סוכר עם 6 פחמנים, יש לקבע 6 מולקולות CO2. החישוב הוא: 6 * 3 ATP = 18 ATP, ו- 6 * 2 NADPH = 12 NADPH." },
            { question: "איזה מהבאים מהווה דוגמה לאורגניזם מיקסוטרופי?", options: ["חיידק המשתמש באור לאנרגיה וב-CO2 לפחמן", "חיידק המשתמש בתרכובות אורגניות לאנרגיה ולפחמן", "חיידק המשתמש במימן גופרי לאנרגיה וב-CO2 לפחמן", "חיידק המשתמש במימן גופרי לאנרגיה אך זקוק למקור פחמן אורגני"], correctIndex: 3, explanation: "מיקסוטרופיה היא שילוב של דרכי הזנה. אורגניזם מיקסוטרופי הוא בדרך כלל כמוליטוטרוף (מפיק אנרגיה מכימיקלים אי-אורגניים) שאינו יכול לקבע CO2 ודורש מקור פחמן אורגני, כלומר הוא הטרוטרופי מבחינת מקור הפחמן." },
            { question: "במחקר על ביטוי הגן nifH בציאנובקטריה ימית, נמצאו רמות שיא של תעתיקי mRNA בשעות הלילה. מהי ההסבר הסביר ביותר לתופעה זו?", options: ["החיידקים מבצעים פוטוסינתזה בלילה", "האנזים ניטרוגנאז פעיל יותר בטמפרטורות נמוכות של הלילה", "הפרדה זמנית של קיבוע חנקן מהפוטוסינתזה האוקסיגנית המתרחשת ביום", "החיידקים צורכים את האנרגיה שנוצרה ביום לקיבוע חנקן בלילה"], correctIndex: 2, explanation: "בציאנובקטריה רבות המבצעות פוטוסינתזה אוקסיגנית, יש קונפליקט בין ייצור חמצן ביום לבין פעילות הניטרוגנאז הרגיש לחמצן. פתרון נפוץ הוא הפרדה זמנית: פוטוסינתזה ביום, וקיבוע חנקן בלילה תוך שימוש במאגרי אנרגיה מהיום." },
            { question: "מדוע הוספת אמוניום (+NH4) למצע הגידול של Azotobacter מדכאת את גדילת המושבות הגומיות האופייניות?", options: ["אמוניום רעיל ל-Azotobacter בריכוזים גבוהים", "אמוניום מעודד גדילה של חיידקים מתחרים שאינם קושרי חנקן", "אמוניום גורם לפירוק הקפסולה הפוליסכרידית", "Azotobacter אינו יכול להשתמש באמוניום כמקור חנקן"], correctIndex: 1, explanation: "בניסוי הבקרה, הוספת אמוניום מבטלת את היתרון הסלקטיבי של קושרי החנקן. חיידקים רבים אחר מהקרקע, שאינם יכולים לקבע N2 אך יכולים לנצל אמוניום, יגדלו כעת מהר יותר וישתלטו על המצע, ולכן לא נראה את המושבות האופייניות של Azotobacter." },
            { question: "איזו קבוצת פיגמנטים אחראית לצבע הירוק-כחלחל של ציאנובקטריה ולבליעת אור בטווח של כ-620 ננומטר?", options: ["קרוטנואידים", "כלורופיל b", "פיקוציאנין", "בקטריוכלורופיל c"], correctIndex: 2, explanation: "פיקוציאניн הוא פיגמנט ממשפחת הפיקובילינים, המאורגן בפיקוביליזומים, והוא שנותן לציאנובקטריה את צבעה הכחלחל האופייני. ספקטרום הבליעה שלו מראה שיא באזור 620-630 ננומטר." },
            { question: "התגלית ש-Streptomyces thermoautotrophicus אינו מקבע חנקן, למרות שהוא מכיל גנים דומים ל-nif, מדגישה את:", options: ["החשיבות של אימות פונקציונלי (כמו מבחן אצטילן) בנוסף לניתוח גנומי", "העובדה שכל הגנים הדומים ל-nif הם פסאודוגנים לא פעילים", "היכולת של סטרפטומיצטים לגדול ללא חנקן כלל", "העובדה שקיבוע חנקן אפשרי רק בחיידקים גראם-שליליים"], correctIndex: 0, explanation: "המקרה הזה הוא דוגמה קלאסית לכך שנוכחות של גן ברצף ה-DNA אינה מספיקה כדי להסיק על תפקודו. יש צורך בראיות ביוכימיות ופיזיולוגיות, כמו הוכחת פעילות אנזימטית או גדילה בתנאים סלקטיביים, כדי לאשר את הפנוטיפ." },
            { question: "מהי מטרת שלב ה-Fixation וה-Permeabilization בטכניקת FISH?", options: ["להרוג את התאים ולהגביר את חדירות הממברנה לגלאים הפלואורסצנטיים", "לסמן את ה-DNA של התאים בצבע פלואורסצנטי", "לשמור על התאים חיים אך במצב רדום", "להגביר את אות הפלואורסצנציה של הריבוזומים"], correctIndex: 0, explanation: "הקיבוע (Fixation) משמר את המבנה התאי ונועל את הריבוזומים במקומם. ההפיכה לחדיר (Permeabilization) יוצרת חורים בממברנת התא כדי לאפשר לגלאי האוליגונוקלאוטיד הגדולים לחדור פנימה ולהגיע למטרתם, ה-rRNA שבתוך הריבוזומים." },
            { question: "אורגניזם המוגדר ככמואורגנוהטרוטרוף משיג את האנרגיה והפחמן שלו מ:", options: ["אור (אנרגיה) ו-CO2 (פחמן)", "תרכובות אי-אורגניות (אנרגיה) ו-CO2 (פחמן)", "תרכובות אורגניות (אנרגיה ופחמן)", "אור (אנרגיה) ותרכובות אורגניות (פחמן)"], correctIndex: 2, explanation: "הקידומת 'כמו' מציינת מקור אנרגיה כימי. 'אורגנו' מציין שהמקור הכימי הוא תרכובת אורגנית. 'הטרוטרוף' מציין שמקור הפחמן הוא תרכובת אורגנית. לכן, הוא משתמש בתרכובות אורגניות לשני הצרכים." },
            { question: "במסלול ה-Z של פוטוסינתזה אוקסיגנית, מהו תורם האלקטרונים המיידי למרכז הריאקציה P700+ לאחר שעורר על ידי אור?", options: ["מים (H2O)", "פרודוקסין (Fd)", "פלסטוציאנין (PC)", "פלסטוקווינון (Q)"], correctIndex: 2, explanation: "לאחר ש-P700 (ב-PSI) נתרם את האלקטרון שלו, הוא נותר במצב מחומצן (P700+). האלקטרון שמחזר אותו מגיע מפלסטוציאנין (PC), חלבון נחושת קטן המקשר בין קומפלקס ציטוכרום b6f לבין PSI." },
            { question: "מהי התוצאה הסופית של זרימת אלקטרונים מעגלית סביב מערכת אור I (PSI)?", options: ["יצירת ATP, NADPH וחמצן", "יצירת ATP בלבד", "יצירת NADPH בלבד", "פיצול מולקולות מים"], correctIndex: 1, explanation: "בזרימה מעגלית, אלקטרונים מ-PSI חוזרים לקומפלקס ציטוכרום b6f במקום לעבור ל-NADP+. מסלול זה אינו מייצר NADPH ואינו מפצל מים, אך הוא כן תורם ליצירת גרדיאנט פרוטונים המשמש לייצור ATP. זהו מנגנון לוויסות יחס ה-ATP/NADPH בתא." },
            { question: "איזו מהבאות אינה סובסטרט של האנזים ניטרוגנאז?", options: ["N2 (חנקן)", "C2H2 (אצטילן)", "H+ (פרוטונים)", "CO2 (פחמן דו-חמצני)"], correctIndex: 3, explanation: "ניטרוגנאז הוא אנזים רב-תכליתי שיכול לחזר מספר מולקולות בעלות קשר משולש, כולל N2 ו-C2H2. הוא גם מחזר פרוטונים ליצירת גז מימן (H2) כתוצר לוואי בלתי נמנע. פחמן דו-חמצני אינו סובסטרט של ניטרוגנאז." },
            { question: "מהי הפונקציה העיקרית של כלורוזומים בחיידקי גופרית ירוקים?", options: ["לשמש כאתר לקיבוע CO2", "לאפשר קליטת אור יעילה ביותר בתנאי תאורה נמוכים מאוד", "לאחסן גופרית אלמנטרית הנוצרת מפוטוסינתזה", "להגן על התא מפני ריכוזי חמצן גבוהים"], correctIndex: 1, explanation: "כלורוזומים הם מבני אנטנה ענקיים ויעילים ביותר, המכילים אלפי מולקולות בקטריוכלורופיל. מבנה זה מאפשר לחיידקים אלה לשרוד ולבצע פוטוסינתזה בעומקים שבהם עוצמת האור נמוכה ביותר, שם אורגניזמים פוטוסינתטיים אחרים לא יכלו להתקיים." },
            { question: "בניסוי עם רדיואיזוטופים לחקר מתאנוגנזה בבוצה, השתמשו בשני סוגי אצטט מסומנים: CH3-14COO ו- 14CH3-COO. נמצא שרוב ה-14C הופיע כ-14CH4 כאשר השתמשו ב-14CH3-COO. מהי המסקנה?", options: ["הפחמן מקבוצת הקרבוקסיל הופך למתאן", "הפחמן מקבוצת המתיל הופך למתאן", "שני הפחמנים של אצטט הופכים למתאן", "אצטט אינו המקור העיקרי למתאן"], correctIndex: 1, explanation: "התוצאה מראה באופן ישיר שהפחמן של קבוצת המתיל (CH3) במולקולת האצטט הוא זה שהופך למתאן (CH4), בעוד שהפחמן של קבוצת הקרבוקסיל (COO) ככל הנראה מחומצן ל-CO2 במסלול האצטוקלסטי." },
            { question: "מהי הסיבה הפיזיקלית לכך שאופטיקל טוויזרס (מלקחיים אופטיות) יכולים ללכוד ולהזיז תא בודד?", options: ["הלייזר מחמם את התא וגורם לו להיצמד לקרן", "התא נטען חשמלית על ידי הלייזר ונמשך אליו", "כוח לחץ הקרינה של פוטונים מפוקסים יוצר ״מלכודת״ פוטנציאל לתא הדיאלקטרי", "הלייזר יוצר בועות קטנות שדוחפות את התא למקום הרצוי"], correctIndex: 2, explanation: "תאים הם חלקיקים דיאלקטריים. כאשר קרן לייזר מפוקסת מאוד עוברת דרכם, שינויים במקדם השבירה גורמים לשינוי בתנע של הפוטונים, ובהתאם לחוק שימור התנע, מופעל כוח על התא. כוח זה מושך את התא אל הנקודה בעלת עוצמת האור הגבוהה ביותר, כלומר מוקד הקרן." },
            { question: "בהשוואת שלושת סוגי הפוטוסינתזה האנוקסיגנית (סגולים, ירוקי גופרית, והליובקטריה), מהו ההבדל המרכזי ביכולתם ליצור כוח מחזר?", options: ["רק חיידקים סגולים יכולים ליצור NADPH", "רק הליובקטריה משתמשת בזרימה מעגלית", "ירוקי גופרית והליובקטריה יכולים לחזר פרודוקסין ישירות, בעוד שסגולים זקוקים לזרימה הפוכה", "כל השלושה מייצרים NADPH באותה יעילות ובאותו מנגנון"], correctIndex: 2, explanation: "מרכזי הריאקציה של ירוקי גופרית (P840) והליובקטריה (P798) הם בעלי פוטנציאל חיזור שלילי מספיק במצבם המעורר כדי לחזר ישירות את פרודוקסין (Fd), שהוא תורם האלקטרונים ל-NADP+. חיידקים סגולים (P870) אינם יכולים לעשות זאת ונדרשים לתהליך זרימת אלקטרונים הפוכה הצורך אנרגיה." },
            { question: "כאשר שפכים עשירים בחומר אורגני מוזרמים לנחל, מתרחשת תופעת ״אום החמצן״ (oxygen sag). מה מסביר את הירידה הראשונית בריכוז החמצן במורד הזרם?", options: ["האצות והציאנובקטריה מתות וצונחות לקרקעית", "השפכים עצמם מכילים חומרים המחזרים חמצן כימית", "חיידקים הטרוטרופיים צורכים חמצן בקצב גבוה כשהם מפרקים את החומר האורגני", "הטמפרטורה העולה של המים מורידה את מסיסות החמצן"], correctIndex: 2, explanation: "הזרמת חומר אורגני (BOD - Biological Oxygen Demand) גורמת לפריחה מהירה של חיידקים אירוביים והטרוטרופיים. חיידקים אלו משתמשים בחומר האורגני כמקור אנרגיה וצורכים חמצן מומס לנשימה בקצב העולה על קצב התמוססותו מהאוויר, מה שגורם לירידה חדה בריכוזו." },
            { question: "איזה מהבאים הוא המאפיין המשותף לכלורופילים, פיקובילינים וקרוטנואידים?", options: ["כולם מכילים אטום מגנזיום במרכזם", "כולם מסיסים במים", "כולם מולקולות בעלות מערכת קשרים כפולים מצומדים הבולעות אור נראה", "כולם קשורים קוולנטית לחלבוני הריאקציה"], correctIndex: 3, explanation: "המשותף לכל הפיגמנטים הפוטוסינתטיים הוא מבנה המכיל רצף של קשרים כפולים ויחידים לסירוגין (מערכת מצומדת). מבנה זה מאפשר בליעה של פוטונים באנרגיות מתאימות (אור נראה), המעלה את האלקטרונים לרמת אנרגיה גבוהה יותר." },
            { question: "בתא של ציאנובקטריה, היכן ממוקמים הפיקוביליזומים?", options: ["בתוך הציטופלזמה, חופשיים", "על פני השטח החיצוני של ממברנת התילקואיד, צמודים למערכת אור II", "משוקעים בתוך ממברנת התילקואיד", "בתוך חלל (לומן) התילקואיד"], correctIndex: 1, explanation: "הפיקוביליזומים הם קומפלקסי אנטנה גדולים המסיסים במים, ולכן אינם יכולים להיות בתוך הממברנה השומנית. הם קשורים לצד הציטופלזמטי (סטרומה) של ממברנת התילקואיד, ובדרך כלל קשורים פיזית למערכת אור II כדי להעביר אליה את אנרגיית האור שנקלטה ביעילות מרבית." },
            { question: "מדוע התהליך הכולל של קיבוע חנקן (N2 + 8H+ + 8e- -> 2NH3 + H2) דורש כמות גדולה כל כך של ATP (כ-16-24 מולקולות)?", options: ["ה-ATP משמש ישירות לחיזור מולקולת החנקן", "ה-ATP נדרש כדי לפצות על תוצר הלוואי של יצירת H2", "ה-ATP גורם לשינוי קונפורמציה בחלבון ה-reductase, המאפשר העברת אלקטרונים יעילה ל-dinitrogenase", "ה-ATP נדרש לסינתזה מחדש של האנזים לאחר כל מחזור פעולה"], correctIndex: 2, explanation: "הידרוליזה של ATP אינה תורמת ישירות אלקטרונים, אלא מספקת את האנרגיה לשינוי מבני בחלבון ה-Fe (reductase). שינוי זה מוריד את פוטנציאל החיזור של החלבון ומאפשר לו להעביר אלקטרון בעל אנרגיה גבוהה לחלבון ה-MoFe (dinitrogenase). ללא ATP, העברת האלקטרונים אינה מתרחשת." },
            { question: "איזה מהבאים מהווה דוגמה לפוטוליטואוטוטרוף?", options: ["Escherichia coli המשתמשת בגלוקוז לאנרגיה ופחמן", "חיידק גופרית סגול המשתמש באור לאנרגיה, H2S כדונור אלקטרונים ו-CO2 לפחמן", "חיידק מחמצן ברזל המשתמש ב-Fe2+ לאנרגיה ו-CO2 לפחמן", "שמרים המבצעים תסיסה של סוכר"], correctIndex: 1, explanation: "'פוטו' - אנרגיה מאור. 'ליטו' - תורם אלקטרונים אי-אורגני (H2S). 'אוטו' - מקור פחמן אי-אורגני (CO2). חיידק גופרית סגול מתאים בדיוק להגדרה זו." },
            { question: "בפוטוסינתזה של חיידקים סגולים, הקווינון פול (quinone pool) ממלא תפקיד כפול. מהם שני התפקידים?", options: ["קבלת אלקטרונים ממרכז הריאקציה והעברת פרוטונים דרך הממברנה", "חיזור ישיר של NAD+ וקבלת אלקטרונים מציטוכרום c2", "אחסון אנרגיה בצורת ATP וסינתזת בקטריוכלורופיל", "הגנה מפני חמצן וקיבוע CO2"], correctIndex: 0, explanation: "הקווינון פול (Q) מקבל אלקטרונים ממרכז הריאקציה (דרך Bph ו-QA/QB). כאשר הוא מחוזר ל-QH2, הוא קושר פרוטונים מהציטופלזמה. לאחר מכן הוא נע לקומפלקס ציטוכרום bc1, מוסר את האלקטרונים ומשחרר את הפרוטונים לחלל הפריפלזמטי, ובכך תורם ליצירת גרדיאנט פרוטונים." },
            { question: "מהי הסיבה לכך ש-nifH, הגן המקודד ל-dinitrogenase reductase, משמש לעתים קרובות כסמן מולקולרי למחקרים על קיבוע חנקן בסביבה?", options: ["הוא הגן היחיד המעורב בקיבוע חנקן", "הוא שמור אבולוציונית בקרב כל קושרי החנקן הידועים ורצפו מאפשר בניית עצים פילוגנטיים", "הוא קל מאוד לשכפול ב-PCR בהשוואה לגנים אחרים", "הוא תמיד מתבטא ברמות גבוהות, גם ללא קיבוע חנקן פעיל"], correctIndex: 1, explanation: "הגן nifH קיים בכל האורגניזמים המקבעים חנקן, והרצף שלו שמור מספיק כדי שניתן יהיה לתכנן פריימרים כלליים ל-PCR, אך גם משתנה מספיק כדי שניתן יהיה להבחין בין קבוצות טקסונומיות שונות. זה הופך אותו לכלי אידיאלי לחקר המגוון והתפוצה של קושרי חנקן." },
            { question: "מה ההבדל העיקרי בין ממברנות פוטוסינתטיות של ציאנובקטריה לאלו של חיידקי גופרית ירוקים?", options: ["לציאנובקטריה יש תילקואידים שטוחים, ולירוקי גופרית יש כלורוזומים", "לציאנובקטריה אין ממברנות פנימיות כלל", "לירוקי גופרית יש תילקואידים בתוך כלורופלסטים", "לציאנובקטריה יש כלורוזומים, ולירוקי גופרית יש תילקואידים"], correctIndex: 0, explanation: "לציאנובקטריה, בדומה לצמחים, יש מערכת ממברנות פנימית הנקראת תילקואידים, שם מתרחשת הפוטוסינתזה. לחיידקי גופרית ירוקים, לעומת זאת, יש מבנים ייחודיים הנקראים כלורוזומים, הצמודים לממברנת התא ומשמשים כאנטנות קליטת אור." },

        }

        function displayMCQuestion(index) {
            if (!mcqData || mcqData.length === 0) return;
            const qData = mcqData[index];
            mcqQuestion.textContent = qData.question;
            mcqOptions.innerHTML = '';
            mcqFeedback.classList.add('hidden');
            mcqExplanation.classList.add('hidden');
            qData.options.forEach((option, i) => {
                const button = document.createElement('button');
                button.textContent = option;
                button.onclick = () => handleMCQAnswer(index, i);
                mcqOptions.appendChild(button);
            });
            mcqCounter.textContent = `שאלה ${index + 1} / ${mcqData.length}`;
            prevMCQBtn.disabled = index === 0;
            nextMCQBtn.disabled = index === mcqData.length - 1;
            if (mcqAnswers[index] !== null) {
                highlightMCQAnswer(mcqOptions, mcqFeedback, mcqExplanation, index, mcqAnswers[index].selected);
            }
        }

        function handleMCQAnswer(qIndex, selectedIndex) {
            if (mcqAnswers[qIndex] !== null) return;
            const isCorrect = selectedIndex === mcqData[qIndex].correctIndex;
            mcqAnswers[qIndex] = { selected: selectedIndex, correct: isCorrect };
            highlightMCQAnswer(mcqOptions, mcqFeedback, mcqExplanation, qIndex, selectedIndex);
        }
        
        function highlightMCQAnswer(optionsContainer, feedbackEl, explanationEl, qIndex, selectedIndex) {
            const qData = mcqData[qIndex];
            const buttons = optionsContainer.querySelectorAll('button');
            buttons.forEach((button, i) => {
                button.disabled = true;
                if (i === qData.correctIndex) {
                    button.style.backgroundColor = 'var(--correct-color)';
                    button.style.color = '#fff';
                    button.classList.add('correct');
                }
                if (i === selectedIndex && i !== qData.correctIndex) {
                    button.style.backgroundColor = 'var(--incorrect-color)';
                    button.style.color = '#fff';
                    button.classList.add('incorrect');
                }
            });
            feedbackEl.textContent = selectedIndex === qData.correctIndex ? "נכון!" : "לא נכון.";
            feedbackEl.className = `feedback ${selectedIndex === qData.correctIndex ? 'correct' : 'incorrect'}`;
            explanationEl.textContent = `הסבר: ${qData.explanation}`;
            explanationEl.classList.remove('hidden');
        }

        function displayAllMCQ() {
            if (!mcqData || mcqData.length === 0) return;
            mcqSingleView.classList.add('hidden');
            mcqAllQuestionsContainer.innerHTML = ''; 
            mcqData.forEach((qData, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question-container-all';
                questionDiv.innerHTML = `
                    <div class="question-text">${index + 1}. ${qData.question}</div>
                    <div class="options">
                        ${qData.options.map((option, i) => `<button data-qindex="${index}" data-oindex="${i}">${option}</button>`).join('')}
                    </div>
                    <div class="feedback hidden"></div>
                    <div class="explanation hidden"></div>
                `;
                mcqAllQuestionsContainer.appendChild(questionDiv);
                 const optionButtons = questionDiv.querySelectorAll('.options button');
                 optionButtons.forEach(button => {
                     button.onclick = () => {
                        const qIndex = parseInt(button.dataset.qindex);
                        const oIndex = parseInt(button.dataset.oindex);
                        if (mcqAnswers[qIndex] === null) {
                            const isCorrect = oIndex === mcqData[qIndex].correctIndex;
                            mcqAnswers[qIndex] = { selected: oIndex, correct: isCorrect };
                        }
                        const optionsDiv = button.closest('.options');
                        const feedbackDiv = questionDiv.querySelector('.feedback');
                        const explanationDiv = questionDiv.querySelector('.explanation');
                        highlightMCQAnswer(optionsDiv, feedbackDiv, explanationDiv, qIndex, mcqAnswers[qIndex].selected);
                     };
                 });
                 if (mcqAnswers[index] !== null) {
                    const optionsDiv = questionDiv.querySelector('.options');
                    const feedbackDiv = questionDiv.querySelector('.feedback');
                    const explanationDiv = questionDiv.querySelector('.explanation');
                    highlightMCQAnswer(optionsDiv, feedbackDiv, explanationDiv, index, mcqAnswers[index].selected);
                 }
            });
            mcqAllQuestionsContainer.classList.remove('hidden');
        }

        function displayTFQuestion(index) {
            if (!tfData || tfData.length === 0) return;
            const qData = tfData[index];
            tfQuestion.textContent = qData.question;
            tfFeedback.classList.add('hidden');
            tfExplanation.classList.add('hidden');
             const buttons = tfOptionsContainer.querySelectorAll('button');
             buttons.forEach(button => {
                 button.disabled = false;
                 button.style.backgroundColor = '';
                 button.style.color = '';
                 button.classList.remove('correct', 'incorrect');
                 button.onclick = () => handleTFAnswer(index, button.dataset.answer === 'true');
             });
            tfCounter.textContent = `שאלה ${index + 1} / ${tfData.length}`;
            prevTFBtn.disabled = index === 0;
            nextTFBtn.disabled = index === tfData.length - 1;
            if (tfAnswers[index] !== null) {
                highlightTFAnswer(tfOptionsContainer, tfFeedback, tfExplanation, index, tfAnswers[index].selected);
            }
        }
        
        function handleTFAnswer(qIndex, selectedAnswer) {
            if (tfAnswers[qIndex] !== null) return;
            const isCorrect = selectedAnswer === tfData[qIndex].answer;
            tfAnswers[qIndex] = { selected: selectedAnswer, correct: isCorrect };
            highlightTFAnswer(tfOptionsContainer, tfFeedback, tfExplanation, qIndex, selectedAnswer);
        }
        
        function highlightTFAnswer(optionsContainer, feedbackEl, explanationEl, qIndex, selectedAnswer) {
             const qData = tfData[qIndex];
             const buttons = optionsContainer.querySelectorAll('button');
             buttons.forEach(button => {
                 const buttonAnswer = button.dataset.answer === 'true';
                 button.disabled = true;
                 if (buttonAnswer === qData.answer) {
                     button.style.backgroundColor = 'var(--correct-color)';
                     button.style.color = '#fff';
                     button.classList.add('correct');
                 }
                 if (buttonAnswer === selectedAnswer && buttonAnswer !== qData.answer) {
                     button.style.backgroundColor = 'var(--incorrect-color)';
                     button.style.color = '#fff';
                     button.classList.add('incorrect');
                 }
             });
             feedbackEl.textContent = selectedAnswer === qData.answer ? "נכון!" : "לא נכון.";
             feedbackEl.className = `feedback ${selectedAnswer === qData.answer ? 'correct' : 'incorrect'}`;
             explanationEl.textContent = `הסבר: ${qData.explanation}`;
             explanationEl.classList.remove('hidden');
        }
        
        function displayAllTF() {
             if (!tfData || tfData.length === 0) return;
             tfSingleView.classList.add('hidden');
             tfAllQuestionsContainer.innerHTML = '';
             tfData.forEach((qData, index) => {
                 const questionDiv = document.createElement('div');
                 questionDiv.className = 'question-container-all';
                 questionDiv.innerHTML = `
                     <div class="question-text">${index + 1}. ${qData.question}</div>
                     <div class="tf-options">
                         <button data-qindex="${index}" data-answer="true">נכון</button>
                         <button data-qindex="${index}" data-answer="false">לא נכון</button>
                     </div>
                     <div class="feedback hidden"></div>
                     <div class="explanation hidden"></div>
                 `;
                 tfAllQuestionsContainer.appendChild(questionDiv);
                 const optionButtons = questionDiv.querySelectorAll('.tf-options button');
                 optionButtons.forEach(button => {
                     button.onclick = () => {
                         const qIndex = parseInt(button.dataset.qindex);
                         const selectedAnswer = button.dataset.answer === 'true';
                         if (tfAnswers[qIndex] === null) {
                             const isCorrect = selectedAnswer === tfData[qIndex].answer;
                             tfAnswers[qIndex] = { selected: selectedAnswer, correct: isCorrect };
                         }
                         const optionsDiv = button.closest('.tf-options');
                         const feedbackDiv = questionDiv.querySelector('.feedback');
                         const explanationDiv = questionDiv.querySelector('.explanation');
                         highlightTFAnswer(optionsDiv, feedbackDiv, explanationDiv, qIndex, tfAnswers[qIndex].selected);
                     };
                 });
                 if (tfAnswers[index] !== null) {
                    const optionsDiv = questionDiv.querySelector('.tf-options');
                    const feedbackDiv = questionDiv.querySelector('.feedback');
                    const explanationDiv = questionDiv.querySelector('.explanation');
                    highlightTFAnswer(optionsDiv, feedbackDiv, explanationDiv, index, tfAnswers[index].selected);
                 }
             });
             tfAllQuestionsContainer.classList.remove('hidden');
        }

        function initialize() {
            if (flashcardData.length > 0) displayCard(currentCardIndex);
            if (mcqData.length > 0) displayMCQuestion(currentMCQIndex);
            if (tfData.length > 0) displayTFQuestion(currentTFIndex);
            flashcardContent.addEventListener('click', flipCard);
            prevCardBtn.addEventListener('click', () => { if (currentCardIndex > 0) { currentCardIndex--; displayCard(currentCardIndex); } });
            nextCardBtn.addEventListener('click', () => { if (currentCardIndex < flashcardData.length - 1) { currentCardIndex++; displayCard(currentCardIndex); } });
            prevMCQBtn.addEventListener('click', () => { if (currentMCQIndex > 0) { currentMCQIndex--; displayMCQuestion(currentMCQIndex); } });
            nextMCQBtn.addEventListener('click', () => { if (currentMCQIndex < mcqData.length - 1) { currentMCQIndex++; displayMCQuestion(currentMCQIndex); } });
            viewAllMCQBtn.addEventListener('click', displayAllMCQ);
            prevTFBtn.addEventListener('click', () => { if (currentTFIndex > 0) { currentTFIndex--; displayTFQuestion(currentTFIndex); } });
            nextTFBtn.addEventListener('click', () => { if (currentTFIndex < tfData.length - 1) { currentTFIndex++; displayTFQuestion(currentTFIndex); } });
            viewAllTFBtn.addEventListener('click', displayAllTF);
        }
        
        initialize();
    });
    </script>
</body>
</html>
