<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Study Tool</title>
    <style>
        /* --- Root Variables for Consistent Theming --- */
        :root {
            --primary-bg: #333333;
            --secondary-bg: #666666;
            --accent-color: #3D90D7;
            --text-color: #E0E0E0;
            --correct-color: #4CAF50;
            --incorrect-color: #F44336;
            --card-bg: #5a5a5a;
        }

        /* --- Global Styles --- */
        body {
            background-color: var(--primary-bg);
            color: var(--text-color);
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 90%; /* As per prompt */
            margin: 20px auto;
            padding: 20px;
            background-color: var(--secondary-bg);
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        h1, h2 {
            color: var(--accent-color);
            text-align: center;
            border-bottom: 1px solid var(--accent-color);
            padding-bottom: 10px;
        }

        .section {
            background-color: var(--primary-bg);
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 8px;
        }

        /* --- Study Cards Styling (Fade Animation) --- */
        .flashcard-container {
            height: 250px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #flashcard-content {
            width: 100%;
            height: 100%;
            background-color: var(--card-bg);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            transition: opacity 0.3s ease-in-out; /* Fade transition */
        }
        
        .flashcard-front-style {
             font-size: 1.5em;
             font-weight: bold;
        }
        
        .flashcard-back-style {
             font-size: 1.1em;
        }

        /* --- Questions Styling (MCQ & T/F) --- */
         .question-container-single, .question-container-all {
            margin-bottom: 15px;
            padding: 15px;
            border: 1px solid var(--secondary-bg);
            border-radius: 5px;
         }

        .question-text {
            font-weight: bold;
            margin-bottom: 15px;
        }

        .options button, .tf-options button {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-align: right;
            transition: background-color 0.3s;
        }

        .options button:hover:not(:disabled), .tf-options button:hover:not(:disabled) {
            background-color: #357ab8;
        }

        .options button:disabled, .tf-options button:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
        
        /* Specific styling to override disabled opacity for correct/incorrect answers */
        .options button.correct, .tf-options button.correct { opacity: 1; }
        .options button.incorrect, .tf-options button.incorrect { opacity: 1; }


        .feedback {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
        }

        .feedback.correct {
            background-color: var(--correct-color);
            color: #fff;
        }

        .feedback.incorrect {
            background-color: var(--incorrect-color);
            color: #fff;
        }

        .explanation {
            margin-top: 10px;
            font-style: italic;
            font-size: 0.9em;
            padding: 8px;
            background-color: var(--secondary-bg);
            border-radius: 4px;
        }

        /* --- Navigation & Utility Styling --- */
        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            margin-bottom: 10px;
        }

        .nav-button, .view-all-button {
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
        }

        .nav-button:disabled {
             opacity: 0.5;
             cursor: not-allowed;
        }

        .counter {
            font-size: 0.9em;
        }

        .view-all-container {
            text-align: center;
            margin-top: 15px;
            margin-bottom: 15px;
        }

        .hidden {
            display: none;
        }

        #mcq-all-questions .question-container-all,
        #tf-all-questions .question-container-all {
            margin-bottom: 20px;
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>ראשית החיים, אבולוציה ומיון מיקרוביאלי</h1>

        <!-- Study Cards Section -->
        <div class="section">
            <h2>כרטיסי לימוד</h2>
            <div class="flashcard-container">
                <div id="flashcard-content"></div>
            </div>
            <div class="navigation">
                <button class="nav-button" id="prev-card">הקודם</button>
                <span class="counter" id="card-counter"></span>
                <button class="nav-button" id="next-card">הבא</button>
            </div>
        </div>

        <!-- Multiple Choice Questions Section -->
        <div class="section">
            <h2>שאלות רב-ברירה (אמריקאיות)</h2>
            <div id="mcq-single-view">
                <div class="question-container-single" id="mcq-container">
                    <div class="question-text" id="mcq-question"></div>
                    <div class="options" id="mcq-options"></div>
                    <div class="feedback hidden" id="mcq-feedback"></div>
                    <div class="explanation hidden" id="mcq-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-mcq">הקודם</button>
                    <span class="counter" id="mcq-counter"></span>
                    <button class="nav-button" id="next-mcq">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-mcq">הצג את כל השאלות</button>
                 </div>
            </div>
            <div id="mcq-all-questions" class="hidden">
                <!-- All MCQs will be dynamically inserted here -->
            </div>
        </div>

        <!-- True/False Questions Section -->
        <div class="section">
            <h2>שאלות נכון/לא נכון</h2>
             <div id="tf-single-view">
                <div class="question-container-single" id="tf-container">
                    <div class="question-text" id="tf-question"></div>
                    <div class="tf-options" id="tf-options">
                        <button data-answer="true">נכון</button>
                        <button data-answer="false">לא נכון</button>
                    </div>
                    <div class="feedback hidden" id="tf-feedback"></div>
                    <div class="explanation hidden" id="tf-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-tf">הקודם</button>
                    <span class="counter" id="tf-counter"></span>
                    <button class="nav-button" id="next-tf">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-tf">הצג את כל השאלות</button>
                 </div>
            </div>
             <div id="tf-all-questions" class="hidden">
                 <!-- All T/F Questions will be dynamically inserted here -->
             </div>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        
        const flashcardData = [
            { term: "אנדוסימביוזה", definition: "תיאוריה לפיה אברונים איקריוטיים כמו מיטוכונדריה וכלורופלסטים נוצרו כאשר תא פרוקריוטי אחד נבלע על ידי אחר ויצר יחסי תלות הדדיים." },
            { term: "סטרומטוליטים", definition: "מבנים סלעיים שכבתיים שנוצרו על ידי לכידה וקשירה של חלקיקי סדימנט על ידי קהילות של מיקרואורגניזמים, בעיקר ציאנובקטריה. הם מהווים עדות קדומה לחיים." },
            { term: "גן 16S rRNA", definition: "גן המקודד ליחידה הקטנה של ה-RNA הריבוזומלי בפרוקריוטים. הרצף שלו שמור מאוד ומשמש כסמן מולקולרי עיקרי לקביעת קשרים פילוגנטיים." },
            { term: "היברידיזציית DNA-DNA (DDH)", definition: "שיטה כמותית למדידת הדמיון הגנטי הכולל בין שני אורגניזמים. שימשה כסטנדרט זהב להגדרת מינים בחיידקים, כאשר ערך של 70% ומעלה מצביע על אותו מין." },
            { term: "מערכת שלושת התחומים", definition: "מודל מיון ביולוגי שהוצע על ידי קארל וולס, המחלק את כל היצורים החיים לשלושה תחומים: Bacteria, Archaea ו-Eukarya, על בסיס רצפי rRNA." },
            { term: "ASGARD Archaea", definition: "על-מערכה (superphylum) של ארכאונים הנחשבת לקבוצה הקרובה ביותר לאיקריוטים, ומספקת תמיכה למודל שני התחומים שבו האיקריוטים התפתחו מתוך הארכאה." },
            { term: "אנליזת FAME", definition: "שיטה כימוטקסונומית לזיהוי חיידקים המבוססת על ניתוח פרופיל חומצות השומן שלהם באמצעות כרומטוגרפיית גז, לאחר שהומרו לאסטרים מתיליים." },
            { term: "ריבוטייפינג (Ribotyping)", definition: "שיטה לטביעת אצבע גנטית של חיידקים המבוססת על דפוסי הפיצול של גנים של rRNA. הדפוס שנוצר ייחודי לזן או למין מסוים." },
            { term: "סביבה אנוקסית", definition: "סביבה חסרת חמצן מולקולרי ($O_2$). כדור הארץ הקדום היה אנוקסי לפני הופעת הפוטוסינתזה החמצנית." },
            { term: "ציאנובקטריה", definition: "מערכה של חיידקים המבצעים פוטוסינתזה חמצנית. הופעתם שינתה באופן דרמטי את האטמוספירה של כדור הארץ על ידי שחרור חמצן." },
            { term: "מטאזואה (Metazoa)", definition: "שם נרדף לממלכת בעלי החיים. אורגניזמים רב-תאיים, איקריוטיים והטרוטרופיים. הופעתם המורפולוגית היא אירוע מאוחר יחסית בהיסטוריה של החיים." },
            { term: "האב הקדמון המשותף האוניברסלי (LUCA)", definition: "האורגניזם ההיפותטי שממנו התפתחו כל היצורים החיים כיום. הוא ממוקם בשורש עץ החיים הפילוגנטי." },
            { term: "עץ פילוגנטי", definition: "תרשים מסועף המייצג את הקשרים האבולוציוניים בין מינים שונים או ישויות אחרות על בסיס דמיון ושוני בתכונותיהם הפיזיות או הגנטיות." },
            { term: "PCR", definition: "תגובת שרשרת של פולימראז. טכניקה מולקולרית להגברה (יצירת עותקים רבים) של מקטע DNA ספציפי." },
            { term: "פוטוטרופים חמצניים", definition: "אורגניזמים המשתמשים באור כמקור אנרגיה ומייצרים חמצן כמוצר לוואי של הפוטוסינתזה. ציאנובקטריה היא הדוגמה המרכזית." }
        ];

        const mcqData = [
            {
                question: "איזה אירוע בהיסטוריה של כדור הארץ היה התנאי המקדים והחיוני ביותר להתפתחות שכבת האוזון?",
                options: ["הופעת האיקריוטים הראשונים", "אנדוסימביוזה של מיטוכונדריה", "התפתחות הפוטוסינתזה החמצנית על ידי ציאנובקטריה", "התפתחות אבולוציונית של מטאזואה"],
                correctIndex: 2,
                explanation: "שכבת האוזון ($O_3$) נוצרת מחמצן מולקולרי ($O_2$) באטמוספירה. הפוטוסינתזה החמצנית על ידי ציאנובקטריה הייתה התהליך המשמעותי הראשון ששחרר כמויות גדולות של חמצן לאטמוספירה, מה שאיפשר בסופו של דבר את יצירת שכבת האוזון."
            },
            {
                question: "מהי המשמעות המרכזית של הממצא שרצפי 16S rRNA יכולים להיות דומים ב-99% בין שני חיידקים, אך ערך ה-DNA-DNA hybridization ביניהם הוא רק 50%?",
                options: ["שיטת ה-16S rRNA אינה אמינה לקביעת קשרים אבולוציוניים", "שני החיידקים הם מאותו המין אך מזנים שונים במקצת", "הגן 16S rRNA הוא שמור מאוד, בעוד הגנום הכולל עבר סטייה משמעותית המצביעה על מינים נפרדים", "שיטת ה-DNA-DNA hybridization רגישה מדי ויוצרת הבחנות לא משמעותיות"],
                correctIndex: 2,
                explanation: "הגן 16S rRNA משמש לקביעת קשרים פילוגנטיים רחבים, אך הוא שמור מדי מכדי להבחין בין מינים קרובים. ערך DDH מתחת ל-70% נחשב כהגדרה קלאסית למינים שונים. המצב המתואר מדגים את מגבלות ה-16S להגדרת מין."
            },
            {
                question: "מה ההבדל המהותי בין מודל שני התחומים (הנתמך על ידי גילויי ASGARD) למודל שלושת התחומים של וולס?",
                options: ["מודל שני התחומים טוען שחיידקים וארכאה הם קרובים יותר זה לזה מאשר לאיקריוטים", "מודל שני התחומים מציב את האיקריוטים כענף שהתפתח מתוך תחום הארכאה, ולא כתחום נפרד ועצמאי", "מודל שלושת התחומים אינו מכיר בקיום אב קדמון משותף לכל החיים", "מודל שני התחומים מבוסס על תכונות מורפולוגיות, בעוד מודל שלושת התחומים מבוסס על גנטיקה"],
                correctIndex: 1,
                explanation: "בעוד מודל שלושת התחומים מציג את Eukarya, Archaea, ו-Bacteria כשלושה ענפים עיקריים שנפרדו מאב קדמון משותף, מודל שני התחומים טוען שהארכאה והחיידקים הם שני התחומים הבסיסיים, והאיקריוטים התפתחו מאוחר יותר מתוך קו מסוים של ארכאה (כמו ASGARD)."
            },
            {
                question: "מה ניתן להסיק מהשוואה בין ניתוח קהילה מיקרוביאלית המבוסס על הגברת גני 16S rRNA מה-DNA הכולל, לבין ניתוח המבוסס על ריצוף 16S rRNA מ-RNA כולל (לאחר שעתוק הפוך)?",
                options: ["שתי השיטות מספקות מידע זהה לחלוטין על הרכב הקהילה", "ניתוח DNA מזהה אילו אורגניזמים נוכחים, בעוד שניתוח RNA מצביע על האורגניזמים הפעילים מטבולית", "ניתוח RNA מדויק יותר גנטית אך ניתוח DNA קל יותר לביצוע", "ניתוח DNA יכול לזהות רק חיידקים, בעוד שניתוח RNA יכול לזהות גם ארכאה ואיקריוטים"],
                correctIndex: 1,
                explanation: "ה-DNA הגנומי קיים בכל התאים, חיים או מתים, ומייצג את הפוטנציאל של הקהילה. ה-rRNA, לעומת זאת, הוא חלק מהריבוזומים, שהם פעילים ורבים יותר בתאים חיים ופעילים מטבולית. לכן, רמות ה-rRNA משקפות את רמת הפעילות של האורגניזמים."
            },
            {
                question: "על פי תיאוריית האנדוסימביוזה, איזה מהבאים מתאר בצורה הטובה ביותר את התהליך שהוביל להופעת תאי צמח?",
                options: ["אב קדמון איקריוטי בלע חיידק פוטוטרופי, ולאחר מכן בלע חיידק אירובי", "אב קדמון פרוקריוטי בלע ציאנובקטריה", "אב קדמון איקריוטי, שכבר הכיל מיטוכונדריה, בלע ציאנובקטריה", "אב קדמון איקריוטי איבד את המיטוכונדריה שלו ואז בלע כלורופלסט"],
                correctIndex: 2,
                explanation: "הסברה הרווחת היא שהאנדוסימביוזה של המיטוכונדריה (ממקור של חיידק אירובי) קדמה לזו של הכלורופלסט. לכן, אב קדמון איקריוטי שכבר היה לו את היתרון האנרגטי של המיטוכונדריה, עבר אירוע אנדוסימביוטי שני ובלע ציאנובקטריה, מה שהוביל לקו האבולוציוני של אצות וצמחים."
            },
            {
                question: "בהתבסס על המודל ההיפותטי (slide 8, right), איזה יתרון מטבולי מיידי הניעה הבליעה של חיידק מייצר $H_2$ על ידי ארכאון צורך $H_2$?",
                options: ["יכולת לבצע פוטוסינתזה חמצנית", "הגנה מפני סביבה עשירה בחמצן", "יצירת צימוד מטבולי יעיל שבו תוצר לוואי של אורגניזם אחד הוא מצע לשני", "התפתחות דופן תא מורכבת להגנה מפני טורפים"],
                correctIndex: 2,
                explanation: "המודל מציע שיתוף פעולה מטבולי הדוק (syntrophy) כמניע לאיחוד. הארכאון (המארח) מרוויח מקור קבוע של דלק ($H_2$), והחיידק (האורח) נהנה מסילוק יעיל של תוצר הלוואי שלו, מה שהופך את התהליך ליעיל יותר מבחינה תרמודינמית."
            },
            {
                question: "שני חיידקים מראים ערך DNA-DNA hybridization של 20%. על פי הקריטריונים הקלאסיים, מהי המסקנה הסבירה ביותר לגבי הקשר ביניהם?",
                options: ["הם שייכים לאותו מין", "הם שייכים למינים שונים אך לאותו סוג", "הם שייכים לסוגים שונים", "לא ניתן להסיק מסקנה ללא ריצוף 16S rRNA"],
                correctIndex: 2,
                explanation: "הקריטריונים המקובלים ל-DDH הם: >70% לאותו מין, 25-70% למינים שונים באותו סוג, ו-<25% בדרך כלל מצביע על כך שהם שייכים לסוגים שונים. ערך של 20% נופל בבירור לקטגוריה האחרונה."
            },

            { question: "הופעת המטאזואה (בעלי חיים) התרחשה לפני הופעת האיקריוטים הראשונים.", answer: false, explanation: "מטאזואה הם איקריוטים רב-תאיים. לכן, הופעת התא האיקריוטי הייתה תנאי הכרחי להתפתחותם, והתרחשה הרבה לפניהם." },
            { question: "בעץ פילוגנטי, אורך הענפים פרופורציונלי למספר השינויים האבולוציוניים שהתרחשו.", answer: true, explanation: "בעצים מודרניים (scaled trees), אורך הענף מייצג את המרחק האבולוציוני (למשל, מספר החלפות הנוקלאוטידים באתר), ולכן ענפים ארוכים יותר מציינים יותר זמן או קצב שינוי מהיר יותר." },
            { question: "ממלכת הפרוטיסטה, כפי שהוגדרה על ידי ויטאקר, היא קבוצה מונופילטית.", answer: false, explanation: "פרוטיסטה היא קבוצה פאראפילטית או פוליפילטית. היא כוללת את כל האיקריוטים שאינם צמחים, בעלי חיים או פטריות, ואינה מייצגת שושלת אבולוציונית אחת וייחודית." },
            { question: "שיטת FAME ושיטת Ribotyping הן שתיהן שיטות המבוססות על ניתוח רצפי DNA.", answer: false, explanation: "שיטת Ribotyping מבוססת על דפוסי DNA. שיטת FAME, לעומת זאת, מבוססת על ניתוח כימי של פרופיל חומצות השומן, שהן ליפידים." },
            { question: "כל האיקריוטים הם רב-תאיים.", answer: false, explanation: "קיימים איקריוטים חד-תאיים רבים, כמו אמבה, סנדלית ורוב מיני הפרוטיסטה והשמרים." },
            { question: "האב הקדמון של הכלורופלסטים היה חיידק מקבוצת הפרוטאובקטריה.", answer: false, explanation: "האב הקדמון של הכלורופלסטים היה ציאנובקטריה, המסוגלת לבצע פוטוסינתזה חמצנית. האב הקדמון של המיטוכונדריה היה פרוטאובקטריה." },
            { question: "השימוש בריצוף 16S rRNA שינה באופן מהותי את הבנתנו לגבי עץ החיים.", answer: true, explanation: "שיטה זו הובילה למהפכה של וולס, לגילוי תחום הארכאה, ולהבנה שהעולם המיקרוביאלי מגוון הרבה יותר ממה שחשבו על בסיס מורפולוגיה ותרבית." },
            { question: "סביבה אוקסית (Oxic) היא סביבה עשירה בפחמן דו-חמצני.", answer: false, explanation: "סביבה אוקסית היא סביבה עשירה בחמצן מולקולרי ($O_2$)." },
            { question: "התהליך של שכפול DNA ב-PCR דורש DNA פולימראז שעמיד לטמפרטורות גבוהות.", answer: true, explanation: "מכיוון שכל מחזור PCR כולל שלב דנטורציה בטמפרטורה גבוהה (כ-95 מעלות צלזיוס), יש צורך באנזים (כמו Taq פולימראז) שלא ייהרס בטמפרטורה זו ויישאר פעיל." },
            { question: "בעץ החיים של הקל (1866), המונרה (Moneres) ממוקמים בשורש העץ.", answer: true, explanation: "הקל הציב את ה'מונרה', אורגניזמים פשוטים חסרי גרעין, בבסיס עץ החיים, כמקור שממנו התפתחו כל שאר הקבוצות." },
            { question: "היברידיזציית DNA-DNA מודדת את הדמיון ברצף של גן בודד.", answer: false, explanation: "היא מודדת את הדמיון הממוצע על פני כל הגנום, על ידי מדידת יכולתם של גדילי DNA משני אורגניזמים להיקשר זה לזה." },
            { question: "הפיצוץ הקמבריוני הוא כינוי להתפרצות געשית גדולה שגרמה להכחדה המונית.", answer: false, explanation: "הפיצוץ הקמבריוני הוא כינוי להופעה מהירה, במונחים גיאולוגיים, של מגוון גדול של בעלי חיים מורכבים בתחילת תור הקמבריון." },
            { question: "בניתוח FAME, חומצות השומן מומרות למתיל אסטר כדי להפוך אותן לתנודתיות יותר עבור ניתוח בכרומטוגרפיית גז.", answer: true, explanation: "הוספת קבוצת מתיל (דרבטיזציה) הופכת את חומצות השומן לפחות קוטביות ויותר נדיפות, מה שמאפשר להן לעבור דרך עמודת הגז-כרומטוגרף ולהיפרד ביעילות." },
            { question: "ההבדל בין 'מרחק אבולוציוני' ל'מרחק אבולוציוני מתוקן' נובע רק משגיאות בריצוף.", answer: false, explanation: "התיקון נועד בעיקר להתחשב בתופעות אבולוציוניות אמיתיות כמו מוטציות חוזרות ומקבילות, אשר גורמות להערכת חסר של מספר השינויים הכולל שהתרחש." }
        ];


        // --- Global State Variables ---
        let currentCardIndex = 0;
        let isCardFront = true;
        let isCardAnimating = false;
        let currentMCQIndex = 0;
        let currentTFIndex = 0;
        let mcqAnswers = new Array(mcqData.length).fill(null);
        let tfAnswers = new Array(tfData.length).fill(null);

        // --- DOM Element References ---
        const flashcardContent = document.getElementById('flashcard-content');
        const cardCounter = document.getElementById('card-counter');
        const prevCardBtn = document.getElementById('prev-card');
        const nextCardBtn = document.getElementById('next-card');
        const mcqQuestion = document.getElementById('mcq-question');
        const mcqOptions = document.getElementById('mcq-options');
        const mcqFeedback = document.getElementById('mcq-feedback');
        const mcqExplanation = document.getElementById('mcq-explanation');
        const mcqCounter = document.getElementById('mcq-counter');
        const prevMCQBtn = document.getElementById('prev-mcq');
        const nextMCQBtn = document.getElementById('next-mcq');
        const viewAllMCQBtn = document.getElementById('view-all-mcq');
        const mcqSingleView = document.getElementById('mcq-single-view');
        const mcqAllQuestionsContainer = document.getElementById('mcq-all-questions');
        const tfQuestion = document.getElementById('tf-question');
        const tfOptionsContainer = document.getElementById('tf-options');
        const tfFeedback = document.getElementById('tf-feedback');
        const tfExplanation = document.getElementById('tf-explanation');
        const tfCounter = document.getElementById('tf-counter');
        const prevTFBtn = document.getElementById('prev-tf');
        const nextTFBtn = document.getElementById('next-tf');
        const viewAllTFBtn = document.getElementById('view-all-tf');
        const tfSingleView = document.getElementById('tf-single-view');
        const tfAllQuestionsContainer = document.getElementById('tf-all-questions');

        function displayCard(index) {
            if (!flashcardData || flashcardData.length === 0) return;
            const cardData = flashcardData[index];
            isCardFront = true;
            flashcardContent.style.opacity = '1';
            flashcardContent.textContent = cardData.term;
            flashcardContent.className = 'flashcard-front-style';
            cardCounter.textContent = `כרטיס ${index + 1} / ${flashcardData.length}`;
            prevCardBtn.disabled = index === 0;
            nextCardBtn.disabled = index === flashcardData.length - 1;
        }

        function flipCard() {
            if (isCardAnimating || !flashcardData || flashcardData.length === 0) return;
            isCardAnimating = true;
            flashcardContent.style.opacity = '0';
            setTimeout(() => {
                isCardFront = !isCardFront;
                const cardData = flashcardData[currentCardIndex];
                if (isCardFront) {
                    flashcardContent.textContent = cardData.term;
                    flashcardContent.className = 'flashcard-front-style';
                } else {
                    flashcardContent.textContent = cardData.definition;
                    flashcardContent.className = 'flashcard-back-style';
                }
                flashcardContent.style.opacity = '1';
                isCardAnimating = false;
            }, 300);
        }

        function displayMCQuestion(index) {
            if (!mcqData || mcqData.length === 0) return;
            const qData = mcqData[index];
            mcqQuestion.textContent = qData.question;
            mcqOptions.innerHTML = '';
            mcqFeedback.classList.add('hidden');
            mcqExplanation.classList.add('hidden');
            qData.options.forEach((option, i) => {
                const button = document.createElement('button');
                button.textContent = option;
                button.onclick = () => handleMCQAnswer(index, i);
                mcqOptions.appendChild(button);
            });
            mcqCounter.textContent = `שאלה ${index + 1} / ${mcqData.length}`;
            prevMCQBtn.disabled = index === 0;
            nextMCQBtn.disabled = index === mcqData.length - 1;
            if (mcqAnswers[index] !== null) {
                highlightMCQAnswer(mcqOptions, mcqFeedback, mcqExplanation, index, mcqAnswers[index].selected);
            }
        }

        function handleMCQAnswer(qIndex, selectedIndex) {
            if (mcqAnswers[qIndex] !== null) return;
            const isCorrect = selectedIndex === mcqData[qIndex].correctIndex;
            mcqAnswers[qIndex] = { selected: selectedIndex, correct: isCorrect };
            highlightMCQAnswer(mcqOptions, mcqFeedback, mcqExplanation, qIndex, selectedIndex);
        }
        
        function highlightMCQAnswer(optionsContainer, feedbackEl, explanationEl, qIndex, selectedIndex) {
            const qData = mcqData[qIndex];
            const buttons = optionsContainer.querySelectorAll('button');
            buttons.forEach((button, i) => {
                button.disabled = true;
                if (i === qData.correctIndex) {
                    button.style.backgroundColor = 'var(--correct-color)';
                    button.style.color = '#fff';
                    button.classList.add('correct');
                }
                if (i === selectedIndex && i !== qData.correctIndex) {
                    button.style.backgroundColor = 'var(--incorrect-color)';
                    button.style.color = '#fff';
                    button.classList.add('incorrect');
                }
            });
            feedbackEl.textContent = selectedIndex === qData.correctIndex ? "נכון!" : "לא נכון.";
            feedbackEl.className = `feedback ${selectedIndex === qData.correctIndex ? 'correct' : 'incorrect'}`;
            explanationEl.textContent = `הסבר: ${qData.explanation}`;
            explanationEl.classList.remove('hidden');
        }

        function displayAllMCQ() {
            if (!mcqData || mcqData.length === 0) return;
            mcqSingleView.classList.add('hidden');
            mcqAllQuestionsContainer.innerHTML = ''; 
            mcqData.forEach((qData, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question-container-all';
                questionDiv.innerHTML = `
                    <div class="question-text">${index + 1}. ${qData.question}</div>
                    <div class="options">
                        ${qData.options.map((option, i) => `<button data-qindex="${index}" data-oindex="${i}">${option}</button>`).join('')}
                    </div>
                    <div class="feedback hidden"></div>
                    <div class="explanation hidden"></div>
                `;
                mcqAllQuestionsContainer.appendChild(questionDiv);
                 const optionButtons = questionDiv.querySelectorAll('.options button');
                 optionButtons.forEach(button => {
                     button.onclick = () => {
                        const qIndex = parseInt(button.dataset.qindex);
                        const oIndex = parseInt(button.dataset.oindex);
                        if (mcqAnswers[qIndex] === null) {
                            const isCorrect = oIndex === mcqData[qIndex].correctIndex;
                            mcqAnswers[qIndex] = { selected: oIndex, correct: isCorrect };
                        }
                        const optionsDiv = button.closest('.options');
                        const feedbackDiv = questionDiv.querySelector('.feedback');
                        const explanationDiv = questionDiv.querySelector('.explanation');
                        highlightMCQAnswer(optionsDiv, feedbackDiv, explanationDiv, qIndex, mcqAnswers[qIndex].selected);
                     };
                 });
                 if (mcqAnswers[index] !== null) {
                    const optionsDiv = questionDiv.querySelector('.options');
                    const feedbackDiv = questionDiv.querySelector('.feedback');
                    const explanationDiv = questionDiv.querySelector('.explanation');
                    highlightMCQAnswer(optionsDiv, feedbackDiv, explanationDiv, index, mcqAnswers[index].selected);
                 }
            });
            mcqAllQuestionsContainer.classList.remove('hidden');
        }

        function displayTFQuestion(index) {
            if (!tfData || tfData.length === 0) return;
            const qData = tfData[index];
            tfQuestion.textContent = qData.question;
            tfFeedback.classList.add('hidden');
            tfExplanation.classList.add('hidden');
             const buttons = tfOptionsContainer.querySelectorAll('button');
             buttons.forEach(button => {
                 button.disabled = false;
                 button.style.backgroundColor = '';
                 button.style.color = '';
                 button.classList.remove('correct', 'incorrect');
                 button.onclick = () => handleTFAnswer(index, button.dataset.answer === 'true');
             });
            tfCounter.textContent = `שאלה ${index + 1} / ${tfData.length}`;
            prevTFBtn.disabled = index === 0;
            nextTFBtn.disabled = index === tfData.length - 1;
            if (tfAnswers[index] !== null) {
                highlightTFAnswer(tfOptionsContainer, tfFeedback, tfExplanation, index, tfAnswers[index].selected);
            }
        }
        
        function handleTFAnswer(qIndex, selectedAnswer) {
            if (tfAnswers[qIndex] !== null) return;
            const isCorrect = selectedAnswer === tfData[qIndex].answer;
            tfAnswers[qIndex] = { selected: selectedAnswer, correct: isCorrect };
            highlightTFAnswer(tfOptionsContainer, tfFeedback, tfExplanation, qIndex, selectedAnswer);
        }
        
        function highlightTFAnswer(optionsContainer, feedbackEl, explanationEl, qIndex, selectedAnswer) {
             const qData = tfData[qIndex];
             const buttons = optionsContainer.querySelectorAll('button');
             buttons.forEach(button => {
                 const buttonAnswer = button.dataset.answer === 'true';
                 button.disabled = true;
                 if (buttonAnswer === qData.answer) {
                     button.style.backgroundColor = 'var(--correct-color)';
                     button.style.color = '#fff';
                     button.classList.add('correct');
                 }
                 if (buttonAnswer === selectedAnswer && buttonAnswer !== qData.answer) {
                     button.style.backgroundColor = 'var(--incorrect-color)';
                     button.style.color = '#fff';
                     button.classList.add('incorrect');
                 }
             });
             feedbackEl.textContent = selectedAnswer === qData.answer ? "נכון!" : "לא נכון.";
             feedbackEl.className = `feedback ${selectedAnswer === qData.answer ? 'correct' : 'incorrect'}`;
             explanationEl.textContent = `הסבר: ${qData.explanation}`;
             explanationEl.classList.remove('hidden');
        }
        
        function displayAllTF() {
             if (!tfData || tfData.length === 0) return;
             tfSingleView.classList.add('hidden');
             tfAllQuestionsContainer.innerHTML = '';
             tfData.forEach((qData, index) => {
                 const questionDiv = document.createElement('div');
                 questionDiv.className = 'question-container-all';
                 questionDiv.innerHTML = `
                     <div class="question-text">${index + 1}. ${qData.question}</div>
                     <div class="tf-options">
                         <button data-qindex="${index}" data-answer="true">נכון</button>
                         <button data-qindex="${index}" data-answer="false">לא נכון</button>
                     </div>
                     <div class="feedback hidden"></div>
                     <div class="explanation hidden"></div>
                 `;
                 tfAllQuestionsContainer.appendChild(questionDiv);
                 const optionButtons = questionDiv.querySelectorAll('.tf-options button');
                 optionButtons.forEach(button => {
                     button.onclick = () => {
                         const qIndex = parseInt(button.dataset.qindex);
                         const selectedAnswer = button.dataset.answer === 'true';
                         if (tfAnswers[qIndex] === null) {
                             const isCorrect = selectedAnswer === tfData[qIndex].answer;
                             tfAnswers[qIndex] = { selected: selectedAnswer, correct: isCorrect };
                         }
                         const optionsDiv = button.closest('.tf-options');
                         const feedbackDiv = questionDiv.querySelector('.feedback');
                         const explanationDiv = questionDiv.querySelector('.explanation');
                         highlightTFAnswer(optionsDiv, feedbackDiv, explanationDiv, qIndex, tfAnswers[qIndex].selected);
                     };
                 });
                 if (tfAnswers[index] !== null) {
                    const optionsDiv = questionDiv.querySelector('.tf-options');
                    const feedbackDiv = questionDiv.querySelector('.feedback');
                    const explanationDiv = questionDiv.querySelector('.explanation');
                    highlightTFAnswer(optionsDiv, feedbackDiv, explanationDiv, index, tfAnswers[index].selected);
                 }
             });
             tfAllQuestionsContainer.classList.remove('hidden');
        }

        function initialize() {
            if (flashcardData.length > 0) displayCard(currentCardIndex);
            if (mcqData.length > 0) displayMCQuestion(currentMCQIndex);
            if (tfData.length > 0) displayTFQuestion(currentTFIndex);
            flashcardContent.addEventListener('click', flipCard);
            prevCardBtn.addEventListener('click', () => { if (currentCardIndex > 0) { currentCardIndex--; displayCard(currentCardIndex); } });
            nextCardBtn.addEventListener('click', () => { if (currentCardIndex < flashcardData.length - 1) { currentCardIndex++; displayCard(currentCardIndex); } });
            prevMCQBtn.addEventListener('click', () => { if (currentMCQIndex > 0) { currentMCQIndex--; displayMCQuestion(currentMCQIndex); } });
            nextMCQBtn.addEventListener('click', () => { if (currentMCQIndex < mcqData.length - 1) { currentMCQIndex++; displayMCQuestion(currentMCQIndex); } });
            viewAllMCQBtn.addEventListener('click', displayAllMCQ);
            prevTFBtn.addEventListener('click', () => { if (currentTFIndex > 0) { currentTFIndex--; displayTFQuestion(currentTFIndex); } });
            nextTFBtn.addEventListener('click', () => { if (currentTFIndex < tfData.length - 1) { currentTFIndex++; displayTFQuestion(currentTFIndex); } });
            viewAllTFBtn.addEventListener('click', displayAllTF);
        }
        
        initialize();
    });
    </script>
</body>
</html>
