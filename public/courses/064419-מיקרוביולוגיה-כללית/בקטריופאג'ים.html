<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Study Tool</title>
    <style>
        /* --- Root Variables for Consistent Theming --- */
        :root {
            --primary-bg: #333333;
            --secondary-bg: #666666;
            --accent-color: #3D90D7;
            --text-color: #E0E0E0;
            --correct-color: #4CAF50;
            --incorrect-color: #F44336;
            --card-bg: #5a5a5a;
        }

        /* --- Global Styles --- */
        body {
            background-color: var(--primary-bg);
            color: var(--text-color);
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 90%; /* As per prompt */
            margin: 20px auto;
            padding: 20px;
            background-color: var(--secondary-bg);
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        h1, h2 {
            color: var(--accent-color);
            text-align: center;
            border-bottom: 1px solid var(--accent-color);
            padding-bottom: 10px;
        }

        .section {
            background-color: var(--primary-bg);
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 8px;
        }

        /* --- Study Cards Styling (Fade Animation) --- */
        .flashcard-container {
            height: 250px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #flashcard-content {
            width: 100%;
            height: 100%;
            background-color: var(--card-bg);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            transition: opacity 0.3s ease-in-out; /* Fade transition */
        }
        
        .flashcard-front-style {
             font-size: 1.5em;
             font-weight: bold;
        }
        
        .flashcard-back-style {
             font-size: 1.1em;
        }

        /* --- Questions Styling (MCQ & T/F) --- */
         .question-container-single, .question-container-all {
            margin-bottom: 15px;
            padding: 15px;
            border: 1px solid var(--secondary-bg);
            border-radius: 5px;
         }

        .question-text {
            font-weight: bold;
            margin-bottom: 15px;
        }

        .options button, .tf-options button {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-align: right;
            transition: background-color 0.3s;
        }

        .options button:hover:not(:disabled), .tf-options button:hover:not(:disabled) {
            background-color: #357ab8;
        }

        .options button:disabled, .tf-options button:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
        
        /* Specific styling to override disabled opacity for correct/incorrect answers */
        .options button.correct, .tf-options button.correct { opacity: 1; }
        .options button.incorrect, .tf-options button.incorrect { opacity: 1; }


        .feedback {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
        }

        .feedback.correct {
            background-color: var(--correct-color);
            color: #fff;
        }

        .feedback.incorrect {
            background-color: var(--incorrect-color);
            color: #fff;
        }

        .explanation {
            margin-top: 10px;
            font-style: italic;
            font-size: 0.9em;
            padding: 8px;
            background-color: var(--secondary-bg);
            border-radius: 4px;
        }

        /* --- Navigation & Utility Styling --- */
        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            margin-bottom: 10px;
        }

        .nav-button, .view-all-button {
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
        }

        .nav-button:disabled {
             opacity: 0.5;
             cursor: not-allowed;
        }

        .counter {
            font-size: 0.9em;
        }

        .view-all-container {
            text-align: center;
            margin-top: 15px;
            margin-bottom: 15px;
        }

        .hidden {
            display: none;
        }

        #mcq-all-questions .question-container-all,
        #tf-all-questions .question-container-all {
            margin-bottom: 20px;
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>וירוסים</h1>

        <!-- Study Cards Section -->
        <div class="section">
            <h2>כרטיסי לימוד</h2>
            <div class="flashcard-container">
                <div id="flashcard-content"></div>
            </div>
            <div class="navigation">
                <button class="nav-button" id="prev-card">הקודם</button>
                <span class="counter" id="card-counter"></span>
                <button class="nav-button" id="next-card">הבא</button>
            </div>
        </div>

        <!-- Multiple Choice Questions Section -->
        <div class="section">
            <h2>שאלות רב-ברירה (אמריקאיות)</h2>
            <div id="mcq-single-view">
                <div class="question-container-single" id="mcq-container">
                    <div class="question-text" id="mcq-question"></div>
                    <div class="options" id="mcq-options"></div>
                    <div class="feedback hidden" id="mcq-feedback"></div>
                    <div class="explanation hidden" id="mcq-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-mcq">הקודם</button>
                    <span class="counter" id="mcq-counter"></span>
                    <button class="nav-button" id="next-mcq">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-mcq">הצג את כל השאלות</button>
                 </div>
            </div>
            <div id="mcq-all-questions" class="hidden">
                <!-- All MCQs will be dynamically inserted here -->
            </div>
        </div>

        <!-- True/False Questions Section -->
        <div class="section">
            <h2>שאלות נכון/לא נכון</h2>
             <div id="tf-single-view">
                <div class="question-container-single" id="tf-container">
                    <div class="question-text" id="tf-question"></div>
                    <div class="tf-options" id="tf-options">
                        <button data-answer="true">נכון</button>
                        <button data-answer="false">לא נכון</button>
                    </div>
                    <div class="feedback hidden" id="tf-feedback"></div>
                    <div class="explanation hidden" id="tf-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-tf">הקודם</button>
                    <span class="counter" id="tf-counter"></span>
                    <button class="nav-button" id="next-tf">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-tf">הצג את כל השאלות</button>
                 </div>
            </div>
             <div id="tf-all-questions" class="hidden">
                 <!-- All T/F Questions will be dynamically inserted here -->
             </div>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        
        const flashcardData = [
            { term: "וירוס", definition: "אלמנט גנטי זעיר התלוי בתא פונדקאי להכפלתו, חסר יכולת מטבולית עצמאית." },
            { term: "ויריון", definition: "הצורה החוץ-תאית והמדבקת של הוירוס, הכוללת חומר גנטי עטוף בקופסית חלבונית." },
            { term: "קופסית (Capsid)", definition: "מעטפת חלבונית המקיפה את החומר הגנטי של הוירוס." },
            { term: "בקטריופאז׳", definition: "וירוס שמדביק חיידקים." },
            { term: "מחזור ליטי", definition: "מסלול הכפלה ויראלי הגורם למות התא הפונדקאי ושחרור צאצאים ויראליים." },
            { term: "מחזור ליזוגני", definition: "מסלול הכפלה ויראלי בו הגנום של הוירוס משתלב בגנום הפונדקאי ומוכפל יחד איתו." },
            { term: "פרופאז׳", definition: "הגנום של בקטריופאז׳ שהשתלב בכרומוזום של החיידק הפונדקאי." },
            { term: "מוקד (Plaque)", definition: "אזור צלול על מרבד חיידקים, הנוצר כתוצאה מהרס תאים על ידי וירוס." },
            { term: "יבול הפרץ (Burst Size)", definition: "מספר הויריונים החדשים המשתחררים מתא פונדקאי בודד בסוף המחזור הליטי." },
            { term: "תקופה לטנטית", definition: "הזמן מרגע ההדבקה ועד להופעת הויריונים החדשים מחוץ לתא. כוללת את האקליפס וההבשלה." },
            { term: "תקופת ליקוי חמה (Eclipse)", definition: "השלב המוקדם לאחר ההדבקה בו לא ניתן לאתר ויריונים מדבקים כלל, כי הם פורקו." },
            { term: "אנזימי רסטריקציה", definition: "מנגנון הגנה חיידקי; אנזימים החותכים DNA זר, כמו DNA ויראלי, באתרים ספציפיים." },
            { term: "רטרווירוס", definition: "וירוס RNA המשתמש באנזים רוורס טרנסקריפטאז כדי ליצור עותק DNA מהגנום שלו." },
            { term: "מעטפת (Envelope)", definition: "שכבה ליפידית חיצונית לקופסית, המצויה בחלק מהוירוסים ומקורה בממברנת התא הפונדקאי." },
            { term: "ספיחה (Adsorption)", definition: "השלב הראשון בהדבקה ויראלית, בו הוירוס נקשר באופן ספציפי לרצפטור על פני התא הפונדקאי." },
            { term: "חלבונים מוקדמים (Early proteins)", definition: "חלבונים ויראליים, לרוב אנזימים, המסונתזים בתחילת ההדבקה ונחוצים לשכפול הגנום הנגיפי." },
            { term: "חלבונים מאוחרים (Late proteins)", definition: "חלבונים ויראליים, לרוב מבניים, המסונתזים בשלב מאוחר של ההדבקה ומרכיבים את הויריונים החדשים." }
        ];

        const mcqData = [
            {
                question: "מהו ההבדל המהותי ביותר בין תקופת האקליפס (eclipse) לתקופה הלטנטית בעקומת גידול חד-שלבית של פאז׳?",
                options: [
                    "התקופה הלטנטית כוללת את שלב הרכבת הויריונים הבשלים בתוך התא, בעוד שהאקליפס מסתיים לפני ההרכבה.",
                    "תקופת האקליפס ארוכה יותר מהתקופה הלטנטית.",
                    "בתקופה הלטנטית הוירוס נמצא במצב ליזוגני, ובתקופת האקליפס במצב ליטי.",
                    "בתקופת האקליפס נוצרים חלבונים מוקדמים, ובתקופה הלטנטית נוצרים חלבונים מאוחרים."
                ],
                correctIndex: 0,
                explanation: "התקופה הלטנטית כוללת את כל הזמן מההדבקה ועד לשחרור. היא מורכבת מתקופת האקליפס (בה הוירוס מפורק ולא ניתן לזיהוי) ומתקופת ההבשלה (בה ויריונים שלמים מורכבים בתוך התא אך טרם שוחררו)."
            },
            {
                question: "וירוס מסוג ssRNA שלילי (Class V) מדביק תא. מהי הפעולה הראשונה ההכרחית שהוירוס חייב לבצע כדי להתחיל בייצור חלבונים?",
                options: [
                    "תרגום ישיר של הגנום שלו לריבוזומים.",
                    "שכפול הגנום שלו לעותק ssRNA שלילי נוסף.",
                    "יצירת עותק DNA דו-גדילי מהגנום שלו.",
                    "יצירת גדיל RNA משלים (ssRNA חיובי) באמצעות פולימראז שהביא איתו."
                ],
                correctIndex: 3,
                explanation: "גנום ssRNA שלילי אינו יכול להיות מתורגם ישירות. הוירוס חייב להשתמש ב-RNA-dependent RNA polymerase (שהוא מביא איתו בויריון) כדי ליצור גדיל mRNA חיובי, שיוכל להיות מתורגם לחלבון."
            },
            {
                question: "במהלך ניסוי, חיידקי E. coli הודבקו בפאז׳ T4. לאחר זמן קצר, הוסיפו לתרבית אנזים DNAse שמפרק DNA חופשי בתמיסה. מה תהיה ההשפעה על המשך תהליך ההדבקה?",
                options: [
                    "ההדבקה תיעצר לחלוטין כי ה-DNA הפאזי יפורק.",
                    "לא תהיה כל השפעה, כי ה-DNA הפאזי כבר הוזרק לתוך החיידקים.",
                    "רק יצירת החלבונים המאוחרים תיפגע.",
                    "ה-DNAse יחדור לתאים ויפרק את ה-DNA הפאזי שבפנים."
                ],
                correctIndex: 1,
                explanation: "בשלב הפלישה (penetration), פאז׳ T4 מזריק את ה-DNA שלו ישירות לציטופלזמת החיידק, בעוד הקופסית נשארת בחוץ. DNAse חיצוני לא יכול לחדור לתא ולכן לא ישפיע על ה-DNA שכבר נמצא בפנים."
            },
            {
                question: "מהי המשמעות של מציאת פלאקים עכורים (turbid plaques) על מרבד חיידקים לאחר הדבקה בפאז׳?",
                options: [
                    "הפאז׳ הוא פאז׳ ליטי אגרסיבי במיוחד.",
                    "הפאז׳ הוא ככל הנראה פאז׳ ממוזג (temperate) שיכול להיכנס למסלול ליזוגני.",
                    "יבול הפרץ (burst size) של הפאז׳ נמוך מאוד.",
                    "התרחשה טעות בניסוי והחיידקים לא גדלו כראוי."
                ],
                correctIndex: 1,
                explanation: "פלאק עכור מעיד על כך שבתוך אזור הליזיס ישנם חיידקים ששרדו וגדלים. זה אופייני לפאז׳ים ממוזגים, שחלק מהם נכנסו למסלול ליזוגני והפכו את החיידקים לעמידים להדבקה נוספת."
            },
            {
                question: "איזו מהתכונות הבאות מאפיינת וירוסים בעלי מעטפת (enveloped viruses) אך אינה מאפיינת וירוסים ערומים (naked viruses)?",
                options: [
                    "הם יכולים להשתחרר מהתא הפונדקאי באמצעות הנצה (budding) מבלי להרוג אותו מיד.",
                    "הם עמידים יותר לתנאי סביבה קשים כמו יובש וחומרי חיטוי.",
                    "הקופסית שלהם מורכבת מקפסומרים.",
                    "הם מכילים חומצת גרעין מסוג RNA בלבד."
                ],
                correctIndex: 0,
                explanation: "וירוסים בעלי מעטפת רוכשים אותה ממברנת התא הפונדקאי בתהליך הנצה. תהליך זה לא בהכרח גורם לליזיס מיידי של התא. וירוסים ערומים, לעומת זאת, משתחררים לרוב על ידי פיצוץ התא."
            },
            {
                question: "חיידק עבר מוטציה שגרמה לאובדן יכולתו לייצר את מולקולות ה-LPS (ליפופוליסכריד) בממברנה החיצונית שלו. לאיזה מהפאז׳ים הבאים הוא צפוי לפתח עמידות?",
                options: [
                    "פאז׳ M13",
                    "פאז׳ T4",
                    "פאז׳ Lambda",
                    "רטרווירוס"
                ],
                correctIndex: 1,
                explanation: "פאז׳ T4 משתמש במולקולות LPS על פני החיידק כרצפטור ראשוני לספיחה. ללא LPS, הפאז׳ לא יוכל להיקשר לתא ולהדביק אותו. פאז׳ים אחרים משתמשים ברצפטורים שונים."
            },
            {
                question: "מה תפקידם העיקרי של 'חלבונים מוקדמים' (early proteins) במחזור החיים של בקטריופאז׳?",
                options: [
                    "לבנות את הקופסית והזנב של הויריונים החדשים.",
                    "לשבש את מנגנוני ההגנה של הפונדקאי ולהשתלט על מנגנון שכפול ה-DNA שלו.",
                    "לגרום לליזיס של דופן התא הפונדקאי לשחרור הצאצאים.",
                    "להשתלב בגנום הפונדקאי במצב ליזוגני."
                ],
                correctIndex: 1,
                explanation: "חלבונים מוקדמים הם לרוב אנזימים וחלבוני רגולציה. תפקידם הוא להכין את התא להכפלה ויראלית, למשל על ידי פירוק ה-DNA של המארח, סינתזת נוקלאוטידים ויראליים, ושכפול הגנום הנגיפי."
            },
            {
                question: "מהו המנגנון המאפשר לפאז׳ים מסוימים להתגונן מפני אנזימי הרסטריקציה של החיידק הפונדקאי?",
                options: [
                    "הם מזריקים את ה-DNA שלהם כל כך מהר שהאנזימים לא מספיקים לפעול.",
                    "הם מייצרים חלבונים שמעכבים באופן ספציפי את אנזימי הרסטריקציה.",
                    "ה-DNA שלהם מכיל נוקלאוטידים שאינם ניתנים לזיהוי על ידי האנזימים.",
                    "כל התשובות נכונות."
                ],
                correctIndex: 3,
                explanation: "וירוסים פיתחו מגוון אסטרטגיות להתמודדות עם רסטריקציה, כולל מודיפיקציה של ה-DNA שלהם (כמו מתילציה או גליקוזילציה) כדי להסוות את אתרי החיתוך, וייצור חלבונים שמעכבים את פעילות אנזימי הרסטריקציה."
            },
            {
                question: "איזה סוג של חומר גנטי דורש מהוירוס להביא איתו אנזים פולימראז בתוך הויריון כדי להבטיח את תחילת ההכפלה?",
                options: [
                    "dsDNA",
                    "ssRNA (+)",
                    "ssRNA (-)",
                    "ssDNA"
                ],
                correctIndex: 2,
                explanation: "ssRNA(-) ווירוסי dsRNA חייבים להביא איתם RNA-dependent RNA polymerase, מכיוון שלתא הפונדקאי אין אנזים שיודע ליצור mRNA מ-RNA. וירוסי ssRNA(+) יכולים להשתמש ישירות בגנום שלהם כ-mRNA."
            },
            {
                question: "בניסוי פלאק, מה מייצגת יחידת PFU (Plaque Forming Unit)?",
                options: [
                    "מספר הויריונים הכולל בדגימה.",
                    "חלקיק ויראלי בודד שיש לו את היכולת ליזום הדבקה מוצלחת וליצור מוקד.",
                    "ריכוז החיידקים בתרבית.",
                    "קצב הליזיס של התאים."

            { question: "נוכחות של DNA דו-גדילי בציטופלזמה של תא יוקריוטי אינה מעוררת תגובה חיסונית.", answer: false, explanation: "בניגוד ל-dsRNA, נוכחות dsDNA בציטופלזמה (מחוץ לגרעין ולמיטוכונדריה) היא גם כן סימן לזיהום או נזק ומפעילה מסלולי הגנה תאיים." },
            { question: "וירוסים יכולים להדביק רק בעלי חיים וצמחים.", answer: false, explanation: "וירוסים מדביקים את כל צורות החיים הידועות, כולל חיידקים (בקטריופאז׳ים), ארכאונים, פטריות ופרוטיסטים." },
            { question: "סימטריה איקוסהדרלית מאפיינת וירוסים בצורת מוט.", answer: false, explanation: "סימטריה איקוסהדרלית יוצרת מבנה כדורי-לכאורה. וירוסים בצורת מוט מאופיינים בסימטריה סלילנית (helical)." },
            { question: "כל הפאז׳ים הם בעלי מבנה מורכב הכולל ראש, צווארון וזנב.", answer: false, explanation: "קיים מגוון רב של מורפולוגיות פאז׳ים. לדוגמה, ישנם פאז׳ים איקוסהדרליים קטנים ללא זנב, ופאז׳ים סיביים (filamentous) כמו M13." },
            { question: "מוטציה ברצפטור חיידקי תמיד תפגע ביכולת ההישרדות של החיידק.", answer: false, explanation: "לא בהכרח. לעיתים המוטציה יכולה להקנות עמידות לפאז׳ מבלי לפגוע באופן משמעותי בתפקוד החיידק, מה שנותן לו יתרון סלקטיבי בסביבה עם פאז׳ים." },
            { question: "המונח 'נוקלאוקפסיד' מתייחס למכלול של החומר הגנטי והקופסית שעוטפת אותו.", answer: true, explanation: "זהו בדיוק הפירוש של המונח: נוקלאו (חומצת גרעין) + קפסיד (מעטפת חלבונית)." },
            { question: "רק וירוסי DNA יכולים לעבור למצב ליזוגני.", answer: false, explanation: "גם וירוסי RNA מסוימים, כמו רטרווירוסים, יכולים להשתלב בגנום המארח (לאחר שהפכו ל-DNA) ולשהות במצב שקט דמוי-ליזוגניה." },
            { question: "וירוסים מכילים ריבוזומים משלהם לסינתזת חלבונים.", answer: false, explanation: "וירוסים חסרים ריבוזומים ותלויים לחלוטין בריבוזומים של התא הפונדקאי לצורך תרגום ה-mRNA שלהם לחלבון." },
            { question: "הגנום של וירוס יכול להיות גדול יותר מזה של חיידקים מסוימים.", answer: true, explanation: "אף על פי שרוב הוירוסים קטנים, ישנם 'וירוסי ענק' (כמו Pandoravirus) שהגנום שלהם גדול יותר מזה של חיידקים טפיליים מסוימים שעברו רדוקציה גנומית." },
            { question: "פאז׳ ממוזג (temperate phage) יכול לבחור בין המסלול הליטי למסלול הליזוגני.", answer: true, explanation: "זוהי ההגדרה של פאז׳ ממוזג. הבחירה בין המסלולים מושפעת לרוב מתנאי הסביבה וממצב התא הפונדקאי." },
            { question: "שעתוק של גנים ויראליים מתרחש תמיד בסדר אקראי.", answer: false, explanation: "ביטוי הגנים הנגיפיים הוא תהליך מבוקר ומתוזמן היטב. גנים מוקדמים (לשכפול) מתבטאים ראשונים, ואחריהם גנים מאוחרים (למבנה והרכבה)." },
            { question: "שיטת ה-Plaque assay יכולה לשמש רק לכימות של בקטריופאז׳ים.", answer: false, explanation: "ניתן להתאים את השיטה גם לכימות של וירוסים אנימליים, על ידי גידול תרבית רקמה של תאים אנימליים בצלחת ויצירת 'פלאקים' של תאים מתים או נגועים." },
            { question: "כל החלבונים בויריון המוגמר מקודדים על ידי הגנום הנגיפי.", answer: false, explanation: "וירוסים עם מעטפת 'גונבים' ליפידים וחלבונים ממברנת התא המארח. בנוסף, ישנם וירוסים שאורזים בתוכם גם חלבונים של המארח, כמו היסטונים." }
        ];


        // --- Global State Variables ---
        let currentCardIndex = 0;
        let isCardFront = true;
        let isCardAnimating = false;
        let currentMCQIndex = 0;
        let currentTFIndex = 0;
        let mcqAnswers = new Array(mcqData.length).fill(null);
        let tfAnswers = new Array(tfData.length).fill(null);

        // --- DOM Element References ---
        const flashcardContent = document.getElementById('flashcard-content');
        const cardCounter = document.getElementById('card-counter');
        const prevCardBtn = document.getElementById('prev-card');
        const nextCardBtn = document.getElementById('next-card');
        const mcqQuestion = document.getElementById('mcq-question');
        const mcqOptions = document.getElementById('mcq-options');
        const mcqFeedback = document.getElementById('mcq-feedback');
        const mcqExplanation = document.getElementById('mcq-explanation');
        const mcqCounter = document.getElementById('mcq-counter');
        const prevMCQBtn = document.getElementById('prev-mcq');
        const nextMCQBtn = document.getElementById('next-mcq');
        const viewAllMCQBtn = document.getElementById('view-all-mcq');
        const mcqSingleView = document.getElementById('mcq-single-view');
        const mcqAllQuestionsContainer = document.getElementById('mcq-all-questions');
        const tfQuestion = document.getElementById('tf-question');
        const tfOptionsContainer = document.getElementById('tf-options');
        const tfFeedback = document.getElementById('tf-feedback');
        const tfExplanation = document.getElementById('tf-explanation');
        const tfCounter = document.getElementById('tf-counter');
        const prevTFBtn = document.getElementById('prev-tf');
        const nextTFBtn = document.getElementById('next-tf');
        const viewAllTFBtn = document.getElementById('view-all-tf');
        const tfSingleView = document.getElementById('tf-single-view');
        const tfAllQuestionsContainer = document.getElementById('tf-all-questions');

        function displayCard(index) {
            if (!flashcardData || flashcardData.length === 0) return;
            const cardData = flashcardData[index];
            isCardFront = true;
            flashcardContent.style.opacity = '1';
            flashcardContent.textContent = cardData.term;
            flashcardContent.className = 'flashcard-front-style';
            cardCounter.textContent = `כרטיס ${index + 1} / ${flashcardData.length}`;
            prevCardBtn.disabled = index === 0;
            nextCardBtn.disabled = index === flashcardData.length - 1;
        }

        function flipCard() {
            if (isCardAnimating || !flashcardData || flashcardData.length === 0) return;
            isCardAnimating = true;
            flashcardContent.style.opacity = '0';
            setTimeout(() => {
                isCardFront = !isCardFront;
                const cardData = flashcardData[currentCardIndex];
                if (isCardFront) {
                    flashcardContent.textContent = cardData.term;
                    flashcardContent.className = 'flashcard-front-style';
                } else {
                    flashcardContent.textContent = cardData.definition;
                    flashcardContent.className = 'flashcard-back-style';
                }
                flashcardContent.style.opacity = '1';
                isCardAnimating = false;
            }, 300);
        }

        function displayMCQuestion(index) {
            if (!mcqData || mcqData.length === 0) return;
            const qData = mcqData[index];
            mcqQuestion.textContent = qData.question;
            mcqOptions.innerHTML = '';
            mcqFeedback.classList.add('hidden');
            mcqExplanation.classList.add('hidden');
            qData.options.forEach((option, i) => {
                const button = document.createElement('button');
                button.textContent = option;
                button.onclick = () => handleMCQAnswer(index, i);
                mcqOptions.appendChild(button);
            });
            mcqCounter.textContent = `שאלה ${index + 1} / ${mcqData.length}`;
            prevMCQBtn.disabled = index === 0;
            nextMCQBtn.disabled = index === mcqData.length - 1;
            if (mcqAnswers[index] !== null) {
                highlightMCQAnswer(mcqOptions, mcqFeedback, mcqExplanation, index, mcqAnswers[index].selected);
            }
        }

        function handleMCQAnswer(qIndex, selectedIndex) {
            if (mcqAnswers[qIndex] !== null) return;
            const isCorrect = selectedIndex === mcqData[qIndex].correctIndex;
            mcqAnswers[qIndex] = { selected: selectedIndex, correct: isCorrect };
            highlightMCQAnswer(mcqOptions, mcqFeedback, mcqExplanation, qIndex, selectedIndex);
        }
        
        function highlightMCQAnswer(optionsContainer, feedbackEl, explanationEl, qIndex, selectedIndex) {
            const qData = mcqData[qIndex];
            const buttons = optionsContainer.querySelectorAll('button');
            buttons.forEach((button, i) => {
                button.disabled = true;
                if (i === qData.correctIndex) {
                    button.style.backgroundColor = 'var(--correct-color)';
                    button.style.color = '#fff';
                    button.classList.add('correct');
                }
                if (i === selectedIndex && i !== qData.correctIndex) {
                    button.style.backgroundColor = 'var(--incorrect-color)';
                    button.style.color = '#fff';
                    button.classList.add('incorrect');
                }
            });
            feedbackEl.textContent = selectedIndex === qData.correctIndex ? "נכון!" : "לא נכון.";
            feedbackEl.className = `feedback ${selectedIndex === qData.correctIndex ? 'correct' : 'incorrect'}`;
            explanationEl.textContent = `הסבר: ${qData.explanation}`;
            explanationEl.classList.remove('hidden');
        }

        function displayAllMCQ() {
            if (!mcqData || mcqData.length === 0) return;
            mcqSingleView.classList.add('hidden');
            mcqAllQuestionsContainer.innerHTML = ''; 
            mcqData.forEach((qData, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question-container-all';
                questionDiv.innerHTML = `
                    <div class="question-text">${index + 1}. ${qData.question}</div>
                    <div class="options">
                        ${qData.options.map((option, i) => `<button data-qindex="${index}" data-oindex="${i}">${option}</button>`).join('')}
                    </div>
                    <div class="feedback hidden"></div>
                    <div class="explanation hidden"></div>
                `;
                mcqAllQuestionsContainer.appendChild(questionDiv);
                 const optionButtons = questionDiv.querySelectorAll('.options button');
                 optionButtons.forEach(button => {
                     button.onclick = () => {
                        const qIndex = parseInt(button.dataset.qindex);
                        const oIndex = parseInt(button.dataset.oindex);
                        if (mcqAnswers[qIndex] === null) {
                            const isCorrect = oIndex === mcqData[qIndex].correctIndex;
                            mcqAnswers[qIndex] = { selected: oIndex, correct: isCorrect };
                        }
                        const optionsDiv = button.closest('.options');
                        const feedbackDiv = questionDiv.querySelector('.feedback');
                        const explanationDiv = questionDiv.querySelector('.explanation');
                        highlightMCQAnswer(optionsDiv, feedbackDiv, explanationDiv, qIndex, mcqAnswers[qIndex].selected);
                     };
                 });
                 if (mcqAnswers[index] !== null) {
                    const optionsDiv = questionDiv.querySelector('.options');
                    const feedbackDiv = questionDiv.querySelector('.feedback');
                    const explanationDiv = questionDiv.querySelector('.explanation');
                    highlightMCQAnswer(optionsDiv, feedbackDiv, explanationDiv, index, mcqAnswers[index].selected);
                 }
            });
            mcqAllQuestionsContainer.classList.remove('hidden');
        }

        function displayTFQuestion(index) {
            if (!tfData || tfData.length === 0) return;
            const qData = tfData[index];
            tfQuestion.textContent = qData.question;
            tfFeedback.classList.add('hidden');
            tfExplanation.classList.add('hidden');
             const buttons = tfOptionsContainer.querySelectorAll('button');
             buttons.forEach(button => {
                 button.disabled = false;
                 button.style.backgroundColor = '';
                 button.style.color = '';
                 button.classList.remove('correct', 'incorrect');
                 button.onclick = () => handleTFAnswer(index, button.dataset.answer === 'true');
             });
            tfCounter.textContent = `שאלה ${index + 1} / ${tfData.length}`;
            prevTFBtn.disabled = index === 0;
            nextTFBtn.disabled = index === tfData.length - 1;
            if (tfAnswers[index] !== null) {
                highlightTFAnswer(tfOptionsContainer, tfFeedback, tfExplanation, index, tfAnswers[index].selected);
            }
        }
        
        function handleTFAnswer(qIndex, selectedAnswer) {
            if (tfAnswers[qIndex] !== null) return;
            const isCorrect = selectedAnswer === tfData[qIndex].answer;
            tfAnswers[qIndex] = { selected: selectedAnswer, correct: isCorrect };
            highlightTFAnswer(tfOptionsContainer, tfFeedback, tfExplanation, qIndex, selectedAnswer);
        }
        
        function highlightTFAnswer(optionsContainer, feedbackEl, explanationEl, qIndex, selectedAnswer) {
             const qData = tfData[qIndex];
             const buttons = optionsContainer.querySelectorAll('button');
             buttons.forEach(button => {
                 const buttonAnswer = button.dataset.answer === 'true';
                 button.disabled = true;
                 if (buttonAnswer === qData.answer) {
                     button.style.backgroundColor = 'var(--correct-color)';
                     button.style.color = '#fff';
                     button.classList.add('correct');
                 }
                 if (buttonAnswer === selectedAnswer && buttonAnswer !== qData.answer) {
                     button.style.backgroundColor = 'var(--incorrect-color)';
                     button.style.color = '#fff';
                     button.classList.add('incorrect');
                 }
             });
             feedbackEl.textContent = selectedAnswer === qData.answer ? "נכון!" : "לא נכון.";
             feedbackEl.className = `feedback ${selectedAnswer === qData.answer ? 'correct' : 'incorrect'}`;
             explanationEl.textContent = `הסבר: ${qData.explanation}`;
             explanationEl.classList.remove('hidden');
        }
        
        function displayAllTF() {
             if (!tfData || tfData.length === 0) return;
             tfSingleView.classList.add('hidden');
             tfAllQuestionsContainer.innerHTML = '';
             tfData.forEach((qData, index) => {
                 const questionDiv = document.createElement('div');
                 questionDiv.className = 'question-container-all';
                 questionDiv.innerHTML = `
                     <div class="question-text">${index + 1}. ${qData.question}</div>
                     <div class="tf-options">
                         <button data-qindex="${index}" data-answer="true">נכון</button>
                         <button data-qindex="${index}" data-answer="false">לא נכון</button>
                     </div>
                     <div class="feedback hidden"></div>
                     <div class="explanation hidden"></div>
                 `;
                 tfAllQuestionsContainer.appendChild(questionDiv);
                 const optionButtons = questionDiv.querySelectorAll('.tf-options button');
                 optionButtons.forEach(button => {
                     button.onclick = () => {
                         const qIndex = parseInt(button.dataset.qindex);
                         const selectedAnswer = button.dataset.answer === 'true';
                         if (tfAnswers[qIndex] === null) {
                             const isCorrect = selectedAnswer === tfData[qIndex].answer;
                             tfAnswers[qIndex] = { selected: selectedAnswer, correct: isCorrect };
                         }
                         const optionsDiv = button.closest('.tf-options');
                         const feedbackDiv = questionDiv.querySelector('.feedback');
                         const explanationDiv = questionDiv.querySelector('.explanation');
                         highlightTFAnswer(optionsDiv, feedbackDiv, explanationDiv, qIndex, tfAnswers[qIndex].selected);
                     };
                 });
                 if (tfAnswers[index] !== null) {
                    const optionsDiv = questionDiv.querySelector('.tf-options');
                    const feedbackDiv = questionDiv.querySelector('.feedback');
                    const explanationDiv = questionDiv.querySelector('.explanation');
                    highlightTFAnswer(optionsDiv, feedbackDiv, explanationDiv, index, tfAnswers[index].selected);
                 }
             });
             tfAllQuestionsContainer.classList.remove('hidden');
        }

        function initialize() {
            if (flashcardData.length > 0) displayCard(currentCardIndex);
            if (mcqData.length > 0) displayMCQuestion(currentMCQIndex);
            if (tfData.length > 0) displayTFQuestion(currentTFIndex);
            flashcardContent.addEventListener('click', flipCard);
            prevCardBtn.addEventListener('click', () => { if (currentCardIndex > 0) { currentCardIndex--; displayCard(currentCardIndex); } });
            nextCardBtn.addEventListener('click', () => { if (currentCardIndex < flashcardData.length - 1) { currentCardIndex++; displayCard(currentCardIndex); } });
            prevMCQBtn.addEventListener('click', () => { if (currentMCQIndex > 0) { currentMCQIndex--; displayMCQuestion(currentMCQIndex); } });
            nextMCQBtn.addEventListener('click', () => { if (currentMCQIndex < mcqData.length - 1) { currentMCQIndex++; displayMCQuestion(currentMCQIndex); } });
            viewAllMCQBtn.addEventListener('click', displayAllMCQ);
            prevTFBtn.addEventListener('click', () => { if (currentTFIndex > 0) { currentTFIndex--; displayTFQuestion(currentTFIndex); } });
            nextTFBtn.addEventListener('click', () => { if (currentTFIndex < tfData.length - 1) { currentTFIndex++; displayTFQuestion(currentTFIndex); } });
            viewAllTFBtn.addEventListener('click', displayAllTF);
        }
        
        initialize();
    });
    </script>
</body>
</html>
