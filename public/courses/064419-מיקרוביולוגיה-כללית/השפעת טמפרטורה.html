<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Study Tool</title>
    <style>
        /* --- Root Variables for Consistent Theming --- */
        :root {
            --primary-bg: #333333;
            --secondary-bg: #666666;
            --accent-color: #3D90D7;
            --text-color: #E0E0E0;
            --correct-color: #4CAF50;
            --incorrect-color: #F44336;
            --card-bg: #5a5a5a;
        }

        /* --- Global Styles --- */
        body {
            background-color: var(--primary-bg);
            color: var(--text-color);
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 90%; /* As per prompt */
            margin: 20px auto;
            padding: 20px;
            background-color: var(--secondary-bg);
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        h1, h2 {
            color: var(--accent-color);
            text-align: center;
            border-bottom: 1px solid var(--accent-color);
            padding-bottom: 10px;
        }

        .section {
            background-color: var(--primary-bg);
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 8px;
        }

        /* --- Study Cards Styling (Fade Animation) --- */
        .flashcard-container {
            height: 250px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #flashcard-content {
            width: 100%;
            height: 100%;
            background-color: var(--card-bg);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            transition: opacity 0.3s ease-in-out; /* Fade transition */
        }
        
        .flashcard-front-style {
             font-size: 1.5em;
             font-weight: bold;
        }
        
        .flashcard-back-style {
             font-size: 1.1em;
        }

        /* --- Questions Styling (MCQ & T/F) --- */
         .question-container-single, .question-container-all {
            margin-bottom: 15px;
            padding: 15px;
            border: 1px solid var(--secondary-bg);
            border-radius: 5px;
         }

        .question-text {
            font-weight: bold;
            margin-bottom: 15px;
        }

        .options button, .tf-options button {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-align: right;
            transition: background-color 0.3s;
        }

        .options button:hover:not(:disabled), .tf-options button:hover:not(:disabled) {
            background-color: #357ab8;
        }

        .options button:disabled, .tf-options button:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
        
        /* Specific styling to override disabled opacity for correct/incorrect answers */
        .options button.correct, .tf-options button.correct { opacity: 1; }
        .options button.incorrect, .tf-options button.incorrect { opacity: 1; }


        .feedback {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
        }

        .feedback.correct {
            background-color: var(--correct-color);
            color: #fff;
        }

        .feedback.incorrect {
            background-color: var(--incorrect-color);
            color: #fff;
        }

        .explanation {
            margin-top: 10px;
            font-style: italic;
            font-size: 0.9em;
            padding: 8px;
            background-color: var(--secondary-bg);
            border-radius: 4px;
        }

        /* --- Navigation & Utility Styling --- */
        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            margin-bottom: 10px;
        }

        .nav-button, .view-all-button {
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
        }

        .nav-button:disabled {
             opacity: 0.5;
             cursor: not-allowed;
        }

        .counter {
            font-size: 0.9em;
        }

        .view-all-container {
            text-align: center;
            margin-top: 15px;
            margin-bottom: 15px;
        }

        .hidden {
            display: none;
        }

        #mcq-all-questions .question-container-all,
        #tf-all-questions .question-container-all {
            margin-bottom: 20px;
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>השפעת הטמפרטורה על גידול והישרדות מיקרואורגניזמים</h1>

        <!-- Study Cards Section -->
        <div class="section">
            <h2>כרטיסי לימוד</h2>
            <div class="flashcard-container">
                <div id="flashcard-content"></div>
            </div>
            <div class="navigation">
                <button class="nav-button" id="prev-card">הקודם</button>
                <span class="counter" id="card-counter"></span>
                <button class="nav-button" id="next-card">הבא</button>
            </div>
        </div>

        <!-- Multiple Choice Questions Section -->
        <div class="section">
            <h2>שאלות רב-ברירה (אמריקאיות)</h2>
            <div id="mcq-single-view">
                <div class="question-container-single" id="mcq-container">
                    <div class="question-text" id="mcq-question"></div>
                    <div class="options" id="mcq-options"></div>
                    <div class="feedback hidden" id="mcq-feedback"></div>
                    <div class="explanation hidden" id="mcq-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-mcq">הקודם</button>
                    <span class="counter" id="mcq-counter"></span>
                    <button class="nav-button" id="next-mcq">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-mcq">הצג את כל השאלות</button>
                 </div>
            </div>
            <div id="mcq-all-questions" class="hidden">
                <!-- All MCQs will be dynamically inserted here -->
            </div>
        </div>

        <!-- True/False Questions Section -->
        <div class="section">
            <h2>שאלות נכון/לא נכון</h2>
             <div id="tf-single-view">
                <div class="question-container-single" id="tf-container">
                    <div class="question-text" id="tf-question"></div>
                    <div class="tf-options" id="tf-options">
                        <button data-answer="true">נכון</button>
                        <button data-answer="false">לא נכון</button>
                    </div>
                    <div class="feedback hidden" id="tf-feedback"></div>
                    <div class="explanation hidden" id="tf-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-tf">הקודם</button>
                    <span class="counter" id="tf-counter"></span>
                    <button class="nav-button" id="next-tf">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-tf">הצג את כל השאלות</button>
                 </div>
            </div>
             <div id="tf-all-questions" class="hidden">
                 <!-- All T/F Questions will be dynamically inserted here -->
             </div>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        
        const flashcardData = [
            { term: "פסיכרופיל (Psychrophile)", definition: "אורגניזם אוהב קור, עם טמפרטורת גידול אופטימלית מתחת ל-15 מעלות צלזיוס." },
            { term: "מזופיל (Mesophile)", definition: "אורגניזם הגדל בטמפרטורות מתונות, עם טמפרטורה אופטימלית בתחום 20-40 מעלות צלזיוס. רוב הפתוגנים לאדם הם מזופילים." },
            { term: "תרמופיל (Thermophile)", definition: "אורגניזם אוהב חום, עם טמפרטורת גידול אופטימלית מעל 45 מעלות צלזיוס." },
            { term: "היפרתרמופיל (Hyperthermophile)", definition: "אורגניזם אוהב חום קיצוני, עם טמפרטורה אופטימלית מעל 80 מעלות צלזיוס. לעיתים קרובות ארכיאות." },
            { term: "פסיכרוטולרנט (Psychrotolerant)", definition: "אורגניזם מזופילי שיכול לשרוד ולגדול בטמפרטורות נמוכות (סביב 0 מעלות צלזיוס), אך טמפרטורת הגידול האופטימלית שלו גבוהה יותר." },
            { term: "טמפרטורות קרדינליות", definition: "שלוש הטמפרטורות המגדירות את טווח הגידול של אורגניזם: מינימום, אופטימום ומקסימום." },
            { term: "D-value (זמן הפחתה עשרוני)", definition: "הזמן הדרוש, בטמפרטורה נתונה, כדי להרוג 90% מאוכלוסיית המיקרואורגניזמים (הפחתה של לוג אחד)." },
            { term: "פיסטור", definition: "תהליך חימום מתון (למשל 71 מעלות ל-15 שניות) שמטרתו להפחית את מספר המיקרואורגניזמים הפתוגניים והגורמים לקלקול, אך לא לעקר את המוצר לחלוטין." },
            { term: "עיקור (סטריליזציה)", definition: "תהליך שמטרתו להרוג את כל צורות החיים המיקרוביאליות, כולל נבגים עמידים, בדרך כלל באמצעות חום גבוה ולחץ." },
            { term: "דנטורציה", definition: "תהליך בו חלבונים מאבדים את המבנה המרחבי התקין שלהם, ולכן גם את תפקודם, בדרך כלל כתוצאה מחום או תנאי pH קיצוניים." },
            { term: "גשרי מלח", definition: "קשרים יוניים בין שיירי חומצות אמינו טעונות חיובית ושלילית בחלבון, התורמים ליציבות המבנה שלו, במיוחד בחלבונים תרמופיליים." },
            { term: "חומצות שומן בלתי רוויות", definition: "חומצות שומן בעלות קשרים כפולים בשרשרת הפחמנית. ריכוזן הגבוה בממברנה תורם לנזילותה בטמפרטורות נמוכות." },
            { term: "חומצות שומן רוויות", definition: "חומצות שומן ללא קשרים כפולים. ריכוזן הגבוה בממברנה תורם ליציבותה בטמפרטורות גבוהות." },
            { term: "UHT (Ultra-high temperature)", definition: "שיטת עיקור מהירה של נוזלים, כמו חלב, על ידי חימום לטמפרטורה גבוהה מאוד (135 מעלות צלזיוס) למשך שניות בודדות." },
            { term: "חלבוני עקת קור (Cold shock proteins)", definition: "חלבונים המיוצרים בתגובה לירידה פתאומית בטמפרטורה, המסייעים בשמירה על תפקוד תקין של התא בקור." }
        ];

        const mcqData = [
            { question: "מהי ההתאמה המולקולרית העיקרית המאפשרת לממברנת התא של פסיכרופיל לתפקד ב-4 מעלות צלזיוס?", options: ["ריכוז גבוה של חומצות שומן רוויות וארוכות שרשרת", "מבנה דו-שכבתי קשיח במיוחד עם כולסטרול", "ריכוז גבוה של חומצות שומן בלתי רוויות וקצרות שרשרת", "מבנה חד-שכבתי של פולימרים פחמימניים"], correctIndex: 2, explanation: "חומצות שומן בלתי רוויות וקצרות מונעות מהממברנה להתמצק ושומרות על נזילותה החיונית לתפקוד תקין של תהליכי תעבורה בקור." },
            { question: "חוקר מצא חיידק חדש עם טמפרטורת גידול אופטימלית של 88 מעלות צלזיוס. מהי ההשערה הסבירה ביותר לגבי ממברנת התא שלו?", options: ["היא תהיה עשירה בחומצות שומן בלתי רוויות", "היא תכיל בעיקר חומצות שומן קצרות שרשרת", "היא עשויה להיות חד-שכבתית (monolayer)", "היא תהיה זהה לממברנה של E. coli"], correctIndex: 2, explanation: "ארכיאות היפרתרמופיליות רבות פיתחו ממברנה חד-שכבתית יציבה במיוחד כהתאמה לחיים בטמפרטורות קיצוניות. שאר האפשרויות מתארות התאמות לקור או טמפרטורות מתונות." },
            { question: "מדוע תהליך הרג חיידקים בחום מתואר כאקספוננציאלי?", options: ["מכיוון שכל חיידק שמת משחרר רעלנים שהורגים חיידקים אחרים", "מכיוון שקצב התמותה תלוי בריכוז ההתחלתי של החיידקים", "מכיוון שבכל יחידת זמן, אחוז קבוע מהאוכלוסייה הנותרת מת", "מכיוון שהטמפרטורה עולה באופן אקספוננציאלי במהלך התהליך"], correctIndex: 2, explanation: "הרג אקספוננציאלי פירושו שהסיכוי של כל תא בודד למות ביחידת זמן הוא קבוע, ולכן אחוז קבוע מהתאים שנותרו מתים בכל פרק זמן, ולא מספר קבוע." },
            { question: "בתעשיית המזון, ה-D-value ב-70 מעלות צלזיוס עבור חיידק A הוא 5 דקות ועבור חיידק B הוא 10 דקות. מה ניתן להסיק מכך?", options: ["חיידק A עמיד פחות לחום מחיידק B", "חיידק B עמיד יותר לחום מחיידק A", "שני החיידקים ימותו לאחר 10 דקות ב-70 מעלות", "נדרש זמן כפול כדי להרוג 90% מחיידקי B לעומת A"], correctIndex: 1, explanation: "D-value גבוה יותר מעיד על עמידות גבוהה יותר לחום, כיוון שנדרש יותר זמן להשיג הפחתה של 90%. לכן, חיידק B, עם D-value גבוה יותר, עמיד יותר." },
            { question: "איזו מהתכונות הבאות אינה מאפיינת חלבונים של אורגניזמים היפרתרמופיליים בהשוואה למזופילים?", options: ["מספר גבוה יותר של גשרי מלח (קשרים יוניים)", "ליבה הידרופובית דחוסה יותר", "אחוז גבוה יותר של מבני אלפא-הליקס על חשבון מבנים אחרים", "החלפת חומצות אמינו ליצירת אינטראקציות יציבות יותר"], correctIndex: 2, explanation: "אחוז גבוה יותר של מבני אלפא-הליקס הוא מאפיין של חלבונים פסיכרופיליים, המקנה להם גמישות בקור. חלבונים תרמופיליים מתאפיינים ביציבות מבנית גבוהה." },
            { question: "מה ההבדל המהותי בין אורגניזם פסיכרופילי ופסיכרוטולרנטי?", options: ["פסיכרופיל הוא אאוקריוט ופסיכרוטולרנט הוא פרוקריוט", "פסיכרופיל יכול לגדול רק בנוכחות חמצן, ופסיכרוטולרנט לא", "לפסיכרופיל טמפרטורת גידול אופטימלית נמוכה, בעוד שלפסיכרוטולרנט טמפרטורה אופטימלית מתונה", "אין הבדל מהותי, אלו מונחים נרדפים"], correctIndex: 2, explanation: "ההבדל המרכזי הוא בטמפרטורה האופטימלית. פסיכרופיל מותאם לקור (אופטימום נמוך מ-15 מעלות), בעוד שפסיכרוטולרנט הוא מזופיל (אופטימום 20-40 מעלות) שרק סובל קור." },
            { question: "מדוע חום רטוב (אדים) נחשב יעיל יותר לעיקור מאשר חום יבש?", options: ["אדים חודרים טוב יותר דרך קפסולות של חיידקים", "חום יבש גורם להתייבשות מהירה מדי שמשמרת את החיידקים", "מים מאיצים את תהליך הדנטורציה של חלבונים ומקרומולקולות", "חום רטוב מגיע לטמפרטורות גבוהות יותר מחום יבש"], correctIndex: 2, explanation: "נוכחות מים בחום רטוב מאפשרת שבירה יעילה יותר של קשרי מימן וקשרים אחרים, מה שמזרז את הרס המבנה התפקודי של חלבונים ומולקולות חיוניות אחרות." },
            { question: "בהינתן תרחיף חיידקים המכיל $10^8$ תאים למל, כמה זמן יידרש טיפול בטמפרטורה שבה ה-D-value הוא 2 דקות, כדי להגיע לריכוז תיאורטי של 1 תא למל?", options: ["8 דקות", "10 דקות", "16 דקות", "20 דקות"], correctIndex: 2, explanation: "יש צורך בהפחתה של 8 סדרי גודל (מ-$10^8$ ל-$10^0$). כל הפחתה בסדר גודל (לוג) דורשת זמן של D-value אחד. לכן, הזמן הנדרש הוא 8 כפול 2 דקות, כלומר 16 דקות." },
            { question: "איזה מהגורמים הבאים יגביר באופן המשמעותי ביותר את עמידות אוכלוסיית חיידקים לטיפול בחום?", options: ["הימצאות החיידקים בשלב הגידול הלוגריתמי", "היעדר קפסולה סביב תאי החיידק", "הימצאות החיידקים במצע עשיר בשומן וסוכר", "הימצאות החיידקים בסביבה בעלת pH ניטרלי"], correctIndex: 2, explanation: "מצע עשיר במומסים כמו שומן וסוכר מוריד את פעילות המים, ובכך מייצב את המקרומולקולות ומגן על החיידקים מפני נזקי החום." },
            { question: "מדוע גידול חיידקים נעצר בטמפרטורת המקסימום שלהם?", options: ["הממברנה הופכת לנוזלית מדי וקורסת", "החלבונים עוברים דנטורציה", "הריבוזומים וה-DNA נפגעים", "כל התשובות נכונות"], correctIndex: 3, explanation: "בטמפרטורת המקסימום, כל הרכיבים התאיים מתחילים להינזק באופן בלתי הפיך: חלבונים עוברים דנטורציה, הממברנה מאבדת את שלמותה, וה-DNA עלול להתפרק. כל אלו יחד מובילים למות התא." },

            { question: "טיפול חלב בשיטת UHT (135 מעלות ל-2 שניות) לעומת פיסטור (71 מעלות ל-15 שניות) מביא ל:", options: ["מוצר עם חיי מדף קצרים יותר אך טעם טוב יותר", "הרג יעיל יותר של נבגים וחיי מדף ארוכים יותר בטמפרטורת החדר", "הרג סלקטיבי רק של חיידקים פתוגניים", "שינוי קטן יותר בערך התזונתי של החלב"], correctIndex: 1, explanation: "UHT הוא עיקור מלא שהורג גם נבגים עמידים, מה שמאפשר אחסון ממושך ללא קירור. פיסטור הוא תהליך מתון יותר שאינו הורג נבגים." },
            { question: "איזה מהבאים מהווה התאמה אופיינית של חלבון פסיכרופילי?", options: ["מספר רב של קשרים דיסולפידיים לייצוב", "מבנה קשיח ודחוס", "אחוז גבוה של חומצות אמינו פולריות ופחות קשרים יוניים", "אחוז גבוה של חומצות אמינו הידרופוביות בליבה"], correctIndex: 2, explanation: "חלבונים פסיכרופיליים צריכים להיות גמישים כדי לתפקד בקור. מבנה פחות קשיח, עם פחות אינטראקציות מייצבות (כמו קשרים יוניים) ויותר חומצות אמינו פולריות על פני השטח, מאפשר גמישות זו." },
            { question: "בהתבסס על עקרונות המוות התרמי, מדוע עיקור של צנצנת מרק (נפח גדול) דורש זמן חימום ארוך יותר מעיקור מבחנה קטנה עם אותו מרק?", options: ["בצנצנת גדולה יש יותר סוגי חיידקים", "לוקח יותר זמן לחום לחדור ולהגיע לטמפרטורה האחידה הנדרשת בכל נפח המרק", "הלחץ בצנצנת הגדולה גבוה יותר ומגן על החיידקים", "ה-pH במרק משתנה בנפחים גדולים"], correctIndex: 1, explanation: "יעילות ההרג תלויה בהגעה לטמפרטורה הרצויה ושמירה עליה. בנפח גדול, מרכז המזון מתחמם לאט יותר (חדירת חום איטית), ולכן נדרש זמן כולל ארוך יותר כדי להבטיח שכל הנפח עבר את הטיפול התרמי הנדרש." },

            { question: "מהי המשמעות של טמפרטורת הגידול האופטימלית?", options: ["הטמפרטורה הגבוהה ביותר שבה התא יכול לשרוד", "הטמפרטורה שבה קצב הגידול הוא המהיר ביותר", "הטמפרטורה היחידה שבה התא יכול לגדול", "הטמפרטורה שבה קצב המוטציות הוא הנמוך ביותר"], correctIndex: 1, explanation: "טמפרטורת האופטימום היא הנקודה על עקומת הגידול שבה קצב חלוקת התאים הוא מקסימלי, כתוצאה מפעילות אופטימלית של כל המערכות התאיות." },
            { question: "מהו המנגנון המולקולרי העיקרי המאפשר יציבות של חלבונים תרמופיליים?", options: ["הגברת הגמישות המבנית באמצעות יותר מבני אלפא-הליקס", "הפחתת מספר הקשרים ההידרופוביים בליבת החלבון", "הגברת מספר הקשרים היוניים (גשרי מלח) ואינטראקציות הידרופוביות", "ייצור מולקולות סוכר המקיפות את החלבון ומייצבות אותו"], correctIndex: 2, explanation: "יציבות בחום מושגת על ידי מבנה קשיח יותר. הדבר מושג באמצעות יותר קשרים מייצבים, כמו גשרי מלח בין חומצות אמינו טעונות, וליבה הידרופובית ארוזה היטב." },

            { question: "איזה מהמיקרואורגניזמים הבאים הוא בעל הסיכוי הגבוה ביותר לגרום לקלקול מזון המאוחסן במקרר?", options: ["Thermococcus celer (היפרתרמופיל)", "Bacillus stearothermophilus (תרמופיל)", "Listeria monocytogenes (פסיכרוטולרנט)", "Pyrolobus fumarii (היפרתרמופיל)"], correctIndex: 2, explanation: "רק פסיכרוטולרנט (או פסיכרופיל) יכול לגדול בטמפרטורות קירור. ליסטריה היא דוגמה קלאסית לחיידק כזה, המסוכן במיוחד במזונות מוכנים לאכילה המאוחסנים בקירור." },
            { question: "חוקר משווה שני חלבונים: אנזים A מחיידק מזופילי ואנזים B מחיידק תרמופילי. מה סביר שימצא?", options: ["לאנזים A תהיה טמפרטורת פעילות אופטימלית גבוהה יותר", "לאנזים B יהיו פחות גשרי מלח", "אנזים B יהיה יציב יותר לחום מאנזים A", "אנזים A יהיה פעיל ב-80 מעלות צלזיוס"], correctIndex: 2, explanation: "ההתאמה המרכזית של אורגניזם תרמופילי היא יציבות החלבונים שלו בטמפרטורות גבוהות, ולכן אנזים B יהיה עמיד יותר לדנטורציה בחום." },
            { question: "מהי הסיבה לכך שמעבר לטמפרטורת האופטימום, קצב הגידול יורד בחדות?", options: ["מחסור בחומרי הזנה בסביבה", "התחלה מהירה של דנטורציה של חלבונים חיוניים", "האטה בפעילות האנזימטית עקב הקור", "התמצקות הממברנה הציטופלזמטית"], correctIndex: 1, explanation: "עלייה קלה בטמפרטורה מעל האופטימום גורמת לנזק תרמי מהיר ובלתי הפיך למבנים חיוניים, בעיקר חלבונים, מה שמוביל לקריסה מהירה של פעילות התא ולירידה חדה בקצב הגידול." },
            { question: "מהי ההגדרה המדויקת ביותר של D-value?", options: ["הזמן הדרוש לעיקור מלא של תרבית בטמפרטורה מסוימת", "הטמפרטורה הדרושה להרוג 90% מהחיידקים בזמן נתון", "הזמן הדרוש להפחתת אוכלוסיית החיידקים פי 10 בטמפרטורה קבועה", "הזמן הדרוש להפחתת אוכלוסיית החיידקים ב-90 תאים"], correctIndex: 2, explanation: "D-value או זמן הפחתה עשרוני מוגדר כזמן הנדרש להפחתה של 90% (סדר גודל אחד, או 1-log) באוכלוסייה בטמפרטורה ספציפית וקבועה." },
            { question: "איזה מהבאים אינו גורם סביבתי פיזיקלי או כימי המשפיע ישירות על גידול חיידקים?", options: ["זמינות חמצן", "לחץ אוסמוטי", "צורת המושבה על צלחת אגר", "רמת קרינה אולטרה-סגולה"], correctIndex: 2, explanation: "צורת המושבה היא תוצאה של הגידול, ולא גורם סביבתי המשפיע עליו. כל שאר האפשרויות הן גורמים סביבתיים ידועים המשפיעים על הישרדות וגידול." },
            { question: "בהתחשב בכך שרוב הפתוגנים לאדם הם מזופילים, מהו טווח הטמפרטורות המסוכן ביותר (Danger Zone) לאחסון מזון מבושל?", options: ["מתחת ל-0 מעלות צלזיוס", "בין 5 ל-60 מעלות צלזיוס", "בין 60 ל-100 מעלות צלזיוס", "מעל 100 מעלות צלזיוס"], correctIndex: 1, explanation: "טווח זה מאפשר גידול מהיר של חיידקים מזופילים. מתחת ל-5 מעלות הגידול מואט משמעותית, ומעל 60 מעלות רובם מתחילים למות." },
            { question: "כיצד משפיעה נוכחות של נבגים (spores) על תהליך העיקור בחום?", options: ["היא מקלה על העיקור כי נבגים רגישים לחום", "היא אינה משפיעה על התהליך", "היא דורשת טמפרטורות גבוהות יותר או זמנים ארוכים יותר לעיקור יעיל", "היא גורמת לתהליך ההרג לעבור מקינטיקה אקספוננציאלית ללינארית"], correctIndex: 2, explanation: "נבגים הם צורות הישרדות עמידות ביותר לחום, יובש וכימיקלים. נוכחותם מחייבת תנאי עיקור אגרסיביים יותר (כמו באוטוקלאב) כדי להבטיח את השמדתם." },
            { question: "איזה מהבאים מתאר נכונה את ההסתגלות הממברנלית של חיידק תרמופילי?", options: ["יותר חומצות שומן בלתי רוויות לשמירה על נזילות", "פחות אינטראקציות הידרופוביות בין השרשראות", "יותר חומצות שומן רוויות וארוכות שרשרת ליציבות", "הכנסת מולקולות דמויות כולסטרול להגברת הגמישות"], correctIndex: 2, explanation: "בחום, הממברנה עלולה להפוך לנוזלית מדי. כדי לשמור על יציבות, ממברנות של תרמופילים עשירות בחומצות שומן רוויות (הנארזות בצפיפות) וארוכות שרשרת (המגבירות אינטראקציות הידרופוביות)." },
            { question: "אם נדרשות 3 דקות ב-121 מעלות כדי להפחית אוכלוסיית נבגים מ-$10^6$ ל-$10^3$, מהו ה-D-value של הנבגים בטמפרטורה זו?", options: ["1 דקה", "1.5 דקות", "3 דקות", "6 דקות"], correctIndex: 0, explanation: "ההפחתה היא מ-$10^6$ ל-$10^3$, כלומר הפחתה של 3 לוגים. אם 3 לוגים הושגו ב-3 דקות, אז הפחתה של 1 לוג (D-value) דורשת 3 דקות לחלק ל-3 לוגים, כלומר 1 דקה." },
            { question: "מהו המאפיין המבני בחלבונים של פסיכרופילים המאפשר להם גמישות בקור?", options: ["ריבוי קשרים דיסולפידיים", "ריבוי גשרי מלח", "ריבוי מבני אלפא-הליקס ופחות מבני בטא-שיט", "ליבה הידרופובית גדולה ודחוסה"], correctIndex: 2, explanation: "מבני אלפא-הליקס נחשבים גמישים יותר ממבני בטא-שיט. ריכוז גבוה יותר שלהם, יחד עם פחות קשרים מייצבים, תורם לגמישות החלבון הנדרשת לפעילות בטמפרטורות נמוכות." },
            { question: "מדוע חיידק שגדל במצב עקה (למשל רעב) עשוי להיות עמיד יותר לחום מחיידק שגדל בתנאים אופטימליים?", options: ["כי הוא מייצר יותר נבגים", "כי מצב עקה מפעיל מנגנוני הגנה כלליים", "כי הממברנה שלו דקה יותר ומוליכה חום פחות טוב", "כי הוא קטן יותר ולכן קשה יותר לחמם אותו"], correctIndex: 1, explanation: "תנאי עקה יכולים לגרום להפעלת תגובות עקה כלליות בתא, הכוללות ייצור חלבונים המגנים על מקרומולקולות והופכים את התא לעמיד יותר גם לסוגי עקה אחרים, כולל חום." },
            { question: "איזה מהתהליכים הבאים הוא דוגמה לעיקור (סטריליזציה)?", options: ["פיסטור חלב ב-71 מעלות ל-15 שניות", "אחסון בשר במקרר ב-4 מעלות", "טיפול במזון באוטוקלאב ב-121 מעלות ולחץ גבוה", "הוספת מלח בריכוז גבוה לבשר"], correctIndex: 2, explanation: "אוטוקלאב המשתמש בקיטור, טמפרטורה גבוהה (121) ולחץ הוא השיטה הסטנדרטית לעיקור, המבטיחה הרג של כל צורות החיים, כולל הנבגים העמידים ביותר." },

            { question: "החלפת חומצת אמינו אחת בחלבון לא יכולה להשפיע באופן משמעותי על יציבותו לחום.", answer: false, explanation: "החלפה של חומצת אמינו בודדת במיקום קריטי יכולה להפוך אנזים ליציב הרבה יותר בחום, למשל על ידי יצירת גשר מלח חדש." },
            { question: "המונח snow algae מתייחס לחיידק פסיכרופילי.", answer: false, explanation: "snow algae, כמו Chlamydomonas nivalis, היא אצה, כלומר אורגניזם אאוקריוטי, ולא חיידק (פרוקריוט). היא כן פסיכרופילית." },
            { question: "קצב הגידול של מזופיל ב-37 מעלות צלזיוס יהיה תמיד מהיר יותר מקצב הגידול של תרמופיל ב-60 מעלות צלזיוס.", answer: false, explanation: "אין בסיס להשוואה כזו. כל אורגניזם גדל בקצב מיטבי בטמפרטורה האופטימלית שלו, ואין סיבה להניח שקצב הגידול המרבי של מזופיל גבוה מזה של תרמופיל." },
            { question: "הגורם המגביל העיקרי לחיים בטמפרטורות גבוהות מאוד הוא זמינות חומרי הזנה.", answer: false, explanation: "הגורם המגביל העיקרי הוא היציבות של מקרומולקולות חיוניות כמו חלבונים, DNA, ושל ממברנת התא, אשר נוטות להתפרק בחום." },
            { question: "טיפול UHT בחלב הופך אותו לבטוח יותר לצריכה מפיסטור, אך גם פוגע יותר בערכו התזונתי.", answer: true, explanation: "UHT הוא עיקור מלא ולכן בטוח יותר, אך הטמפרטורה הגבוהה גורמת לפירוק רב יותר של ויטמינים רגישים לחום בהשוואה לפיסטור המתון יותר." }
        ];


        // --- Global State Variables ---
        let currentCardIndex = 0;
        let isCardFront = true;
        let isCardAnimating = false;
        let currentMCQIndex = 0;
        let currentTFIndex = 0;
        let mcqAnswers = new Array(mcqData.length).fill(null);
        let tfAnswers = new Array(tfData.length).fill(null);

        // --- DOM Element References ---
        const flashcardContent = document.getElementById('flashcard-content');
        const cardCounter = document.getElementById('card-counter');
        const prevCardBtn = document.getElementById('prev-card');
        const nextCardBtn = document.getElementById('next-card');
        const mcqQuestion = document.getElementById('mcq-question');
        const mcqOptions = document.getElementById('mcq-options');
        const mcqFeedback = document.getElementById('mcq-feedback');
        const mcqExplanation = document.getElementById('mcq-explanation');
        const mcqCounter = document.getElementById('mcq-counter');
        const prevMCQBtn = document.getElementById('prev-mcq');
        const nextMCQBtn = document.getElementById('next-mcq');
        const viewAllMCQBtn = document.getElementById('view-all-mcq');
        const mcqSingleView = document.getElementById('mcq-single-view');
        const mcqAllQuestionsContainer = document.getElementById('mcq-all-questions');
        const tfQuestion = document.getElementById('tf-question');
        const tfOptionsContainer = document.getElementById('tf-options');
        const tfFeedback = document.getElementById('tf-feedback');
        const tfExplanation = document.getElementById('tf-explanation');
        const tfCounter = document.getElementById('tf-counter');
        const prevTFBtn = document.getElementById('prev-tf');
        const nextTFBtn = document.getElementById('next-tf');
        const viewAllTFBtn = document.getElementById('view-all-tf');
        const tfSingleView = document.getElementById('tf-single-view');
        const tfAllQuestionsContainer = document.getElementById('tf-all-questions');

        function displayCard(index) {
            if (!flashcardData || flashcardData.length === 0) return;
            const cardData = flashcardData[index];
            isCardFront = true;
            flashcardContent.style.opacity = '1';
            flashcardContent.textContent = cardData.term;
            flashcardContent.className = 'flashcard-front-style';
            cardCounter.textContent = `כרטיס ${index + 1} / ${flashcardData.length}`;
            prevCardBtn.disabled = index === 0;
            nextCardBtn.disabled = index === flashcardData.length - 1;
        }

        function flipCard() {
            if (isCardAnimating || !flashcardData || flashcardData.length === 0) return;
            isCardAnimating = true;
            flashcardContent.style.opacity = '0';
            setTimeout(() => {
                isCardFront = !isCardFront;
                const cardData = flashcardData[currentCardIndex];
                if (isCardFront) {
                    flashcardContent.textContent = cardData.term;
                    flashcardContent.className = 'flashcard-front-style';
                } else {
                    flashcardContent.textContent = cardData.definition;
                    flashcardContent.className = 'flashcard-back-style';
                }
                flashcardContent.style.opacity = '1';
                isCardAnimating = false;
            }, 300);
        }

        function displayMCQuestion(index) {
            if (!mcqData || mcqData.length === 0) return;
            const qData = mcqData[index];
            mcqQuestion.textContent = qData.question;
            mcqOptions.innerHTML = '';
            mcqFeedback.classList.add('hidden');
            mcqExplanation.classList.add('hidden');
            qData.options.forEach((option, i) => {
                const button = document.createElement('button');
                button.textContent = option;
                button.onclick = () => handleMCQAnswer(index, i);
                mcqOptions.appendChild(button);
            });
            mcqCounter.textContent = `שאלה ${index + 1} / ${mcqData.length}`;
            prevMCQBtn.disabled = index === 0;
            nextMCQBtn.disabled = index === mcqData.length - 1;
            if (mcqAnswers[index] !== null) {
                highlightMCQAnswer(mcqOptions, mcqFeedback, mcqExplanation, index, mcqAnswers[index].selected);
            }
        }

        function handleMCQAnswer(qIndex, selectedIndex) {
            if (mcqAnswers[qIndex] !== null) return;
            const isCorrect = selectedIndex === mcqData[qIndex].correctIndex;
            mcqAnswers[qIndex] = { selected: selectedIndex, correct: isCorrect };
            highlightMCQAnswer(mcqOptions, mcqFeedback, mcqExplanation, qIndex, selectedIndex);
        }
        
        function highlightMCQAnswer(optionsContainer, feedbackEl, explanationEl, qIndex, selectedIndex) {
            const qData = mcqData[qIndex];
            const buttons = optionsContainer.querySelectorAll('button');
            buttons.forEach((button, i) => {
                button.disabled = true;
                if (i === qData.correctIndex) {
                    button.style.backgroundColor = 'var(--correct-color)';
                    button.style.color = '#fff';
                    button.classList.add('correct');
                }
                if (i === selectedIndex && i !== qData.correctIndex) {
                    button.style.backgroundColor = 'var(--incorrect-color)';
                    button.style.color = '#fff';
                    button.classList.add('incorrect');
                }
            });
            feedbackEl.textContent = selectedIndex === qData.correctIndex ? "נכון!" : "לא נכון.";
            feedbackEl.className = `feedback ${selectedIndex === qData.correctIndex ? 'correct' : 'incorrect'}`;
            explanationEl.textContent = `הסבר: ${qData.explanation}`;
            explanationEl.classList.remove('hidden');
        }

        function displayAllMCQ() {
            if (!mcqData || mcqData.length === 0) return;
            mcqSingleView.classList.add('hidden');
            mcqAllQuestionsContainer.innerHTML = ''; 
            mcqData.forEach((qData, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question-container-all';
                questionDiv.innerHTML = `
                    <div class="question-text">${index + 1}. ${qData.question}</div>
                    <div class="options">
                        ${qData.options.map((option, i) => `<button data-qindex="${index}" data-oindex="${i}">${option}</button>`).join('')}
                    </div>
                    <div class="feedback hidden"></div>
                    <div class="explanation hidden"></div>
                `;
                mcqAllQuestionsContainer.appendChild(questionDiv);
                 const optionButtons = questionDiv.querySelectorAll('.options button');
                 optionButtons.forEach(button => {
                     button.onclick = () => {
                        const qIndex = parseInt(button.dataset.qindex);
                        const oIndex = parseInt(button.dataset.oindex);
                        if (mcqAnswers[qIndex] === null) {
                            const isCorrect = oIndex === mcqData[qIndex].correctIndex;
                            mcqAnswers[qIndex] = { selected: oIndex, correct: isCorrect };
                        }
                        const optionsDiv = button.closest('.options');
                        const feedbackDiv = questionDiv.querySelector('.feedback');
                        const explanationDiv = questionDiv.querySelector('.explanation');
                        highlightMCQAnswer(optionsDiv, feedbackDiv, explanationDiv, qIndex, mcqAnswers[qIndex].selected);
                     };
                 });
                 if (mcqAnswers[index] !== null) {
                    const optionsDiv = questionDiv.querySelector('.options');
                    const feedbackDiv = questionDiv.querySelector('.feedback');
                    const explanationDiv = questionDiv.querySelector('.explanation');
                    highlightMCQAnswer(optionsDiv, feedbackDiv, explanationDiv, index, mcqAnswers[index].selected);
                 }
            });
            mcqAllQuestionsContainer.classList.remove('hidden');
        }

        function displayTFQuestion(index) {
            if (!tfData || tfData.length === 0) return;
            const qData = tfData[index];
            tfQuestion.textContent = qData.question;
            tfFeedback.classList.add('hidden');
            tfExplanation.classList.add('hidden');
             const buttons = tfOptionsContainer.querySelectorAll('button');
             buttons.forEach(button => {
                 button.disabled = false;
                 button.style.backgroundColor = '';
                 button.style.color = '';
                 button.classList.remove('correct', 'incorrect');
                 button.onclick = () => handleTFAnswer(index, button.dataset.answer === 'true');
             });
            tfCounter.textContent = `שאלה ${index + 1} / ${tfData.length}`;
            prevTFBtn.disabled = index === 0;
            nextTFBtn.disabled = index === tfData.length - 1;
            if (tfAnswers[index] !== null) {
                highlightTFAnswer(tfOptionsContainer, tfFeedback, tfExplanation, index, tfAnswers[index].selected);
            }
        }
        
        function handleTFAnswer(qIndex, selectedAnswer) {
            if (tfAnswers[qIndex] !== null) return;
            const isCorrect = selectedAnswer === tfData[qIndex].answer;
            tfAnswers[qIndex] = { selected: selectedAnswer, correct: isCorrect };
            highlightTFAnswer(tfOptionsContainer, tfFeedback, tfExplanation, qIndex, selectedAnswer);
        }
        
        function highlightTFAnswer(optionsContainer, feedbackEl, explanationEl, qIndex, selectedAnswer) {
             const qData = tfData[qIndex];
             const buttons = optionsContainer.querySelectorAll('button');
             buttons.forEach(button => {
                 const buttonAnswer = button.dataset.answer === 'true';
                 button.disabled = true;
                 if (buttonAnswer === qData.answer) {
                     button.style.backgroundColor = 'var(--correct-color)';
                     button.style.color = '#fff';
                     button.classList.add('correct');
                 }
                 if (buttonAnswer === selectedAnswer && buttonAnswer !== qData.answer) {
                     button.style.backgroundColor = 'var(--incorrect-color)';
                     button.style.color = '#fff';
                     button.classList.add('incorrect');
                 }
             });
             feedbackEl.textContent = selectedAnswer === qData.answer ? "נכון!" : "לא נכון.";
             feedbackEl.className = `feedback ${selectedAnswer === qData.answer ? 'correct' : 'incorrect'}`;
             explanationEl.textContent = `הסבר: ${qData.explanation}`;
             explanationEl.classList.remove('hidden');
        }
        
        function displayAllTF() {
             if (!tfData || tfData.length === 0) return;
             tfSingleView.classList.add('hidden');
             tfAllQuestionsContainer.innerHTML = '';
             tfData.forEach((qData, index) => {
                 const questionDiv = document.createElement('div');
                 questionDiv.className = 'question-container-all';
                 questionDiv.innerHTML = `
                     <div class="question-text">${index + 1}. ${qData.question}</div>
                     <div class="tf-options">
                         <button data-qindex="${index}" data-answer="true">נכון</button>
                         <button data-qindex="${index}" data-answer="false">לא נכון</button>
                     </div>
                     <div class="feedback hidden"></div>
                     <div class="explanation hidden"></div>
                 `;
                 tfAllQuestionsContainer.appendChild(questionDiv);
                 const optionButtons = questionDiv.querySelectorAll('.tf-options button');
                 optionButtons.forEach(button => {
                     button.onclick = () => {
                         const qIndex = parseInt(button.dataset.qindex);
                         const selectedAnswer = button.dataset.answer === 'true';
                         if (tfAnswers[qIndex] === null) {
                             const isCorrect = selectedAnswer === tfData[qIndex].answer;
                             tfAnswers[qIndex] = { selected: selectedAnswer, correct: isCorrect };
                         }
                         const optionsDiv = button.closest('.tf-options');
                         const feedbackDiv = questionDiv.querySelector('.feedback');
                         const explanationDiv = questionDiv.querySelector('.explanation');
                         highlightTFAnswer(optionsDiv, feedbackDiv, explanationDiv, qIndex, tfAnswers[qIndex].selected);
                     };
                 });
                 if (tfAnswers[index] !== null) {
                    const optionsDiv = questionDiv.querySelector('.tf-options');
                    const feedbackDiv = questionDiv.querySelector('.feedback');
                    const explanationDiv = questionDiv.querySelector('.explanation');
                    highlightTFAnswer(optionsDiv, feedbackDiv, explanationDiv, index, tfAnswers[index].selected);
                 }
             });
             tfAllQuestionsContainer.classList.remove('hidden');
        }

        function initialize() {
            if (flashcardData.length > 0) displayCard(currentCardIndex);
            if (mcqData.length > 0) displayMCQuestion(currentMCQIndex);
            if (tfData.length > 0) displayTFQuestion(currentTFIndex);
            flashcardContent.addEventListener('click', flipCard);
            prevCardBtn.addEventListener('click', () => { if (currentCardIndex > 0) { currentCardIndex--; displayCard(currentCardIndex); } });
            nextCardBtn.addEventListener('click', () => { if (currentCardIndex < flashcardData.length - 1) { currentCardIndex++; displayCard(currentCardIndex); } });
            prevMCQBtn.addEventListener('click', () => { if (currentMCQIndex > 0) { currentMCQIndex--; displayMCQuestion(currentMCQIndex); } });
            nextMCQBtn.addEventListener('click', () => { if (currentMCQIndex < mcqData.length - 1) { currentMCQIndex++; displayMCQuestion(currentMCQIndex); } });
            viewAllMCQBtn.addEventListener('click', displayAllMCQ);
            prevTFBtn.addEventListener('click', () => { if (currentTFIndex > 0) { currentTFIndex--; displayTFQuestion(currentTFIndex); } });
            nextTFBtn.addEventListener('click', () => { if (currentTFIndex < tfData.length - 1) { currentTFIndex++; displayTFQuestion(currentTFIndex); } });
            viewAllTFBtn.addEventListener('click', displayAllTF);
        }
        
        initialize();
    });
    </script>
</body>
</html>
