<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Study Tool</title>
    <style>
        /* --- Root Variables for Consistent Theming --- */
        :root {
            --primary-bg: #333333;
            --secondary-bg: #666666;
            --accent-color: #3D90D7;
            --text-color: #E0E0E0;
            --correct-color: #4CAF50;
            --incorrect-color: #F44336;
            --card-bg: #5a5a5a;
        }

        /* --- Global Styles --- */
        body {
            background-color: var(--primary-bg);
            color: var(--text-color);
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 90%; /* As per prompt */
            margin: 20px auto;
            padding: 20px;
            background-color: var(--secondary-bg);
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        h1, h2 {
            color: var(--accent-color);
            text-align: center;
            border-bottom: 1px solid var(--accent-color);
            padding-bottom: 10px;
        }

        .section {
            background-color: var(--primary-bg);
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 8px;
        }

        /* --- Study Cards Styling (Fade Animation) --- */
        .flashcard-container {
            height: 250px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #flashcard-content {
            width: 100%;
            height: 100%;
            background-color: var(--card-bg);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            transition: opacity 0.3s ease-in-out; /* Fade transition */
        }
        
        .flashcard-front-style {
             font-size: 1.5em;
             font-weight: bold;
        }
        
        .flashcard-back-style {
             font-size: 1.1em;
        }

        /* --- Questions Styling (MCQ & T/F) --- */
         .question-container-single, .question-container-all {
            margin-bottom: 15px;
            padding: 15px;
            border: 1px solid var(--secondary-bg);
            border-radius: 5px;
         }

        .question-text {
            font-weight: bold;
            margin-bottom: 15px;
        }

        .options button, .tf-options button {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-align: right;
            transition: background-color 0.3s;
        }

        .options button:hover:not(:disabled), .tf-options button:hover:not(:disabled) {
            background-color: #357ab8;
        }

        .options button:disabled, .tf-options button:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
        
        /* Specific styling to override disabled opacity for correct/incorrect answers */
        .options button.correct, .tf-options button.correct { opacity: 1; }
        .options button.incorrect, .tf-options button.incorrect { opacity: 1; }


        .feedback {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
        }

        .feedback.correct {
            background-color: var(--correct-color);
            color: #fff;
        }

        .feedback.incorrect {
            background-color: var(--incorrect-color);
            color: #fff;
        }

        .explanation {
            margin-top: 10px;
            font-style: italic;
            font-size: 0.9em;
            padding: 8px;
            background-color: var(--secondary-bg);
            border-radius: 4px;
        }

        /* --- Navigation & Utility Styling --- */
        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            margin-bottom: 10px;
        }

        .nav-button, .view-all-button {
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
        }

        .nav-button:disabled {
             opacity: 0.5;
             cursor: not-allowed;
        }

        .counter {
            font-size: 0.9em;
        }

        .view-all-container {
            text-align: center;
            margin-top: 15px;
            margin-bottom: 15px;
        }

        .hidden {
            display: none;
        }

        #mcq-all-questions .question-container-all,
        #tf-all-questions .question-container-all {
            margin-bottom: 20px;
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>נבגים בקטריאליים (אנדוספורות)</h1>

        <!-- Study Cards Section -->
        <div class="section">
            <h2>כרטיסי לימוד</h2>
            <div class="flashcard-container">
                <div id="flashcard-content"></div>
            </div>
            <div class="navigation">
                <button class="nav-button" id="prev-card">הקודם</button>
                <span class="counter" id="card-counter"></span>
                <button class="nav-button" id="next-card">הבא</button>
            </div>
        </div>

        <!-- Multiple Choice Questions Section -->
        <div class="section">
            <h2>שאלות רב-ברירה (אמריקאיות)</h2>
            <div id="mcq-single-view">
                <div class="question-container-single" id="mcq-container">
                    <div class="question-text" id="mcq-question"></div>
                    <div class="options" id="mcq-options"></div>
                    <div class="feedback hidden" id="mcq-feedback"></div>
                    <div class="explanation hidden" id="mcq-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-mcq">הקודם</button>
                    <span class="counter" id="mcq-counter"></span>
                    <button class="nav-button" id="next-mcq">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-mcq">הצג את כל השאלות</button>
                 </div>
            </div>
            <div id="mcq-all-questions" class="hidden">
                <!-- All MCQs will be dynamically inserted here -->
            </div>
        </div>

        <!-- True/False Questions Section -->
        <div class="section">
            <h2>שאלות נכון/לא נכון</h2>
             <div id="tf-single-view">
                <div class="question-container-single" id="tf-container">
                    <div class="question-text" id="tf-question"></div>
                    <div class="tf-options" id="tf-options">
                        <button data-answer="true">נכון</button>
                        <button data-answer="false">לא נכון</button>
                    </div>
                    <div class="feedback hidden" id="tf-feedback"></div>
                    <div class="explanation hidden" id="tf-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-tf">הקודם</button>
                    <span class="counter" id="tf-counter"></span>
                    <button class="nav-button" id="next-tf">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-tf">הצג את כל השאלות</button>
                 </div>
            </div>
             <div id="tf-all-questions" class="hidden">
                 <!-- All T/F Questions will be dynamically inserted here -->
             </div>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        
        const flashcardData = [
            {
                term: "ספורולציה (Sporulation)",
                definition: "תהליך התמיינות של תא חיידק וגטטיבי ליצירת אנדו-ספורה, כתגובה לתנאי עקה או מחסור במזון."
            },
            {
                term: "אנדו-ספורה (Endospore)",
                definition: "תא חיידקי רדום ועמיד ביותר לתנאי סביבה קיצוניים כמו חום, יובש, קרינה וכימיקלים."
            },
            {
                term: "חומצה דיפיקולינית (DPA)",
                definition: "תרכובת אורגנית ייחודית לאנדו-ספורות, היוצרת קומפלקס עם יוני סידן ותורמת לייצוב הדנא ולעמידות לחום."
            },
            {
                term: "SASPs (Small Acid-Soluble Spore Proteins)",
                definition: "חלבונים ספציפיים לספורה הנקשרים לדנא, משנים את מבנהו ומגנים עליו מפני קרינה, חום ומלחים."
            },
            {
                term: "קורטקס (Cortex)",
                definition: "שכבה עבה של פפטידוגליקאן ייחודי הממוקמת בין הממברנה הפנימית והחיצונית של הספורה, ותפקידה לשמור על מצב הייבוש של הליבה."
            },
            {
                term: "נביטה (Germination)",
                definition: "תהליך החזרה של האנדו-ספורה ממצב רדום למצב של תא וגטטיבי פעיל מטבולית, המתרחש בתנאים סביבתיים מתאימים."
            },
            {
                term: "תא וגטטיבי (Vegetative Cell)",
                definition: "תא חיידק הנמצא במצב פעיל מטבולית, גדל ומתחלק."
            },
            {
                term: "מעטפת הספורה (Spore Coat)",
                definition: "שכבות חלבונים חיצוניות לקורטקס המקנות עמידות כימית ומגנות מפני אנזימים כמו ליזוזים."
            },
            {
                term: "אקסוספוריום (Exosporium)",
                definition: "המעטפת החיצונית והדקה ביותר בחלק מהאנדו-ספורות, המורכבת מחלבונים וליפופרוטאינים."
            },
            {
                term: "תא אם (Mother Cell)",
                definition: "החלק הגדול יותר של התא לאחר החלוקה הא-סימטרית בספורולציה, אשר עוטף את הפורספורה ומתפרק בסוף התהליך."
            },
            {
                term: "פורספורה (Forespore)",
                definition: "התא הקטן יותר הנוצר בחלוקה הא-סימטרית בספורולציה, אשר יתפתח להיות האנדו-ספורה הבוגרת."
            },
            {
                term: "בליעה (Engulfment)",
                definition: "שלב בספורולציה בו הממברנה של תא האם עוטפת לחלוטין את הפורספורה, ויוצרת מבנה בעל שתי ממברנות."
            },
            {
                term: "עמידות לחום",
                definition: "תכונה מרכזית של אנדו-ספורות, הנובעת מתכולת מים נמוכה, קומפלקס סידן-DPA, וחלבונים מגנים."
            },
            {
                term: "החזרת אור (Refractility)",
                definition: "תכונה אופטית של אנדו-ספורות במיקרוסקופ אור, הנראות כגופים בוהקים ומחזירי אור עקב צפיפותן ותכולת המים הנמוכה."
            },
            {
                term: "Outgrowth",
                definition: "השלב האחרון בנביטה, בו התא החדש מסנתז מקרומולקולות, מתנפח, בוקע ממעטפות הספורה ומתחיל להתחלק כתא וגטטיבי."
            }
        ];

        const mcqData = [
            {
                question: "מהו הגורם העיקרי התורם לעמידות יוצאת הדופן של אנדו-ספורות לחום גבוה?",
                options: ["מעטפת חלבונים עבה", "ריכוז גבוה של SASPs", "תכולת מים נמוכה מאוד בליבה", "נוכחות אקסוספוריום"],
                correctIndex: 2,
                explanation: "תכולת המים הנמוכה (10-25% מהתא הווגטטיבי) והמצב הגלי של הציטופלסמה, יחד עם קומפלקס הסידן-DPA, מייצבים את המקרומולקולות ומונעים דנטורציה בחום."
            },
            {
                question: "איזה מהבאים מתאר נכונה את תפקיד חלבוני ה-SASPs באנדו-ספורה?",
                options: ["הם בונים את שכבת הקורטקס", "הם יוצרים תעלות לשחרור DPA", "הם נקשרים לדנא ומשנים את מבנהו להגנה", "הם מפעילים את תהליך הנביטה"],
                correctIndex: 2,
                explanation: "חלבוני SASPs נקשרים באופן פיזי לדנא, משנים את הקונפורמציה שלו למבנה דחוס יותר (מ-B-DNA ל-A-DNA), ובכך מגנים עליו מנזקי קרינה, חום ויובש."
            },
            {
                question: "מהו הרצף הכרונולוגי הנכון של האירועים הבאים בתהליך הספורולציה?",
                options: ["יצירת ספטום, בליעה, יצירת קורטקס, פירוק תא האם", "בליעה, יצירת ספטום, יצירת קורטקס, פירוק תא האם", "יצירת קורטקס, בליעה, יצירת ספטום, פירוק תא האם", "יצירת ספטום, יצירת קורטקס, בליעה, פירוק תא האם"],
                correctIndex: 0,
                explanation: "התהליך מתחיל בחלוקה א-סימטרית (יצירת ספטום), לאחריה תא האם בולע את הפורספורה, אז נוצר הקורטקס, ולבסוף תא האם מתפרק ומשחרר את הספורה."
            },
            {
                question: "מהי התכונה המבדילה העיקרית בין הקורטקס של אנדו-ספורה לבין דופן תא וגטטיבי רגיל?",
                options: ["הקורטקס מכיל ליפידים רבים", "הקורטקס מורכב מפפטידוגליקאן בעל קשרי הצלבה מעטים", "הקורטקס חדיר למים", "הקורטקס חסר פפטידוגליקאן"],
                correctIndex: 1,
                explanation: "הקורטקס מורכב מסוג ייחודי של פפטידוגליקאן עם פחות קשרי הצלבה, מה שמאפשר לו לשמור על לחץ אוסמוטי ולסייע בייבוש הליבה. דופן תא רגיל הוא בעל קשרי הצלבה רבים יותר למען קשיחות."
            },
            {
                question: "אילו שני מרכיבים ייחודיים, הפועלים יחד, חיוניים לעמידות לחום ולייצוב הדנא באנדו-ספורה?",
                options: ["SASPs ו-RNA פולימראז", "חומצה דיפיקולינית ויוני סידן", "אקסוספוריום ומעטפת הספורה", "פפטידוגליקאן וריבוזומים"],
                correctIndex: 1,
                explanation: "חומצה דיפיקולינית (DPA) יוצרת קומפלקס עם יוני סידן. קומפלקס זה נקשר למולקולות מים, מסייע בייבוש הליבה, ומתחבר בין שרשראות הדנא ומייצב אותו מפני דנטורציה בחום."
            },
            {
                question: "אם חיידק יוצר ספורות עבר מוטציה הגורמת לחוסר יכולת לייצר את מעטפת הספורה (Spore Coat), מה תהיה ההשלכה הסבירה ביותר?",
                options: ["הספורה לא תהיה עמידה לחום", "הספורה תהיה רגישה מאוד לאנזימים כמו ליזוזים", "הספורה לא תוכל לבצע נביטה", "הדנא של הספורה לא יהיה מוגן מקרינה"],
                correctIndex: 1,
                explanation: "מעטפת הספורה מורכבת מחלבונים המקנים עמידות כימית ומגנים על שכבת הקורטקס הרגישה יחסית מפני פירוק על ידי אנזימים כמו ליזוזים."
            },
            {
                question: "מהו השלב הראשון וההפיך בתהליך החזרה של ספורה למצב וגטטיבי?",
                options: ["Outgrowth", "נביטה", "אקטיבציה", "בליעה"],
                correctIndex: 2,
                explanation: "אקטיבציה, הנגרמת לרוב על ידי גירוי כמו חום או שריטה מכנית, היא שלב הכנה הפיך. אם התנאים לא ימשיכו להיות מתאימים, הספורה תישאר רדומה. הנביטה עצמה היא תהליך בלתי הפיך."
            },
            {
                question: "מדוע אנדו-ספורות נראות בוהקות (מחזירות אור) תחת מיקרוסקופ אור?",
                options: ["בגלל ריכוז גבוה של פיגמנטים מחזירי אור", "בגלל מבנה גבישי של הדנא", "בגלל ציטופלסמה צפופה ודלה במים", "בגלל המעטפת החלבונית החיצונית"],
                correctIndex: 2,
                explanation: "הציטופלסמה הצפופה והיבשה של הספורה, יחד עם ריכוז הסידן-DPA הגבוה, גורמים לה להיות בעלת מקדם שבירת אור גבוה, מה שמוביל להחזרת אור חזקה ונראות בוהקת."
            },
            {
                question: "מה ההבדל המהותי בין תא האם לפורספורה מיד לאחר שלב הבליעה (engulfment)?",
                options: ["רק לתא האם יש דנא", "הפורספורה מוקפת בשתי ממברנות ואילו תא האם באחת", "לפורספורה אין ריבוזומים", "תא האם גדול יותר אך חסר פעילות מטבולית"],
                correctIndex: 1,
                explanation: "לאחר שתא האם בולע את הפורספורה, הפורספורה הופכת להיות מוקפת בשתי ממברנות - הממברנה המקורית שלה והממברנה של תא האם שעטפה אותה. זהו שלב קריטי ליצירת הקורטקס ביניהן."
            },
            {
                question: "איזה תהליך אינו מתרחש במהלך שלב הנביטה (Germination) של אנדו-ספורה?",
                options: ["איבוד העמידות לחום", "פירוק חלבוני SASPs", "ספיחת מים לתוך הליבה", "סינתזה של קומפלקס סידן-DPA"],
                correctIndex: 3,
                explanation: "במהלך הנביטה, קומפלקס הסידן-DPA מתפרק ומשוחרר מהספורה החוצה. סינתזה של הקומפלקס מתרחשת אך ורק במהלך תהליך הספורולציה."
            },
            {
                question: "מהי הקבוצה הטקסונומית של חיידקים הידועה ביכולתה לייצר אנדו-ספורות?",
                options: ["כל החיידקים הגראם-שליליים", "חיידקים ארכאה בלבד", "חיידקים גראם-חיוביים מסוימים", "חיידקי ספירוכטה"],
                correctIndex: 2,
                explanation: "יצירת אנדו-ספורות היא תכונה המאפיינת בעיקר סוגים מסוימים של חיידקים גראם-חיוביים, כשהמפורסמים שבהם הם הסוגים בצילוס (Bacillus) וקלוסטרידיום (Clostridium)."
            },
            {
                question: "תהליך הספורולציה הוא דוגמה ל:",

                 if (buttonAnswer === qData.answer) {
                     button.style.backgroundColor = 'var(--correct-color)';
                     button.style.color = '#fff';
                     button.classList.add('correct');
                 }
                 if (buttonAnswer === selectedAnswer && buttonAnswer !== qData.answer) {
                     button.style.backgroundColor = 'var(--incorrect-color)';
                     button.style.color = '#fff';
                     button.classList.add('incorrect');
                 }
             });
             feedbackEl.textContent = selectedAnswer === qData.answer ? "נכון!" : "לא נכון.";
             feedbackEl.className = `feedback ${selectedAnswer === qData.answer ? 'correct' : 'incorrect'}`;
             explanationEl.textContent = `הסבר: ${qData.explanation}`;
             explanationEl.classList.remove('hidden');
        }
        
        function displayAllTF() {
             if (!tfData || tfData.length === 0) return;
             tfSingleView.classList.add('hidden');
             tfAllQuestionsContainer.innerHTML = '';
             tfData.forEach((qData, index) => {
                 const questionDiv = document.createElement('div');
                 questionDiv.className = 'question-container-all';
                 questionDiv.innerHTML = `
                     <div class="question-text">${index + 1}. ${qData.question}</div>
                     <div class="tf-options">
                         <button data-qindex="${index}" data-answer="true">נכון</button>
                         <button data-qindex="${index}" data-answer="false">לא נכון</button>
                     </div>
                     <div class="feedback hidden"></div>
                     <div class="explanation hidden"></div>
                 `;
                 tfAllQuestionsContainer.appendChild(questionDiv);
                 const optionButtons = questionDiv.querySelectorAll('.tf-options button');
                 optionButtons.forEach(button => {
                     button.onclick = () => {
                         const qIndex = parseInt(button.dataset.qindex);
                         const selectedAnswer = button.dataset.answer === 'true';
                         if (tfAnswers[qIndex] === null) {
                             const isCorrect = selectedAnswer === tfData[qIndex].answer;
                             tfAnswers[qIndex] = { selected: selectedAnswer, correct: isCorrect };
                         }
                         const optionsDiv = button.closest('.tf-options');
                         const feedbackDiv = questionDiv.querySelector('.feedback');
                         const explanationDiv = questionDiv.querySelector('.explanation');
                         highlightTFAnswer(optionsDiv, feedbackDiv, explanationDiv, qIndex, tfAnswers[qIndex].selected);
                     };
                 });
                 if (tfAnswers[index] !== null) {
                    const optionsDiv = questionDiv.querySelector('.tf-options');
                    const feedbackDiv = questionDiv.querySelector('.feedback');
                    const explanationDiv = questionDiv.querySelector('.explanation');
                    highlightTFAnswer(optionsDiv, feedbackDiv, explanationDiv, index, tfAnswers[index].selected);
                 }
             });
             tfAllQuestionsContainer.classList.remove('hidden');
        }

        function initialize() {
            if (flashcardData.length > 0) displayCard(currentCardIndex);
            if (mcqData.length > 0) displayMCQuestion(currentMCQIndex);
            if (tfData.length > 0) displayTFQuestion(currentTFIndex);
            flashcardContent.addEventListener('click', flipCard);
            prevCardBtn.addEventListener('click', () => { if (currentCardIndex > 0) { currentCardIndex--; displayCard(currentCardIndex); } });
            nextCardBtn.addEventListener('click', () => { if (currentCardIndex < flashcardData.length - 1) { currentCardIndex++; displayCard(currentCardIndex); } });
            prevMCQBtn.addEventListener('click', () => { if (currentMCQIndex > 0) { currentMCQIndex--; displayMCQuestion(currentMCQIndex); } });
            nextMCQBtn.addEventListener('click', () => { if (currentMCQIndex < mcqData.length - 1) { currentMCQIndex++; displayMCQuestion(currentMCQIndex); } });
            viewAllMCQBtn.addEventListener('click', displayAllMCQ);
            prevTFBtn.addEventListener('click', () => { if (currentTFIndex > 0) { currentTFIndex--; displayTFQuestion(currentTFIndex); } });
            nextTFBtn.addEventListener('click', () => { if (currentTFIndex < tfData.length - 1) { currentTFIndex++; displayTFQuestion(currentTFIndex); } });
            viewAllTFBtn.addEventListener('click', displayAllTF);
        }
        
        initialize();
    });
    </script>
</body>
</html>
