<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Study Tool</title>
    <style>
        /* --- Root Variables for Consistent Theming --- */
        :root {
            --primary-bg: #333333;
            --secondary-bg: #666666;
            --accent-color: #3D90D7;
            --text-color: #E0E0E0;
            --correct-color: #4CAF50;
            --incorrect-color: #F44336;
            --card-bg: #5a5a5a;
        }

        /* --- Global Styles --- */
        body {
            background-color: var(--primary-bg);
            color: var(--text-color);
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 90%; /* As per prompt */
            margin: 20px auto;
            padding: 20px;
            background-color: var(--secondary-bg);
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        h1, h2 {
            color: var(--accent-color);
            text-align: center;
            border-bottom: 1px solid var(--accent-color);
            padding-bottom: 10px;
        }

        .section {
            background-color: var(--primary-bg);
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 8px;
        }

        /* --- Study Cards Styling (Fade Animation) --- */
        .flashcard-container {
            height: 250px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #flashcard-content {
            width: 100%;
            height: 100%;
            background-color: var(--card-bg);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            transition: opacity 0.3s ease-in-out; /* Fade transition */
        }
        
        .flashcard-front-style {
             font-size: 1.5em;
             font-weight: bold;
        }
        
        .flashcard-back-style {
             font-size: 1.1em;
        }

        /* --- Questions Styling (MCQ & T/F) --- */
         .question-container-single, .question-container-all {
            margin-bottom: 15px;
            padding: 15px;
            border: 1px solid var(--secondary-bg);
            border-radius: 5px;
         }

        .question-text {
            font-weight: bold;
            margin-bottom: 15px;
        }

        .options button, .tf-options button {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-align: right;
            transition: background-color 0.3s;
        }

        .options button:hover:not(:disabled), .tf-options button:hover:not(:disabled) {
            background-color: #357ab8;
        }

        .options button:disabled, .tf-options button:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
        
        /* Specific styling to override disabled opacity for correct/incorrect answers */
        .options button.correct, .tf-options button.correct { opacity: 1; }
        .options button.incorrect, .tf-options button.incorrect { opacity: 1; }


        .feedback {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
        }

        .feedback.correct {
            background-color: var(--correct-color);
            color: #fff;
        }

        .feedback.incorrect {
            background-color: var(--incorrect-color);
            color: #fff;
        }

        .explanation {
            margin-top: 10px;
            font-style: italic;
            font-size: 0.9em;
            padding: 8px;
            background-color: var(--secondary-bg);
            border-radius: 4px;
        }

        /* --- Navigation & Utility Styling --- */
        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            margin-bottom: 10px;
        }

        .nav-button, .view-all-button {
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
        }

        .nav-button:disabled {
             opacity: 0.5;
             cursor: not-allowed;
        }

        .counter {
            font-size: 0.9em;
        }

        .view-all-container {
            text-align: center;
            margin-top: 15px;
            margin-bottom: 15px;
        }

        .hidden {
            display: none;
        }

        #mcq-all-questions .question-container-all,
        #tf-all-questions .question-container-all {
            margin-bottom: 20px;
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>קפסולות וביופילמים בחיידקים</h1>

        <!-- Study Cards Section -->
        <div class="section">
            <h2>כרטיסי לימוד</h2>
            <div class="flashcard-container">
                <div id="flashcard-content"></div>
            </div>
            <div class="navigation">
                <button class="nav-button" id="prev-card">הקודם</button>
                <span class="counter" id="card-counter"></span>
                <button class="nav-button" id="next-card">הבא</button>
            </div>
        </div>

        <!-- Multiple Choice Questions Section -->
        <div class="section">
            <h2>שאלות רב-ברירה (אמריקאיות)</h2>
            <div id="mcq-single-view">
                <div class="question-container-single" id="mcq-container">
                    <div class="question-text" id="mcq-question"></div>
                    <div class="options" id="mcq-options"></div>
                    <div class="feedback hidden" id="mcq-feedback"></div>
                    <div class="explanation hidden" id="mcq-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-mcq">הקודם</button>
                    <span class="counter" id="mcq-counter"></span>
                    <button class="nav-button" id="next-mcq">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-mcq">הצג את כל השאלות</button>
                 </div>
            </div>
            <div id="mcq-all-questions" class="hidden">
                <!-- All MCQs will be dynamically inserted here -->
            </div>
        </div>

        <!-- True/False Questions Section -->
        <div class="section">
            <h2>שאלות נכון/לא נכון</h2>
             <div id="tf-single-view">
                <div class="question-container-single" id="tf-container">
                    <div class="question-text" id="tf-question"></div>
                    <div class="tf-options" id="tf-options">
                        <button data-answer="true">נכון</button>
                        <button data-answer="false">לא נכון</button>
                    </div>
                    <div class="feedback hidden" id="tf-feedback"></div>
                    <div class="explanation hidden" id="tf-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-tf">הקודם</button>
                    <span class="counter" id="tf-counter"></span>
                    <button class="nav-button" id="next-tf">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-tf">הצג את כל השאלות</button>
                 </div>
            </div>
             <div id="tf-all-questions" class="hidden">
                 <!-- All T/F Questions will be dynamically inserted here -->
             </div>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        
        const flashcardData = [
            { term: "ביופילם", definition: "קהילה מורכבת של מיקרואורגניזמים הצמודים למשטח ומוקפים במטריצה חוץ-תאית שהם מייצרים בעצמם, ומציגים פנוטיפ שונה מתאים פלנקטוניים." },
            { term: "קפסולה", definition: "שכבה חיצונית, מאורגנת היטב וצמודה לדופן התא של חיידקים מסוימים, המורכבת לרוב מפוליסכרידים ומסייעת בהגנה מפני מערכת החיסון ומיובש." },
            { term: "Slime layer", definition: "שכבה חוץ-תאית פחות מאורגנת ופחות צמודה לדופן התא בהשוואה לקפסולה, המורכבת גם היא מפולימרים." },
            { term: "ניסוי גריפית'", definition: "ניסוי מכונן שהדגים טרנספורמציה גנטית בחיידקי Streptococcus pneumoniae, והוכיח שחומר מתאי חיידקים מתים מזן S יכול להקנות וירולנטיות לתאי חיידקים חיים מזן R." },
            { term: "חיידקים פלנקטוניים", definition: "חיידקים החיים באופן חופשי ואינדיבידואלי בתמיסה נוזלית, בניגוד לחיידקים החיים בביופילם." },
            { term: "מטריצה חוץ-תאית (EPS)", definition: "החומר המקיף את התאים בביופילם, מורכב ממים, פוליסכרידים, חלבונים, eDNA ומינרלים. מקנה לביופילם את מבנהו ועמידותו." },
            { term: "תאי Persister", definition: "תת-אוכלוסייה של תאים בביופילם הנמצאת במצב רדום מטבולית, המקנה להם עמידות גבוהה וזמנית לאנטיביוטיקה, ללא שינוי גנטי." },
            { term: "צביעה שלילית", definition: "שיטת צביעה מיקרוסקופית שבה צובעים את הרקע ולא את התא עצמו. שיטה זו יעילה להדגמת קפסולות, המופיעות כאזורים שקופים סביב התאים הצבועים." },
            { term: "eDNA", definition: "DNA חוץ-תאית (Extracellular DNA), המהווה רכיב מבני חשוב במטריצה של ביופילמים רבים ותורם ליציבותה ולהיצמדות התאים." },
            { term: "וירולנטיות", definition: "מידת יכולתו של מיקרואורגניזם לגרום למחלה. קיומה של קפסולה בחיידקים כמו Streptococcus pneumoniae מעלה משמעותית את הווירולנטיות שלהם." },
            { term: "קולוניזציה", definition: "תהליך התיישבות של מיקרואורגניזמים על משטח או ברקמה. בביופילם, זהו השלב השני לאחר ההיצמדות הראשונית, וכולל גדילה ותקשורת בין-תאית." },
            { term: "MIC", definition: "ריכוז מעכב מינימלי (Minimum Inhibitory Concentration). הריכוז הנמוך ביותר של חומר אנטימיקרוביאלי המעכב צמיחה נראית לעין של חיידק. ערך זה גבוה משמעותית עבור חיידקים בביופילם." },
            { term: "הטרוגניות בביופילם", definition: "השונות במאפיינים הפיזיים, הכימיים והביולוגיים בין אזורים שונים בתוך הביופילם, למשל, ריכוזי חמצן, pH וקצב חלוקת תאים." },
            { term: "Acquired pellicle", definition: "שכבה דקה של חלבוני רוק הנוצרת על פני שטח השן, ומשמשת כמצע הראשוני להיצמדות של חיידקים מוקדמים (early colonizers) ביצירת פלאק דנטלי." },
            { term: "טרנספורמציה", definition: "תהליך שבו תא חיידק קולט DNA חופשי מהסביבה ומשלב אותו בגנום שלו, מה שיכול להוביל לרכישת תכונות חדשות, כפי שהודגם בניסוי גריפית'." }
        ];

        const mcqData = [
            {
                question: "מהו ההסבר הסביר ביותר לכך שטיפול אנטיביוטי שהצליח לחסל זיהום דם פלנקטוני של E. coli, נכשל בטיפול בזיהום כרוני של אותו חיידק בצנתר שתן?",
                options: [
                    "החיידקים בצנתר פיתחו מוטציה גנטית ספציפית המקנה עמידות מלאה לאנטיביוטיקה.",
                    "ה-pH בשתן שונה מה-pH בדם ומנטרל את האנטיביוטיקה.",
                    "החיידקים בצנתר יצרו ביופילם, המקנה עמידות פנוטיפית מרובת גורמים כמו חדירות נמוכה של המטריצה ונוכחות תאי persister.",
                    "מערכת החיסון אינה מסוגלת להגיע לצנתר השתן ולכן הטיפול נכשל."
                ],
                correctIndex: 2,
                explanation: "היווצרות ביופילם היא ההסבר המרכזי לעמידות מוגברת וכישלון טיפולי בזיהומים על מכשור רפואי. עמידות זו נובעת ממנגנונים רבים הקשורים למבנה הביופילם ולאו דווקא ממוטציה גנטית חדשה."
            },
            {
                question: "בניסוי גריפית', מה הייתה התוצאה הצפויה לו היה מזריק לעכבר תערובת של חיידקי R חיים וחיידקי S חיים שעברו מוטציה הפוגעת ביכולתם לייצר קפסולה?",
                options: [
                    "העכבר היה מת, כי חיידקי ה-S היו מעבירים את המידע הגנטי לחיידקי ה-R.",
                    "העכבר היה שורד, כי שני סוגי החיידקים היו חסרי קפסולה ולכן לא וירולנטיים.",
                    "העכבר היה מת, כי חיידקי ה-R היו מתקנים את המוטציה בחיידקי ה-S.",
                    "העכבר היה מפתח מחלה קלה אך שורד, בגלל תחרות בין שני הזנים."
                ],
                correctIndex: 1,
                explanation: "הווירולנטיות של זן S תלויה בקפסולה. ללא הגן התקין לקפסולה (בזן S המוטנטי) וללא קפסולה (בזן R), אף אחד מהם אינו יכול לגרום למחלה קטלנית. לא מתרחשת טרנספורמציה רלוונטית."
            },
            {
                question: "איזה מהבאים מהווה את ההבדל המהותי ביותר בין קפסולה ל-Slime layer?",
                options: [
                    "קפסולה מורכבת מחלבונים וה-slime layer מפוליסכרידים.",
                    "קפסולה קיימת רק בחיידקים גראם-חיוביים, ו-slime layer רק בגראם-שליליים.",
                    "קפסולה היא שכבה מאורגנת היטב וצמודה לדופן, בעוד ש-slime layer היא שכבה מפוזרת ופחות צמודה.",
                    "קפסולה מגינה מפני יובש, ו-slime layer מגינה מפני פאגוציטוזה."
                ],
                correctIndex: 2,
                explanation: "ההבדל העיקרי הוא ברמת הארגון וההיצמדות לדופן התא. קפסולה היא מבנה מוגדר וקשיח יחסית, בעוד שה-slime layer רופף יותר. שניהם יכולים להיות מורכבים מחומרים דומים ולספק הגנה."
            },

                question: "איזה מהבאים אינו מנגנון שבאמצעותו ביופילם מקנה עמידות לאנטיביוטיקה?",
                options: [
                    "הגברת קצב החלוקה של התאים בשכבות העמוקות של הביופילם.",

                    "קיום תת-אוכלוסייה של תאים במצב מטבולי רדום (persisters)."
                ],
                correctIndex: 0,
                explanation: "להיפך, קצב החלוקה בשכבות העמוקות של הביופילם הוא לרוב איטי או אפסי. מצב זה (גידול איטי או עצירה בגידול) הוא בעצמו מנגנון עמידות, שכן אנטיביוטיקות רבות פועלות על תאים מתחלקים."
            },
            {
                question: "בפלאק הדנטלי (ביופילם על השיניים), מדוע חיידקים כמו Porphyromonas gingivalis נחשבים ל-late colonizers?",
                options: [
                    "הם גדלים לאט יותר באופן כללי מכל שאר החיידקים בפה.",
                    "הם אינם יכולים להיצמד ישירות למשטח השן (pellicle) ודורשים קולטנים על פני ה-early colonizers.",
                    "הם אנאירוביים ודורשים שה-early colonizers ייצרו סביבה דלת חמצן תחילה.",

                correctIndex: 1,
                explanation: "סדר ההתיישבות בביופילם דנטלי תלוי ביכולות ההיצמדות. חיידקים מאוחרים נקשרים לחיידקים המוקדמים שכבר התבססו, ולא ישירות לשן."
            },
            {
                question: "מהו התפקיד המשוער של eDNA (דנא חוץ-תאי) במטריצת הביופילם?",
                options: [
                    "לשמש כמקור מזון בלעדי לחיידקים בשכבות הפנימיות.",
                    "לתפקד כפיגום מבני, לייצב את המטריצה ולסייע בהיצמדות בין-תאית.",
                    "לשמש כאנטיביוטיקה טבעית כנגד חיידקים מתחרים.",
                    "להעביר מידע גנטי באופן מיידי לכל תאי הביופילם בו-זמנית."
                ],
                correctIndex: 1,
                explanation: "eDNA הוא רכיב מבני חשוב במטריצה של ביופילמים רבים. הוא תורם לקשרים בין התאים ולשלמות המבנית של המטריצה, בדומה לרכיבים פולימריים אחרים."
            },
            {
                question: "חוקר מפתח אנטיביוטיקה חדשה המבוססת על מולקולה גדולה מאוד. מדוע סביר להניח שתרופה זו תהיה פחות יעילה נגד זיהום ביופילם בהשוואה לאנטיביוטיקה קיימת המבוססת על מולקולה קטנה?",
                options: [
                    "מולקולות גדולות נוטות להיות פחות יציבות ב-pH הנמוך שבתוך הביופילם.",
                    "המטריצה הצפופה של הביופילם תפעל כמסננת פיזית ותמנע חדירה יעילה של המולקולה הגדולה.",
                    "חיידקים מפתחים עמידות מהר יותר כנגד מולקולות גדולות.",
                    "מולקולות גדולות אינן יכולות להיקשר לקולטנים על פני החיידק."
                ],
                correctIndex: 1,
                explanation: "אחד ממנגנוני ההגנה המרכזיים של ביופילם הוא הגבלת הדיפוזיה של חומרים דרך המטריצה. מולקולות גדולות יתקשו במיוחד לחדור דרך הרשת הצפופה של פולימרים."
            },
            {
                question: "איזו תכונה של קפסולה מסייעת לחיידק פתוגני לחמוק ממערכת החיסון של הפונדקאי באופן היעיל ביותר?",

        function displayCard(index) {
            if (!flashcardData || flashcardData.length === 0) return;
            const cardData = flashcardData[index];
            isCardFront = true;
            flashcardContent.style.opacity = '1';
            flashcardContent.textContent = cardData.term;
            flashcardContent.className = 'flashcard-front-style';
            cardCounter.textContent = `כרטיס ${index + 1} / ${flashcardData.length}`;
            prevCardBtn.disabled = index === 0;
            nextCardBtn.disabled = index === flashcardData.length - 1;
        }

        function flipCard() {
            if (isCardAnimating || !flashcardData || flashcardData.length === 0) return;
            isCardAnimating = true;
            flashcardContent.style.opacity = '0';
            setTimeout(() => {
                isCardFront = !isCardFront;
                const cardData = flashcardData[currentCardIndex];
                if (isCardFront) {
                    flashcardContent.textContent = cardData.term;
                    flashcardContent.className = 'flashcard-front-style';
                } else {
                    flashcardContent.textContent = cardData.definition;
                    flashcardContent.className = 'flashcard-back-style';
                }
                flashcardContent.style.opacity = '1';
                isCardAnimating = false;
            }, 300);

        function displayMCQuestion(index) {

            mcqFeedback.classList.add('hidden');

            qData.options.forEach((option, i) => {

            const isCorrect = selectedIndex === mcqData[qIndex].correctIndex;

            highlightMCQAnswer(mcqOptions, mcqFeedback, mcqExplanation, qIndex, selectedIndex);
        }
        
        function highlightMCQAnswer(optionsContainer, feedbackEl, explanationEl, qIndex, selectedIndex) {
            const qData = mcqData[qIndex];
            const buttons = optionsContainer.querySelectorAll('button');
            buttons.forEach((button, i) => {
                button.disabled = true;
                if (i === qData.correctIndex) {
                    button.style.backgroundColor = 'var(--correct-color)';
                    button.style.color = '#fff';
                    button.classList.add('correct');
                }
                if (i === selectedIndex && i !== qData.correctIndex) {
                    button.style.backgroundColor = 'var(--incorrect-color)';
                    button.style.color = '#fff';
                    button.classList.add('incorrect');
                }
            });
            feedbackEl.textContent = selectedIndex === qData.correctIndex ? "נכון!" : "לא נכון.";
            feedbackEl.className = `feedback ${selectedIndex === qData.correctIndex ? 'correct' : 'incorrect'}`;
            explanationEl.textContent = `הסבר: ${qData.explanation}`;
            explanationEl.classList.remove('hidden');
        }

        }
        
        function displayAllTF() {
             if (!tfData || tfData.length === 0) return;
             tfSingleView.classList.add('hidden');
             tfAllQuestionsContainer.innerHTML = '';
             tfData.forEach((qData, index) => {
                 const questionDiv = document.createElement('div');
                 questionDiv.className = 'question-container-all';
                 questionDiv.innerHTML = `
                     <div class="question-text">${index + 1}. ${qData.question}</div>
                     <div class="tf-options">
                         <button data-qindex="${index}" data-answer="true">נכון</button>
                         <button data-qindex="${index}" data-answer="false">לא נכון</button>
                     </div>
                     <div class="feedback hidden"></div>
                     <div class="explanation hidden"></div>
                 `;
                 tfAllQuestionsContainer.appendChild(questionDiv);
                 const optionButtons = questionDiv.querySelectorAll('.tf-options button');
                 optionButtons.forEach(button => {
                     button.onclick = () => {
                         const qIndex = parseInt(button.dataset.qindex);
                         const selectedAnswer = button.dataset.answer === 'true';
                         if (tfAnswers[qIndex] === null) {
                             const isCorrect = selectedAnswer === tfData[qIndex].answer;
                             tfAnswers[qIndex] = { selected: selectedAnswer, correct: isCorrect };
                         }
                         const optionsDiv = button.closest('.tf-options');
                         const feedbackDiv = questionDiv.querySelector('.feedback');
                         const explanationDiv = questionDiv.querySelector('.explanation');
                         highlightTFAnswer(optionsDiv, feedbackDiv, explanationDiv, qIndex, tfAnswers[qIndex].selected);
                     };
                 });
                 if (tfAnswers[index] !== null) {
                    const optionsDiv = questionDiv.querySelector('.tf-options');
                    const feedbackDiv = questionDiv.querySelector('.feedback');
                    const explanationDiv = questionDiv.querySelector('.explanation');
                    highlightTFAnswer(optionsDiv, feedbackDiv, explanationDiv, index, tfAnswers[index].selected);
                 }
             });
             tfAllQuestionsContainer.classList.remove('hidden');
        }

        function initialize() {
            if (flashcardData.length > 0) displayCard(currentCardIndex);
            if (mcqData.length > 0) displayMCQuestion(currentMCQIndex);
            if (tfData.length > 0) displayTFQuestion(currentTFIndex);
            flashcardContent.addEventListener('click', flipCard);
            prevCardBtn.addEventListener('click', () => { if (currentCardIndex > 0) { currentCardIndex--; displayCard(currentCardIndex); } });
            nextCardBtn.addEventListener('click', () => { if (currentCardIndex < flashcardData.length - 1) { currentCardIndex++; displayCard(currentCardIndex); } });
            prevMCQBtn.addEventListener('click', () => { if (currentMCQIndex > 0) { currentMCQIndex--; displayMCQuestion(currentMCQIndex); } });
            nextMCQBtn.addEventListener('click', () => { if (currentMCQIndex < mcqData.length - 1) { currentMCQIndex++; displayMCQuestion(currentMCQIndex); } });
            viewAllMCQBtn.addEventListener('click', displayAllMCQ);
            prevTFBtn.addEventListener('click', () => { if (currentTFIndex > 0) { currentTFIndex--; displayTFQuestion(currentTFIndex); } });
            nextTFBtn.addEventListener('click', () => { if (currentTFIndex < tfData.length - 1) { currentTFIndex++; displayTFQuestion(currentTFIndex); } });
            viewAllTFBtn.addEventListener('click', displayAllTF);
        }
        
        initialize();
    });
    </script>
</body>
</html>
