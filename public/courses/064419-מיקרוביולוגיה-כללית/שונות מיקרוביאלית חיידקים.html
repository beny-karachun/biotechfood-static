<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Study Tool</title>
    <style>
        /* --- Root Variables for Consistent Theming --- */
        :root {
            --primary-bg: #333333;
            --secondary-bg: #666666;
            --accent-color: #3D90D7;
            --text-color: #E0E0E0;
            --correct-color: #4CAF50;
            --incorrect-color: #F44336;
            --card-bg: #5a5a5a;
        }

        /* --- Global Styles --- */
        body {
            background-color: var(--primary-bg);
            color: var(--text-color);
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 90%; /* As per prompt */
            margin: 20px auto;
            padding: 20px;
            background-color: var(--secondary-bg);
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        h1, h2 {
            color: var(--accent-color);
            text-align: center;
            border-bottom: 1px solid var(--accent-color);
            padding-bottom: 10px;
        }

        .section {
            background-color: var(--primary-bg);
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 8px;
        }

        /* --- Study Cards Styling (Fade Animation) --- */
        .flashcard-container {
            height: 250px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #flashcard-content {
            width: 100%;
            height: 100%;
            background-color: var(--card-bg);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            transition: opacity 0.3s ease-in-out; /* Fade transition */
        }
        
        .flashcard-front-style {
             font-size: 1.5em;
             font-weight: bold;
        }
        
        .flashcard-back-style {
             font-size: 1.1em;
        }

        /* --- Questions Styling (MCQ & T/F) --- */
         .question-container-single, .question-container-all {
            margin-bottom: 15px;
            padding: 15px;
            border: 1px solid var(--secondary-bg);
            border-radius: 5px;
         }

        .question-text {
            font-weight: bold;
            margin-bottom: 15px;
        }

        .options button, .tf-options button {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-align: right;
            transition: background-color 0.3s;
        }

        .options button:hover:not(:disabled), .tf-options button:hover:not(:disabled) {
            background-color: #357ab8;
        }

        .options button:disabled, .tf-options button:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
        
        /* Specific styling to override disabled opacity for correct/incorrect answers */
        .options button.correct, .tf-options button.correct { opacity: 1; }
        .options button.incorrect, .tf-options button.incorrect { opacity: 1; }


        .feedback {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
        }

        .feedback.correct {
            background-color: var(--correct-color);
            color: #fff;
        }

        .feedback.incorrect {
            background-color: var(--incorrect-color);
            color: #fff;
        }

        .explanation {
            margin-top: 10px;
            font-style: italic;
            font-size: 0.9em;
            padding: 8px;
            background-color: var(--secondary-bg);
            border-radius: 4px;
        }

        /* --- Navigation & Utility Styling --- */
        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            margin-bottom: 10px;
        }

        .nav-button, .view-all-button {
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
        }

        .nav-button:disabled {
             opacity: 0.5;
             cursor: not-allowed;
        }

        .counter {
            font-size: 0.9em;
        }

        .view-all-container {
            text-align: center;
            margin-top: 15px;
            margin-bottom: 15px;
        }

        .hidden {
            display: none;
        }

        #mcq-all-questions .question-container-all,
        #tf-all-questions .question-container-all {
            margin-bottom: 20px;
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>מגוון עולם החיידקים</h1>

        <!-- Study Cards Section -->
        <div class="section">
            <h2>כרטיסי לימוד</h2>
            <div class="flashcard-container">
                <div id="flashcard-content"></div>
            </div>
            <div class="navigation">
                <button class="nav-button" id="prev-card">הקודם</button>
                <span class="counter" id="card-counter"></span>
                <button class="nav-button" id="next-card">הבא</button>
            </div>
        </div>

        <!-- Multiple Choice Questions Section -->
        <div class="section">
            <h2>שאלות רב-ברירה (אמריקאיות)</h2>
            <div id="mcq-single-view">
                <div class="question-container-single" id="mcq-container">
                    <div class="question-text" id="mcq-question"></div>
                    <div class="options" id="mcq-options"></div>
                    <div class="feedback hidden" id="mcq-feedback"></div>
                    <div class="explanation hidden" id="mcq-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-mcq">הקודם</button>
                    <span class="counter" id="mcq-counter"></span>
                    <button class="nav-button" id="next-mcq">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-mcq">הצג את כל השאלות</button>
                 </div>
            </div>
            <div id="mcq-all-questions" class="hidden">
                <!-- All MCQs will be dynamically inserted here -->
            </div>
        </div>

        <!-- True/False Questions Section -->
        <div class="section">
            <h2>שאלות נכון/לא נכון</h2>
             <div id="tf-single-view">
                <div class="question-container-single" id="tf-container">
                    <div class="question-text" id="tf-question"></div>
                    <div class="tf-options" id="tf-options">
                        <button data-answer="true">נכון</button>
                        <button data-answer="false">לא נכון</button>
                    </div>
                    <div class="feedback hidden" id="tf-feedback"></div>
                    <div class="explanation hidden" id="tf-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-tf">הקודם</button>
                    <span class="counter" id="tf-counter"></span>
                    <button class="nav-button" id="next-tf">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-tf">הצג את כל השאלות</button>
                 </div>
            </div>
             <div id="tf-all-questions" class="hidden">
                 <!-- All T/F Questions will be dynamically inserted here -->
             </div>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        
        const flashcardData = [
            { term: "Proteobacteria", definition: "מערכה (פילום) גדולה של חיידקים גראם-שליליים, בעלי מגוון מטבולי עצום הכולל פוטוטרופים, כימוליתוטרופים וכימואורגנוטרופים." },
            { term: "Bacteriochlorophyll", definition: "קבוצת פיגמנטים פוטוסינתטיים עיקריים המצויים בחיידקים פוטוטרופיים אנאוקסיגניים, הבולעים אור באורכי גל ארוכים (אינפרא-אדום)." },
            { term: "Carotenoids", definition: "פיגמנטים משניים המסייעים בפוטוסינתזה על ידי קליטת אור והעברת אנרגיה לבקטריוכלורופיל, וכן מספקים הגנה מפני נזקי חמצון." },
            { term: "Nitrification", definition: "תהליך חמצון ביולוגי דו-שלבי של אמוניה ($NH_3$) לניטרט ($NO_3^-$), המבוצע על ידי קבוצות שונות של חיידקים כימוליתואוטוטרופיים." },
            { term: "Ammonia monooxygenase", definition: "אנזים מפתח בשלב הראשון של ניטריפיקציה, המחמצן אמוניה ($NH_3$) להידרוקסילאמין ($NH_2OH$) תוך שימוש בחמצן." },
            { term: "Purple Sulfur Bacteria", definition: "חיידקים פוטוטרופיים אנאוקסיגניים המשתמשים בתרכובות גופרית מחוזרות כתורם אלקטרונים. רובם שייכים לגמא-פרוטאובקטריה." },
            { term: "Purple Nonsulfur Bacteria", definition: "חיידקים פוטוהטרוטרופיים המשתמשים בתרכובות אורגניות כתורם אלקטרונים, ומצויים בעיקר בקבוצות אלפא ובטא-פרוטאובקטריה." },
            { term: "Rickettsia", definition: "סוג של טפילים תוך-תאיים אובליגטוריים, המועברים על ידי פרוקי-רגליים וגורמים למחלות כמו טיפוס וקדחת הכתמים. שייכים לאלפא-פרוטאובקטריה." },
            { term: "Lactic Acid Bacteria", definition: "קבוצה של חיידקים גראם-חיוביים, אנאירוביים אוויר-סובלניים, המייצרים חומצה לקטית כתור תוצר תסיסה עיקרי וחסרי ציטוכרומים." },
            { term: "Homofermentative", definition: "מסלול תסיסה בחיידקי חומצת חלב המייצר שני מולקולות לקטט ממולקולת גלוקוז אחת, תוך רווח נקי של 2 מולקולות ATP." },
            { term: "Heterofermentative", definition: "מסלול תסיסה בחיידקי חומצת חלב המייצר לקטט, אתנול ופחמן דו-חמצני מגלוקוז, תוך רווח נקי של 1 מולקולת ATP." },
            { term: "Cyanobacteria", definition: "מערכה של חיידקים המבצעים פוטוסינתזה אוקסיגנית (משחררת חמצן), בעלי כלורופיל a ופיקובילינים." },
            { term: "Heterocyst", definition: "תא מיוחד בציאנובקטריה חוטית האחראי על קיבוע חנקן אטמוספרי בסביבה אנארובית שהוא יוצר כדי להגן על אנזים הניטרוגנאז." },
            { term: "Planctomycetes", definition: "מערכת חיידקים ייחודית חסרת פפטידוגליקן בדופן התא, ובעלת קומפרטמנטליזציה פנימית מורכבת." },
            { term: "Chlorosome", definition: "מבנה אנטנה ייחודי ויעיל ביותר לקליטת אור בעוצמה נמוכה, המצוי בחיידקי גופרית ירוקים (Green Sulfur Bacteria)." },
            { term: "Hyperthermophiles", definition: "אורגניזמים הגדלים בטמפרטורות גבוהות מאוד, מעל 80 מעלות צלזיוס. רבים מהם, כמו Aquifex, ממוקמים בבסיס העץ הפילוגנטי החיידקי." },
            { term: "Wolbachia", definition: "סוג של חיידק אנדוסימביונטי הנפוץ בפרוקי-רגליים ויכול לשנות את הביולוגיה הרבייתית של המארח (למשל, הרג זכרים, פמיניזציה)." },
            { term: "Koch's Postulates", definition: "ארבעה קריטריונים שנועדו לקבוע באופן שיטתי קשר סיבתי בין מיקרואורגניזם גורם מחלה למחלה ספציפית." }
        ];

        const mcqData = [
            {
                question: "איזה מהמאפיינים הבאים מבדיל באופן מהותי בין חיידקי גופרית סגולים (Purple Sulfur Bacteria) לחיידקים סגולים ללא-גופרית (Purple Nonsulfur Bacteria)?",
                options: [
                    "הימצאות בקטריוכלורופיל a לעומת כלורופיל a",
                    "ביצוע פוטוסינתזה אוקסיגנית לעומת אנאוקסיגנית",
                    "שימוש עיקרי בתרכובות גופרית מחוזרות לעומת תרכובות אורגניות כתורם אלקטרונים",
                    "השתייכות לקבוצת הגראם-חיוביים לעומת הגראם-שליליים"
                ],
                correctIndex: 2,
                explanation: "ההבדל המטבולי המרכזי הוא מקור תורם האלקטרונים: חיידקי גופרית סגולים הם לרוב פוטוליתואוטוטרופים המשתמשים ב-$H_2S$, בעוד שחיידקים סגולים ללא-גופרית הם לרוב פוטוהטרוטרופים המשתמשים במולקולות אורגניות."
            },
            {
                question: "מהי התוצאה הסופית של זיהום זכר ונקבה לא נגועים בחיידק Wolbachia, על פי מודל אי-ההתאמה הציטופלזמטית?",
                options: [
                    "צאצאים נגועים",
                    "צאצאים לא נגועים",
                    "אין צאצאים",
                    "רק צאצאים זכרים"
                ],
                correctIndex: 2,
                explanation: "במקרה של אי-התאמה ציטופלזמטית, כאשר זכר נגוע מזדווג עם נקבה לא נגועה, לא נוצרים צאצאים. זהו אחד המנגנונים שבהם החיידק מבטיח את התפשטותו דרך קו הנקבה."
            },
            {
                question: "איזה מהשינויים המבניים הבאים הוא ההבדל המרכזי בין כלורופיל a לבקטריוכלורופיל a, המשפיע על ספקטרום הבליעה שלהם?",
                options: [
                    "החלפת יון המגנזיום המרכזי בברזל",
                    "חיזור של אחת מטבעות הפירול ושינוי מתמרים צדדיים",
                    "הוספת זנב פחמימני מסוג פרנזיל במקום פיטול",
                    "היעדר טבעת הציקלופנטנון החמישית"
                ],
                correctIndex: 1,
                explanation: "בבקטריוכלורופיל a, טבעת הפירול II מחוזרת (יש לה קשר יחיד במקום כפול), וישנה החלפה של קבוצת ויניל בקבוצת אצטיל. שינויים אלה גורמים להסטת שיא הבליעה לאורכי גל ארוכים יותר."
            },
            {
                question: "חיידק המבצע תסיסה הומולקטית צורך 2 מולקולות גלוקוז. כמה ATP נטו הוא יפיק, וכמה מולקולות לקטט ייווצרו?",
                options: [
                    "2 ATP, 2 לקטט",
                    "2 ATP, 4 לקטט",
                    "4 ATP, 2 לקטט",
                    "4 ATP, 4 לקטט"
                ],
                correctIndex: 3,
                explanation: "בתסיסה הומולקטית, כל מולקולת גלוקוז מניבה רווח נקי של 2 ATP ו-2 מולקולות לקטט. לכן, עבור 2 מולקולות גלוקוז, התוצאה תהיה $2 * 2 = 4$ ATP ו-$2 * 2 = 4$ לקטט."
            },
            {
                question: "איזו קבוצת חיידקים מאופיינת בהיעדר פפטידוגליקן בדופן התא, קומפרטמנטליזציה פנימית מורכבת, ולעיתים מבנים דמויי גבעול להיצמדות?",
                options: [
                    "Spirochetes",
                    "Cyanobacteria",
                    "Planctomycetes",
                    "Actinomycetes"
                ],
                correctIndex: 2,
                explanation: "Planctomycetes הם מערכה ייחודית של חיידקים מימיים הידועים בהיעדר פפטידוגליקן, דופן מבוסס חלבון, ומבנים פנימיים מורכבים כמו הפירלולוזום."
            },
            {
                question: "מדוע הטרציסטים בציאנובקטריה חיוניים ליכולת קיבוע החנקן של האורגניזם?",
                options: [
                    "הם מכילים כמות גדולה יותר של כלורופיל a לטובת אנרגיה",
                    "הם מייצרים סביבה אנארובית המגינה על אנזים הניטרוגנאז הרגיש לחמצן",
                    "הם מאחסנים את החנקן המקובע בצורת גרגרי ציאנופיצין",
                    "הם היחידים שמסוגלים לקלוט גז חנקן מהאטמוספירה"
                ],
                correctIndex: 1,
                explanation: "אנזים הניטרוגנאז, המבצע את קיבוע החנקן ($N_2 \rightarrow NH_3$), עובר דנטורציה בלתי הפיכה בנוכחות חמצן. ההטרציסט מפתח דופן עבה ומפסיק את הפוטוסינתזה האוקסיגנית כדי ליצור תנאים אנארוביים פנימיים."
            },
            {
                question: "איזו מהקבוצות הבאות שייכת לתת-הקבוצה גמא-פרוטאובקטריה (Gammaproteobacteria)?",
                options: [
                    "Rickettsia, Rhizobium",
                    "Nitrosomonas, Neisseria",
                    "Escherichia, Vibrio, Salmonella",
                    "Myxococcus, Bdellovibrio"
                ],
                correctIndex: 2,
                explanation: "Escherichia, Vibrio, Salmonella ו-Photobacterium הם כולם סוגים ידועים וחשובים בתת-הקבוצה גמא. Rickettsia ו-Rhizobium הם אלפא, Nitrosomonas ו-Neisseria הם בטא, ו-Myxococcus ו-Bdellovibrio הם דלתא."
            },
            {
                question: "מהו המאפיין המטבולי המרכזי של חיידקי Nitrobacter בתהליך הניטריפיקציה?",
                options: [
                    "חמצון אמוניה ($NH_3$) להידרוקסילאמין ($NH_2OH$)",
                    "חמצון ניטריט ($NO_2^-$) לניטרט ($NO_3^-$)",
                    "חיזור ניטרט ($NO_3^-$) לגז חנקן ($N_2$)",
                    "קיבוע חנקן אטמוספרי ($N_2$) לאמוניה ($NH_3$)"
                ],
                correctIndex: 1,
                explanation: "תהליך הניטריפיקציה הוא דו-שלבי. Nitrobacter (וחיידקים דומים) מבצעים את השלב השני, חמצון של ניטריט לניטרט, תוך שימוש באנזים Nitrite oxidase."
            },
            {
                question: "איזו קומבינציה של פיגמנטים פוטוסינתטיים אופיינית לציאנובקטריה ומאפשרת להן לבצע פוטוסינתזה אוקסיגנית?",
                options: [
                    "בקטריוכלורופיל a וקרוטנואידים אריליים",
                    "כלורופיל a ופיקובילינים (פיקוציאנין, פיקואריתרין)",
                    "בקטריוכלורופיל g ונוירוספורן",
                    "כלורופיל a ובקטריוכלורופיל c"

            { question: "כלורופיל a ובקטריוכלורופיל a זהים במבנה הכימי שלהם.", answer: false, explanation: "ישנם הבדלים מבניים. לדוגמה, בבקטריוכלורופיל a יש קבוצת אצטיל במקום קבוצת ויניל בעמדה C3, והטבעת הפירולית השנייה מחוזרת." },
            { question: "החיידק Coxiella burnetii, הגורם לקדחת Q, מתמקם בציטופלזמה של התא המארח, בדומה ל-Rickettsia.", answer: false, explanation: "Coxiella מתמקם ומתרבה בתוך וקואולות (חלוליות) פאגו-ליזוזומליות חומציות בתוך תא המארח, ולא בציטופלזמה החופשית." },
            { question: "חיידקים מסוג Nitrobacter מחמצנים אמוניה לניטריט.", answer: false, explanation: "Nitrobacter מבצע את השלב השני של הניטריפיקציה: חמצון ניטריט ($NO_2^-$) לניטרט ($NO_3^-$). חיידקים כמו Nitrosomonas מחמצנים אמוניה לניטריט." },
            { question: "תהליך הביולומינצסנציה בחיידקים כמו Vibrio fischeri דורש סביבה אנארובית לחלוטין.", answer: false, explanation: "התגובה הכימית המייצרת אור, המזורזת על ידי האנזים לוציפראז, דורשת חמצן מולקולרי ($O_2$), ולכן מתרחשת בתנאים אירוביים." },
            { question: "החיידק Bdellovibrio הוא טפיל הניזון מתכולת תאים של חיידקים אחרים, והוא משתייך לקבוצת הגמא-פרוטאובקטריה.", answer: false, explanation: "Bdellovibrio הוא אכן טפיל של חיידקים אחרים, אך הוא משתייך לקבוצת הדלתא-פרוטאובקטריה (Deltaproteobacteria)." },
            { question: "קרוטנואידים אליפטיים ואריליים מופיעים באותן קבוצות חיידקים פוטוטרופיים ללא הבחנה.", answer: false, explanation: "ישנה התמחות. לדוגמה, קרוטנואידים אריליים כמו Chlorobactene נמצאים בחיידקי גופרית ירוקים, בעוד שקרוטנואידים אליפטיים כמו Spirilloxanthin אופייניים לחיידקים סגולים." },
            { question: "כל החיידקים מהסוג Rhodospirillum הם בעלי צורת מתג ומתחלקים על ידי הנצה.", answer: false, explanation: "Rhodospirillum מאופיין בצורת ספירלה ונע באמצעות שוטונים קוטביים. הסוג Rhodopseudomonas, לעומת זאת, הוא בעל צורת מתג ומתחלק על ידי הנצה." },
            { question: "תכולת ה-GC ב-DNA של חיידקי Proteobacteria היא אחידה בכל תת-הקבוצות.", answer: false, explanation: "ישנה שונות רבה בתכולת ה-GC בין סוגים שונים של פרוטאובקטריה, למשל, Rickettsia עם 29-33% לעומת Nitrobacter עם 59-62%." },
            { question: "החיידק Aquifex הוא היפרתרמופיל המבצע פוטוסינתזה באמצעות בקטריוכלורופיל.", answer: false, explanation: "Aquifex הוא כימוליתואוטוטרוף המשתמש בתגובות כימיות (כמו חמצון מימן) להפקת אנרגיה, ולא פוטוטרוף. הוא אינו מכיל בקטריוכלורופיל." },
            { question: "הפוטוסינתזה בחיידקי הליובקטריה (Heliobacteria) היא אוקסיגנית, בדומה לציאנובקטריה.", answer: false, explanation: "הליובקטריה הם היחידים מהחיידקים הגראם-חיוביים המבצעים פוטוסינתזה, אך היא אנאוקסיגנית ומשתמשת בבקטריוכלורופיל g ייחודי." }
        ];


        // --- Global State Variables ---
        let currentCardIndex = 0;
        let isCardFront = true;
        let isCardAnimating = false;
        let currentMCQIndex = 0;
        let currentTFIndex = 0;
        let mcqAnswers = new Array(mcqData.length).fill(null);
        let tfAnswers = new Array(tfData.length).fill(null);

        // --- DOM Element References ---
        const flashcardContent = document.getElementById('flashcard-content');
        const cardCounter = document.getElementById('card-counter');
        const prevCardBtn = document.getElementById('prev-card');
        const nextCardBtn = document.getElementById('next-card');
        const mcqQuestion = document.getElementById('mcq-question');
        const mcqOptions = document.getElementById('mcq-options');
        const mcqFeedback = document.getElementById('mcq-feedback');
        const mcqExplanation = document.getElementById('mcq-explanation');
        const mcqCounter = document.getElementById('mcq-counter');
        const prevMCQBtn = document.getElementById('prev-mcq');
        const nextMCQBtn = document.getElementById('next-mcq');
        const viewAllMCQBtn = document.getElementById('view-all-mcq');
        const mcqSingleView = document.getElementById('mcq-single-view');
        const mcqAllQuestionsContainer = document.getElementById('mcq-all-questions');
        const tfQuestion = document.getElementById('tf-question');
        const tfOptionsContainer = document.getElementById('tf-options');
        const tfFeedback = document.getElementById('tf-feedback');
        const tfExplanation = document.getElementById('tf-explanation');
        const tfCounter = document.getElementById('tf-counter');
        const prevTFBtn = document.getElementById('prev-tf');
        const nextTFBtn = document.getElementById('next-tf');
        const viewAllTFBtn = document.getElementById('view-all-tf');
        const tfSingleView = document.getElementById('tf-single-view');
        const tfAllQuestionsContainer = document.getElementById('tf-all-questions');

        function displayCard(index) {
            if (!flashcardData || flashcardData.length === 0) return;
            const cardData = flashcardData[index];
            isCardFront = true;
            flashcardContent.style.opacity = '1';
            flashcardContent.innerHTML = cardData.term;
            flashcardContent.className = 'flashcard-front-style';
            cardCounter.textContent = `כרטיס ${index + 1} / ${flashcardData.length}`;
            prevCardBtn.disabled = index === 0;
            nextCardBtn.disabled = index === flashcardData.length - 1;
        }

        function flipCard() {
            if (isCardAnimating || !flashcardData || flashcardData.length === 0) return;
            isCardAnimating = true;
            flashcardContent.style.opacity = '0';
            setTimeout(() => {
                isCardFront = !isCardFront;
                const cardData = flashcardData[currentCardIndex];
                if (isCardFront) {
                    flashcardContent.innerHTML = cardData.term;
                    flashcardContent.className = 'flashcard-front-style';
                } else {
                    flashcardContent.innerHTML = cardData.definition;
                    flashcardContent.className = 'flashcard-back-style';
                }
                flashcardContent.style.opacity = '1';
                isCardAnimating = false;
            }, 300);
        }

        function displayMCQuestion(index) {
            if (!mcqData || mcqData.length === 0) return;
            const qData = mcqData[index];
            mcqQuestion.innerHTML = qData.question;
            mcqOptions.innerHTML = '';
            mcqFeedback.classList.add('hidden');
            mcqExplanation.classList.add('hidden');
            qData.options.forEach((option, i) => {
                const button = document.createElement('button');
                button.innerHTML = option;
                button.onclick = () => handleMCQAnswer(index, i);
                mcqOptions.appendChild(button);
            });
            mcqCounter.textContent = `שאלה ${index + 1} / ${mcqData.length}`;
            prevMCQBtn.disabled = index === 0;
            nextMCQBtn.disabled = index === mcqData.length - 1;
            if (mcqAnswers[index] !== null) {
                highlightMCQAnswer(mcqOptions, mcqFeedback, mcqExplanation, index, mcqAnswers[index].selected);
            }
        }

        function handleMCQAnswer(qIndex, selectedIndex) {
            if (mcqAnswers[qIndex] !== null) return;
            const isCorrect = selectedIndex === mcqData[qIndex].correctIndex;
            mcqAnswers[qIndex] = { selected: selectedIndex, correct: isCorrect };
            highlightMCQAnswer(mcqOptions, mcqFeedback, mcqExplanation, qIndex, selectedIndex);
        }
        
        function highlightMCQAnswer(optionsContainer, feedbackEl, explanationEl, qIndex, selectedIndex) {
            const qData = mcqData[qIndex];
            const buttons = optionsContainer.querySelectorAll('button');
            buttons.forEach((button, i) => {
                button.disabled = true;
                if (i === qData.correctIndex) {
                    button.style.backgroundColor = 'var(--correct-color)';
                    button.style.color = '#fff';
                    button.classList.add('correct');
                }
                if (i === selectedIndex && i !== qData.correctIndex) {
                    button.style.backgroundColor = 'var(--incorrect-color)';
                    button.style.color = '#fff';
                    button.classList.add('incorrect');
                }
            });
            feedbackEl.textContent = selectedIndex === qData.correctIndex ? "נכון!" : "לא נכון.";
            feedbackEl.className = `feedback ${selectedIndex === qData.correctIndex ? 'correct' : 'incorrect'}`;
            explanationEl.innerHTML = `הסבר: ${qData.explanation}`;
            explanationEl.classList.remove('hidden');
        }

        function displayAllMCQ() {
            if (!mcqData || mcqData.length === 0) return;
            mcqSingleView.classList.add('hidden');
            mcqAllQuestionsContainer.innerHTML = ''; 
            mcqData.forEach((qData, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question-container-all';
                questionDiv.innerHTML = `
                    <div class="question-text">${index + 1}. ${qData.question}</div>
                    <div class="options">
                        ${qData.options.map((option, i) => `<button data-qindex="${index}" data-oindex="${i}">${option}</button>`).join('')}
                    </div>
                    <div class="feedback hidden"></div>
                    <div class="explanation hidden"></div>
                `;
                mcqAllQuestionsContainer.appendChild(questionDiv);
                 const optionButtons = questionDiv.querySelectorAll('.options button');
                 optionButtons.forEach(button => {
                     button.onclick = () => {
                        const qIndex = parseInt(button.dataset.qindex);
                        const oIndex = parseInt(button.dataset.oindex);
                        if (mcqAnswers[qIndex] === null) {
                            const isCorrect = oIndex === mcqData[qIndex].correctIndex;
                            mcqAnswers[qIndex] = { selected: oIndex, correct: isCorrect };
                        }
                        const optionsDiv = button.closest('.options');
                        const feedbackDiv = questionDiv.querySelector('.feedback');
                        const explanationDiv = questionDiv.querySelector('.explanation');
                        highlightMCQAnswer(optionsDiv, feedbackDiv, explanationDiv, qIndex, mcqAnswers[qIndex].selected);
                     };
                 });
                 if (mcqAnswers[index] !== null) {
                    const optionsDiv = questionDiv.querySelector('.options');
                    const feedbackDiv = questionDiv.querySelector('.feedback');
                    const explanationDiv = questionDiv.querySelector('.explanation');
                    highlightMCQAnswer(optionsDiv, feedbackDiv, explanationDiv, index, mcqAnswers[index].selected);
                 }
            });
            mcqAllQuestionsContainer.classList.remove('hidden');
        }

        function displayTFQuestion(index) {
            if (!tfData || tfData.length === 0) return;
            const qData = tfData[index];
            tfQuestion.innerHTML = qData.question;
            tfFeedback.classList.add('hidden');
            tfExplanation.classList.add('hidden');
             const buttons = tfOptionsContainer.querySelectorAll('button');
             buttons.forEach(button => {
                 button.disabled = false;
                 button.style.backgroundColor = '';
                 button.style.color = '';
                 button.classList.remove('correct', 'incorrect');
                 button.onclick = () => handleTFAnswer(index, button.dataset.answer === 'true');
             });
            tfCounter.textContent = `שאלה ${index + 1} / ${tfData.length}`;
            prevTFBtn.disabled = index === 0;
            nextTFBtn.disabled = index === tfData.length - 1;
            if (tfAnswers[index] !== null) {
                highlightTFAnswer(tfOptionsContainer, tfFeedback, tfExplanation, index, tfAnswers[index].selected);
            }
        }
        
        function handleTFAnswer(qIndex, selectedAnswer) {
            if (tfAnswers[qIndex] !== null) return;
            const isCorrect = selectedAnswer === tfData[qIndex].answer;
            tfAnswers[qIndex] = { selected: selectedAnswer, correct: isCorrect };
            highlightTFAnswer(tfOptionsContainer, tfFeedback, tfExplanation, qIndex, selectedAnswer);
        }
        
        function highlightTFAnswer(optionsContainer, feedbackEl, explanationEl, qIndex, selectedAnswer) {
             const qData = tfData[qIndex];
             const buttons = optionsContainer.querySelectorAll('button');
             buttons.forEach(button => {
                 const buttonAnswer = button.dataset.answer === 'true';
                 button.disabled = true;
                 if (buttonAnswer === qData.answer) {
                     button.style.backgroundColor = 'var(--correct-color)';
                     button.style.color = '#fff';
                     button.classList.add('correct');
                 }
                 if (buttonAnswer === selectedAnswer && buttonAnswer !== qData.answer) {
                     button.style.backgroundColor = 'var(--incorrect-color)';
                     button.style.color = '#fff';
                     button.classList.add('incorrect');
                 }
             });
             feedbackEl.textContent = selectedAnswer === qData.answer ? "נכון!" : "לא נכון.";
             feedbackEl.className = `feedback ${selectedAnswer === qData.answer ? 'correct' : 'incorrect'}`;
             explanationEl.innerHTML = `הסבר: ${qData.explanation}`;
             explanationEl.classList.remove('hidden');
        }
        
        function displayAllTF() {
             if (!tfData || tfData.length === 0) return;
             tfSingleView.classList.add('hidden');
             tfAllQuestionsContainer.innerHTML = '';
             tfData.forEach((qData, index) => {
                 const questionDiv = document.createElement('div');
                 questionDiv.className = 'question-container-all';
                 questionDiv.innerHTML = `
                     <div class="question-text">${index + 1}. ${qData.question}</div>
                     <div class="tf-options">
                         <button data-qindex="${index}" data-answer="true">נכון</button>
                         <button data-qindex="${index}" data-answer="false">לא נכון</button>
                     </div>
                     <div class="feedback hidden"></div>
                     <div class="explanation hidden"></div>
                 `;
                 tfAllQuestionsContainer.appendChild(questionDiv);
                 const optionButtons = questionDiv.querySelectorAll('.tf-options button');
                 optionButtons.forEach(button => {
                     button.onclick = () => {
                         const qIndex = parseInt(button.dataset.qindex);
                         const selectedAnswer = button.dataset.answer === 'true';
                         if (tfAnswers[qIndex] === null) {
                             const isCorrect = selectedAnswer === tfData[qIndex].answer;
                             tfAnswers[qIndex] = { selected: selectedAnswer, correct: isCorrect };
                         }
                         const optionsDiv = button.closest('.tf-options');
                         const feedbackDiv = questionDiv.querySelector('.feedback');
                         const explanationDiv = questionDiv.querySelector('.explanation');
                         highlightTFAnswer(optionsDiv, feedbackDiv, explanationDiv, qIndex, tfAnswers[qIndex].selected);
                     };
                 });
                 if (tfAnswers[index] !== null) {
                    const optionsDiv = questionDiv.querySelector('.tf-options');
                    const feedbackDiv = questionDiv.querySelector('.feedback');
                    const explanationDiv = questionDiv.querySelector('.explanation');
                    highlightTFAnswer(optionsDiv, feedbackDiv, explanationDiv, index, tfAnswers[index].selected);
                 }
             });
             tfAllQuestionsContainer.classList.remove('hidden');
        }

        function initialize() {
            if (flashcardData.length > 0) displayCard(currentCardIndex);
            if (mcqData.length > 0) displayMCQuestion(currentMCQIndex);
            if (tfData.length > 0) displayTFQuestion(currentTFIndex);
            flashcardContent.addEventListener('click', flipCard);
            prevCardBtn.addEventListener('click', () => { if (currentCardIndex > 0) { currentCardIndex--; displayCard(currentCardIndex); } });
            nextCardBtn.addEventListener('click', () => { if (currentCardIndex < flashcardData.length - 1) { currentCardIndex++; displayCard(currentCardIndex); } });
            prevMCQBtn.addEventListener('click', () => { if (currentMCQIndex > 0) { currentMCQIndex--; displayMCQuestion(currentMCQIndex); } });
            nextMCQBtn.addEventListener('click', () => { if (currentMCQIndex < mcqData.length - 1) { currentMCQIndex++; displayMCQuestion(currentMCQIndex); } });
            viewAllMCQBtn.addEventListener('click', displayAllMCQ);
            prevTFBtn.addEventListener('click', () => { if (currentTFIndex > 0) { currentTFIndex--; displayTFQuestion(currentTFIndex); } });
            nextTFBtn.addEventListener('click', () => { if (currentTFIndex < tfData.length - 1) { currentTFIndex++; displayTFQuestion(currentTFIndex); } });
            viewAllTFBtn.addEventListener('click', displayAllTF);
        }
        
        initialize();
    });
    </script>
</body>
</html>
