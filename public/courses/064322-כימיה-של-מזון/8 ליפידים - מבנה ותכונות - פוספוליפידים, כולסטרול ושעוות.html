<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Study Tool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* --- Root Variables: Glassmorphism Dark Theme --- */
        :root {
            --primary-bg: #0a0a0f;
            --secondary-bg: rgba(255,255,255,0.03);
            --accent-color: #6C63FF;
            --accent-secondary: #A855F7;
            --accent-gradient: linear-gradient(135deg, #6C63FF, #A855F7);
            --text-color: #e2e8f0;
            --text-muted: #94a3b8;
            --correct-color: #22c55e;
            --incorrect-color: #ef4444;
            --card-bg: rgba(255,255,255,0.04);
            --eureka-bg: rgba(168,85,247,0.08);
            --eureka-border: #A855F7;
            --glass-bg: rgba(255,255,255,0.03);
            --glass-border: rgba(255,255,255,0.06);
            --glass-blur: blur(12px);
            --radius: 16px;
            --radius-sm: 10px;
        }

        @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
        @keyframes slideIn { from { opacity:0; transform:translateX(-16px); } to { opacity:1; transform:translateX(0); } }
        @keyframes cardIn { from { opacity:0; transform:scale(.96); } to { opacity:1; transform:scale(1); } }
        @keyframes shimmer { 0%{ background-position:-200% 0; } 100%{ background-position:200% 0; } }
        @keyframes pulse { 0%,100%{ opacity:1; } 50%{ opacity:.6; } }
        @keyframes glowPulse { 0%,100%{ box-shadow:0 0 20px rgba(108,99,255,.15); } 50%{ box-shadow:0 0 30px rgba(168,85,247,.25); } }

        *{ box-sizing:border-box; }

        body {
            background-color: var(--primary-bg);
            background-image:
                radial-gradient(ellipse 80% 50% at 20% 60%, rgba(108,99,255,.08), transparent),
                radial-gradient(ellipse 60% 40% at 80% 30%, rgba(168,85,247,.06), transparent);
            color: var(--text-color);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            line-height: 1.7;
            margin: 0;
            padding: 24px 16px;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 32px 28px;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            box-shadow: 0 8px 32px rgba(0,0,0,.4);
            animation: fadeIn .6s ease-out;
        }

        h1 {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            font-weight: 700;
            font-size: 1.75em;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 16px;
            margin-top: 0;
            letter-spacing: -.02em;
        }

        h2 {
            color: var(--text-color);
            text-align: center;
            font-weight: 600;
            font-size: 1.3em;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 12px;
            letter-spacing: -.01em;
        }

        .section {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            padding: 24px;
            margin-bottom: 28px;
            border-radius: var(--radius);
            animation: cardIn .5s ease-out both;
        }
        .section:nth-child(2){ animation-delay:.1s; }
        .section:nth-child(3){ animation-delay:.2s; }
        .section:nth-child(4){ animation-delay:.3s; }
        .section:nth-child(5){ animation-delay:.4s; }

        .theory-text { font-size:1.05em; line-height:1.85; color:var(--text-muted); }
        .theory-text ul { padding-right:20px; }
        .theory-text li { margin-bottom:8px; }
        .theory-text h3 {
            color:#fff; margin-top:28px; margin-bottom:12px;
            border-bottom:none; text-align:right;
            font-weight:600; font-size:1.1em;
        }

        .eureka-box {
            background: var(--eureka-bg);
            border-right: 3px solid var(--eureka-border);
            padding: 18px 20px;
            margin: 24px 0;
            border-radius: var(--radius-sm);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-top: 1px solid rgba(168,85,247,.12);
            border-bottom: 1px solid rgba(168,85,247,.12);
            border-left: 1px solid rgba(168,85,247,.12);
            animation: slideIn .4s ease-out both;
        }

        .eureka-box strong {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: block;
            margin-bottom: 8px;
            font-size: 1.05em;
            font-weight: 600;
        }

        .flashcard-container {
            min-height: 220px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #flashcard-content {
            width: 100%;
            height: 100%;
            min-height: 220px;
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 28px;
            box-sizing: border-box;
            transition: opacity .3s ease-in-out, transform .3s ease, box-shadow .3s ease;
            animation: glowPulse 4s ease-in-out infinite;
        }
        #flashcard-content:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(108,99,255,.2);
            border-color: rgba(108,99,255,.2);
        }

        .flashcard-front-style {
            font-size: 1.5em;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent-color);
        }
        .flashcard-back-style { font-size:1.05em; line-height:1.7; color:var(--text-muted); }

        .question-container-single, .question-container-all {
            margin-bottom: 16px;
            padding: 18px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
        }
        .question-text { font-weight:600; margin-bottom:16px; font-size:1.05em; }

        .options button, .tf-options button {
            display: block;
            width: 100%;
            padding: 12px 16px;
            margin: 8px 0;
            background: rgba(108,99,255,.12);
            color: var(--text-color);
            border: 1px solid rgba(108,99,255,.2);
            border-radius: var(--radius-sm);
            cursor: pointer;
            text-align: right;
            font-family: 'Inter', sans-serif;
            font-size: .95em;
            transition: all .25s ease;
        }
        .options button:hover:not(:disabled), .tf-options button:hover:not(:disabled) {
            background: rgba(108,99,255,.25);
            border-color: var(--accent-color);
            transform: translateX(-4px);
            box-shadow: 0 0 16px rgba(108,99,255,.15);
        }
        .options button:disabled, .tf-options button:disabled { cursor:not-allowed; opacity:.7; }
        .options button.correct, .tf-options button.correct { opacity:1; }
        .options button.incorrect, .tf-options button.incorrect { opacity:1; }

        .feedback {
            margin-top: 12px;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            animation: fadeIn .3s ease-out;
        }
        .feedback.correct {
            background: rgba(34,197,94,.15);
            border: 1px solid rgba(34,197,94,.3);
            color: #4ade80;
        }
        .feedback.incorrect {
            background: rgba(239,68,68,.15);
            border: 1px solid rgba(239,68,68,.3);
            color: #f87171;
        }

        .explanation {
            margin-top: 12px;
            font-style: italic;
            font-size: .9em;
            padding: 12px 16px;
            background: rgba(255,255,255,.02);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            color: var(--text-muted);
            animation: fadeIn .3s ease-out;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            margin-bottom: 12px;
        }

        .nav-button, .view-all-button {
            background: var(--accent-gradient);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: .9em;
            transition: all .25s ease;
            box-shadow: 0 2px 12px rgba(108,99,255,.2);
        }
        .nav-button:hover:not(:disabled), .view-all-button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(108,99,255,.35);
        }
        .nav-button:disabled { opacity:.35; cursor:not-allowed; transform:none; box-shadow:none; }

        .counter { font-size:.85em; color:var(--text-muted); font-family:'JetBrains Mono', monospace; }
        .view-all-container { text-align:center; margin-top:16px; margin-bottom:16px; }
        .hidden { display:none; }

        #mcq-all-questions .question-container-all,
        #tf-all-questions .question-container-all {
            margin-bottom: 20px;
            animation: fadeIn .3s ease-out both;
        }

        ::-webkit-scrollbar { width:6px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:rgba(108,99,255,.3); border-radius:3px; }
        ::-webkit-scrollbar-thumb:hover { background:rgba(108,99,255,.5); }
        ::selection { background:rgba(108,99,255,.3); color:#fff; }

    </style>
</head>
<body>
    <div class="container">
        <h1>כלי עזר ללמידה: פוספוליפידים וסטרולים</h1>

        <!-- Study Cards Section -->
        <div class="section">
            <h2>כרטיסי לימוד</h2>
            <div class="flashcard-container">
                <div id="flashcard-content"></div>
            </div>
            <div class="navigation">
                <button class="nav-button" id="prev-card">הקודם</button>
                <span class="counter" id="card-counter"></span>
                <button class="nav-button" id="next-card">הבא</button>
            </div>
        </div>

        <!-- Multiple Choice Questions Section -->
        <div class="section">
            <h2>שאלות רב-ברירה (אמריקאיות)</h2>
            <div id="mcq-single-view">
                <div class="question-container-single" id="mcq-container">
                    <div class="question-text" id="mcq-question"></div>
                    <div class="options" id="mcq-options"></div>
                    <div class="feedback hidden" id="mcq-feedback"></div>
                    <div class="explanation hidden" id="mcq-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-mcq">הקודם</button>
                    <span class="counter" id="mcq-counter"></span>
                    <button class="nav-button" id="next-mcq">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-mcq">הצג את כל השאלות</button>
                 </div>
            </div>
            <div id="mcq-all-questions" class="hidden">
                <!-- All MCQs will be dynamically inserted here -->
            </div>
        </div>

        <!-- True/False Questions Section -->
        <div class="section">
            <h2>שאלות נכון/לא נכון</h2>
             <div id="tf-single-view">
                <div class="question-container-single" id="tf-container">
                    <div class="question-text" id="tf-question"></div>
                    <div class="tf-options" id="tf-options">
                        <button data-answer="true">נכון</button>
                        <button data-answer="false">לא נכון</button>
                    </div>
                    <div class="feedback hidden" id="tf-feedback"></div>
                    <div class="explanation hidden" id="tf-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-tf">הקודם</button>
                    <span class="counter" id="tf-counter"></span>
                    <button class="nav-button" id="next-tf">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-tf">הצג את כל השאלות</button>
                 </div>
            </div>
             <div id="tf-all-questions" class="hidden">
                 <!-- All T/F Questions will be dynamically inserted here -->
             </div>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        
        const flashcardData = [
            { term: "פוספוליפיד (Phospholipid)", definition: "ליפיד אמפיפילי המהווה מרכיב מרכזי בממברנות התא. בנוי משלד גליצרול או ספינגוזין, שתי חומצות שומן, קבוצת פוספט וקבוצת ראש פולארית." },
            { term: "גליצרופוספוליפיד (Glycerophospholipid)", definition: "סוג של פוספוליפיד המבוסס על שלד גליצרול. חומצת השומן בעמדה sn-1 היא בדרך כלל רוויה, ובעמדה sn-2 היא בלתי רוויה." },
            { term: "ספינגוליפיד (Sphingolipid)", definition: "סוג של פוספוליפיד המבוסס על שלד ספינגוזין במקום גליצרול. נפוץ במיוחד ברקמות של מערכת העצבים המרכזית." },
            { term: "צרמיד (Ceramide)", definition: "היחידה המבנית הבסיסית המשותפת לכל הספינגוליפידים, המורכבת מספינגוזין המחובר לחומצת שומן." },
            { term: "פוספטידילכולין (PC)", definition: "פוספוליפיד נפוץ הידוע גם כלציטין בהקשר ביוכימי. מרכיב עיקרי בלציטין מסחרי מסויה וביצים, ומשמש כמתחלב במזון." },
            { term: "פוספטידילסרין (PS)", definition: "פוספוליפיד בעל תפקידים ביולוגיים חשובים, כולל שיפור תפקודים קוגניטיביים. מצוי בריכוזים גבוהים במוח בקר ודגים מסוימים." },
            { term: "תכונה אמפיפילית (Amphiphilic property)", definition: "תכונה של מולקולה המכילה גם חלק הידרופילי (אוהב מים) וגם חלק הידרופובי (דוחה מים), המאפשרת לה לתפקד כחומר מתחלב." },
            { term: "כולסטרול (Cholesterol)", definition: "סטרול חיוני בממברנות של תאי בעלי חיים. מווסת את נזילות הממברנה ומהווה פרקורסור להורמונים סטרואידיאליים, ויטמין D ומלחי מרה." },
            { term: "פיטוסטרול (Phytosterol)", definition: "סטרול ממקור צמחי. ידוע ביכולתו להפחית ספיגת כולסטרול במעי על ידי דחיקתו ממיצלות מלחי המרה." },
            { term: "מיאלין (Myelin)", definition: "מעטפת מבודדת סביב אקסונים של תאי עצב, המורכבת בעיקר מפוספוליפידים וחלבונים. פגיעה בו מאפיינת מחלות כמו טרשת נפוצה." },
            { term: "מלחי מרה (Bile salts)", definition: "נגזרות של כולסטרול המסייעות בתהליך העיכול וספיגת שומנים במעי הדק על ידי יצירת מיצלות." },
            { term: "לציטין מסחרי (Commercial Lecithin)", definition: "תערובת של פוספוליפידים המופקת ממקורות כמו סויה או ביצים. משמשת כמתחלב נפוץ בתעשיית המזון, למשל במרגרינה ושוקולד." }
        ];

        const mcqData = [
            { question: "מהו ההבדל המבני המהותי בין גליצרופוספוליפיד לספינגוליפיד?", options: ["שלד המולקולה: גליצרול מול ספינגוזין", "מספר חומצות השומן: אחת מול שתיים", "סוג קבוצת הראש: כולין מול סרין", "נוכחות קבוצת פוספט"], correctIndex: 0, explanation: "ההבדל הבסיסי הוא בשלד. גליצרופוספוליפידים בנויים על גליצרול, בעוד שספינגוליפידים בנויים על הכהל האמיני ארוך השרשרת ספינגוזין." },
            { question: "איזה מהבאים אינו תפקיד של כולסטרול בתאי בעלי חיים?", options: ["ויסות נזילות הממברנה", "פרקורסור לויטמין D", "פרקורסור להורמונים סטרואידיאליים", "מקור אנרגיה עיקרי בדומה לטריגליצרידים"], correctIndex: 3, explanation: "כולסטרול אינו משמש כמקור אנרגיה משמעותי. תפקידו הוא מבני (בממברנות) ורגולטורי (כפרקורסור למולקולות איתות). טריגליצרידים הם מולקולות אגירת האנרגיה העיקריות." },
            { question: "כיצד פועל לציטין כמתחלב יעיל במוצרי מזון כמו מיונז או שוקולד?", options: ["הוא יוצר קשרים קוולנטיים בין מים לשמן", "הוא בעל מבנה אמפיפילי עם ראש הידרופילי וזנבות הידרופוביים", "הוא מוריד את טמפרטורת הקיפאון של המים", "הוא מזרז ריאקציות כימיות בין הפאזות"], correctIndex: 1, explanation: "לציטין (בעיקר פוספטידילכולין) הוא אמפיפילי. הראש הפולארי שלו (פוספט-כולין) פונה לפאזה המימית והזנבות ההידרופוביים (חומצות שומן) פונים לפאזת השמן, ובכך הוא מייצב את האמולסיה." },
            { question: "בממברנת פלזמה טיפוסית, היכן תצפה למצוא את חומצות השומן הבלתי רוויות של הפוספוליפידים?", options: ["בעמדה sn-1 של שלד הגליצרול", "בעמדה sn-3 של שלד הגליצרול", "בעמדה sn-2 של שלד הגליצרול", "קשורות ישירות לקבוצת הפוספט"], correctIndex: 2, explanation: "באופן כללי, בגליצרופוספוליפידים, עמדה sn-1 מאוכלסת על ידי חומצת שומן רוויה, בעוד שעמדה sn-2 מאוכלסת על ידי חומצת שומן בלתי רוויה, התורמת לנזילות הממברנה." },
            { question: "איזה מהמזונות הבאים הוא המקור העשיר ביותר בפוספטידילסרין (PS) על פי הנתונים שהוצגו?", options: ["חלב 3.5% שומן", "שמן תירס", "מוח בקר", "אורז מלא"], correctIndex: 2, explanation: "לפי הטבלה, מוח בקר מכיל 713 מ״ג PS ל-100 גרם, ריכוז גבוה משמעותית מכל שאר המקורות הרשומים." },
            { question: "מהי הסיבה לכך שהממברנה הפנימית של המיטוכונדריה, החסרה כולסטרול, נשארת נזילה בטמפרטורה פיזיולוגית?", options: ["ריכוז גבוה של חלבונים אינטגרליים המונעים קיפאון", "ריכוז גבוה של פוספוליפידים עם חומצות שומן בלתי רוויות", "נוכחות של סוג מיוחד של ספינגוליפידים", "לחץ אוסמוטי גבוה בתוך המיטוכונדריה"], correctIndex: 1, explanation: "היעדר כולסטרול מפוצה על ידי נוכחות גבוהה של חומצות שומן בלתי רוויות בפוספוליפידים. הקשרים הכפולים יוצרים כיפופים בשרשראות ומונעים אריזה צפופה, ובכך מורידים את טמפרטורת ההתכה." },
            { question: "איזה מהמשפטים הבאים מתאר באופן המדויק ביותר את השפעת הכולסטרול על המעבר הפאזי של ממברנה?", options: ["הוא מאיץ את המעבר ממצב נוזלי-גבישי למצב גבישי", "הוא מונע לחלוטין את המעבר הפאזי", "הוא יוצר מצב ביניים של נזילות ומרחיב את טווח הטמפרטורות בו הממברנה יציבה", "הוא גורם לממברנה להיות במצב גבישי בלבד"], correctIndex: 2, explanation: "הכולסטרול מפריע לאריזה צפופה (מצב גבישי) וגם מגביל את התנועה החופשית (מצב נוזלי), ובכך יוצר מצב נזילות ביניים ומייצב את הממברנה על פני טווח טמפרטורות רחב יותר." },
            { question: "מהי היחידה המבנית הבסיסית המשותפת לכל הספינגוליפידים?", options: ["ספינגוזין", "פוספטידילכולין", "צרמיד", "גנגליוזיד"], correctIndex: 2, explanation: "צרמיד, המורכב מספינגוזין וחומצת שומן, הוא השלד המבני שעליו נבנים כל הספינגוליפידים המורכבים יותר, כמו ספינגומיאלין וגליקוליפידים." },
            { question: "איזה מהבאים אינו נכון לגבי פיטוסטרולים?", options: ["הם מפחיתים ספיגת כולסטרול מהמעי", "הם נספגים בצורה גרועה במערכת העיכול", "הם בעלי מבנה דומה לכולסטרול", "הם מהווים פרקורסור לייצור ויטמין D בגוף האדם"], correctIndex: 3, explanation: "פיטוסטרולים אינם משמשים כפרקורסור לויטמין D בבני אדם; תפקיד זה שמור לכולסטרול ולנגזרותיו. כל שאר התכונות נכונות." },
            { question: "בתהליך ספיגת שומנים במעי, טריגליצרידים מתפרקים ונספגים. מה קורה להם בתוך תאי האפיתל של המעי?", options: ["הם מומרים ישירות לגלוקוז לאנרגיה", "הם נארזים כמו שהם לתוך כילומיקרונים", "הם מסונתזים מחדש לטריגליצרידים ונארזים בכילומיקרונים", "הם מופרשים ישירות למחזור הדם"], correctIndex: 2, explanation: "חומצות שומן ומונוגליצרידים נספגים לתוך תאי האפיתל, שם הם מסונתזים מחדש לטריגליצרידים. לאחר מכן, הם נארזים יחד עם כולסטרול ופוספוליפידים ליצירת כילומיקרונים." },
            { question: "מהו המנגנון המוצע העיקרי שבאמצעותו פיטוסטרולים מפחיתים את רמות הכולסטרול בסרום?", options: ["הם מעכבים את הסינתזה האנדוגנית של כולסטרול בכבד", "הם מתחרים עם כולסטרול ודוחקים אותו ממיצלות מלחי המרה במעי", "הם גורמים לפירוק מוגבר של LDL בכלי הדם", "הם נקשרים ישירות לכולסטרול ומונעים את ספיגתו"], correctIndex: 1, explanation: "המנגנון המרכזי הוא תחרות על המקום במיצלות. בגלל הדמיון המבני, פיטוסטרולים תופסים את מקומו של הכולסטרול במיצלות הנחוצות לספיגה, ולכן פחות כולסטרול נספג מהמזון ומהפרשות המרה." },
            { question: "בהשוואה בין ממברנת תא דם אדום (אריתרוציט) לממברנת תא חיידק E. coli, מהו ההבדל הבולט ביותר בהרכב הליפידי שלהן?", options: ["ל-E. coli יש יותר פוספטידילכולין", "באריתרוציט אין פוספטידילאתנולאמין", "ב-E. coli אין כלל כולסטרול או ספינגומיאלין", "באריתרוציט יש יותר פוספטידילגליצרול"], correctIndex: 2, explanation: "על פי הטבלה, ממברנת E. coli אינה מכילה כלל כולסטרול, ספינגומיאלין או פוספטידילכולין, שהם מרכיבים מרכזיים בממברנת האריתרוציט. לעומת זאת, היא עשירה בפוספטידילאתנולאמין ופוספטידילגליצרול." },
            { question: "טרשת נפוצה היא מחלה אוטואימונית הגורמת להרס של:", options: ["הכולסטרול בממברנת האקסון", "מעטפת המיאלין העשירה בפוספוליפידים", "החלבונים המובילים בתעלות היונים", "הקולטנים הסינפטיים"], correctIndex: 1, explanation: "המחלה מאופיינת בתקיפה של מערכת החיסון נגד מעטפת המיאלין, שהיא שכבה שומנית (מורכבת מפוספוליפידים וחלבונים) המבודדת את האקסונים ומאפשרת הולכה עצבית מהירה." },
            { question: "איזה מההורמונים הבאים אינו נגזרת ישירה של כולסטרול?", options: ["קורטיזול", "טסטוסטרון", "אסטרדיול", "אינסולין"], correctIndex: 3, explanation: "קורטיזול, טסטוסטרון ואסטרדיול הם כולם הורמונים סטרואידיאליים המסונתזים מכולסטרול. אינסולין הוא הורמון חלבוני (פפטידי)." },
            { question: "תסמונת המצוקה הנשימתית של היילוד (RDS) נגרמת כתוצאה מכשל בסינתזה של איזה ליפיד חיוני בריאות?", options: ["ספינגומיאלין", "כולסטרול", "דיפלמיטויל פוספטידיל כולין (DPC)", "פוספטידילסרין"], correctIndex: 2, explanation: "DPC הוא סורפקטנט (חומר פעילי שטח) חיוני בנאדיות הריאה, המונע את קריסתן. פגים לעיתים אינם מסוגלים לייצר אותו בכמות מספקת, מה שמוביל לקשיי נשימה." },
            { question: "מהי הטענה הנכונה לגבי היחס בין צריכת כולסטרול מהמזון לייצור פנימי?", options: ["הגוף מייצר כ-1 גרם כולסטרול ביום, בעוד הצריכה מהמזון היא כ-200-300 מ״ג", "הצריכה מהמזון היא כ-1 גרם, והייצור הפנימי הוא כ-200-300 מ״ג", "הייצור והצריכה שווים בקירוב, כ-500 מ״ג כל אחד", "הגוף מסתמך כמעט לחלוטין על כולסטרול מהמזון"], correctIndex: 0, explanation: "לפי הנתונים, הייצור האנדוגני (פנימי) הוא כ-1 גרם (1000 מ״ג) ליום, בעוד שהצריכה המומלצת/ממוצעת מהתזונה היא רק 200-300 מ״ג." },
            { question: "במיקום של כולסטרול בממברנה, איזה חלק של המולקולה יוצר אינטראקציה עם ראשי הפוספוליפידים הפולאריים?", options: ["שרשרת הצד האלקילית", "טבעת D של השלד הסטרואידי", "קבוצת המתיל בפחמן 19", "קבוצת ההידרוקסיל (OH) בפחמן 3"], correctIndex: 3, explanation: "קבוצת ה-OH הפולארית היא החלק היחיד בכולסטרול שהוא הידרופילי מספיק כדי ליצור קשרי מימן עם קבוצות הפוספט והראשים הפולאריים האחרים של הפוספוליפידים בפאזה המימית." },
            { question: "איזה מהליפידים הבאים אינו מסווג כפוספוליפיד?", options: ["פוספטידילאינוזיטול", "ספינגומיאלין", "לציטין", "טריאצילגליצרול"], correctIndex: 3, explanation: "טריאצילגליצרול (טריגליצריד) הוא ליפיד אגירה המורכב מגליצרול ושלוש חומצות שומן, ואין בו קבוצת פוספט. כל האחרים הם סוגים של פוספוליפידים." },
            { question: "לפי הגרף המציג השפעת חומצות שומן, איזו חומצת שומן גורמת לעלייה הגדולה ביותר ברמות LDL-כולסטרול?", options: ["18:1 cis (חומצה אולאית)", "14:0 (חומצה מיריסטית)", "18:2 אומגה 6 (חומצה לינולאית)", "18:0 (חומצה סטארית)"], correctIndex: 1, explanation: "בגרף, העמודה של 14:0 מראה את העלייה הגבוהה ביותר ב-TC (Total Cholesterol) וב-LDL-C בהשוואה לחומצות השומן האחרות המוצגות." },
            { question: "מלחי מרה (Bile acids) הם בעלי תפקיד כפול וחשוב. מהם שני התפקידים העיקריים?", options: ["אגירת אנרגיה ובידוד תרמי", "עיכול שומנים (דטרגנטים) וויסות מטבולי (הורמונים)", "בניית ממברנות וסינתזת חלבונים", "העברת אותות עצביים והתכווצות שרירים"], correctIndex: 1, explanation: "מלחי מרה פועלים כדטרגנטים ליצירת מיצלות וספיגת שומנים, ובנוסף הוכרו כהורמונים המווסתים הומאוסטזיס של כולסטרול, גלוקוז ואנרגיה." },
            { question: "איזה מהבאים אינו מאפיין של חלבונים פריפריאליים בממברנה?", options: ["הם קשורים רק לצד אחד של הממברנה", "הם יכולים לנוע על פני שטח הממברנה", "הם חודרים לעומק הליבה ההידרופובית של הממברנה", "הם קשורים לממברנה באמצעות קשרים לא-קוולנטיים"], correctIndex: 2, explanation: "חלבונים פריפריאליים קשורים לפני השטח של הממברנה (החיצוני או הפנימי) ואינם חודרים לליבה ההידרופובית. חלבונים אינטגרליים הם אלו שחודרים או חוצים את הממברנה." },
            { question: "בהתבסס על מבנה הפוספוליפידים, מדוע הם יוצרים דו-שכבה במים ולא מיצלות (כמו חומצות שומן בודדות)?", options: ["בגלל המטען החשמלי השלילי של קבוצת הפוספט", "בגלל נוכחות שתי שרשראות הידרופוביות הגורמות למבנה גלילי ולא חרוטי", "בגלל שהם גדולים מדי ליצירת מיצלה", "בגלל קשרי המימן בין קבוצות הראש"], correctIndex: 1, explanation: "לחומצת שומן בודדת יש ראש פולארי וזנב אחד, מה שיוצר צורה דמוית חרוט המתאימה למבנה כדורי של מיצלה. לפוספוליפיד יש ראש פולארי ושני זנבות, מה שיוצר צורה דמוית גליל המתאימה למבנה שטוח של דו-שכבה." },
            { question: "איזה שמן צמחי, מבין המוצגים בטבלה, מכיל את הריכוז הגבוה ביותר של כולסטרול?", options: ["שמן זית", "שמן חמניות", "שמן תירס", "שמן קוקוס"], correctIndex: 2, explanation: "לפי הטבלה, שמן תירס מכיל 55 מ״ג/ק״ג כולסטרול, הריכוז הגבוה ביותר מבין האפשרויות." },
            { question: "תרופות ממשפחת הסטטינים פועלות להורדת כולסטרול על ידי:", options: ["הגברת הפרשת כולסטרול במרה", "עיכוב ספיגת כולסטרול מהמזון", "עיכוב האנזים HMG-CoA רדוקטאז במסלול הסינתזה של כולסטרול", "פירוק מוגבר של פלאקים טרשתיים בעורקים"], correctIndex: 2, explanation: "כפי שמוצג בתרשים סינתזת הסטרולים, סטטינים מעכבים את HMG-CoA רדוקטאז, שהוא אנזים מפתח המבקר את קצב הסינתזה האנדוגנית של כולסטרול בכבד." },
            { question: "מהו ההבדל המרכזי בין הרכב ממברנת הפלזמה של תא דם אדום לבין הרכב המיאלין?", options: ["במיאלין יש אחוז גבוה יותר של כולסטרול וגליקוליפידים", "במיאלין אין כלל פוספוליפידים", "בתא דם אדום אין כולסטרול", "במיאלין יש אחוז גבוה יותר של פוספטידילאתנולאמין"], correctIndex: 0, explanation: "לפי הטבלה, מיאלין מכיל 26% גליקוליפידים ו-26% כולסטרול, בעוד שתא דם אדום מכיל 10% גליקוליפידים ו-25% כולסטרול. ההבדל הבולט הוא הכמות הגבוהה משמעותית של גליקוליפידים במיאלין." },
            { question: "איזה מהבאים אינו תוצר של מסלול הביוסינתזה הנגזר מכולסטרול?", options: ["אלדוסטירון (מינרלוקורטיקואיד)", "אנדרוסטנדיון (אנדרוגן)", "פרגננולון (פרוגסטגן)", "ספינגומיאלין"], correctIndex: 3, explanation: "כל האופציות הראשונות הן סטרואידים המהווים תוצרי ביניים או תוצרים סופיים במסלול הסינתזה מכולסטרול. ספינגומיאלין הוא פוספוליפיד המבוסס על שלד ספינגוזין ואינו נגזר מכולסטרול." },

            mcqExplanation.classList.add('hidden');
            qData.options.forEach((option, i) => {
                const button = document.createElement('button');
                button.textContent = option;
                button.onclick = () => handleMCQAnswer(index, i);
                mcqOptions.appendChild(button);
            });
            mcqCounter.textContent = `שאלה ${index + 1} / ${mcqData.length}`;
            prevMCQBtn.disabled = index === 0;
            nextMCQBtn.disabled = index === mcqData.length - 1;
            if (mcqAnswers[index] !== null) {
                highlightMCQAnswer(mcqOptions, mcqFeedback, mcqExplanation, index, mcqAnswers[index].selected);
            }
        }

        function handleMCQAnswer(qIndex, selectedIndex) {
            if (mcqAnswers[qIndex] !== null) return;
            const isCorrect = selectedIndex === mcqData[qIndex].correctIndex;
            mcqAnswers[qIndex] = { selected: selectedIndex, correct: isCorrect };
            highlightMCQAnswer(mcqOptions, mcqFeedback, mcqExplanation, qIndex, selectedIndex);
        }
        
        function highlightMCQAnswer(optionsContainer, feedbackEl, explanationEl, qIndex, selectedIndex) {
            const qData = mcqData[qIndex];
            const buttons = optionsContainer.querySelectorAll('button');
            buttons.forEach((button, i) => {
                button.disabled = true;
                if (i === qData.correctIndex) {
                    button.style.backgroundColor = 'var(--correct-color)';
                    button.style.color = '#fff';
                    button.classList.add('correct');
                }
                if (i === selectedIndex && i !== qData.correctIndex) {
                    button.style.backgroundColor = 'var(--incorrect-color)';
                    button.style.color = '#fff';
                    button.classList.add('incorrect');
                }
            });
            feedbackEl.textContent = selectedIndex === qData.correctIndex ? "נכון!" : "לא נכון.";
            feedbackEl.className = `feedback ${selectedIndex === qData.correctIndex ? 'correct' : 'incorrect'}`;
            explanationEl.textContent = `הסבר: ${qData.explanation}`;
            explanationEl.classList.remove('hidden');
        }

        function displayAllMCQ() {
            if (!mcqData || mcqData.length === 0) return;
            mcqSingleView.classList.add('hidden');
            mcqAllQuestionsContainer.innerHTML = ''; 
            mcqData.forEach((qData, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question-container-all';
                questionDiv.innerHTML = `
                    <div class="question-text">${index + 1}. ${qData.question}</div>
                    <div class="options">
                        ${qData.options.map((option, i) => `<button data-qindex="${index}" data-oindex="${i}">${option}</button>`).join('')}
                    </div>
                    <div class="feedback hidden"></div>
                    <div class="explanation hidden"></div>
                `;
                mcqAllQuestionsContainer.appendChild(questionDiv);
                 const optionButtons = questionDiv.querySelectorAll('.options button');
                 optionButtons.forEach(button => {
                     button.onclick = () => {
                        const qIndex = parseInt(button.dataset.qindex);
                        const oIndex = parseInt(button.dataset.oindex);
                        if (mcqAnswers[qIndex] === null) {
                            const isCorrect = oIndex === mcqData[qIndex].correctIndex;
                            mcqAnswers[qIndex] = { selected: oIndex, correct: isCorrect };
                        }
                        const optionsDiv = button.closest('.options');
                        const feedbackDiv = questionDiv.querySelector('.feedback');
                        const explanationDiv = questionDiv.querySelector('.explanation');
                        highlightMCQAnswer(optionsDiv, feedbackDiv, explanationDiv, qIndex, mcqAnswers[qIndex].selected);
                     };
                 });
                 if (mcqAnswers[index] !== null) {
                    const optionsDiv = questionDiv.querySelector('.options');
                    const feedbackDiv = questionDiv.querySelector('.feedback');
                    const explanationDiv = questionDiv.querySelector('.explanation');
                    highlightMCQAnswer(optionsDiv, feedbackDiv, explanationDiv, index, mcqAnswers[index].selected);
                 }
            });
            mcqAllQuestionsContainer.classList.remove('hidden');
        }

        function displayTFQuestion(index) {
            if (!tfData || tfData.length === 0) return;
            const qData = tfData[index];
            tfQuestion.textContent = qData.question;
            tfFeedback.classList.add('hidden');
            tfExplanation.classList.add('hidden');
             const buttons = tfOptionsContainer.querySelectorAll('button');
             buttons.forEach(button => {
                 button.disabled = false;
                 button.style.backgroundColor = '';
                 button.style.color = '';
                 button.classList.remove('correct', 'incorrect');
                 button.onclick = () => handleTFAnswer(index, button.dataset.answer === 'true');
             });
            tfCounter.textContent = `שאלה ${index + 1} / ${tfData.length}`;
            prevTFBtn.disabled = index === 0;
            nextTFBtn.disabled = index === tfData.length - 1;
            if (tfAnswers[index] !== null) {
                highlightTFAnswer(tfOptionsContainer, tfFeedback, tfExplanation, index, tfAnswers[index].selected);
            }
        }
        
        function handleTFAnswer(qIndex, selectedAnswer) {
            if (tfAnswers[qIndex] !== null) return;
            const isCorrect = selectedAnswer === tfData[qIndex].answer;
            tfAnswers[qIndex] = { selected: selectedAnswer, correct: isCorrect };
            highlightTFAnswer(tfOptionsContainer, tfFeedback, tfExplanation, qIndex, selectedAnswer);
        }
        
        function highlightTFAnswer(optionsContainer, feedbackEl, explanationEl, qIndex, selectedAnswer) {
             const qData = tfData[qIndex];
             const buttons = optionsContainer.querySelectorAll('button');
             buttons.forEach(button => {
                 const buttonAnswer = button.dataset.answer === 'true';
                 button.disabled = true;
                 if (buttonAnswer === qData.answer) {
                     button.style.backgroundColor = 'var(--correct-color)';
                     button.style.color = '#fff';
                     button.classList.add('correct');
                 }
                 if (buttonAnswer === selectedAnswer && buttonAnswer !== qData.answer) {
                     button.style.backgroundColor = 'var(--incorrect-color)';
                     button.style.color = '#fff';
                     button.classList.add('incorrect');
                 }
             });
             feedbackEl.textContent = selectedAnswer === qData.answer ? "נכון!" : "לא נכון.";
             feedbackEl.className = `feedback ${selectedAnswer === qData.answer ? 'correct' : 'incorrect'}`;
             explanationEl.textContent = `הסבר: ${qData.explanation}`;
             explanationEl.classList.remove('hidden');
        }
        
        function displayAllTF() {
             if (!tfData || tfData.length === 0) return;
             tfSingleView.classList.add('hidden');
             tfAllQuestionsContainer.innerHTML = '';
             tfData.forEach((qData, index) => {
                 const questionDiv = document.createElement('div');
                 questionDiv.className = 'question-container-all';
                 questionDiv.innerHTML = `
                     <div class="question-text">${index + 1}. ${qData.question}</div>
                     <div class="tf-options">
                         <button data-qindex="${index}" data-answer="true">נכון</button>
                         <button data-qindex="${index}" data-answer="false">לא נכון</button>
                     </div>
                     <div class="feedback hidden"></div>
                     <div class="explanation hidden"></div>
                 `;
                 tfAllQuestionsContainer.appendChild(questionDiv);
                 const optionButtons = questionDiv.querySelectorAll('.tf-options button');
                 optionButtons.forEach(button => {
                     button.onclick = () => {
                         const qIndex = parseInt(button.dataset.qindex);
                         const selectedAnswer = button.dataset.answer === 'true';
                         if (tfAnswers[qIndex] === null) {
                             const isCorrect = selectedAnswer === tfData[qIndex].answer;
                             tfAnswers[qIndex] = { selected: selectedAnswer, correct: isCorrect };
                         }
                         const optionsDiv = button.closest('.tf-options');
                         const feedbackDiv = questionDiv.querySelector('.feedback');
                         const explanationDiv = questionDiv.querySelector('.explanation');
                         highlightTFAnswer(optionsDiv, feedbackDiv, explanationDiv, qIndex, tfAnswers[qIndex].selected);
                     };
                 });
                 if (tfAnswers[index] !== null) {
                    const optionsDiv = questionDiv.querySelector('.tf-options');
                    const feedbackDiv = questionDiv.querySelector('.feedback');
                    const explanationDiv = questionDiv.querySelector('.explanation');
                    highlightTFAnswer(optionsDiv, feedbackDiv, explanationDiv, index, tfAnswers[index].selected);
                 }
             });
             tfAllQuestionsContainer.classList.remove('hidden');
        }

        function initialize() {
            if (flashcardData.length > 0) displayCard(currentCardIndex);
            if (mcqData.length > 0) displayMCQuestion(currentMCQIndex);
            if (tfData.length > 0) displayTFQuestion(currentTFIndex);
            flashcardContent.addEventListener('click', flipCard);
            prevCardBtn.addEventListener('click', () => { if (currentCardIndex > 0) { currentCardIndex--; displayCard(currentCardIndex); } });
            nextCardBtn.addEventListener('click', () => { if (currentCardIndex < flashcardData.length - 1) { currentCardIndex++; displayCard(currentCardIndex); } });
            prevMCQBtn.addEventListener('click', () => { if (currentMCQIndex > 0) { currentMCQIndex--; displayMCQuestion(currentMCQIndex); } });
            nextMCQBtn.addEventListener('click', () => { if (currentMCQIndex < mcqData.length - 1) { currentMCQIndex++; displayMCQuestion(currentMCQIndex); } });
            viewAllMCQBtn.addEventListener('click', displayAllMCQ);
            prevTFBtn.addEventListener('click', () => { if (currentTFIndex > 0) { currentTFIndex--; displayTFQuestion(currentTFIndex); } });
            nextTFBtn.addEventListener('click', () => { if (currentTFIndex < tfData.length - 1) { currentTFIndex++; displayTFQuestion(currentTFIndex); } });
            viewAllTFBtn.addEventListener('click', displayAllTF);
        }
        
        initialize();
    });
    </script>
</body>
</html>
