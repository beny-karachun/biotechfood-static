<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Study Tool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* --- Root Variables: Glassmorphism Dark Theme --- */
        :root {
            --primary-bg: #0a0a0f;
            --secondary-bg: rgba(255,255,255,0.03);
            --accent-color: #6C63FF;
            --accent-secondary: #A855F7;
            --accent-gradient: linear-gradient(135deg, #6C63FF, #A855F7);
            --text-color: #e2e8f0;
            --text-muted: #94a3b8;
            --correct-color: #22c55e;
            --incorrect-color: #ef4444;
            --card-bg: rgba(255,255,255,0.04);
            --eureka-bg: rgba(168,85,247,0.08);
            --eureka-border: #A855F7;
            --glass-bg: rgba(255,255,255,0.03);
            --glass-border: rgba(255,255,255,0.06);
            --glass-blur: blur(12px);
            --radius: 16px;
            --radius-sm: 10px;
        }

        @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
        @keyframes slideIn { from { opacity:0; transform:translateX(-16px); } to { opacity:1; transform:translateX(0); } }
        @keyframes cardIn { from { opacity:0; transform:scale(.96); } to { opacity:1; transform:scale(1); } }
        @keyframes shimmer { 0%{ background-position:-200% 0; } 100%{ background-position:200% 0; } }
        @keyframes pulse { 0%,100%{ opacity:1; } 50%{ opacity:.6; } }
        @keyframes glowPulse { 0%,100%{ box-shadow:0 0 20px rgba(108,99,255,.15); } 50%{ box-shadow:0 0 30px rgba(168,85,247,.25); } }

        *{ box-sizing:border-box; }

        body {
            background-color: var(--primary-bg);
            background-image:
                radial-gradient(ellipse 80% 50% at 20% 60%, rgba(108,99,255,.08), transparent),
                radial-gradient(ellipse 60% 40% at 80% 30%, rgba(168,85,247,.06), transparent);
            color: var(--text-color);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            line-height: 1.7;
            margin: 0;
            padding: 24px 16px;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 32px 28px;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            box-shadow: 0 8px 32px rgba(0,0,0,.4);
            animation: fadeIn .6s ease-out;
        }

        h1 {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            font-weight: 700;
            font-size: 1.75em;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 16px;
            margin-top: 0;
            letter-spacing: -.02em;
        }

        h2 {
            color: var(--text-color);
            text-align: center;
            font-weight: 600;
            font-size: 1.3em;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 12px;
            letter-spacing: -.01em;
        }

        .section {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            padding: 24px;
            margin-bottom: 28px;
            border-radius: var(--radius);
            animation: cardIn .5s ease-out both;
        }
        .section:nth-child(2){ animation-delay:.1s; }
        .section:nth-child(3){ animation-delay:.2s; }
        .section:nth-child(4){ animation-delay:.3s; }
        .section:nth-child(5){ animation-delay:.4s; }

        .theory-text { font-size:1.05em; line-height:1.85; color:var(--text-muted); }
        .theory-text ul { padding-right:20px; }
        .theory-text li { margin-bottom:8px; }
        .theory-text h3 {
            color:#fff; margin-top:28px; margin-bottom:12px;
            border-bottom:none; text-align:right;
            font-weight:600; font-size:1.1em;
        }

        .eureka-box {
            background: var(--eureka-bg);
            border-right: 3px solid var(--eureka-border);
            padding: 18px 20px;
            margin: 24px 0;
            border-radius: var(--radius-sm);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-top: 1px solid rgba(168,85,247,.12);
            border-bottom: 1px solid rgba(168,85,247,.12);
            border-left: 1px solid rgba(168,85,247,.12);
            animation: slideIn .4s ease-out both;
        }

        .eureka-box strong {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: block;
            margin-bottom: 8px;
            font-size: 1.05em;
            font-weight: 600;
        }

        .flashcard-container {
            min-height: 220px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #flashcard-content {
            width: 100%;
            height: 100%;
            min-height: 220px;
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 28px;
            box-sizing: border-box;
            transition: opacity .3s ease-in-out, transform .3s ease, box-shadow .3s ease;
            animation: glowPulse 4s ease-in-out infinite;
        }
        #flashcard-content:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(108,99,255,.2);
            border-color: rgba(108,99,255,.2);
        }

        .flashcard-front-style {
            font-size: 1.5em;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent-color);
        }
        .flashcard-back-style { font-size:1.05em; line-height:1.7; color:var(--text-muted); }

        .question-container-single, .question-container-all {
            margin-bottom: 16px;
            padding: 18px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
        }
        .question-text { font-weight:600; margin-bottom:16px; font-size:1.05em; }

        .options button, .tf-options button {
            display: block;
            width: 100%;
            padding: 12px 16px;
            margin: 8px 0;
            background: rgba(108,99,255,.12);
            color: var(--text-color);
            border: 1px solid rgba(108,99,255,.2);
            border-radius: var(--radius-sm);
            cursor: pointer;
            text-align: right;
            font-family: 'Inter', sans-serif;
            font-size: .95em;
            transition: all .25s ease;
        }
        .options button:hover:not(:disabled), .tf-options button:hover:not(:disabled) {
            background: rgba(108,99,255,.25);
            border-color: var(--accent-color);
            transform: translateX(-4px);
            box-shadow: 0 0 16px rgba(108,99,255,.15);
        }
        .options button:disabled, .tf-options button:disabled { cursor:not-allowed; opacity:.7; }
        .options button.correct, .tf-options button.correct { opacity:1; }
        .options button.incorrect, .tf-options button.incorrect { opacity:1; }

        .feedback {
            margin-top: 12px;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            animation: fadeIn .3s ease-out;
        }
        .feedback.correct {
            background: rgba(34,197,94,.15);
            border: 1px solid rgba(34,197,94,.3);
            color: #4ade80;
        }
        .feedback.incorrect {
            background: rgba(239,68,68,.15);
            border: 1px solid rgba(239,68,68,.3);
            color: #f87171;
        }

        .explanation {
            margin-top: 12px;
            font-style: italic;
            font-size: .9em;
            padding: 12px 16px;
            background: rgba(255,255,255,.02);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            color: var(--text-muted);
            animation: fadeIn .3s ease-out;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            margin-bottom: 12px;
        }

        .nav-button, .view-all-button {
            background: var(--accent-gradient);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: .9em;
            transition: all .25s ease;
            box-shadow: 0 2px 12px rgba(108,99,255,.2);
        }
        .nav-button:hover:not(:disabled), .view-all-button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(108,99,255,.35);
        }
        .nav-button:disabled { opacity:.35; cursor:not-allowed; transform:none; box-shadow:none; }

        .counter { font-size:.85em; color:var(--text-muted); font-family:'JetBrains Mono', monospace; }
        .view-all-container { text-align:center; margin-top:16px; margin-bottom:16px; }
        .hidden { display:none; }

        #mcq-all-questions .question-container-all,
        #tf-all-questions .question-container-all {
            margin-bottom: 20px;
            animation: fadeIn .3s ease-out both;
        }

        ::-webkit-scrollbar { width:6px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:rgba(108,99,255,.3); border-radius:3px; }
        ::-webkit-scrollbar-thumb:hover { background:rgba(108,99,255,.5); }
        ::selection { background:rgba(108,99,255,.3); color:#fff; }

    </style>
</head>
<body>
    <div class="container">
        <h1>כלי עזר ללמידה: תגובות השחמה לא אנזימטיות</h1>

        <!-- Study Cards Section -->
        <div class="section">
            <h2>כרטיסי לימוד</h2>
            <div class="flashcard-container">
                <div id="flashcard-content"></div>
            </div>
            <div class="navigation">
                <button class="nav-button" id="prev-card">הקודם</button>
                <span class="counter" id="card-counter"></span>
                <button class="nav-button" id="next-card">הבא</button>
            </div>
        </div>

        <!-- Multiple Choice Questions Section -->
        <div class="section">
            <h2>שאלות רב-ברירה (אמריקאיות)</h2>
            <div id="mcq-single-view">
                <div class="question-container-single" id="mcq-container">
                    <div class="question-text" id="mcq-question"></div>
                    <div class="options" id="mcq-options"></div>
                    <div class="feedback hidden" id="mcq-feedback"></div>
                    <div class="explanation hidden" id="mcq-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-mcq">הקודם</button>
                    <span class="counter" id="mcq-counter"></span>
                    <button class="nav-button" id="next-mcq">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-mcq">הצג את כל השאלות</button>
                 </div>
            </div>
            <div id="mcq-all-questions" class="hidden">
                <!-- All MCQs will be dynamically inserted here -->
            </div>
        </div>

        <!-- True/False Questions Section -->
        <div class="section">
            <h2>שאלות נכון/לא נכון</h2>
             <div id="tf-single-view">
                <div class="question-container-single" id="tf-container">
                    <div class="question-text" id="tf-question"></div>
                    <div class="tf-options" id="tf-options">
                        <button data-answer="true">נכון</button>
                        <button data-answer="false">לא נכון</button>
                    </div>
                    <div class="feedback hidden" id="tf-feedback"></div>
                    <div class="explanation hidden" id="tf-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-tf">הקודם</button>
                    <span class="counter" id="tf-counter"></span>
                    <button class="nav-button" id="next-tf">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-tf">הצג את כל השאלות</button>
                 </div>
            </div>
             <div id="tf-all-questions" class="hidden">
                 <!-- All T/F Questions will be dynamically inserted here -->
             </div>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        
        const flashcardData = [
            { term: "תגובת מייארד", definition: "שרשרת תגובות כימיות בין חומצות אמינו לסוכרים מחזרים, המובילה ליצירת צבע חום וטעמים וריחות אופייניים במזון מחומם." },
            { term: "שיחלוף אמדורי", definition: "איזומריזציה של גליקוזילאמין (מאלדוז) ל-1-אמינו-2-קטוז. שלב מפתח בתחילת תגובת מייארד." },
            { term: "שיחלוף היינס", definition: "איזומריזציה של קטוזילאמין (מקטוז) ל-2-אמינו-אלדוז. מקביל לשיחלוף אמדורי עבור סוכרים קטוניים." },
            { term: "דגרדציית סטרקר", definition: "תגובה בין תרכובת דיקרבונילית לחומצה אמינית, המובילה ליצירת אלדהיד (תורם לריח), אמינו-קטון ופחמן דו-חמצני." },
            { term: "מלנואידינים", definition: "פולימרים חנקניים מורכבים בעלי צבע חום כהה ומשקל מולקולרי גבוה, הנוצרים בשלב הסופי של תגובת מייארד." },
            { term: "תוצרי גליקציה מתקדמים (AGEs)", definition: "תרכובות הנוצרות מחיבור לא אנזימטי של סוכרים לחלבונים, הן במזון בטמפרטורות גבוהות והן בגוף החי. קשורות להזדקנות ומחלות." },
            { term: "אקרילאמיד", definition: "תרכובת שעלולה להיות מסרטנת, הנוצרת בתגובת מייארד בין אספרגין לסוכר מחזר בטמפרטורות גבוהות, בעיקר במזונות עמילניים." },
            { term: "סוכר מחזר", definition: "סוכר בעל קבוצת אלדהיד או קטון חופשית (או המי-אצטל), המסוגל להגיב בתגובת מייארד. דוגמאות: גלוקוז, פרוקטוז." },
            { term: "קרמליזציה", definition: "תהליך השחמה של סוכר באמצעות חימום לטמפרטורות גבוהות (מעל 160 מעלות צלזיוס), ללא צורך בנוכחות חומצות אמינו." },
            { term: "פורפורל ו-HMF", definition: "תרכובות הטרוציקליות (פוראן) הנוצרות מדהידרציה של סוכרים במהלך תגובת מייארד וקרמליזציה. משמשות לעיתים כמדד להשחמה." },
            { term: "בסיס שיף (Schiff base)", definition: "תוצר ביניים הנוצר מהתעבות של אמין ראשוני עם קרבוניל. שלב ראשוני הפיך בתגובת מייארד." },
            { term: "פעילות מים (aw)", definition: "מדד לכמות המים הזמינים במזון לתגובות כימיות. לתגובת מייארד יש קצב אופטימלי בפעילות מים בינונית (סביב 0.6-0.7)." }
        ];

        const mcqData = [
            { question: "מהו ההבדל המהותי בין שיחלוף אמדורי לשיחלוף היינס?", options: ["שיחלוף אמדורי דורש חום גבוה יותר", "שיחלוף אמדורי מתחיל עם סוכר אלדוזי ויוצר קטוז-אמין, בעוד שיחלוף היינס מתחיל עם סוכר קטוזי ויוצר אלדוז-אמין", "שיחלוף היינס הוא שלב הפיך ואילו אמדורי אינו הפיך", "רק שיחלוף אמדורי מוביל ליצירת מלנואידינים"], correctIndex: 1, explanation: "ההבחנה המרכזית היא בסוג הסוכר המגיב: אלדוז (כמו גלוקוז) עובר שיחלוף אמדורי, וקטוז (כמו פרוקטוז) עובר שיחלוף היינס, מה שמוביל לתוצרים שונים במבנם." },
            { question: "יצרן של פירות יבשים מעוניין למזער את תגובת מייארד במוצר. איזו מהפעולות הבאות תהיה היעילה ביותר?", options: ["העלאת טמפרטורת הייבוש כדי לקצר את התהליך", "הוספת כמות קטנה של גלוקוז כדי לשפר את הטעם", "טיפול בפירות עם תמיסת SO2 (סולפיט) לפני הייבוש", "ייבוש לרמת פעילות מים (aw) של 0.65"], correctIndex: 2, explanation: "SO2 מגיב עם תוצרי ביניים קרבוניליים ומונע את המשך התגובה ליצירת צבע. העלאת טמפרטורה תאיץ את התגובה, הוספת גלוקוז תספק מגיב, ו-aw של 0.65 קרוב לאופטימום להשחמה." },
            { question: "איזה מהמשפטים הבאים אינו מתאר נכונה את דגרדציית סטרקר?", options: ["היא דורשת נוכחות של תרכובת דיקרבונילית וחומצה אמינית", "היא אחראית ליצירת אלדהידים התורמים לריח האופייני של מזון מבושל", "היא מובילה לשחרור מולקולת פחמן דו-חמצני מחומצת האמינו", "היא השלב העיקרי שבו נוצרים הפיגמנטים החומים, המלנואידינים"], correctIndex: 3, explanation: "דגרדציית סטרקר חיונית ליצירת ארומה (ריח), אך יצירת הצבע החום מתרחשת בעיקר בשלב הסופי של הפולימריזציה ליצירת מלנואידינים." },
            { question: "מהי הסיבה הכימית לכך שקצב תגובת מייארד יורד בפעילות מים (aw) גבוהה מאוד (מעל 0.9)?", options: ["המים מגיבים עם הסוכר ומפרקים אותו", "עודף מים גורם לדילול המגיבים ומסיט את שיווי המשקל של שלב הדחיסה הראשוני חזרה למגיבים", "המים גורמים לפרוטונציה של קבוצת האמין ומנטרלים אותה", "בפעילות מים גבוהה, הטמפרטורה של המזון אינה יכולה לעלות מעל 100 מעלות"], correctIndex: 1, explanation: "שלב הדחיסה הראשוני בין סוכר לאמין משחרר מולקולת מים. לפי עיקרון לה-שטלייה, ריכוז גבוה של תוצר (מים) ידחוף את התגובה ההפיכה חזרה לכיוון המגיבים ויאט את הקצב הכולל." },
            { question: "איזה מהבאים מהווה את המגיבים העיקריים ליצירת אקרילאמיד במזון?", options: ["חומצת האמינו ליזין ופרוקטוז", "כולסטרול וחומצות שומן רוויות", "חומצת האמינו אספרגין וסוכר מחזר", "חלבון הקזאין ולקטוז"], correctIndex: 2, explanation: "אקרילאמיד נוצר ספציפית מהתגובה בין הקבוצה האמידית של חומצת האמינו אספרגין לבין סוכר מחזר בטמפרטורות גבוהות." },
            { question: "מהו ההסבר לכך שב-pH נמוך מאוד (למשל 2-3) תגובת מייארד כמעט ואינה מתרחשת?", options: ["הסוכר עובר הידרוליזה ואינו פעיל יותר", "קבוצת האמין של חומצת האמינו עוברת פרוטונציה מלאה והופכת ללא-נוקליאופילית", "האנזימים המעורבים בתהליך עוברים דנטורציה", "המלנואידינים אינם יציבים בסביבה חומצית ומתפרקים"], correctIndex: 1, explanation: "ההתקפה הנוקליאופילית של האמין על הסוכר היא השלב הראשון והחיוני. בסביבה חומצית חזקה, זוג האלקטרונים הבודד של החנקן האמיני קושר פרוטון (NH3+), מה שמונע ממנו לתקוף את הפחמן הקרבונילי." },
            { question: "איזה מהמזונות הבאים צפוי להכיל את הרמה הגבוהה ביותר של תוצרי גליקציה מתקדמים (AGEs) שמקורם במזון?", options: ["יוגורט טבעי דל שומן", "סטייק בקר שנצלה היטב על הגריל", "תפוח עץ טרי", "אורז לבן מבושל במים"], correctIndex: 1, explanation: "AGEs נוצרים בכמות גבוהה במיוחד במזונות עשירים בחלבון ושומן שעוברים חימום יבש ואינטנסיבי. צליית בשר היא דוגמה קלאסית לכך." },
            { question: "מהי הפונקציה העיקרית של המלנואידינים בתגובת מייארד?", options: ["לשמש כקטליזטורים לשלבים המוקדמים של התגובה", "לתרום לריח האפוי האופייני", "להיות אחראים לצבע החום הכהה ולעיתים לתכונות נוגדות חמצון", "לפרק את חומצת האמינו ליזין"], correctIndex: 2, explanation: "המלנואידינים הם הפיגמנטים הסופיים, פולימרים גדולים ומורכבים האחראים לצבע. לריח תורמים בעיקר תוצרים קטנים ונדיפים יותר כמו אלדהידים מפירוק סטרקר ופורפורלים." },
            { question: "חומצת האמינו פרולין אינה יוצרת אלדהיד סטרקר. מהי הסיבה המבנית לכך?", options: ["היא חומצה אמינית הידרופובית מדי", "היא חסרה קבוצה קרבוקסילית", "היא אמין שניוני (אימין) כחלק ממבנה טבעתי", "השרשרת הצדדית שלה גדולה מדי"], correctIndex: 2, explanation: "פרולין היא ייחודית בכך שקבוצת האמינו שלה היא חלק ממבנה טבעתי, מה שהופך אותה לאמין שניוני. מנגנון דגרדציית סטרקר דורש אמין ראשוני." },
            { question: "בתהליך ייצור ריבה, משתמשים בסוכרוז ומחממים אותו עם פרי חומצי. מדוע מתרחשת השחמה למרות שסוכרוז אינו סוכר מחזר?", options: ["הפרוקטוז מהפרי מגיב ישירות עם הסוכרוז", "החומצה מהפרי והחום גורמים להידרוליזה של הסוכרוז לגלוקוז ופרוקטוז, שהם סוכרים מחזרים", "בטמפרטורות גבוהות, סוכרוז הופך למחזר", "הפוליפנולים מהפרי גורמים להשחמה אנזימטית"], correctIndex: 1, explanation: "סוכרוז הוא דיסכריד. התנאים החומציים והחום גורמים לשבירת הקשר הגליקוזידי וליצירת חד-סוכרים מחזרים (גלוקוז ופרוקטוז), אשר יכולים להשתתף בתגובת מייארד." },
            { question: "מהו ההבדל המרכזי בין קרמליזציה לתגובת מייארד?", options: ["קרמליזציה מתרחשת רק ב-pH בסיסי", "תגובת מייארד אינה יוצרת טעם, רק צבע", "קרמליזציה היא פירוק תרמי של סוכר בלבד ואינה דורשת חומצות אמינו", "קרמליזציה דורשת פעילות מים גבוהה יותר"], correctIndex: 2, explanation: "ההבדל המהותי הוא במגיבים. מייארד דורשת סוכר מחזר וחומצת אמינו. קרמליזציה היא תהליך המתרחש בטמפרטורות גבוהות יותר וכולל פירוק של סוכרים בלבד, ללא צורך באמין." },
            { question: "במערכת מזון המכילה גלוקוז וליזין, מה יהיה התוצר הראשוני הבלתי הפיך (בתנאים רגילים) של תגובת מייארד?", options: ["בסיס שיף", "גלוקוזילאמין", "תוצר שיחלוף אמדורי (1-אמינו-1-דהאוקסי-פרוקטוז)", "אלדהיד סטרקר"], correctIndex: 2, explanation: "יצירת בסיס שיף וגליקוזילאמין הם שלבים הפיכים. שיחלוף אמדורי הוא איזומריזציה שתוצרה יציב יותר, והוא נחשב לנקודת האל-חזור במנגנון התגובה." },
            { question: "כיצד שינויים ב-pH במהלך תגובת מייארד (כמו בתרשים glucose-casein) יכולים להעיד על התקדמותה?", options: ["ה-pH עולה באופן דרמטי בשלבים הסופיים", "ה-pH יורד מעט בתחילת התגובה עקב צריכת חומצות אמינו בסיסיות, ואז יורד עוד יותר עם שחרור חומצות אורגניות", "ה-pH נשאר קבוע לאורך כל התגובה", "ה-pH הופך לבסיסי מאוד עקב יצירת אמינים"], correctIndex: 1, explanation: "חומצות אמינו בסיסיות (כמו ליזין) מגיבות ראשונות, מה שגורם לירידה קלה ב-pH. בשלבים מתקדמים יותר משתחררות חומצות כמו חומצה פורמית, הגורמות לירידה נוספת ב-pH." },
            { question: "איזה מהבאים אינו תוצר אופייני של שלב הפירוק (degradation) המתקדם בתגובת מייארד?", options: ["פורפורל ו-HMF", "רדוקטונים", "תרכובות דיקרבוניליות", "גליקוזילאמין"], correctIndex: 3, explanation: "גליקוזילאמין הוא תוצר של השלב הראשוני. שלב הפירוק המתקדם כולל דהידרציה ופירוק של תוצר אמדורי/היינס ליצירת תרכובות ריאקטיביות כמו פורפורלים, רדוקטונים ודיקרבונילים." },
            { question: "מדוע אחסון תפוחי אדמה בטמפרטורה נמוכה (במקרר) לפני טיגון עלול להגביר את יצירת האקרילאמיד?", options: ["הקור גורם להרס חומצת האמינו אספרגין", "הטמפרטורה הנמוכה מעודדת פירוק של עמילן לסוכרים מחזרים (גלוקוז ופרוקטוז)", "הקור מגביר את רמת הלחות בתפוח האדמה", "הקור משנה את מבנה החלבונים בתפוח האדמה"], correctIndex: 1, explanation: "אחסון בקור מפעיל אנזימים המפרקים עמילן לסוכרים מחזרים. כתוצאה מכך, ריכוז אחד המגיבים (סוכר מחזר) עולה, מה שמוביל ליותר אקרילאמיד בטיגון." },
            { question: "מהו תפקידם של רדוקטונים ותרכובות דיקרבוניליות בתגובת מייארד?", options: ["הם תוצרים סופיים ויציבים שאינם מגיבים יותר", "הם תוצרי ביניים ריאקטיביים מאוד המשתתפים בדגרדציית סטרקר ובפולימריזציה", "הם אחראים בעיקר לטעם המר של מוצרים שרופים", "הם מונעים את התגובה על ידי קשירת חומצות אמינו"], correctIndex: 1, explanation: "תרכובות אלו נוצרות מפירוק תוצר אמדורי/היינס והן ריאקטיביות ביותר. הדיקרבונילים חיוניים לדגרדציית סטרקר, ושניהם מהווים אבני בניין להמשך התגובות." },
            { question: "איזה מהתהליכים הבאים אינו דרך יעילה למניעת השחמת מייארד?", options: ["הורדת pH מתחת ל-6", "שימוש בסוכרוז במקום בגלוקוז", "ייבוש מהיר של המוצר לרמת aw נמוכה מאוד (מתחת ל-0.2)", "הוספת כמות קטנה של חומצת אמינו פרולין"], correctIndex: 3, explanation: "בעוד שפרולין אינה עוברת דגרדציית סטרקר טיפוסית, היא עדיין חומצת אמינו שיכולה להשתתף בשלבים הראשונים של תגובת מייארד וליצור צבע. הוספתה לא תמנע השחמה." },
            { question: "מהי ההשפעה הבריאותית העיקרית המיוחסת ליצירת קשרי צילוב על ידי AGEs בקולגן?", options: ["שיפור גמישות העור", "אובדן גמישות של כלי דם ועלייה בלחץ הדם", "חיזוק רקמת העצם", "זירוז תהליכי ריפוי פצעים"], correctIndex: 1, explanation: "קשרי הצילוב הנוצרים על ידי AGEs בקולגן גורמים לרקמות לאבד את גמישותן. בכלי דם, הדבר מוביל להתקשחות העורקים ולסיבוכים קרדיווסקולריים." },
            { question: "בייצור אבקת חלב, תגובת מייארד נחשבת בלתי רצויה. מהי הפגיעה התזונתית העיקרית הנגרמת?", options: ["פירוק ויטמין C", "הרס חומצות שומן חיוניות", "הפיכת חומצת האמינו החיונית ליזין לבלתי זמינה לספיגה", "דנטורציה של חלבון הקזאין"], correctIndex: 2, explanation: "ליזין, חומצה אמינית חיונית, היא ריאקטיבית במיוחד בתגובת מייארד. קישורה לסוכר הופך אותה לבלתי זמינה לעיכול וספיגה, ובכך מוריד את הערך התזונתי של החלבון." },
            { question: "תהליך יצירת צבע וטעם בחימום סוכר טהור (ללא אמינים) ב-180 מעלות צלזיוס נקרא:", options: ["שיחלוף אמדורי", "דגרדציית סטרקר", "קרמליזציה", "גליקוליזה"], correctIndex: 2, explanation: "זהו התיאור המדויק של קרמליזציה - פירוק תרמי של סוכרים בהיעדר חומצות אמינו, המוביל ליצירת צבע וטעם." },
            { question: "איזה מהבאים אינו נכון לגבי AGEs?", options: ["הם נוצרים מהר יותר בטמפרטורות גבוהות", "הם קשורים לסיבוכים של מחלת הסוכרת", "רמותיהם יורדות כאשר חלב מרוכז לגבינה", "הם יכולים לגרום לקשרי צילוב בחלבונים כמו קולגן"], correctIndex: 2, explanation: "ריכוז השומן והחלבון והסרת הלחות בתהליך הכנת גבינה, יחד עם תהליכי חימום ויישון, דווקא מעלים באופן דרמטי את תכולת ה-AGEs בהשוואה לחלב נוזלי." },
            { question: "מדוע הוספת מעט חומצה מזרזת את שלב הדחיסה הראשוני בתגובת מייארד, אך עודף חומצה בולם אותו?", options: ["מעט חומצה מפרקת את הסוכר, עודף חומצה הורס את האמין", "מעט חומצה עושה פרוטונציה לקרבוניל ומגבירה את האלקטרופיליות שלו, עודף חומצה עושה פרוטונציה לאמין ומנטרל אותו", "התגובה דורשת pH ניטרלי בדיוק", "חומצה תמיד בולמת את התגובה, בכל ריכוז"], correctIndex: 1, explanation: "כמות קטנה של חומצה מזרזת את התגובה על ידי הפיכת החמצן הקרבונילי לקבוצה עוזבת טובה יותר (כמים), אך כמות גדולה מדי מנטרלת את הנוקליאופיל (האמין) ומונעת את התגובה." },
            { question: "מהו התוצר העיקרי של דגרדציית חומצה אסקורבית שיכול להמשיך ולהגיב עם אמינים ליצירת השחמה?", options: ["חומצה אצטית", "פרוקטוז", "פורפורל ותרכובות דומות", "פחמן דו-חמצני"], correctIndex: 2, explanation: "פירוק חומצה אסקורבית (ויטמין C), במיוחד בתנאים מחמצנים, מוביל ליצירת תרכובות קרבוניליות ריאקטיביות כמו פורפורל, אשר יכולות להשתתף בתגובות דמויות מייארד." },
            { question: "איזה שלב בתגובת מייארד מתאר בצורה הטובה ביותר את המעבר מאלדוז לקטוז מבחינה מבנית?", options: ["יצירת בסיס שיף", "שיחלוף אמדורי", "דגרדציית סטרקר", "פולימריזציה למלנואידינים"], correctIndex: 1, explanation: "שיחלוף אמדורי הוא איזומריזציה (שינוי מבני) שבה גליקוזילאמין, שמקורו באלדוז (כמו גלוקוז), מסתדר מחדש ליצירת 1-אמינו-2-קטוז, שהוא נגזרת של קטוז (כמו פרוקטוז)." },
            { question: "באיזה טווח של פעילות מים (aw) תגובת מייארד היא בדרך כלל המהירה ביותר?", options: ["0.0-0.2", "0.2-0.4", "0.6-0.7", "0.9-1.0"], correctIndex: 2, explanation: "בטווח זה יש מספיק מים כדי לאפשר ניידות של המגיבים, אך לא יותר מדי כדי לגרום לאפקט דילול או להסיט את שיווי המשקל של התגובה הראשונית לאחור." },

        function flipCard() {
            if (isCardAnimating || !flashcardData || flashcardData.length === 0) return;
            isCardAnimating = true;
            flashcardContent.style.opacity = '0';
            setTimeout(() => {
                isCardFront = !isCardFront;
                const cardData = flashcardData[currentCardIndex];
                if (isCardFront) {
                    flashcardContent.textContent = cardData.term;

            highlightMCQAnswer(mcqOptions, mcqFeedback, mcqExplanation, qIndex, selectedIndex);
        }
        
        function highlightMCQAnswer(optionsContainer, feedbackEl, explanationEl, qIndex, selectedIndex) {
            const qData = mcqData[qIndex];
            const buttons = optionsContainer.querySelectorAll('button');
            buttons.forEach((button, i) => {
                button.disabled = true;
                if (i === qData.correctIndex) {
                    button.style.backgroundColor = 'var(--correct-color)';
                    button.style.color = '#fff';
                    button.classList.add('correct');
                }
                if (i === selectedIndex && i !== qData.correctIndex) {
                    button.style.backgroundColor = 'var(--incorrect-color)';
                    button.style.color = '#fff';
                    button.classList.add('incorrect');
                }
            });
            feedbackEl.textContent = selectedIndex === qData.correctIndex ? "נכון!" : "לא נכון.";
            feedbackEl.className = `feedback ${selectedIndex === qData.correctIndex ? 'correct' : 'incorrect'}`;
            explanationEl.textContent = `הסבר: ${qData.explanation}`;
            explanationEl.classList.remove('hidden');
        }

        function displayAllMCQ() {
            if (!mcqData || mcqData.length === 0) return;
            mcqSingleView.classList.add('hidden');
            mcqAllQuestionsContainer.innerHTML = ''; 
            mcqData.forEach((qData, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question-container-all';
                questionDiv.innerHTML = `
                    <div class="question-text">${index + 1}. ${qData.question}</div>
                    <div class="options">
                        ${qData.options.map((option, i) => `<button data-qindex="${index}" data-oindex="${i}">${option}</button>`).join('')}
                    </div>
                    <div class="feedback hidden"></div>
                    <div class="explanation hidden"></div>
                `;
                mcqAllQuestionsContainer.appendChild(questionDiv);
                 const optionButtons = questionDiv.querySelectorAll('.options button');
                 optionButtons.forEach(button => {
                     button.onclick = () => {
                        const qIndex = parseInt(button.dataset.qindex);
                        const oIndex = parseInt(button.dataset.oindex);
                        if (mcqAnswers[qIndex] === null) {
                            const isCorrect = oIndex === mcqData[qIndex].correctIndex;
                            mcqAnswers[qIndex] = { selected: oIndex, correct: isCorrect };
                        }
                        const optionsDiv = button.closest('.options');
                        const feedbackDiv = questionDiv.querySelector('.feedback');
                        const explanationDiv = questionDiv.querySelector('.explanation');
                        highlightMCQAnswer(optionsDiv, feedbackDiv, explanationDiv, qIndex, mcqAnswers[qIndex].selected);
                     };
                 });
                 if (mcqAnswers[index] !== null) {
                    const optionsDiv = questionDiv.querySelector('.options');
                    const feedbackDiv = questionDiv.querySelector('.feedback');
                    const explanationDiv = questionDiv.querySelector('.explanation');
                    highlightMCQAnswer(optionsDiv, feedbackDiv, explanationDiv, index, mcqAnswers[index].selected);
                 }
            });
            mcqAllQuestionsContainer.classList.remove('hidden');
        }

        function displayTFQuestion(index) {
            if (!tfData || tfData.length === 0) return;
            const qData = tfData[index];
            tfQuestion.textContent = qData.question;
            tfFeedback.classList.add('hidden');
            tfExplanation.classList.add('hidden');
             const buttons = tfOptionsContainer.querySelectorAll('button');
             buttons.forEach(button => {
                 button.disabled = false;
                 button.style.backgroundColor = '';
                 button.style.color = '';
                 button.classList.remove('correct', 'incorrect');
                 button.onclick = () => handleTFAnswer(index, button.dataset.answer === 'true');
             });
            tfCounter.textContent = `שאלה ${index + 1} / ${tfData.length}`;
            prevTFBtn.disabled = index === 0;
            nextTFBtn.disabled = index === tfData.length - 1;
            if (tfAnswers[index] !== null) {
                highlightTFAnswer(tfOptionsContainer, tfFeedback, tfExplanation, index, tfAnswers[index].selected);
            }
        }
        
        function handleTFAnswer(qIndex, selectedAnswer) {
            if (tfAnswers[qIndex] !== null) return;
            const isCorrect = selectedAnswer === tfData[qIndex].answer;
            tfAnswers[qIndex] = { selected: selectedAnswer, correct: isCorrect };
            highlightTFAnswer(tfOptionsContainer, tfFeedback, tfExplanation, qIndex, selectedAnswer);
        }
        
        function highlightTFAnswer(optionsContainer, feedbackEl, explanationEl, qIndex, selectedAnswer) {
             const qData = tfData[qIndex];
             const buttons = optionsContainer.querySelectorAll('button');
             buttons.forEach(button => {
                 const buttonAnswer = button.dataset.answer === 'true';
                 button.disabled = true;
                 if (buttonAnswer === qData.answer) {
                     button.style.backgroundColor = 'var(--correct-color)';
                     button.style.color = '#fff';
                     button.classList.add('correct');
                 }
                 if (buttonAnswer === selectedAnswer && buttonAnswer !== qData.answer) {
                     button.style.backgroundColor = 'var(--incorrect-color)';
                     button.style.color = '#fff';
                     button.classList.add('incorrect');
                 }
             });
             feedbackEl.textContent = selectedAnswer === qData.answer ? "נכון!" : "לא נכון.";
             feedbackEl.className = `feedback ${selectedAnswer === qData.answer ? 'correct' : 'incorrect'}`;
             explanationEl.textContent = `הסבר: ${qData.explanation}`;
             explanationEl.classList.remove('hidden');
        }
        
        function displayAllTF() {
             if (!tfData || tfData.length === 0) return;
             tfSingleView.classList.add('hidden');
             tfAllQuestionsContainer.innerHTML = '';
             tfData.forEach((qData, index) => {
                 const questionDiv = document.createElement('div');
                 questionDiv.className = 'question-container-all';
                 questionDiv.innerHTML = `
                     <div class="question-text">${index + 1}. ${qData.question}</div>
                     <div class="tf-options">
                         <button data-qindex="${index}" data-answer="true">נכון</button>
                         <button data-qindex="${index}" data-answer="false">לא נכון</button>
                     </div>
                     <div class="feedback hidden"></div>
                     <div class="explanation hidden"></div>
                 `;
                 tfAllQuestionsContainer.appendChild(questionDiv);
                 const optionButtons = questionDiv.querySelectorAll('.tf-options button');
                 optionButtons.forEach(button => {
                     button.onclick = () => {
                         const qIndex = parseInt(button.dataset.qindex);
                         const selectedAnswer = button.dataset.answer === 'true';
                         if (tfAnswers[qIndex] === null) {
                             const isCorrect = selectedAnswer === tfData[qIndex].answer;
                             tfAnswers[qIndex] = { selected: selectedAnswer, correct: isCorrect };
                         }
                         const optionsDiv = button.closest('.tf-options');
                         const feedbackDiv = questionDiv.querySelector('.feedback');
                         const explanationDiv = questionDiv.querySelector('.explanation');
                         highlightTFAnswer(optionsDiv, feedbackDiv, explanationDiv, qIndex, tfAnswers[qIndex].selected);
                     };
                 });
                 if (tfAnswers[index] !== null) {
                    const optionsDiv = questionDiv.querySelector('.tf-options');
                    const feedbackDiv = questionDiv.querySelector('.feedback');
                    const explanationDiv = questionDiv.querySelector('.explanation');
                    highlightTFAnswer(optionsDiv, feedbackDiv, explanationDiv, index, tfAnswers[index].selected);
                 }
             });
             tfAllQuestionsContainer.classList.remove('hidden');
        }

        function initialize() {
            if (flashcardData.length > 0) displayCard(currentCardIndex);
            if (mcqData.length > 0) displayMCQuestion(currentMCQIndex);
            if (tfData.length > 0) displayTFQuestion(currentTFIndex);
            flashcardContent.addEventListener('click', flipCard);
            prevCardBtn.addEventListener('click', () => { if (currentCardIndex > 0) { currentCardIndex--; displayCard(currentCardIndex); } });
            nextCardBtn.addEventListener('click', () => { if (currentCardIndex < flashcardData.length - 1) { currentCardIndex++; displayCard(currentCardIndex); } });
            prevMCQBtn.addEventListener('click', () => { if (currentMCQIndex > 0) { currentMCQIndex--; displayMCQuestion(currentMCQIndex); } });
            nextMCQBtn.addEventListener('click', () => { if (currentMCQIndex < mcqData.length - 1) { currentMCQIndex++; displayMCQuestion(currentMCQIndex); } });
            viewAllMCQBtn.addEventListener('click', displayAllMCQ);
            prevTFBtn.addEventListener('click', () => { if (currentTFIndex > 0) { currentTFIndex--; displayTFQuestion(currentTFIndex); } });
            nextTFBtn.addEventListener('click', () => { if (currentTFIndex < tfData.length - 1) { currentTFIndex++; displayTFQuestion(currentTFIndex); } });
            viewAllTFBtn.addEventListener('click', displayAllTF);
        }
        
        initialize();
    });
    </script>
</body>
</html>
