<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Study Tool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* --- Root Variables: Glassmorphism Dark Theme --- */
        :root {
            --primary-bg: #0a0a0f;
            --secondary-bg: rgba(255,255,255,0.03);
            --accent-color: #6C63FF;
            --accent-secondary: #A855F7;
            --accent-gradient: linear-gradient(135deg, #6C63FF, #A855F7);
            --text-color: #e2e8f0;
            --text-muted: #94a3b8;
            --correct-color: #22c55e;
            --incorrect-color: #ef4444;
            --card-bg: rgba(255,255,255,0.04);
            --eureka-bg: rgba(168,85,247,0.08);
            --eureka-border: #A855F7;
            --glass-bg: rgba(255,255,255,0.03);
            --glass-border: rgba(255,255,255,0.06);
            --glass-blur: blur(12px);
            --radius: 16px;
            --radius-sm: 10px;
        }

        @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
        @keyframes slideIn { from { opacity:0; transform:translateX(-16px); } to { opacity:1; transform:translateX(0); } }
        @keyframes cardIn { from { opacity:0; transform:scale(.96); } to { opacity:1; transform:scale(1); } }
        @keyframes shimmer { 0%{ background-position:-200% 0; } 100%{ background-position:200% 0; } }
        @keyframes pulse { 0%,100%{ opacity:1; } 50%{ opacity:.6; } }
        @keyframes glowPulse { 0%,100%{ box-shadow:0 0 20px rgba(108,99,255,.15); } 50%{ box-shadow:0 0 30px rgba(168,85,247,.25); } }

        *{ box-sizing:border-box; }

        body {
            background-color: var(--primary-bg);
            background-image:
                radial-gradient(ellipse 80% 50% at 20% 60%, rgba(108,99,255,.08), transparent),
                radial-gradient(ellipse 60% 40% at 80% 30%, rgba(168,85,247,.06), transparent);
            color: var(--text-color);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            line-height: 1.7;
            margin: 0;
            padding: 24px 16px;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 32px 28px;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            box-shadow: 0 8px 32px rgba(0,0,0,.4);
            animation: fadeIn .6s ease-out;
        }

        h1 {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            font-weight: 700;
            font-size: 1.75em;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 16px;
            margin-top: 0;
            letter-spacing: -.02em;
        }

        h2 {
            color: var(--text-color);
            text-align: center;
            font-weight: 600;
            font-size: 1.3em;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 12px;
            letter-spacing: -.01em;
        }

        .section {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            padding: 24px;
            margin-bottom: 28px;
            border-radius: var(--radius);
            animation: cardIn .5s ease-out both;
        }
        .section:nth-child(2){ animation-delay:.1s; }
        .section:nth-child(3){ animation-delay:.2s; }
        .section:nth-child(4){ animation-delay:.3s; }
        .section:nth-child(5){ animation-delay:.4s; }

        .theory-text { font-size:1.05em; line-height:1.85; color:var(--text-muted); }
        .theory-text ul { padding-right:20px; }
        .theory-text li { margin-bottom:8px; }
        .theory-text h3 {
            color:#fff; margin-top:28px; margin-bottom:12px;
            border-bottom:none; text-align:right;
            font-weight:600; font-size:1.1em;
        }

        .eureka-box {
            background: var(--eureka-bg);
            border-right: 3px solid var(--eureka-border);
            padding: 18px 20px;
            margin: 24px 0;
            border-radius: var(--radius-sm);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-top: 1px solid rgba(168,85,247,.12);
            border-bottom: 1px solid rgba(168,85,247,.12);
            border-left: 1px solid rgba(168,85,247,.12);
            animation: slideIn .4s ease-out both;
        }

        .eureka-box strong {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: block;
            margin-bottom: 8px;
            font-size: 1.05em;
            font-weight: 600;
        }

        .flashcard-container {
            min-height: 220px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #flashcard-content {
            width: 100%;
            height: 100%;
            min-height: 220px;
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 28px;
            box-sizing: border-box;
            transition: opacity .3s ease-in-out, transform .3s ease, box-shadow .3s ease;
            animation: glowPulse 4s ease-in-out infinite;
        }
        #flashcard-content:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(108,99,255,.2);
            border-color: rgba(108,99,255,.2);
        }

        .flashcard-front-style {
            font-size: 1.5em;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent-color);
        }
        .flashcard-back-style { font-size:1.05em; line-height:1.7; color:var(--text-muted); }

        .question-container-single, .question-container-all {
            margin-bottom: 16px;
            padding: 18px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
        }
        .question-text { font-weight:600; margin-bottom:16px; font-size:1.05em; }

        .options button, .tf-options button {
            display: block;
            width: 100%;
            padding: 12px 16px;
            margin: 8px 0;
            background: rgba(108,99,255,.12);
            color: var(--text-color);
            border: 1px solid rgba(108,99,255,.2);
            border-radius: var(--radius-sm);
            cursor: pointer;
            text-align: right;
            font-family: 'Inter', sans-serif;
            font-size: .95em;
            transition: all .25s ease;
        }
        .options button:hover:not(:disabled), .tf-options button:hover:not(:disabled) {
            background: rgba(108,99,255,.25);
            border-color: var(--accent-color);
            transform: translateX(-4px);
            box-shadow: 0 0 16px rgba(108,99,255,.15);
        }
        .options button:disabled, .tf-options button:disabled { cursor:not-allowed; opacity:.7; }
        .options button.correct, .tf-options button.correct { opacity:1; }
        .options button.incorrect, .tf-options button.incorrect { opacity:1; }

        .feedback {
            margin-top: 12px;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            animation: fadeIn .3s ease-out;
        }
        .feedback.correct {
            background: rgba(34,197,94,.15);
            border: 1px solid rgba(34,197,94,.3);
            color: #4ade80;
        }
        .feedback.incorrect {
            background: rgba(239,68,68,.15);
            border: 1px solid rgba(239,68,68,.3);
            color: #f87171;
        }

        .explanation {
            margin-top: 12px;
            font-style: italic;
            font-size: .9em;
            padding: 12px 16px;
            background: rgba(255,255,255,.02);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            color: var(--text-muted);
            animation: fadeIn .3s ease-out;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            margin-bottom: 12px;
        }

        .nav-button, .view-all-button {
            background: var(--accent-gradient);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: .9em;
            transition: all .25s ease;
            box-shadow: 0 2px 12px rgba(108,99,255,.2);
        }
        .nav-button:hover:not(:disabled), .view-all-button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(108,99,255,.35);
        }
        .nav-button:disabled { opacity:.35; cursor:not-allowed; transform:none; box-shadow:none; }

        .counter { font-size:.85em; color:var(--text-muted); font-family:'JetBrains Mono', monospace; }
        .view-all-container { text-align:center; margin-top:16px; margin-bottom:16px; }
        .hidden { display:none; }

        #mcq-all-questions .question-container-all,
        #tf-all-questions .question-container-all {
            margin-bottom: 20px;
            animation: fadeIn .3s ease-out both;
        }

        ::-webkit-scrollbar { width:6px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:rgba(108,99,255,.3); border-radius:3px; }
        ::-webkit-scrollbar-thumb:hover { background:rgba(108,99,255,.5); }
        ::selection { background:rgba(108,99,255,.3); color:#fff; }

    </style>
</head>
<body>
    <div class="container">
        <h1>כלי עזר ללמידה: פחמימות בכימיה של מזון</h1>

        <!-- Study Cards Section -->
        <div class="section">
            <h2>כרטיסי לימוד</h2>
            <div class="flashcard-container">
                <div id="flashcard-content"></div>
            </div>
            <div class="navigation">
                <button class="nav-button" id="prev-card">הקודם</button>
                <span class="counter" id="card-counter"></span>
                <button class="nav-button" id="next-card">הבא</button>
            </div>
        </div>

        <!-- Multiple Choice Questions Section -->
        <div class="section">
            <h2>שאלות רב-ברירה (אמריקאיות)</h2>
            <div id="mcq-single-view">
                <div class="question-container-single" id="mcq-container">
                    <div class="question-text" id="mcq-question"></div>
                    <div class="options" id="mcq-options"></div>
                    <div class="feedback hidden" id="mcq-feedback"></div>
                    <div class="explanation hidden" id="mcq-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-mcq">הקודם</button>
                    <span class="counter" id="mcq-counter"></span>
                    <button class="nav-button" id="next-mcq">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-mcq">הצג את כל השאלות</button>
                 </div>
            </div>
            <div id="mcq-all-questions" class="hidden">
                <!-- All MCQs will be dynamically inserted here -->
            </div>
        </div>

        <!-- True/False Questions Section -->
        <div class="section">
            <h2>שאלות נכון/לא נכון</h2>
             <div id="tf-single-view">
                <div class="question-container-single" id="tf-container">
                    <div class="question-text" id="tf-question"></div>
                    <div class="tf-options" id="tf-options">
                        <button data-answer="true">נכון</button>
                        <button data-answer="false">לא נכון</button>
                    </div>
                    <div class="feedback hidden" id="tf-feedback"></div>
                    <div class="explanation hidden" id="tf-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-tf">הקודם</button>
                    <span class="counter" id="tf-counter"></span>
                    <button class="nav-button" id="next-tf">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-tf">הצג את כל השאלות</button>
                 </div>
            </div>
             <div id="tf-all-questions" class="hidden">
                 <!-- All T/F Questions will be dynamically inserted here -->
             </div>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        
        const flashcardData = [
            { term: "סוכר אינברטי", definition: "תערובת אקווימולרית של גלוקוז ופרוקטוז, הנוצרת מהידרוליזה של סוכרוז. שמה נובע מהיפוך הסיבוב האופטי מדקסטרו-רוטטורי ללבו-רוטטורי." },
            { term: "קשר גליקוזידי", definition: "קשר קוולנטי מסוג אצטל או קטאל המחבר בין יחידת סוכר למולקולה אחרת, שיכולה להיות סוכר נוסף. נוצר בתגובת דחיסה תוך שחרור מולקולת מים." },
            { term: "סוכר מחזר", definition: "סוכר בעל קבוצת המיאצטל או המיקטאל חופשית, המאפשרת לו להיפתח למבנה שרשרת פתוחה עם קבוצת אלדהיד או קטון. מסוגל לחזר יונים כמו נחושת." },
            { term: "סוכרוז", definition: "דו-סוכר לא-מחזר המורכב מגלוקוז ופרוקטוז המחוברים בקשר אלפא-1, בטא-2. הפחמן האנומרי של שתי היחידות מעורב בקשר." },
            { term: "לקטוז", definition: "דו-סוכר מחזר המורכב מגלקטוז וגלוקוז בקשר בטא-1,4. ידוע כסוכר החלב ופירוקו דורש את האנזים לקטאז." },
            { term: "אי-סבילות ללקטוז", definition: "מצב הנובע ממחסור באנזים לקטאז, המוביל לתסיסה של לקטוז על ידי חיידקי המעי הגס וגורם לתסמינים כמו גזים וכאבי בטן." },
            { term: "מלטוז", definition: "דו-סוכר מחזר המורכב משתי יחידות גלוקוז בקשר אלפא-1,4. תוצר פירוק של עמילן ונפוץ בדגנים נובטים." },
            { term: "צלוביוז", definition: "דו-סוכר מחזר המורכב משתי יחידות גלוקוז בקשר בטא-1,4. יחידת המבנה של תאית ואינו ניתן לעיכול על ידי בני אדם." },
            { term: "המיאצטל", definition: "קבוצה פונקציונלית הנוצרת מתגובה של אלדהיד עם אלכוהול. במבנה הטבעתי של סוכרים, קבוצה זו מאפשרת את תכונת הסוכר המחזר." },
            { term: "אצטל", definition: "קבוצה פונקציונלית הנוצרת מתגובה של המיאצטל עם מולקולת אלכוהול נוספת. הקשר הגליקוזידי הוא קשר מסוג אצטל." },
            { term: "אינברטאז", definition: "אנזים המזרז את ההידרוליזה של סוכרוז לגלוקוז ופרוקטוז. משמש בתעשיית הממתקים למניעת התגבשות וליצירת מילויים נוזליים." },
            { term: "אפימרים", definition: "דיאסטריאומרים הנבדלים זה מזה בקונפיגורציה של מרכז כיראלי אחד בלבד. לדוגמה, גלוקוז וגלקטוז הם אפימרים בפחמן מספר 4." }
        ];

        const mcqData = [
            { question: "איזה מהמשפטים הבאים אינו מתאר נכונה את הסוכרוז?", options: ["הוא סוכר לא מחזר", "הידרוליזה שלו יוצרת סוכר אינברטי", "הקשר הגליקוזידי בו הוא מסוג בטא(1-4)", "הוא מורכב מיחידת גלוקוז ויחידת פרוקטוז"], correctIndex: 2, explanation: "הקשר הגליקוזידי בסוכרוז הוא אלפא-1,בטא-2. קשר בטא(1-4) מאפיין דו-סוכרים כמו לקטוז וצלוביוז." },
            { question: "יצרן ממתקים רוצה ליצור מילוי קרמי שיישאר נוזלי בתוך ציפוי שוקולד קשה. באיזה אנזים הכי יעיל להשתמש?", options: ["לקטאז", "עמילאז", "אינברטאז", "צלולאז"], correctIndex: 2, explanation: "אינברטאז מפרק סוכרוז לגלוקוז ופרוקטוז (סוכר אינברטי). תערובת זו מסיסה יותר מסוכרוז ומתגבשת פחות בקלות, ולכן היא אידיאלית ליצירת מילויים נוזליים." },
            { question: "מהי הסיבה הכימית לכך שלקטוז הוא סוכר מחזר, בעוד שסוכרוז אינו כזה?", options: ["ללקטוז מסה מולקולרית נמוכה יותר", "בלקטוז, ליחידת הגלוקוז יש קבוצת המיאצטל חופשית", "סוכרוז מורכב מפרוקטוז, שהוא קטוז", "לקטוז מכיל קשר בטא, בעוד שסוכרוז מכיל קשר אלפא"], correctIndex: 1, explanation: "תכונת החיזור נובעת מקיומה של קבוצת המיאצטל חופשית, היכולה להיפתח לשרשרת פתוחה עם אלדהיד. בלקטוז, הפחמן האנומרי של הגלוקוז פנוי. בסוכרוז, הפחמנים האנומריים של שני הסוכרים קשורים זה לזה." },
            { question: "איזה מהבאים מהווה את ההבדל המבני העיקרי בין מלטוז לצלוביוז?", options: ["מלטוז מורכב משתי יחידות גלוקוז, צלוביוז מורכב מגלוקוז וגלקטוז", "הקשר במלטוז הוא אלפא(1-4), בעוד שבצלוביוז הוא בטא(1-4)", "מלטוז הוא סוכר מחזר, בעוד שצלוביוז אינו מחזר", "מלטוז מתוק יותר מצלוביוז"], correctIndex: 1, explanation: "שני הדו-סוכרים מורכבים משתי יחידות גלוקוז המחוברות בקשר 1-4. ההבדל היחיד הוא בקונפיגורציה של הפחמן האנומרי המעורב בקשר: אלפא במלטוז ובטא בצלוביוז." },
            { question: "אדם הסובל מאי-סבילות ללקטוז צורך חלב שטופל באנזים לקטאז. מה מהבאים צפוי לקרות?", options: ["החלב יהיה פחות מתוק ולא יגרום לתסמינים", "החלב יהיה מתוק יותר ויגרום לתסמינים חמורים יותר", "החלב יהיה פחות מתוק ויגרום לתסמינים", "החלב יהיה מתוק יותר ולא יגרום לתסמינים"], correctIndex: 3, explanation: "האנזים לקטאז מפרק את הלקטוז לגלוקוז וגלקטוז. סוכרים אלו מתוקים יותר מהלקטוז המקורי, ולכן טעמו של החלב יהיה מתוק יותר. מכיוון שהלקטוז פורק, הוא לא יגיע למעי הגס ולא יגרום לתסמינים." },

            { question: "איזה מהדו-סוכרים הבאים אינו ניתן לעיכול על ידי בני אדם ומהווה את יחידת המבנה הבסיסית של הפוליסכריד הנפוץ ביותר בטבע?", options: ["מלטוז", "לקטוז", "סוכרוז", "צלוביוז"], correctIndex: 3, explanation: "צלוביוז הוא יחידת המבנה של תאית (צלולוז). לבני אדם אין אנזים (צלולאז) המסוגל לפרק את קשר הבטא-1,4 שבו, ולכן אינו ניתן לעיכול." },

            { question: "תופעת ה-sandiness (מרקם חולי) שעלולה להיווצר בגלידה במהלך אחסון מיוחסת בעיקר ל:", options: ["התגבשות של סוכרוז בריכוז גבוה", "התגבשות של לקטוז עקב מסיסותו הנמוכה בטמפרטורות קרות", "פירוק של שומנים ויצירת גבישים", "קפיאה איטית של המים"], correctIndex: 1, explanation: "ללקטוז, סוכר החלב, יש מסיסות נמוכה יחסית לסוכרים אחרים, במיוחד בטמפרטורות נמוכות. כאשר גלידה מאוחסנת, גבישי קרח קטנים יכולים להיווצר ולגדול, מה שגורם ללקטוז להתגבש וליצור תחושה חולית לא רצויה." },
            { question: "איזה מהמשפטים הבאים מתאר נכונה את הקשר בין טמפרטורה למתיקות נתפסת?", options: ["כל הסוכרים מתוקים יותר בטמפרטורות גבוהות", "מתיקות הסוכרוז אינה מושפעת כלל מטמפרטורה", "פרוקטוז מתוק משמעותית יותר בטמפרטורות נמוכות מאשר בטמפרטורות גבוהות", "גלוקוז הופך למר בטמפרטורות נמוכות"], correctIndex: 2, explanation: "לפרוקטוז יש מתיקות גבוהה במיוחד כשהוא קר. זו הסיבה שמשקאות ממותקים בסירופ תירס עתיר פרוקטוז (HFCS) טעימים יותר כשהם קרים." },

            { question: "הידרוליזה חומצית של תמיסת סוכרוז גורמת לשינויים הבאים, פרט לאחד. מהו היוצא דופן?", options: ["ירידה בערך ה-pH של התמיסה", "יצירת תערובת אקווימולרית של גלוקוז ופרוקטוז", "הפיכת התמיסה ללא-מחזרת", "שינוי הסיבוב האופטי של התמיסה משלילי לחיובי"], correctIndex: 3, explanation: "השינוי בסיבוב האופטי הוא הפוך: מחיובי (סוכרוז) לשלילי (סוכר אינברטי). כל שאר האפשרויות נכונות: התוצרים הם מחזרים, נוצרת תערובת גלוקוז-פרוקטוז, והידרוליזה חומצית דורשת סביבה חומצית." },

            { question: "איזו תכונה כימית מאפשרת זיהוי של סוכר מחזר במעבדה, למשל במבחן בנדיקט?", options: ["יכולתו לעבור הידרוליזה", "יכולתו של ההמיאצטל הפתוח לחזר יוני נחושת(II) ליוני נחושת(I)", "הצבע האופייני שהוא יוצר עם יוד", "תגובתו עם חומצות ליצירת צבע"], correctIndex: 1, explanation: "מבחן בנדיקט מבוסס על היכולת של קבוצת האלדהיד החופשית (במבנה הפתוח של הסוכר) לחזר יוני נחושת (Cu2+, כחול) לתחמוצת נחושת (Cu2O, משקע אדום-כתום)." },
            { question: "רפינוז וסטכיוז הם אוליגוסכרידים הגורמים לגזים. מהי הסיבה העיקרית לכך?", options: ["הם מכילים קשרים מסוג בטא שאינם ניתנים לעיכול על ידי אנזימי אנוש", "הם מתפרקים במהירות במעי הדק ויוצרים עודף גזים", "הם מגיבים עם חומצות הקיבה ומשחררים פחמן דו-חמצני", "הם מכילים חנקן במבנה שלהם"], correctIndex: 0, explanation: "אוליגוסכרידים אלו, המצויים בקטניות, מכילים קשרי אלפא-גלקטוזיד שאין לאדם אנזימים לפירוקם. לכן, הם מגיעים שלמים למעי הגס, שם הם מותססים על ידי חיידקים ויוצרים גזים." },

            { question: "היצירה של קשר גליקוזידי היא תגובה של:", options: ["חימצון, המשחררת מים", "דחיסה, הקולטת מים", "הידרוליזה, הקולטת מים", "דחיסה, המשחררת מים"], correctIndex: 3, explanation: "יצירת קשר גליקוזידי היא תגובת דחיסה (קונדנסציה) בין קבוצת הידרוקסיל (בדרך כלל מהמיאצטל) של סוכר אחד לקבוצת הידרוקסיל של מולקולה שנייה, תוך יציאה של מולקולת מים." },
            { question: "מדוע סירופ תירס עתיר מלטוז (High-maltose corn syrup) עדיף לעיתים על פני סירופים אחרים בייצור מזון?", options: ["הוא מתוק במיוחד וזול לייצור", "הוא פחות היגרוסקופי ומונע דביקות ורטרוגרדציה של עמילן", "הוא בעל ערך קלורי אפסי", "הוא מתגבש בקלות ונותן מרקם קראנצ'י"], correctIndex: 1, explanation: "אחת התכונות הפונקציונליות החשובות של מלטוז היא שהוא פחות היגרוסקופי (סופח לחות), מה שעוזר למנוע דביקות במוצרים. בנוסף, הוא יעיל במניעת רטרוגרדציה (התגבשות מחדש) של עמילן, ובכך מאריך חיי מדף." },

            { question: "מהי הסיבה האבולוציונית המשוערת להתפתחות היכולת לעכל לקטוז בבגרות (Lactase persistence) באוכלוסיות מסוימות?", options: ["זוהי מוטציה אקראית ללא יתרון הישרדותי", "צריכת בשר מוגברת דרשה אנזימי עיכול חדשים", "ביות בקר וצריכת חלב כמקור מזון חיוני העניקו יתרון סלקטיבי", "התפתחות החקלאות דרשה יכולת לעכל פוליסכרידים מורכבים"], correctIndex: 2, explanation: "התפוצה הגיאוגרפית של יכולת עיכול לקטוז בבגרות חופפת לאזורים שבהם היה ביות בקר וחלב היווה מקור תזונה חשוב. היכולת לנצל מקור מזון זה העניקה יתרון הישרדותי משמעותי." },
            { question: "במעבר ממבנה השרשרת הפתוחה של גלוקוז (אלדהיד) למבנה הטבעתי שלו (גלוקופירנוז), איזו תגובה כימית מתרחשת?", options: ["יצירת קשר אצטלי בין-מולקולרי", "תגובת סיפוח נוקלאופילי תוך-מולקולרית ליצירת המיאצטל", "תגובת חמצון-חיזור", "תגובת אסטריפיקציה"], correctIndex: 1, explanation: "הסגירה הטבעתית היא תגובה פנימית שבה אחת מקבוצות ההידרוקסיל (בדרך כלל מפחמן 5) תוקפת נוקלאופילית את פחמן הקרבוניל של האלדהיד (פחמן 1), ויוצרת קבוצת המיאצטל טבעתית." },

        function handleMCQAnswer(qIndex, selectedIndex) {
            if (mcqAnswers[qIndex] !== null) return;
            const isCorrect = selectedIndex === mcqData[qIndex].correctIndex;
            mcqAnswers[qIndex] = { selected: selectedIndex, correct: isCorrect };
            highlightMCQAnswer(mcqOptions, mcqFeedback, mcqExplanation, qIndex, selectedIndex);
        }
        
        function highlightMCQAnswer(optionsContainer, feedbackEl, explanationEl, qIndex, selectedIndex) {
            const qData = mcqData[qIndex];
            const buttons = optionsContainer.querySelectorAll('button');
            buttons.forEach((button, i) => {
                button.disabled = true;
                if (i === qData.correctIndex) {
                    button.style.backgroundColor = 'var(--correct-color)';
                    button.style.color = '#fff';
                    button.classList.add('correct');
                }
                if (i === selectedIndex && i !== qData.correctIndex) {
                    button.style.backgroundColor = 'var(--incorrect-color)';
                    button.style.color = '#fff';
                    button.classList.add('incorrect');
                }
            });
            feedbackEl.textContent = selectedIndex === qData.correctIndex ? "נכון!" : "לא נכון.";
            feedbackEl.className = `feedback ${selectedIndex === qData.correctIndex ? 'correct' : 'incorrect'}`;
            explanationEl.textContent = `הסבר: ${qData.explanation}`;
            explanationEl.classList.remove('hidden');
        }

        function displayAllMCQ() {
            if (!mcqData || mcqData.length === 0) return;
            mcqSingleView.classList.add('hidden');
            mcqAllQuestionsContainer.innerHTML = ''; 
            mcqData.forEach((qData, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question-container-all';
                questionDiv.innerHTML = `
                    <div class="question-text">${index + 1}. ${qData.question}</div>
                    <div class="options">
                        ${qData.options.map((option, i) => `<button data-qindex="${index}" data-oindex="${i}">${option}</button>`).join('')}
                    </div>
                    <div class="feedback hidden"></div>
                    <div class="explanation hidden"></div>
                `;
                mcqAllQuestionsContainer.appendChild(questionDiv);
                 const optionButtons = questionDiv.querySelectorAll('.options button');
                 optionButtons.forEach(button => {
                     button.onclick = () => {
                        const qIndex = parseInt(button.dataset.qindex);
                        const oIndex = parseInt(button.dataset.oindex);
                        if (mcqAnswers[qIndex] === null) {
                            const isCorrect = oIndex === mcqData[qIndex].correctIndex;
                            mcqAnswers[qIndex] = { selected: oIndex, correct: isCorrect };
                        }
                        const optionsDiv = button.closest('.options');
                        const feedbackDiv = questionDiv.querySelector('.feedback');
                        const explanationDiv = questionDiv.querySelector('.explanation');
                        highlightMCQAnswer(optionsDiv, feedbackDiv, explanationDiv, qIndex, mcqAnswers[qIndex].selected);
                     };
                 });
                 if (mcqAnswers[index] !== null) {
                    const optionsDiv = questionDiv.querySelector('.options');
                    const feedbackDiv = questionDiv.querySelector('.feedback');
                    const explanationDiv = questionDiv.querySelector('.explanation');
                    highlightMCQAnswer(optionsDiv, feedbackDiv, explanationDiv, index, mcqAnswers[index].selected);
                 }
            });
            mcqAllQuestionsContainer.classList.remove('hidden');
        }

        function displayTFQuestion(index) {
            if (!tfData || tfData.length === 0) return;
            const qData = tfData[index];
            tfQuestion.textContent = qData.question;
            tfFeedback.classList.add('hidden');
            tfExplanation.classList.add('hidden');
             const buttons = tfOptionsContainer.querySelectorAll('button');
             buttons.forEach(button => {
                 button.disabled = false;
                 button.style.backgroundColor = '';
                 button.style.color = '';
                 button.classList.remove('correct', 'incorrect');
                 button.onclick = () => handleTFAnswer(index, button.dataset.answer === 'true');
             });
            tfCounter.textContent = `שאלה ${index + 1} / ${tfData.length}`;
            prevTFBtn.disabled = index === 0;
            nextTFBtn.disabled = index === tfData.length - 1;
            if (tfAnswers[index] !== null) {
                highlightTFAnswer(tfOptionsContainer, tfFeedback, tfExplanation, index, tfAnswers[index].selected);
            }
        }
        
        function handleTFAnswer(qIndex, selectedAnswer) {
            if (tfAnswers[qIndex] !== null) return;
            const isCorrect = selectedAnswer === tfData[qIndex].answer;
            tfAnswers[qIndex] = { selected: selectedAnswer, correct: isCorrect };
            highlightTFAnswer(tfOptionsContainer, tfFeedback, tfExplanation, qIndex, selectedAnswer);
        }
        
        function highlightTFAnswer(optionsContainer, feedbackEl, explanationEl, qIndex, selectedAnswer) {
             const qData = tfData[qIndex];
             const buttons = optionsContainer.querySelectorAll('button');
             buttons.forEach(button => {
                 const buttonAnswer = button.dataset.answer === 'true';
                 button.disabled = true;
                 if (buttonAnswer === qData.answer) {
                     button.style.backgroundColor = 'var(--correct-color)';
                     button.style.color = '#fff';
                     button.classList.add('correct');
                 }
                 if (buttonAnswer === selectedAnswer && buttonAnswer !== qData.answer) {
                     button.style.backgroundColor = 'var(--incorrect-color)';
                     button.style.color = '#fff';
                     button.classList.add('incorrect');
                 }
             });
             feedbackEl.textContent = selectedAnswer === qData.answer ? "נכון!" : "לא נכון.";
             feedbackEl.className = `feedback ${selectedAnswer === qData.answer ? 'correct' : 'incorrect'}`;
             explanationEl.textContent = `הסבר: ${qData.explanation}`;
             explanationEl.classList.remove('hidden');
        }
        
        function displayAllTF() {
             if (!tfData || tfData.length === 0) return;
             tfSingleView.classList.add('hidden');
             tfAllQuestionsContainer.innerHTML = '';
             tfData.forEach((qData, index) => {
                 const questionDiv = document.createElement('div');
                 questionDiv.className = 'question-container-all';
                 questionDiv.innerHTML = `
                     <div class="question-text">${index + 1}. ${qData.question}</div>
                     <div class="tf-options">
                         <button data-qindex="${index}" data-answer="true">נכון</button>
                         <button data-qindex="${index}" data-answer="false">לא נכון</button>
                     </div>
                     <div class="feedback hidden"></div>
                     <div class="explanation hidden"></div>
                 `;
                 tfAllQuestionsContainer.appendChild(questionDiv);
                 const optionButtons = questionDiv.querySelectorAll('.tf-options button');
                 optionButtons.forEach(button => {
                     button.onclick = () => {
                         const qIndex = parseInt(button.dataset.qindex);
                         const selectedAnswer = button.dataset.answer === 'true';
                         if (tfAnswers[qIndex] === null) {
                             const isCorrect = selectedAnswer === tfData[qIndex].answer;
                             tfAnswers[qIndex] = { selected: selectedAnswer, correct: isCorrect };
                         }
                         const optionsDiv = button.closest('.tf-options');
                         const feedbackDiv = questionDiv.querySelector('.feedback');
                         const explanationDiv = questionDiv.querySelector('.explanation');
                         highlightTFAnswer(optionsDiv, feedbackDiv, explanationDiv, qIndex, tfAnswers[qIndex].selected);
                     };
                 });
                 if (tfAnswers[index] !== null) {
                    const optionsDiv = questionDiv.querySelector('.tf-options');
                    const feedbackDiv = questionDiv.querySelector('.feedback');
                    const explanationDiv = questionDiv.querySelector('.explanation');
                    highlightTFAnswer(optionsDiv, feedbackDiv, explanationDiv, index, tfAnswers[index].selected);
                 }
             });
             tfAllQuestionsContainer.classList.remove('hidden');
        }

        function initialize() {
            if (flashcardData.length > 0) displayCard(currentCardIndex);
            if (mcqData.length > 0) displayMCQuestion(currentMCQIndex);
            if (tfData.length > 0) displayTFQuestion(currentTFIndex);
            flashcardContent.addEventListener('click', flipCard);
            prevCardBtn.addEventListener('click', () => { if (currentCardIndex > 0) { currentCardIndex--; displayCard(currentCardIndex); } });
            nextCardBtn.addEventListener('click', () => { if (currentCardIndex < flashcardData.length - 1) { currentCardIndex++; displayCard(currentCardIndex); } });
            prevMCQBtn.addEventListener('click', () => { if (currentMCQIndex > 0) { currentMCQIndex--; displayMCQuestion(currentMCQIndex); } });
            nextMCQBtn.addEventListener('click', () => { if (currentMCQIndex < mcqData.length - 1) { currentMCQIndex++; displayMCQuestion(currentMCQIndex); } });
            viewAllMCQBtn.addEventListener('click', displayAllMCQ);
            prevTFBtn.addEventListener('click', () => { if (currentTFIndex > 0) { currentTFIndex--; displayTFQuestion(currentTFIndex); } });
            nextTFBtn.addEventListener('click', () => { if (currentTFIndex < tfData.length - 1) { currentTFIndex++; displayTFQuestion(currentTFIndex); } });
            viewAllTFBtn.addEventListener('click', displayAllTF);
        }
        
        initialize();
    });
    </script>
</body>
</html>
