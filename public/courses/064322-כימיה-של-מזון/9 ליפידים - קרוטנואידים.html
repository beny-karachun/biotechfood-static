<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Study Tool</title>
    <style>
        /* --- Root Variables for Consistent Theming --- */
        :root {
            --primary-bg: #333333;
            --secondary-bg: #666666;
            --accent-color: #3D90D7;
            --text-color: #E0E0E0;
            --correct-color: #4CAF50;
            --incorrect-color: #F44336;
            --card-bg: #5a5a5a;
        }

        /* --- Global Styles --- */
        body {
            background-color: var(--primary-bg);
            color: var(--text-color);
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 90%; /* As per prompt */
            margin: 20px auto;
            padding: 20px;
            background-color: var(--secondary-bg);
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        h1, h2 {
            color: var(--accent-color);
            text-align: center;
            border-bottom: 1px solid var(--accent-color);
            padding-bottom: 10px;
        }

        .section {
            background-color: var(--primary-bg);
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 8px;
        }

        /* --- Study Cards Styling (Fade Animation) --- */
        .flashcard-container {
            height: 250px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #flashcard-content {
            width: 100%;
            height: 100%;
            background-color: var(--card-bg);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            transition: opacity 0.3s ease-in-out; /* Fade transition */
        }
        
        .flashcard-front-style {
             font-size: 1.5em;
             font-weight: bold;
        }
        
        .flashcard-back-style {
             font-size: 1.1em;
        }

        /* --- Questions Styling (MCQ & T/F) --- */
         .question-container-single, .question-container-all {
            margin-bottom: 15px;
            padding: 15px;
            border: 1px solid var(--secondary-bg);
            border-radius: 5px;
         }

        .question-text {
            font-weight: bold;
            margin-bottom: 15px;
        }

        .options button, .tf-options button {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-align: right;
            transition: background-color 0.3s;
        }

        .options button:hover:not(:disabled), .tf-options button:hover:not(:disabled) {
            background-color: #357ab8;
        }

        .options button:disabled, .tf-options button:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
        
        /* Specific styling to override disabled opacity for correct/incorrect answers */
        .options button.correct, .tf-options button.correct { opacity: 1; }
        .options button.incorrect, .tf-options button.incorrect { opacity: 1; }


        .feedback {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
        }

        .feedback.correct {
            background-color: var(--correct-color);
            color: #fff;
        }

        .feedback.incorrect {
            background-color: var(--incorrect-color);
            color: #fff;
        }

        .explanation {
            margin-top: 10px;
            font-style: italic;
            font-size: 0.9em;
            padding: 8px;
            background-color: var(--secondary-bg);
            border-radius: 4px;
        }

        /* --- Navigation & Utility Styling --- */
        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            margin-bottom: 10px;
        }

        .nav-button, .view-all-button {
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
        }

        .nav-button:disabled {
             opacity: 0.5;
             cursor: not-allowed;
        }

        .counter {
            font-size: 0.9em;
        }

        .view-all-container {
            text-align: center;
            margin-top: 15px;
            margin-bottom: 15px;
        }

        .hidden {
            display: none;
        }

        #mcq-all-questions .question-container-all,
        #tf-all-questions .question-container-all {
            margin-bottom: 20px;
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>כלי עזר ללמידה: קרוטנואידים בכימיה של מזון</h1>

        <!-- Study Cards Section -->
        <div class="section">
            <h2>כרטיסי לימוד</h2>
            <div class="flashcard-container">
                <div id="flashcard-content"></div>
            </div>
            <div class="navigation">
                <button class="nav-button" id="prev-card">הקודם</button>
                <span class="counter" id="card-counter"></span>
                <button class="nav-button" id="next-card">הבא</button>
            </div>
        </div>

        <!-- Multiple Choice Questions Section -->
        <div class="section">
            <h2>שאלות רב-ברירה (אמריקאיות)</h2>
            <div id="mcq-single-view">
                <div class="question-container-single" id="mcq-container">
                    <div class="question-text" id="mcq-question"></div>
                    <div class="options" id="mcq-options"></div>
                    <div class="feedback hidden" id="mcq-feedback"></div>
                    <div class="explanation hidden" id="mcq-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-mcq">הקודם</button>
                    <span class="counter" id="mcq-counter"></span>
                    <button class="nav-button" id="next-mcq">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-mcq">הצג את כל השאלות</button>
                 </div>
            </div>
            <div id="mcq-all-questions" class="hidden">
                <!-- All MCQs will be dynamically inserted here -->
            </div>
        </div>

        <!-- True/False Questions Section -->
        <div class="section">
            <h2>שאלות נכון/לא נכון</h2>
             <div id="tf-single-view">
                <div class="question-container-single" id="tf-container">
                    <div class="question-text" id="tf-question"></div>
                    <div class="tf-options" id="tf-options">
                        <button data-answer="true">נכון</button>
                        <button data-answer="false">לא נכון</button>
                    </div>
                    <div class="feedback hidden" id="tf-feedback"></div>
                    <div class="explanation hidden" id="tf-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-tf">הקודם</button>
                    <span class="counter" id="tf-counter"></span>
                    <button class="nav-button" id="next-tf">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-tf">הצג את כל השאלות</button>
                 </div>
            </div>
             <div id="tf-all-questions" class="hidden">
                 <!-- All T/F Questions will be dynamically inserted here -->
             </div>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        
        const flashcardData = [
            { term: "קרוטנואידים", definition: "קבוצת פיגמנטים ליפופיליים (מסיסי שומן) טבעיים, האחראים לצבעים צהוב, כתום ואדום בצמחים רבים. בנויים כימית מ-40 אטומי פחמן (8 יחידות איזופרן)." },
            { term: "קרוטנים (Carotenes)", definition: "תת-קבוצה של קרוטנואידים שהם פחמימנים טהורים, ללא אטומי חמצן. דוגמאות בולטות כוללות בטא-קרוטן וליקופן." },
            { term: "קסנתופילים (Xanthophylls)", definition: "תת-קבוצה של קרוטנואידים המכילה אטומי חמצן בקבוצות פונקציונליות כגון הידרוקסיל, קטו או אפוקסי. דוגמאות כוללות לוטאין, זאקסנטין ואסטקסנטין." },
            { term: "פיגמנטים מסייעים (Accessory pigments)", definition: "פיגמנטים כמו קרוטנואידים אשר קולטים אור באורכי גל שכלורופיל אינו קולט ביעילות, ומעבירים את האנרגיה הנקלטת אל הכלורופיל לצורך פוטוסינתזה." },
            { term: "הגנה פוטו-כימית (Photoprotection)", definition: "אחד מתפקידיהם המרכזיים של קרוטנואידים בצמחים, בו הם מגינים על מולקולות כלורופיל מנזקי חמצון הנגרמים מעודף אור וחמצן, בעיקר על ידי נטרול חמצן סינגלט." },
            { term: "כיבוי חמצן סינגלט (Singlet Oxygen Quenching)", definition: "מנגנון הגנה בו קרוטנואיד מנטרל מולקולת חמצן סינגלט (מצב מעורר וריאקטיבי) והופך אותה לחמצן טריפלט (מצב יסוד, פחות מזיק), תוך שהוא עצמו מתחמם ופולט את האנרגיה כחום." },
            { term: "פרו-ויטמין A", definition: "תרכובת שהגוף יכול להפוך לוויטמין A. בטא-קרוטן הוא הפרו-ויטמין A החשוב ביותר מבין הקרוטנואידים. ההמרה מתרחשת במעי." },
            { term: "זמינות ביולוגית (Bioavailability)", definition: "המידה שבה רכיב תזונתי משתחרר מהמזון, נספג וזמין לשימוש הגוף. הזמינות של קרוטנואידים נמוכה יחסית ומשתפרת על ידי עיבוד תרמי וצריכה עם שומן." },
            { term: "אסטקסנטין (Astaxanthin)", definition: "קסנתופיל המשמש כפיגמנט עיקרי בדגים וסרטנאים. צבעו כחול כשהוא קשור לחלבון, והופך לאדום לאחר דנטורציה של החלבון בחום." },
            { term: "אורז זהוב (Golden Rice)", definition: "זן אורז מהונדס גנטית המייצר בטא-קרוטן באנדוספרם (החלק האכיל). פותח במטרה להילחם בחסר בוויטמין A באוכלוסיות נזקקות." },
            { term: "איזומריזציה טרנס-ציס", definition: "שינוי מבני בקשרים הכפולים של קרוטנואידים, בעיקר מצורת טרנס היציבה לצורת ציס. תהליך זה מואץ על ידי חום, אור וחומצות, ולרוב גורם לירידה בפעילות פרו-ויטמין A." },
            { term: "ליקופן (Lycopene)", definition: "קרוטן בעל צבע אדום עז, המצוי בריכוז גבוה בעגבניות ובאבטיח. הוא נוגד חמצון חזק, אך אינו בעל פעילות פרו-ויטמין A." }
        ];

        const mcqData = [
            { question: "מהי הסיבה הכימית המרכזית לכך שבישול לובסטר הופך את צבעו מכחלחל לאדום עז?", options: ["החום גורם לדנטורציה של החלבון הקשור לאסטקסנטין, ומשחרר את הפיגמנט האדום החופשי.", "תגובת מייאר בין חלבוני השריר לסוכרים יוצרת את הצבע האדום בטמפרטורה גבוהה.", "החום מחמצן פיגמנט חסר צבע והופך אותו לאסטקסנטין אדום.", "הקרוטנואידים הכחולים מתפרקים בחום, ונחשפים פיגמנטים אדומים שהיו מוסווים מתחתם."], correctIndex: 0, explanation: "אסטקסנטין קשור במצבו הטבעי לחלבון, מה שגורם לקומפלקס להיות בצבע כחול. חימום גורם לדנטורציה של החלבון ומשחרר את האסטקסנטין החופשי, שצבעו אדום." },
            { question: "איזה מהמשפטים הבאים אינו מתאר נכונה את תפקיד הקרוטנואידים בפוטוסינתזה?", options: ["הם מרחיבים את טווח אורכי הגל הנקלטים לצורך פוטוסינתזה.", "הם מעבירים אנרגיה ישירות למסלול ייצור הסוכרים, ועוקפים את הכלורופיל.", "הם מגינים על כלורופיל מנזקי חמצון הנגרמים מעודף אור וחמצן.", "הם מבצעים העברת אנרגיה מסוג סינגלט-סינגלט אל הבקטריוכלורופיל."], correctIndex: 1, explanation: "קרוטנואידים הם פיגמנטים מסייעים; הם אינם יכולים להעביר אנרגיה ישירות למסלול הפוטוסינתטי, אלא חייבים להעביר את האנרגיה שקלטו אל הכלורופיל." },
            { question: "מהו ההבדל הכימי המבני העיקרי בין קרוטנים (Carotenes) לקסנתופילים (Xanthophylls)?", options: ["לקסנתופילים יש קבוצות קצה טבעתיות, בעוד שלקרוטנים אין.", "קרוטנים הם פחמימנים טהורים, בעוד שקסנתופילים מכילים אטומי חמצן.", "קרוטנים מורכבים מ-40 פחמנים, וקסנתופילים מ-30 פחמנים.", "לקרוטנים יש קשרים כפולים מצומדים, ולקסנתופילים אין."], correctIndex: 1, explanation: "ההגדרה הבסיסית המבדילה בין שתי הקבוצות היא נוכחות חמצן. קסנתופילים הם נגזרות מחומצנות של קרוטנים." },
            { question: "במטרה לשפר את הזמינות הביולוגית של קרוטנואידים מגזר חי, מהי הפעולה המומלצת ביותר?", options: ["אכילת הגזר עם כמות קטנה של שמן זית ובישול קצר.", "אחסון הגזר במקרר לפני האכילה.", "צריכת הגזר עם מיץ לימון כדי למנוע חמצון.", "אכילת הגזר על קיבה ריקה לספיגה מרבית."], correctIndex: 0, explanation: "הזמינות הביולוגית של קרוטנואידים משתפרת על ידי שבירת המטריצה הצמחית (עיבוד תרמי) ונוכחות של שומן בתזונה, המסייע לספיגתם במעי." },
            { question: "איזה מהבאים אינו תוצר חמצון טיפוסי של קרוטנואידים?", options: ["אפוקסידים", "תרכובות נדיפות", "חומצות שומן חופשיות", "כהלים ואיזומרי ציס"], correctIndex: 2, explanation: "תוצרי חמצון של קרוטנואידים כוללים אפוקסידים, תרכובות נדיפות, כהלים, ואיזומרי ציס. חומצות שומן חופשיות הן תוצר של הידרוליזה של טריגליצרידים, לא של חמצון קרוטנואידים." },
            { question: "כיצד קרוטנואידים מונעים נזק מתגובות פוטו-הרסניות בנוכחות חמצן?", options: ["על ידי העברת אנרגיה ממצב טריפלט מעורר של כלורופיל אל הקרוטנואיד.", "על ידי תחרות עם כלורופיל על קליטת אור השמש.", "על ידי יצירת קומפלקס יציב עם חמצן מולקולרי.", "על ידי הפחתת טמפרטורת הרקמה הצמחית."], correctIndex: 0, explanation: "בנוכחות חמצן, כלורופיל מעורר יכול ליצור חמצן סינגלט מזיק. קרוטנואידים יכולים לקבל את עודף האנרגיה מהכלורופיל המעורר (העברת טריפלט-טריפלט), ובכך למנוע את יצירת חמצן הסינגלט מלכתחילה." },
            { question: "מהי מטרתו העיקרית של אורז זהוב (Golden Rice)?", options: ["להילחם בחסר של ויטמין A באוכלוסיות בסיכון.", "לשפר את טעמו ומרקמו של אורז מסורתי.", "לספק מקור חלבון איכותי יותר לאוכלוסיות צמחוניות.", "להגדיל את יבולי האורז העולמיים באמצעות עמידות למזיקים."], correctIndex: 0, explanation: "אורז זהוב פותח באמצעות הנדסה גנטית כדי לייצר בטא-קרוטן, פרו-ויטמין A, בחלק האכיל של האורז, במטרה לספק ויטמין זה לאוכלוסיות הסובלות מחסר תזונתי." },
            { question: "איזה מהתהליכים הבאים יגרום ככל הנראה לאובדן הגדול ביותר של פעילות פרו-ויטמין A בבטא-קרוטן תוך שמירה יחסית על הצבע הכתום?", options: ["איזומריזציה מטרנס לציס הנגרמת מחימום דרסטי.", "חמצון מוחלט של המולקולה בנוכחות אוויר.", "הקפאה מהירה של המוצר.", "חליטה (Blanching) קצרה במים רותחים."], correctIndex: 0, explanation: "חימום, חשיפה לממסים אורגניים או חומצות גורמים לאיזומריזציה מטרנס לציס. תהליך זה מפחית משמעותית את פעילות פרו-ויטמין A, אך לרוב אינו גורם לאובדן צבע דרמטי כמו חמצון." },
            { question: "איזה מהבאים אינו נכון לגבי תכונותיהם הפיזיקליות של קרוטנואידים?", options: ["הם ליפופיליים ומסיסים בממסים אורגניים.", "הם מסיסים היטב במים קרים.", "רובם בעלי מבנה לינארי וסימטרי.", "ניתן להפרידם באמצעות כרומטוגרפיה נוזלית בעלת ביצועים גבוהים (HPLC)."], correctIndex: 1, explanation: "קרוטנואידים הם מולקולות ליפופיליות (מסיסות בשומן) ולכן אינן מסיסות במים, שהם ממס פולארי." },

            { question: "איזה גורם אינו מאיץ חמצון של קרוטנואידים במזון?", options: ["נוכחות יוני מתכת כמו ברזל ונחושת.", "פעילות האנזים ליפוקסיגנאז על חומצות שומן רב בלתי רוויות.", "אריזה כהה ואטומה לחמצן.", "חשיפה לאור וחום."], correctIndex: 2, explanation: "אריזה כהה ואטומה לחמצן היא שיטה למניעת חמצון, שכן היא מפחיתה את החשיפה לגורמים המזרזים את התהליך: אור וחמצן. יוני מתכת ורדיקלים הנוצרים מפעילות ליפוקסיגנאז הם פרו-אוקסידנטים." },

            { question: "מהי המשמעות של העובדה שקרוטנואידים הם 'מטבוליטים שניוניים' בצמחים?", options: ["הם אינם חיוניים להישרדות הבסיסית של התא הצמחי.", "הם נוצרים רק בשלב השני של הפוטוסינתזה.", "הם קיימים בריכוזים נמוכים מאוד בהשוואה לסוכרים.", "הם נוצרים בתהליכים שאינם דורשים אנזימים."], correctIndex: 0, explanation: "מטבוליטים ראשוניים (כמו סוכרים, חומצות אמינו) חיוניים לגדילה והתפתחות בסיסית. מטבוליטים שניוניים, כמו קרוטנואידים, אינם חיוניים ישירות להישרדות התא, אך מעניקים יתרונות אקולוגיים כמו הגנה, צבע למשיכת מאביקים ועוד." },

            if (mcqAnswers[qIndex] !== null) return;
            const isCorrect = selectedIndex === mcqData[qIndex].correctIndex;
            mcqAnswers[qIndex] = { selected: selectedIndex, correct: isCorrect };
            highlightMCQAnswer(mcqOptions, mcqFeedback, mcqExplanation, qIndex, selectedIndex);
        }
        
        function highlightMCQAnswer(optionsContainer, feedbackEl, explanationEl, qIndex, selectedIndex) {
            const qData = mcqData[qIndex];
            const buttons = optionsContainer.querySelectorAll('button');
            buttons.forEach((button, i) => {
                button.disabled = true;
                if (i === qData.correctIndex) {
                    button.style.backgroundColor = 'var(--correct-color)';
                    button.style.color = '#fff';
                    button.classList.add('correct');
                }
                if (i === selectedIndex && i !== qData.correctIndex) {
                    button.style.backgroundColor = 'var(--incorrect-color)';
                    button.style.color = '#fff';
                    button.classList.add('incorrect');
                }
            });
            feedbackEl.textContent = selectedIndex === qData.correctIndex ? "נכון!" : "לא נכון.";
            feedbackEl.className = `feedback ${selectedIndex === qData.correctIndex ? 'correct' : 'incorrect'}`;
            explanationEl.textContent = `הסבר: ${qData.explanation}`;
            explanationEl.classList.remove('hidden');
        }

        function displayAllMCQ() {
            if (!mcqData || mcqData.length === 0) return;
            mcqSingleView.classList.add('hidden');
            mcqAllQuestionsContainer.innerHTML = ''; 
            mcqData.forEach((qData, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question-container-all';
                questionDiv.innerHTML = `
                    <div class="question-text">${index + 1}. ${qData.question}</div>
                    <div class="options">
                        ${qData.options.map((option, i) => `<button data-qindex="${index}" data-oindex="${i}">${option}</button>`).join('')}
                    </div>
                    <div class="feedback hidden"></div>
                    <div class="explanation hidden"></div>
                `;
                mcqAllQuestionsContainer.appendChild(questionDiv);
                 const optionButtons = questionDiv.querySelectorAll('.options button');
                 optionButtons.forEach(button => {
                     button.onclick = () => {
                        const qIndex = parseInt(button.dataset.qindex);
                        const oIndex = parseInt(button.dataset.oindex);
                        if (mcqAnswers[qIndex] === null) {
                            const isCorrect = oIndex === mcqData[qIndex].correctIndex;
                            mcqAnswers[qIndex] = { selected: oIndex, correct: isCorrect };
                        }
                        const optionsDiv = button.closest('.options');
                        const feedbackDiv = questionDiv.querySelector('.feedback');
                        const explanationDiv = questionDiv.querySelector('.explanation');
                        highlightMCQAnswer(optionsDiv, feedbackDiv, explanationDiv, qIndex, mcqAnswers[qIndex].selected);
                     };
                 });
                 if (mcqAnswers[index] !== null) {
                    const optionsDiv = questionDiv.querySelector('.options');
                    const feedbackDiv = questionDiv.querySelector('.feedback');
                    const explanationDiv = questionDiv.querySelector('.explanation');
                    highlightMCQAnswer(optionsDiv, feedbackDiv, explanationDiv, index, mcqAnswers[index].selected);
                 }
            });
            mcqAllQuestionsContainer.classList.remove('hidden');
        }

        function displayTFQuestion(index) {
            if (!tfData || tfData.length === 0) return;
            const qData = tfData[index];
            tfQuestion.textContent = qData.question;
            tfFeedback.classList.add('hidden');
            tfExplanation.classList.add('hidden');
             const buttons = tfOptionsContainer.querySelectorAll('button');
             buttons.forEach(button => {
                 button.disabled = false;
                 button.style.backgroundColor = '';
                 button.style.color = '';
                 button.classList.remove('correct', 'incorrect');
                 button.onclick = () => handleTFAnswer(index, button.dataset.answer === 'true');
             });
            tfCounter.textContent = `שאלה ${index + 1} / ${tfData.length}`;
            prevTFBtn.disabled = index === 0;
            nextTFBtn.disabled = index === tfData.length - 1;
            if (tfAnswers[index] !== null) {
                highlightTFAnswer(tfOptionsContainer, tfFeedback, tfExplanation, index, tfAnswers[index].selected);
            }
        }
        
        function handleTFAnswer(qIndex, selectedAnswer) {
            if (tfAnswers[qIndex] !== null) return;
            const isCorrect = selectedAnswer === tfData[qIndex].answer;
            tfAnswers[qIndex] = { selected: selectedAnswer, correct: isCorrect };
            highlightTFAnswer(tfOptionsContainer, tfFeedback, tfExplanation, qIndex, selectedAnswer);
        }
        
        function highlightTFAnswer(optionsContainer, feedbackEl, explanationEl, qIndex, selectedAnswer) {
             const qData = tfData[qIndex];
             const buttons = optionsContainer.querySelectorAll('button');
             buttons.forEach(button => {
                 const buttonAnswer = button.dataset.answer === 'true';
                 button.disabled = true;
                 if (buttonAnswer === qData.answer) {
                     button.style.backgroundColor = 'var(--correct-color)';
                     button.style.color = '#fff';
                     button.classList.add('correct');
                 }
                 if (buttonAnswer === selectedAnswer && buttonAnswer !== qData.answer) {
                     button.style.backgroundColor = 'var(--incorrect-color)';
                     button.style.color = '#fff';
                     button.classList.add('incorrect');
                 }
             });
             feedbackEl.textContent = selectedAnswer === qData.answer ? "נכון!" : "לא נכון.";
             feedbackEl.className = `feedback ${selectedAnswer === qData.answer ? 'correct' : 'incorrect'}`;
             explanationEl.textContent = `הסבר: ${qData.explanation}`;
             explanationEl.classList.remove('hidden');
        }
        
        function displayAllTF() {
             if (!tfData || tfData.length === 0) return;
             tfSingleView.classList.add('hidden');
             tfAllQuestionsContainer.innerHTML = '';
             tfData.forEach((qData, index) => {
                 const questionDiv = document.createElement('div');
                 questionDiv.className = 'question-container-all';
                 questionDiv.innerHTML = `
                     <div class="question-text">${index + 1}. ${qData.question}</div>
                     <div class="tf-options">
                         <button data-qindex="${index}" data-answer="true">נכון</button>
                         <button data-qindex="${index}" data-answer="false">לא נכון</button>
                     </div>
                     <div class="feedback hidden"></div>
                     <div class="explanation hidden"></div>
                 `;
                 tfAllQuestionsContainer.appendChild(questionDiv);
                 const optionButtons = questionDiv.querySelectorAll('.tf-options button');
                 optionButtons.forEach(button => {
                     button.onclick = () => {
                         const qIndex = parseInt(button.dataset.qindex);
                         const selectedAnswer = button.dataset.answer === 'true';
                         if (tfAnswers[qIndex] === null) {
                             const isCorrect = selectedAnswer === tfData[qIndex].answer;
                             tfAnswers[qIndex] = { selected: selectedAnswer, correct: isCorrect };
                         }
                         const optionsDiv = button.closest('.tf-options');
                         const feedbackDiv = questionDiv.querySelector('.feedback');
                         const explanationDiv = questionDiv.querySelector('.explanation');
                         highlightTFAnswer(optionsDiv, feedbackDiv, explanationDiv, qIndex, tfAnswers[qIndex].selected);
                     };
                 });
                 if (tfAnswers[index] !== null) {
                    const optionsDiv = questionDiv.querySelector('.tf-options');
                    const feedbackDiv = questionDiv.querySelector('.feedback');
                    const explanationDiv = questionDiv.querySelector('.explanation');
                    highlightTFAnswer(optionsDiv, feedbackDiv, explanationDiv, index, tfAnswers[index].selected);
                 }
             });
             tfAllQuestionsContainer.classList.remove('hidden');
        }

        function initialize() {
            if (flashcardData.length > 0) displayCard(currentCardIndex);
            if (mcqData.length > 0) displayMCQuestion(currentMCQIndex);
            if (tfData.length > 0) displayTFQuestion(currentTFIndex);
            flashcardContent.addEventListener('click', flipCard);
            prevCardBtn.addEventListener('click', () => { if (currentCardIndex > 0) { currentCardIndex--; displayCard(currentCardIndex); } });
            nextCardBtn.addEventListener('click', () => { if (currentCardIndex < flashcardData.length - 1) { currentCardIndex++; displayCard(currentCardIndex); } });
            prevMCQBtn.addEventListener('click', () => { if (currentMCQIndex > 0) { currentMCQIndex--; displayMCQuestion(currentMCQIndex); } });
            nextMCQBtn.addEventListener('click', () => { if (currentMCQIndex < mcqData.length - 1) { currentMCQIndex++; displayMCQuestion(currentMCQIndex); } });
            viewAllMCQBtn.addEventListener('click', displayAllMCQ);
            prevTFBtn.addEventListener('click', () => { if (currentTFIndex > 0) { currentTFIndex--; displayTFQuestion(currentTFIndex); } });
            nextTFBtn.addEventListener('click', () => { if (currentTFIndex < tfData.length - 1) { currentTFIndex++; displayTFQuestion(currentTFIndex); } });
            viewAllTFBtn.addEventListener('click', displayAllTF);
        }
        
        initialize();
    });
    </script>
</body>
</html>
