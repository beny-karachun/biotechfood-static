<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Study Tool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* --- Root Variables: Glassmorphism Dark Theme --- */
        :root {
            --primary-bg: #0a0a0f;
            --secondary-bg: rgba(255,255,255,0.03);
            --accent-color: #6C63FF;
            --accent-secondary: #A855F7;
            --accent-gradient: linear-gradient(135deg, #6C63FF, #A855F7);
            --text-color: #e2e8f0;
            --text-muted: #94a3b8;
            --correct-color: #22c55e;
            --incorrect-color: #ef4444;
            --card-bg: rgba(255,255,255,0.04);
            --eureka-bg: rgba(168,85,247,0.08);
            --eureka-border: #A855F7;
            --glass-bg: rgba(255,255,255,0.03);
            --glass-border: rgba(255,255,255,0.06);
            --glass-blur: blur(12px);
            --radius: 16px;
            --radius-sm: 10px;
        }

        @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
        @keyframes slideIn { from { opacity:0; transform:translateX(-16px); } to { opacity:1; transform:translateX(0); } }
        @keyframes cardIn { from { opacity:0; transform:scale(.96); } to { opacity:1; transform:scale(1); } }
        @keyframes shimmer { 0%{ background-position:-200% 0; } 100%{ background-position:200% 0; } }
        @keyframes pulse { 0%,100%{ opacity:1; } 50%{ opacity:.6; } }
        @keyframes glowPulse { 0%,100%{ box-shadow:0 0 20px rgba(108,99,255,.15); } 50%{ box-shadow:0 0 30px rgba(168,85,247,.25); } }

        *{ box-sizing:border-box; }

        body {
            background-color: var(--primary-bg);
            background-image:
                radial-gradient(ellipse 80% 50% at 20% 60%, rgba(108,99,255,.08), transparent),
                radial-gradient(ellipse 60% 40% at 80% 30%, rgba(168,85,247,.06), transparent);
            color: var(--text-color);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            line-height: 1.7;
            margin: 0;
            padding: 24px 16px;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 32px 28px;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            box-shadow: 0 8px 32px rgba(0,0,0,.4);
            animation: fadeIn .6s ease-out;
        }

        h1 {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            font-weight: 700;
            font-size: 1.75em;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 16px;
            margin-top: 0;
            letter-spacing: -.02em;
        }

        h2 {
            color: var(--text-color);
            text-align: center;
            font-weight: 600;
            font-size: 1.3em;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 12px;
            letter-spacing: -.01em;
        }

        .section {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            padding: 24px;
            margin-bottom: 28px;
            border-radius: var(--radius);
            animation: cardIn .5s ease-out both;
        }
        .section:nth-child(2){ animation-delay:.1s; }
        .section:nth-child(3){ animation-delay:.2s; }
        .section:nth-child(4){ animation-delay:.3s; }
        .section:nth-child(5){ animation-delay:.4s; }

        .theory-text { font-size:1.05em; line-height:1.85; color:var(--text-muted); }
        .theory-text ul { padding-right:20px; }
        .theory-text li { margin-bottom:8px; }
        .theory-text h3 {
            color:#fff; margin-top:28px; margin-bottom:12px;
            border-bottom:none; text-align:right;
            font-weight:600; font-size:1.1em;
        }

        .eureka-box {
            background: var(--eureka-bg);
            border-right: 3px solid var(--eureka-border);
            padding: 18px 20px;
            margin: 24px 0;
            border-radius: var(--radius-sm);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-top: 1px solid rgba(168,85,247,.12);
            border-bottom: 1px solid rgba(168,85,247,.12);
            border-left: 1px solid rgba(168,85,247,.12);
            animation: slideIn .4s ease-out both;
        }

        .eureka-box strong {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: block;
            margin-bottom: 8px;
            font-size: 1.05em;
            font-weight: 600;
        }

        .flashcard-container {
            min-height: 220px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #flashcard-content {
            width: 100%;
            height: 100%;
            min-height: 220px;
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 28px;
            box-sizing: border-box;
            transition: opacity .3s ease-in-out, transform .3s ease, box-shadow .3s ease;
            animation: glowPulse 4s ease-in-out infinite;
        }
        #flashcard-content:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(108,99,255,.2);
            border-color: rgba(108,99,255,.2);
        }

        .flashcard-front-style {
            font-size: 1.5em;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent-color);
        }
        .flashcard-back-style { font-size:1.05em; line-height:1.7; color:var(--text-muted); }

        .question-container-single, .question-container-all {
            margin-bottom: 16px;
            padding: 18px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
        }
        .question-text { font-weight:600; margin-bottom:16px; font-size:1.05em; }

        .options button, .tf-options button {
            display: block;
            width: 100%;
            padding: 12px 16px;
            margin: 8px 0;
            background: rgba(108,99,255,.12);
            color: var(--text-color);
            border: 1px solid rgba(108,99,255,.2);
            border-radius: var(--radius-sm);
            cursor: pointer;
            text-align: right;
            font-family: 'Inter', sans-serif;
            font-size: .95em;
            transition: all .25s ease;
        }
        .options button:hover:not(:disabled), .tf-options button:hover:not(:disabled) {
            background: rgba(108,99,255,.25);
            border-color: var(--accent-color);
            transform: translateX(-4px);
            box-shadow: 0 0 16px rgba(108,99,255,.15);
        }
        .options button:disabled, .tf-options button:disabled { cursor:not-allowed; opacity:.7; }
        .options button.correct, .tf-options button.correct { opacity:1; }
        .options button.incorrect, .tf-options button.incorrect { opacity:1; }

        .feedback {
            margin-top: 12px;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            animation: fadeIn .3s ease-out;
        }
        .feedback.correct {
            background: rgba(34,197,94,.15);
            border: 1px solid rgba(34,197,94,.3);
            color: #4ade80;
        }
        .feedback.incorrect {
            background: rgba(239,68,68,.15);
            border: 1px solid rgba(239,68,68,.3);
            color: #f87171;
        }

        .explanation {
            margin-top: 12px;
            font-style: italic;
            font-size: .9em;
            padding: 12px 16px;
            background: rgba(255,255,255,.02);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            color: var(--text-muted);
            animation: fadeIn .3s ease-out;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            margin-bottom: 12px;
        }

        .nav-button, .view-all-button {
            background: var(--accent-gradient);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: .9em;
            transition: all .25s ease;
            box-shadow: 0 2px 12px rgba(108,99,255,.2);
        }
        .nav-button:hover:not(:disabled), .view-all-button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(108,99,255,.35);
        }
        .nav-button:disabled { opacity:.35; cursor:not-allowed; transform:none; box-shadow:none; }

        .counter { font-size:.85em; color:var(--text-muted); font-family:'JetBrains Mono', monospace; }
        .view-all-container { text-align:center; margin-top:16px; margin-bottom:16px; }
        .hidden { display:none; }

        #mcq-all-questions .question-container-all,
        #tf-all-questions .question-container-all {
            margin-bottom: 20px;
            animation: fadeIn .3s ease-out both;
        }

        ::-webkit-scrollbar { width:6px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:rgba(108,99,255,.3); border-radius:3px; }
        ::-webkit-scrollbar-thumb:hover { background:rgba(108,99,255,.5); }
        ::selection { background:rgba(108,99,255,.3); color:#fff; }

    </style>
</head>
<body>
    <div class="container">
        <h1>כלי עזר ללמידה: תגובות כימיות של ליפידים</h1>

        <!-- Study Cards Section -->
        <div class="section">
            <h2>כרטיסי לימוד</h2>
            <div class="flashcard-container">
                <div id="flashcard-content"></div>
            </div>
            <div class="navigation">
                <button class="nav-button" id="prev-card">הקודם</button>
                <span class="counter" id="card-counter"></span>
                <button class="nav-button" id="next-card">הבא</button>
            </div>
        </div>

        <!-- Multiple Choice Questions Section -->
        <div class="section">
            <h2>שאלות רב-ברירה (אמריקאיות)</h2>
            <div id="mcq-single-view">
                <div class="question-container-single" id="mcq-container">
                    <div class="question-text" id="mcq-question"></div>
                    <div class="options" id="mcq-options"></div>
                    <div class="feedback hidden" id="mcq-feedback"></div>
                    <div class="explanation hidden" id="mcq-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-mcq">הקודם</button>
                    <span class="counter" id="mcq-counter"></span>
                    <button class="nav-button" id="next-mcq">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-mcq">הצג את כל השאלות</button>
                 </div>
            </div>
            <div id="mcq-all-questions" class="hidden">
                <!-- All MCQs will be dynamically inserted here -->
            </div>
        </div>

        <!-- True/False Questions Section -->
        <div class="section">
            <h2>שאלות נכון/לא נכון</h2>
             <div id="tf-single-view">
                <div class="question-container-single" id="tf-container">
                    <div class="question-text" id="tf-question"></div>
                    <div class="tf-options" id="tf-options">
                        <button data-answer="true">נכון</button>
                        <button data-answer="false">לא נכון</button>
                    </div>
                    <div class="feedback hidden" id="tf-feedback"></div>
                    <div class="explanation hidden" id="tf-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-tf">הקודם</button>
                    <span class="counter" id="tf-counter"></span>
                    <button class="nav-button" id="next-tf">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-tf">הצג את כל השאלות</button>
                 </div>
            </div>
             <div id="tf-all-questions" class="hidden">
                 <!-- All T/F Questions will be dynamically inserted here -->
             </div>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        
        const flashcardData = [
            { term: "אוטו-אוקסידציה", definition: "תהליך חמצון עצמי של ליפידים המתרחש במנגנון של רדיקלים חופשיים. כולל שלושה שלבים: אתחול, התפשטות וסיום, ומוביל לעפשות וירידה באיכות המזון." },
            { term: "הידרוגנציה", definition: "תהליך כימי תעשייתי להוספת אטומי מימן לקשרים הכפולים בחומצות שומן בלתי רוויות. התהליך מעלה את נקודת ההתכה של השמן והופך אותו למוצק או מוצק למחצה." },
            { term: "חמצן סינגלט (¹O₂)", definition: "מצב מעורר של מולקולת חמצן, בו שני האלקטרונים החיצוניים הם בעלי ספינים הפוכים. הוא אלקטרופילי מאוד ומגיב במהירות עם קשרים כפולים בליפידים, מה שמתחיל תהליכי חמצון." },
            { term: "חמצן טריפלט (³O₂)", definition: "מצב היסוד של מולקולת חמצן, שהוא בירדיקל בעל שני אלקטרונים עם ספינים מקבילים. מצב זה פחות ריאקטיבי מחמצן סינגלט בתגובות ישירות עם ליפידים." },
            { term: "אינטראסטריפיקציה", definition: "תהליך סידור מחדש של חומצות שומן על שלד הגליצרול בטריגליצרידים. משמש כחלופה להידרוגנציה חלקית ליצירת מרגרינה ללא שומן טראנס." },
            { term: "עפשות הידרוליטית", definition: "קלקול שומנים הנובע מפירוק קשרים אסטריים על ידי מים (בעזרת אנזימים כמו ליפאז, חומצה או בסיס), לשחרור חומצות שומן חופשיות (FFA) הגורמות לטעמי לוואי." },
            { term: "פרו-אוקסידנטים", definition: "חומרים המאיצים תהליכי חמצון. דוגמאות נפוצות במזון כוללות מתכות מעבר (כמו ברזל ונחושת) ופיגמנטים פוטוסנסיטיים (כמו כלורופיל) המייצרים חמצן סינגלט." },
            { term: "ערך פראוקסיד (PV)", definition: "מדד לכמות ההידרופראוקסידים (תוצרי החמצון הראשוניים) בשומן. משמש למעקב אחר שלבי החמצון המוקדמים. נמדד בדרך כלל במיליאקוויוולנט של חמצן לקילוגרם שומן." },
            { term: "מבחן TBARS", definition: "מבחן המודד חומרים המגיבים עם חומצה תיוברביטורית, ובעיקר מלונדיאלדהיד, שהוא תוצר פירוק שניוני של חמצון ליפידים. משמש כמדד לחמצון מתקדם ולטעמי לוואי." },
            { term: "חומר בלתי מסתבן", definition: "חלק מהליפידים שאינו עובר הידרוליזה (ספוניפיקציה) בתגובה עם בסיס חזק. כולל תרכובות כמו ויטמינים מסיסי שומן (A, E), כולסטרול וקרוטנואידים." },
            { term: "טרנסאסטריפיקציה", definition: "תגובה כימית כללית של החלפת קבוצת אלקוקסי באסטר עם אלכוהול אחר. אינטראסטריפיקציה היא סוג ספציפי של טרנסאסטריפיקציה המתרחשת בין טריגליצרידים." },
            { term: "הידרוגנציה חלקית", definition: "תהליך הידרוגנציה שאינו מובא לסיומו המלא, וכתוצאה מכך חלק מהקשרים הכפולים נשארים. תהליך זה ידוע לשמצה ביצירת איזומרים של שומן טראנס." }
        ];

        const mcqData = [
            { question: "איזו מהאפשרויות הבאות אינה תוצאה ישירה של תהליך הידרוגנציה חלקית של שמן צמחי?", options: ["עלייה בנקודת ההתכה של השמן", "יצירת חומצות שומן טראנס", "ירידה בערך היוד", "עלייה משמעותית בתכולת חומצות השומן החיוניות"], correctIndex: 3, explanation: "הידרוגנציה, ובמיוחד הידרוגנציה חלקית, גורמת לאיבוד של חומצות שומן חיוניות (PUFA) על ידי הפיכתן לחומצות שומן רוויות או טראנס. שאר האפשרויות הן תוצאות אופייניות של התהליך." },
            { question: "מהו ההבדל המהותי בין חמצון ליפידים באמצעות חמצן סינגלט (¹O₂) לבין אוטו-אוקסידציה עם חמצן טריפלט (³O₂)?", options: ["חמצן סינגלט תוקף ישירות את הקשר הכפול, בעוד שאוטו-אוקסידציה מתחילה בהוצאת אטום מימן", "אוטו-אוקסידציה אינה דורשת אנרגיית אתחול, בניגוד לחמצון עם חמצן סינגלט", "חמצון עם חמצן סינגלט מייצר רק איזומר אחד של הידרופרוקסיד", "אוטו-אוקסידציה מתרחשת רק בטמפרטורות גבוהות מאוד"], correctIndex: 0, explanation: "חמצן סינגלט, בהיותו אלקטרופילי, מגיב ישירות עם הקשר הכפול בתגובת 'ene'. לעומת זאת, מנגנון האוטו-אוקסידציה הרדיקלי מתחיל בשלב אתחול של יצירת רדיקל ליפידי על ידי הוצאת מימן אלילי." },
            { question: "יצרן מרגרינה מעוניין לייצר מוצר ללא שומן טראנס בעל מרקם רך. באיזו טכנולוגיה סביר ביותר שישתמש?", options: ["הידרוגנציה מלאה של שמן סויה", "הידרוגנציה חלקית מבוקרת", "ערבוב שמן סויה נוזלי עם שמן סויה שעבר הידרוגנציה מלאה, ולאחר מכן אינטראסטריפיקציה", "ליפוליזה אנזימטית של שמן דקלים"], correctIndex: 2, explanation: "אינטראסטריפיקציה מאפשרת סידור מחדש של חומצות שומן רוויות (משמן שעבר הידרוגנציה מלאה) ובלתי רוויות (משמן נוזלי) ליצירת טריגליצרידים בעלי תכונות רצויות, ללא יצירת שומן טראנס." },
            { question: "איזה מהמשפטים הבאים אינו נכון לגבי פרו-אוקסידנטים במזון?", options: ["מתכות מעבר כמו ברזל ונחושת מאיצות חמצון גם בריכוזים נמוכים מאוד (ppm)", "כלורופיל יכול לפעול כפרו-אוקסידנט על ידי יצירת חמצן סינגלט בנוכחות אור", "יוני מתכת יכולים להתחיל חמצון על ידי תגובה ישירה עם חומצת שומן בלתי רוויה ליצירת רדיקל", "פעילותם של פרו-אוקסידנטים מתכתיים פוחתת משמעותית בפעילות מים (aw) נמוכה מאוד, קרוב לאפס"], correctIndex: 3, explanation: "בפעילות מים נמוכה מאוד (מתחת ל-0.1), דווקא קצב החמצון עולה, בין היתר עקב ניידות מוגברת של זרזים. הפעילות המינימלית של פרו-אוקסידנטים מתכתיים היא בפעילות מים של כ-0.3." },
            { question: "במהלך שלב ה-propagation (התפשטות) של אוטו-אוקסידציה, איזה רדיקל הוא הדומיננטי והמניע את תגובת השרשרת?", options: ["רדיקל הידרוקסיל (HO•)", "רדיקל אלקיל ליפידי (R•)", "רדיקל פרוקסי (ROO•)", "אטום מימן (H•)"], correctIndex: 2, explanation: "הרדיקל הפרוקסי (ROO•) נוצר מתגובת הרדיקל הליפידי (R•) עם חמצן. רדיקל זה מגיב עם מולקולת שומן נוספת (RH), יוצר הידרופרוקסיד (ROOH) ורדיקל ליפידי חדש (R•), ובכך מניע את תגובת השרשרת המתמשכת." },
            { question: "מדוע חומצות שומן חופשיות (FFA) רגישות לחמצון יותר מאשר טריגליצרידים (TG)?", options: ["כי קבוצת הקרבוקסיל החופשית מייצבת את הרדיקל הנוצר", "כי הן ניידות יותר במערכת ומגיעות בקלות למגע עם פרו-אוקסידנטים", "כי היעדר שלד הגליצרול חושף את הקשרים הכפולים לתקיפה", "כי הן תמיד בעלות דרגת אי-רוויה גבוהה יותר"], correctIndex: 1, explanation: "למרות שכל התשובות נשמעות סבירות, הסיבה העיקרית היא הניידות המוגברת שלהן. כחומצות חופשיות, הן יכולות לנוע ביתר קלות במטריצת המזון ולהגיע למגע עם זרזים לחמצון כמו יוני מתכת." },
            { question: "איזו מהתופעות הבאות אינה מאפיינת את שלב הסיום (termination) של אוטו-אוקסידציה?", options: ["יצירת תוצרים לא-רדיקליים", "תגובה בין שני רדיקלים פרוקסיים (ROO•)", "תלות בריכוז חמצן גבוה", "תגובה בין רדיקל פרוקסי לרדיקל ליפידי (R•)"], correctIndex: 2, explanation: "שלב הסיום מתרחש כאשר ריכוז הרדיקלים החופשיים גבוה מספיק כדי שהם יגיבו זה עם זה. תהליך זה דומיננטי כאשר ריכוז החמצן נמוך, מה שמגביל את שלב ההתפשטות ומעלה את הסיכוי להתנגשות בין רדיקלים." },
            { question: "במבחן למדידת ערך פראוקסיד (PV), מהו העיקרון הכימי המרכזי?", options: ["תגובת צבע בין מלונדיאלדהיד לחומצה תיוברביטורית", "חמצון של יודיד (I⁻) ליוד (I₂) על ידי הידרופראוקסידים", "מדידת בליעת UV של דיאנים מצומדים", "מדידת צריכת החמצן בדגימה לאורך זמן"], correctIndex: 1, explanation: "מדידת PV מבוססת על יכולתם של הידרופראוקסידים (ROOH), תוצרי החמצון הראשוניים, לחמצן יוני יודיד (ממקור כמו KI) ליוד מולקולרי (I₂), אשר לאחר מכן ניתן לכימות באמצעות טיטרציה." },
            { question: "שמן קנולה עבר הידרוגנציה מתקדמת. איזה שינוי אינו צפוי להתרחש בהרכב חומצות השומן שלו?", options: ["ירידה דרסטית בערך היוד", "ירידה באחוז חומצה לינולנית (18:3)", "עלייה באחוז שומן טראנס ולאחר מכן ירידה", "עלייה מתמדת באחוז חומצה אלאידית (18:1t-9)"], correctIndex: 3, explanation: "במהלך הידרוגנציה מתקדמת, אחוז שומן הטראנס עולה בשלבים הראשונים (הידרוגנציה חלקית) אך לאחר מכן יורד ככל שהתהליך מתקדם והקשרים הכפולים (כולל טראנס) הופכים לרוויים. לכן, לא תהיה עלייה מתמדת." },
            { question: "מהי הסיבה העיקרית לכך ששומן טראנס תעשייתי נחשב למזיק יותר משומן רווי?", options: ["הוא מעלה רמות LDL ומוריד רמות HDL", "הוא גורם לעלייה מהירה יותר במשקל", "הוא מתחמצן מהר יותר משומן רווי", "הוא אינו מכיל כולסטרול"], correctIndex: 0, explanation: "ההשפעה השלילית העיקרית והמוכחת של שומן טראנס תעשייתי היא השפעתו הכפולה והמזיקה על פרופיל השומנים בדם: העלאת הכולסטרול ה'רע' (LDL) והורדת הכולסטרול ה'טוב' (HDL)." },
            { question: "חברה מפתחת שמן סויה מהונדס גנטית המכיל 85% חומצה אולאית (18:1) במקום 25% בשמן רגיל. מהי האסטרטגיה הביוטכנולוגית הסבירה ביותר שהופעלה?", options: ["החדרת גן לאנזים דה-סטוראז ממיקרואורגניזם", "ביטול (Knock-out) של הגן לאנזים אומגה-12 דה-סטוראז", "הפעלת יתר של אנזימי אלונגאז", "שימוש בליפאז ספציפי למיקום sn-2"], correctIndex: 1, explanation: "האנזים אומגה-12 דה-סטוראז אחראי להפיכת חומצה אולאית (18:1) לחומצה לינולאית (18:2). ביטול פעילותו מונע את ההמרה הזו וגורם להצטברות של חומצה אולאית." },
            { question: "איזה מהמשפטים הבאים מתאר באופן שגוי את ההבדלים בין שומן טראנס טבעי (ממעלי גירה) לתעשייתי?", options: ["בשומן טבעי, האיזומר הדומיננטי הוא חומצה ואקסנית (18:1t-11)", "שומן טראנס תעשייתי מכיל בעיקר חומצה אלאידית (18:1t-9)", "שומן טבעי נוצר עקב הידרוגנציה חלקית על קטליזטור ניקל", "ריכוז שומן הטראנס בשומן חלב הוא כ-3%, בעוד שבשמן מוקשה חלקית הוא יכול להגיע ל-30% ומעלה"], correctIndex: 2, explanation: "שומן טראנס טבעי נוצר בתהליך ביו-הידרוגנציה מיקרוביאלי בכרס של מעלי גירה. שומן טראנס תעשייתי נוצר מהידרוגנציה חלקית על קטליזטור מתכתי כמו ניקל." },
            { question: "בתהליך ליפוליזה מבוקר, כמו בייצור גבינות מסוימות, מהו התוצר הרצוי העיקרי התורם לארומה?", options: ["גליצרול", "חומצות שומן חופשיות (FFA) קצרות שרשרת", "דיגליצרידים", "פוספוליפידים"], correctIndex: 1, explanation: "בגבינות כמו רוקפור, ליפאזות מפרקות טריגליצרידים ומשחררות חומצות שומן חופשיות, במיוחד קצרות שרשרת (כמו חומצה בוטירית), אשר הן נדיפות ותורמות לארומה האופיינית." },
            { question: "איזו מהתכונות הבאות אינה מאפיינת חמצן סינגלט (¹O₂)?", options: ["זמן חיים ארוך יחסית (מיקרו-שניות)", "ריאקטיביות גבוהה פי 1500 מחמצן טריפלט עם קשרים כפולים", "יכולת להיווצר על ידי פוטו-סנסיטיזציה", "מצב אנרגטי נמוך ממצב היסוד של חמצן"], correctIndex: 3, explanation: "חמצן סינגלט הוא מצב מעורר, כלומר הוא בעל רמת אנרגיה גבוהה יותר (22-37 קק״ל/מול) ממצב היסוד, שהוא חמצן טריפלט. האנרגיה העודפת היא המקור לריאקטיביות הגבוהה שלו." },
            { question: "מדוע ערך ה-PV (Peroxide Value) אינו מדד טוב לשלבים מתקדמים של קלקול חמצוני?", options: ["כי הוא מודד רק תוצרים ראשוניים (הידרופראוקסידים) שמתפרקים בשלבים מתקדמים", "כי המדידה דורשת ציוד מורכב ויקר", "כי הוא אינו רגיש מספיק בריכוזים נמוכים", "כי הוא מושפע מאוד מנוכחות מים בדגימה"], correctIndex: 0, explanation: "ערך ה-PV מודד את ריכוז ההידרופראוקסידים. בשלבים מתקדמים של חמצון, תרכובות אלו, שאינן יציבות, מתפרקות לתוצרים שניוניים (אלדהידים, קטונים) הגורמים לטעם וריח רעים. לכן, ערך ה-PV עשוי אפילו לרדת בשלבים אלו." },
            { question: "מהי מטרת השימוש באנזים ליפאז ספציפי לעמדות sn-1,3 בייצור שומנים מותאמים (tailor-made lipids) לתחליפי חלב אם?", options: ["לייצר טריגליצרידים עם חומצה פלמיטית בעמדה sn-2, בדומה לחלב אם", "לפרק לחלוטין את כל הטריגליצרידים לחומצות שומן חופשיות", "להסיר את כל חומצות השומן הרוויות מהשמן", "ליצור שומן טראנס באופן מבוקר"], correctIndex: 0, explanation: "בחלב אם, חומצה פלמיטית (רוויה) נמצאת בעיקר בעמדה sn-2. ליפאז ספציפי ל-1,3 מאפשר להרכיב טריגליצרידים (כמו OPO) המחקים מבנה זה, מה שמשפר את ספיגת השומן והסידן אצל תינוקות." },
            { question: "בטיגון עמוק, מתרחשת עפשות הידרוליטית בשמן. מהו המקור העיקרי למים המשתתפים בתגובה זו?", options: ["התעבות לחות מהאוויר", "פירוק של מולקולות השמן עצמן", "המים הנמצאים במזון המטוגן", "תוספת מים מכוונת למניעת התחמצנות"], correctIndex: 2, explanation: "במהלך טיגון, המים الموجودים במזון (למשל תפוח אדמה) משתחררים אל השמן החם וגורמים להידרוליזה של קשרים אסטריים, מה שמוביל לשחרור FFA ומאיץ את קלקול השמן." },
            { question: "איזה מהמשפטים הבאים אינו נכון לגבי תגובת פנטון (Fenton reaction) בהקשר של חמצון ליפידים?", options: ["היא דורשת נוכחות של יון מתכת מעבר כמו ברזל (Fe²⁺)", "היא מייצרת רדיקל הידרוקסיל (HO•), שהוא מחמצן חזק מאוד", "היא הופכת מי חמצן (H₂O₂) לרדיקלים חופשיים", "היא תהליך יעיל להפסקת תגובות שרשרת רדיקליות"], correctIndex: 3, explanation: "תגובת פנטון היא מנגנון אתחול (initiation) חזק מאוד. הרדיקל ההידרוקסילי שהיא מייצרת הוא מאוד ריאקטיבי ויכול להתחיל תגובות שרשרת רדיקליות חדשות, ולכן היא מאיצה חמצון ולא מפסיקה אותו." },
            { question: "מה ההשפעה של העלאת הטמפרטורה על קצב חמצון השומנים?", options: ["הקצב תמיד יורד כי מסיסות החמצן בשמן פוחתת", "הקצב עולה באופן כללי, אך מקדם הטמפרטורה Q10 יורד בטמפרטורות גבוהות", "הקצב אינו מושפע מהטמפרטורה אלא רק מנוכחות אור", "הקצב עולה רק בנוכחות פרו-אוקסידנטים מתכתיים"], correctIndex: 1, explanation: "באופן כללי, העלאת טמפרטורה מאיצה תגובות כימיות, כולל חמצון. עם זאת, בטמפרטורות גבוהות, מסיסות החמצן (שהוא מגיב הכרחי) בשמן יורדת, ולכן ההאצה בקצב מתמתנת. כלומר, ה-Q10 גדול מ-2 בטמפ' נמוכות וקרוב ל-2 בטמפ' גבוהות." },

            { question: "חומצות שומן טראנס הן בעלות נקודת התכה גבוהה יותר מאיזומרי הציס המקבילים להן.", answer: true, explanation: "המבנה הליניארי והישר יותר של חומצות טראנס מאפשר אריזה צפופה ויעילה יותר של המולקולות, מה שמוביל לאינטראקציות בין-מולקולריות חזקות יותר ונקודת התכה גבוהה יותר." },
            { question: "תהליך הליפוליזה תמיד מזיק לאיכות המזון ויש להימנע ממנו בכל מחיר.", answer: false, explanation: "בעוד שליפוליזה לא מבוקרת גורמת לעפשות, ישנם מוצרים כמו גבינות מיושנות או יוגורט שבהם ליפוליזה מבוקרת היא חלק רצוי מהתהליך, התורם לפרופיל הטעם והארומה." },
            { question: "שומנים רוויים לחלוטין אינם יכולים לעבור אוטו-אוקסידציה כלל.", answer: false, explanation: "שומנים רוויים עמידים מאוד לחמצון, אך בתנאים קיצוניים מאוד של חום או קרינה, גם הם יכולים לעבור חמצון, אם כי בקצב איטי לאין שיעור משומנים בלתי רוויים." },
            { question: "מדידת בליעת UV באורך גל של 234 ננומטר יכולה לשמש למעקב אחר היווצרות דיאנים מצומדים במהלך חמצון.", answer: true, explanation: "במהלך חמצון של חומצות שומן כמו לינולאית, מתרחש סידור מחדש של הקשרים הכפולים ליצירת מערכת של דיאנים מצומדים. למערכת זו יש בליעת UV אופיינית בסביבות 234 ננומטר." },
            { question: "שלב הסיום (termination) באוטו-אוקסידציה מתרחש בעיקר כאשר ריכוז החמצן במערכת גבוה.", answer: false, explanation: "שלב הסיום, בו רדיקלים מגיבים זה עם זה, דומיננטי דווקא כאשר ריכוז החמצן נמוך. בריכוז חמצן גבוה, שלב ההתפשטות (בו רדיקלים מגיבים עם חמצן) הוא השולט." },
            { question: "חומצה אולאית (18:1) יוצרת ארבעה איזומרים של הידרופרוקסידים בתגובה עם חמצן טריפלט.", answer: true, explanation: "הוצאת מימן משני צידי הקשר הכפול (C8, C11) ולאחר מכן תגובה עם חמצן ויצירת קשר מצומד, מובילה ליצירת ארבעה איזומרים אפשריים: 8-OOH, 9-OOH, 10-OOH, 11-OOH." },
            { question: "תהליך הפרקציונציה (fractionation) של שומן מבוסס על הפרדה לפי גודל המולקולות.", answer: false, explanation: "פרקציונציה מבוססת על הפרדת השומן למקטעים לפי תכונות ההתכה שלהם. על ידי קירור מבוקר, גורמים לטריגליצרידים הרוויים יותר (בעלי נקודת התכה גבוהה) להתגבש, ואז מפרידים אותם מהמקטע הנוזלי." },
            { question: "הידרוגנציה חלקית תמיד מובילה לירידה בערך היוד של השמן.", answer: true, explanation: "ערך היוד מודד את מספר הקשרים הכפולים. כל הידרוגנציה, גם חלקית, כרוכה בהפיכת חלק מהקשרים הכפולים ליחידים, ולכן בהכרח תגרום לירידה בערך היוד." },
            { question: "כל הליפידים הם חומרים מסתבנים.", answer: false, explanation: "רק ליפידים המכילים קשרים אסטריים, כמו טריגליצרידים, הם מסתבנים. ליפידים אחרים כמו כולסטרול, ויטמינים מסיסי שומן וקרוטנואידים שייכים לחומר הבלתי-מסתבן." },
            { question: "רדיקל ההידרוקסיל (HO•) שנוצר בתגובת פנטון הוא פחות ריאקטיבי מרדיקל פרוקסי (ROO•).", answer: false, explanation: "רדיקל ההידרוקסיל הוא אחד הרדיקלים הריאקטיביים ביותר בכימיה והוא יגיב כמעט עם כל מולקולה אורגנית. הוא הרבה יותר ריאקטיבי מרדיקל פרוקסי." }
        ];


        // --- Global State Variables ---
        let currentCardIndex = 0;
        let isCardFront = true;
        let isCardAnimating = false;
        let currentMCQIndex = 0;
        let currentTFIndex = 0;
        let mcqAnswers = new Array(mcqData.length).fill(null);
        let tfAnswers = new Array(tfData.length).fill(null);

        // --- DOM Element References ---
        const flashcardContent = document.getElementById('flashcard-content');
        const cardCounter = document.getElementById('card-counter');
        const prevCardBtn = document.getElementById('prev-card');
        const nextCardBtn = document.getElementById('next-card');
        const mcqQuestion = document.getElementById('mcq-question');
        const mcqOptions = document.getElementById('mcq-options');
        const mcqFeedback = document.getElementById('mcq-feedback');
        const mcqExplanation = document.getElementById('mcq-explanation');
        const mcqCounter = document.getElementById('mcq-counter');
        const prevMCQBtn = document.getElementById('prev-mcq');
        const nextMCQBtn = document.getElementById('next-mcq');
        const viewAllMCQBtn = document.getElementById('view-all-mcq');
        const mcqSingleView = document.getElementById('mcq-single-view');
        const mcqAllQuestionsContainer = document.getElementById('mcq-all-questions');
        const tfQuestion = document.getElementById('tf-question');
        const tfOptionsContainer = document.getElementById('tf-options');
        const tfFeedback = document.getElementById('tf-feedback');
        const tfExplanation = document.getElementById('tf-explanation');
        const tfCounter = document.getElementById('tf-counter');
        const prevTFBtn = document.getElementById('prev-tf');
        const nextTFBtn = document.getElementById('next-tf');
        const viewAllTFBtn = document.getElementById('view-all-tf');
        const tfSingleView = document.getElementById('tf-single-view');
        const tfAllQuestionsContainer = document.getElementById('tf-all-questions');

        function displayCard(index) {
            if (!flashcardData || flashcardData.length === 0) return;
            const cardData = flashcardData[index];
            isCardFront = true;
            flashcardContent.style.opacity = '1';
            flashcardContent.textContent = cardData.term;
            flashcardContent.className = 'flashcard-front-style';
            cardCounter.textContent = `כרטיס ${index + 1} / ${flashcardData.length}`;
            prevCardBtn.disabled = index === 0;
            nextCardBtn.disabled = index === flashcardData.length - 1;
        }

        function flipCard() {
            if (isCardAnimating || !flashcardData || flashcardData.length === 0) return;
            isCardAnimating = true;
            flashcardContent.style.opacity = '0';
            setTimeout(() => {
                isCardFront = !isCardFront;
                const cardData = flashcardData[currentCardIndex];
                if (isCardFront) {
                    flashcardContent.textContent = cardData.term;
                    flashcardContent.className = 'flashcard-front-style';
                } else {
                    flashcardContent.textContent = cardData.definition;
                    flashcardContent.className = 'flashcard-back-style';
                }
                flashcardContent.style.opacity = '1';
                isCardAnimating = false;
            }, 300);
        }

        function displayMCQuestion(index) {
            if (!mcqData || mcqData.length === 0) return;
            const qData = mcqData[index];
            mcqQuestion.textContent = qData.question;
            mcqOptions.innerHTML = '';
            mcqFeedback.classList.add('hidden');
            mcqExplanation.classList.add('hidden');
            qData.options.forEach((option, i) => {
                const button = document.createElement('button');
                button.textContent = option;
                button.onclick = () => handleMCQAnswer(index, i);
                mcqOptions.appendChild(button);
            });
            mcqCounter.textContent = `שאלה ${index + 1} / ${mcqData.length}`;
            prevMCQBtn.disabled = index === 0;
            nextMCQBtn.disabled = index === mcqData.length - 1;
            if (mcqAnswers[index] !== null) {
                highlightMCQAnswer(mcqOptions, mcqFeedback, mcqExplanation, index, mcqAnswers[index].selected);
            }
        }

        function handleMCQAnswer(qIndex, selectedIndex) {
            if (mcqAnswers[qIndex] !== null) return;
            const isCorrect = selectedIndex === mcqData[qIndex].correctIndex;
            mcqAnswers[qIndex] = { selected: selectedIndex, correct: isCorrect };
            highlightMCQAnswer(mcqOptions, mcqFeedback, mcqExplanation, qIndex, selectedIndex);
        }
        
        function highlightMCQAnswer(optionsContainer, feedbackEl, explanationEl, qIndex, selectedIndex) {
            const qData = mcqData[qIndex];
            const buttons = optionsContainer.querySelectorAll('button');
            buttons.forEach((button, i) => {
                button.disabled = true;
                if (i === qData.correctIndex) {
                    button.style.backgroundColor = 'var(--correct-color)';
                    button.style.color = '#fff';
                    button.classList.add('correct');
                }
                if (i === selectedIndex && i !== qData.correctIndex) {
                    button.style.backgroundColor = 'var(--incorrect-color)';
                    button.style.color = '#fff';
                    button.classList.add('incorrect');
                }
            });
            feedbackEl.textContent = selectedIndex === qData.correctIndex ? "נכון!" : "לא נכון.";
            feedbackEl.className = `feedback ${selectedIndex === qData.correctIndex ? 'correct' : 'incorrect'}`;
            explanationEl.textContent = `הסבר: ${qData.explanation}`;
            explanationEl.classList.remove('hidden');
        }

        function displayAllMCQ() {
            if (!mcqData || mcqData.length === 0) return;
            mcqSingleView.classList.add('hidden');
            mcqAllQuestionsContainer.innerHTML = ''; 
            mcqData.forEach((qData, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question-container-all';
                questionDiv.innerHTML = `
                    <div class="question-text">${index + 1}. ${qData.question}</div>
                    <div class="options">
                        ${qData.options.map((option, i) => `<button data-qindex="${index}" data-oindex="${i}">${option}</button>`).join('')}
                    </div>
                    <div class="feedback hidden"></div>
                    <div class="explanation hidden"></div>
                `;
                mcqAllQuestionsContainer.appendChild(questionDiv);
                 const optionButtons = questionDiv.querySelectorAll('.options button');
                 optionButtons.forEach(button => {
                     button.onclick = () => {
                        const qIndex = parseInt(button.dataset.qindex);
                        const oIndex = parseInt(button.dataset.oindex);
                        if (mcqAnswers[qIndex] === null) {
                            const isCorrect = oIndex === mcqData[qIndex].correctIndex;
                            mcqAnswers[qIndex] = { selected: oIndex, correct: isCorrect };
                        }
                        const optionsDiv = button.closest('.options');
                        const feedbackDiv = questionDiv.querySelector('.feedback');
                        const explanationDiv = questionDiv.querySelector('.explanation');
                        highlightMCQAnswer(optionsDiv, feedbackDiv, explanationDiv, qIndex, mcqAnswers[qIndex].selected);
                     };
                 });
                 if (mcqAnswers[index] !== null) {
                    const optionsDiv = questionDiv.querySelector('.options');
                    const feedbackDiv = questionDiv.querySelector('.feedback');
                    const explanationDiv = questionDiv.querySelector('.explanation');
                    highlightMCQAnswer(optionsDiv, feedbackDiv, explanationDiv, index, mcqAnswers[index].selected);
                 }
            });
            mcqAllQuestionsContainer.classList.remove('hidden');
        }

        function displayTFQuestion(index) {
            if (!tfData || tfData.length === 0) return;
            const qData = tfData[index];
            tfQuestion.textContent = qData.question;
            tfFeedback.classList.add('hidden');
            tfExplanation.classList.add('hidden');
             const buttons = tfOptionsContainer.querySelectorAll('button');
             buttons.forEach(button => {
                 button.disabled = false;
                 button.style.backgroundColor = '';
                 button.style.color = '';
                 button.classList.remove('correct', 'incorrect');
                 button.onclick = () => handleTFAnswer(index, button.dataset.answer === 'true');
             });
            tfCounter.textContent = `שאלה ${index + 1} / ${tfData.length}`;
            prevTFBtn.disabled = index === 0;
            nextTFBtn.disabled = index === tfData.length - 1;
            if (tfAnswers[index] !== null) {
                highlightTFAnswer(tfOptionsContainer, tfFeedback, tfExplanation, index, tfAnswers[index].selected);
            }
        }
        
        function handleTFAnswer(qIndex, selectedAnswer) {
            if (tfAnswers[qIndex] !== null) return;
            const isCorrect = selectedAnswer === tfData[qIndex].answer;
            tfAnswers[qIndex] = { selected: selectedAnswer, correct: isCorrect };
            highlightTFAnswer(tfOptionsContainer, tfFeedback, tfExplanation, qIndex, selectedAnswer);
        }
        
        function highlightTFAnswer(optionsContainer, feedbackEl, explanationEl, qIndex, selectedAnswer) {
             const qData = tfData[qIndex];
             const buttons = optionsContainer.querySelectorAll('button');
             buttons.forEach(button => {
                 const buttonAnswer = button.dataset.answer === 'true';
                 button.disabled = true;
                 if (buttonAnswer === qData.answer) {
                     button.style.backgroundColor = 'var(--correct-color)';
                     button.style.color = '#fff';
                     button.classList.add('correct');
                 }
                 if (buttonAnswer === selectedAnswer && buttonAnswer !== qData.answer) {
                     button.style.backgroundColor = 'var(--incorrect-color)';
                     button.style.color = '#fff';
                     button.classList.add('incorrect');
                 }
             });
             feedbackEl.textContent = selectedAnswer === qData.answer ? "נכון!" : "לא נכון.";
             feedbackEl.className = `feedback ${selectedAnswer === qData.answer ? 'correct' : 'incorrect'}`;
             explanationEl.textContent = `הסבר: ${qData.explanation}`;
             explanationEl.classList.remove('hidden');
        }
        
        function displayAllTF() {
             if (!tfData || tfData.length === 0) return;
             tfSingleView.classList.add('hidden');
             tfAllQuestionsContainer.innerHTML = '';
             tfData.forEach((qData, index) => {
                 const questionDiv = document.createElement('div');
                 questionDiv.className = 'question-container-all';
                 questionDiv.innerHTML = `
                     <div class="question-text">${index + 1}. ${qData.question}</div>
                     <div class="tf-options">
                         <button data-qindex="${index}" data-answer="true">נכון</button>
                         <button data-qindex="${index}" data-answer="false">לא נכון</button>
                     </div>
                     <div class="feedback hidden"></div>
                     <div class="explanation hidden"></div>
                 `;
                 tfAllQuestionsContainer.appendChild(questionDiv);
                 const optionButtons = questionDiv.querySelectorAll('.tf-options button');
                 optionButtons.forEach(button => {
                     button.onclick = () => {
                         const qIndex = parseInt(button.dataset.qindex);
                         const selectedAnswer = button.dataset.answer === 'true';
                         if (tfAnswers[qIndex] === null) {
                             const isCorrect = selectedAnswer === tfData[qIndex].answer;
                             tfAnswers[qIndex] = { selected: selectedAnswer, correct: isCorrect };
                         }
                         const optionsDiv = button.closest('.tf-options');
                         const feedbackDiv = questionDiv.querySelector('.feedback');
                         const explanationDiv = questionDiv.querySelector('.explanation');
                         highlightTFAnswer(optionsDiv, feedbackDiv, explanationDiv, qIndex, tfAnswers[qIndex].selected);
                     };
                 });
                 if (tfAnswers[index] !== null) {
                    const optionsDiv = questionDiv.querySelector('.tf-options');
                    const feedbackDiv = questionDiv.querySelector('.feedback');
                    const explanationDiv = questionDiv.querySelector('.explanation');
                    highlightTFAnswer(optionsDiv, feedbackDiv, explanationDiv, index, tfAnswers[index].selected);
                 }
             });
             tfAllQuestionsContainer.classList.remove('hidden');
        }

        function initialize() {
            if (flashcardData.length > 0) displayCard(currentCardIndex);
            if (mcqData.length > 0) displayMCQuestion(currentMCQIndex);
            if (tfData.length > 0) displayTFQuestion(currentTFIndex);
            flashcardContent.addEventListener('click', flipCard);
            prevCardBtn.addEventListener('click', () => { if (currentCardIndex > 0) { currentCardIndex--; displayCard(currentCardIndex); } });
            nextCardBtn.addEventListener('click', () => { if (currentCardIndex < flashcardData.length - 1) { currentCardIndex++; displayCard(currentCardIndex); } });
            prevMCQBtn.addEventListener('click', () => { if (currentMCQIndex > 0) { currentMCQIndex--; displayMCQuestion(currentMCQIndex); } });
            nextMCQBtn.addEventListener('click', () => { if (currentMCQIndex < mcqData.length - 1) { currentMCQIndex++; displayMCQuestion(currentMCQIndex); } });
            viewAllMCQBtn.addEventListener('click', displayAllMCQ);
            prevTFBtn.addEventListener('click', () => { if (currentTFIndex > 0) { currentTFIndex--; displayTFQuestion(currentTFIndex); } });
            nextTFBtn.addEventListener('click', () => { if (currentTFIndex < tfData.length - 1) { currentTFIndex++; displayTFQuestion(currentTFIndex); } });
            viewAllTFBtn.addEventListener('click', displayAllTF);
        }
        
        initialize();
    });
    </script>
</body>
</html>
