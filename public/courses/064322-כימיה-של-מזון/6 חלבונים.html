<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Study Tool</title>
    <style>
        /* --- Root Variables for Consistent Theming --- */
        :root {
            --primary-bg: #333333;
            --secondary-bg: #666666;
            --accent-color: #3D90D7;
            --text-color: #E0E0E0;
            --correct-color: #4CAF50;
            --incorrect-color: #F44336;
            --card-bg: #5a5a5a;
        }

        /* --- Global Styles --- */
        body {
            background-color: var(--primary-bg);
            color: var(--text-color);
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 90%; /* As per prompt */
            margin: 20px auto;
            padding: 20px;
            background-color: var(--secondary-bg);
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        h1, h2 {
            color: var(--accent-color);
            text-align: center;
            border-bottom: 1px solid var(--accent-color);
            padding-bottom: 10px;
        }

        .section {
            background-color: var(--primary-bg);
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 8px;
        }

        /* --- Study Cards Styling (Fade Animation) --- */
        .flashcard-container {
            height: 250px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #flashcard-content {
            width: 100%;
            height: 100%;
            background-color: var(--card-bg);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            transition: opacity 0.3s ease-in-out; /* Fade transition */
        }
        
        .flashcard-front-style {
             font-size: 1.5em;
             font-weight: bold;
        }
        
        .flashcard-back-style {
             font-size: 1.1em;
        }

        /* --- Questions Styling (MCQ & T/F) --- */
         .question-container-single, .question-container-all {
            margin-bottom: 15px;
            padding: 15px;
            border: 1px solid var(--secondary-bg);
            border-radius: 5px;
         }

        .question-text {
            font-weight: bold;
            margin-bottom: 15px;
        }

        .options button, .tf-options button {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-align: right;
            transition: background-color 0.3s;
        }

        .options button:hover:not(:disabled), .tf-options button:hover:not(:disabled) {
            background-color: #357ab8;
        }

        .options button:disabled, .tf-options button:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
        
        /* Specific styling to override disabled opacity for correct/incorrect answers */
        .options button.correct, .tf-options button.correct { opacity: 1; }
        .options button.incorrect, .tf-options button.incorrect { opacity: 1; }


        .feedback {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
        }

        .feedback.correct {
            background-color: var(--correct-color);
            color: #fff;
        }

        .feedback.incorrect {
            background-color: var(--incorrect-color);
            color: #fff;
        }

        .explanation {
            margin-top: 10px;
            font-style: italic;
            font-size: 0.9em;
            padding: 8px;
            background-color: var(--secondary-bg);
            border-radius: 4px;
        }

        /* --- Navigation & Utility Styling --- */
        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            margin-bottom: 10px;
        }

        .nav-button, .view-all-button {
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
        }

        .nav-button:disabled {
             opacity: 0.5;
             cursor: not-allowed;
        }

        .counter {
            font-size: 0.9em;
        }

        .view-all-container {
            text-align: center;
            margin-top: 15px;
            margin-bottom: 15px;
        }

        .hidden {
            display: none;
        }

        #mcq-all-questions .question-container-all,
        #tf-all-questions .question-container-all {
            margin-bottom: 20px;
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>כלי עזר ללמידה: חלבונים ופפטידים במזון</h1>

        <!-- Study Cards Section -->
        <div class="section">
            <h2>כרטיסי לימוד</h2>
            <div class="flashcard-container">
                <div id="flashcard-content"></div>
            </div>
            <div class="navigation">
                <button class="nav-button" id="prev-card">הקודם</button>
                <span class="counter" id="card-counter"></span>
                <button class="nav-button" id="next-card">הבא</button>
            </div>
        </div>

        <!-- Multiple Choice Questions Section -->
        <div class="section">
            <h2>שאלות רב-ברירה (אמריקאיות)</h2>
            <div id="mcq-single-view">
                <div class="question-container-single" id="mcq-container">
                    <div class="question-text" id="mcq-question"></div>
                    <div class="options" id="mcq-options"></div>
                    <div class="feedback hidden" id="mcq-feedback"></div>
                    <div class="explanation hidden" id="mcq-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-mcq">הקודם</button>
                    <span class="counter" id="mcq-counter"></span>
                    <button class="nav-button" id="next-mcq">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-mcq">הצג את כל השאלות</button>
                 </div>
            </div>
            <div id="mcq-all-questions" class="hidden">
                <!-- All MCQs will be dynamically inserted here -->
            </div>
        </div>

        <!-- True/False Questions Section -->
        <div class="section">
            <h2>שאלות נכון/לא נכון</h2>
             <div id="tf-single-view">
                <div class="question-container-single" id="tf-container">
                    <div class="question-text" id="tf-question"></div>
                    <div class="tf-options" id="tf-options">
                        <button data-answer="true">נכון</button>
                        <button data-answer="false">לא נכון</button>
                    </div>
                    <div class="feedback hidden" id="tf-feedback"></div>
                    <div class="explanation hidden" id="tf-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-tf">הקודם</button>
                    <span class="counter" id="tf-counter"></span>
                    <button class="nav-button" id="next-tf">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-tf">הצג את כל השאלות</button>
                 </div>
            </div>
             <div id="tf-all-questions" class="hidden">
                 <!-- All T/F Questions will be dynamically inserted here -->
             </div>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        
        const flashcardData = [
            { term: "מונוסודיום גלוטמט (MSG)", definition: "מלח נתרן של חומצה גלוטמית, משמש כמשפר טעם במזון ומעניק טעם אומאמי. יכול לגרום לתסמינים זמניים אצל אנשים רגישים." },
            { term: "אספרטם", definition: "ממתיק מלאכותי דל קלוריות, מתוק פי 200 מסוכרוז. מורכב מחומצה אספרטית, פנילאלנין וקבוצת מתיל אסטר. אינו מתאים לחולי פנילקטונוריה (PKU)." },
            { term: "גלוטטיון (GSH)", definition: "טריפפטיד (גמא-גלוטמט-ציסטאין-גליצין) המשמש כנוגד חמצון חשוב בגוף, שומר על מצב מחוזר של חלבונים ומשתתף בנטרול רעלים." },
            { term: "דנטורציה של חלבון", definition: "שינוי במבנה המרחבי (שניוני, שלישוני ורביעוני) של חלבון, ללא שינוי במבנה הראשוני. גורמת לרוב לאובדן הפעילות הביולוגית ולירידה במסיסות." },
            { term: "קשיון מוות (Rigor Mortis)", definition: "מצב של קשיחות שרירים המתרחש לאחר המוות עקב היעדר ATP, אשר נדרש לשחרור הקשרים בין סיבי האקטין והמיוזין." },
            { term: "מיוגלובין", definition: "חלבון קושר חמצן בתאי שריר, האחראי לצבע הבשר. צבעו משתנה (סגול, אדום, חום) בהתאם למצב החמצון של יון הברזל (Fe+2/Fe+3) ונוכחות חמצן." },
            { term: "אקטין ומיוזין", definition: "שני חלבוני השריר העיקריים היוצרים את הסרקומר. החלקתם זה על גבי זה, המונעת על ידי ATP ויוני סידן, גורמת להתכווצות השריר." },
            { term: "יישון בשר (Aging)", definition: "תהליך ריכוך בשר לאחר שלב הריגור מורטיס, המתרחש באמצעות אנזימים פרוטאוליטיים טבעיים המפרקים את מבנה סיבי השריר." },
            { term: "Salting out", definition: "תהליך הורדת מסיסות של חלבונים בריכוזי מלח גבוהים. יוני המלח מתחרים עם החלבון על מולקולות המים, מה שגורם לחלבונים לעבור אגרגציה ולשקוע." },
            { term: "סרקומר", definition: "היחידה הבסיסית המתכווצת של שריר, המורכבת מסידור של פילמנטים דקים (אקטין) ועבים (מיוזין) בין שני קווי Z." },
            { term: "Curing (שימור/כבישה)", definition: "תהליך שימור בשר באמצעות הוספת מלח, סוכר וניטריט או ניטראט. התהליך משפיע על שימור, טעם וצבע הבשר." },
            { term: "נקודה איזואלקטרית (pI)", definition: "ערך ה-pH שבו לחלבון יש מטען חשמלי נטו אפס. ב-pI, מסיסות החלבון היא מינימלית והוא נוטה לעבור אגרגציה." }
        ];

        const mcqData = [
            {
                question: "מהי הסיבה המולקולרית המרכזית לתופעת קשיון המוות (Rigor Mortis) בבשר?",
                options: ["הצטברות חומצה לקטית הגורמת לדנטורציית החלבונים", "היעדר ATP המונע את ניתוק קשרי הרוחב בין אקטין למיוזין", "פעילות אנזימים פרוטאוליטיים המפרקים את הסרקומרים", "התייבשות מהירה של רקמת השריר לאחר המוות"],
                correctIndex: 1,
                explanation: "קשיון המוות נגרם כאשר מאגרי ה-ATP בשריר אוזלים. ATP נדרש כדי להיקשר לראשי המיוזין ולשחרר אותם מהאקטין, מה שמאפשר הרפיה. בהיעדר ATP, הקשרים נותרים נעולים."
            },
            {
                question: "איזה מהבאים אינו תוצר פירוק ישיר של אספרטם במערכת העיכול?",
                options: ["חומצה אספרטית", "פנילאלנין", "מתנול", "סוכרוז"],
                correctIndex: 3,
                explanation: "אספרטם הוא דיפפטיד המורכב מחומצה אספרטית ופנילאלנין, עם קבוצת מתיל אסטר. בפירוקו מתקבלים שלושת המרכיבים הללו. סוכרוז הוא סוכר שולחן ואינו קשור לאספרטם."
            },
            {
                question: "מהו ההסבר הכימי לכך שבשר הנחשף לפחמן חד-חמצני (CO) שומר על צבע ורוד-אדום עז לתקופה ארוכה?",
                options: ["CO גורם לחמצון מהיר של המיוגלובין למטמיוגלובין", "CO נקשר למיוגלובין בעוצמה רבה יותר מחמצן ויוצר קומפלקס יציב (קרבוקסימיוגלובין)", "CO מונע פעילות של אנזימים הגורמים להשחמת הבשר", "CO מגיב עם מים ליצירת חומצה המשמרת את הצבע האדום"],
                correctIndex: 1,
                explanation: "פחמן חד-חמצני נקשר לאתר הקישור לברזל במיוגלובין פי 50 חזק יותר מחמצן. הוא יוצר קומפלקס קרבוקסימיוגלובין יציב מאוד שצבעו ורוד-אדום, המונע את הפיכת המיוגלובין למטמיוגלובין החום."
            },
            {
                question: "בתהליך יישון בשר (aging), מהי הפעילות הביוכימית העיקרית התורמת לריכוך הבשר?",
                options: ["דנטורציה של קולגן בטמפרטורת היישון", "פירוק מבוקר של חלבוני הסרקומר, בעיקר באזור דיסק ה-Z, על ידי פרוטאזות", "ירידה ב-pH של השריר הממיסה את החלבונים", "הידרוליזה של קשרי אקטין-מיוזין שנוצרו בריגור מורטיס"],
                correctIndex: 1,
                explanation: "יישון הוא תהליך אנזימטי. פרוטאזות טבעיות בשריר (כמו קלפאינים) מפרקות באופן מבוקר חלבונים מבניים בסרקומר, במיוחד אלה שבדיסק ה-Z, מה שפוגע בשלמות המבנית ומביא לרכות."
            },
            {
                question: "איזו מהפעולות הבאות תגרום לירידה הדרסטית ביותר במסיסות של חלבון בטא-לקטוגלובולין (pI ~5.3) בתמיסה מימית?",
                options: ["הוספת התמיסה ל-pH 7.0", "הוספת ריכוז מלח נמוך (Salting in)", "קירור התמיסה ל-4 מעלות צלזיוס", "כוונון ה-pH של התמיסה ל-5.3"],
                correctIndex: 3,
                explanation: "מסיסות חלבון היא הנמוכה ביותר בנקודה האיזואלקטרית (pI), שבה המטען החשמלי נטו של המולקולה הוא אפס. ב-pH זה, המשיכה הבין-מולקולרית היא מקסימלית והדחייה היא מינימלית, מה שמוביל לאגרגציה ושקיעה."
            },
            {
                question: "מהו תפקידו העיקרי של הטריפפטיד גלוטטיון (GSH) בהקשר של חלבונים בתא?",
                options: ["לשמש סובסטרט לבניית חלבונים חדשים", "לשמור על קבוצות תיול (SH) של ציסטאין בחלבונים במצבן המחוזר", "לזרז יצירת קשרים דיסולפידיים (S-S) לייצוב החלבון", "להיקשר ישירות לרעלנים ולמנוע מהם להגיע לחלבונים"],
                correctIndex: 1,
                explanation: "אחד מתפקידיו המרכזיים של GSH הוא לשמש כרדוקטנט (מחזר). הוא מונע חמצון של קבוצות תיול (SH) חופשיות של ציסטאין בחלבונים, ובכך שומר על המבנה והתפקוד התקין שלהם."
            },
            {
                question: "בשר נא במרכז הנתח, שלא בא במגע עם אוויר, הוא בעל צבע סגול-אדמדם. מהי הצורה הדומיננטית של מיוגלובין במצב זה?",
                options: ["אוקסימיוגלובין (Fe+2)", "מטמיוגלובין (Fe+3)", "דאוקסימיוגלובין (Fe+2)", "קרבוקסימיוגלובין (Fe+2)"],
                correctIndex: 2,
                explanation: "בהיעדר חמצן, המיוגלובין נמצא בצורתו המחוזרת (Fe+2) אך ללא חמצן קשור. צורה זו נקראת דאוקסימיוגלובין וצבעה סגול-אדמדם."
            },
            {
                question: "מה מהבאים אינו מאפיין של דנטורציית חלבונים?",
                options: ["אובדן פעילות ביולוגית", "שבירת קשרים פפטידיים", "ירידה במסיסות", "חשיפת קבוצות הידרופוביות"],
                correctIndex: 1,
                explanation: "דנטורציה היא שינוי במבנה המרחבי (שניוני, שלישוני, רביעוני) של החלבון. המבנה הראשוני, כלומר רצף חומצות האמינו המחוברות בקשרים פפטידיים, נשאר ללא שינוי."
            },
            {
                question: "מדוע יש לסמן על מוצרי מזון המכילים אספרטם אזהרה לחולי פנילקטונוריה (PKU)?",
                options: ["כי אספרטם גורם לעלייה חדה ברמות הסוכר בדם", "כי פירוק אספרטם משחרר מתנול, הרעיל במיוחד לחולי PKU", "כי לחולי PKU חסר האנזים המפרק את חומצת האמינו פנילאלנין", "כי אספרטם מכיל כמויות גבוהות של נתרן"],
                correctIndex: 2,
                explanation: "PKU היא מחלה גנטית שבה יש חסר באנזים פנילאלנין הידרוקסילאז, ההופך פנילאלנין לטירוזין. צריכת פנילאלנין, אחד מתוצרי הפירוק של אספרטם, עלולה להוביל להצטברותו ולהשפעות נוירולוגיות חמורות."
            },
            {
                question: "בהתכווצות שריר, מהו תפקידם של יוני הסידן (Ca++)?",
                options: ["לספק את האנרגיה לתנועת ראשי המיוזין", "להיקשר לטרופונין, ובכך לחשוף את אתרי הקישור למיוזין על גבי האקטין", "לפרק ATP ל-ADP ופוספט", "לגרום לדנטורציה של המיוזין כדי לאפשר קשירה לאקטין"],
                correctIndex: 1,
                explanation: "במצב מנוחה, קומפלקס טרופונין-טרופומיוזין חוסם את אתרי הקישור על האקטין. כאשר אות עצבי גורם לשחרור יוני סידן, הם נקשרים לטרופונין, מה שגורם לשינוי מבני החושף את אתרי הקישור ומאפשר לראשי המיוזין להיקשר ולהתחיל את ההתכווצות."
            },

                         const selectedAnswer = button.dataset.answer === 'true';
                         if (tfAnswers[qIndex] === null) {
                             const isCorrect = selectedAnswer === tfData[qIndex].answer;
                             tfAnswers[qIndex] = { selected: selectedAnswer, correct: isCorrect };
                         }
                         const optionsDiv = button.closest('.tf-options');
                         const feedbackDiv = questionDiv.querySelector('.feedback');
                         const explanationDiv = questionDiv.querySelector('.explanation');
                         highlightTFAnswer(optionsDiv, feedbackDiv, explanationDiv, qIndex, tfAnswers[qIndex].selected);
                     };
                 });
                 if (tfAnswers[index] !== null) {
                    const optionsDiv = questionDiv.querySelector('.tf-options');
                    const feedbackDiv = questionDiv.querySelector('.feedback');
                    const explanationDiv = questionDiv.querySelector('.explanation');
                    highlightTFAnswer(optionsDiv, feedbackDiv, explanationDiv, index, tfAnswers[index].selected);
                 }
             });
             tfAllQuestionsContainer.classList.remove('hidden');
        }

        function initialize() {
            if (flashcardData.length > 0) displayCard(currentCardIndex);
            if (mcqData.length > 0) displayMCQuestion(currentMCQIndex);
            if (tfData.length > 0) displayTFQuestion(currentTFIndex);
            flashcardContent.addEventListener('click', flipCard);
            prevCardBtn.addEventListener('click', () => { if (currentCardIndex > 0) { currentCardIndex--; displayCard(currentCardIndex); } });
            nextCardBtn.addEventListener('click', () => { if (currentCardIndex < flashcardData.length - 1) { currentCardIndex++; displayCard(currentCardIndex); } });
            prevMCQBtn.addEventListener('click', () => { if (currentMCQIndex > 0) { currentMCQIndex--; displayMCQuestion(currentMCQIndex); } });
            nextMCQBtn.addEventListener('click', () => { if (currentMCQIndex < mcqData.length - 1) { currentMCQIndex++; displayMCQuestion(currentMCQIndex); } });
            viewAllMCQBtn.addEventListener('click', displayAllMCQ);
            prevTFBtn.addEventListener('click', () => { if (currentTFIndex > 0) { currentTFIndex--; displayTFQuestion(currentTFIndex); } });
            nextTFBtn.addEventListener('click', () => { if (currentTFIndex < tfData.length - 1) { currentTFIndex++; displayTFQuestion(currentTFIndex); } });
            viewAllTFBtn.addEventListener('click', displayAllTF);
        }
        
        initialize();
    });
    </script>
</body>
</html>
