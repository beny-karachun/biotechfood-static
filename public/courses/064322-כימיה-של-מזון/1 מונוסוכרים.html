<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Study Tool</title>
    <style>
        /* --- Root Variables for Consistent Theming --- */
        :root {
            --primary-bg: #333333;
            --secondary-bg: #666666;
            --accent-color: #3D90D7;
            --text-color: #E0E0E0;
            --correct-color: #4CAF50;
            --incorrect-color: #F44336;
            --card-bg: #5a5a5a;
        }

        /* --- Global Styles --- */
        body {
            background-color: var(--primary-bg);
            color: var(--text-color);
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 90%; /* As per prompt */
            margin: 20px auto;
            padding: 20px;
            background-color: var(--secondary-bg);
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        h1, h2 {
            color: var(--accent-color);
            text-align: center;
            border-bottom: 1px solid var(--accent-color);
            padding-bottom: 10px;
        }

        .section {
            background-color: var(--primary-bg);
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 8px;
        }

        /* --- Study Cards Styling (Fade Animation) --- */
        .flashcard-container {
            height: 250px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #flashcard-content {
            width: 100%;
            height: 100%;
            background-color: var(--card-bg);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            transition: opacity 0.3s ease-in-out; /* Fade transition */
        }
        
        .flashcard-front-style {
             font-size: 1.5em;
             font-weight: bold;
        }
        
        .flashcard-back-style {
             font-size: 1.1em;
        }

        /* --- Questions Styling (MCQ & T/F) --- */
         .question-container-single, .question-container-all {
            margin-bottom: 15px;
            padding: 15px;
            border: 1px solid var(--secondary-bg);
            border-radius: 5px;
         }

        .question-text {
            font-weight: bold;
            margin-bottom: 15px;
        }

        .options button, .tf-options button {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-align: right;
            transition: background-color 0.3s;
        }

        .options button:hover:not(:disabled), .tf-options button:hover:not(:disabled) {
            background-color: #357ab8;
        }

        .options button:disabled, .tf-options button:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
        
        /* Specific styling to override disabled opacity for correct/incorrect answers */
        .options button.correct, .tf-options button.correct { opacity: 1; }
        .options button.incorrect, .tf-options button.incorrect { opacity: 1; }


        .feedback {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
        }

        .feedback.correct {
            background-color: var(--correct-color);
            color: #fff;
        }

        .feedback.incorrect {
            background-color: var(--incorrect-color);
            color: #fff;
        }

        .explanation {
            margin-top: 10px;
            font-style: italic;
            font-size: 0.9em;
            padding: 8px;
            background-color: var(--secondary-bg);
            border-radius: 4px;
        }

        /* --- Navigation & Utility Styling --- */
        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            margin-bottom: 10px;
        }

        .nav-button, .view-all-button {
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
        }

        .nav-button:disabled {
             opacity: 0.5;
             cursor: not-allowed;
        }

        .counter {
            font-size: 0.9em;
        }

        .view-all-container {
            text-align: center;
            margin-top: 15px;
            margin-bottom: 15px;
        }

        .hidden {
            display: none;
        }

        #mcq-all-questions .question-container-all,
        #tf-all-questions .question-container-all {
            margin-bottom: 20px;
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>כלי עזר ללמידה: מונוסוכרים בכימיה של מזון</h1>

        <!-- Study Cards Section -->
        <div class="section">
            <h2>כרטיסי לימוד</h2>
            <div class="flashcard-container">
                <div id="flashcard-content"></div>
            </div>
            <div class="navigation">
                <button class="nav-button" id="prev-card">הקודם</button>
                <span class="counter" id="card-counter"></span>
                <button class="nav-button" id="next-card">הבא</button>
            </div>
        </div>

        <!-- Multiple Choice Questions Section -->
        <div class="section">
            <h2>שאלות רב-ברירה (אמריקאיות)</h2>
            <div id="mcq-single-view">
                <div class="question-container-single" id="mcq-container">
                    <div class="question-text" id="mcq-question"></div>
                    <div class="options" id="mcq-options"></div>
                    <div class="feedback hidden" id="mcq-feedback"></div>
                    <div class="explanation hidden" id="mcq-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-mcq">הקודם</button>
                    <span class="counter" id="mcq-counter"></span>
                    <button class="nav-button" id="next-mcq">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-mcq">הצג את כל השאלות</button>
                 </div>
            </div>
            <div id="mcq-all-questions" class="hidden">
                <!-- All MCQs will be dynamically inserted here -->
            </div>
        </div>

        <!-- True/False Questions Section -->
        <div class="section">
            <h2>שאלות נכון/לא נכון</h2>
             <div id="tf-single-view">
                <div class="question-container-single" id="tf-container">
                    <div class="question-text" id="tf-question"></div>
                    <div class="tf-options" id="tf-options">
                        <button data-answer="true">נכון</button>
                        <button data-answer="false">לא נכון</button>
                    </div>
                    <div class="feedback hidden" id="tf-feedback"></div>
                    <div class="explanation hidden" id="tf-explanation"></div>
                </div>
                <div class="navigation">
                    <button class="nav-button" id="prev-tf">הקודם</button>
                    <span class="counter" id="tf-counter"></span>
                    <button class="nav-button" id="next-tf">הבא</button>
                </div>
                 <div class="view-all-container">
                     <button class="view-all-button" id="view-all-tf">הצג את כל השאלות</button>
                 </div>
            </div>
             <div id="tf-all-questions" class="hidden">
                 <!-- All T/F Questions will be dynamically inserted here -->
             </div>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        
        const flashcardData = [
            {
                term: "אפימרים (Epimers)",
                definition: "דיאסטריאומרים הנבדלים בקונפיגורציה של מרכז כיראלי אחד בלבד. לדוגמה, D-גלוקוז ו-D-גלקטוז הם אפימרים בפחמן C-4."
            },
            {
                term: "אנומרים (Anomers)",
                definition: "סוג ספציפי של אפימרים הנבדלים בקונפיגורציה של הפחמן ההמיאצטלי (C1 באלדוזות) או ההמיקטלי (C2 בקטוזות) הנוצר בעת סגירת הטבעת. לדוגמה, α-D-גלוקוז ו-β-D-גלוקוז."
            },
            {
                term: "מוטרוטציה (Mutarotation)",
                definition: "השינוי בפעילות האופטית של תמיסת סוכר המתרחש כתוצאה מהיפוך בין האנומרים אלפא ובטא דרך הצורה הפתוחה, עד להגעה לשיווי משקל."
            },
            {
                term: "סוכר מחזר (Reducing Sugar)",
                definition: "סוכר בעל קבוצת אלדהיד או קטון חופשית (או קבוצת המיאצטל היכולה להיפתח לאלדהיד) המסוגל לחזר יוני מתכת כמו Cu2+ בתמיסת פהלינג או בנדיקט."
            },
            {
                term: "המיאצטל (Hemiacetal)",
                definition: "קבוצה פונקציונלית הנוצרת מתגובה של אלדהיד עם כוהל. בחד-סוכרים, מבנה טבעתי זה נוצר מתגובה תוך-מולקולרית והפחמן הקשור לשני חמצנים (אחד כהידרוקסיל ואחד כאתר) נקרא הפחמן האנומרי."
            },
            {
                term: "טאוטומריזציה קטו-אנול",
                definition: "תהליך איזומריזציה כימי הפיך בין קטון (קטו) לבין אנול (כוהל על קשר כפול). בסוכרים, תהליך זה מאפשר מעבר בין קטוזות לאלדוזות בתנאים בסיסיים."
            },
            {
                term: "אלדיטול (Alditol)",
                definition: "כוהל סוכרי, פוליאול שנוצר מחיזור של קבוצת הקרבוניל (אלדהיד או קטון) של חד-סוכר. לדוגמה, חיזור של גלוקוז נותן סורביטול."
            },
            {
                term: "חומצה אלדונית (Aldonic Acid)",
                definition: "חומצה סוכרית הנוצרת מחמצון של קבוצת האלדהיד של אלדוז לחומצה קרבוקסילית. לדוגמה, חמצון של גלוקוז נותן חומצה גלוקונית."
            },
            {
                term: "חומצה אורונית (Uronic Acid)",
                definition: "חומצה סוכרית הנוצרת מחמצון של קבוצת ההידרוקסיל הראשונית (בדרך כלל C-6) של סוכר לחומצה קרבוקסילית. לדוגמה, חמצון C-6 בגלוקוז נותן חומצה גלוקורונית."
            },
            {
                term: "גלוקוז אוקסידאז (GOx)",
                definition: "אנזים המחמצן באופן ספציפי בטא-D-גלוקוז ל-D-גלוקונו-לקטון (שעובר הידרוליזה לחומצה גלוקונית), תוך שימוש בחמצן מולקולרי כמקבל אלקטרונים ויצירת מי חמצן."
            },
            {
                term: "קשר גליקוזידי (Glycosidic Bond)",
                definition: "קשר קוולנטי הנוצר בין קבוצת המיאצטל של סוכר אחד לקבוצת הידרוקסיל של מולקולה אחרת (שיכולה להיות סוכר נוסף). קשר זה נועל את הסוכר הראשון בצורתו הטבעתית."
            },
            {
                term: "אננטיומרים (Enantiomers)",
                definition: "סטריאואיזומרים שהם תמונות ראי זה של זה ואינם חפיפים. לדוגמה, D-גלוקוז ו-L-גלוקוז."
            }
        ];

        const mcqData = [
            {
                question: "איזה מהמשפטים הבאים אינו מתאר נכונה את ההבדל בין D-גלוקוז ל-D-פרוקטוז?",
                options: ["D-גלוקוז הוא אלדוהקסוז, בעוד D-פרוקטוז הוא קטוהקסוז.", "שניהם בעלי אותה נוסחה כימית (C6H12O6).", "חיזור של שניהם נותן את אותו תוצר, סורביטול.", "שניהם יכולים ליצור טבעת פירנוזית (6 אטומים) ופורנוזית (5 אטומים)."],
                correctIndex: 2,
                explanation: "חיזור של D-גלוקוז נותן סורביטול בלבד. חיזור של D-פרוקטוז יוצר מרכז כיראלי חדש ונותן תערובת אפימרית של סורביטול ומניטול. כל שאר המשפטים נכונים."
            },
            {
                question: "מהו ההסבר הכימי לכך שסוכרוז אינו סוכר מחזר, למרות שהוא מורכב מגלוקוז ופרוקטוז שהם סוכרים מחזרים?",
                options: ["הקשר הגליקוזידי נועל את פרוקטוז בצורת הפורנוז.", "הפחמנים האנומריים של שתי יחידות הסוכר (C1 של גלוקוז ו-C2 של פרוקטוז) קשורים זה לזה.", "סוכרוז אינו עובר מוטרוטציה בתמיסה מימית.", "בתנאי המבחן, סוכרוז מתפרק למלח וחומצה."],
                correctIndex: 1,
                explanation: "כדי שסוכר יהיה מחזר, הפחמן האנומרי שלו צריך להיות פנוי (כחלק מקבוצת המיאצטל) כדי לאפשר פתיחה של הטבעת. בסוכרוז, שני הפחמנים האנומריים קשורים זה לזה בקשר גליקוזידי, ולכן הטבעות אינן יכולות להיפתח."
            },
            {
                question: "איזה מהבאים מתאר נכונה את היחס בין D-גלוקוז ו-D-גלקטוז?",
                options: ["הם אנומרים.", "הם אננטיומרים.", "הם אפימרים בפחמן C-4.", "הם אפימרים בפחמן C-2."],
                correctIndex: 2,
                explanation: "D-גלוקוז ו-D-גלקטוז נבדלים זה מזה רק בקונפיגורציה סביב פחמן מספר 4, ולכן הם אפימרים של C-4."
            },
            {
                question: "במפעל מזון, רוצים למנוע השחמה אנזימטית בתפוחים חתוכים. איזו מהפעולות הבאות, המבוססות על עקרונות כימיית הפחמימות, תהיה היעילה ביותר?",
                options: ["הוספת סוכרוז ליצירת שכבת מגן.", "הוספת ויטמין C (חומצה אסקורבית) לתמיסת ההשריה.", "הוספת מניטול לייצוב המבנה.", "חימום התפוחים לטמפרטורה גבוהה כדי לבצע קרמליזציה."],
                correctIndex: 1,
                explanation: "ויטמין C הוא חומר מחזר חזק. הוא מונע השחמה אנזימטית על ידי חיזור תוצרי החמצון (אורתו-קינונים) חזרה למצבם המקורי, לפני שהם יכולים ליצור פולימרים צבעוניים."
            },
            {
                question: "איזה מהתוצרים הבאים אינו יכול להתקבל מתגובה של D-גלוקוז?",
                options: ["חומצה D-גלוקורונית", "סורביטול", "חומצה D-גלוקונית", "D-מניטול"],
                correctIndex: 3,
                explanation: "D-מניטול הוא אפימר של סורביטול ומתקבל מחיזור של פרוקטוז (או מנוז), אך לא מחיזור של גלוקוז. חומצה גלוקורונית (חמצון C6), סורביטול (חיזור) וחומצה גלוקונית (חמצון C1) כולם תוצרים אפשריים של גלוקוז."
            },
            {
                question: "מדוע צורת הכיסא (chair form) של β-D-גלוקופירנוז יציבה יותר מצורת הסירה (boat form)?",
                options: ["צורת הסירה מכילה יותר קשרים כפולים.", "בצורת הכיסא, כל המתמירים הגדולים (OH) נמצאים בעמדות אקווטוריאליות, מה שממזער הפרעה סטרית.", "צורת הסירה אינה מאפשרת מוטרוטציה.", "בצורת הכיסא, כל המתמירים הגדולים (OH) נמצאים בעמדות אקסיאליות, מה שמגביר את יציבות המבנה."],
                correctIndex: 1,
                explanation: "היציבות המוגברת של צורת הכיסא נובעת מכך שהמתמירים הגדולים והנפחיים (קבוצות הידרוקסיל) נמצאים בעמדות אקווטוריאליות, שם ההפרעה הסטרית ביניהם ועם שאר האטומים בטבעת היא מינימלית."
            },
            {
                question: "במבחן אוסאזון (Osazone test), גלוקוז, פרוקטוז ומנוז נותנים את אותו האוסאזון. מה הסיבה לכך?",
                options: ["לשלושתם יש 6 פחמנים.", "התגובה עם פנילהידרזין משנה את הקונפיגורציה בכל המרכזים הכיראליים.", "התגובה מתרחשת בפחמנים C1 ו-C2, והכיראליות בפחמן C2 נהרסת, כך שההבדלים בין הסוכרים (ב-C1 ו-C2) נעלמים.", "שלושתם שייכים לסדרת L."],
                correctIndex: 2,
                explanation: "תגובת האוסאזון מערבת את פחמנים 1 ו-2. בתהליך, פחמן C2 הופך לקרבוניל ואז מגיב, ובכך מאבד את הכיראליות שלו. מכיוון שגלוקוז, פרוקטוז ומנוז נבדלים רק בקונפיגורציה של C1 ו-C2, אך זהים משם והלאה (C3-C6), הם יתנו את אותו תוצר אוסאזון."
            },
            {
                question: "מהי התכונה העיקרית המבדילה בין מבחן בנדיקט למבחן פהלינג לקביעת סוכרים מחזרים?",
                options: ["מבחן פהלינג משתמש ביוני כסף, בעוד בנדיקט משתמש ביוני נחושת.", "תמיסת בנדיקט יציבה יותר ואלקלית פחות מתמיסת פהלינג.", "רק מבחן פהלינג יכול להבדיל בין אלדוזות לקטוזות.", "מבחן בנדיקט נותן משקע כחול, בעוד פהלינג נותן משקע אדום."],
                correctIndex: 1,
                explanation: "תמיסת בנדיקט (המכילה נחושת סולפט, נתרן קרבונט ונתרן ציטראט) היא פחות בסיסית ויציבה יותר לאורך זמן מתמיסת פהלינג, שצריך להכין משתי תמיסות נפרדות לפני השימוש."
            },
            {
                question: "חמצון של D-גלוקוז עם חומצה חנקתית (HNO3) מדוללת וחמה יחמצן גם את קבוצת האלדהיד וגם את קבוצת ההידרוקסיל הראשונית. מהו שם התוצר?",

             explanationEl.textContent = `הסבר: ${qData.explanation}`;
             explanationEl.classList.remove('hidden');
        }
        
        function displayAllTF() {
             if (!tfData || tfData.length === 0) return;
             tfSingleView.classList.add('hidden');
             tfAllQuestionsContainer.innerHTML = '';
             tfData.forEach((qData, index) => {
                 const questionDiv = document.createElement('div');
                 questionDiv.className = 'question-container-all';
                 questionDiv.innerHTML = `
                     <div class="question-text">${index + 1}. ${qData.question}</div>
                     <div class="tf-options">
                         <button data-qindex="${index}" data-answer="true">נכון</button>
                         <button data-qindex="${index}" data-answer="false">לא נכון</button>
                     </div>
                     <div class="feedback hidden"></div>
                     <div class="explanation hidden"></div>
                 `;
                 tfAllQuestionsContainer.appendChild(questionDiv);
                 const optionButtons = questionDiv.querySelectorAll('.tf-options button');
                 optionButtons.forEach(button => {
                     button.onclick = () => {
                         const qIndex = parseInt(button.dataset.qindex);
                         const selectedAnswer = button.dataset.answer === 'true';
                         if (tfAnswers[qIndex] === null) {
                             const isCorrect = selectedAnswer === tfData[qIndex].answer;
                             tfAnswers[qIndex] = { selected: selectedAnswer, correct: isCorrect };
                         }
                         const optionsDiv = button.closest('.tf-options');
                         const feedbackDiv = questionDiv.querySelector('.feedback');
                         const explanationDiv = questionDiv.querySelector('.explanation');
                         highlightTFAnswer(optionsDiv, feedbackDiv, explanationDiv, qIndex, tfAnswers[qIndex].selected);
                     };
                 });
                 if (tfAnswers[index] !== null) {
                    const optionsDiv = questionDiv.querySelector('.tf-options');
                    const feedbackDiv = questionDiv.querySelector('.feedback');
                    const explanationDiv = questionDiv.querySelector('.explanation');
                    highlightTFAnswer(optionsDiv, feedbackDiv, explanationDiv, index, tfAnswers[index].selected);
                 }
             });
             tfAllQuestionsContainer.classList.remove('hidden');
        }

        function initialize() {
            if (flashcardData.length > 0) displayCard(currentCardIndex);
            if (mcqData.length > 0) displayMCQuestion(currentMCQIndex);
            if (tfData.length > 0) displayTFQuestion(currentTFIndex);
            flashcardContent.addEventListener('click', flipCard);
            prevCardBtn.addEventListener('click', () => { if (currentCardIndex > 0) { currentCardIndex--; displayCard(currentCardIndex); } });
            nextCardBtn.addEventListener('click', () => { if (currentCardIndex < flashcardData.length - 1) { currentCardIndex++; displayCard(currentCardIndex); } });
            prevMCQBtn.addEventListener('click', () => { if (currentMCQIndex > 0) { currentMCQIndex--; displayMCQuestion(currentMCQIndex); } });
            nextMCQBtn.addEventListener('click', () => { if (currentMCQIndex < mcqData.length - 1) { currentMCQIndex++; displayMCQuestion(currentMCQIndex); } });
            viewAllMCQBtn.addEventListener('click', displayAllMCQ);
            prevTFBtn.addEventListener('click', () => { if (currentTFIndex > 0) { currentTFIndex--; displayTFQuestion(currentTFIndex); } });
            nextTFBtn.addEventListener('click', () => { if (currentTFIndex < tfData.length - 1) { currentTFIndex++; displayTFQuestion(currentTFIndex); } });
            viewAllTFBtn.addEventListener('click', displayAllTF);
        }
        
        initialize();
    });
    </script>
</body>
</html>
